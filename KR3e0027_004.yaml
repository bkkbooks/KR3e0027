body:
  text: 聖濟總録纂要卷四休寧程林纂傷寒門傷寒乾嘔論曰傷寒乾嘔者嘔而無所出也此因邪熱在胃或汗解後胃中不和尚有蓄熱氣薰上焦心中痞結故令乾嘔且諸邪氣在胃胃氣上逆皆發為嘔冷即寒痰凝結嘔出涎沫熱即津液消爍獨其氣逆故乾嘔不巳施治者不可不察竹茹湯治胃氣虛熱乾嘔不止竹茹半夏甘草五錢人參蘆根一兩前胡葛根三分薑水煎五錢服蘆根湯治心脾虛熱乾嘔煩熱不下食蘆根二兩人參赤茯竹茹一兩甘草五錢水煎五錢入小麥一撮薑一分溫服日二枇杷葉湯治乾嘔煩渴不止枇杷葉去毛蜜炙麥冬人參葛根三分白茯五錢甘草炙一分薑水煎三錢服人參煮散治胃氣虛冷乾嘔不止人參一兩白术白芍三分杏仁陳皮枳殼髙良薑甘草乾薑五錢薑棗水煎三錢稍熱服相繼三服以熱稀粥投之以助藥力汗出乃差白木飲治邪熱雖退胃中不和乾嘔不己甚則吐逆白术蘆根紫朴一兩枇杷葉去毛炙五錢薑水煎三錢空心溫服日二傷寒嘔噦論曰傷寒嘔噦者病在足陽明胃經也足陽明之脈厥而上行令人氣逆氣逆故嘔噦仲景云嘔多雖有陽明症慎不可下蓋為此也又傷寒嘔噦有因熱壅胸中邪氣之髙所致有因吐下後虛熱在內及飲水停積所致症既不同治亦有異不可不察半夏湯治胃氣逆冷食巳嘔噦即欲吐半夏白茯一兩人參枳殼五錢白术炒兩半薑水煎三錢溫服日三服人參湯治服冷藥過多胃寒嘔噦不下食人參白术附子白茯陳皮一兩桂心乾薑五錢丁香一分薑水粳米煎五錢服藿香人參湯治嘔噦不止胸滿煩悶藿香三分人參一兩甘草陳皮五錢薑水煎三錢服日二通正散治噦逆嘔吐虛氣妄行丁香乾柿蒂一兩蓮肉五十枚共末酒下二錢四逆加薑湯治少陰症嘔噦甘草炙一兩附子生薑切焙兩半乾薑三分水煎五錢溫服傷寒心悸論曰傷寒心下悸者謂悸動不定也傷寒飲水過多水停心下腎氣乘心則心虛氣弱故為之悸動皆由發汗後又下之津液燥少若內生虛熱熱則飲水水氣停積故必振寒而心下悸也茯苓甘草湯治傷寒厥心下悸先治其水服此湯却治其厥不爾水漬入胃必作利赤茯甘草桂心一兩薑棗水煎五錢溫服日二桂枝甘草湯治發汗過多其人乂手自冒心心下悸欲按者桂枝四兩甘草三兩水煎五錢溫服日二甘草湯治脈結心悸甘草麥冬一兩生地四兩人參桂心五錢麻仁一合薑棗酒水煎五錢去滓入阿膠一片令洋盡溫服日二桂枝湯治水在心下心悸動欲得人按桂枝二兩赤茯兩半白术一兩甘草陳皮去白炒五錢生薑水煎五錢空心溫服日二傷寒痞滿論曰傷寒病發于陰醫誤下之邪氣入裏胃中虛客氣上逆心下滿不痛按之不堅此為痞也法宜㵼心唯表未解者未可攻之當先解表然後攻痞若表解而裏未和或㵼心而痞不解其人口燥煩喝皆隨症處治其眩冒而經脈動惕者久則成痿若表裏俱虛之人有氣痞陰陽氣并竭無陽則陰獨復加火針因胸煩面青黃膚膶者難治其脈微浮而氣上冲咽喉不能息者非痞乃有寒在胸中故也治屬吐法半夏㵼心湯治心下痞但滿不痛者半夏一兩乾薑人參二兩片芩川連甘草五錢大棗水煎五錢食後服日二大黃黃連㵼心湯治傷寒大下之後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃攻痞解表宜桂枝湯攻痞宜此湯大黃二兩川連一兩以麻黃沸湯漬三錢須㬰絞取汁溫服一方有片芩一兩㵼心湯治傷寒汗解後胃中不和心下痞硬噫食殠脅下有水氣腹中雷鳴下利人參甘草三分川連乾薑一兩片芩一兩半夏薑汁炒二兩半薑棗水煎四錢空心溫服晚又服甘草㵼心湯治傷寒中風醫反下之其人下利日數十行完穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也炙甘草四兩片芩乾薑三兩半夏薑汁炒二兩半川連一兩水煎四錢大棗二枚溫服旋復代赭湯治發汗若吐下後心下痞硬噫氣不除旋復花三兩代赭石一兩人參半夏甘草炙二兩薑棗水煎四錢溫服日二蘇橘湯治胸中痞滿心腹氣滯不思飲食紫蘇葉大腹皮旋復花一兩陳皮二兩赤茯兩半半夏五錢薑棗水煎五錢溫服異效丸治五六日大下後心中痞滿氣息喘逆欲絶人參白术甘草枳殼赤茯括摟陳皮炒木香五錢乾薑三分共末蜜丸桐子大空心米飲下二十丸至晚再加至三十丸草豆䓻湯治傷寒汗後胃氣不和心下結痞噫氣食殠脅下虛滿虛鳴下利草䓻陳皮枳殼五錢人參半夏甘草乾薑三分薑棗水煎五錢溫服日二傷寒霍亂論曰嘔吐而利病名霍亂此由邪氣在中焦使陰陽二氣不能升降則心腹絞痛而作吐利其候先心痛則先吐腹後痛則先利心腹俱痛則吐利並作古人以其病迅暴揮霍之間便致撩亂故名霍亂傷寒霍亂亦由中焦陰陽不和所致故其狀有熱而渴者有寒而不渴者有發熱惡寒汗出厥逆者有病勢已而身體疼痛不休者不可槩以一法治理中湯治霍亂吐利寒多不喜飲水人參白术甘草乾薑二兩共末蜜丸彈子大沸湯化一丸溫服日三夜二五苓散治霍亂頭痛發熱多欲飲水猪苓白术三分桂心五錢赤茯澤㵼一兩共末溫水空心下二錢日二蘆根人參湯治霍亂心煩乾嘔蘆根二兩人參麥冬赤茯一兩枇杷葉去毛炙一分水煎五錢入薤白三寸溫服日三藿香湯治霍亂轉筋嘔吐不止藿香人參附子木瓜桂心川歸二兩生薑水煎三錢溫服日二吳茱茰湯治霍亂吐利腹脹轉筋手足冷飲食不消吳茱茰紫朴一兩桂心丁香木瓜甘草藿香五錢人參三分薑水煎三錢服日二白术湯治霍亂吐利轉筋白术陳皮一兩木瓜二兩薑水煎三錢溫服日二傷寒小便不通論曰傷寒小便不通者或因發汗過多津液虛少胃中乾燥或小腸有伏熱氣道不宣皆令小便不通也方論云胃中乾則無小便慎不可利蓋言汗後亡津液也若下焦有熱而小便不利又當隨症利之赤茯木通湯治下焦有熱小便不通赤茯木通滑石車前子一兩水煎五錢溫服日二猪苓湯治脈浮發熱渴欲飲水小便不利猪苓赤茯滑石澤㵼一兩水煎五錢去渣入阿膠末一錢再沸溫服日二五苓散治傷寒汗後小便不利微熱消渴猪苓赤茯白术三兩桂心五錢澤㵼一兩共末水下三錢雞蘇湯治小腹急痛小便不利雞蘇一把木通滑石杏仁去皮尖炒冬葵子石韋去毛一兩生地二兩水煎五錢溫服傷寒大便不通論曰傷寒大便不通者胃腑實也因太陽病若汗若下若利小便亡其津液胃中乾燥因轉屬陽明不更衣內實大便難此陽明症也當下之然有陽明症不可下者當問其小便日幾行若本小便日三四行今日再行故知大便不久出為小便數少津液當還胃中故知不久當大便如此則傷寒嘔多雖有陽明症不可下明矣凡胃中有燥屎常以湯水和之湯入腹中轉失氣者此所謂有結燥下之無害若不轉失氣者此但初硬後必溏不可下下之則脹滿不能食也小承氣湯治陽明病潮熱若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中若轉失氣者有燥屎也乃可攻之若不轉失氣者但初頭硬後必溏不可攻攻之必腹脹不能食也欲飲水者與水則噦其後發熱者必大便硬而少也以小承氣和之大黃酒洗四兩紫朴薑汁炒二兩枳實三枚炒水煎五錢溫服當更衣不爾者再服更衣者勿服服後若不轉失氣者不可攻大承氣湯治傷寒病不大便五六日繞臍痛煩躁發作有時此為有燥屎宜此湯大黃酒洗四兩紫朴薑炒八兩枳實炒五枚水煎五錢去渣入芒硝一錢數沸溫服仲景云少陰病症六七日不大便者此湯主之麻仁丸治傷寒跌陽脈浮而澀浮則胃氣强澀則小便數浮澀相摶大便則硬其脾為約麻仁半升白芍炒二兩紫朴薑汁炒枳實炒一兩三分杏仁炒二合大黃炒四兩共末蜜丸桐子大飲下十丸日三蜜膽導治大便祕澀服藥不通白蜜三合雄猪膽一枚膩粉研半分先將蜜入銅器中微火慢熬二十沸入膽汁將枇子不住手攪慢煎成膏入膩粉和丸如棗核大以薄綿包內下部中未通再用傷寒下利論曰傷寒下利者其種固多端然皆由表實裏虛寒熱溼氣乘虛客摶于腸胃之間故腸胃隨其所傷而下若傷寒則下青白傷熱則下黃赤寒熱相雜則赤白俱下若兼以溼毒則又下膿血如魚腦如爛肉也其候不同有下利而脈虛者有下利而脈實者有濕毒勝而腹痛者有熱氣盛而煩渴者有津液摶滯而腸垢者有屎燥結聚而妄言譫語者其要在審别虛實以治之白頭翁湯治傷寒下利飲水者內有熱也及熱利後重白頭翁五錢川連川柏秦皮三分水煎五錢空心服日二桃花湯治傷寒小陰病二三日至四五日腹痛小便不利下利不止及便膿血赤石脂四兩一半研一半不用研糯米二合半乾薑一分水一升煮薑米并不研石脂候米熟用汁一小鍾入石脂末一錢再沸溫服日三四逆湯治自利不渴者屬太陰以其臟有寒故也當溫之炙甘草一兩附子五錢乾薑炒三分水煎五錢溫服又治傷寒後下利清穀不止身疼痛急當救裏犀角湯治熱毒不解日晡莊熱腹痛純下鮮血犀角片芩川連茜根地榆一兩山枝五錢水煎五錢入薤白五寸溫服黃柏湯治下痢膿血川柏阿膠五錢川連一兩山枝一分水煎三錢食前服日二龍骨丸治臟腑虛冷下白膿腹痛龍骨乾薑附子一兩共末醋糊丸桐子大米飲下三十丸日二竹茹湯治利下血不止竹茹白芍子芩五錢木通三錢升麻黑木耳燒灰水煎三錢去滓入生地汁一合溫服傷寒陰毒論曰陰氣獨盛陽氣暴衰陽為陰所勝內外皆陰故成陰毒傷寒有初得病便成陰毒者有服藥經五六日不差變成陰毒者以病本屬陰因服寒藥過多或臟腑內外受寒陰氣轉盛陽氣不復所致其侯四肢逆冷臍復築痛身如被擊嘔吐下利其脉微細而疾陰毒甘草湯治傷寒初病一二日便結成陰毒或服藥後自變成陰毒身重背強腹中絞痛咽喉不利毒氣攻心心下堅強短氣不得息嘔逆唇青面黑四肢厥冷其脉沉細身如被杖五六日可治至七日不可治甘草升麻桂心川歸五錢川椒雄黃一分鱉甲炙兩半水煎五錢溫服日二氣壅喘悶方治陰毒手足厥冷或生斑㸃附子二枚火燒黑色出火毒為末用沉香磨水米飲下二錢正陽湯治傷寒陰毒唇青面黑張口出氣心下硬身不熱額上出汗煩渴不止舌黑多睡四肢逆冷附子甘草乾薑一兩皂莢一枚去皮子炙黃麝香一錢研共末水煎二錢稍熱服正陽丹治陰毒手足厥冷脉沉細面目青硫黃硝石太陰𤣥精石一兩同研入瓶內鹽泥封固陰乾火煆赤細研酒煮糊丸桐子大酒下二十丸附子回陽散治傷寒陰毒面青唇黑四肢逆冷臍腹痛身體如冰并一切卒暴冷氣附子二枚為末用生薑自然汁半鍾冷酒拌勻下三錢更以冷酒送下相次再服良久臍下如火遍身和暖為度傷寒陽毒論曰陽氣獨盛陰氣暴衰陰為陽所勝內外皆陽故名為陽毒傷寒有得病便成陽毒者有服藥經五六日不差變成陽毒者蓋以病本屬陽或以大劫發其汗或因炙􅌊陽氣轉盛陰氣內消所致其候面赤發躁狂走妄言或發斑如錦絞或咽喉疼痛或涕吐膿血或下痢黃赤其脉洪實滑促是其證也升麻湯治傷寒一二日便成陽毒或服藥吐下後變成陽毒腰背疼痛煩悶不安面赤狂言或見鬼神或下痢脉浮大數面赤斑紋如錦咽喉痛吐膿血五日可治七日不可治升麻犀角射干人參片芩甘草一兩水煎五錢溫服少頃又服取汗未汗再服枝子湯治陽毒壯熱百節疼痛枝子赤芍大青知母一兩石膏片芩杏仁炒二兩甘草五錢柴胡兩半薑棗水煎四錢入䜴百粒服黑奴丸治傷寒時行熱病六七日未得汗脉洪大或面赤目脹身大熱煩躁狂言欲走渴甚又五六日以上不解熱在胸中口噤不能言心下尚暖灌藥下咽即活兼治陽毒及發狂麥奴山麥未熟時中有不成者上有黑衣勃取下即名麥奴一兩麻黃去根節三兩大黃二兩片芩芒硝釡底煤竈突煤梁上塵各一兩共末蜜丸彈子大取新汲水化下一丸渴者與冷水盡量飲之須㬰當寒寒過汗出即差若服藥日移五尺不汗再服一丸差即止須微利下此藥須病人大渴倍常燥盛者乃可與之不爾不可與大青湯治陽毒煩躁不解或下利危困大青二兩犀角山枝甘草川連五錢秦芁一兩水煎五錢入豆百粒薤白七寸空心服犀角湯治傷寒陽毒初得身大熱目赤便黃心悶頭痛煩渴不止四肢疼痛語言錯亂眠臥多驚犀角一兩赤茯陳皮甘草麻黃細辛茵陳蒿五錢人參三分薑棗水煎五錢服傷寒發斑論曰傷寒發斑者陽盛故也其病在表或未經發汗或已經發汗未解或吐下後邪熱不除毒氣內盛因表虛熱毒乘虛出于皮膚發為斑疹如錦紋若色赤發在五六日內者可治色黑過七日乃發者難治甚則身體喉舌皆成瘡也黃芩湯治傷寒熱病十日內未得汗表裏有熱遂發斑㸃時或狂言目色黃心中煩熱大便不利片芩大青大黃升麻朴硝山枝一兩茵陳蒿一兩川連甘草五錢竹葉三七片水煎五錢服石膏湯治發黑斑石膏二兩研麻黃葛根一兩川連三分故鞋一隻去土細切川椒炒一分桂心五錢水煎五錢溫服取汗傷寒發黃論曰傷寒發黃之狀身體盡變黑黃或如橘色是也凡陽明中風太陽中溼皆令人發黃蓋由得病無汗小便不利寒溼不散則熱結脾胄腠理閉塞瘀熱之氣與宿榖相摶而鬱蒸不能消散故二便結澀不通令人身體面目皆變黃色其病腹滿身疼發熱若其人小腹滿急眼澀疼鼻骨痛兩膊及項强腰背急者是也但得小便快利漸愈仍不用大便多即令人心脹又有急黃者身體黃甚卒然而發心滿氣喘命在須㬰故名急黃有初得病便黃者初不知是黃死後方變黃者此病亦因脾胃瘀熱本天行時氣所作宜細辨之但發熱心戰者乃是發黃之候茵陳蒿湯治陽明發熱汗出此為越熱不得發黃也但頭汗出小便不利渴飲水漿此為瘀熱在裏身必發黃下之宜此湯又傷寒七八日身黃如橘皮小便不利腹微滿者宜此湯茵陳蒿六兩梔子十四枚大黃生三兩共為粗末水煎五錢三服後小便當利下如皂莢汁狀乃愈麻黃連翹湯治瘀熱在裏發黃麻黃去根節二兩連翹生薑焙二兩杏仁四十枚去皮尖炒生梓白皮東引一升大棗十二枚甘草一兩水煎五錢熱服梔子柏皮湯治傷寒身黃發熱梔子十五枚炒黃柏二兩甘草一兩水煎三錢抵當湯治傷寒太陽身黃脉沉細小腹鞭小便利者為無血也小便自利其人如狂者血諦證也水蛭三十枚炒虻蟲三十枚炒桃仁十枚炒去皮尖大黃三兩水煎三錢服龍膽湯治發黃煩熱皮肉皆黃小便赤不利龍膽枳殼山枝木通知母柴胡地骨皮白芍甘草麥冬升麻羚羊角一兩水煎五錢黃芩湯治傷寒發黃或先服利藥未差宜以內消以折熱氣片芩茵陳蒿升麻犀角一兩山枝柴胡龍膽草五錢水煎五錢入生地汁一合茅根湯治傷寒發黃通身如金色茅根山枝甘草茵陳蒿地骨皮一兩薑水煎五錢入䜴三七粒熱服枝子湯治傷寒急黃山枝柴胡朴硝另研茵陳蒿五錢水三大鍾煎二大鍾去渣入硝分三服取利茵陳蒿散治傷寒時氣急黃疼痛茵陳蒿片芩枝子大青一兩大黃朴硝五兩白蘚皮葛根升麻兩半共末新汲水下二錢得利差傷寒發豌豆瘡論曰傷寒熱毒內盛多發皰瘡者以病人表虛裏實故也裏實則毒氣不能內消表虛故乘虛發于肌肉而成瘡其瘡大小形如豌豆其包或白或赤若頭作瘭漿戴白膿者其毒則輕若紫黑色作根隱隱在肌肉裏者其毒則重甚者周匝遍身五內七竅皆有也參麻湯治傷寒熱病生豌豆瘡并皰瘡煩悶昏迷𤣥參升麻乾藍葉一兩甘草三分犀角鎊五錢水煎五錢入葱白三寸䜴一撮熱服日二豌豆瘡四邉赤腫胡荽一把生地二味搗取汁空心服盞許犀角湯治復寒熱毒氣盛瘡如豌豆犀角二兩麻黃川連兩半木香一兩水煎五錢日二內消散治傷寒熱病欲生豌豆瘡毒未出令不成京墨燒去烟一分用酒三合磨令頓服紫草湯治傷寒斑疹豆瘡紫草惡實荆芥穗一兩水煎三錢熱服日二傷寒發狂論曰重陽者狂謂陽氣獨盛也傷寒熱毒既盛內外皆熱則陽憤嗔而發為狂越使人狂走妄言或罵詈不避親疏或妄見妄聞棄衣而走登髙而歌或數日不食踰垣上屋蓋四肢諸陽之本熱盛而四肢實是為重陽故所上之處皆非素所能而病乃能也若乃因火為邪而發為驚狂及內有瘀血而外症如狂其為病雖不同然其為陽氣有餘則一也犀角湯治傷寒十數日頭戰掉大汗出恍惚狂走眼見鬼神犀角山枝五錢白芍生地麥冬茯神一兩茵陳蒿三分水煎五錢入竹葉二十一片食後服羚羊角湯治汗後熱毒未盡因有所驚狂言欲走羚角犀角防風片芩升麻𤣥參茯神五錢龍齒甘草一兩人參竹茹骨皮三分水煎五錢抵當湯治太陰病六七日表症仍在脉微沉反不結胸其人發狂者以熱在下焦少腹當滿小便自利者下血乃愈所以然者以太陽過經盡而瘀熱在裏故也水蛭十枚炒虻蟲十枚去翅足炒大黃酒浸炒一兩桃仁七枚炒水煎五錢服當下瘀血不下再服絳雪丸治傷寒發狂眼赤二便血出身如金色兼治六七日狂躁發熱硝石一兩丹砂一分研細粟米飯丸彈子大砂糖冷水下一丸服藥後便睡移時汗出為效傷寒剛痓論曰傷寒病發汗過多因致痓其狀令人搖頭發熱頸項强急惡寒背反張瘈瘲口噤謂之剛痓者特以無汗而反惡寒故也葛根湯治傷寒太陽病無汗小便反少氣上冲胸口噤搖頭欲作剛痓葛根四兩白芍麻黃去根節二兩甘草桂心二兩薑棗水煎五錢熱服取微汗大承氣湯治傷寒剛痓胸滿口噤臥不著席腳攣急必齘齒大黃四兩枳實一兩紫朴五錢水煎五錢去渣入芒硝五分二沸服羚角升麻湯治傷寒剛痓仰目壯熱筋脉不舒牙關緊急不欲見食羚角升麻白鮮皮龍齒五錢木通百合防風一分石膏一兩水煎五錢入豉百粒葱白五寸小續命湯治傷寒剛痓無汗惡寒口噤背强麻黃桂心甘草五錢白芍白术人參川芎附子防己防風一分半薑水煎五錢日三夜二傷寒柔痓論曰柔痓之狀搖頭發熱頸項强急腰身反張或瘈瘲口噤與剛痓同然謂之柔痓者特以其自汗不惡寒故也痓又謂之痙者蓋以痙一類古之時以强直名之桂枝加葛根湯治傷寒柔痓項背强几几反汗出惡風桂枝二兩葛根四兩麻黃白芍三兩甘草二兩薑棗水煎五錢取汗桂术湯治傷寒柔痓手足厥冷筋急汗不止桂心一兩白术人參附子三分甘草防風乾薑五錢水煎五錢日二五味子湯治柔痓汗出身體强直手足多寒五味炒一兩木香附子檳榔三兩白术甘草乾薑桂心五錢水煎五錢日二柴胡飲治柔痓四肢逆冷汗不止腹中痛筋脉急柴胡赤茯三分桂心良薑一分檳榔煨五味子炒五錢水煎五錢服傷寒壞病論曰傷寒太陽病三日已發汁吐下溫針仍不解者多變為壞病又陽病轉入少陽已吐下發汁少陽症罷此為壞症知犯何逆以法治之此由傷寒病在諸經絡發汁吐下而病症不除又感異氣有寒暑燥溼風不同病亦隨變故謂之壞病又有傷寒過經再受邪熱留蓄臟腑病候多變者及傷寒解後虛羸少氣餘症未除者皆謂之壞病知母麻黃湯治傷寒壞病差後或十日二十日終不惺惺精神昏語言亂又無寒熱醫作鬼祟或作風病多端治藥弗效或朝夕潮熱頰赤或似瘧由發汗未盡餘毒在心包絡間所致知母兩半白芍麻黃甘草片芩桂心五錢署月減半水煎五錢半日內可相次三服取汗末汗再服若心煩不眠欲飲水者稍稍與之令胃中和即愈黑奴丸治壞病頭與骨肉俱疼狂言妄語醫所不治麻黃片芩甘草芒硝竈突墨一兩䜴炒一合共末蜜丸彈子大新汲水下一丸考此丸與陽毒黑奴丸不同麥冬湯治傷寒壞病經久不差潮熱不退身體沉重昏憒煩悶麥冬赤茯甘草鱉甲醋炙一兩水煎三錢入烏梅肉一枚小麥五十粒溫服日二傷寒狐惑論曰狐惑之病初得狀似傷寒或因傷寒而變皆蟲症也蟲蝕其喉為狐使人聲嗄蟲蝕其下部為惑使人咽乾其候皆默默欲眠不得臥起居不得安惡飲食面目乍赤乍白乍黑是也由傷寒病腹內熱飲食少腸胃空虛而蟲為之不安故隨食上下部而病名狐惑也赤小豆當歸散治傷寒變成狐惑脉數無熱微煩默默欲卧汗出得之三四日眼赤得之七八日目四眥黑能食者膿已成也赤小豆一升浸洗川歸一兩共末水煎三錢溫服日二黃芩湯治傷寒不發汗變成狐惑脉數無熱微煩二目赤但欲眠睡咽乾不能食片芩射干一兩甘草竹茹知母前胡五錢川連炒三分水煎五錢日二黃連犀角湯治病後瘡出下部川連五錢犀角一兩木香一分鳥梅七枚水煎三錢日二木通湯治傷寒陰陽不和變成狐惑目如鳩赤面色斑紋如錦木通一兩甘草桂心細辛五錢吳茱莄洗炒三兩薑棗水煎五錢葱白五寸雄黃導氣湯治傷寒狐惑下部􅉶瘡雄黃研青葙子川連苦參五錢桃仁炒一分共末生艾汁和如棗大綿裹導下部扁蓄汁更好冬月無艾蓄用根撩膈湯治傷寒狐惑病在上焦苦參一兩甘草五錢作一服水煎五更服良久即吐薰洗四皮湯治狐惑攻下部肛內生瘡槐白皮柳白皮桑白皮桃白皮二兩水煎四兩薰洗下部檳榔丸治未汗變狐惑毒蝕肛門癢不止下膿血檳榔丹砂五錢麝香一錢杏仁四十九枚炒共末用飴糖和如棗核大先用椿根槐白皮各二兩水煎洗肛門將藥內之雄黃薰方治狐惑蟲食下部肛外如􅉶痛癢不止雄黃研五錢用瓶一箇口稍大者入灰半瓶灰上放火將黃末燒之候煙出坐瓶口上薰之良傷寒百合論曰傷寒百合者謂百脉一宗悉致其病也其狀欲食復不能食常默默欲得卧又不能臥欲出行又不能行食欲有時美亦有時不美如有寒又如無寒如有熱又如無熱口苦小便赤黃得藥則吐利者是也此由傷寒及大病後臟腑俱虛榮衛耗弱不能平復變成斯病然以百脉一宗悉致其病又無復經絡故其病症變異治之各隨其症百合雞子湯治傷寒病吐之後百合七枚雞子黃一枚水漬合一宿更水煎去渣入子黃攪服百合知母湯治傷寒已經汗後百合七枚知母一兩水浸百合一宿更水煎分二服百合滑石散治傷寒變發熱百合一兩滑石兩半共末空心飲下二錢日二百合地黃湯治傷寒不經汗吐下後病形如初百合七枚生地黃汁一鍾水煮百合取汁和生地汁溫服中病勿更服大便當如漆百合半夏湯治傷寒病不差不思食欲成勞百合二兩半夏人參赤茯川連炒知母一兩生地兩半薑水煎五錢日二百合紫苑湯治傷寒病似勞形狀如瘧百合二兩紫苑柴胡杏仁白茯半夏甘草薑水煎五錢日二傷寒陰陽易論曰凡傷寒大病後氣血未復若房事太早不特令病人勞復因爾染易男病傳女女病𫝊男由轉易然故名陰陽易其狀身體重少氣熱上冲胸頭重不能舉目昧四肢拘急若小腹急痛力弱著牀不能轉側舉動憑人不急治則死或經嵗月漸至羸困亦死枳實湯治傷寒勞復陰陽易枳實山枝一分䜴炒二合雄鼠糞十七粒炒水煎二服未效又服燒裩散治傷寒陰陽易身腫氣少小腹急陰中拘攣熱上冲胸頭重不欲舉眼目生花膝脛拘急女人中裩取對陰户者水洗燒灰研末女人病取男人者水服方寸匕日三服小便利陰頭腫愈立效湯治陰陽易身重小腹裏急陰頭微腫韭白一把雄鼠糞二十七枚炒水煎一日服汗出愈萎蕤湯治陰陽易氣冲心胸頭重不舉萎蕤一兩木香桂心三分荆芥穗五錢雄鼠糞二十七枚炒水煎五錢溫服日二二灰散治傷寒陰陽易手足指甲二十大片男病用女女病用男裩襠布水洗一片男病用女女病用男燒灰研末分三服酒下犀角湯治病未平復陰陽易壯熱頭痛鼻出血犀角竹茹丹參葛根一兩石羔三兩水煎五錢日二傷寒衄血論曰傷寒衄血者由熱氣藴甚血溢妄行蓋心生血肝藏之肺主氣鼻則通之心肝為熱邪所傷則血隨氣妄行所以從鼻出也人謂陽盛則衄者蓋陽盛則熱盛熱盛則宜衄蓋傷寒太陽症衄血乃解謂是故也至于陰病則不宜衄蓋陰症自無熱安得而衄故少陰病但厥無汗强發之必動其血或從口鼻耳目出者是謂下厥上竭為難治茅花湯治傷寒衄血不止茅花水煎濃汁溫服如無花以根代之黃連散治熱病鼻衄不止或兼吐血川連竹茹伏龍肝三分片芩一兩山枝甘草炙五錢薑棗水煎五錢入生地汁半合亂髮灰五分一沸食後服阿膠湯治衄不止此陽毒攻肺阿膠片芩一分葱白五寸熟艾五錢䜴四十九粒炒作二服水煎溫服入生地汁一合刺薊湯治傷寒衄血吐血心中堅硬一身疼痛四肢煩悶刺薊麥冬生地一兩竹茹紫蘇白茯苓五錢薑棗水煎五錢服黃土湯治衄血去五臟熱毒黃土竈中者白芍川歸片芩甘草川芎三分生地兩半桂心一分竹茹五錢水煎五錢服髮灰散血衄不止髮灰麝香同研極細新汲水下一錢又吹鼻中少許四生飲治衄血心胸煩悶生地汁三合生藕汁二合生薑汁半合白藥子一分生刺薊汁一合五共微溫分二服升麻湯治衄血不止頭痛壯熱升麻紫蘇白芍一兩青蒿犀角芒硝三分水煎三錢入生地汁一合生地汁飲治時疾壯熱頭疼血衄不止生地汁生藕汁生薑汁白生蜜各二合和勻分三服微煎食後臥服傷寒吐血論曰傷寒吐血者熱在陽經邪盛于表應汗而不汗熱毒入深結于五臟遂成瘀熱薰蒸于上焦血隨氣妄行并入胸中胃得血則滿悶氣逆故爾吐血也麥冬湯治傷寒頭疼手足煩熱吐血不止麥冬兩半生地片芩甘草吳藍茅根薺苨一兩水煎五錢入豆百粒黃連湯治吐血不止由心肺積熱血得熱即妄行川連炒兩半荷葉微炒一兩熟艾葉微炒五錢側柏葉微炙三分水煎五錢入生地汁一合溫服紫河車散治吐血煩躁紫河車瓦上炙三分朴硝甘草五錢蛤粉一分共末新汲水和沙糖下二錢日二夜一蜜汁方治傷寒病後餘毒不解心臟熱極吐血不止生藕汁生地黃惡實根汁刺薊根汁各二合生白蜜一合和勻頻頻溫服一二合傷寒瘀血論曰傷寒病在表當汗不邪邪無從出熱結在裏皆成瘀血然太陽病不解熱結膀胱其人如狂者少腹硬滿小便自利下血乃愈又陽明病其人喜忘者本有瘀血大便雖硬反易其色必黑或赤病人腹不滿反自言其滿者亦為瘀血在裏皆宜下之待瘀血得下即愈診其脉沉結者亦瘀血病也抵當湯治傷寒陽明症喜忘者必有蓄血所以然者本有瘀血故令善忘大便雖硬反易其色必黑水蛭三十枚炒虻蟲三十枚去翅足炒桃仁二十一枚去皮尖炒大黃炒一兩水煎五錢空心服不下更服桃仁承氣湯治太陽病不解熱結膀胱其人如狂血自下者愈其外不解者尚未可攻當先解其外外已解但少腹急結者乃可攻之桃仁十二枚炒大黃一兩桂枝甘草芒硝五錢水煎五錢去渣入硝再沸分三服芍藥地黃湯治傷寒病溫應發汗而不發內有蓄血衄血吐血不盡面色黃大便黑白芍三分地黃丹皮二兩犀角一兩水煎三錢入生地汁三合再沸服日二如發狂加黃芩一兩傷寒口舌生瘡論曰傷寒口舌生瘡此脾經受熱薰于口舌又或因冬時發汗吐利後重亡津液表裏俱虛熱勢不已毒氣攻于于上焦致口中糜爛生瘡升麻湯治口舌瘡赤爛升麻一兩麥冬三分丹皮甘草五錢水煎五錢入竹葉二十一片大棗二枚溫服日二苦酒湯治少陰病咽中生瘡語聲不出半夏十四枚雞子一枚去黃留白入苦酒于蛋中又以半夏入苦酒內以雞殼放剪刀環中安火上煮二沸少少含咽羚羊角湯治病後餘熱上冲口舌生瘡羚角射干麥冬三兩白芍木通蘆根三兩升痳兩半水煎五錢食後服傷寒舌腫脹論曰傷寒舌腫脹者病在三陰也太陰之脉連舌本散舌下少陰之脉循喉嚨挾舌本厥陰之脉循喉嚨之後又手少陰心經其氣通于舌凡此經絡為風熱所乘隨脉至舌熱氣留于血血氣壅澀故令舌腫脹疹其脉數急者是其候也升麻湯治熱病喉嚨閉寒連舌根腫痛熱氣聚于胸中升麻麥冬石膏一兩竹茹木通黃柏五錢朴硝二兩𤣥參前胡三分水煎五錢服犀角湯治脾肺虛熱毒氣壅塞喉咽連舌根腫痛犀角川歸白芷一兩升麻甘草杏仁射干五錢水煎五錢日二治心脾熱舌腫痛生地汁半斤生白蜜八兩慢火煎稠含化半匙日二三傷寒咽喉痛論曰傷寒咽喉痛者少陰受邪邪毒壅遏于上焦微則咽喉痛甚則痛而生瘡又傷寒過經邪熱內盛薰于上焦亦令人咽喉痛各隨症治甘草湯治傷寒少陰二三日咽痛炙甘草二兩水煎空心分作四服桔梗湯前服甘草湯不差者服之桔梗炒五錢炙甘草一兩水煎分二服苦酒湯治少陰咽痛生瘡不能言語聲不出半夏十四枚洗七次雞子一枚將雞子去黃用白和苦酒半夏復入蛋中安火上令三四沸少少咽之不差再服半夏湯治少陰咽中痛半夏桂心甘草一兩水煎放冷少少咽之地黃煎治時氣肺熱咳嗽咽痛地黃汁半斤白芍𤣥參升麻貝母三分麥冬柴胡竹葉一兩白蜜五兩水五大鍾煎去渣入蜜汁慢煎日三傷寒毒攻手足論曰傷寒毒攻手足者熱勝則腫也熱毒之氣客于腑臟邪結在裏循經而出注于四肢故令人手足煩熱赤腫疼痛也連翹湯治毒氣攻手足腫滿疼痛心神煩悶連翹麥冬犀角片芩枳殼川歸一兩大黃炒木香防風羌活惡實五錢射香一錢共末水煎服又方治毒氣攻手足虛腫疼痛欲死蒼耳子五把搗爛絞取汁漬洗手足鉊丹膏治毒氣攻冲手足虛腫鉊丹五兩飛過明松香乳香炙去油黃蠟一兩麝香一分叧研先將松香煉化次入黃蠟化去渣入鉛丹乳末慢煎成膏入麝香攪勻候冷用絹攤貼腫處凡一切腫毒并宜貼此膏傷寒後夾勞論曰傷寒差後復夾勞者由病人先有風疹因汗下之後榮衛虛弱氣不充足形體羸瘦時有盜汗寒熱不常喘嗽痰唾鼻中臭氣飲食不消肢體痠痛面黃頰赤不即治之則致危殆人參湯治夾勞骨節疼痛渾身壯熱氣力虛乏人參白茯白术白芍桔梗大茴香紫苑一兩柴胡陳皮蒼术羌活二兩甘草兩半秦芁三分共粗末薑棗水煎二錢不拘時溫服黃芪鱉甲湯治傷寒病差後夾勞形體羸瘠或寒或熱病如瘧狀四肢煩疼等症鱉甲黃茋一兩白术甘草陳皮三分知母桑白皮五錢葱白薑水煎五錢食後服柴胡湯治夾勞五心煩熱背膊痠痛手足無力不能飲食柴胡黃芪鱉甲赤茯一兩秦芁枳殼去白炒地骨皮片芩葛根五錢人參甘草三分薑水煎三錢服人參鱉甲湯治傷寒差後夾勞寒熱往來進退不時頭疼體痛口苦咽乾不思飲食人參鱉甲附子柴胡一兩白芍知母烏梅肉炒五味桃仁炒桂心陳皮羌活秦芁川歸五錢薑水煎三錢溫服傷寒後勞復論曰內經謂熱病少愈食肉則復多食則遺此其禁也蓋傷寒病新差後脾胃尚虛氣血尢弱榖氣未復津液未通若將養失宜輒嗜肉食則脾虛不能消釋或因勞形于事皆令邪熱乘虛還入經絡復成大病故名勞復當隨其症候或表或裏依法治之知母湯治新差後勞動用力或飢食過傷勞復知母鱉甲柴胡兩半麻黃葛根三分雄鼠糞炒焦五七枚水煎五錢入豆百粒葱白五寸食後溫服喫葱粥取汗石膏黃芩散治食肉勞復如初壯熱頭痛心煩欲吐小便赤黃石膏一兩片芩山枝人參川連知母葛根五錢共末葱白竹葉湯下二錢空心服日二以差為度知母湯治勞復小腹硬卵縮疼痛欲死知母柴胡麥冬甘草半分葱白三莖水浸一宿煎至小半入童便二盞䜴心半合再煎五六沸入地黃汁二合更煎微沸空心頓服微利即差傷寒後骨節煩疼論曰傷寒後骨節煩疼者由津液不足血脉皆虛餘毒客于經絡榮衛澀滯于骨節之間故今骨節煩疼診三部脉細而遲澀者乃其候也柴胡飲治傷寒病後骨節疼痛咳嗽不能食口舌乾燥乍寒乍熱唇口生瘡柴胡升麻人參白芍茯神百合地骨皮片芩麥冬犀角五錢鱉甲石膏一兩甘草一分水煎五錢入竹葉生薑食後服日二百合湯治差後四肢煩熱骨節疼痛百合知母鱉甲柴胡葛根桑白皮一兩水煎五錢入生地汁一合食後服日食羌活湯治傷寒病差後下焦風虛骨髓痠痛腰腳頑痺不仁不能久立日漸消瘦羌活防風丹參白芍棗仁牛膝五加皮𤣥參木通川歸檳榔麻黃獨活五錢黃茋桂心三分薑水煎五錢空心服日二傷寒後虛煩論曰傷寒病後煩躁者有虛煩有榖煩陽氣偏多謂之虛煩病差後食榖太早新虛不勝榖氣胃內蒸熱謂之榖煩若陰陽和調則虛煩自己損其榖食則榖煩者差竹葉湯治傷寒後虛煩狀似傷寒病但身不疼痛不惡寒內外皆不可攻者淡葉葉半把石膏四兩人參甘草五錢麥冬二兩半夏薑汁製三分生薑水煎三錢入粳米百餘粒溫服梔子䜴湯治傷寒汗後虛煩不得眠劇者必反覆顛倒心中懊憹又治傷寒發汗若下之虛煩心中窒痛又治下利後更煩按之心下軟為虛煩山梔十四枚去皮炒䜴四合水煎三錢不拘時服日二五苓散治傷寒中風發熱六七日不解心煩躁悶有表裏症具渴欲飲水水入內即吐名曰水逆猪苓赤茯白术三分桂心五錢澤㵼一兩共末湯下二錢猪苓湯治少陰病下利六七日咳而渴嘔而煩不得眠猪苓赤茯阿膠滑石澤瀉一兩水煎三錢溫服麥冬湯治傷寒病後餘熱不解或寒或熱四肢瘦弱虛乏飲食不入胸中煩滿悶虛躁等症麥冬赤茯人參白术黃茋陳皮地骨皮一兩甘草桂心五錢水煎三錢溫服六神湯治病後虛煩不安人參黃茋白茯山藥百合防風二兩薑棗水煎五錢不拘時服日二傷寒後盜汗論曰汗者心之液傷寒差後眠寢有汗者由心氣偏虛榮衛不足腠疏表弱因寢寐之間汗出故名盜汗久不已日漸羸瘐肢體痿弱人參湯治傷寒病後體氣虛弱夜臥汗出不止頭旋惡心日漸羸瘐不思飲食人參半夏黃茋麻黃根一兩牡蠣火煆章便淬三次二兩防風三兩生薑水煎五錢溫服杜仲湯治病後虛弱夜多盜汗杜仲二兩人參甘草三分白术黃芪白茯白芍炒蓯蓉一兩牡蠣麻黃根兩半水煎五錢溫服白木散治盜汗不止白术二兩陳壁土炒為末菖蒲湯下二錢不計時服粉汗方治病後盜汗腠理開疏牡蠣燒紅童便淬八兩麻黃根水洗焙一兩共末寢寐中有汗使人𫝊之傷寒後驚悸論曰傷寒後心氣不足風邪乘之則令人精神不寧恍愡驚悸由於憂忍思慮致心氣虛邪氣內乘故神氣不得泰定而生驚悸也前胡湯治伏熱在心怔忡驚悸前胡茯神人參一兩逺志兩半丹砂甘草一分薑棗水煎服人參茯神湯治心虛驚悸恍惚不寧人參茯神一兩陳皮三分杏仁去皮尖炒一分生薑水煎三錢服茯神丸治心力勞倦四肢羸弱心忪驚悸吸吸短氣補虛茯神麥冬熟地一兩人參丹皮黃茋三分澤瀉甘草牛膝桂心五錢共末蜜丸桐子大食前酒下二十丸傷寒後失音不語論曰傷寒後失音不語由風寒客于㑹厭㑹厭為音聲之尸邪氣傷之故卒然無音又肺主聲而通于氣人之五臟有五聲皆禀氣而通之若邪客于肺則氣道不調亦令人語無聲音當隨其輕重治之杏仁煎治暴嗽失音語不出杏仁炒研二兩百合木通五味貝母紫苑桑白皮一兩薑汁五錢白蜜沙糖四兩水五大鍾煎六味去渣下杏仁薑汁蜜糖沙糖微煎收如餳樣收貯水煎半匙不拘時服豆竹湯治失音不語黑豆半升青竹去節如算大四十九莖每莖長四寸洗淨用水五大碗同豆煮熟為度溫服三服羚羊角散治失音不知人口眼不正舌强羚羊角一兩麻黃去根節石膏五錢片芩防風麥冬升麻乾葛三分水煎五錢溫服日二二瀝湯治失音不語竹瀝用緑竹去節火燒取瀝荆瀝同上梨汁二合陳醬汁半合各濾過和勻分四服早晚用桂心湯治邪氣傷肺失音不語桂心二兩石菖蒲一兩水煎三錢溫服取微汗未退再服芥子酒尉方治肺中風冷失音不語白芥子五合洗乾研用白酒三鍾煮令半熟以布帶熱包裹令人尉頭項周遍冷則易之傷寒後咽喉閉塞不通論曰咽喉閉塞不通者脾肺壅滯風毒藴積內摶經絡上攻咽喉也足太陰之脉上膈夾咽而喉則肺氣之所通故脾肺壅熱則咽喉閉塞凡傷寒後餘毒未盡上攻喉喉故亦令閉塞不通黃苓湯治咽喉瘡痛口瘡煩躁頭痛毒氣上攻黃芩大青山枝甘草五錢升麻麥冬一兩水煎三錢入竹葉食後服日三升麻湯同升麻木通一兩白芍射干羚羊角五錢蘆根一握水煎三錢食後溫服葛根湯治傷寒後咽喉疼痛葛根竹茹一兩倉粳米一合生薑大棗水煎三錢食後服貼喉膏治喉痛舌强邪熱上攻白蜜半斤甘草二兩猪脂四兩以脂蜜煉化入甘草煎赤黑色濾去渣收貯頻取半匙含化射干煎治咽喉痛閉塞不通射干研朱半斤猪板脂一斤切先煎脂化盡下干熬黑色濾過再熬成煎收貯綿裹彈子大含化又方熱病後喉痛閉塞不通毒氣上攻腫病黃明膠如掌大一片用水煮軟貼頸外差傷寒後變成瘧論曰傷寒後變成瘧者因病差後外邪未散其臟尚虛因為勞事致二氣交爭陰勝則振寒陽勝則發熱陰陽更勝則往來寒熱休作有時也一日再發者得汗必解若傷寒八九日得之熱多寒少其人不嘔清便自調者欲自愈也或陽明症煩熱汗出日晡所發熱者脉浮宜解表脉實宜攻裏又婦人熱入血室發熱而更作寒者當詳辨之升麻前胡湯治變成瘧寒熱躁渴升麻前胡兩半白芍知母三分木通朴硝烏梅肉山梔五錢甘草炙一兩生薑大棗水煎五錢去滓入生地汗二合煎二三沸食後服日二黃芩鱉甲湯治傷寒後變成勞瘧久不差片芩柴胡山梔烏梅肉炒五錢鱉甲醋炙一兩甘草一分生薑大棗柳枝尖七枚大䜴半合藥五錢入童便同浸一宿次早五更煎減半去滓入生地汁一合沸服茯苓飲治寒熱不退變成瘧赤茯鱉甲地骨皮二兩知母紫胡兩半枳殼去白炒一兩水煎五錢去滓入生地汁一合再沸食後良久服如人行五六里再服傷寒後腳氣論曰傷寒後腳氣者緣其人腎經本虛風溼毒氣乘虛客入腎腎主腰腳故邪氣沉滯則腳弱而痛雖傷寒已差邪熱未盡風溼毒氣與熱相摶上冲于心肺其狀令人心胸煩滿上氣息急甚者致死疹左尺脉洪而數者腳氣也服藥後脉沉而緩者愈羚羊角湯治腳氣上冲心膈煩悶羚羊角白茯一兩片芩半夏薑汁炒陳皮去白炒吳茱茰洗炒檳榔五錢生薑水煎五錢空心服紫蘇木香湯治腳氣冲心心神煩亂嘔逆减食腳膝痠疼紫蘇白芍沉香木通一兩木香赤茯五錢吳茱茰洗炒檳榔陳皮薑水煎三錢食前服赤小豆湯治腳膝腫滿氣急大便祕澀赤小豆半合桑白皮檳榔五錢紫蘇一兩水五鍾薑一分煎减半空心分二服吳茱茰散治腳氣心腹妨悶脹痛坐臥不安吳茱茰洗炒一分木香川歸檳榔郁李仁炒三分水煎三錢空心溫服日二傷寒後利下膿血論曰傷寒後變成膿血利者因本病差後熱毒未散乘虛客于腸胃之間與津液相摶故下利膿血毒氣盛則臟熱而痛兼以溼氣加之則所下如魚腦或如爛肉雞鴨肝之屬寒未解陰病下利便膿血者亦溼熱相摶故也地榆湯治熱毒不解日晚壯熱腹痛下利膿血地榆川連片芩犀角茜根一兩山梔五錢水煎三錢入薤白二寸不拘時服桃花湯治傷寒少陰病二三日至四五日腹痛小便不利下利膿血不止赤石脂四兩乾薑炒一分糯米二合半水煎五錢溫三服得愈止黃連湯治熱病差後下利膿血不止川連阿膠一兩片芩三分梔子一分水煎三錢空心服日二赤石脂湯治下利膿血腹痛不止赤石脂黑乾薑附子川歸五錢白芍一兩水煎五錢空心溫服日二傷寒後慝瘡論曰傷寒後􅉶瘡者因腹中有熱其人少食胃中空虛三蟲須食或食五臟或食下部隱僻有瘡故名􅉶瘡其候齒無色舌上盡白四肢沉重忽忽喜眠甚則唇裏有瘡其瘡在上唇裏如粟米心內懊憹痛者此蟲食五臟之症若下唇裏有瘡其人喜眠者此蟲食下部之症若肛爛見五臟者死故名曰􅉶瘡桃仁湯治傷寒後􅉶瘡桃仁去皮尖炒槐角子炒熟艾一兩大棗十五枚水煎分三服槐角子丸治溼􅉶蟲食下部心中煩懊槐角子炒苦參一兩乾漆炒三分木香檳榔一兩桃仁去皮尖炒二兩熊膽五錢共末蜜丸桐子大空心荆芥湯下二三十丸羚羊角散治心中煩躁唇口生瘡蟲食下部羚羊角黃茋𤣥參紫胡三分草龍膽升麻五錢共末用槐角子湯空心下二錢日二雄黃散治􅉶蟲雄黃醋研一分川連苦參青葙子兩半桃仁去皮尖炒研三分共末空心飲下一錢五分􅉶在下部以綿裹少許內之桃皮湯治蟲食下部桃白皮棐實槐角子一兩石榴根皮五錢大棗水煎五錢空心溫服日二以差為度天行下部􅉶瘡烏梅肉五錢搗獨蒜一枚搗屋塵三合研用苦酒一升于銅器中共煎候可丸即丸如棗核大內下部中少頃易之差傷寒不究心仲景則變證不知雜證不識今總録中變證備載仲景祖方一無遺漏按方療治神明在人矣本家藏發明仲景傷寒書自郭白雲龎安常成無已後約五十餘家節菴非仲景衣鉢不與焉行將欹劂傷寒集注公諸宇內則學有淵源方有祖法為醫家大宗匠此余之所厚望於來學也康熙辛酉花朝靜觀居士程林識於維揚三一齊中辟瘟疫令不相𫝊染論曰凡時行瘟疫皆四時不正之氣感而病者長少大率相似此病苟不辟多致𫝊染宜方術預防敗龜板湯治辟時行瘟疫令不相𫝊染敗龜板酥炙五錢山梔大青白芍羚羊角馬牙硝紫苑前胡一兩水煎五錢空心溫服日二蒼耳子散宜預先服之辟瘴疫時氣蒼耳子午日乾三兩為末空心井華水下二錢又方蕪青不拘多少水洗淨搗取汁立春後值庚子日合家大小宜溫服一二鍾則永除瘟疫之患塗𫝊方辟瘟疫時氣雄黃一兩丹砂鬼臼石菖蒲一兩共末井水調和塗五心及額上鼻中耳門辟瘟甚驗調中丸治四時疫癘非時之氣大黃炒五兩麻仁研一兩枳殼炒白茯苓白芍藥前胡片芩一兩共末蜜丸梧桐子大空心飲下二十丸微利臥服佳聖濟總録纂要卷四
