body:
  text: 聖濟總録纂要卷十四休寧程林纂骨蒸𫝊尸門虛勞五蒸骨蒸肺痿𫝊尸骨蒸𫝊尸勞虛勞五蒸論曰虛勞骨蒸者本熱勞之氣熱著氣血深連骨髓侵受五臟久而不已各隨其臟氣之虛熏蒸而為疾骨蒸本于腎其證早涼晚熱煩躁寢不安飲食無味小便色赤喘息無力腰疼腳冷手心常熱蒸盛之時內變為疳蝕人五臟脉蒸者本於心其證日增煩悶擲手出足渴欲飲水唾白沫睡語驚恐脉數蒸盛之時亦變為疳臍下悶或暴下不止皮蒸者本於肺其證大喘鼻乾口燥舌上白胎小便如血蒸盛之時胸滿兩脅下脹背胛疼臥不安咳嗽毒傷臟則唾血肉蒸者本於脾其證體熱如火煩躁無汗心腹膨脹食即欲嘔小便如血大便祕澀蒸盛之時身腫日赤臥不安肝蒸者肝氣虛也肝虛則血無所藏血無所藏肝亦無所養使榮氣痼竭虛陽內蓄其證外寒內熱亦名內蒸按之附骨即內熱甚骨肉自消飲食無味皮燥不澤蒸盛之時目暗妄怒時驚四肢漸細足趺腫起凡此五蒸與熱勞之病大同小異其治法有不同者蓋蒸病內著骨髓蒸發皮膚也昔人論蒸有二十三證細而推之臟腑之病變態多端皆在於虛不必拘之猪肚黃茋丸方治骨蒸虛勞𫝊尸肺痿咳嗽不止困重羸瘦飲食無味頭痛口乾涕唾稠黏渴不止者獖猪肚一具以童子小便煮令熱細切焙乾搗為末知母銼焙蕪荑仁炒各二兩紫苑去苗大黃炒檳榔煨蒼术米泔浸焙鱉甲去裙襴醋炙百部地骨皮黃芩去黑心桔梗貝母柴胡白茯苓黃連龍膽人參黃茋各一兩右十九味搗羅為末鍊蜜丸梧子大每服空腹溫酒下二十丸地骨皮湯方治五蒸地骨皮白茯苓麥門冬柴胡各一兩半赤芍藥甘草炙令赤各一兩右六味搗篩每服五錢水煎食後分溫二服茯苓湯方治心蒸苦心驚悚栗男子因讀書損心氣傷思慮損心吐血心煩多忘失精神或身體瘙癢風癬或胸中氣滿白茯苓麥門冬款冬花獨活檳榔各六兩桂防風防己各五兩甘草炙枳殼四兩地骨皮去土十兩右十一味銼如麻豆大每服五錢以水二盞先煎山澤銀取水一盞半入藥并生薑半分切大棗三枚擘破同煎溫服早晨日晚各一麥門冬飲方治心蒸心中煩躁手足熱疼欲露其體驚悸怵惕咽乾虛渴面色萎黃失前忘後婦人血氣衰弱多𫝊此疾麥門冬二兩白茯苓人參龍齒遠志各三兩甘草炙一兩防風地骨皮各三兩羚羊角鎊末一兩共九味銼如麻豆大每用五錢以水二盞入山澤銀一分棗二枚同煎取一盞分溫二服若大患煩熱渴燥者入淡竹瀝一合煎服若曾經吐血亦治餘如上法一劑無不差鱉甲湯方治男子女人骨蒸熱勞皮肉消瘦面痿黃不思飲食夜多咳嗽涕唾稠黏骨節疼痛憎寒壯熱心腹氣脹坐臥不安發如瘧狀女人血風勞等疾鱉甲去裙襴醋炙令黃三兩秦芃二兩紫苑一兩半柴胡三兩訶梨勒皮煨一兩半牡蠣麻黃去根節犀角知母升麻甘草炙梔子仁檳榔銼木香當歸桔梗大黃炒桑根白皮銼黃連桃仁炒人參桂萎蕤芎藭各一兩右二十四味搗篩每服三錢棗一枚烏梅一箇生薑三片同煎熱服鱉甲湯方治虛勞骨蒸肌瘦盜汗潮熱咳嗽或即吐血肢體倦怠飲食不下及室女勞熱經血不行時發潮熱煩燥虛渴鱉甲九肋大者一枚浸一宿去裙襴脊骨更蘸醋炙令赤用二兩半人參柴胡各二兩白茯苓地骨皮枳殼生乾地黃牡丹百部芍藥牛膝貝母黃苓栝蔞根當歸山梔仁桔梗陳橘皮麥門冬天門冬紫苑白术桂去粗皮桑白皮檳榔各三分大黃甘草炙各半兩京三稜一兩五錢草豆蔲五枚去皮天靈蓋酥炙黃一兩共三十味搗為粗末每服五錢生薑半分棗三枚同煎稍熱服空心臨臥服按方中勞證用天靈蓋甚多此物人所不忍其意為𫝊尸殺蟲也今擇其方可用者亦備一二餘俱不取鱉甲豬肚丸方治骨蒸脣紅頰赤氣粗口乾遍身腫熱或多虛汗大腸祕澀小便赤黃飲食全少鱉甲去裙襴醋炙柴胡木香青蒿生乾地黃各一兩黃連二兩青橘皮去白半兩共七味搗羅為末用猪肚一枚去脂膜淨洗入藥末在內繫定蒸令爛熟入臼杵千百下為丸如菉豆大每服十五丸溫水下食前日午臨臥各一服紫雪方治骨蒸癘疾瘟疫寒熱瘧病五尸五注心腹絞刺蠱毒魅鬼一切熱毒腳氣悶亂攻衝煩熱口中生瘡狂陽呌走及解諸毒兼金石草藥熱毒發黃疸熱疼痛一切熱病方與和劑局方略不同原方黃金一百兩金十五兩銀十五兩寒水石石膏磁石滑石各三斤右四石藥同搗碎後以金銀共六味一處以水一石煮取一斗去金銀并石滓入後藥味木香一兩犀角五兩丁香四兩沉香五兩甘草炙升麻𤣥參各一斤右七味除前六味外用水三斗煮取一斗絞去滓淨與前藥汁相和即內芒消五升細研入藥汁漫火同煎手不住攪之可有一斗餘即投入盆器內盛欲凝內水飛丹砂未三兩麝香末一兩一分同砂如粉麵和勻蓋覆之二日成霜雪矣暴乾以新盒或缶內密封盛貯之有病即取强人服一錢冷水和服以意隨人强弱增損之腳氣病或增服石藥發動毒悶者服之水和半錢如神凡服訖即仰臥以物搘腰令髙使藥向胸府間若患眼赤及熱痛者以冷水和之㸃眼大小􅗃初著微痛少時淚出自定日三五次用夜亦如之即無不效口內生熱瘡含如杏核許令消痛止按局方有硝石即火硝也藥品有追魂之妙深於𤣥理者知之骨蒸肺痿論曰骨蒸肺痿者由榮衛虛損藴熱熏蒸上焦傳播胸膜使人肺熱葉焦發為肺痿其證咯唾膿血胸滿短氣咳嗽咽痛寒熱往來不能飲食是也秦芃扶羸湯治肺痿骨蒸已成勞嗽或寒或熱聲啞不出體虛自汗四肢怠惰軟柴胡二錢人參鱉甲醋炙秦芃當歸紫苑半夏各一錢地骨皮一錢半甘草五分右用水二鍾薑三片烏梅大棗各一枚煎七分食後服如熱甚者加青蒿汗多者加黃茋去半夏生薑二味人參飬榮湯治肺痿咳嗽有痰午後熱并聲嘶者人參去蘆阿膠蛤粉炒貝母杏仁桔梗茯苓桑皮枳實甘草己上各一錢柴胡二錢五味子十二粒右水二鍾生薑三片棗二枚煎至一鍾食遠服保和湯治骨蒸久嗽肺熱成痿知母貝母天門冬去心麥門冬去心款冬花各一錢天花粉薏苡仁炒杏仁去皮尖炒各五分五味子十二粒馬兜鈴紫苑桔梗百合阿膠蛤粉炒當歸百部各六分粉草炙紫蘇薄荷各四分右水二鍾薑三片煎七分入飴糖一匙食後服吐血或痰帶血加炒蒲黃生地黃小薊痰多加橘紅茯苓婁仁喘去紫蘇薄荷加蘇子桑皮陳皮知母茯苓湯治肺痿喘嗽往來寒熱自汗知母白术各八分茯苓去皮五味子人參阿膠各五分欵冬花桔梗麥門冬黃芩各七分半夏湯泡七次柴胡甘草炙各一錢薄荷川芎各五分右水二鍾薑五片煎至一鍾食後服𫝊尸骨蒸論曰𫝊尸骨蒸有十二種二十二種三十六種或九十九種之異其病皆起於骨蒸內熱或五臟次苐相𫝊而成皆令人寒熱盜汗夢與鬼交遺精白濁髮乾而聳或腹內有塊或腦後有小結復連數箇或聚或散沉沉默默咳嗽痰涎或咯膿血如肺痿肺癰狀或下利羸瘦自汗盜汗目昏耳鳴飲食無味口內生瘡心煩腰痛五心煩熱朝輕夕重纍年積月以至於死死復𫝊注親屬乃至滅門者是也五癆麝香散治男子婦人𫝊尸骨蒸實熱天靈蓋麝香甘草東引桃枝東引栁枝石榴皮各一握青蒿犀角半兩阿魏柴胡各一兩葱白薤白各七莖右十一味除麝香外銼碎同用童子小便二升半浸一宿别入檳榔末三錢同煎至一升半去滓分溫三服男病女煎女病男煎勿令孕婦六畜見初服訖如人行五里又進一服恐惡心可含白梅病在上即吐在下即瀉出各惡物如蟲類及頭髮馬尾狀兼身如蟻行瀉後以葱粥及軟飲補之仍服後方茯神湯調和五臟避風一月若遠年重病不過兩劑其吐下蟲腹紅色可治黑者或差或否白色者不可治也茯神湯方治𫝊尸骨蒸先服麝香散取蟲後服此方補五臟茯神人參遠志甘草炙陳橘皮當歸龍齒熟乾地黃各一兩五味子麥門冬桂各一兩半黃茋二兩右十二味每服五錢入棗七枚生薑五片同煎空心溫服日三珍珠丸方治𫝊尸骨蒸咳嗽上氣痰喘寒熱四肢瘦弱珍珠末獺肝茯神貝母柴胡龍膽黃連芍藥各一兩半白檳榔煨旋復花各一兩右十味搗羅為末鍊蜜和丸如梧桐子大每服十五丸食後溫水下日再黑虎丸方乾蝦蟆一枚頭足分為兩段一半生一半酥炙黃蛤蚧一對各取一半并去頭泥塗酥炙黃盧㑹研天靈蓋酥炙雄黃研白狗糞炒黃麝香研各一分烏驢蹄炙乾二兩乳香一兩半猪膽一枚取汁于碗中慢火煨如膏和藥右十味搗研九味為末合勻細以猪膽膏同粟米飯為丸如梧桐子大先吃熱麵一碗次以茅根香水沐浴次以沙糖麝香少許調冷水一盞投藥一丸於星月下浸一宿平旦空腹服之厚被蓋臥應是𫝊尸冷勞者脊骨中出白蟲或出赤蟲若骨蒸則汗出腰腳疼痛不遂腳下出汗如膠漆諸風氣水病並服一粒若小兒無辜可服半粒如前法有蟲出鼻內如線狀是效烏雞丸方治𫝊尸勞尸注骨蒸眼目昏澀面色青黑咽喉噎塞痰涕咳嗽或痃癖攻刺疼痛胸膈滿悶時或恚怒或多感傷情思不樂夢寐虛驚精藏滑泄失血憎寒潮熱盜汗肩背拘急腰膂肢節煩疼四肢少力不喜飲食小便黃色大便不通乍進乍退服取蟲藥後宜服此黃連附子去皮臍各二兩柴胡白附子當歸秦芃槐膠甘草炙蓯蓉酒浸切焙續斷遠志巴㦸天各一兩乳香陳橘皮雄黃研丹砂研各半兩丁香乾薑炮各一分右十八味搗研極細先養雄烏雞一隻以雄黃三兩為末分作三十分每日拌飯餵月日用大麻子一升餵盡宰治去毛及嘴爪并腸肚留心肝將前藥末入在雞腹內以麻線纒定再用無灰酒一斗銀器石鍋內用文武火煮令雞熟取出除去粗骨將雞并腸內藥同細研更將雞骨焙乾搗羅為末同研藥和入臼中杵千百下丸如梧桐子大每服二十丸以暖酒吞下空心日午臨臥各一服𫝊尸勞論曰𫝊尸勞者骨蒸之病流𫝊五臟也其證殗殜半臥半起旦即醒然午後微熱情常不悅心多驚悸夜即盜汗夢與鬼交兩頰紅赤唇如血色睡不得臥欲食不能食或喘急咳嗽心胸滿悶背髆煩疼兩目精明四肢無力脊膂拘急膝脛痠疼兩肋虛脹時或微利鼻乾口燥漸至尫羸雖死在須臾精神尚爽是其候也治之若緩猶如水涸不覺其死蘇合香丸方治肺痿客忤鬼氣𫝊尸伏連殗殜及卒得心痛霍亂吐利時氣諸瘧瘀血月閉痃癖水腫驚邪氣狐魅瘴癘諸疾蘇合香白术丹砂沉香訶梨勒肉丁香木香莎草根白檀香乳香蓽撥犀角鎊安息香各一兩麝香研龍腦研各半兩右十五味搗研為末鍊蜜和丸如雞頭實大每服一丸溫酒或人參湯嚼下一名白术九此藥大能安氣血卻外邪凡疾自內作不曉其名者服此往往得效雖治氣注氣厥氣逆氣不和吐利榮衛阻塞尤有神功人家不可無此藥以備急難辟疫尤驗倉卒求人參不得白湯亦可勿用酒古方雖云用酒酒下口多不效昔有人病瘵日漸羸消至於骨立肌熱盜汗勞狀皆具凡服八九兩所苦都差一方用牛黃半兩古方本無乃後人加之諸疝門寒疝心疝厥疝寒疝心腹痛七疝蠱病寒疝論曰寒疝為病隂冷內積衛氣不行結於腹內故遇寒則發其狀惡寒不欲食手足逆冷繞臍痛白汗出蓬莪茂湯方治寒疝四肢逆冷氣弱汗出蓬莪茂一兩乾薑半兩附子去皮臍一兩芎藭三分桂一兩白术三分檳榔一兩芍藥一兩共八味銼如麻豆每服三錢水煎溫服不拘時人參湯治寒疝冷痛氣弱汗自出不欲食人參白茯苓各一兩蜀椒去目炒乾薑各半兩附子去皮臍檳榔青橘皮湯浸去白白术各一兩右八味銼如麻豆每服三錢水煎溫服不拘時烏頭湯治寒疝滿逆手足不溫遍身疼痛烏頭大者五枚去皮尖生用白蜜一斤桂心二兩三味先以慢煎蜜及烏頭候蜜减半去烏頭别就一處以水三盞煮桂候减半濾去桂將桂汁共和别煎取二盞許服時每用半盞溫服未知再服其知如醉狀得吐為中病也髙良薑湯治寒疝卒痛積聚不散上衝心胸與隂相引痛則汗出髙良薑檳榔木香當歸各一兩半吳茱茰炒一兩右五味搗篩每服三錢水煎溫服心疝論曰內經謂診得心脉而急病名心疝小腹當有形也心為牡臟小腸為之使故曰小腹當有形也臟病必𫝊于腑今心不受邪病𫝊于腑故小腸受之為疝而痛小腹當有形也世之醫者以疝為寒溼之疾不知心氣之厥亦能為心疝心疝者當兼心氣以治之當歸湯治心疝心痛虛冷煩悶當歸乾薑赤芍藥黃茋蜀椒去目人參半夏為末薑汁作餅子焙乾附子去皮臍青橘皮去白甘草炙各一兩厚朴薑汁炙二兩桂心半兩右十二味㕮咀如麻豆每服三錢水煎溫服不拘時候牡丹丸治心疝心痛如錐所刺牡丹皮桂心芍藥烏頭去皮臍細辛甘草炙木香吳茱茰湯浸焙乾檳榔各一兩右九味搗羅為末鍊蜜為丸梧桐子大每服二十丸溫酒下不拘時蓬莪茂煮散治心疝心痛肢體虛冷蓬莪茂檳榔附子甘草炙桂心各一兩胡椒半兩芎藭白术各三分八味搗羅為散每服二錢水煎溫服橘皮益智湯治痼冷在內隂氣交攻心痛如刺青橘皮去白益智去皮烏頭去皮臍威靈􅋖各一兩去土右四味銼如麻豆每服三錢生薑三片鹽少許同煎溫服食前二日厥疝論曰內經謂黃脉之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風夫疝藏疾隂而難見隂沉而伏也今脾虛風寒客于腹膜之間不能與胃通行水穀之氣結而成積使氣道厥逆而痛故謂之厥疝也山茱茰丸治厥疝上搶心腹冷痛山茰吳茰炒食茰棟實麩炒馬藺花蘹香子青橘皮橘紅焙京三稜乾薑各三分附子一枚重半兩者去皮臍右十一味搗羅為末醋煮麵糊和丸如梧桐子大每服二十丸酒或鹽湯下空心服木香湯治厥疝逆上攻腹冷痛木香檳榔烏頭細辛當歸吳茰炒枳殼麩炒甘草炙各一兩共八味㕮咀如麻豆大每服三錢水煎溫服寒疝心腹痛論曰疝者痛也本緣寒氣內積陽衰隂盛不得散釋寒邪因得攻擊或上搶心或腹內疼刺發即俱痛故名寒疝心腹痛也人參湯治寒疝心腹痛胸脅支滿不下食汗出嘔逆人參白茯苓檳榔木香芍藥芎藭當歸桂心青橘皮去白各一兩共九味每服三錢水煎溫服不拘時蜀椒湯治寒疝心腹痛不可忍蜀椒去目炒二百粒附子一枚去皮臍粳米半盞乾薑半兩半夏湯洗七遍去滑切捻十二枚甘草炙一兩共六味㕮咀如麻豆每服五錢入生薑半分棗二枚同煎溫服地黃湯治寒疝心腹痛汗出厥冷生乾地黃三兩甘草炙白茯苓人參當歸各二兩羊肉去脂切三斤右六味前五味細銼將羊肉用水二斗煮取汗一斗去羊肉入諸藥煮取七升入葱白一把棗十四枚再煎取六升絞去滓溫服一盞不拘時當歸湯治寒疝心腹疼裏急當歸三兩生薑五兩羊肉去脂膜切作片一斤三味以水一斗煮取五升去滓每服一盞不拘時日三夜一七疝論曰疝病有七厥逆心痛足寒飲食即吐者名厥疝腹中氣滿心下盡痛氣積如臂者名堅疝寒飲則腹中脅下盡痛者名寒疝腹中乍滿乍減而痛者名氣疝腹中痛在臍傍者名盤疝腹中痛在臍下有積聚者名胕疝小腹與隂相引而痛大便難者名狼疝凡此七疝皆寒氣內積血氣凝澀不得通利冷劇則痛故皆謂之疝難經曰任之為病其內苦結男子為七疝女人為瘕聚蓋以此也桃仁湯治諸疝桃仁去皮尖雙仁吳茱茰炒陳橘皮去白海藻洗去鹽白茯苓羌活蒺䔧子炒去角各三兩共七味每服三錢生薑一棗大同煎溫服厚朴丸治七疝肢體寒臍腹堅痛滿悶厚朴薑汁炙附子去皮臍蘹香子炒白术桂心乾薑枳殼青橘皮芎藭烏頭去皮臍木香當歸各一兩右十二味搗羅為末鍊蜜丸如梧桐子大每服二十丸溫酒下薑湯亦可蠱病論曰經謂脾風傳之腎病名疝瘕小腹寃熱而痛出白一名蠱夫脾受風邪傳于腎經邪熱內爍故其證小腹寃熱而痛其精失守故其證溲出白液病名曰蠱以邪熱內爍其精不守久而弗治適以喪志也水之精為志志喪則精從之左傳謂惑以喪志為蠱者如此大建中湯治蠱病小腹急痛便溺失精黃茋遠志當歸澤瀉各三兩芍藥人參龍骨甘草炙各二兩八味銼如麻豆每服五錢生薑三片棗二枚水煎溫服澤瀉丸治蠱小腹寃熱而痛精氣不守溲便白出澤瀉補骨脂炒己㦸天五味子石斛芍藥人參龍骨甘草炙各一兩共八味為末鍊蜜丸如梧桐子大每服三十丸溫酒或鹽湯下空心日午臨臥各一服乾地黃丸治蠱病精氣不守便溺出白小腹寃熱而痛熟乾地黃二兩鍾乳粉半兩龍骨莵絲子酒浸一宿别搗磁石火煆醋淬七遍芍藥黃芩各一兩右七味搗羅為末酒煮麵糊丸如梧桐子大每服二十丸酒或鹽湯下隂疝門隂疝隂疝腫縮隂疝卒腫痛控睪隂疝統論論曰疝者痛也邪氣聚于隂令隂器腫大而痛者隂疝也一名􅒃疝其類有四即腸􅒃卵脹氣􅒃水􅒃是也世俗云疝氣亦云小腸氣或曰膀胱氣原其病本緣腎氣通於隂與膀胱為表裏胞囊者膀胱之候此二經不足下焦受寒皆能致隂卵腫大或發疝痛故通稱為隂疝若寒溼之氣有連於小腸者即小腸控睪而痛隂丸上下謂之腸􅒃寒氣客於經筋足厥隂脉受邪脉脹不通邪結於隂卵謂之卵脹腎虛之人因飲食不節喜怒不時津液內溢下流于腎寒氣結聚不散謂之氣􅒃水氣盛則津液內結謂之水􅒃水􅒃氣􅒃病生於標故針炙可治其疾易愈腸􅒃卵脹病生於本邪氣入深其治難差隂疝論曰黃帝針經曰足厥隂之脉環隂器抵小腹是動則病丈夫􅒃疝即隂疝也嗜欲勞傷腎水涸竭無以滋榮肝氣故留滯內結發為隂疝隂疝之病世俗論隂疝者為腎餘氣殊不知邪實又本於肝經云治法當瀉邪氣之實補肝經之虛蒺藜子湯治隂疝蒺藜子炒去角附子去皮臍山梔仁各一兩右三味㕮咀如麻豆每服五錢水煎溫服食前服昆布九治隂疝腫大偏墜昆布洗去鹹海藻洗去鹹蒺藜子炒去角蕪荑仁炒檳榔各一兩半枳殼去瓤麩炒大麻仁研各二兩木香黃茋銼訶藜勒去核各三分陳橘皮去白炒桃仁去皮尖叟仁兔絲子酒浸一宿别搗各一兩共十三味搗研為末和勻鍊蜜丸如梧子大每服三十丸空心食前溫酒或鹽湯下沙參丸治疝氣沙參二兩昆布洗去鹹蘹香子炒各半兩三味為末酒煮麵糊丸如梧桐子大每服二十丸空心食前溫酒下二氣丸治隂疝上而不下臍腹疼痛石硫黃研黑鉛各一兩二味先以鉛於銚內鎔成汗次下硫黃煙焰透移下候冷取出研為細末糊和丸如梧桐子大每服三十丸酒下葫蘆巴煮散治隂疝攻痛葫蘆巴沉香馬藺花蓬莪茂煨蘹香子炒各一兩半練實取肉麩炒木香薑黃檳榔銼桂心各一兩附子去皮臍三分甘草炙半兩共十味搗羅為散每服三錢水酒同煎空心食前溫服葫蘆巴丸治隂疝氣攻疼痛葫蘆巴補骨脂炒白豆蔲去皮萆薢青橘皮蘹香子附子去皮臍肉蓯蓉酒浸兔絲子牛膝酒浸桂心防風各一兩右十二味為細末酒煮麵糊丸如菉豆大每服二十丸空心生薑鹽湯下應病丸治隂疝撮痛不可忍韭子炒芎藭二味等分為末鍊蜜丸如梧桐子大每服三十丸空心溫酒下隂疝腫縮論曰隂疝腫縮者寒邪客於厥隂之經而陽氣不能自溫故令諸筋拘急隂器緊縮而疼痛也肝者筋之合也筋者聚于隂器而絡于舌本脉不營即筋縮急筋縮拘則引卵與舌故舌卷卵縮也皆厥隂為病也翅灰散治隂疝腫縮雞翅右左都用不拘多少燒灰一味細研為散每二錢溫酒調下不拘時雄黃洗治隂疝腫縮雄黃研甘草各一兩礬石研二兩三味搗研為末每用藥一兩熱湯五升通手洗腫處良久再暖洗車前子塗治隂疝腫縮車前子不拘多少一味搗羅為末湯調塗腫處蔓菁子散塗治隂疝腫縮蔓菁子不拘多少一味搗羅為散溫水調塗腫處或絹帛傅之以差為度隂疝卒腫痛論曰隂卒腫痛者腎氣虛弱暴受邪氣𫝊入隂中冷熱相薄故卒然而痛也痛甚則邪勝邪勝則熱勝熱勝則腫皆卒然而作也雞翎散治隂卒腫痛雞翎一大莖燒灰蛇牀子一兩二味搗羅為散每服一錢溫酒調下如左邊腫即取雞右翎右邊取左邊翎木香散治隂卒腫痛攻注腹脹悶木香半兩赤茯苓一兩牡丹皮三分防風半兩檳榔一兩澤瀉三分郁李仁一兩湯浸去皮炒七味搗羅為散溫酒調下雄黃淋洗治隂腫前方同雄黃白礬甘草炙各一兩三味為散每用藥一兩以水一斗煎取三升通手淋洗至冷候汗出差黑豆尉治坐久卑溼忽隂囊虛腫氣上築右方以米醋炒黑豆青布袋盛尉心腹更以椒葱湯淋煠腰胯厚衣蓋下部然後服諸藥治隂腫偏著一邊連小腸痛不可忍右方以蘹香苗葉取汁一斗服之日三四服其滓貼腫處控皋論曰甲乙經曰小腹控皋引腰脊上衝心肺邪在小腸也又曰小腸病者小腹痛腰脊控皋丸而痛夫小腸者連心系屬于脊貫肝肺絡心系其經虛不足則風冷乘間而入邪氣既盛則有厥逆之證其氣上衝肝肺客冷散於胸結于臍控引皋丸上而不下痛引小腹甚則衝於心胸蓋其經絡之所系屬然也蘹香子散治小腸受邪控皋痛引小腹蘹香子炒蓽澄茄楝實一方用巴豆同炒去豆不用木香各一兩半葫蘆巴青橘皮去白各一兩檳榔半兩共七味為散每服一錢溫酒調下空心食前日二吳茱茰散治小腸疝氣牽引臍腹疼痛腰曲不伸吳茱茰湯洗炒楝實四十九枚巴豆半兩推令微破三味同炒候入楝實黃焦色去巴豆茱茰不用楝實去核用沉香半兩木香馬蘭花蘹香子炒各一分右七味除巴豆茱茰不用外搗羅為散每服二錢炒葱酒調下空心夜臥發時服木香丸治小腸受寒氣控睪牽痛木香一兩石南肉蓯蓉酒浸切焙别為末牛膝酒浸切焙别為末菖蒲蘹香子炒楝實炒各二兩共六味除蓯蓉牛膝二味别作末外搗羅為末以酒一升熬蓯蓉牛膝成膏和丸如梧桐子大每服三十丸空心食前以紙裹葱白一寸煨熱細嚼溫酒下聖濟總録纂要卷十三
