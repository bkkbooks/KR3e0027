body:
  text: 聖濟總録纂要卷十七休寧程林纂面體門面䵟􅍍論曰䵟􅍍之狀㸃如烏麻班如雀卵稀則棊布密則不可容鍼皆由風邪客於皮膚痰飲浸漬其形外著或飽食安坐無所作為養生方所謂積聚不消之病使人面目黧皯是也散之固有常劑若乃塗澤蠲除朝夕從事者又安可已耶治面䵟􅍍二方雞子一枚去黄硃砂末一兩二味先研硃砂為末入雞子中封固口與雞卵同令雞哺候雞雛出即取塗面效沉香三分牛黄三分薰陸香三分雌黄各半兩丁香一分玊屑三分鷹屎半兩水銀一分共八味先將三味香擣羅為末次將玊屑雌黄入乳鉢中研令細方入水銀及諸藥同研令極細入白蜜調和令稀稠得所入瓷盒中盛毎至臨卧時塗面䵟􅍍處杏仁膏治面䵟􅍍塗之令白潤澤杏仁去皮尖雙仁一兩半雄黄一兩𤓰子一兩白芷一兩零夌香半兩白蠟三兩右六味除白蠟外並入乳鉢中研令細入油半斤并藥内鍋中以文火煎之候稠凝即入白蠟又煎攪匀内瓷盒中每日先塗藥後𫝊粉大去䵟􅍍羊髓膏方治面䵟􅍍塗之令光白潤澤羖羊脛骨髓二兩丹砂半兩雞子白三味先將髓并丹砂入乳鉢中研令極細以雞子白調和令匀入盒中盛每用時先以漿水洗面後塗之益母草塗方治面䵟􅍍令光白潤澤益母草灰一升一味以醋和為團以炭火煆七度後入乳鉢中研細用蜜和匀入盒中每至臨卧時先漿水洗面後塗之大妙面皯皰論曰面皯皰者面生皶皰細起如粟殻狀曰風熱相搏而生葢諸陽在於頭面風熱乘之結而不散故成皯皰養生方説醉不可露卧及飲酒熱未解冷水洗面令人面發瘡輕為皰正謂此也白芷膏方治面皯皰塗面光白白芷白斂各三兩白术三兩半白芨細辛三兩白茯苓一兩半白附子一兩半右七味擣羅為末用雞子白和匀丸如彈子大瓷盒中盛每臥臨時先洗面後取一丸以藥水研化塗面上明旦井華水洗之不過七日大效礬石散方治面皯皰令白塗面礬石燒令汁盡白石脂各一分白斂三分杏仁去皮尖研半兩四味並為散以雞子白調令入瓷盒中盛臨臥時先用漿水洗面後塗藥明旦以井華水洗之浮水膏方治面皯皰令光白水萍暴乾五兩一味擣羅為末以白蜜調和稀稠得所入瓷盒中盛每臨臥時塗面面皶皰論曰諸陽皆㑹於面風邪熱氣客於膚腠不能流通因發為皶皰形似米粟色有赤白亦有縁醉酒露臥及飲酒未解以冷水洗濯而得之有率由風熱在皮膚間外感冷氣擊搏而成杏仁膏方治面皶皰杏仁浸去皮尖研半兩硫黄研一分蜜陀僧研半兩磠砂研一錢白鵝脂鍊成四兩右五味除鵞脂外再同研如粉入鵝脂油更研令匀傾入瓷盒子坐煻灰火中養之攪令稀稠得所成膏每臥臨時以紙拭皰令乾塗之防風散治肺臟風毒及過飲成皶皰防風一兩石膏細研水飛小荆子一兩梔子仁一兩薺苨一兩枸把子一兩白蒺藜一兩甘草炙半兩共八味擣羅為末每服二錢温水調下食後服面皶論曰面皶者是粉刺也面上有皶如米粒此由膚腠受於風邪搏於津脈之氣因虚而作亦去傅胡粉散入虚肌使之然也白斂膏塗方治面粉皶白斂白石脂杏仁去皮尖雙仁研各半兩三味擣羅為末更研極細以雞子白調和稀稠得所瓷盒盛每臨臥塗面上明旦以井華水洗之兎絲汁塗方治面粉皶兎絲苗一握一味擣絞取自然汁塗面上不三五次效石粟膏塗方治面粉㾦㿔如麻子石灰二兩粟米二味將石灰研細同粟米内瓶中以水浸三宿取出研如膏曝乾重研如粉以面脂調匀入瓷盒中盛每洗面訖拭面塗之面體疣目論曰風邪入於經絡氣血疑滯肌肉弗澤發為疣目或在頭面或在手足或布於四體其狀如豆如結筋綴連數十與鼠乳相類故謂之疣目去疣目方石灰二兩一味以苦酒漬七日滴汁點疣上即落又方牛口中涎用以塗疣上自落又方艾一味作注於疣目上灸之三壯即除狐殠論曰陰陽之在人血與氣爾二者調適則行流散徙莫或底滯達於形色暢於膚理無不得其和苟失其宜血氣從而凝積此所以有狐殠之病其候不一有曰狐殠有曰體殠有曰漏腋狐殠者指其腋間體殠者舉其大槩漏腋則又言其溼而生瘡者不可不辨也治丈夫婦人腋氣不可近者方右方以開通錢四十九文用銅筯穿入炭火内燒赤醋浸四十九次碾羅為細末入麝香一分研和匀先用熱酒洗腋下後以藥末揩腋下數次永除殠氣治腋氣人不可近者方石灰二兩桑柴灰一兩炭灰一兩雌黄一兩四味同研末水調塗於腋下可一食久即以栁木箆子刮藥其腋下毛並落然後用四灰散治腋氣四灰散方粉霜艾葉灰礬石灰鉛灰無即用胡粉蜜陀僧代之四味唯艾葉灰稍多餘並等分研令極細先以醋漿水洗拭乾即傅之不過三五上永除殠氣如要試但傅藥蒜上良久自無殠兼治脚汗治腋下溼汗不止及足心手掌陰下股裏常如汗溼殠方乾蔷薇根乾枸把根甘草炙各半兩商陸胡粉滑石炙各一兩右六味先將四味擣羅極細即入研者二味拌匀以苦酒許和塗當微汗出夜復更塗之不過三傅愈丁沉丸方治七竅殠氣沉香一兩丁香半兩甘草炙半兩白𤓰子仁一兩藁本三分當歸芎藭麝香共八味研七味為細末後入麝香拌匀鍊蜜丸如小豆大每服温酒下二十丸日三含化令徧體俱香滅瘢㾗論曰風熱諸毒留於腑臟發於肌肉而為瘡癤病後瘡愈餘毒未殄故瘡痂雖落而瘢㾗不滅治法既有塗澤膏潤之劑亦須賴榮衞平均肌温氣應外宜慎風冷也辛夷膏方治面上瘢㾗塗之辛夷一兩鷹屎白杜若細辛各半兩白附子三分共五味除鷹屎外並剉碎以酒兩盞浸一宿别入羊髓五兩銀石鍋中以文火煎得所去渣將鷹屎研如粉内膏中攪匀再以微火煖入盒中每日三塗瘡瘢上避風當歸膏方治面上瘢㾗塗之當歸白芷烏雞糞以猪脂三斤飼雞三日後取乾雞糞各一兩鷹屎白半兩與雞糞同研右四味先將當歸白芷剉碎酒浸一宿别鎔猪脂一斤消後入浸藥并酒文火煎之候白芷黄色去滓將雞屎鷹屎内膏中攪匀傾入瓷盒中每日三塗瘢上避風臘脂膏方治面上瘢㾗塗之臘月猪脂四斤大鼠一枚二味入鐺中以文火煎之待鼠銷盡以新綿濾去滓入瓷盒盛每用先以布拭令瘢㾗色赤次以膏塗之三五度差慎風雞子膏方治瘡瘢㾗無問新舊塗之雞子五枚一味熟煮取黄於鐺中炒如黑脂膏以物先揩瘢㾗然後塗膏日三次即自滅麥麩散治面瘢㾗凸塗之右方秋冬以小麥春夏以大麥麩細擣為散酥和傅封瘢㾗上真玊磨方治面上瘢㾗真玊取平處一面磨瘢㾗久則無㾗髭髪門睂髯髭髪統論論曰足太陽血氣盛則睂美足少陽血氣盛則髯美足少陰血氣盛則髪美手陽明血盛則髭美夫經絡所至不同血氣各有所屬睂髯髪髭率本於經絡之血氣或黒或紺或黄或白可以知盛衰葢血氣在人猶水之津也髭髪猶津之有彡也津之槁澤而彡隨之則髭髪本氣血可知矣烏髭髪論曰髪本於足少陰髭本於手陽明二經血氣盛則悦澤血氣衰則枯槁容貌之間資是以賁飾則還枯槁為悦澤法焉可廢乎地黄丸方烏髭髪生地黄汁一斤生薑汁五合巨勝子旋復花熟乾地黄乾椹子各二兩共六味除二味汁外擣羅為末先將前二味汁用銀器煎熟看稀稠將藥末和丸如彈子大每服夜飲酒半酣後含化一丸揩牙烏髭方皂莢懐州者十條以地黄自然汁生薑自然汁各半盞和匀旋刷皂莢於火上炙以二藥汁盡為席研細為末入青鹽拌匀逐日擦齒藥用經旬效鬚髪黄白論曰足少陰血氣盛則髪潤澤而黑足太陽血氣盛則鬚潤澤而黑二經血氣虚乏則鬚髪變為黄白然則還其潤澤復其紺黑雖有傳染之法曾不如益血補氣為常服劑葢血調適則滋澤外彰其視用傳染之功逺矣乾漆丸方治髭髪白可以變黑乾漆炒令烟盡栢子仁炒生乾地黄熟乾地黄各一兩共四味擣羅為末研糯米飯和擣三五百杵塗酥丸如梧桐子大每服二十丸空心温酒下治鬚髪黄白變令黑色倒行油方右方取銀子三兩作小盒子盛汞一兩以乾水蛭七枚為末同入盒内用蚯蚓泥固濟約半指厚深埋在馬糞中十九日取出已化為黑油矣用魚胞裹指頭㸃藥撚之白秃論曰蟯之為害因血氣虚乘風而上則能生瘡疽癬瘑疥無不為也瘡痂不去而痒鬢髪禿落無復生榮是為白秃五味子膏方治白秃落髪五味子肉蓯蓉松脂蛇牀子逺志各三兩雄黄研雞糞白雌黄研白蜜兔絲子五兩以酒浸一宿各一兩猪脂二升共十一味先將草藥擣羅為末次將石藥及雞糞白再研令如粉下猪脂松脂入鍋中同熬化復下諸藥文火煎稀稠得所以綿濾去滓瓷盒盛每用先以桑柴灰汁洗頭令淨後塗藥不過三次髪落生赤秃論曰諸陽脈皆在於頭風熱乘之則陽邪熾盛發於頭皮腦絡之間細瘡徧密赤色有汁痒痛侵淫乃至髪落故名赤秃旱蓮汁方治赤禿髪落塗之旱蓮草三兩鐵粉一分二味先將旱蓮草擣絞取汁次入鐵粉研令極細入盒中每用先以泔漿洗頭次塗之牛羊角灰方治赤秃髪落塗之牛羊角等分燒灰二味研如粉以猪脂調傅之馬蹏灰方治赤禿髪落塗之馬蹏燒灰一味研如粉用臘月豬脂調塗之椹汁方治赤秃髪落塗之黑椹一斗一味内瓶中密封於北簷下埋之百日即變為水每用淨洗頭次塗髪即生眼目門眼目統論論曰内經曰肝主目又曰在臟為肝在竅為目難經曰肝氣通於目目和則知五色矣内經又曰心者五臟專精目者其竅也夫目既為肝之竅矣又為心之竅何也曰目者五臟之精華固不專於肝也所謂骨之精為瞳人筋之精為黑血之精為絡脈氣之精為白睛肉之精為約束是也析而言之則通乎五臟合而言之則主於肝夫惟通乎五臟故曰精明五色者氣之華於此乎觀五臟有餘不足六腑强弱形之盛衰以此參伍决生死之分夫惟主於肝故肝虚寒則目􅉩􅉩視物生花肝實熱則目痛如刺肝中寒則目昬而瞳子痛肝熱冲睛則目眥赤痛生瘜肉不特如此神志俱悲而泣下則以水火相感故也一水不勝五火而目盲則以陰陽各併故也夫五臟陰陽其變動俱感於目又況攝養失宜動過生疾者耶或多熱食或嗜五辛或喜怒不時或房室不節以至凌寒冒暑處溼當風哭泣不寐凡過用目力皆至疾病其候不一養生者不可不知也肝虚眼論曰肝虚眼其證不一巢氏折之有忽然發腫者有淚出不止者有睛生翳膜暈者有視物漠漠不能逺視者有精彩昬濁黑白不明而暈者葢肝開竅於目腑臟精華之所聚也血氣既衰不足以榮養故證狀之異如此龍木論有肝臟虚熱外障謂其證忽發昬澁淚出痒痛摩隠瞳人黒睛腫漸生翳障視物不明者宜審治之栢子仁丸方治肝虚視物漠漠不能逺見睛輪昬暗澁痛栢子仁薏苡仁烏麻仁車前子枸把子菴䕡子兎絲子酒浸别搗末各一兩杜荆子青葙子五味子蛇牀子桂心菊花山藥各半兩熟乾地黄肉蓯蓉酒浸切焙白茯苓各一兩右十七味擣羅為末鍊蜜和丸如桐子大每服二十丸空心温酒下石决明丸方治肝虚血弱目久昬暗石决明兎絲子酒浸一宿别研末五味子各一兩熟乾地黄細辛知母山藥各一兩七味為末鍊蜜和丸如梧桐子大每服三十丸空心米飲下地黄丸方治肝虚淚出不止翳暈侵睛視物不逺或睛昬濁黑白不明熟乾地黄五味子兎絲子酒浸一宿别搗蕤仁去皮車前子各一兩白茯苓栢子仁研細辛甘草防風各半兩共十味為末鍊蜜和丸如桐子大每服二十丸空心温酒下肝實眼論曰肝氣通於目其氣平則諸疾不生過實則生患乃有肝實眼之證令人目痛如刺久不已則目赤而生淫膚息肉治宜瀉之又當視其老壯凡人五十以前可服瀉肝湯過五十則不可或有是疾當不得已而用之菊花散方治一切眼疾肝熱上攻羞明畏日淚出菊花一兩蜜䝉花甘草生梔子仁芎藭大黄各半兩蒺藜子炒去角防風當歸焙切各一兩九味為散每服二錢食後臨臥麥門冬熱水調下生地黄湯方治肝實熱眼熱痛不止生地黄汁蜜車前子汁三味和匀各二兩𤣥參升麻梔子仁各一兩芍藥一兩半細辛半兩共八味羅五味為末每服五錢水煎入前三汁再煎温服㸃眼煎方治肝實熱目眥熱痛梔子仁蕤仁決明子㣲炒各一兩石膏二兩車前子三合竹葉二握秦皮三分白蜜三兩後入共八味剉碎七味以井華水五斤煎取汁一升再入蜜調匀瓷器中重湯煮如稀餳每㸃如大豆許羚羊角散方治肝臓實熱眼目昬暗時多熱淚羚羊角羌活𤣥參車前子黄芩括樓仁山梔子各半兩胡黄連菊花各三分細辛一分為散每服二錢食後竹葉熱水調下目胎赤論曰目胎赤者緣在胎時母嗜五辛及餌熱藥傳移胞藏内稟邪熱及至生長兩目赤爛至大不差故名胎赤又人初生洗目不淨穢汁潰壞者亦有之内外之治小異也羚羊角湯方治胎赤眼久不差昬暗漠漠瞳人脹痛羚羊角屑三兩防風芍藥蕤仁麥冬地骨皮决明子甘草炙各二兩茯神去木三兩每服五錢水煎食後臨卧服治胎赤眼㸃眼梨汁煎方梨汁絞汁一盞古字銅錢二七文胡黄連末二錢青鹽半兩龍腦一錢共五味先將古錢二七枚重重着青鹽隔每一重錢着一重鹽疊之填滿錢孔中入火燒令通赤去灰塵投入前梨汁中浸一復時去錢將汁煎三五沸以新綿濾入瓷器瓶内入胡黄連末浸七日去黄連龍腦末令匀要用以銅筯㸃少許在目眥頭治胎赤眼㸃眼龍腦膏方龍腦研一錢蕤仁去皮一分研杏仁七枚湯浸去皮尖雙仁研三味研如膏用人乳汁調和令匀瓷盒中盛每用以銅筯㸃少許在目眥頭日兩度目赤痛論曰内經謂心主血又曰肝受血而能視蓋肝開竅於目若肝血壅盛心經熱實熱氣既熾血乃滂溢而上衝於目故令目赤痛也難經所謂痛者為實宜散壅滯决邪實則病可已羚羊角湯方治肝心氣熱目赤痛羚羊角鎊蔓荆實去白皮菊花防風芍藥各二兩半黄芩一兩𤣥參半兩每服三錢煎再入馬牙硝半錢食後温服臨臥再服旋復花湯方治目赤痛旋復花升麻秦芁防風羚羊角萎蕤各一兩黄連柴胡去苗葉黄檗去粗皮甘草炙各半兩每服五錢水煎食後温服臨臥再服乳汁煎㸃眼方治肝熱目赤痛人乳汁半兩古字錢十文二味以乳汁於銅器中磨錢令變色稀稠成煎即止内瓷瓶盛每以銅筯㸃少許目眥頭日三五次犀角湯方治赤眼腫痛犀角末秦芁二兩黄連馬牙硝滑石杏仁去皮尖雙仁半兩出油右六味為末和匀以沙糖一處入藥熬成膏每用皂子大沸湯化洗之通頂散方治赤眼腫痛苦葫蘆子四十九粒穀精子研一錢𤓰蔕十四枚燒灰乳香研半錢薄荷葉一錢五味為末入龍腦少許鼻内搐一字立效石膏散方治上焦壅熱目赤口乾石膏甘菊花羌活白附子白􅀈𧖟𤣥參黄連共七味等分為散每服二錢生薑茶酒調下目熱磣痛赤腫論曰五臟六腑之精華皆上注於目若風熱搏於腑贜毒氣乘肝衝發於目則熱氣外泄淚下眵多日夜暴燥故熱磣痛赤腫也地骨皮湯方治風毒衝眼赤痛朝乾磣地骨皮甘菊花擇升麻黄連防風决明子微炒細辛各一兩竹葉共八味除竹葉外擣篩每服五錢入竹葉七片同煎服食後臨臥再服龍煙湯方治眼磣澁如針刺血痛昬暗生麥門冬一兩半木通一兩熟乾地黄三兩旋復花大青茯神各一兩黄連各一兩每服三錢水煎入芒硝半錢攪匀食前温服地骨皮散方治風毒氣上攻兩眼磣澁疼痛及暴赤眼地骨皮羌活防風土蒺藜去刺微炒甘草炙一兩為散每服二錢荆芥清茶調下如患暴赤眼濃煎甘草湯調下食後臨臥服洗眼蕤仁湯方治目熱赤痛磣澁蕤仁去皮秦皮防風各一兩甘菊花半分竹葉二握山梔子仁萎蕤各半兩共七味剉如麻豆以水五盞煎取二盞半熱淋冷頓煖淋洗痛止則止即住煎藥不得犯鐵器㸃眼黄連煎方治眼目暴赤磣澁疼痛甘蔗十二兩汁黄連研半兩二味於銅器中以慢火養令汁涸去半以綿濾去每日兩度㸃目赤爛論曰目赤爛者瞼眥俱赤且爛見風益甚又謂之風赤眼此由衝冒風日風熱之氣傷於瞼眥與津液相搏故令赤爛也迎風則痒淚出遇熱則傷爛眵多治宜鎮平肝氣滌洗瞼膚則清淨之竅自然明矣菊花湯方治風毒氣攻眼生瘡爛菊花升麻黄連去鬚木通防風去义白茯苓地骨皮萎蕤各一兩右八味擣篩每服五錢入竹葉十片同煎去滓空心日午臨臥温服柴胡洗眼湯方治眼赤痛微腫眥赤爛多時柴胡去苗蕤仁去皮研黄連去鬚升麻各一兩右四味擣篩以水三升煮取一升半濾去滓微熱淋洗如冷再煖洗三徧黄連散方治赤白眥爛生瘡衝風淚出黄連去鬚雄黄研各一兩半細辛去苗蘗黄檗去粗皮各三分乾薑一分右五味擣羅為散研令極細以密器盛毎用二黍米許㸃兩目眥日三度目血灌瞳人論曰目屬肝肝受血而能視則目瞻視必資血苟因物損傷致血脈散亂則敗血侵睛灌注瞳人害於瞻視不早治或致喪明故謂之血灌瞳人人參湯方治血灌瞳人澁痛人參赤茯苓細辛桔梗車前子各一兩防風去义五味子各半兩共七味擣篩每服五錢水煎温服食後臨臥再服决明湯方治血灌瞳人石决明人參川芎細辛五味子各一兩赤茯苓二兩右六味擣篩毎服五錢水煎服食後臨臥服沒藥散方治血灌瞳人沒藥一兩半騏驎竭大黄炒芒硝各一兩右四味擣研為細末每服三錢熟水調下空心食後日三赤脈衝貫黑睛論曰眼者五臓之精華若風邪熱毒内干於臓腑則隨其經絡上衝於目故令赤脈衝貫黑睛也上下左右各有部分不可不察其從大眥侵睛而痒者肺胃熱也其從小眥起者手少陽脈動虚熱也其自上而下者足太陽脈動邪熱也其自下衝上者足陽明脈動邪爇也其源不同當察其部分依經以治之通明湯方治三焦熱治小眥偏赤赤脈射黑睛术通萎蕤甘草炙各一兩半枳殻去瓤麩炒黄芩去黒心右五味擣篩每服五錢水煎入芒硝地黄汁各少許再煎沸温服黄蓍湯方治眼上下赤脈貫黑睛黄蓍芍藥知母升麻犀角屑各兩半苦竹葉五十片右六味擣篩毎服五錢水煎入芒硝少許再煎温服摩頂明目膏方治風熱衝目赤脈胬肉生麻油二升真酥五兩車前子淡竹葉洗各半兩吳藍大青黄連去鬚山梔子仁麥門冬槐白皮甘草炙栁白皮黄芩馬牙莧實生犀角鎊馬牙硝别研朴硝别研各一兩鹽花研半兩右十八味除硝鹽油酥外細通油瓷瓶中綿罩口重湯煎三復時捩去滓更新綿濾過置生鐵器中每日飯後及臥時開髪滴頂心以生鐵熨斗子摩頂一二千下兼去目中熱毒昬障痛澁墜睛論曰墜睛者眼因賊風所吹血脈受寒貫衝瞳人風寒氣隨眼帶牽拽睛瞳向下名曰墜睛也日久不治瞳人損陷遂致失明犀角散方治墜睛眼時發疼痛視物散亂犀角羚羊角各半兩青牛膽一枚五味子槐實茺蔚子青葙子惡實炒胡黄連盧㑹研地骨皮各一錢兎肝炙乾一具右十二味除膽外擣研為末以膽汁拌匀毎服二錢煎槐子湯調下卧再服忌發熱毒物槐實丸方治墜睛失明眼睛牽陷槐實羚羊角獨活地膚子天麻沙參人參各一兩防風去义甘菊花枳殻炒各一兩决明子二兩右十一味擣羅為末鍊蜜和搗百杵丸如梧桐子大每服三十丸空心臨卧漿水下蟹目論曰臟腑壅滯肝經積熱上衝於目令人目痛睛疼者毒氣結聚甚則黑睛上生黑珠子如蟹目狀故以名之或有如豆者名曰損翳或曰離睛又曰蟹睛病極難治不可釣割及傳諸毒藥唯宜服宣泄之劑使邪熱退病差矣瀉肝補膽防風湯方治蟹目疼痛防風一兩半逺志黄芩人參桔梗炒細辛芍藥各一兩右七味擣篩每服五錢水煎食後臨臥温服萎蕤犀角散方治眼生蟹目黑睛疼痛萎蕤犀角蕤仁湯浸去赤皮黄連去鬚黄芩梔子仁甘草升麻各等分共八味㹗羅為散每服三錢水煎食後臨臥温服瀉肝黄芩羚羊角湯方治蟹睛疼痛黄芩羚羊角赤芍藥細辛桔梗炒人參逺志甘草炙各半兩防風去义一兩半右九味擣篩每服五錢水煎食後臨臥温服日再目珠子突出論曰人因風熱痰飲攻漬腑臓陰陽不和肝氣藴積熱毒之氣上衝于目使目睛痛疼甚者突出治宜先服寒藥以瀉肝氣然後調治勿求速效惟漸治之仍須微鍼引出惡汁也麥門冬茺蔚飲方治風熱攻目赤痛目睛欲凸出者麥門冬茺蔚子各二兩桔梗炒防風𤣥參知母各一兩黄芩去黑心天門冬去心各一兩半右八味擣篩每服五錢水煎食後臨臥温服黄連湯方治風毒衝眼赤腫睛欲突出洗眼黄連去鬚秦皮黄檗去粗皮各一兩乾棗十枚去核蕤仁三分右五味㕮咀如麻豆大拌匀每用一兩半以水四盞煎至二盞稍熱去滓抄洗眼冷即重煖日三度治睛眼忽然突出一二寸者冷水灌右方急取冷水灌眼中數次換水須㬰睛當自收目見黑花飛蠅論曰腎水也肝木也木得水而盛其理明矣腎水既虚肝無以滋養故見於目者始則􅉩􅉩不能矚逺久則昬暗見黑花飛蠅其證如此腎虚可知也治宜以益腎水去肝風之劑則標本兩得矣治肝腎風虚眼生黑花宜服此方磁石二兩燒醋淬七徧細研水飛神麯四兩炒硃砂一兩細研水飛右三味擣羅為末鍊蜜和擣一二百杵丸如梧桐子大食後酒下二十丸治肝腎虚風上攻眼生黒花頭目不利能通神延年川椒一斤一味揀淨去目并閉口者於銚内炒令透於地上鋪淨紙二重新盆合定周迴用黄土培之半日去毒出汁然後取出乾為度只取椒於瓷盒子内收毎日空心新汲水下十粒五倍子丸方治眼見黑花去翳明目巴㦸天一兩枸祀子㨂二合甘菊花三兩旋復花四兩蜀椒去目并閉口者五兩右五味將椒入銀器内入青鹽四兩醋三升慢火煮乾如器物小旋添醋煮候醋盡又將椒與前四味焙乾杵為末鍊蜜和丸如梧桐子大每服三十丸至四十丸空心午夜臨臥温酒或鹽湯下枸把丸方治肝腎風氣上攻眼生黑花枸把久暴二兩巴㦸天穿心紫色者去心蜀椒去目并閉口者炒出汗各一兩旋復花擇淨右四味擣為末鍊蜜和丸如梧桐子大每服三十丸臘茶下不拘時兎肝丸方治肝腎毒風攻衝眼生黒花昬暗視物不明兎肝去筋膜切焙羌活黄連菊花各三分地骨皮龍齒防風柴胡車前子青葙子白附子萎蕤各半兩右十二味搗羅為末錬蜜丸如梧桐子大每服二十丸食後竹葉湯下息肉淫膚論曰脾肺有熱藴積不散傳播肝經流注血脈上衝於目發於臉眥息肉脹起攀系白睛隱澁妨悶故謂之息肉淫膚桔梗湯方治目生雞冠蜆肉桔梗大黄炒細辛黄芩𤣥參芒硝鍊過者各一兩防風車前子各一兩半右八味擣篩毎服三錢水煎食後温服㸃眼蝸牛漿方治息肉淫膚赤白膜曾見人説治小兒痘後生翳以蝸牛汁丹砂滴目中效生蝸牛一枚一味去其掩内丹砂末於口中火上炙沸以綿注取汁傅于眥中立效㸃眼雀糞膏方治息肉淫膚赤白膜雄雀糞一味取細直者以乳汁和研細㸃傅翳上又方杏仁湯浸去皮尖雙仁用七枚一味嚼細吐于手掌内以綿纒筯頭㸃于胬肉上不過三五度差㸃眼食鹽膏方治眼中息肉食鹽研一分驢脂一兩二味先熬驢脂後下食鹽調成膏以銅筯㸃如黍米許於目眥頭日三夜一通神膏方治眼生翳膜赤脈息肉澁磣痒痛有淚白沙蜜四兩青鹽研麝香研各一字磠砂飛過半字白礬飛過半字當歸為末半錢黄連去鬚為末一錢右八味同研令研匀入青竹筒内慢火煮半日候冷綿濾去滓瓷瓶收貯每㸃眼了瞑目少時以温湯洗翳與息肉等俱下目生胬肉論曰目生胬肉者由脾肺不利風熱乘之其候或痒或痛赤瘀而爛壅熱既久息肉增長近則侵睛輪大則覆瞳人治不可緩鈎割熨烙各自有法至于袪風滌熱之劑豈可偏廢哉𤣥參散方治目赤痛胬肉滿疼𤣥參甘菊花决明子大黄炒苦參車前子枳殻麩炒山梔子仁防風黄連去鬚升麻各二兩右十一味擣羅為細散每服三錢食後以米飲調服臨卧再服决明散方治眼生胬肉侵睛及贅肉生瘡暈眼赤决明子車前子青葙子各半兩黄連去鬚萎蕤甘草炙羚羊角枳殻麩炒芎藭各一兩右九味搗羅為細散每服三錢食後温漿水下臨臥再服升麻丸方治熱痛胬肉生瘡升麻車前子黄芩茺蔚子𤣥參决明子炒龍膽山梔子仁防風甘草炙生地黄地膚子各一兩右十二味擣羅為細末鍊蜜丸如梧桐子大每服二十丸食後温漿水下臨臥再服加至三十丸㸃眼艾熏散方治目生胬肉蕤仁研細一兩膩粉一錢半酥一兩熟艾如雞子大許右四味搗三味入乳缽中令極細攤開次取艾火燒將乳鉢覆令煙熏之候燒盡艾煙以槐木椎碎研令煙氣匀然後少少㸃眼眥頭三五度鯽魚貼方治目生胬肉澁痛鯽魚鮮者一味去皮骨淨取肉一片中央開一竅正貼眼上日三五度易目内生瘡論曰目内生瘡者以脾臟毒熱重蒸于上鬱而不散遂令瞼内生瘡其初患時或痒或痛發歇無常或多眵淚眥門如丹砂色於是漸有翳膜龍木論謂不宜㸃藥鍼灸惟宜服瀉脾清膈之劑滌蕩本源當如是也决明子丸方治肝肺熱毒氣攻兩眼生瘡赤痛决明子炒菊花秦皮黄連去鬚各一兩車前子地骨皮各一兩半黄芩羚羊角生乾地黄焙山梔子萎蕤秦芁各一兩青葙子白茯苓各一兩半升麻一兩右十五味擣羅為末鍊蜜丸如梧桐子大每服三十丸食後温水下再服梔子湯方治肝心熱毒目生瘡及磣痛梔子仁半兩犀角屑一兩木通黄芩各半兩大黄炒瞿麥穗各一兩黄連去鬚車前子一兩右八味擣篩每服五錢入竹葉七片同煎入芒硝末半錢放温服日二清涼包子方治眼赤熱生瘡退翳黄連一分為末一味用水一碗面東撲取倒流水些小將黄連末匀摻在碗内用熟艾一塊如雞子大安在古錢七文上四面更用青銅錢四十文足作四塊垜子覆黄連碗在上㸃火燒艾候煙盡更掃下黄連末用夾絹袋子盛了取孩兒乳汁浸時時㸃在眼中覺口中苦透為度如暴赤眼用之立效目膿漏論曰目膿漏者緣血脈壅熱傳入於足太陽膀胱之經膀胱之脈起于目内眥則令人瞼眥腫痒久即成瘡膿汁時下綿綿不絶如器津漏故謂之膿漏不治則膿毒淹漬穿壞白睛黑㸃相連即難治療防風湯方治眼漏睛膿出防風二兩地骨皮逺志白茯芩人參黄蓍各一兩大黄炒知母各二兩右八味搗篩每服一錢水煎食後臨卧温服龍腦散㸃方治睛漏瘡目大眥出膿汁有竅龍腦研馬牙硝各半錢菉豆粉一錢三味同研極細用燈心黏藥㸃之再㸃目生珠管論曰目生珠管者風熱痰飲漬于肝血氣藴積津液結聚所由生也肝藏血故肝受血而能視氣調血和則精華見於目今邪乘於肝肝氣受病為風熱熏蒸痰飲漸漬使血氣壅閼上衝於目津液結聚狀如珠管故以名焉銅青丸方治眼生膚翳垂珠管銅青一兩細墨半兩二味合研為末醋和丸如白豆大毎用一丸以乳汁新汲水各少許浸化以銅筯㸃之鉛丹膏方治眼卒生珠管鉛丹半兩鯉魚膽汁量鉛丹多少用二味合調如膏㸃目眥中日三五次治卒生珠管方白蜜一味以少許㸃目中仰卧令淚出半日許洗之雀目論曰晝而明視暮不覩物名曰雀目言其鳥鵲不能見於夜也夫衞氣晝行於陽夜行於陰陰血受邪肝氣不能上榮於目肝受血而能視今邪在於肝陰血澁滯至暮則甚故遇夜目睛昬不能覩物世謂之雀目防風煮肝散方治雀目防風去义黄連去鬚穀精草黄芩甘草炙天南星各一兩蛤粉半分右七味搗羅為細散毎服一錢用羊子肝一片銅竹刀批開摻藥在内以麻繩纒定研粟米飯一大盞銀石鍋内煮熟放温臨臥嚼服切不得犯鐵器病甚者不過再服必效鬱金散方治雀目鬱金三兩新牛膽一枚猪膽二枚蛤粉三兩大黄炙半兩黄連去鬚半兩雄黄一分共七味將五味為細散并猪膽拌和入牛膽中填滿陰乾為細散毎服大人一錢小兒半錢食後新汲水調下赤眼氣眼疳眼亦能治之煮肝散方治雀目咫尺不見物紫芥菜子員香炒令黑色碾為細散用羊肝一具分作八服每用散二錢捻在於肝上以笋籜葉裹煮令熟放冷服以煮肝湯下不過一具肝永除根本臨臥時服還睛丸方治雀目人參細辛白茯苓木香知母芎藭各一兩石决明茺蔚子各二兩共八味搗羅為細末鍊蜜丸如梧桐子大毎服空心茶下二十丸目瞼垂緩論曰眼瞼垂緩者以血氣不足膚腠開疎風邪客于瞼膚其皮垂緩下覆睛輪故俗呼為睢目又曰侵風久之則垂覆愈下眼閉難開茺蔚散方治風毒攻眼瞼垂下茺蔚子防風羌活蔓荆實𤣥參細辛甘菊花黄芩車前子甘草各一兩炙大黄炒半兩右十一味擣羅為散每服四錢水煎温服食後臨臥各一竹葉湯方治眼熱毒瞼垂腫遮睛苦竹葉黄連去鬚黄檗梔子仁各一兩蕤仁湯浸去皮半兩右五味細剉以水五大盞煎至二盞半去滓温服澄清洗眼日五七次黄蓍丸方治氣血不足膚瞼下覆睛輪垂緩難開又名睢目黄蓍蒺藜子炒去角生乾地黄焙柴胡甘草炙梔子仁苦參白术白花蛇酒浸去皮骨各一兩防風去义菊花茯苓山藥秦芁各三分天門冬枳殻麩炒白檳榔各一兩半右十八味搗羅為末鍊蜜丸如梧桐子大每服三十丸空心温酒下升麻散方治風邪客於瞼膚其皮垂下緩覆睛輪眼閉難開升麻山茱茰各三分甘菊花細辛各半兩蔓荆實山藥防風各一兩右九味搗羅為散每服三錢温酒調下目瞼腫鞕論曰目瞼腫鞕者内因肺肝積熱上衝于目外為風邪所搏風熱留結在於瞼眥血氣不得宣通故令腫鞕久不差多成風粟細瘡眵汁淹漬浸壞眼目先宜鎌洗出毒然後以藥攻治則病可差黄蓍湯方治目瞼鞕赤腫痛黄蓍茺蔚子麥門冬各一兩半地骨皮𤣥參黄芩知母各一兩右七味搗篩毎服五錢水煎食後臨臥温服日三大黄桔梗散方治目瞼腫鞕刺痛大黄炒一兩半桔梗炒黄芩𤣥參羚羊角白茯苓人參各一兩七味搗羅為散毎服一錢至二錢食後臨卧米飲調下日三洗眼防風湯方治風熱客搏目瞼腫鞕防風秦芁甘菊花各一兩蕤仁湯浸去皮竹葉一握梔子仁萎蕤各半兩右七味細剉令匀毎服一兩以水三盞煎取一盞半綿濾去滓每煖洗之倒睫拳攣論曰臟腑久積風熱内熏肝經衝發於目始則腫赤隠痛多淚目久津液澁少瞼眥皮急致睫拳倒刺隠瞳人治法當起去毛睫又刺太陽經令出血及鈹鎌除其惡血仍服除風退熱之劑防風湯方治風熱衝肝目多倒睫防風甘菊花旋復花决明子炒萎蕤麥門冬梔子仁黄連甘草炙升麻秦皮各等分右十一味搗篩每服五錢水煎食後臨臥温服車前子散方治倒睫赤眼疼痛不開車前子二兩馬蹄决明㣲炒蕤仁各一兩半地膚子龍膽甘草炙菊花各半兩青葙子山梔子仁各一兩前胡三分右十味搗羅為散每服二錢至三錢空心粟米飲調下食後臨卧再服洗眼湯方治風熱攻目磣澁疼痛漸致倒睫蕤仁秦皮防風各一兩山梔子仁菊花萎𬎼各半兩竹葉右七味細剉以水三升煎取一升半乘熱淋洗冷即再煖作三度使聖濟總錄纂要卷十七
