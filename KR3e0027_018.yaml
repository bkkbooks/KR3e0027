body:
  text: 聖濟總録纂要卷十八休寧程林纂眼目門目生膚翳論曰目生膚翳者以腑臓氣血虚實不調加以風邪痰飲鬱於膈上熏蒸既久衝發於目乃生膚翳其睛上及瞳人有物如蠅翅狀是為膚翳也决明子丸方治久患膚翳遮覆瞳子决明子炒蕤仁去皮地膚子白茯苓防風麥門冬澤瀉茺蔚子枸把子五味子青葙子各一兩細辛車前子兎絲子酒浸别搗末三分生乾地黄二兩桂心去粗皮半兩黄芩杏仁右十八味搗羅為末鍊蜜丸如梧桐子大每服二十丸食後以米飲下臨臥再服九月服此藥加兎肝一兩至二月停甚妙盧㑹丸方治眼熱赤痛及生膚翳盧㑹研半兩鯉魚膽一枚取汁牛膽乾者半兩濕者用汁一合熊膽研一分石决明剖削一兩麝香半分車前子一兩右七味除膽外擣研為細末後入汁同和匀鍊蜜丸如梧桐子大食後米飲下二十丸加至三十丸貝齒散方治目風熱赤生膚翳㸃眼貝齒七枚燒為末珍珠一分為末龍腦研半錢三味合研如粉每㸃眼時用黍米大於翳膜上日三度菊花散方治眼目膚翳侵及瞳人如蠅翅狀菊花防風木通木賊􅋖靈脾剉荆芥去梗甘草炙各一兩右七味擣羅為散每服二錢食後茶半錢同㸃温服目生花翳論曰目生花翳者㸃㸃色白狀如棗花魚鱗之類是也此由肝肺實熱衝發眼目其始則目痛淚出變生白翳宜急治之不爾則致障翳也桑白皮湯方治目生花翳白㸃狀如棗花桑根白皮木通各一兩半羚羊角澤㵼黄芩旋復花川大黄炒𤣥參茯神以上各一兩甘草一分甘菊花半兩右十一味搗羅為細散每服二錢水煎温服羚羊角湯方治眼生白翳如棗花羚羊角大黄炒桑根白皮黄連决明子黄芩去黒心甘菊花各一兩甘草炙各半兩右八味搗篩每服三錢水煎煮食後温服退翳􅋖术散方治眼生花翳蒼术二兩米泔浸一宿焙木賊甘草炙各一兩榖精草蟬蜕各一分蛇蜕一錢焙湯洗黄芩半兩共七味為散每服一錢空心臨臥冷水調下目青盲論曰龍木論稱内障有變青盲者初患之時昬暗不痒不痛亦無翳膜至於失明與不患者相似是知青盲之狀外無異證瞳子分明而不見物由肝腎氣虚精血衰弱不能上榮故目盲而無所見者經曰肝氣通於目目和則知白黑養生方乃以塞故井水瀆令人目盲豈其本哉羊肝丸治内外障青盲雀目眼生黑花白翳十年以上者可治羯羊肝一具切片文武火炙蕤仁一兩錦文班鳩一隻去頭足腸胃取肉炙為末細辛防風黄連去鬚瞿麥子蒺藜子桂甘菊花牡蠣燒為末各五兩羌活三兩白茯芩四兩蔓菁子二升蒸五七徧决明子炒二兩右十五味搗羅十二味為末入羊肝班鳩牡礪末乳缽内同研匀錬蜜和丸如梧桐子大毎服二十丸食後臨臥茶清下澤瀉湯方治肝臟熱衝目赤瞻視漠漠積年青盲不見物澤瀉杏仁湯浸去皮尖研决明子炒大黄炒黄芩甘草炙枳實麩炒芍藥各一兩梔子仁人參赤茯苓黄檗細辛白术各半兩柴胡四兩青葙子一兩桑根白皮炙三兩升麻一兩右十八味搗羅每服五錢水煎入生薑半分同煮再入芒硝半錢放温食後臨臥服日再真珠散方治眼青盲真珠末三分胡黄連三分石决明三兩搗碎細末水飛琥珀三分地膚子一兩天靈葢三分燒灰母猪肝半兩切炙乾右七味搗羅為散每服二錢食後温水調下臨臥再服日三治青盲烏雞丸方右方用黄荆嫩頭春初取之九蒸九晒取半斤用烏鷄一隻純黑者以米飼五日安淨版上飼以大麻子又二三日旋收糞暴乾取入淨瓷缾子内熬糞令香黄然後和荆頭搗成末鍊蜜和丸如梧桐子大每服十五丸陳米飲下加至二十丸日二服將變内障眼論曰眼疾始於浮淺久而弗圖變為内障者非一端也龍木論内障皆有其漸葢從一眼先患後乃相牽其損是肝腎氣虚風邪熱毒上攻眼目氣血衰微久則為害但不痛不疼亦無眵淚目視如輕煙或如薄霧或見垂絲或見蠅翅或見飛蛟其初若無足慮至其成内障則慢慢不知矣今以將變内障者叙之葢圖難於易之意也瀉肝飲方治雷頭風恐成内障先服瀉肝飲後服礠石丸防風二兩五味子炒細辛車前子黄芩茺蔚子桔梗炒大黄炒芒硝研各一兩右九味搗篩為粗末每次服三錢水煎去滓放温食後臨臥服礠石丸方礠石二兩燒赤醋淬七徧五味子炒牡丹皮附子去皮臍𤣥參各一兩右五味搗羅為細末鍊蜜丸如梧桐子大毎服三十丸空心鹽湯下黄蓍丸方治肝虚勞兼膀胱久積虚冷目眩見花不明漸成内障黄蓍白茯苓石斛去根各二兩鹿茸去毛酥炙一兩半五味子炒二兩防風去义生乾地黄覆盆子酸棗仁牡丹皮各三兩右十味搗羅為末鍊蜜和丸如梧桐子大每服二十丸空心温酒下加至三十丸蕤仁丸方治内外障眼生乾地黄焙一兩半菊花焙一兩一分蕤仁三兩黄連去鬚車前子各二兩人參麥門冬各三兩防風黄芩青葙子湯浸焙秦芁羚羊角各一兩半甘草炙丹參炒决明子炒天門冬地膚子升麻炒苦參炒地骨皮羌活𤣥參炒各一兩一分右二十二味搗羅拌匀鍊蜜和丸如梧桐子大食後煮百合湯下二十丸加至三十丸但有瞳人不拘内外障翳並治目眵䁾論曰目者五臟之精華肝之外候津液之道也若腑臟挾熱内熏於肝衝發於目使液道熱澁結滯於眥瞼則成眵䁾羚羊角散方治風熱衝肝上熏於目結成眵䁾羚羊角二兩犀角一兩桑根白皮生乾地黄焙防風五味子白蒺藜炒牛膝羌活芍藥各三分為末毎服二錢水煎温服淋洗秦皮湯方治目生眵䁾秦皮柴胡黄連去鬚黄檗蛇衘各二兩苦竹葉二握細辛一兩每一服用藥二兩河水細細煎濃去滓須熱淋洗眼冷即再煖洗黄檗膏㸃方治風熱衝目多生眵䁾黄檗去粗皮一兩蕤仁半兩大棗青州者三枚劈三味以水三升同内瓷器中慢火煑至一升去滓取清再以淨瓷瓶子收每用銅筯㸃眼日五度眯目論曰眯目者簸糠飛塵等物入於目中也治宜亟出之久不出着於瞼眥因而傷動則為澁痛淚出古方初眯時令綿裹筯撩去之或以墨汁或以雞血浮出者皆良治雜物眯目不出方桑根白皮一味取新者一片如筯大削一頭薄椎令軟滑漸漸入目中撥之須㬰自出又方猪脂一分一味取塞鼻隨左右用之又方生粟米七夥一味爛嚼并唾洗之即出治雲母等入眼方好墨研為細末用新筆蘸㸃眼大小眥頭即時隨墨出又方雞肝中血少許取滴目中即出又方衣中白魚暴乾研為末㸃眥頭即出又方酥以少許内鼻中隨眯目左右垂頭臥少時令流入目中淚與眯物同出鍼眼論曰鍼眼者以邪熱摶於血脈上攻眼目發瞼眥結焮腫痛赤根白頭包裹膿汁痛如鍼刺治法當詳其外證隨宜砭刺决泄邪毒後以消毒敗熱之劑斷其根本半夏湯方治目熱客目眥結成腫泡俗呼偷鍼者半夏湯浸七徧去滑細辛各一兩前胡枳殻麩炒各二兩烏梅肉半兩毎服五錢水煎入生薑三片同煎食後臨臥温服芍藥湯方治熱毒攻目眥目腫起有膿汁者赤芍藥一兩半羚羊角𤣥參防風黄芩各一兩蔓荆實甘菊花各三錢每一次服五錢用白水煎膿入馬牙硝一錢俟食後臨卧時温服㸃眼蕤仁煮方治熱毒攻注目眥腫結赤痛蕤仁研去皮黄檗去麄皮青竹茹洗切秦皮各一兩梔子仁半兩剉碎拌匀以水三升入銅器中煑取一升以綿濾取清汁㸃眼日三五度耳病門耳統論論曰腎氣通於耳心寄竅於耳氣竅相通若牕牖然音聲之來雖逺必聞若心腎氣虚精神失守氣不相宣内外窒塞斯有聾聵之疾經所謂五臟不和則九竅不通是也耳聾論曰耳聾之證有二有腎氣虚精脱而聾者腎氣通於耳也有經脈氣厥而聾者經脈終於耳也腎虚而聾者其候面色黑氣厥摶於耳而聾者其候耳中煇煇焞焞或耳中氣滿是也煇煇焞焞過在手少陽耳中氣過在手太陽以至五絡皆㑹於耳中各有證候審而治之肉蓯蓉丸方治腎虚耳聾肉蓯蓉酒浸切焙兎絲子酒浸搗研白茯芩去黒皮山藥人參熟乾地黄桂去麄皮防風去义芍藥黄蓍半兩附子去皮臍羌活去蘆頭澤瀉剉各一分羊腎一對批去筋膜炙乾共為末鍊蜜和丸如梧桐子大每服三十丸空心温酒下山藥丸方治耳聾山藥熟乾地黄礠石煆醋淬七徧菊花炒黄蓍茯神去木木通各一兩升麻獨活各三分共為末鍊蜜和丸如梧桐子大每服二十丸米飲下加至三十丸礠石酒方治耳聾及耳鳴常如風水聲礠石搗研碎綿裹半兩木通菖蒲米泔浸一二日切焙各半斤共㕮咀以絹囊盛以好酒一斗浸寒七日暑三日每飲三合日再鐵酒方治耳聾鐵五兩酒一升燒鐵令赤投酒中去鐵飲之仍以礠石塞耳中菖蒲丸方治耳聾塞耳菖蒲木通礠石煆醋淬研乳香杏仁炒去皮尖松脂蠟各一分共研極細入鵝膏同搗一二百杵撚如棗核大以鐵穿中心作一孔子先挑耳令淨然後内藥耳中入再初著時痒及作聲勿怪治久耳聾方烏驢乳一合皂莢半兩為末蠟一兩相和於銚子内鎔成膏凝定即丸如棗核大用針穿透安耳中一宿至來日看之有物下來在耳門中即便取却再用一兩度即差又方治耳聾塞耳雄黄一分硫黄一分共研為末綿包裹一字於耳中即差治耳聾灌耳方鵝毛翎根筒七莖燈心七莖木通一兩地龍三條共相和燒灰研毎用半錢以生油調傾入耳中便用綿紙塞耳且側卧良久如此三度鯽魚膽膏方治耳聾滴耳鯽魚膽一枚烏驢脂少許生油半兩和匀内樓葱管中七日滴放耳内鵞膏方治耳聾滴耳鵝膏一合以少許滴耳中蟹汁方治耳聾滴耳生蟹二枚搗絞取汁以少許滴入耳中龜尿方治耳聾滴耳龜一味物合於中荷葉上養之專看葉上有尿收取滴耳中鼠膽方治耳聾灌耳䑕膽雄者取汁滴入耳内令透初益聾半日後便能聴雖久亦差蠟紙角方治耳聾蠟紙一張一物裁為四片每一片於筯上𦂳捲抽却筯以蠟紙捲子安耳中燃之待火欲至耳急除去當有惡物出在殘紙上日一角之角了以蠟塞定又方治耳聾以綿裹鐵内耳中隨耳左右口含礠石一塊即通風聾論曰風聾者本於足少陰經虚風乘之令氣脈不通風邪内鼓則耳中引痛牽及頭腦甚者聾閉不通故謂之風聾黄蓍湯方治風聾颼颼如風雨鐘磬聲或時出清水或有膿汁黄蓍一兩半附子去皮臍菖蒲米泔浸一宿各一兩木通二兩五味子防風各一兩半礠石醋淬七次三兩杜仲炒去粗皮𤣥參白茯芩熟乾地黄人參各一兩半毎服三錢生薑三片大棗一枚同煎空心温服日二魚腦膏方治風聾年久生鯉魚腦二兩當歸切焙細辛白芷附子去皮臍菖蒲各半兩共為末以魚腦置銀器中入藥在内微火煑候香去滓入瓷盒中候凝如棗核大綿裹塞耳中勞聾論曰勞聾者腎氣虚勞所致也足少陰腎經宗脈所聚其氣通於耳腎氣虚弱宗脈耗損則氣安得聰徹而不聵舊說謂因勞則甚要當節嗜欲慎起居無損腎臟為要内補丸治腎虚勞聾熟乾地黄附子去皮臍桂心去粗皮肉蓯蓉酒浸一宿鹿茸去毛酒浸酥炙人參各一兩山藥一兩半柴胡三分逺志半兩胡黄連一分白茯芩一分細辛鍾乳鵝管者二兩以甘草水煎三日研共為末再研匀鍊蜜丸如梧桐子大每服空心溫酒下二十丸内蓯蓉丸方治勞聾積久耳鳴肉蓯蓉酒浸一宿切焙附子去皮臍山茱茰炒乾薑桂心去粗皮巴㦸天去心熟乾地黄焙石斛去根澤瀉兎絲子酒浸一宿别研人參白茯芩蛇牀子炒牡丹皮當歸酒浸令潤細辛甘草炙菖蒲米泔浸一宿黄蓍遠志芍藥各一兩羊腎一對批去筋膜炙防風三兩除兎絲子外為末入兎絲子重羅鍊蜜丸如梧桐子大每服二十丸食後温酒下漸加至三十丸日三五聾論曰五聾不同曰風聾曰乾聾曰勞聾曰虚聾曰聤聾是也腎通氣於耳足小陰其經也經虚受風邪及勞傷血氣停滯津液皆能致聾惟所受不同故其證各異葛氏所謂風聾者痛掣乾聾者生耵聹勞聾者出黄汁虚聾者肅肅作聲聤聾者膿汁出可不辨哉黄蓍湯治五聾黄蓍一兩半附子一兩去皮臍菖蒲米泔浸宿一兩一木通一兩一分礠石醋淬七次二兩白茯苓五味子防風熟乾地黄𤣥參人參各一兩一分杜仲一兩去麄皮每服五錢生薑半分大棗二枚同煮温服續喫羊腎粥助之日四五服耳聾有膿論曰耳聾有膿者葢腎藏虚勞傷血氣與津液相搏熱氣乘之則結聚於耳中腐化膿汁氣不開竅則致耳聾禹餘糧散方治耳聾有膿禹餘糧煆醋淬一分烏賊魚骨去甲伏龍肝龍骨各半兩附子去皮臍一兩共為散每以一錢綿裹塞耳中日一易取差為度如有蟲加麝香一黑豆大一方加鐺墨半兩治耳聾有膿水不絶臰穢方肉蓯蓉一兩龍膽一兩白茅根一兩共燒為灰以少蜜和今匀後入鯉魚膽汁三枚攪令稀即以絹捩取汁􅅹入耳中其捩乾滓捻作挺子以薄綿裹塞耳不過三日上愈治腎熱耳聾有膿血溜日夜不止方鯉魚腦一枚鯉魚腸一其烏麻子一升先搗烏麻令碎入二味相和微火熬以煖布裏薄耳兩食頃開之當有白蟲出復更作藥若兩耳並膿分藥於兩耳中用若只一耳即於一面薄之不過三度差二聖散方治耳内出膿水白附子羌活各一兩為散用猪羊腎各一隻切開每隻入藥末半錢不得着鹽溼裹煨熟五更初温酒嚼下續喫粥壓速效散方治耳聾膿出久不差地龍一條入白葱管當門挂陰乾入麝香少許研為細散摻入耳内魚醋膏方治耳聾出膿或有蟲耳虚鳴論曰耳者心之寄竅腎氣所通也腑臟和平則其竅通而無礙腎氣既虚風邪干之復以思慮勞心氣脈内結不得疏通則耳内燂㷚與氣相擊而鳴或為鐘磬雷鼓或如蟬噪皆腎虚所致也礠石散方治腎氣虚弱氣奔兩耳作聲甚則成聾礠石煆醋淬七次熟乾地黄菖蒲米泔浸一宿牡丹皮白术各一兩白茯苓人參芎藭附子牡荆子炒桂心去麄皮大黄炒桑螵蛸切破炙當歸各半兩羊腎一對切去筋膜炙乾共為散每服一錢温酒調下日三加至二錢不拘時桑螵蛸散方治腎氣虚弱氣奔兩耳鳴甚則成聾桑螵蛸炙附子人參白茯苓當歸桂心各半兩牡丹皮白术炒熟乾地黄各一兩羊腎切去筋膜炙乾每服一錢空心食前温酒調下日三加至二錢鹿茸丸方治腎勞虚後耳常聞鐘磬風雨之聲補腎鹿茸去毛酒浸一宿酥炙礠石煆醋淬枳實麩炒各二兩附子去皮臍山藥肉蓯蓉酒浸切焙牡蠣煆各一兩半五味子巴㦸天各一兩楮實炒别搗末三兩共為末入楮實末同羅鍊蜜和丸如梧桐子大每服二十丸至三十丸空心牛膝酒下塞耳方治耳内晝夜虚鳴菖蒲烏頭去皮臍生用一兩為末綿裹半錢塞耳中再易之牛膝煑丸方治腎虚弱風邪干之上攻於耳常作蟬鳴以至重聴牛膝海桐皮二味各半斤搗末用好酒五斤于銀石器内熬成膏蘹香子炒當歸五加皮赤箭赤芍藥桂心去粗皮麻黄去根節地龍炒木香獨活乳香研防風骨碎補麒麟竭乾蠍炒去土沉香天南星生用各一兩附子去皮臍烏頭去皮臍棟實川芎各二兩虎腦骨四兩酥炙沒藥一兩麝香研半兩共研再入前膏内和搗三千杵丸如梧桐子大毎服十丸至十五丸空心温酒或鹽湯下耳耵聹論曰耳者腎之候心之寄竅風熱摶於經絡則耳中津液結聚如麩片之狀久則丸結不削或似蠶蛹致氣竅不通耵聹為聾豬脂膏方治耵聹塞耳聾强堅不可挑塞耳生豬脂一合釡下墨半兩研調和成膏揑如棗核大綿裹塞耳中地龍汁方治耵矃塞耳聾强堅不可挑灌耳地龍溼者五七條取汁數滴入耳中挑即自出聤耳論曰腎氣通耳耳者腎之候若其經為風邪所乘毒氣藴結於耳中以至膿汁俱出妨悶疼痛謂之聤耳白斂散方治聤耳出膿血塞耳白斂黄連龍骨赤石脂烏賊魚骨去甲各一兩為散先以綿拭乾用藥一錢綿裹塞耳中鯉魚腸方治聤耳出膿久不差者鯉魚腸一具細切醋三合合搗布裹棗核大塞耳半食頃痛即有蟲出著布即拔之更易新者蟲盡為度附子散方治聤耳耳中痛附子去皮臍一分黄連半兩為散以少許摻耳中又方治聤耳塞耳母鼠肝一具旋取活鼠乘肝熱時以棗核大塞耳中治聤耳方石首魚腦中枕子為末摻耳中即差百蟲入耳論曰百蟲入耳其類不一古方或灌以藥或導以物皆以意出之也獨驢乳牛酪二物最為良法諸蟲之入耳灌之即化為水其入腹者則連服數劑取差灌耳牛乳方治蚰蜒入耳牛乳一盞少少灌入耳内即差若入腹者飲一二升當化為黄水出未出再服塗耳百部方治蚰蜒入耳百部切焙為末以一字生油調塗於耳門上其蟲自出胡麻枕耳令出方治蚰蜒入耳胡麻半升炒令香碎研以葛袋盛側臥枕耳豬肉掩耳方治蜈蚣入耳豬肉一兩片炙令香掩耳上立出鯪鯉甲方治蟻入耳鯪鯉甲半兩燒為灰以水調濾過滴入耳中即出豬脂枕耳方治蟻入耳豬脂一片豬肉一片將豬脂煮豬肉令香安耳孔邊枕睡即出蜀椒醋灌耳方治百蟲入耳蜀椒半兩為末醋半盞以椒末入醋中少灌入耳内行一二十步即出葱油枕睡方治百蟲入耳油麻一升炒研令煙出葱白一莖切炒令香將葱與油麻拌匀以缾子盛當耳門安側睡令缾口向耳無令傾蟲從耳中出至缾子内即去之又方以火照之即向明出擊刀方治百蟲入耳以刀口於耳上相擊作聲蟲即出也治百蟲入耳方雄雞冠血不拘多少滴耳内立出治蜈蚣入耳閉氣令出方閉氣氣滿即吐復閉取令出或死耳中徐徐以物鉤出之若積久不出者取新熱猪肉安耳竅上即出治飛蛾入耳法先大吸氣仍閉口掩鼻呼出氣蟲即隨氣出又方以雞肉塞耳中立出鼻病門鼻病統論論曰肺為五臟華葢開竅於鼻肺氣和則鼻亦和肺氣感風冷則為清涕為齆為息肉為不聞香臭肺實熱則為瘡為痛膽移熱於腦則濁涕不已謂之鼻淵惟證候不同故治􅓼亦異鼻塞氣息不通論曰鼻塞氣息不通者以肺感風寒其氣摶結不得宣快窒塞既甚而息不能出入也巢氏謂息肉生長致氣塞不通蓋有未嘗生息肉而氣息不通者宜析而治之人參湯方治肺風上攻鼻塞不通人參白茯苓陳橘皮去白蜀椒去目并合口者妙麻黄去根節黄芩羌活各半兩每服三錢水煎食後温服杏仁煎方治肺傷寒氣欬嗽唾痰聲重鼻塞補肺杏仁去皮尖雙仁二兩研棗肉煑去皮核一升白蜜生薑汁酥各半升餳一升同合和於銀器中微火煎候熟服一匙頭温酒調下食後人參丸方治肺風上攻鼻塞不通人參防風細辛黄蓍沙參甘菊花炒木通各半兩共為末鍊蜜丸如梧桐子大每服十丸温水下日再木通膏方治鼻窒塞不通利木香細辛當歸川芎木通蕤仁研白芷各半兩共細剉内銀石器中入羊髓㣲火煎候白芷色黄膏成去滓澄清凝每用小豆大内鼻中日再以差為度鼻塞不聞香臭論曰鼻有息肉不知香臭者亦有無息肉而不知香臭生息肉不知香臭已例方濟此姑論鼻塞不聞香臭葢鼻之窒塞或冷風乘或肺壅熱冷熱故異其塞則一皆肺臓不和氣不宣通也治塞者當審其冷熱天門冬丸方治鼻塞不聞香臭天門冬白茯苓各五兩人參枳實炒甘草炙各三兩檳榔二兩共為末鍊蜜和丸如梧桐子大每服二十丸食後漿水下日再暑月以牛乳下通氣膏方治鼻中不利窒塞不通不聞香臭木通當歸川芎蕤仁桂心各半兩細辛白芷共細剉與羊髓三兩同於銀石器中微火煎至白芷黄色去滓澄凝毎取小豆大塞鼻中日再芎藭散方治鼻塞不聞香臭芎藭辛夷各一兩細辛三分木通半兩每用少許綿裹塞鼻中溼即易𤓰蔕散方治鼻塞不聞香臭𤓰蔕藜蘆各一分每用一錢綿裹塞鼻中日三易齆鼻論曰鼻和則知香臭夫鼻為肺之竅非能自和也必肺氣流通然後鼻為用而香臭可知若心經移熱于肺致肺臟不和則其竅亦無以宣達故為齆鼻此乃内經所謂心肺有病則鼻為之不利也黄蓍散方治齆鼻順肺氣四時服食黄蓍人參防風防己生乾地黄桔梗炒芍藥黄芩澤㵼石南葉白术米泔浸一宿炒桂心去粗皮甘草炙牛膝酒浸一宿赤茯芩紫苑各三兩共為散每服一錢温酒調下如要丸鍊蜜丸如梧桐子大毎服三十丸温酒下雄黄丸方治齆鼻雄黄一錢甘草炙附子去皮臍細辛各一分為末用羊膽汁和丸如棗核大以綿裹内鼻中移時出惡物即差細辛散方治齆鼻不聞香臭宜塞鼻細辛甘草炙附子去皮臍木通各一分為散以羊膽汁和如棗核大塞鼻中治齆鼻法伏面臨牀以新汲水淋玉枕上即差治齆鼻吹鼻皂莢一挺炙去皮子為散以一字吹入鼻中即差鼻中生息肉論曰鼻者肺之竅鼻和而知香臭風寒客於肺經則鼻氣不利使津液壅遏血氣摶結附著鼻間生若贅疣有害於息故名息肉羊肺散方治鼻中息肉羊肺一具切去筋膜炙乾木通半兩白术米泔浸一宿炒黄四兩乾薑半兩肉蓯蓉酒浸一宿半兩川芎半兩為散每服一錢食後米飲調下日二礬石丸治鼻生息肉礬石熬令汁枯四兩木通細辛各半兩丹砂研一分共為末麪糊和丸如小豆大每用一丸綿裹内鼻中一日一易取下息肉止胡粉膏方治鼻中息肉不通𫝊鼻胡粉炒白礬燒令汁盡各等分為末用青羊脂和成膏以少許塗𫝊息肉上鼻淵論曰内經謂膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也夫腦為髓海皆藏至陰故藏而不瀉今膽移邪熱上入於腦則陰氣不固而藏者瀉矣故腦液下至滲於鼻其證濁涕出不已若水之有淵源也治或失時𫝊衂衊瞑目之患防風散方治腦熱鼻淵下濁涕不止防風一兩黄芩人參甘草炙川芎天門冬各一兩為散每服二錢食後沸湯調下日三雞蘇丸方治腦熱肺壅鼻淵多涕雞蘇葉乾者麥門冬桑根白皮川芎黄蓍炙甘草炙各一兩生乾地黄二兩為末鍊蜜和丸如桐子大每服二十丸食後臨卧人參湯下辛夷膏方治肺熱鼻塞多涕辛夷一分白芷三錢藁本甘草當歸細剉以清酒二盞羊髓十兩銀器内微火煎五七沸傾入盒中澄凝每取一豆許内鼻中日夜各一服鼻流清涕論曰五臓化液遇熱則乾燥遇寒則流行鼻流清涕至於不止以肺臟感寒寒氣上達故其液不能收制如此且涕泗洟皆鼻液也以繼泣則曰涕以生於肺則曰泗涕甚曰洟此獨言涕與宣明論五臓化液肺為涕同意細辛丸内鼻方治腦冷鼻塞時出清涕細辛桂心甘遂炒芎藭附子各一分辛夷半兩木通二兩為末鍊蜜丸如棗大以綿裹内鼻中勿令氣泄覺小痛搗生薑汁和撚即愈一方用狗膽和丸芎藭膏方治鼻塞多清涕芎藭呉茱茰炒湯浸蜀椒去目炒細辛乾薑皂莢去皮子各三分細剉以醋浸一宿内猪脂於銀器石器中煎五七沸去滓頃入盒中澄凝以綿裹少許内鼻中黄連汁方治鼻塞多年清水出不止灌鼻黄連去鬚二兩蒺藜苗二握細剉水二升煎至一升取一合灌鼻中不過再灌大嚏即差蒺藜汁方治鼻塞清水不止灌鼻蒺藜一握細剉以水三盞煮至一盞去滓仰面先滿口含飯取汁一合灌鼻中不過再灌嚏出息肉差鼻中生瘡論曰心肺有病鼻為之不利葢心肺在膈上肺開竅於鼻心肺壅熱氣熏於鼻間藴積不散其證乾燥而痛甚則成瘡也惟能平調心火以利肺經則瘡可已升麻湯方治鼻乾痒生瘡乾嘔不下飲食升麻桔梗黄芩犀角貝母去心龍膽各半兩甘草炙一分每服三錢水煎食後温服不拘時硫黄膏治面瘡鼻頭赤爛硫黄研細一錢以葱白三寸入童便二合浸一宿研絞取涎和末如膏塗上不見風日二梔子煎方治肺氣風熱鼻内生瘡山梔子去皮榖苦參木通各三兩細剉以四兩酥同煎令香去滓頉入盒中毎以少許滴入鼻中礬石煎方治鼻中熱氣生瘡有膿殠兼有蟲礬石一兩枯苦參生地黄洗令浄絞取汁三合二味為末以地黄汁并水二盞煎至三合綿裹去滓少吹滴鼻中三五度差黄檗飲方治鼻中熱氣生瘡有膿殠兼有蟲黄檗二兩以冷水浸二宿絞取汁一盞服之疳蟲蝕鼻生瘡論曰五臟皆有蟲蟲得風則化肺開竅於鼻肺經既虚風熱乘之鼻氣壅塞不得宣通則疳蟲因得浸蝕瘡生鼻間治鼻中疳瘡方牛鼻津取塗瘡上椿根湯方治疳蟲蝕人口鼻椿根切一升去皮鹽半合葱白切半升豉半升椒一合去目合和以醋及清泔各三升同煎數十沸去滓約及一升分作三服有惡物出小兒量加減如聖散方治疳蟲蝕鼻生瘡及鼻下赤爛胡粉半兩麝香研一字甜𤓰蔕七枚為末粉内同研合研匀用蟾酥少許水浸一宿次日取蟾水先和粉次同和丸如菉豆大毎用二丸水化傅瘡上鼻下赤爛者亦塗之小兒每用一丸青金散方治疳蟲蝕鼻生瘡及鼻涕淹漬銅青白礬生研各等分同為散每用少許傅瘡上小兒亦可用聖濟總録纂要卷十八
