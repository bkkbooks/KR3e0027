body:
  text: 聖濟總録纂要卷一休寧程林纂諸風門諸風統論論曰易曰撓萬物者莫疾乎風夫以吹噓鼓舞巽而易入枯者榮者成物之功實在於是然而分四時位八方適應其時則為正弗循其方則為邪人惟萬物之靈能察諸此觀冬至之日有從南方來必曰賊風其他可類推矣感之淺者留於肌膚感之深者達於骨髓而况倉卒頃刻之間大可畏懼因有治􅓼所不逮者蓋禍患之機藏於細微非常人所豫見及其著也雖智者不能善其後是以上古聖人之教下皆謂之虛邪賊風避之有時不然何以言風者百病之始風者百病之長風者善行而數變先聖之言可深思之中風論曰風邪中人以春甲乙得之為肝風以夏丙丁得之為心風以季夏戊巳得之為脾風以秋庚辛得之為肺風以冬壬癸得之為腎風若中其五臟六腑之俞則各隨其證而治之人生自幼稚至於老耄率多因風而致疾或嗜食傷飽或不食失飢或渴而失飲或飲而過量或因五味之傷或冒熱衝風或大寒近火或暴露寒溼或刺損肌膚撲傷肢體或失節宜或多嗜欲緣此風趨諸竅或留一偏遂使手足不隨言語蹇澀或痛連骨髓或痺襲皮膚瘙癢如蟲行􅍙痺如錢石或多痰好睡或健忘多嗔血脈不行肉色乾瘦久在牀枕起便須人語澀面浮精神困耗皆其證也附子湯方治中風欲死身體緩急目不得開舌強語澀附子破去皮臍製一枚芍藥甘草麻黃去根節先煎掠去沫焙白术各一兩防風去義防己各一兩半人參黃芩去心桂去皮獨活去蘆芎藭各一兩天雄炮製去皮臍一枚右一十三味銼如麻豆每服五錢匕水一盞半入生薑半分切煎至八分去滓空心日午夜臥各溫服如人行五里以熱生薑粥投之微汗出慎外風麻黃湯方治中風肢體弛緩言語蹇澀精神昏憒麻黃去根節先煎掠去沫焙三兩桂去粗皮獨活去蘆羚羊角鎊各三分萎蕤切焙一兩葛根銼三兩升麻防風去義各兩半石膏碎六兩甘草炙銼三分右一十味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服如人行五里再服用熱生薑稀粥投汗出慎外風薏苡仁湯方治中風肢體緩縱精神恍惚言語蹇澀薏苡仁炒五兩萎蕤切焙茯神去木各三兩犀角鎊二兩烏梅七枚去核麥門冬去心焙三合右六味粗搗篩每服五錢匕水一盞半入生薑半分切煎至八分去滓入竹瀝白蜜各少許再煎三五沸食後日午夜臥各一服吐痰白礬散湯治初中風失音不語昏昧不知人先宜吐風痰令省覺次可服諸湯散白礬二兩生用生薑一兩連皮搗碎水二升煎取一升二合右二味先細研白礬如末入濃煎生薑湯研濾分三服旋旋灌須臾吐出痰毒眼開風退方可救治若氣衰力弱不宜猛性藥吐之防風湯方治中風不語兩目不開手足抽掣發歇往來昏塞涎潮防風去義羚羊角鎊獨活去蘆赤箭即天麻苗無以天麻代之當歸切焙麻黃去根節杏仁湯浸去皮麩炒桂去皮各一兩前胡去蘆秦艽去苖甘草各半兩右一十一味粗搗篩每服四錢匕以水一大盞生薑半分切煎至七分去滓不計時溫服取涎丸方治中風不語喉中如拽鋸口中沫出天南星大者一枚去浮皮剜中作坑入醋令八分滿四面用火逼醋乾黃色銼藜蘆一分右二味搗研為末用麵糊丸如桐子大每服三丸溫酒下良久吐出痰涎為效吐不止用冷蔥湯呷即止羚羊角丸方治中風手足􅍙痺行履艱難羚羊角屑桂去粗皮白檳榔煨銼五加皮銼杏仁去皮尖炒黃人參丹參柏子仁枳殼去瓤焙炒附子製炮去皮臍各兩半茯神去木防風去義熟乾地黃焙麥門冬去心焙各二兩南木香牛膝酒浸切焙各一兩薏苡仁二兩半右一十七味搗羅極細鍊蜜為丸梧桐子大每服空心溫酒下三十丸日二卒中風論曰內經謂邪風之至疾如風雨言邪之迅速如此卒中風之人由陰陽不調腑臟大虛氣血衰弱榮衛乏竭故風之毒邪尤易乘間致仆倒悶亂語言蹇澀痰涎壅塞肢體􅍙痺不識人事者此證也奪命散方治中風卒倒不省人事口面喎斜失音不語但吐涎沫或口噤不開目昧垂死一切風疾黑豆一合烏雞糞馬牙硝研龍膽去蘆頭銼碎一分共四味先將雞糞及豆同炒熟次入龍膽馬牙硝拌勻以酒三盞煎二盞去滓分三服不拘時候溫服救生散方治卒中風白礬半夏天南星三味等分同為細散每服以好酒一鍾藥末二錢匕生薑三片煎七分通溫灌之當吐涎抹令正坐經一復時不得令臥如臥則涎難出良久再依法煎藥一錢後常服只半錢䈽竹瀝飲方治卒中風倒悶口噤不能語昏不知人針不知痛䈽竹瀝五合防風甘草桂各一兩防己麻黃白术人參黃芩細辛茵芋秦芃去土附子去皮臍各一兩生薑焙乾三兩除竹瀝外銼麻豆每服五錢匕水一鍾半竹瀝一合同煎至一盞去滓溫服不拘時羌活湯方治卒中風悶亂語言蹇澀牙關緊急羌活桑根白皮麻黃天雄去皮臍當歸各二兩桂旋復花炒逺志各一兩大腹皮甘草芎藭威靈仙枳殼去瓤麩炒菖蒲各一兩杏仁湯浸去皮二十一枚銼如麻豆每服五錢匕水一盞半入生薑三片煎至八分去滓溫服不拘時阿膠丸方治腑臟久虛氣血衰弱卒中風邪及攤緩等疾阿膠炙令燥蟬殼去土犀角屑麝香三錢白花蛇三分桂一兩白鮮皮白殭蠶炒天南星半夏酒浸三日麩炒天麻桔梗黃茋當歸羌活虎頭骨酥炙海桐皮白芷白茯苓附子去皮臍防風芎藭麻黃各一兩乾蠍去尾用糯米炒四十二枚人參沒藥各半兩木香一兩羚羊角屑半兩乾薑四錢烏蛇酒浸去皮骨三分共細銼焙乾搗為末鍊蜜為丸如彈子大每服一丸生薑酒嚼下中風甚者拗開口或先以藥喋化藥灌下一丸立省牛黃丸方治卒中風仆倒悶亂語言蹇澀涎痰壅盛牛黃盧會天竺黃血竭沒藥丹砂俱研續隨子皂莢灰各半兩丁香木香乾蠍去土炒粉霜雄黃甘遂各一分麝香二錢肉豆䓻二枚檳榔二枚龍腦一字共搗研為末每抄藥末四錢入輕粉三錢再研勻麵糊為丸如黍米大每服五丸金銀薄荷湯下隨大小加減一方添天麻一兩酒浸炙為末研勻丸如小彈子大凡中國用冷水化下一丸立效些小風寒每服半丸小兒驚風一丸分作六服並用冷水化下與後牛黃丸并局方牛黃丸不同肝中風論曰內經謂以春甲乙中風為肝風肝風之狀多汗惡風善悲嗌乾善怒時憎女子者有頭目瞤兩脅痛行常傴僂嗜甘如阻婦狀者有但踞坐不得低頭兩目連額色微青唇青面黃者治法宜炙肝腧後以藥治之排風羌活散方肝臟中風筋脈拘攣疼痛羌活去蘆頭一兩半天麻二兩芎藭一兩酸棗仁炒一兩半薏苡仁一兩鹿角膠炙燥一兩蔓荆實去皮三分羚羊角鎊一兩半桂一兩人參一兩白附子製一兩牛膝酒浸焙二兩烏蛇三寸酒浸炙用肉犀角鎊三分白鮮皮銼一兩地骨皮銼一兩柏子仁一兩五錢生用右一十七味搗羅為散以豆淋酒調下一錢匕漸加至二錢匕日三夜一升麻湯方治肝虛中風頭痛目眩胸中客熱氣壅衝心煩悶升麻前胡去蘆頭各一兩五錢玄參地骨皮各一兩羚羊角屑葛根各二兩酸棗仁一兩右七味粗搗篩每服五錢匕以水一盞半煎至八分去滓入竹瀝半合重煎三兩沸放溫食後服如人行五六里更進一服心中風論曰心中風之狀多汗惡風焦燥善怒嚇赤色病甚則言不快診在口其色赤夫心受風風盛則生熱熱甚則汗不止心之液為汗故也汗多則腠理疏疏則真邪相薄是以惡風又心惡熱熱極則脣焦內燥多怒心之聲為言病甚則言不快心氣通於舌故也又其證胸背拘急不可傾側面赤頭痛熻熻發熱不能安臥以心主血脈其風日久隨榮衛行內外相搏藴積而然也辰砂天麻丸方鎮養心神擒截諸風和流榮衛滋潤筋絡開通關膈肥密表腠丹砂半兩天麻一兩半夏湯煮軟焙乾天南星各半兩蠍稍一分炒白附子半兩白殭蠶炒牛黃研各半兩蓬砂一分研入麝香一分研入共為末水煮麵糊為丸如梧桐子大每服三十丸荆芥湯下不計時候烏犀散方治心中風精神冒悶語聲錯誤恍惚多驚烏犀角鎊二兩丹砂研獨活去蘆頭丹參逺志去心人參蔓荆子防風共搗羅為散每服二錢匕食後酒調下日三人參丹砂丸方治中風恍惚驚悸安神志化痰涎人參丹砂研各二兩紫石英研白石英龍腦細辛去枝葉赤箭天門冬去心焙逺志去心生乾地黃焙菖蒲九節者米泔浸切焙各一分白茯苓去皮三兩犀角鎊沙參防風去義各半兩麝香研半分共搗研為末鍊蜜丸如小雞頭大每服一丸溫酒嚼下不拘時候脾中風論曰脾風之狀多汗惡風身體怠惰四肢不欲舉色薄微黃不嗜食診在鼻上其色黃又曰踞而腹滿身通黃吐醎汁又曰熻熻發熱形如醉人腹中煩重皮肉瞤動短氣脾裨諸臟灌四旁者也所主四肢故脾中風則身體怠惰四肢不欲動脾者倉廩之官故病則不嗜食診在鼻中央之位也其色黃黃土之色也煩重發熱風之候也形如醉人者邪氣之甚也獨活湯方治脾臟中風肢體緩弱言語不利熻熻發熱獨活麻黃去節先煎掠去沫焙乾防風去義各一兩白茯苓去皮人參羚羊角鎊前胡去蘆頭沙參去蘆頭旋復花黃茋半夏湯洗七遍切焙附子炮製去皮臍三分甘草炙半兩共銼如麻豆每服三錢匕以水一盞半入生薑汁半分切同煎取七分去滓溫服不拘時日三秦艽湯方治脾臟中風身體拘急舌強不能語秦芃去苖土麻黃去根節沸湯掠去沫焙乾石膏各一兩獨活赤茯苓去皮山茰芎藭防風桂白术人參防己附子炮製去皮杏仁去皮尖麩炒各三分乾薑甘草炙細辛去苗葉各半兩共銼如麻豆每服五錢匕水一盞半煎取八分去滓溫服不拘時候羚羊角丸方治脾臟中風口面偏斜語言蹇澀虛煩手臂腰腳不隨羚羊角屑防己白芍藥獨活去蘆頭白茯苓去黑皮防風酸棗仁微炒杏仁去皮尖雙仁炒黃麥門冬去心焙各三分人參芎藭柏子仁炒檳榔銼桂去粗皮當歸切焙各半兩附子薏苡仁熟乾地黃焙各一兩共搗羅為末鍊蜜和丸如梧桐子大每服空心溫酒下三十丸肺中風論曰肺中風之狀多汗惡風色皎然白時咳短氣晝日則差暮則甚診在眉上其色白又曰燥而喘身運而重冒而腫脹偃臥則胸滿短氣冒悶汗出夫熱生風風盛則熱腠理開多汗者熱甚故也風薄於內所以惡風皎然而白金之色也在變動為咳又肺生氣故時咳短氣也風陽也陽晝則在表暮在裏陽裏而風應之故暮則甚也診在眉上其色白肺之色也身運而重風使然也喘而腫脹偃臥而胸滿短氣以肺主氣故也羚羊角丸方治肺中風氣急背項強鞭語聲嘶敗羚羊角二兩白鮮皮五錢升麻蔓荆實惡實炒枳殼一兩天麻白者秦芃共搗羅為末鍊蜜和丸如梧桐子大食後煎桑白皮湯下十五丸日三服薺苨湯方治肺中風項強鼻塞語聲不出喘鳴肩息胸滿短氣薺苨二兩防風人參各一兩五錢獨活細辛赤箭芎藭羚羊角各五錢麻黃二兩桔梗銼炙三分前胡去蘆頭蔓荆實白鮮皮各五錢甘草石膏各一兩共細搗篩每服三錢匕水一盞煎至七分去滓溫服食後臨臥服腎中風論曰腎風之狀多汗惡風脊痛不能正立其色炲隱曲不利診在肌上其色黑夫身之本在腎受五臟六腑之精氣以養百骸九竅腎受風則諸陽之氣不上至於頭面故有面痝然浮腫之證陽氣虛者則多汗惡風腎主骨骨不強則脊痛不能立精神衰弱則隱曲之事不利肌上黑如炲色又踞而腰痛不可俯仰或為冷痺或為偏枯耳鳴聲濁志意昏沉善恐多忘皆腎風證也海桐皮散方治腎中風踞而腰痛腳腫疼重耳鳴面黑志意不樂海桐皮銼五加皮去粗皮銼蓽薢炒薏苡仁各一兩虎骨真酥炙令黃枳殼赤芍藥牛膝去苖酒浸切焙各一兩惡實炒半兩防風續斷杜仲去皮銼炒郁李仁湯退去皮尖雙仁炒熟乾地黃各一兩共搗羅為散每服二錢匕溫酒調下漸加至三錢匕空腹食前各一服杜仲丸方治腎中風腰腳不隨骨節痠疼筋脈拘急行履艱難兩脅牽痛杜仲去皮銼炒三分牛膝去苖酒浸切焙一兩蓽薢一兩半酸棗仁一兩當歸三分防風一兩丹參三分赤芍藥三分桂半兩肉蓯蓉酒浸切焙一兩石斛三分附子五錢郁李仁湯浸去皮三分檳榔煨一兩共搗羅為末鍊蜜和丸如梧桐子大每服空腹用溫酒下三十丸防風湯方治腎中風腰腳􅍙痺不仁骨髓痠疼不能久立漸覺消瘦防風一兩五錢羌活一兩黃茋二兩五錢五加皮一兩五錢牛膝去苗酒浸切焙一兩五錢丹參一分酸棗仁一合桂一兩五錢赤芍藥一兩五錢麻黃去節煎掠沫焙一兩檳榔煨一兩當歸切焙一兩木通一兩五錢共粗搗篩每服三錢匕水一盞至七分去滓空心服及晚食前服石斛浸酒方治腎中風注腰腳痺弱利關節堅筋骨除頭面逰風補虛勞益氣力石斛去根苗四兩黃茋一兩五錢丹參二兩牛膝去苗二兩人參一兩五錢杜仲去粗皮炒五加皮白茯苓各二兩枹杞子炒一升半山茱茰山藥蓽薢炒各二兩防風一兩五錢天門冬去心焙三兩生薑三兩細辛去苖葉輕炒一兩薏苡仁半升共細銼如麻豆用生絹囊盛以酒五斗於淨瓷器中浸七宿初溫服三合日三夜一漸加至六七合一升許令常有酒氣不至大醉攤緩論曰攤緩之辨攤則懈惰而不能收攝緩則弛縱而不能制物故其證四肢不舉筋脈關節無力不可收攝者謂之攤其四肢雖能舉動而肢節緩弱慿物不能運用者謂之緩或以左為攤右為緩則非也但以左得之病在左右得之病在右耳推其所自皆由氣血內耗肝腎經虛陰陽偏廢而得之或有始因他病服吐下之藥過度亦使真氣內動榮衛失守一身無所稟養而致然也紫金天麻丸方治中風攤緩手足嚲曳天麻沒藥研乳香研牛膝酒浸白术當歸各半兩牛黃研三分犀角一兩附子去皮臍三分五靈脂二兩共十味為末取三家井華水丸如櫻桃大每服一丸先用生薑汁花開次用酒調下如中風攤緩手足嚲曳蹇澀口眼喎斜不省人事口吐涎沫或手足搐掉骨筋疼痛皮肉麻痺並宜服之天麻浸酒方治攤緩風不計深淺久在牀枕天麻半兩松節銼一兩龍骨虎骨酒浸骨碎補半兩敗龜醋炙一兩烏蛇酒浸去皮骨白花蛇酒浸去皮骨惡實根各半兩附子去皮臍一枚羌活獨活去蘆頭牛膝酒浸各半兩當歸芎藭各一兩大麻仁二兩熟乾地黃焙半兩茄子根二兩原𧖟沙炒二兩共十九味㕮咀如麻豆用酒二斗浸蜜封春夏三日秋冬七日每服一盞不拘時候溫服虎骨丸方治攤緩風手足不隨口眼喎斜頭目昏重腹膝少力及風氣凝滯筋骨疼痛虎脛骨酥炙半兩當歸一兩赤箭半兩安息香酒研半兩海桐皮獨活牛膝酒浸各一兩肉蓯蓉酒浸一兩金毛狗脊去皮續斷各半兩蓽薢烏頭去皮臍芎藭各一兩甜瓜子仙靈脾乳香研各半兩防風天麻石斛去根各一兩酸棗仁去皮研黃松節酒炒細辛各半兩共二十二味除别研外為末酒煮麵糊丸如梧桐子大每服十五丸酒下或荆芥湯不拘時天麻丸方治風氣攤緩等疾天麻二兩玄參防風地榆乾浮萍紫背者洗焙乾薄荷烏頭去皮臍牛膝酒浸各一兩不蚛肥皂莢五挺就地坑內燒成黑灰瓷碗合定侯冷用半兩細研入諸藥牛黃龍腦各一錢别研共十一味除别研外為細末和勻鍊蜜和杵百餘下丸如雞頭大每服一丸溫酒下牛黃丸方治一切風及攤緩言語蹇澀搜風鎮心牛黃一分龍腦一錢麝香一錢雄黃一分丹砂五分五味同研天麻烏犀乾蠍去土炒羚羊角鎊羌活獨活防風細辛白芷赤茯苓蟬蛻麻黃去根節牛膝酒浸芎藭五加皮各半兩白附子炮一分烏蛇酒浸去皮骨炙一兩共二十二味研為末鍊蜜和杵一千下丸如雞頭大每一丸嚼破溫酒或荆芥茶下日三沉香煎丸方治攤緩不收體重無力肢節緩弱運動不能沉香丁香葫蘆巴炒附子去皮臍牛膝去苖銼酒拌炒補骨脂炒蘹香子石斛銼酒拌炒芎藭木香青橘皮湯浸去白桂去粗皮肉蓯蓉酒炒各半兩共十三味搗羅為細末鍊蜜為丸如梧桐子大每服二十丸生薑鹽湯下酒亦可風嚲曳論曰人假水穀之精化為血氣周流一身使四肢相隨筋脈相續猶挈裘領無所不從若脾胃虛弱水穀不化筋脈無所稟養復遇風邪外搏膚腠流傳筋脈縱緩則肢體嚲曳其嚲則偏而不舉曳則弛而不隨是皆不能收攝也獨活湯方治中風手足嚲曳不能言獨活二兩甘草炙桂生葛根芍藥栝樓根實各一兩右六味銼如麻豆每服五錢生薑三片同煎溫服日三夜一敗龜丸方治中風手腳顫掉嚲曳敗龜塗酥炙五兩一味為細末研飯為丸如梧桐子大每服二十丸酒下附子湯方治風嚲曳手足不隨身體不能俯仰附子去皮臍乾薑甘草炙防風獨活各一兩半石膏碎白茯苓白术芎藭柴胡當歸酒浸人參各一兩杏仁去皮尖雙仁炒研二十枚細辛一兩共十四味銼如麻豆每服五錢水酒共煎溫服日三人羸弱者只用水煎服羚羊角丸方治中風手顫嚲曳語澀羚羊角一兩犀角三分羌活防風各一兩半薏苡仁秦芃各二兩右六味為末鍊蜜丸如梧桐子大每服十丸煎竹葉湯下加至三十丸中風四肢拘攣不能屈伸論曰臟真散於肝肝藏筋膜之氣筋為肝所養筋得所養則俯仰屈伸莫或乖戾若經絡偏虛風邪乘虛客於機關則筋脈縮急干於陽絡則肩背從而拘攣此皆邪氣內盛正氣不能榮養諸筋故為四肢拘攣不能屈伸夜合枝醖酒方治中風手足不隨攣縮屈伸艱難夜合枝桑枝槐枝柏枝石榴枝各生用荆五兩羌活别杵二兩糯米五升細麴七斤半防風别杵五兩黑豆用緊小者生用五升共十味以水五斗浸五枝同煎取二斗五升去渣浸米黑豆一宿蒸熟與麴防風羌活二味拌和造酒依常醖法封三七日壓去糟滓取清酒三合至五合時飲之常令有酒氣物令過醉恐至吐悖亂正氣乳香丸方治中風四肢拘攣筋骨疼痛乳香細研一兩烏頭去皮臍半兩羌活一兩雄黃細研水飛半兩白附子羚羊角各一兩附子去皮臍半兩原蠶蛾炒防風烏蛇酒浸去皮骨炙白殭蠶炒虎脛骨各一兩膩粉麝香各三分赤箭牛膝酒浸沒藥研各半兩右十七味為末再同和勻鍊蜜丸梧桐子大每服用豆淋酒下十丸如人行十里再服地龍餅子方治中風手足筋急攣疼痛地龍炒海蛤硫黃研烏頭去皮臍各半兩鱗鯉甲各一兩五味同研為末醋煮麵糊為丸如雞頭揑作餅子暴乾每用一餅以蔥白裹安手足節上以手帛繫住閣在一朽木桶上用熱湯淋之候覺骨中熱極方解去帛子後看手足未得舒展時再用熱湯淋之每一餅可用三次如用藥畢且著衣服蓋之不得透風酸棗仁煎方治筋骨拘急及軟疼痛行履不得酸棗仁三兩半生半炒虎骨酒炙一兩半海桐皮羌活各二兩仙靈脾赤箭蓽薢杜仲去粗皮炙斷絲敗龜酒炙蒺䔧子石斛牛膝酒浸巴戟天附子去皮臍木香熟乾地黃酥各一兩桑枝一握一尺長白蜜四兩共十九味搗羅十七味為末再研勻用清酒七升先煎桑枝令黃色去桑枝後下藥末更煎一二十沸次下酥蜜煎成膏看香氣得所用瓷盒盛每服一匙頭溫酒調下日三服風痙論曰風痙者以風傷太陽之經復遇寒濕故也其狀口噤不開腰背強直如發癎蓋風邪內薄於經則榮衛凝泣筋脈緊急故令口噤不開卒然倒仆不知所以凡發極則復蘇蘇則復作其或耳中策策而痛身背直而不屈者不治也天麻湯方治風痙身如板直遍身鞭強天麻半兩羌活人參桂去粗皮白术麻黃去根節煎掠去沫焙乾杏仁去皮尖雙分仁炒各一附子去皮臍一枚八味銼如麻豆每服五錢生薑三片棗一枚同煎再入酒半盞煎熱服後以生薑稀粥投之取汗日三甘草湯方治風痙口噤不語肢體強直神識不明甘草炙羌活一兩一分人參半兩防風一兩附子半兩每服四錢入地黃汁一合煎再入荆瀝竹瀝各半合同煎溫服日夜各一角弓反張論曰風角弓反張之狀腰背反折不能俯也中風邪客於諸陽之經邪正相搏風氣勝則筋脈縮急腰背反折如弓之形也麻黃飲方治中風身如角弓反張四肢不隨煩亂口噤麻黃去根節三兩防風桂白术人參芎藭當歸甘草炙乾薑各一兩附子一兩杏仁去皮尖雙仁三十枚每服五錢水煎溫服不拘時當歸湯方治中風身如角弓反張口噤不開當歸細辛各三分防風獨活各一兩半麻黃去根節一兩一分附子一枚去臍每服三錢水酒同煎溫服如汗出慎外風若口噤即幹開口灌之急風散方治中風身如角弓反張狀附子一枚去皮臍烏頭二枚去皮臍天南星一枚藿香去梗防風白芷各半兩乾蠍全者去土炒白附子各一分共八味為散每服半錢豆淋溫酒調下併二服未愈再服中風失音論曰喉嚨者氣之所上下也會厭者聲音之門户其氣宣通則聲音無所阻礙若風邪搏於會厭則氣道不宣故令人失音入臟則不能言語也羌活湯方治中風失音不語羌活去蘆頭兩半甘草炙銼人參各半兩附子去皮臍一枚荆瀝竹瀝生地黃汁共七味先將四味銼如麻豆每服五錢入三件汁瀝同煎溫服日三夜一地黃湯方治中風失音不語生地黃汁淡竹瀝各半盞獨活去蘆頭一兩附子去皮臍半箇四味將二味銼如麻豆每服三錢入竹瀝地黃汁同煎溫服空心日午夜臥各一羚羊角湯方治中風失音手足不隨羚羊角鎊芎藭細辛去苖木香防風麻黃獨活羌活當歸酒浸附子去皮臍桂去粗皮天麻各一兩每服三錢水煎溫服不拘時侯竹瀝湯方治中風失音不語昏沉不識人竹瀝荆瀝梨汁各二合陳醬汁半合四味相和微煎一二沸再濾一遍令溫細細灌入口中口噤幹開口灌之竹豆湯方治中風失音不語新青竹碎如等子四十九莖鳥豆二升二味以水八升相和煮令豆爛去滓再煎取一升每服二合灌之或口噤不開者即幹口灌羌活湯方治中風舌強不得語手足舉動不得羌活一兩羚羊角半兩麻黃去根節一兩防風半兩旋復花炒一兩獨活半兩龍腦研半兩人參白茯苓當歸麥門冬各半兩杏仁湯浸去皮尖雙仁一兩每服一兩水煎溫服空心日午夜臥各一服竹瀝湯方治中風舌強不得語心神煩悶淡竹瀝五合人乳汁二合三年醬汁半合三味相和調勻分三服口噤幹灌之立差陳醋方治中風不得語舌根澀鞕陳醋二合三年醬汁人乳汁各五合三味相和研以生絹濾絞取汁分為三服日夜服之服盡能語三聖散方治中風舌強不語沒藥研琥珀研各一分乾蠍七枚全者炒三味研為末每服三錢用鵝梨汁半盞皂莢末半錢濃煎湯一合與梨汁相和調下須臾吐出涎毒便能語雄黃丸方治心脾中風舌強不語涎潮昏塞不省人事雄黃研丹砂研牛黃研天南星牛膽內製者白殭蠶生用天麻生用各半兩麝香一分金箔銀箔各五十片與麝香同研九味研為細末鍊密丸如梧桐子大每服十丸溫薄荷汁化下不拘時風口噤論曰風口噤者風寒客於三陽之筋使筋脈拘急口噤不開牙關緊急若不速治恐致他病以風者善行而數變也開關散方治中風目瞑口噤不能下藥者用此散以中指點散子揩齒三二十次在大牙左右其口自開始得下藥天南星生搗為細末龍腦别研各等分研細五月五日午時合患者共使一字若急用亦不拘端午烏梅飲方治中風不語口噤吐痰頸項筋急烏梅二十七枚并子捶碎􅺠葜碎銼捶一兩半白礬生用一兩先以水一升煎􅺠葜根取三合去滓别盛又以别水一升煎烏梅至三合去滓别盛又以水五合煎白礬取三合别盛以物幹開口先灌􅺠葜湯次下烏梅湯又次下白礬湯旋消停服之良久久即吐惡疾毒涎如不吐以鵝毛攪喉口取吐附子散方治中風牙關緊急遍身強鞭附子一枚一兩者慢火炮製去皮臍白附子共末為細散每服一錢匕溫酒調下三服效海帶散方治風口噤牙關不開海帶炒半兩烏梅肉天南星生各一兩麝香二分别研後入為細末入瓷盒內勿令透氣如患急以半錢匕於腮裏牙關上揩便自開口立效治牙關緊急方甘草比中指節截作五截於生油內浸過炭火上炙候油入甘草用以物幹開牙關令咬定甘草可如人行五里時候又換甘草一截後灌藥極效白神散方治中風或吐瀉牙關緊噤下藥不能白梅末不拘多少將揩牙立開蓋酸能收斂自然牙骨易開也風口喎論曰足陽明脈循頰車手太陽脈循頸上頰二經俱受風寒筋急引頰令人口喎僻言語不正目不能平視又云風入耳中亦令口喎蓋經絡所繫然也診其脈浮而遲者可治治中風口面喎斜葛根湯方葛根防風附子麻黃各一兩炙獨活三兩杏仁湯浸去皮四十枚松實去殼兩半共銼如麻豆每用藥十錢匕以水二盞酒一盞入生薑三片煎一盞半去滓分三服日二夜一防風湯方治中風口面喎斜淚出失音防風防己升麻桂麻黃芎藭各一兩羚羊角一兩半銼如麻豆每服三錢七以水一盞煎取六分去滓入竹瀝半合更煎三二沸熱服空心日午及臨臥各一服治賊風吹著口眼喎斜一字散方烏頭生用青礬各半兩共為散每用一字搐入鼻內取出涕吐涎治風口喎方萞麻油巴豆油二味等分並相和如右喎即點左口角如左喎即點右口角仍急覷才正當急揩去藥治中風口面喎斜青松葉浸酒方青松葉一斤細銼如大豆木石臼中杵令汁出用生絹囊貯以清酒一斗浸二宿近火煨一宿初服半斤加至一升頭汗出即正治中偏風口面喎斜石灰塗方石灰半升炒乘熱以醋調似泥塗於一邊緩處才正急用溫水洗去人參丸方治中風口眼喎斜手足無事語不謇澀止緣坐臥處對耳有竅為風所中筋牽過一邊連眼皆緊睡著一眼不合者服此藥二十日內眼口皆正矣人參草烏生去皮尖牛膝去苗酒浸焙乾各一兩喎按牛膝入腦虛人口眼用之搗羅為細末水煎麵糊丸如梧桐子大每服十丸炒黑豆淋酒下一日二服治一切風口眼偏邪假蘇丸方生假蘇去梗生薄荷用葉一斤二味並沙盆內研生絹絞取汁瓷碟內看厚薄日煎成膏餘滓三分去一分粗滓不用將二分滓晒乾杵為末將膏和為丸如梧桐子大每服二十丸溫酒下破傷風論曰破傷風者因卒暴傷損風邪襲之傳播經絡致使寒熱更作身體反張口噤不開甚者邪氣入臟則不可治諸瘡久不差榮衛虛弱肌肉不生瘡眼不合者風邪亦能外入為破傷風之候羌活湯方治破傷風身如鐵石或如角弓反張口噤不開宜幹齒灌藥羌活防己羚羊角升麻黃芩蔓荆實去皮各一兩半犀角二兩茯神去木葛根甘草各一兩一分防風三分麻黃一兩粗搗篩每服三錢匕水一盞入地黃汁半合薤白二寸煎至八分去滓空心日午臥溫服如病急不拘時服蓋覆出汗即愈羚羊角散方治打擊破瘡或洗頭挑齒炙瘡狗咬等中風羚羊角石斛芎藭知母山萸薏苡仁白芷曲棘針生用甘草炙芍藥紫苑去土天雄防風牛膝枳實去瓤麩炒蔓荆實石南葉酒醋炒杏仁浸去皮尖麻黃龍骨去土黃芩防己白术蓽薢乾蔓菁花葛根赤茯苓羌活蒼耳心車前子桑白皮菊花不開者酸棗仁當歸丹參烏蛇酒浸去皮骨炙各三分陳橘皮湯浸去皮共為散每服一錢半至二錢匕空心午時夜臥溫酒調下要丸即鍊蜜丸如梧子大每服十丸豆淋酒下治破傷風獨聖散方蘇枋木不拘多少共為細散每服三錢匕酒調服之立效一方用鰾膠白色炙令黃色為末熱酒調六錢治破傷風身腫牙關不開白殭蠶散方白殭蠶直者不拘多少生研為末每用生薑自然汁調以雞翎於瘡口掃之勿令乾斯須腫拓皮雛為效仍用生薑汁調半錢匕服治破傷風打撲內損飲銀花散方天南星大者半生半炮白附子半生半炮防風去義等分為細末每服二錢匕重者童子小便調稍輕熱酒調下如外傷用此藥貼瘡口仍依法服之如破傷風先以小便溫洗瘡口次用藥乾貼追出風毒立愈熱稍惡口噤者以童子小便調幹開口灌之如鬬打至死但心頭微暖者併灌三服即活常須合下以備急用一方無白附子偏風論曰人身所養者惟血與氣血氣均等則無過不及之害稍至衰微則所運不周遂致體有偏復因風客身一邊者謂之偏風其狀半體不知痛癢或􅍙痺不仁或縱緩或痺痛是也荆瀝湯方治偏風不隨心中煩悶言語蹇澀荆瀝五合竹瀝五合生薑汁三合三味相和再暖每服三合以酒調下防己湯方治偏風半身不隨口眼喎斜不能言語筋脈拘攣不得轉側防己芎藭桂黃芩芍藥人參甘草炙麻黃去根節附子去皮臍防風各一兩杏仁去皮尖四十枚每用十錢生薑十片同煎溫服三服日二夜一生地黃湯方治偏風手足一邊不收口目喎戾言語蹇澀其藥不虛人老少並可服之生地黃汁竹瀝荆瀝各一升五合三味别作羌活防風各一兩去蘆頭并乂銼附子一枚重半兩者去皮臍生用作八九片入煎三汁中慢火煎取一升半每用醇酒三合調化藥汁二合暖服之日二夜一無問冬夏並得服之麻子仁湯方治偏風手足不隨口面喎斜麻子仁炒二合黑豆二合緊小者炒鴿糞炒二合垂栁枝二握銼半寸長四味先以酒七升煮栁枝及五升炒鴿糞麻仁黑豆等令黃乘熱便投栁枝酒內須臾去滓令淨每服旋取溫服二合至三合空心臨臥各一服續命獨活湯方治偏風半身不隨熱悶語澀獨活防風人參芍藥各二兩防己一兩半桂一兩羚羊角鎊三分㕮咀如麻豆每服五錢入竹瀝半合同煎溫服安息香丸方治偏風半體不仁縱緩不收或時痺痛安息香研一兩乳香研一兩麻黃去根節二兩胡桃仁湯浸去皮研一兩半乾浮萍草去土一兩半右五味先搗麻黃浮萍草為末與研藥拌勻鍊蜜和丸如彈子大每服一丸溫酒化下以汗出為效擬金丸方治偏風半身不隨不知痛癢草烏頭生去皮臍二兩半骨碎補去毛一兩半狗脊去毛一兩五靈脂一兩馬藺花一兩半地龍去土半兩乳香研一兩楓香脂研一兩􅒝薢一兩九味搗羅為末入研者二味和勻醋煮麵糊和丸如小豆大每三丸至五丸荆芥湯下空心臨臥各一服風偏枯論曰氣血不足腠理開疏風溼客於分肉之間久而不差真氣去邪氣獨留乃為偏枯之疾其狀肢體不隨肌肉偏枯細小而痛言語不變神智不亂乃可治也宜溫臥取汗益不足而損有餘診其胃脈沈而大心脈小而牢急皆偏枯之脈也當歸湯方治中風手足偏枯口面喎斜疼痛一目不能合當歸白芷防風白鮮皮白术芎藭杏仁去皮尖甘草炙甘菊花天雄去皮臍各一兩人參半兩每服五錢生薑半分同煎溫服日三夜一與食相間服之磁石湯方治中風偏枯骨痠無力磁石燒赤醋淬七遍三兩防風三兩五味子二兩甘草一兩玄參二兩附子去皮臍一兩牡丹去心二兩每用五錢入黑豆三十五粒同煎空心日午夜臥服沒藥丸方治中風偏枯手足不隨言語蹇澀口眼喎斜沒藥研半兩天麻酒浸一宿焙乾二兩烏頭去皮臍一兩地龍去土炒一兩羚羊角鎊屑一分犀角鎊屑一分丁香一分木香一分乳香研半兩丹砂研半兩龍腦研一分麝香研一分玄參一分人參半兩十四味搗研為末鍊蜜和丸櫻桃大每服一丸溫酒下食前服重病者服一月差初患五七服即愈肉苛論曰內經謂人之肉苛者雖近衣絮猶尚苛也以榮氣虛衛氣實夫血為榮氣為衛氣血均得通流則肌肉無不仁之疾及榮氣虛衛氣實則血脈凝澀肉雖如故而其證􅍙重為苛也苦參丸方治榮虛衛實肌肉不仁病名肉苛苦參二兩搗取粉丹參炙沙參去粗皮土人參一兩五加皮防風去義銼蒺藜子炒去角黃烏蛇酒浸用肉蔓荆實去白皮敗龜塗酥炙虎骨塗酥炙黃玄參堅者各一兩右十二味搗羅為末别以不蚛皂莢一斤以水三升按取汁去滓於無油鐵器內煎成膏鍊蜜四兩拌和為丸如梧桐子大每食後良久及夜臥共三服各用荆芥薄荷酒下十五丸至二十丸天麻丸方治榮虛衛實肌肉不仁遍身􅍙重牛膝酒浸切焙一兩天麻酒浸切焙兩半麝香研桂各一分乾蠍炒去土白花蛇肉酒炙各半兩檳榔銼獨活各三分防風一兩共九味鍊蜜和丸如桐子大每服十丸薄荷酒荆芥湯下不拘時防風酒方治榮虛衛實肌肉不仁病名肉苛防風去義二兩白术一兩半山茱茰并子用一兩半山藥乾者兩半附子去皮臍炙一兩天雄去皮臍一兩半細辛去鬚葉輕炒一兩半獨活去蘆頭一兩半秦芃去土兩半茵芋去粗莖一兩半杏仁去皮尖雙仁炒兩半紫巴戟一兩去心桂二兩麻黃去根節煎去沫焙乾二兩生薑二兩切焙磁石生槌碎如大豆粒浸去汁半斤薏苡仁炒三兩生地黃淨洗細切焙二兩半共十八味銼如麻豆生絹袋盛以無灰酒三斗浸六七日空心溫飲四合至五合以知為度五味子酒方治榮虛衛實肌肉不仁病名肉苛五味子防風牛膝黃芩白术當歸澤瀉知母白芷五加皮枸杞子用根白皮銼牡丹去心肉蓯蓉炒丹參炙甘草炙枳殼麩炒厚朴去粗皮薑汁炙五遍細辛去鬚葉輕炒桂各一兩共十九味銼如麻豆生絹囊盛用好酒二斗密封浸經七日每空心日午夜臥各溫服五合久服加至七合及一升勿令醉吐歷節風論曰歷節風由氣血衰弱為風寒所侵血氣凝澀不得流通關節諸筋無以滋養真邪相薄所歷之節悉皆疼痛故謂歷節風也病甚則使人短氣汗出肢節不可屈伸防風湯方治歷節風周身百節疼痛腳痿弱防風二兩白术一兩白鮮皮二兩桂一兩三分黃茋二兩薏苡仁炒二兩右六味搗篩每服四錢生薑三片同煎溫服日三夜一沒藥散方治歷節風百骨節疼痛晝夜不可忍沒藥研半兩虎脛骨酒炙三兩二味搗研為末每服二錢溫酒調下日三服透關散方治歷節風四肢攣急疼痛難忍短氣汗出麻黃根五兩天南星炮威靈仙各半兩􅒝薢當歸人參天麻各一兩赤小豆浸去皮焙半兩共八味搗羅為末每服半錢溫酒調下獨活散方治歷節風獨活去蘆頭一兩半玄參一兩生犀角屑二兩升麻三兩惡實根半兩豉二合生乾地黃半兩共七味搗羅為散每服三錢空腹米飲調下乳香大丸方治血氣衰弱風毒攻注歷節疼痛乳香研沒藥研各一兩五靈脂去沙石四兩鳥頭去皮臍一兩半共四味搗研為末再和勻滴水和丸如彈子大以丹砂為衣每服一丸薄荷酒化下日三服中風百節疼痛論曰中風百節疼痛者由體虛受風風邪中於關節故令百節筋脈拘急疼痛寒熱更作不可屈伸此皆真氣怯弱不勝風邪真邪相薄所以痛也白花蛇散方治中風肢節疼痛言語蹇澀白花蛇酒浸去皮骨二兩何首烏去黑皮牛膝三味用酒浸半日焙乾蔓荆實去白皮各四兩威靈仙荆芥穗旋復花各二兩共七味搗羅為末每服一錢溫酒調下空心臨臥服羌活散方治中風百節疼痛寒熱更作不可俯仰羌活去蘆頭一兩天麻去蒂生用一兩芎藭半兩酸棗仁炒三分鹿角膠炒燥半兩蔓荆實揉去白皮一分羚羊角鎊屑三分人參半兩白附子半兩牛膝三分桂半兩薏苡仁一分炒烏蛇酒炙用肉半兩犀角鎊屑一分白鮮皮炙半兩地骨皮柏子仁生用三分右十七味搗羅為細末每日空心及夜臥各以豆淋酒調下一錢至錢半白頭翁酒方治諸風痛攻四肢百節白頭翁草一握一味爛研以醇酒投之頓服又方生惡實根摩酒服痛止即住又方黑豆炒去皮半升威靈仙二兩桑根白皮一兩三味用醇酒一升半煎取八合去滓頓服之又方杏仁湯浸去皮尖雙仁炒黃研半兩虎骨以酒塗酥炙黃取半兩為末二味用醇酒一升熱調頓服風走注疼痛論曰風走注疼痛之病其痛無常處是也氣血流通筋脈和同則骨肉滑利一有不調風邪乘虛與血氣偕行使榮衛凝澀隨所注處悉為疼痛故謂走注痛也虎骨散方治風毒走注疼痛不定虎脛骨酥炙敗龜酥炙各二兩麒麟竭研赤芍藥當歸沒藥研防風白附子桂去粗皮白芷骨碎補去毛蒼耳炒自然銅火煆醋淬研各三分牛膝酒浸切焙去苗天麻檳榔五加皮羌活去蘆頭各一兩共十八味為散每服二錢溫酒調下藝薹散方治風毒走注疼痛如虎嚙藝薹子天南星草烏頭並生用各一兩三味為散五錢量入生麵以釅醋生薑汁生油各少許調成膏攤紙上厚一分貼痛處即止消毒膏方治風毒走注疼痛筋脈拘急馬牙硝一兩燒赤研烏頭大者二枚燒存性三分研二味同研令勻每用三錢白麵三錢生薑汁一盞同熬成膏攤於帛子上熱貼日二換之乾地黃丸方治走注疼痛生乾地黃白芷當歸沒藥烏頭去皮臍防風木香赤小豆共八味等分搗研為末水浸蒸餅心和丸如梧桐子大每服五丸冷酒下空心食前服日二白虎風論曰白虎風之狀或在骨節或在四肢其肉色不變晝靜而夜發發則痛徹骨髓或妄言妄有所見者是也蓋風寒暑溼之毒乘虛而感播在經脈留於血氣畜聚不散遇陽氣虛弱陰氣隆盛則痛如虎嚙故以虎名焉羌活湯方治白虎風痛甚如齧羌活防風各一兩秦芃芎藭當歸各一兩半牛膝酒浸一兩附子去皮臍三分大腹連皮用三枚桃仁湯浸去皮尖雙仁炒二十一枚九味銼如麻豆每服五錢入生薑一棗大同煎溫服日二夜一牛膝散方治白虎風疼痛難忍牛膝酒浸當歸各一兩虎骨酥炙令黃二兩赤芍藥一兩芒硝别研半兩桃仁去皮尖雙仁三兩芎藭半兩七味為散每服空心用溫酒調下一錢至二錢抵聖散方治白虎風骨髓疼痛至夜轉甚虎脛骨不計多少打破酒浸蘸酒旋炙令黃脆為度一味為散每服半錢入薄荷末一錢人參末半錢煎乳香酒調下一神散方治白虎風晝靜夜發痛徹骨髓狂言妄見防風羌活桂去粗皮地骨皮芎藭細辛虎骨酒浸一宿酥炙黃共七味等分為散每服一錢溫酒調下烏頭散方治白虎風走注疼痛烏頭去皮臍地龍羌活虎骨酒炙延胡索當歸沒藥研防風各一兩八味為散每服二錢冷酒調下空心食前日二服風不仁論曰風不仁之狀皮膚搔之如隔靴是也由榮氣虛衛氣實寒風入於肌肉血氣不相與凝痺結滯皮膚􅍙痺厚無所覺知內經曰皮膚不榮故為不仁此之謂也烏鴉丸方治風虛皮膚不仁頭目昏痛利咽膈解昏倦烏鴉一隻燒為灰麝香别研一分虎骨酥炙白殭蠶炒乾蠍去土炒防風去義白附子烏蛇酒浸去皮骨炙藿香葉各半兩除别研外搗羅為末入研者拌勻鍊蜜丸如梧桐子大每服十丸至十五丸溫酒下茶清亦得羌活湯方治風不仁手足􅍙痛麻疼羌活獨活俱去蘆頭防風蔓荆實人參蒺藜子炒去角芍藥白茯苓枳殼芎藭天蓼木阿膠炙令燥威靈仙去苖土各半兩每服二錢空心豆淋酒調下或鍊蜜丸如梧桐子大豆淋薄荷酒下十五丸至二十丸五參散方治風不仁皮膚􅍙麻繞膝遍身似蛇皮黑癮旋生旋沒通身􅍙痺人參丹參沙參苦參玄參堅者各一兩白花蛇酒浸去皮骨一兩半右六味為細散每服二錢食後溫服調下加至三錢風瘙癢論曰風瘙癢者表虛衛氣不足風邪乘之血脈留滯中外鼓作變而生熱熱即瘙癢久不差淫邪散溢搔之則成瘡五白散方治皮膚風瘙晝夜不止白附子白殭蠶炒白蒺䔧炒白鮮皮各一兩白花蛇酒侵去皮骨炙三兩右五味為散每服一錢空心臨臥溫酒調下枳殼散方治風皮膚瘙癢麻痺枳殼去瓤麩炒二兩苦參蒺䔧子炒去角蔓荆實各一兩荆芥穗麻黃去根節羌活去蘆頭獨活各等分每服二丸臘茶溫酒調下食後臨臥各一服天麻散方治熱毒風攻遍體瘙癢癮疹皮膚􅍙痺肢節疼痛四肢大腸不利天麻防風羌活甘菊花杏仁去皮尖雙仁炒黃各二兩甘草一兩炙每服三錢空心蜜酒調下日再服天門冬丸方治風熱皮膚癮疹癢生瘡如水疥或如粟粒天門冬去心焙二兩枳殼去瓤麩炒三兩白术人參各一兩半獨活苦參各一兩一分為末蜜為丸如梧桐子大每食後米飲下三十丸日二服八味散塗傳方治遍身瘡疥皮破肉痛或瘙癢膿水蜀椒去目吳茱萸湯洗焙乾炒青鹽研石硫黃研膩粉研白殭蠶炒檗皮各一兩麝香少許研八味搗研為散豬膽汁調塗之溼則乾傳防風湯淋洗方治瘙癢如蟲行或􅍙痺不仁防風益母草苦參各三分蒺䔧子炒五兩荆芥穗蔓荆實枳殼去瓤麩炒各二兩每用三兩水一斗煎至八升乘熱淋洗患處風㾦㿔論曰風㾦㿔者由腠理不密三陽氣外泄發而為汗汗出未已為風邪所搏風熱相併不得流行故結為㾦㿔狀如麻豆甚者漸長瘙之成瘡獨活丸方治風癮疹㾦㿔腫起時癢時痛獨活去蘆頭天門冬防風蒺䔧子炒去角桔梗炒各一兩一分薏苡仁炒黃連去鬚各一兩桂半兩枳實一兩半為細末煉蜜丸如梧桐子大每服二十丸空心臨臥菊花湯下景天花散方治脾肺風毒遍身發㾦㿔瘙癢煩躁景天花慢火焙乾一錢俗謂慎火草紅麴半兩同研為細末每服二錢食後臨臥服溫水下胡麻散方治肺脾風毒攻注皮虜瘙癢手足生瘡及遍身㾦㿔發赤黑靨子肌熱疼痛胡麻炒令香熟枳殼各二兩防風蔓荆實威靈仙苦參何首烏米泔浸透去黑皮炒乾芎藭荆芥穗甘草炙各一兩薄荷用葉半兩為散每服二錢溫酒下或鍊蜜丸如梧桐子每服三十丸溫酒下枳殼酒方治風瘙癮疹皮膚生㾦㿔或如蟲行枳殼炒二兩秦芃獨活肉蓯蓉各四兩丹參蒴藋各五兩松葉切三斗銼如麻豆用生絹袋貯以清酒二斗浸六宿每服半盞日三夜四蒺䔧浴湯方治風毒瘙癢癮􅂒漸成㾦㿔蒺䔧子炒茺蔚子羊桃蒴藋根苖漏蘆去蘆頭苦參各半斤鹽四兩每全料用水三石煮取二石五斗去滓溫室中淋浴仍先飽食即入浴久浸最良可隔夜一浴乾衣蓋取汗慎外風桃仁塗方治毒赤疹浮腫成㾦㿔桃仁去皮尖雙仁生用杏仁去皮尖生研各三兩胡麻生研凝水石研如粉各二兩右四味各研細别研藝臺菜絞汁和以白蜜入前研藥攪為稀膏用塗患處乾則易之風瘙癮疹論曰風瘙癮疹其狀有二皆緣肌中有熱若涼溼之氣折之熱結不散則成赤疹若因風邪所折風熱相搏則成白疹赤疹得熱則劇得冷則滅蓋熱氣鬱結於內故惡熱宜冷白疹得隂雨則甚得晴暄則消蓋熱氣散釋於外故惡冷宜熱冷熱之證異其為癮疹則一盡身體風瘙而癢搔之隱隱而起是也秦芃丸方治風瘙癮疹搔之愈甚秦芃防己松脂錬成者各兩半枳殼蒺䔧子炒去角各二兩半苦參白术芎藭防風附子蒴藋乾薑炮各一兩共研為末鍊蜜和丸如梧桐子大每服二十丸酒下加至三十丸早食前各一服蔓荆實散方治風瘙癮疹手足麻木蔓荆實何首烏各二兩羌活威靈仙荆芥穗防風各一兩苦參一分為散每服二錢溫酒調下日三茵陳蒿散方治風瘙癮疹皮膚腫癢茵陳蒿一兩荷葉半兩為散每服一錢蜜水下食後服蒺䔧子散方治風瘙皮膚癮疹癢痛或有細瘡蒺䔧子炒去角二兩枳殼荆芥穗羌活防風一兩蒼术泔水浸一宿四兩共為散每服一錢溫酒或茶調下石南酒方治風瘙癮疹經旬不解石南葉去粗莖生用三兩一味搗羅為末每服半錢至一錢用酒三合煎一沸空心溫服白蜜酒方治風瘙癮疹癢不止白蜜一合酒二合二味相和煎溫食前服一方用松葉一斤酒一斗煮三升日夜服出汗枳實丸方治風熱頭面身體瘙癢癮疹枳實去瓤麩炒兩半天門冬獨活黃連防風蒺䔧子炒去角桔梗炒各一兩一分薏苡仁一兩桂一分共為末錬蜜丸如梧桐子大每服二十丸空腹米飲下日二塗藥方慎火草大葉青厚名景天生薑和皮不洗等分研鹽重少許三味塗摩癢如遍身癮疹塗發處日再芎藭粉摩方治風癮疹癢痛難止芎藭白芷麻黃根各二兩藿香一兩米粉二升五味搗羅為粉摩病處立效枳實尉方治風白疹枳實生用八兩一味搗碎以醋浸令唈唈炒熱用熟帛包褁尉疹上冷即易分作二包子更相炒尉尤佳聖濟總録纂要卷一
