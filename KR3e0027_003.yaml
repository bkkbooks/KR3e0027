body:
  text: 休寧程林纂傷寒門傷寒統論論曰風寒暑溼飲食勞倦皆能為病是謂五邪冬傷於寒者春必病溫春傷於風者夏必飱泄夏傷於暑者秋必痎瘧秋傷於溼者冬必咳嗽是乃四時之氣也然五邪所中雖不同本皆外邪大率同類唯多冬時嚴寒其毒厲尤甚人或中之病在冬時則正名傷寒若邪毒藏於肌膚至春之時乘溫而發者溫病若留連日久至夏之時乘盛暑而發者為暑病所謂先夏至一日為病溫後夏至日為病暑是也其病之傳次先客於太陽其病令人頭項痛腰脊強其脈尺寸皆浮太陽不已傳於陽明其病體熱目疼鼻乾不得卧其脈尺寸皆大陽明不已傳於少陽其病胸脅痛而耳聾其脈尺寸皆弦少陽不已太隂受之其病腹滿體重其脈尺寸俱微太陰不已少陰受之其病口燥舌乾而渴或背微惡寒其脈尺寸俱沉少陰不已厥陰受之其病煩滿舌卷囊縮其脈寸尺俱緩病之所傳不過三陰三陽而已其未滿三日者邪在陽經未入於裏其病在表宜汗之而愈若經四日者邪入陰經其病在裏宜下之而愈特其大略爾蓋有一日而傳之數經者亦有數日而尚在太陽者陽病雖宜發汗陽明之病反宜下之陰病雖宜下少陰之病或宜溫之由人之稟受虛盛其傳有遲速又有不傳經者當審其脈證凡此六經受病五邪脈證各不同傷風必惡風其脈浮緩傷寒者必惡寒其脈浮緊以至傷暑脈虛傷溼脈濡人迎緊盛為傷寒氣口緊盛為傷食診得五邪知其本也診得六經知其標也有病雖在表而不可汗者或裏而不可下也或若汗之太多則津液燥竭遂致亡陽下之太早則邪氣動膈乃成結胸清濁相干則變為霍亂熱毒內瘀則變為瘀血又或為發黃者溼熱相蒸也或為發斑者陽毒太盛也陽盛之人得之於熱乃為陽毒陰盛之人得之於寒乃為陰毒蠱動則為狐惑壞病之甚則為百合若勞復陰陽易之類雖差後猶宜節慎變態多端不可備舉當以類求之皆以適當為良唯兩感之病表裏皆受邪為難治其他或陰證似陽陽證似隂或隂盛隔陽或陽盛隔隂者在診病者以意詳之傷寒可汗論曰傷寒病汗之而愈者以初得病一日至三日陽經受邪未傳諸陰其邪在表故當發汗此大約也然病數日脈浮太陽證不罷者亦可汗之當以脈證為凖凡頭痛發熱惡風振寒是為可汗之證其脈浮者是為可汗之脈陽虛則惡寒脈浮為在表或浮而弱或浮而緊或浮大而數皆宜汁之麻黃湯方治傷寒太陽病頭痛發熱身疼腰痛骨節疼痛惡風發熱無汗而喘者麻黃去根節三兩桂去粗皮三兩甘草炙一兩杏仁去粗皮雙仁七十枚㕮咀如麻豆大每服五錢水煎溫服覆取微汗不須啜粥餘如桂枝法將息大青龍湯方治傷寒太陽中風脈緊發熱惡寒身痛不汗出而煩躁麻黃去根節六兩桂去粗皮甘草各二兩杏仁去皮尖雙仁四十枚生薑三兩棗大者十枚石膏一雞子大碎㕮咀如麻豆大每服五錢水煎溫服脈微汗出惡風者不可服桂枝麻黃各半湯方治傷寒太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢桂去粗皮一兩半芍藥生薑甘草麻黃去根節各一兩大棗四枚杏仁三十四枚湯浸去皮尖雙仁㕮咀如麻豆大每服五錢水煎溫服桂枝湯方治傷寒太陽病外證未解脈浮弱者當以汗解桂去粗皮芍藥生薑各三兩甘草二兩大棗十二枚㕮咀如麻豆大每服五錢水煎溫服須臾啜熱稀粥助藥力取微汗麻黃附子甘草湯方治傷寒少陰病得之二三日宜微發汗以二三日無裏證故微發汗麻黃去根節甘草各二兩附子一枚炮製去皮臍㕮咀如麻豆大每服五錢水煎溫服蔥䜴湯方治傷寒初覺一二日頭項腰脊痛惡寒蔥白十四莖䜴半合乾薑一分麻黃去根節桂去粗皮芍藥各半兩㕮咀如麻豆大每服五錢水煎溫服良久投蔥䜴熱粥蓋覆出汗蔥粥方治傷寒服蔥䜴湯後未得汗再服蔥白十莖并頭切䜴三合炒生薑半兩拍碎水五盞煎至二盞半去滓入白米依常法煮粥入少鹽攪勻任意食之衣覆出汗未汗再服麻黃葛根湯方治傷寒初得一二日出汗麻黃去根節一兩葛根柴胡去苗各一兩芍藥三分每服五錢水一盞䜴一百粒開口椒七粒連鬚蔥白三寸薄荷二十葉同煎熱服服後蔥䜴湯一盞投之衣覆取汗未快再服葛根湯方治傷寒初覺頭痛惡寒壯熱腹內熱脈洪大一二日宜服葛根黃芩柴胡去苖各半兩蔥白五莖䜴一合㕮咀每服五錢生薑一棗大拍碎同煎溫服良久再服得汗即止麻黃解肌湯方治傷寒初患一二日體熱頭痛麻黃去根節一兩石膏碎葛根各一兩半甘草一分半芍藥杏仁去皮尖雙仁炒各一兩桂去粗皮三分每服五錢生薑五片水煎溫服葛根湯方治傷寒一二日頭痛壯熱遍身疼痛其脈洪數葛根白术芍藥乾薑各半兩麻黃去根節桂去粗皮各三分甘草炙一分半每服五錢水煎熱服如脈微即加附子半兩石膏人參解肌湯方治傷寒初得一二日頭疼壯熱惡寒脈浮緊石膏碎麻黃各一兩柴胡去苗人參各半兩桂去粗皮甘草各一分炙葛根二兩每服三錢入蔥䜴生薑同煎熱服十味人參湯方治傷寒頭痛體疼寒熱不解人參厚朴生薑汁炙桂甘草杏仁去皮尖雙仁炒白术乾薑白茯苓陳橘皮湯浸去白各一兩麻黃去根節湯煮去沫二兩每服三錢生薑二片棗一枚同煎熱服才覺傷風併三兩服汗出立差羌活湯方治傷寒表不解頭痛體疼發汗羌活獨活柴胡前胡人參白茯苓桔梗芎藭甘草炙各一兩枳殼去瓤麩炒一兩每服三錢生薑二片薄荷少許同煎溫服不拘時蔥䜴湯方治傷寒一日至三日以前身熱脈大肢體疼痛汗不出蒼术米泔浸去皮麩炒黃麻黃去根節湯煮去沫各二兩甘草炙桂各一兩每服三錢蔥白三寸鹽䜴二十粒同煎熱服不拘時候傷寒可下論曰凡傷寒邪入於陰其病在裏法當下之諸腹滿大大便或口燥舌乾而渴或潮熱譫語皆為可下之證諸診得脈沈而實即為可下之脈但脈證已具不必拘以日數急宜攻裏若病雖過經而裏證未備者未可下也故經曰陽盛陰虛下之則愈其法謂此陽明病不吐不下心煩者可與調胃承氣湯太陽病三日發汗不解蒸蒸發熱者可與調胃承氣湯傷寒吐後腹脹滿者可與調胃承氣湯調胃承氣湯方甘草炙二兩大黃以清酒洗四兩㕮咀每服五錢入芒硝一錢更煎一二沸溫服陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裏也手足濈然汗出者此大便己鞭也與大承氣湯若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令至大泄下大承氣湯大承氣湯方大黃酒洗四兩厚朴炙半斤枳實麩炒五枚㕮咀每服五錢入芒硝一錢同煎溫服陽明病其人多汗以津液外出胃中燥大便必鞭鞭則讝語小承氣湯主之若一服讝語止者勿再服小承氣湯方大黃四兩厚朴二兩枳實麩炒大者㕮咀每服五錢水煎溫服初服湯當更衣不爾者盡飲之若更衣者勿服柴胡湯方治傷寒四日以後煩熱不解大小腸澀柴胡去苖黃芩一兩犀角鎊芍藥各三兩山梔子仁半兩大黃炒一兩半木通三分朴硝一兩一分每服五錢入竹葉三片同煎空腹服大小腸通為度如未效再服大柴胡湯方治傷寒十餘日熱結在裏往來寒熱者柴胡去苖半斤枳實麩炒四兩黃芩芍藥各三兩半夏二兩半湯洗七遍大黃二兩㕮咀每服五錢入生薑十片棗三枚同煎溫服調胃承氣加橘皮湯方治傷寒發汗不解蒸蒸發熱陳橘皮浸去白半兩大黃醋炒一兩甘草炙半兩每服四錢入芒硝一錢同煎溫服大青散方治陽盛發狂有斑大小便閉澀大青知母黃芩大黃煨山梔子仁升麻黃連各一兩甘草炙半兩共為散每服三錢入朴硝一錢密水調下承氣丸方治傷寒時氣溫熱病大便不通大黃炒三分郁李仁湯浸去皮研枳實麩炒朴硝研各一兩共研為末和勻煉蜜丸如梧桐子大每服二十丸生薑湯下未利再服不計時候傷寒可吐論曰諸病吐之而愈者邪在胸中也傷寒大法謂四日以上若入陰經其傳未深邪氣髙而裏實客於胸膈下之則動胃汗之則亡陽惟宜吐而出之然亦不必拘此凡寒邪熱毒痰實在胸中及有宿食在胃脘者皆當吐之但診其脈寸口或浮或滑或數或緊與諸部不同者其證心胸痞滿鬱鬱而痛不能息多涎唾飲食入則吐欲吐復不能出或手足厥冷及心下滿而煩飢不能食吐下後心中懊憹者是也內經所謂其髙者因而越之即其法也瓜蒂散方治胸有寒病如桂枝證頭不痛項不強寸脈微浮胸中痞鞭氣上衝喉咽不得息當吐之瓜蒂熬赤小豆各一分搗篩再和勻每服一錢䜴一合湯七合先漬之須臾煮作稀糜取汁調散放溫頓服不吐少加之快吐為度亡血虛家不可與撩膈湯方治傷寒三四日胸中痰壅憎寒壯熱頭痛桃枝一握東引者取稍栁枝一握取稍甘草一分取稍烏梅去核三枚山梔子仁一分各細銼同用奬水一大盞半煎至一盞空心分為二服相次再服取吐為度三物湯方服前撩膈湯吐後頭痛壯熱未退即服此三物湯薄荷一握人參半兩生薑一分水煎空心溫服晚再服苦參散吐方苦參為細散每服三錢溫酒五合調服之即吐人參湯吐方治傷寒出汗後心胸妨悶煩熱未退人參半兩燈心一小束枳殼麩炒一分大腹皮一枚茶末二錢生甘草除茶末外各細銼用淡􅀢水二大盞煎至一盞下茶末攪勻分溫二服以紙撚子於咽喉中取吐為度傷寒可溫論曰傷寒病雖有三陰三陽然在陽則太陽病多在陰則少陰病多以二經為表裏故也至於陽明太陰病頗稀少而少陽厥陰病又少也然究觀古人治陽明則多下於少陰則多溫蓋陽明者胃也胃受病則不惡寒反惡熱濈濈汗出大便祕譫語潮熱須下之乃愈若乃氣弱本虛人初中病腠理寒邪氣更不經三陽而便見少陰證蓋少陰者腎也腎受病則身冷惡寒四肢厥逆脈微細心煩但欲寐或自利而渴須溫之乃愈雖然三陰病大約可溫而古人特於少陰詳言之者則少陰病尤宜溫故也附子湯方治傷寒少陰病得之一二日口中和其背惡寒者當灸之附子去皮臍二兩人參一兩白术四兩芍藥白茯苓三兩每服五錢水煎溫服日二四逆湯方治傷寒少陰病脈沉者急溫之甘草二兩乾薑兩半附子一枚生用銼如麻豆大每服五錢水煎溫服強壯之人可倍加薑附四逆湯方治傷寒少陰病下利清穀裏寒外熱手足厥冷脈微欲絶身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者通脈加減四逆湯甘草各二兩附子大者一枚乾薑二兩各銼如麻豆大每服五錢水煎溫服其脈即出者愈面色赤者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩病皆與方相應者乃服之生薑湯方治傷寒手足厥冷脈細欲絶其人內有久寒者宜當歸四逆加吳茱茰生薑湯當歸芍藥桂去粗皮細辛各三兩吳茱萸湯洗炒甘草炙木通各二兩銼如麻豆每服五錢入生薑半分棗三枚水酒同煎溫服通關飲方治厥陰傷寒脈弦長者生沉細不足者死附子一兩乾薑羌活桔梗甘草灸五加皮各半兩桂三分黃茋一分防風一分半銼如麻豆每服五錢水煎食前溫服回陽湯方治傷寒陰盛手足厥冷體寒脈微延胡索炒半夏切生薑汁炒黃甘遂麩炒各一兩陳橘皮湯浸去白附子去皮臍桂去粗皮麻黃去根節湯煮去沫各半兩檳榔一枚天南星一枚銼如麻豆每服二錢酒煎溫服服後一次頃患人頭面渾身覺熱時便與衣服蓋覆令出汗溫白丸方治傷寒面青心下堅鞭開口出氣身體不熱頭面多汗四肢厥冷半夏湯浸去滑白附子炮硫黃研各一兩共研為末用粳米飯搗和為丸如梧桐子大每服二十丸溫酒下吐逆炒薑鹽酒下或艾醋湯下陰毒併喫二三服不計時侯白术飲方治傷寒伏陰胸膈妨悶吐逆不定手足厥冷白术附子去皮臍髙良薑炮桂去粗皮人參乾薑炮各一兩霍香去根一分銼如麻豆每服三錢水煎溫服吳茱萸散方治傷寒渾身手足厥冷面青脣口無色心中寒栗吳茱茰湯浸焙炒硫黃研桂去粗皮附子去皮臍芎藭各一分搗羅為散煎艾葉湯調下三錢陰盛者兼灸氣海數十壯黑龍湯方治傷寒陰盛隔陽身冷煩躁脈細沉緊附子一枚及半兩者燒存性用冷灰焙去火毒搗研細入臘茶一錢和勻分作二服每服以水一盞蜜半匙同放冷服須臾躁止得睡汗出為效返陰丸方治傷寒陰盛手足多冷脈沉細助陽消陰硫黃消石陽起石太陰玄精石白礬石膏各半兩研為未同入銚子內熬成汁為度放冷細研用水浸炊餅為丸如梧桐子大煎艾湯下十五丸傷寒過經不解論曰傷寒為病六經受邪始傳於三陽病在表者可汗其滿三日傳於三陰病入裏者可下其不兩感於寒更不傳經不加異氣者至七日太陽病衰頭痛少愈八日陽明病衰身熱少微九日少陽病衰耳聾微聞十日太陰病衰腹滿減如故十一日少陰病衰渴止舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去病人精神爽慧也故傷寒愈者皆在十二日若過此經病猶不解者為邪熱結于裏其或譫言妄語或鬱鬱微煩或腹滿吐下皆緣治之失宜邪氣稽留故病過經不能解也當隨其證以治若更感異氣變為他疾者當依壞病法療之犀角湯方治傷寒過經不解熱結在裏往來寒熱煩渴躁悶犀角屑一兩柴胡去苖吳藍各三分大青升麻各一兩烏梅去核黃芩各三分甘草半兩每服五錢入竹葉三十片同煎食後溫服木通湯方治傷寒十三日過經不解臍腹脹滿小便淋澀煩悶燥渴木通葛根青橘皮湯浸去白鹽炒檳榔滑石瞿麥穗各一兩每服五錢入蔥白二寸同煎溫服不計時候柴胡湯方治傷寒發汗下之後過經不解胸脅滿結渴而不嘔但頭汗出往來寒熱小便不通宜服茈胡湯柴胡二兩桂黃芩各一兩牡蠣生用甘草各半兩括摟根一兩半木通一兩每服五錢生薑半分蔥白五寸同煎食後溫服中風傷寒傷寒溼溫傷寒時氣傷寒疫癘傷寒結胸中風傷寒論曰中風傷寒三陽三陰候各不同太陽中風其脈陽浮陰弱其證發熱自汗蓋陽浮熱自發陰弱汗自出嗇嗇惡寒淅淅惡風熻熻發熱鼻鳴乾嘔又曰太陽病發熱汗出脈緩者名為中風不可燔灸若以火發其汗邪風為火熱所劫血氣流溢榮衛失常兩陽熏灼其身發黃陽盛即衄陰虛即小便難陰陽俱虛竭其身體枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則讝語甚者至噦手足躁擾循衣摸牀其小便利者可治陽明中風即陽明病能食為中風其證口苦咽乾腹滿微熱惡寒脈浮而緊下之則腹滿小便難少陽中風兩耳無聞目赤胸中滿而煩不可吐吐之則悸而驚太陰中風四肢煩疼其脈陽微陰澀而長為欲愈少隂中風其脈陽微陰浮為欲愈厥陰中風其脈微浮為欲愈不浮為未愈凡此六經之病其狀雖異大抵其脈皆浮經所謂浮為風是也大青龍湯方治傷寒太陽中風脈浮緊發熱惡寒身痛不汗出躁煩麻黃去根節煮去沫六兩桂去粗皮甘草炙各二兩杏仁去皮尖雙仁四十枚石膏如雞子大碎㕮咀如麻豆服五錢入生薑一棗大棗二枚同煎溫服取微汗汗多者以溫粉粉之桂枝湯方治中風傷寒陽浮陰弱陽浮者熱自發陰弱者汗自出惡寒發熱鼻鳴乾嘔等疾桂去粗皮芍藥各三分甘草炙半兩每服五錢入生薑一棗大棗二枚同煎溫服以汗為度未汗更服仍作生薑稀粥投之以助藥力石膏湯方治中風傷寒頭痛四肢􅍙痛身體沉重石膏甘草炙麻黃去根節煎去沫桂芍藥各二兩每服五錢入生薑一塊同煎空心溫服麻黃桂心湯方治中風傷寒脈浮緊發熱惡寒身體疼痛汗不出而煩麻黃去根節煎掠去沫二兩桂去粗皮甘草乾薑炮各一兩石膏乾薄荷葉杏仁去皮尖雙仁各半兩每服五錢入棗二枚同煎食前溫服桂枝湯方治中風傷寒初得其外證頭項疼腰背強壯熱語澀恍惚唾涕稠黏遍身拘急桂去粗皮三分芎藭半夏湯洗七遍生薑等分同搗附子菖蒲麻黃去根節煎去沫羌活細辛各半兩白芷一分銼如麻豆每服三錢入生薑一塊同煎食前溫服蓋覆取汗麻黃細辛丸方治中風傷寒頭痛惡寒四肢煩疼心躁悶麻黃去根節一兩細辛人參白茯苓甘草白术各半兩括摟根三分共研為末錬蜜和搗丸如雞頭大每服一丸薄荷蜜湯研下傷寒溼溫論曰傷寒有五其一為中溼蓋風溼之氣中人為病發熱與寒病相類故曰溼溫也此因汗出當風或因取冷過度致陰溼氣襲人肌膚流傳經絡其證喜汗出關節疼痛發熱而煩小便不利大便反快是謂中溼若風溼相搏則一身盡疼日脯所劇微熱相蒸則身必熏黃凡治風溼者欲其微汗即風氣解而溼自去溼甚者當利其小便不可大發汗大汗則風去溼在其病不去亦不可下之下之早則噦下之而利不止即死診其脈當沉而細難經曰溼溫之脈陽濡而弱陰小而急是也麻黃杏仁薏苡仁甘草湯方治溼溫病一身盡疼發熱日晡即劇此病傷於汗出當風或久傷取冷所致麻黃去根節三兩杏仁去皮尖雙仁三十枚炒薏苡仁一兩甘草炙一兩㕮咀每服五錢水煎溫服桂枝附子湯治傷寒八九日風溼相搏身體疼痛不能自轉側不嘔不渴脈浮虛而嗇者桂枝附子湯生之若其人大便堅小便自利者术附子湯主之桂去粗皮四兩附子三枚甘草炙二兩㕮咀每服五錢入生薑五片棗二枚同煎熱服术附子湯方附子炮製去皮臍三枚白术四兩甘草灸二兩銼如麻豆每服五錢入生薑五片棗二枚同煎溫服初一服其人身如痺半日許復之三服後其人如冒狀勿怪此以附子术併走皮中逐水氣未得除故使之然耳法當加桂四兩此本一方二法以大便堅小便自利故去桂也以大便不堅小便不利當加桂附子三枚恐多也虛弱家及産婦宜減服之甘草附子湯方治風溼相搏骨節疼煩掣痛不得伸屈近之則痛劇汗出短氣小便小利惡風不欲去衣或身微腫者甘草炙二兩附子二枚白术三兩桂四兩㕮咀如麻豆每服五錢水煎溫服初服得微汗則解能食汗止復煩者少減服之千金方去身腫者加防風四兩悸氣小便不利者加茯苓三兩既有附子今加生薑三兩治溼家身煩疼麻黃湯加术四兩發其汗為宜慎不可以火攻之方麻黃三兩桂二兩甘草炙一兩杏仁去皮尖雙仁七十枚白术四兩㕮咀如麻豆大每服五錢水煎溫服取微汗則解防風黃茋湯方主之治風溼脈浮身腫汗出惡風者防風四兩黃茋五兩甘草炙二兩白术三兩㕮咀如麻豆大每服五錢入生薑半兩大棗二枚同煎溫服日三喘者加麻黃胃中不和者加芍藥氣上衝者加桂下有陳寒者加細辛服後當如蟲行皮中腰以下如氷後坐被上又以一被繞腰下溫令微汗差杏仁湯方治風溼身體疼痛惡風微腫杏仁去皮尖雙仁炒二十五枚桂去粗皮麻黃去根節先煮一兩焙乾芍藥天門冬去心焙各一兩㕮咀如麻豆大每服五錢入生薑半分同煎溫服傷寒時氣論曰春溫夏熱秋涼冬寒是為四時正氣非其時有其氣人或感之病無分少長率相似者謂之時氣如春應溫而反寒夏應熱而反冷秋應涼而反熱冬應寒而反溫是也其候與傷寒瘟病相類但可汗可下之證比傷寒溫病療之宜輕爾葛根湯方治時氣二三日不解頭痛壯熱惡寒葛根一兩麻黃去根節炙二兩陳橘皮湯浸去白甘草灸黃芩知母杏仁去皮尖雙仁各一兩每服三錢入生薑二片同煎溫服七聖湯方治時氣頭痛壯熱肢體煩痛麻黃去根節炙三兩蒼术炒二兩橘皮湯浸去白木通各一兩桔梗一兩半山茵陳一兩甘草炙二兩每服三錢生薑三片同煎溫服八神湯方治時氣一二日頭痛壯熱心神煩悶麻黃一兩炙大黃當歸甘草白术山梔子仁各半兩芍藥荆芥穗各一分每服三錢入薄荷三葉蔥白一寸生薑二片同煎熱服人參乾葛湯方治時行表不解壯熱惡寒人參乾葛白芍藥桔梗炒各一兩赤茯苓三分甘草炙木香各半兩麻黃依前炙三分每服三錢水煎熱服併三兩服溫覆出汗五苓散方治時氣解表出汗赤茯苓桂澤㵼白术各一分豬苓去黑皮半兩為散每服五錢以新汲水調頓服訖以蔥䜴粥投之衣蓋取汗蔥白湯方治時氣傷寒發汗蔥白研一兩生薑二兩豉一合細茶末二錢先以水二盞煎蔥并薑至一盞半次下豉煎少時即入茶末去滓頓服厚衣蓋取汗解表湯方治初得傷寒時氣壯熱頭痛甘草炙二兩生薑二兩半黑豆二合㕮咀每服五錢煎頓服厚衣蓋覆取汗附桂散湯治傷寒時氣附子去皮臍桂各半兩為散每服三錢熱酒調頓服厚衣蓋汗出為度萬靈湯方和養三焦調順陰陽升降痞滯祛遣寒邪溫中散寒暖胃和脾滋助氣血思美飲食虛寒痼疼痰癖動氣心膈疼痛噎悶嘔逆一切氣疾不日全愈前胡柴胡秦芁甘草炙各半斤蘹香子炒木香桂去粗皮各一斤檳榔十枚白豆䓻去殼半斤芍藥半斤青橘皮半斤芎藭半斤甜葶藶半斤微炒桔梗四兩每服三錢大棗二枚同煎食前溫服傷寒疫癘論曰人生天地間稟氣於陰陽氣和則安氣􅀢則病故一嵗之內節氣不和寒暑乖候皆為疫癘之氣感而為病故名疫癘其狀無問長少率皆相似俗又名天行其病與時氣溫熱等病相類各隨其證以方制之前胡湯方治時行疫癘壯熱咳嗽頭痛心悶前胡升麻麥門冬貝母去心紫苑去苖土杏仁去皮尖雙仁研各半兩甘草炙一分石膏一兩一分每服三錢竹葉二七片同煎溫服不拘時葛根湯方治時行疫癘兼風熱目疼心中妨悶葛根一兩芍藥三分蔥白三莖豉半合水煎溫服再服石膏湯方治時行疫癘病壯熱頭痛脣乾石膏一兩葛根三分芍藥貝母百合升麻各半兩梔子仁甘草炙各一分每服三錢豆䜴五十粒蔥白三寸同煎服柴胡湯方治時行疫癘一二日頭痛壯熱柴胡二兩芍藥一兩梔子仁黃芩各半兩石膏葛根各一兩每服五錢蔥白三寸䜴三十粒同煎溫服不計時候傷寒結胸論曰傷寒病發於陽下之早邪毒之氣結聚於胸膈故名結胸其證心下堅鞭按之則痛項強如柔痓狀或從心下至少腹堅滿而痛其痛不可近其脈寸口浮關上自沈是其候也若正在心下按之即痛而脈浮滑亦名結胸凡此本太陽病脈浮而動數醫反下之胃中空虛客氣動膈令人短氣躁煩心中懊憹陽氣內陷心下堅滿則為結胸又或因得病三二日不能卧但欲起者心下必結若脈微弱者此素有積寒而反下之利止作結胸但下之而脈浮者必結胸皆當下之脈促者不為結胸也脈若浮即不可下下之則死結胸證悉具煩躁者亦死又有水結在胸脅者又有臟結者結胸無大熱為水結似結胸狀飲食如故時時下利陽脈浮關脈小細沉緊者為臟結舌上白胎滑者為難治若心下痞堅按之不痛者非結胸乃痞也宜審察而各依其法治之陷胸丸方治傷寒結胸心下堅實大便不利大黃醋炒葶藶子隔紙炒杏仁炒各二兩朴硝一兩研細與杏仁同研令如膏共為末再研勻入少錬蜜和更杵三五百下丸如彈子大每服一丸别入甘遂末半錢蜜一合水煎溫頓服之一宿乃下如不下更服取下為效大陷胸湯方治傷寒結胸頭項強心下痛按之實鞭大黃醋炒二兩甘遂溼紙裹煨一錢朴硝另研二兩各搗研為末每服用水一鍾入大黃末二錢次下朴硝末一錢同煎一二沸次下甘遂末一匙攪勻溫服取快利為度小陷胸湯方治傷寒小結胸病正在心下按之則痛脈浮滑者黃連去鬚一兩半夏湯洗七遍焙二兩半括摟實大者一枚各細銼先以水五盞煎括摟實取三盞去滓入黃連半夏合一半煎取一盞分溫三服治傷寒寒實結胸無熱證者與三物小陷胸湯用前方白散亦可服之桔梗炒三分巴豆去皮心熬黑研如脂一分貝母去心三分除巴豆外搗羅為散入巴豆合勻每服強人半錢弱羸之人減之並溫熱水調服病在膈上必吐在膈下必利不利進熱粥一杯利不止進冷粥一杯身熱皮粟不解欲引衣自覆若以水潠之洗之益令熱却不得出當汗而不汗則煩􅖍令汗出己腹中痛與芍藥三兩如上法葶藶湯方治傷寒結胸心下痛如石堅鞭小便不利葶藶子隔紙炒三分檳榔半兩桑根白皮三分杏仁去皮尖雙仁大黃醋炒各半兩朴硝三分每服五錢水煎食前溫服增損理中丸治傷寒下後虛氣不理毒復上攻毒氣相摶結於胸中縱不下者毒已入胸胃中不通毒還攻上心中結滿厥逆欲絶心起髙胸手不可近當先理其氣人參白术甘草炙括摟根枳實麩炒去瓤赤茯苓去黑皮牡蠣煅各二兩乾薑一兩半搗羅為末鍊蜜丸如彈子大每服一丸熟水化下不過五六丸胸中豁然陷胸青龍湯方治傷寒結胸毒氣內盛手足逆冷腹脹喘急大便不通牽牛子微炒一兩半人參三分陳橘皮浸去白半兩桂檳榔各一兩大黃醋炒半兩朴硝一兩每服五錢入生薑半分同煎食前溫服傷寒譫語傷寒潮熱傷寒煩渴傷寒煩躁傷寒厥逆傷寒譫語論曰傷寒不應發汗而汗之遂至亡陽津液內竭胃中燥實則令譫語此病或由津液不和內有燥屎或三陽合病或瘀熱蓄血在裏或婦人熱入血室皆使譫語也然譫語屬胃胃者足陽明經也陽明為病主身熱故譫言妄語則身當有熱脈當洪大洪大亦陽脈也故其病為煩滿譫語若手足厥脈反沉細而微者為逆也然又有鄭聲者取其鄭重之意與譫語相類蓋古人以此分虛實醫者當以脈症參合别之不可不慎故謂虛則鄭聲實則譫語小承氣湯治傷寒陽明病人多汗津液外出胃中燥大便必硬硬則譫語宜此湯大黃四兩紫朴二兩枳實三枚水煎五錢空心溫服日二大承氣湯治傷寒陽明下血譫語此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈汗出譫語以有燥屎在胃中此為風也須下者過經乃可下之下之若早語言必亂以表虛裏實故也下之愈大黃四兩紫朴半斤枳實五枚水煎五錢去渣入芒硝末一錢再沸溫服日二白虎湯治傷寒三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語下之則額上汗出手足厥冷若自汗出者宜此湯知母六兩石膏一斤甘草二兩粳米六合水煎五錢溫服柴胡湯治傷寒熱實得汗不解腹滿脹痛煩躁譫語柴胡一兩大黃炒片芩白芍半夏三分枳殼五錢薑水煎五錢溫服犀角湯治傷寒邪熱在胃譫語妄言身體壯熱犀角大青人參三兩逺志升麻兩半片苓柴胡一兩甘草五錢薑水煎五錢入蘆根茅根各五寸溫服人參柴胡湯治傷寒經六七日不解默默而煩心腹乾燥大腸結澀譫語妄言人參三分柴胡一兩白芍知母片芩萎㽔大黃炒半夏甘草五錢薑水煎五錢服日二自愈方治傷寒病汗多亡陽譫言妄語不可下與柴胡桂枝湯以和榮衛以通其津液柴胡四兩白芍人參桂心片芩半夏甘草一兩薑棗水煎五錢空心溫服日二傷寒潮熱論曰傷寒潮熱者謂潮作有時由邪氣入裏故病日晡發潮熱已而微利者有微發潮熱而大便溏者有潮熱而咳逆者有結胸而潮熱者大凡潮熱皆以邪氣內實制方宜酌其輕重小柴胡湯詳譫語柴胡加芒硝湯治傷寒十三日不解胸脅滿而嘔日晡潮熱已而微利此大柴胡症下之而不得利今反利者知醫以丸藥下之非其治也夫潮熱者實也先宜服小柴胡以解外後與此湯柴胡半夏芒硝二兩人參片芩甘草二兩薑棗水煎五錢去渣入芒硝一錢沸服大小承氣湯詳譫語柴胡石膏湯治傷寒十日以上潮熱不退柴胡石膏白术赤茯苓山梔萎㽔桑白皮三分水煎五錢溫服日二鱉甲湯治傷寒過經潮熱不解或作寒如瘧狀鱉甲柴胡赤茯苓一兩片芩甘草知母五錢桑白皮三分薑棗水煎五錢服秦芃湯治潮熱不退發作無時秦芃鱉甲一兩甘草五錢生薑水煎五錢入豆百粒蔥白三寸空心溫服日二傷寒煩渴論曰腎者水藏膀胱者津液之腑二經相為表裏傷寒熱入于臟流于少陰之經則腎受病矣腎水惡燥熱盛則燥故渴而引飲又傷寒邪氣非發汗吐下則不能除若發汗吐下過甚則亡津液耗少熱氣內生亦令病人煩渴也白虎加人參湯治傷寒用桂枝湯大汗出大煩渴不解脈洪大者知母三兩人參兩半石膏八兩甘草一兩粳米二合水煎五錢至米熟溫服日二五苓散治發熱六七日不解煩渴引飲水入則吐此為水逆豬苓赤茯白术桂心澤㵼一兩共末熟水下二錢日二汗出乃愈豬苓湯治傷寒脈浮發熱渴欲飲水小便不利水入則吐豬苓赤茯阿膠滑石澤㵼一兩水煎五錢空心溫服以差為度八味知母湯治傷寒病數日不解心燥煩亂小腹脹急臍下疼痛大渴喘乏知母白芍麥冬柴胡澤㵼三分片芩甘草五錢石膏兩半薑棗竹葉水煎五錢服葛根散治傷寒躁渴頭痛不得眠四肢痛葛根片芩大青石膏人參一兩甘草五錢水煎三錢溫服日二人參湯治傷寒下後除熱止煩渴人參麥冬五味石膏一兩甘草五錢水煎五錢服日二黃芩蘆根湯治傷寒吐下後內外有熱煩渴片芩蘆根人參赤苓一兩桂心五錢薑棗水煎五錢服竹茹湯治傷寒吐下後煩渴不止竹茹一丸人參五錢烏梅肉炒二枚水煎三錢服日二茯苓地黃湯治傷寒胃熱引飲煩渴不止赤茯生地括摟一兩知母五錢麥冬兩半水煎五錢入小麥百粒竹葉二七片棗二枚煎服知母犀角湯治傷寒煩渴飲水無度日漸消瘦知母犀角升麻五錢石膏三分水煎五錢入竹葉三七片小麥五十粒土瓜根汁括摟汁各半合服傷寒煩躁論曰傷寒陽氣多陰氣少病發于陽經者故令煩躁其候身熱而煩渴引水漿若胃中乾燥者必譫語亦有少陰經煩躁者當辨之大青龍湯治傷寒太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者此湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆麻黃去根節六兩甘草桂心二兩杏仁去皮尖炒四十枚石膏三兩研薑棗水煎五錢溫服出汗止後服五苓散煩躁不得眠白虎加人參湯大渴舌乾燥若飲水數升二方俱詳煩渴茯苓四逆湯治汗下後病仍不解煩躁白茯四兩人參附子一兩甘草乾薑二兩水煎五錢服吳茱茰湯治少陰病吐利手足逆冷煩躁欲死者吳茱茰洗炒一升人參二兩大棗生薑水煎五錢服日二蘆根湯治陽毒五六日以上胸中煩熱乾嘔躁悶蘆根一兩甘草知母柴胡括摟根兩半片芩兩半生薑水煎三錢溫服梔子䜴湯治陽明病脈浮而緊咽燥口苦腹滿而喘汗出不惡寒反惡熱身重若發汗則躁心憒憒而反譫語若加溫針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上胎者山梔肥大者四枚䜴五錢水煎空心溫服得吐便止桂甘龍牡湯治火逆汗下之因燒針煩躁桂枝一兩甘草龍骨牡蠣二兩水煎五錢溫服日二傷寒厥逆論曰傷寒病手足厥逆其名曰厥此因陽氣衰陰氣盛陰勝則陽脈逆而不通于四肢所以逆冷其症令人惡寒不飲水下利清穀或清便自調或小便數外症默靜是其候也宜溫之灸之若灸而手足不溫者為難治然厥亦有熱者先發熱而後厥熱深厥亦深熱微厥亦微脈雖沉伏按之當滑若或畏熱飲水或揚手擲足煩躁不得眠大便祕小便赤外症昏憒者雖厥不可溫也宜下之通脈四逆湯治手足厥冷微喘脈不出附子五錢人參甘草一兩乾薑兩半水煎五錢溫服日二當歸四逆湯治傷寒手足厥冷脈細欲絶川歸白芍桂心一兩細辛一兩甘草木通七錢大棗水煎五錢溫服日二芍藥湯治下利清穀內寒外熱汗出而厥腹痛兼嘔白芍附子一兩人參甘草五錢薑水煎五錢溫服日二吳茱茰湯治手足厥冷脈細欲絶吳茰白芍川歸桂心一兩甘草細辛三分乾薑五錢棗水煎五錢服日二蔥尉法治傷寒病後氣虛陽脫體冷無脈氣息欲絶不省人事及陰厥服百法不效者蔥一斤水洗淨以麻縷扎如盞許大切去根及葉惟存白二寸許如大餅餤先以火熁一面令通熱乃以熱處放在病人臍中連臍下其蔥上以尉斗滿貯火尉之令蔥餅中熱氣透入肌肉中須預作三四箇餅子一餅壞不可尉又易一餅良久病人漸醒手足俱溫有汗出更服四逆湯以溫其內其病即差傷寒頭痛傷寒喘傷寒上氣傷寒咳嗽傷寒頭痛論曰傷寒頭痛者邪氣循陽脈上攻于頭也是以傷寒傷風溫病熱病風溫病皆有頭痛病者蓋頭痛乃陽症也故太陽頭痛必發熱惡寒陽明頭痛不惡寒反惡熱少陽頭痛脈弦細而發熱至于三陰脈從足至胸皆不至頭惟厥陰脈挾胃屬肝絡膽循喉嚨上頏顙連目系上出額故仲景止有厥陰頭痛一症治以吳茱萸湯是也桂枝湯治太陽病頭痛發熱汗出惡風桂枝白芍三兩甘草炙二兩生薑大棗水煎五錢空心溫服投以熱粥助藥力小承氣湯治傷寒六七日不大便頭痛有熱大黃四兩紫朴薑汁炒二兩枳實三枚水煎五錢溫服麻黃湯治傷寒太陽頭痛發熱身疼腰痛一身骨節俱痛惡風無汗而喘者麻黃三兩桂枝二兩甘草杏仁去皮尖炒一兩水煎五錢稍熱服取汗連鬚蔥白湯治傷寒已發汗或未發汗頭痛如破蔥白連鬚三莖生薑二兩分三服水煎通口熱服服不差用葛根蔥白湯葛根蔥白湯治頭痛不止葛根白芍知母五錢川芎三分薑蔥水煎五錢溫服小柴胡湯治脈弦細頭疼發熱屬少陽少陽不可汗柴胡二兩片芩人參甘草三分半夏六錢薑棗水煎五錢空心溫服日二吳茱茰湯治傷寒厥陰乾嘔吐涎沫頭痛吳茱茰洗炒三兩人參兩半薑棗水煎五錢空心溫服茶調散治頭痛不止石膏研二兩羌活茵陳蒿蒼术甘草荆芥穗川芎一兩桂心五錢共末用臘茶末一錢同蔥煎湯下一錢石膏湯治頭痛不可忍石膏麻黃一兩葛根三分何首烏五錢水煎三錢溫服日二瓜蒂散治頭痛胸滿發熱惡寒脈緊而不大是膈上有涎瓜蒂一兩為末熱水下一錢吐痰涎愈前胡湯治頭痛壯熱前胡半夏桂心玄參甘草桔梗炒旋復花片芩生地一兩薑水煎五錢服四白散治頭痛身熱百節疼痛白芷白附子白殭蠶炒白蒺藜炒各等分共末茶酒任下二錢傷寒喘論曰傷寒喘其症不一有邪氣在表表未解無汗而喘者有邪氣在裏汗出不惡寒腹滿而喘者有潮熱者有心下有水氣而喘者古人各亦求其本故在表者當汗在裏者宜下至于心下有水而喘又當利其小便若乃陰症發喘是為無陽非炙之不可小青龍加杏仁去麻黃湯治心下有水氣咳而發喘白芍甘草桂心杏仁五味細辛乾薑三兩半夏二兩半水煎五錢服麻杏草膏湯治下後不可更行桂枝湯汗出而喘無大熱麻黃去根節四兩石膏八兩甘草二兩杏仁去尖五十枚水煎五錢服麻黃湯治太陽與陽明合病喘而胸滿不可下麻黃三兩桂心二兩甘草一兩杏仁七十枚水煎五錢溫服取微汗大承氣湯治傷寒陽明病脈遲雖汗出不惡寒其身必重短氣腹滿而喘有潮熱者此外欲解可攻裏也手足濈然汗出者此大便已硬也大承氣主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令至大泄下大承氣湯方詳譫語傷寒上氣論曰傷寒上氣者肺主氣手太陰是其經也病人肺氣凡有不調又遇寒熱邪氣傷于其經則脹而氣逆不下故令上氣竹茹湯治上氣喘滿客氣在臟乾嘔口生瘡不得飲食竹茹葛根一兩半夏麥冬三分甘草陳皮去白炒五錢薑水煎五錢溫服日二天門冬丸治心肺熱上氣喘逆天冬白茯杏仁一兩生地貝母甘草烏梅肉炒人參五錢共末蜜丸彈子大含化一丸日可三五葶􅐗湯治上氣喘粗身面腫小便澀葶􅐗紙膈微炒五錢大棗五枚去核水煎溫服日二貝母丸治心肺有熱咳嗽上氣喉中作聲痰涕口乾川貝母二兩杏仁去皮尖炒四兩天門冬一兩旋復花五錢炙甘草三分共末蜜丸彈子大食後含化一丸傷寒咳嗽論曰傷寒咳嗽者寒氣客于肺也肺受虛寒微則咳嗽然又有邪熱客于上焦其人必欲飲水水停心下水氣乘肺而咳嗽者當熟察之麻黃湯治咳嗽日夜不止麻黃去根節赤茯桑白皮一兩葛根五味子紫蘇葉炙甘草紫苑五錢石膏研兩半桂心一兩葶􅐗炒一分薑棗水煎五錢空心溫服日二小青龍湯治心下有水氣咳而微喘發熱或利或噎麻黃去根節一兩白芍半夏薑汁製桂心細辛炒炒乾薑五味子炒甘草五錢水煎五錢服日二五味子飲治傷寒咳嗽五味子炒麻黃去根節阿膠陳皮炒一兩甘草杏仁去皮尖炒五錢薑水煎三錢服加減小柴胡湯治五六日往來寒熱或微熱咳嗽柴胡二兩片芩半夏甘草三分黑乾薑五錢五味子炒一合薑水煎五錢服地黃飲治毒氣攻肺咳嗽咽喉生瘡生地二兩大黃升麻貝母麥冬甘草一兩水煎三錢入蜜少許服射干湯治春冬月傷寒夏秋月中冷咳嗽喉鳴聲嗄乾噦咽喉不利射干杏仁麻黃桑皮一兩半夏甘草桔梗炒二兩陳皮紫苑五錢薑棗水煎五錢服前胡飲治肺盛寒痰嗽不止心膈煩滿不能飲食常多嘔逆前胡桔梗玄參人參生地甘草旋復花桂心一兩半夏紫朴二兩薑水煎五錢服聖濟總録纂要卷三
