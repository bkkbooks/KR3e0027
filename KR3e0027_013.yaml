body:
  text: 聖濟總録纂要卷十三休寧程林纂虛勞門肝勞心勞脾勞肺勞腎勞虛勞統論論曰虛勞之病因五臟則為五勞因七情則為七傷勞傷之甚身體疲極則為六極所謂七傷者一曰大飽傷脾脾傷則善噫欲卧面黃二曰大怒氣逆傷肝肝傷則少血目暗三曰强立舉動久坐濕地傷腎腎傷則少精腰腳痛厥逆下泠四曰形寒飲泠傷肺肺傷則氣少咳嗽鼻鳴五曰憂愁思慮傷心心傷則苦驚喜忘善怒六曰風雨寒暑傷形形傷則髮落肌膚枯槁七曰大恐懼不節傷志志傷則恍惚不樂此七者勞傷之因也故名七傷所謂五勞者一曰肺勞令人短氣面腫鼻不聞香臭二曰肝勞令人面目乾黑口苦目視不明三曰心勞令人忽忽喜忘大便苦難時或溏泄口中生瘡四曰脾勞令人舌本苦直不能咽唾五曰腎勞令人背難以俯仰小便黃赤時有餘瀝隂痛生瘡小腹滿急此五者勞氣在五臟也故名五勞所謂六極者一曰氣極令人內虛五臟不足邪氣多正氣少不欲言二曰血極令人無顔色眉髮墮落忽忽喜忘三曰筋極令人數轉筋十指甲皆痛苦倦不能久立四月骨極令人痠削齒苦痛手足煩疼不可以立不欲行動五曰肌極令人羸瘦無潤澤飲食不生肌膚六曰精極令人少氣吸吸然內虛五臟氣不足毛髮落悲傷喜忘此六者勞傷之甚身體瘦極也故名六極又五勞七傷六極之外變症不一治法皆以補飬為宜形不足者溫之以氣精不足者補之以味氣味相得合而服之以補精益氣此其要也肝勞論曰患怒氣逆上而不下則傷肝肝勞則面目乾黑口苦精神不守恐畏不能獨卧甚則筋急而爪枯目盲無所見毛悴色夭者難治芍藥飲肝勞不足補虛白芍丹皮枳實荆芥穗二分熟地青葙子黃茋炙甘草白茯苓白附子山枝防風兩半細辛五錢竹葉水煎前胡湯肝勞虛熱目赤難開煩悶熱氣上冲瀉肝除熱前胡山枝大青細辛秦芁乾姜决明子片芩一兩車前子一合石膏一兩竹葉三兩水煎欲利加芒硝茯苓湯肝勞熱恐畏不安精神悶怒不能獨卧氣錯越白茯人參防風炙甘草逺志牡蠣柏子仁五錢龍骨二分蜜丸梧子大酒下二十丸青龍丸治肝傷健忘目視不明面目青白常多恐懼龍骨羌活秦艽一兩茯神羚角甘菊青葙子白附子丹砂三兩蜜丸梧子大人參湯下三十丸心勞論曰心勞病者補脾氣以益之脾旺則感于心人逆夏氣則手太陽不長心氣內洞順之則生逆之則死順之則治逆之則亂反順為逆是謂內格病不生矣其候令人善怒不樂大便鴨溏口瘡久不差耳枯而鳴不能聽逺皮毛焦色夭者死于冬逺志湯心勞多煩躁背膞妨悶面色時變乍赤乍黑或笑或歌逺志白芍犀角一兩人參知母五錢赤茯麥冬兩半片芩前胡水煎五錢頃時又服磁石湯心勞熱耳焦多鳴不能聽逺磁石人參白术赤茯白芍大青菖蒲兩半赤石脂一兩竹葉水煎補心麥冬丸心勞多驚悸心氣不足麥冬天冬熟地川連逺志升麻兩半菖蒲人參白茯一兩桂五錢蜜丸湯下開心氣多記不忘獺肝丸心勞熱胸膈聚痰頭目微痛肌膚漸覺消瘦獺肝川連柴胡鱉甲地骨升麻天靈蓋貝母兩半天冬知母犀角茯神紫苑胡黃連前胡杏仁炙甘草生地檳榔三兩百合麻仁各三兩蜜丸飲下日二朱雀湯心氣勞傷雄雀十枚用肉人參棗肉赤茯紫石英小麥一兩赤小豆一合炙甘草一分丹參逺志紫苑五錢水煎脾勞論曰飲食勞倦則傷脾脾傷則善噫欲卧面黃舌本苦直不得咽唾皆脾勞也宜補益肺氣則感于脾矣七香散脾勞腹脹憂思不樂大便滑泄不思食肌肉瘦人參白术白茯白芍陳皮桔梗紫苑蘹香子白芷一兩蒼术五兩乾姜二兩柴胡兩半共末用豬腎切一對入鹽一錢末三錢紙包煨飲下羊腎丸脾勞臟腑滑泄夜多盜汗腹虛鳴困倦少力羊腎艾葉糯米粥拌焙乾末五錢木香肉蔲蓯蓉一兩丁香五錢棗肉丸酒下蘹香子丸脾勞肌膚瘦瘁黃色焦黃四肢無力腳膝疼痛大便不調或風勞上攻頭眩目暗肌體沉重昏憒嗜卧皆宜急服蘹香子附子川椒牛膝蓯蓉青鹽巴㦸天二兩共末羊腎三對煮研蜜丸酒下黃茋湯脾虛勞傷黃茋二兩棗肉白石英木通白石脂五錢炙甘草藁本一分水煎肺勞論曰肺勞者因形寒飲冷逆秋氣所致其症短氣面腫鼻不聞香臭胸中結滯氣乏聲嘶咳嗽呀呷咯唾稠黏或吐膿血或咽喉乾咳不能唾上氣喘滿漸至衰瘁寒熱時作飲食減耗皆肺勞之症補氣黃茋湯肺勞飲食減少氣虛無力手足顫掉面浮喘嗽黃茋白术人參五味麥冬熟地茯神陳皮阿膠桂一兩牛膝白芍當歸三分炙甘草五錢用薑棗水煎鰻鱺煎丸肺勞咳嗽日久大鰻三條醋洗斷截酒煮取肉再入酒熬成煎桔梗柴胡青蒿子人參附子炙甘草知母秦芃鱉甲共末入蜜煎丸梧子大酒下日二白虎湯肺氣勞傷龍骨人參白茯白石英百合磁石桑白皮𤣥參五錢大豆一合酒水煎蛤蚧丸肺勞咳嗽蛤蚧一對天冬生地麥冬一兩貝母四兩款冬紫苑二兩杏仁三百枚蜜丸梧子大薑湯下腎勞論曰腎勞者勞傷腎也腎傷則少精腰背痛難俯仰小便不利時有餘􅅹隂痛囊濕生瘡小腹滿急厥逆下冷皆其候也經所謂强力入房久坐濕地傷腎特其一端耳羊腎湯腎勞虛損寒熱耳嗚好睡善缺腰腳痿弱羊腎一對白术白茯磁石黃茋乾姜一兩桂三分水煮腎汁煎五錢逺志丸腎勞虛夢寤驚悸小腹拘急面色黧黑白濁腰脊痛逺志杜仲白茯枳殼桂五錢熟地兔絲子一兩共末蜜丸梧子大酒下三十丸冷勞熱勞氣勞急勞風勞冷勞論曰冷勞者由脾胃久積風冷之氣不能灌溉四旁潤養身體致腑臟俱虛隂陽衰弱其狀食不化心腹痞滿嘔吐吞酸面色萎黃甚者心腹常痛大腸泄利手足逆冷骨節痠疼日漸羸瘦是也木香丸治冷勞便利不調腹脹嘔逆困乏少力廣木香附子肉豆蔲乾薑陳皮去白炒麥門冬郁李仁一兩熟艾鱉甲醋炙柴胡陳麯炒二兩紫朴薑炒三兩鍾乳粉桂心五錢共末用雄猪肚一具去脂膜細切入好米醋三升煮極爛研細入末搗丸梧子大空心溫酒米飲任下二十丸猪肝丸治冷勞腹痛下利面色萎黃四肢無力雄猪肝一具去脂切片入米醋三升煮肝紫朴薑汁炒乾薑炒黑陳皮去白炒川連一兩枯白礬柴胡二兩附子桂心五錢共末將肝爛搗如泥入白麵五匙沸湯煎三五沸和肝末同搗丸梧子大空心酒下十丸日二熱勞論曰熱勞之症心神煩躁面赤頭疼眼澀唇焦身體壯熱煩渴不止口舌生瘡食飲無味肢節痠疼多卧少時出盜汗日漸消瘦是也鱉甲丸治熱勞羸瘦壯熱盜汗煩渴鱉甲醋炙柴胡秦芃二兩生地黃汁生薄荷汁如無用乾熬生青蒿汁生薑汁各一鍾慢熬成膏共末入膏搗丸梧子大空心米飲下二十丸日三服人參湯治熱勞心神煩躁肢體痠疼不能食人參茯神赤芍棗仁甘草知母生地枳實括蔞根白薇一兩水煎三錢空心溫服日二蛤蚧丸治熱勞煩躁面赤口乾唇燥骨節痠疼盜汗咳嗽痰壅力乏氣促蛤蚧酥慢炙人參黃茋蜜炙麥冬胡黃連甘草地骨皮知母鹽酒炒柴胡懷生地鱉甲醋炒炙紫苑桑白皮五錢細辛杏仁去皮尖炒研一分共末入蜜杵丸小豆大空心米飲下二十丸臨卧再下三十丸青蒿飲治暴勞熱四肢煩疼手腳心熱咽乾虛渴食少宜退熱青蒿甘草龍骨麥冬知母柴胡一兩桃枝心一把栁枝心一把童便合水煎四錢入葱白薤白各三寸空心溫服地黃煎治熱勞五心壅熱煩渴不止生地汁青蒿汁生薄荷汁童子便白酒二升入汁同熬成煎秦芃鱉甲醋炙柴胡去蘆二兩丹砂飛過麝香另研半分共末入煎杵丸小豆大丹砂為衣空心酒下二十丸日二氣勞論曰氣勞者由喜怒不節憂思過甚榮泣衛除穀氣不治故氣血為之乾涸不能榮養肌肉使形體瘦悴面色萎黃胸脹痞滿飲食減少羸瘦困乏故名氣勞沉香湯治氣勞心胸不利日漸消瘦四肢沉倦無力飲食無味骨節疼痛小便赤澀榮衛不和沉香川芎桂心檳榔川歸乾薑五錢人參草豆蔲枳實白茯苓前胡黃茋三分柴胡訶勒皮附子甘草五味子一兩半夏薑汁炙二兩生薑大棗水煎三錢空心溫服日二天冬丸治氣勞咳嗽喘嗽下焦虛損上焦煩熱肌瘦天冬麥冬熱地鱉甲二兩人參牛膝黃茋山藥杏仁白茯苓五味子石斛枸把訶勒皮一兩沉香紫苑肉蓯蓉酒洗去甲三分共末入蜜搗丸如小豆大空心煎大棗湯下二十丸日二人參陳皮湯治氣勞心胸煩悶痰涎壅塞不思食頭目昏眩人參陳皮白芍前胡柴胡鱉甲枇杷葉炙三分半夏白茯苓一兩大腹皮一枚全用薑棗水煎三錢空心溫服急勞論曰急勞之病其症與熱勞相似而得之差暴也緣稟受不足憂思氣結榮衛俱虛心肺壅熱金火相形臟氣受剋或感外邪故煩躁體熱頰赤心忪頭痛盜汗咳嗽咽乾骨節痠疼久則肌膚消爍咯涎吐血皆其候也故名急勞青蒿飲治急勞煩躁壯熱四肢無力痠疼青蒿三兩山梔甘草五錢地骨皮一兩桃枝心栁枝心各二兩烏梅水煎三錢空心溫服猪肝丸治急勞瘦瘁日晚寒熱驚悸煩渴雄猪肝二具去筋膜切片生甘草十五兩為末將肝為末拌勻入童便五升浸一伏時慢煮乾搗丸梧子大空心飲下二三十丸日三葱白飲治急勞潮熱盜汗肌肉消瘦葱白薤白炙甘草七寸青蒿心七枚杏仁去皮尖炒七粒研用童便浸一宿煎服皂莢丸治急勞咳嗽痰涎食少無力猪牙皂一兩去皮炙蝦蟆一枚要青黃脅畔紋如金色者去腸挂風處隂乾麝香另研一錢各研末和勻入羊腸內扎定碗盛安甑內蒸極爛研杵極細為丸約有二百餘粒每服熟水空心下二三丸避風取汗良久瀉血汗出去衣被用白粥將息調養合藥用五日或天德日忌見女人雞犬風勞論曰風勞者即肝勞之類也蓋肝主風風善行而數變無所不至勞傷之人氣血俱虛風邪易侵或遊行皮膚或沉滯臟腑其病令人手足􅍙痺筋脉拘急頭旋目暗好怒多驚尋覔衣縫卧語狂呼爪甲枯目黯黑是其症也故名風勞敗龜板湯治風勞氣虛咳嗽發熱敗龜板醋炙白芍防風川歸海桐皮虎骨酥炙木通五錢桂心木香酸棗仁黃茋麻黃去根節大腹皮全用牛膝一兩水煎五錢入青蒿鳥梅肉少許空心溫服一方加熟地柴胡一兩天麻散治風勞氣虛不順天麻附子一兩甘草烏頭二兩麻黃三兩蕪荑仁炒柴胡秦芃前胡鱉甲青蒿四兩將藥粗搗末用雄猪脊骨一條白酒一斗同煮乾去骨為末空心酒下三錢日二茵陳蒿散治風勞七種冷氣六極等疾脾胃虛寒不思飲食疳利休息利二便祕澀及屢年不差者茵陳蒿人參白术石斛三分白蕪荑吳茱茰洗炒一兩白芍藥桂心防風桔梗五錢紫苑柴胡去蘆三分犀角三分共末用猪肝一具切片去膜分三服每入末五錢葱白食鹽少許拌勻濕紙包煨香熟細嚼酒下虛勞咳嗽虛勞痰飲虛勞寒熱虛勞潮熱虛勞盜汗虛勞咳嗽論曰虛勞咳嗽者以肺傷胃弱榮衛衰微氣不溫充故也肺主氣為五臟之蓋其脉環循胃口肺臟勞傷則令人咳嗽上氣或吐膿血寒熱潮作面赤口乾偏卧喜汗不能飲食飢膚消瘦是也蛤蚧湯治虛勞咳嗽嘔吐痰涎胸膈不利喘急壅滿呀呷有聲飲食不進蛤蚧一對酥炙人參白茯桑白皮一兩杏仁去皮尖五兩甘草五錢薑水煎三錢空心溫服阿膠丸治虛勞咳嗽發熱羸瘦阿膠懷熟地山藥羚羊角茯神百合地骨皮五味五錢麥門冬人參牡丹皮逺志三分蛤蚧一對酥炙柏子仁炒共末蜜杵為丸如彈子大每服一丸細呷日二虛勞痰飲論曰虛勞之人陽氣不足水飲下咽入于胃腑不能流傳致多痰飲其候胸膈痞悶肩息短氣怠惰嗜卧心下悸動咳嗽痰水不欲飲食是也治宜調順三焦升降隂陽使氣道流通痰飲自化人參半夏湯治虛勞脾不和痰飲留滯心胸煩悶嘔吐痰涎頭昏目眩不思飲食人參半夏薑汁炒赤茯一兩大腹皮二枚前胡白芍陳皮去白炒柴胡鱉甲醋炙二分枇杷葉去毛炙薑水煎三錢服虛勞寒熱論曰虛勞寒熱者以臟腑久虛隂陽交爭榮衛不足以致陽氣勝則熱隂氣勝則寒隂陽相勝故寒熱互作秦芃丸治寒熱虛勞四肢無力面色枯悴秦芃二兩黃茋桂心白芷柴胡鱉甲肉豆蔲桔梗一兩人參荆芥穗麥冬甘草川歸海桐皮白芍熟地枳殼木香沉香棗仁檳榔五錢薑水煎三錢空心溫服前胡湯治虛勞榮衛不和寒熱消瘦肢體煩疼頭目昏眩飲食無味多困少力前胡人參羌活獨活枳殼柴胡桔梗炒鱉甲一兩甘草五兩石膏旋復花兩半水煎三錢溫服柴胡湯治虛勞寒熱羸瘦不下食柴胡白茯三兩人參麥冬兩半白术枳殼二兩炒生薑大棗水煎三錢空心溫服日二虛勞潮熱論曰虛勞潮熱者潮作有時也此由隂陽不和氣有遍勝其候頭面熻赤體熱潮躁卧寐不安是也栁枝湯治虛勞煩躁少力痰嗽面頰紅赤潮熱盜汗飲食無味五心煩熱百節疼栁枝柴胡鱉甲二兩木香甘草青皮大黃炒五錢水煎四錢入青蒿小麥溫服羚羊角湯治虛勞潮熱五心煩躁口乾咽喉不利羚羊角人參白茯苓柴胡鱉甲醋炙麥冬棗仁去殼炒地骨皮羌活懷生地陳皮去白炒知母炙甘草葛根黃芪一兩薑水煎三錢空心溫服日二柴胡湯治虛勞榮衛不和潮熱盜汗面黃痿瘦四肢骨節疼痛多困少力飲食少柴胡知母甘草鱉甲醋炙一兩秦芃兩半大棗水煎三錢空心溫服日二鱉甲猪肚丸治虛勞潮熱唇紅頰赤吸呼氣粗口乾盜汗大小便祕澀飲食減少困之鱉甲九肋醋炙柴胡廣木香青蒿懷生地一兩川連炒二兩青皮去白炒五錢共末用雄猪肚一具去脂用鹽揉洗淨入末藥于肚內扎定蒸極爛入石臼中搗千杵丸梧子大空心飲下二三十丸日二虛勞盜汗論曰眠寢之間汗出盜人氣血久則津液枯耗謂之盜汗此蓋虛勞之人陽氣外虛風在肌表腠理虛疏心氣不足故也不治則榮衛衰損肌肉消瘁變為羸瘠麻黃根湯治虛勞盜汗不止四肢困乏無力麻黃根牡蠣童便淬黃茋各等分水煎三錢入葱白三寸溫服黃茋湯治虛勞盜汗不止及陽虛自汗黃茋蜜炙人參一兩麻黃根二兩牡蠣童便淬三兩地骨皮五錢大棗水煎三錢空心溫服日二車前子散治虛勞盜汗咳嗽潮熱車前子炒五錢朮賊草炒兔絲子酒浸一分椒目炒一兩共末用生猪肉精者一兩切片入末二錢拌勻濕紙包煨熟服虛勞咳唾膿血虛勞嘔吐血虛勞不得眠虛勞咳嗽膿血論曰虛勞之人氣血久耗寒邪僣熱伏結上焦內傷心肺殘賊榮衛心主血血為榮肺主氣氣為衛榮衛不調金火相剋其病難治則因咳嗽間有膿血者津液腐也宜潤養上焦滋益榮衛則病緩而可已萎蕤湯治虛勞咳嗽咯吐膿血萎蕤百部人參知母桑皮一兩阿膠馬兜鈴麥冬白茯五錢水煎三錢入烏梅肉生薑蛤蚧湯治虛勞咳嗽咯吐膿血蛤蚧貝母杏仁去皮尖炒知母鹿角膠人參枇杷葉去毛炙桑白皮甘草葛根一兩共末水煎三錢溫服白前飲治虛勞咳嗽上氣壅熱咯吐膿血白前二兩桔梗桑白皮一兩白茯苓杏仁兩半甘草一兩水煎服通神湯治虛勞咳嗽不止肺氣損傷咯吐膿血痿瘦白茯枳實人參甘草秦芁柴胡一兩生地兩半土馬騣二兩水煎三錢溫服虛勞嘔吐血論曰血與氣相隨而行外養肌肉內榮臟腑若臟腑勞傷則血液妄行損輕則隨吐而出損極則血下于胃因嘔而出胸膈氣逆甚乃吐血蓋虛勞之人臟氣內傷故也香膠散治血勞內傷吐血阿膠鹿角膠枳實同上用糯米炒人參荷葉黃藥去皮麩炒蒲黃生一兩四味同末同研藕汁下一錢日二人參散治肺臟虛勞吐血人參去蘆五錢黃蜀葵一兩共末空心米飲下一錢晚再下獨聖散治虛勞咯血吐血不止楓香脂不拘多少研用人參糯米飲空心下一錢日二箬葉散同上箬葉燒灰一兩麝香研一錢同研勻用人參阿膠湯下一錢日二虛勞不得眠論曰老人卧而不寐少壯寐而不卧者何也少壯者血氣盛肌肉滑氣道通榮衛之行不失其常故晝日精而夜寐也老人血氣衰肌肉枯榮衛之道澀五臟之氣相摶其營氣衰少而衛氣內伐故晝不能精夜不得寐也虛勞之人氣血衰少榮衛不足肌肉不滑其不得眠之理與老人同半夏湯虛勞煩躁不得眠半夏二兩白茯四兩糯米炒黃一合生薑水煎三錢溫服日二陳皮湯治虛勞晝夜不得眠短氣食不下大病後虛熱痰冷陳皮一兩半夏五錢川芎分半甘草半分薑水煎五錢入竹茹一丸日二酸棗仁煎治虛勞心熱憂懼不得眠酸棗仁二兩半炒乳香二兩炙去油牛黃另研一分丹砂五錢飛過糯米炒二合白蜜四兩共末用白酒半斤入蜜與末慢火煎如稀餳勿令焦收貯空心酒下一匙日二酸棗仁丸治虛勞心煩熱口乾憂懼不得眠酸棗仁微火炒地榆葉微炙五錢共末入蜜杵為丸如小豆大空心米飲下三十丸晚再下茶下亦可虛勞失精虛勞失精論曰經云腎者主蟄封藏之本精之處也蓋腎受五臟六腑之精而藏之氣盛則輸瀉有常虛勞之人精臟已虧邪氣乘之則藏者不固或于夢寐便溺漏失無常其症小腹强急隂頭寒冷目痛髮落脉數而散芤動微緊是其候也韭菜子散治虛勞傷損小便失精及夢泄等症韭菜子一兩麥冬一兩川芎三分兔絲子酒煮一兩車前子微炒一合白龍骨煆三分共末酒下二錢日二韭菜子丸治虛勞漏精韭菜子炒兔絲子天雄車前子龍骨一兩黑乾薑桑螵蛸炙鹿茸三分共末蜜丸梧子大黃茋湯下二十丸白龍骨散治元氣虛弱精神不禁腰脊疼痛白龍骨肉蓯蓉補骨脂一兩兔絲子酒煮五錢韭菜子炒五錢共末酒糊丸梧子大空心酒下三十丸正陽丸治陽氣虛損下元冷極精泄不禁小便頻數腰腳無力飲食減少困乏白馬莖酥炙鹿茸二兩附子肉蓯蓉一兩巴㦸天石楠葫蘆巴牛膝五味子三分韭菜子石斛五錢木香兩半共末蜜丸梧子大酒下二十丸金鎖丸治虛勞失精久服補骨髓去腎邪巴㦸天白龍骨山茰肉一兩韭菜子四兩共末蜜丸梧子大空心酒下三十丸固氣不二丸治虛勞元氣衰弱精氣滑泄夢中遺泄乾柿雞頭舌雞頭纂下尖也金櫻子蓮蕊一兩共末用烏雞子汁杵丸梧子大空心酒下二十丸日二韭菜子散治虛勞夢泄日漸消瘦韭菜子炒一合人參大棗黑乾薑黃茋赤芍白龍骨炒半夏薑汁炒川歸甘草一兩共末入蜜杵小豆大空心酒下三十丸日二鹿茸丸治虛勞腎氣虛乏失精腰腳無力小便數鹿茸補骨脂二兩附子牛膝桑螵蛸杜仲鹽酒炒山藥兔絲子桂心黃茋肉蓯蓉酒煮懷熟地逺志一兩白龍骨澤瀉黑乾薑防風牡蠣童便淬三分共末入蜜杵丸梧子大空心酒下二三十丸日二虛勞小便白濁白淫筋極氣極脉極即血極肉極即肌極骨極精極六極詳統論中虛勞小便白濁論曰虛勞小便白濁者腎氣勞傷胞絡內冷氣道不宣通也腎主水腎虛則胞冷而津液停滯故令小便白濁如米脂而下澤瀉散治大虛損內傷腎氣不足小便濁澤瀉白龍骨車前子桑螵蛸炙狗脊一兩共末酒下二錢七聖丸治虛勞下元虛冷小便濁精滑不禁原蠶蛾牛膝白石脂白龍骨桑螵蛸五錢肉蓯蓉山藥一分共末酒煮糊丸梧子大空心酒下二十丸日二黃茋丸治虛勞有熱虛煩口乾腰胯痛便濁如米泔黃茋茯神羚角牡蠣甘草兩半川連括樓根二兩苦參二兩半雞膍胵黃皮五枚炙共末入蜜杵丸梧子大飲下三十丸人參湯治腎虛引飲便濁腰痛人參五味子川芎川歸逺志澤瀉桑螵蛸桂心熟地一兩白芍片芩白茯雞膍胵黃皮炙五錢麥冬二兩水煮羊腎一對取汁入薑棗煎藥五錢溫服日二白淫論曰內經謂思想無窮所願不得意淫于外入房太甚宗筋弛縱發為筋痿及為白淫夫腎藏精以慳為事志意內治則精全而嗇出思想外淫房室太甚則固者搖矣故使淫泆不守隨溲而下也然本于筋痿者宗筋弛縱故也金鎖丸治下元虛冷小便白淫夢遺原蠶蛾韭菜子補骨脂二兩白龍骨牛膝桑螵蛸山茱茰兔絲子肉蓯蓉一兩共末入蜜丸梧子大酒下三十丸祕真丸治精氣不固白淫不止白龍骨砂仁五錢訶勒皮五枚丹砂飛一兩共末用糯米粥丸梧子大丹砂為衣空心熱酒下二三丸不可多服若大便不通欲通用葱白湯㸃茶服之即通龍骨湯治白淫遺泄無故自出龍骨五兩人參白茯甘草熟地桂心牡蠣二兩水煎五錢空心溫服日二石斛散治陽氣虛憊白淫不止金叉石斛三兩巴㦸天兔絲子二兩杜仲鹽酒炒桑螵蛸炙兩半共末空心酒下一錢日二筋極丹參湯治筋實極腳下腫滿面痛不能逺行腳心如割筋斷折痛不可忍丹參木通生地麥冬麻黃去根節川芎杜仲牛膝續斷地骨皮禹餘糧醋淬七次桂心川歸一兩牡蠣童便淬甘草五錢薑水煎五錢溫服日二地黃煎丸治足厥隂經有餘筋實極足下滿痛四肢筋急生地汁六升天冬汁三升生薑汁白蜜鹿髓黃牛酥棗肉取膏各三合醇酒升半茯神分半枳殼川芎二分金叉石斛黃茋一兩炙甘草炙一兩上六味共末先將煎三汁與酒并煎減半入蜜髓酥膏同熬如稠糖再下六末重湯不住手攪勻丸梧子大空心酒下三十丸氣極甘露丸治肺臟氣極風熱所傷津液不通甘草炙懷生地天冬大黃蒸一兩逺志桑白皮炙防風地骨皮羌活秦芃三分羚角胡黃連五錢共末入蜜杵丸梧子大空心薑湯下二十丸日二脉極鎮心丸治脉極驚悸丹砂鐵粉人參逺志五錢茯神一兩虎晴一對琥珀研牛黃氷片一分金箔銀箔草張共末入棗肉杵丸梧子大丹砂為衣金銀湯空心下十丸服之安五臟桑皮沐頭湯治脉極虛寒鬚髮墮落桑白皮二升用井華水漬一宿煮湯沐鬚髮極佳柏葉沐頭丸治脉極虛寒鬢髮墮落生柏葉一兩附子五錢猪膏五錢共末入猪膏丸作二十丸每用一丸入沐湯中洗頭令髮長不落肉極防風湯治肉極肌肉變色舌强隂縮腳膝疼弱防風獨活白茯兩半人參川芎五加皮乾薑桂心甘草川歸一兩附子五錢共末酒煎四錢空心服石南散治肉極實熱身上如鼠走風痺唇口壞皮膚變色石南一兩山藥二兩山茰升麻萎蕤兩半石膏黃茋三兩真珠天雄桃花甘菊甘草五錢共末酒下二錢骨極酒浸芍藥散治骨極骨髓中痠疼白芍生地鹿骨酥炙二兩酒一斗浸晒為末酒下三錢日二木瓜湯治骨極腰脊痠痛風虛氣衰不能久立腦髓痠疼服之補虛損壯元陽木瓜五枚去皮子切片用硇砂十兩取霜拌蒸收貯每用三兩入後藥雄雀四十隻去頭足入醋煮爛取肉入乾薑川椒末各二兩同瓜用酒三升慢熬膏附子兔絲子三兩木香沉香天雄去皮臍製羌活兩半補骨脂炒一兩白蒺藜石斛天麻酒煮肉蓯蓉酒浸洗大茴炒三分共末入膏丸梧子大鹽湯下三十丸精極地黃飲治精極臟腑俱損偏身虛熱骨節煩疼生地汁麥冬汁白蜜二合竹􅅹一合炙甘草兩半片芩石膏二兩半麻黃去根節一兩人參川芎兩半桂心川當歸一兩水煎五錢去滓入汁蜜竹􅅹分二服地黃煎治精極臟腑虛羸骨節煩疼精泄不止益氣養神駐顔色調血脉生地汁五升白酒一斗同汁熬成膏巴㦸天鹿茸桑螵蛸炙肉豆蔲附子黃茋蜜炙一兩蛇牀子石斛補骨脂炒青木香陳皮牛膝五味子三分沉香枳殼去白炒蓽沉茄五錢肉蓯蓉二兩共末入地黃膏為丸如梧桐子大酒下三十丸聖濟總録纂要卷十三
