body:
  text: 聖濟總録纂要卷五休寧程林纂瘧疾門諸瘧統論論曰夏傷于暑秋成痎瘧該于夏而作也方夏之時隂居于內暑雖入之勢不能動候得秋氣陽為之動變汗出遇風乃成此疾故名曰痎瘧皆生于風蓄作有時其氣隂陽上下交爭虛實更作隂陽相移也陽併于隂則隂實而陽虛陽明虛則寒栗鼓頷巨陽虛則腰背頭項痛三陽俱虛則陰氣勝隂氣勝則骨寒而痛寒生于內故中外皆寒陽盛則外熱陰虛則內熱內外皆熱則喘而渴故欲冷飲因傷于暑熱氣盛藏於皮膚之內腸胃之外此榮氣之所舍也令人汗空疏腠理開因得秋氣汗出遇風及得之于浴水氣舍于皮膚之內與衛氣並居衛氣者晝行于陽夜行于隂此氣得陽而外出得隂而內薄內外相薄是以日作日作者氣之所舍深也作之早晏者隨風腑日下一節也是以或先寒後熱或先熱後寒或但熱無寒或本于痰或本于瘴癘或本于鬼神或本于邪氣大概外傳經絡內入五臟症既不同治法亦異凡治瘧者不辨陰陽虛實概以吐藥投之有非痰實而真氣受斃者固多其內經論五臟諸經之瘧本以刺法補瀉其寒熱先後與夫正發早晏又皆不同明指邪氣所傳不可一槩而論今備載諸症本末恭以治之輕重要在隨症而施庶幾乎無一曲之蔽也寒瘧論曰寒瘧之狀內經謂先寒而後熱病以時作是也蓋傷暑汗出腠理開發因遇夏氣凄滄之水寒其氣藏于皮膚腠理之中秋傷于風則病成矣其症先起于毫毛伸欠乃作寒栗鼓頷腰脊俱疼寒去則內外皆熱頭痛飲冷是也檳榔湯治寒瘧神效檳榔常山桂心陳皮去白炒甘草炙一兩酒水合煎三錢未發時先服鱉甲常山酒治瘧先寒戰解即壯熱鱉甲醋炙一分淡竹葉一兩甘草常山三分酒半鍾浸藥一宿次早加水煎未發時溫服得吐為效蜀漆散治寒瘧蜀漆水洗去腥焙雲母火煆一晝夜龍骨一兩共末未發時漿水下五分烏梅丸治寒瘧不止烏梅肉炒桃仁去皮尖炒常山豉炒三分升麻肉蓯蓉酒浸洗人參甘草炙桂心一兩共末密杵丸桐子大空心酒下二十丸至三十丸虎骨丸治一切寒瘧無問逺近虎骨酥油炙人參甘草桂心烏梅肉炒五錢桃仁去皮尖炒肉蓯蓉常山升麻三分附子五錢麝香研一錢豉炒一合共末蜜丸桐子大未發時飲下三十丸二薑散治寒瘧不差黑乾薑髙良薑一兩同炒黑為末空心酒下一錢日三寒瘧塗方鱉甲醋炙五錢烏賊魚骨去甲附子常山炙甘草一兩酒煎五錢次日以酒塗手足并背上如不發即止發時飲此酒一鍾又方附子一枚生用為末用酒和塗病人背心上佳溫瘧論曰溫瘧之狀內經所謂先傷于風後傷于寒其症則先熱後寒病以時作是也蓋風為陽氣寒為隂氣風氣大勝故先熱而後寒得之冬中風寒氣藏于腎內至骨髓至春陽氣大發邪氣不能自出至夏大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗俱出故氣從內之外其法宜先治其陽後治其陰則瘧疾自除蘆根湯治初壯熱後寒戰骨節痠疼口乾煩渴蘆根石膏一兩麥冬升麻葛根三分山梔五錢水煎五錢入竹葉十片未發前連三服知母湯治瘧骨節疼痛時嘔朝發暮解暮發朝解知母二分甘草一兩石膏三兩桂心五錢粳米一合水煎五錢入米一撮候未熱未發時先服常山飲治溫瘧壯熱微寒常山如雞骨者五錢淡竹葉一把小麥一合水浸一宿次早煎未發時空心溫服老年久病之人及虛弱者煎三錢服寒熱往來論曰陰陽相勝而寒熱互作者以邪氣相并也故氣并於陰則為寒氣并於陽則為熱寒則振栗鼓頷以陰實陽虛故也熱則渴而飲冷以陰衰陽勝故也柴胡桂枝湯治瘧寒熱往來柴胡四兩桂枝人參片芩白芍兩半甘草半夏一兩薑棗水煎六錢溫服日二人參湯治寒熱瘧時作面色黃人參常山五錢甘草陳皮去白炒三分水煎五錢入茶末燈心去滓入酒半鍾未發時先服取吐如未吐再服以痰盡為度鱉甲大黃丸治瘧寒熱往來久不差鱉甲大黃生附子人參甘草常山蜀漆白薇一兩共末蜜丸桐子大竹葉湯平日服十五丸良久又服疸瘧論曰疸瘧之狀內經所謂但熱不寒陰氣先絶陽氣獨發少氣煩寃手足熱而欲嘔是也得之邪熱留于身中厥逆上沖氣實而不外泄因有所用力腠理開疏風寒客于皮膚之內分肉之間而發發則陽氣盛不及于隂故但熱不寒氣內藏于心外舍于分肉之間令人消爍肌肉名曰疸瘧以單陽無隂故也白虎加桂湯治瘧疾陰氣孤絶陽氣獨發脈微少氣煩滿手足熱欲嘔但熱而不寒邪氣內藏于心外舍于分肉之間令人消爍肌肉石膏研一兩六錢知母鹽酒炒六錢甘草蜜炙二兩粳米炒半合用汲水一升煮藥五錢入粳米一撮以米爛為度去滓入桂末三錢再煎取四合作一服稍熱服取汗先寒發熱汗出愈豉心湯治疸瘧但熱不寒豉心一合雄鼠屎炒二錢童便三升半黑山枝三分柴胡鱉甲一兩一分甘草五錢烏梅肉七枚炒生地汁二合生薑汁一分桃枝心柳枝心各一把除鼠糞地薑汁小便將藥入小便浸一宿于星月下次早煎去滓入鼠屎地薑汁煎分三服一日用石膏湯治疸瘧熱甚不差石膏研二兩白粳米五十粒常山三分水煎五錢入竹葉二七片空心欲發與正發時各一服靜臥勿與人語俟過發時再洗手面飲食七日內禁房事及酒麵熱物久瘧不過二劑車前草湯治疸壯熱不止渴欲飲水車前草常山生甘草升麻大豉炒五錢粳米半合水浸五錢于星月下露一宿上橫刀一把次早五更煎空心溫分二服良久即吐吐定以漿粥止之常山飲治疸瘧但熱不寒煩渴不止常山生甘草烏梅肉炒青蒿五錢竹葉二十一片以童便白酒各一大鍾微煎露星月下一夜上橫刀一把次早空心溫服及當發時各一服以差為度間日瘧痰瘧痎瘧勞瘧久瘧鬼瘧瘧母間日瘧論曰間日瘧者邪氣著于陰不得與陽氣俱出也衛氣晝行於陽邪氣不得出故必再會而後發是以間日乃作醇醨湯治間日瘧大黃炒三分常山甘草炙兩半水煎三錢未發先服常山酒同常山一兩蒜獨頭者一枚糯米黑豆百粒共粗搗以白酒一升浸上件露星月下一宿上橫刀一口次早煎未發時三分飲一分如未吐更服一分得吐差糯米煮散同糯米四十九粒常山淡竹葉鳥梅肉炒炙甘草五錢石膏二兩共末水煎五錢未發時先服神聖丸治間日瘧先寒後熱黑豆小者二十一粒白砒細研一錢大棗三枚飯上蒸去皮核共研極細須於五月五日或七月七日修合丸如豌豆大丹砂為衣隂乾冷茶清下三丸忌食熱物一伏時合丸時忌女僧尼姑雞犬痰瘧論曰痰瘧之狀胸中不利頭痛振寒怢栗而不能食食即嘔吐寒去則內外皆熱更作心下支滿痰積胸中氣逆煩嘔故謂之痰瘧石膏飲治一切痰瘧石膏三兩常山二兩淡竹葉三兩生甘草烏梅肉二兩粳米半合水煎五錢空心溫服吐痰差如熱甚加大黃一兩犀角散治痰瘧嘔吐犀角升麻玄參常山五錢細辛甘草生松羅山枝一分水煎五錢空心徐徐溫服取吐痰涎效痎瘧論曰痎瘧者以瘧發該時或日作或間日作也夫衛氣流行合于晝夜隂陽邪氣內舍于榮隨衛氣以出入而應于風府其作之早晏皆以時發寒溫疸瘧動作亥時故內經統謂之痎瘧其狀伸欠乃作寒栗鼓頷腰脊痛寒去則內外皆熱頭痛如破渴欲冷飲麻黃丸痎瘧發作有時麻黃去根節一兩常山甘草知母大黃生五錢共末密杵丸小豆大未發前空心飲下五七丸臨發再下鱉甲漬酒治痎瘧以時發鱉甲九肋醋炙附子甘草一兩常山二兩烏賊魚骨去甲二兩酒三鍾漬藥五錢明早先以酒塗五心次溫飲一二鍾常山酒治痎瘧先寒戰後壯熱日發及間日作者常山淡竹葉一兩鱉甲醋炙一兩甘草三分共粗搗酒浸五錢於星月下露一宿次早水煎未發時先溫服取吐效知母丸治一切瘧知母烏梅肉炒二兩半常山肉蓯蓉豉炒二兩炙甘草人參桂心兩半共末蜜丸桐子大酒下二十丸枙虎膏治痎􅂒胭脂阿魏一大豆許同研入大蒜肉研和為膏用大核桃一枚劈開去仁取一片以藥填核內發時將藥核覆在手虎口上男在女右令藥著肉以帛縳定過宿乃去勞瘧論曰勞瘧者以久瘧不差氣血俱虛病雖間歇勞動即發故名曰勞瘧蓋邪氣日深則氣息愈耗袁裏既虛故令人食減肌瘦色悴力劣而寒熱如故也治宜補養氣血柴胡湯治勞瘧經久不差柴胡一兩人參黃茋片芩甘草括樓根五錢薑棗水煎五錢未發時先服日二袪勞湯治瘧經年不差寒熱痿瘦鱉甲柴胡常山知母甘草青蒿枳殼炒桂心一兩木香五錢薑棗水煎三錢入柳枝心七段蔥白三寸煎空心溫未發先服已發又服柴胡枳殼湯治勞瘧經久不差熻熻發熱骨節疼痛不下食小便赤澀日漸消瘦柴胡枳殼升麻麥冬鱉甲甘草桃仁一兩水煎三錢未發先服日二常山丸治積勞寒熱常山知母蜀漆葉白薇炙甘草烏梅肉炒麥冬升麻地骨皮三分鱉甲萎蕤五錢大豉炒一合石膏一兩共末鍊蜜丸如小豆大空心飲下十丸未發前再服加丸數以差為度烏梅丸治積年虛不差顔色羸瘦無力烏梅肉炒人參桂心炙甘草升麻五錢桃仁去皮尖炒肉蓯蓉常山三分頭微炒一分共末蜜杵丸桐子大空心飲下二十丸未發前服三十丸牛膝飲治瘧經久不差牛膝生一兩水煎空心分二服常山湯治瘧經年不差常山知母鱉甲甘草柴胡青蒿枳殼炒桂心一兩桃枝心柳枝心各一把水煎五錢入蔥白薤白各三寸空心溫服日二烏梅五補丸治瘧經年不差狀如勞疾烏梅肉黃茋桂心肉蓯蓉一兩柴胡桃仁去皮尖炒赤茯苓人參升麻川歸酒洗常山懷生地一兩甘草炙兩半麝香五錢共末蜜杵丸小豆大空心酒下二十丸加至三十丸二物湯治久瘧食少肌瘦童子小便半升白蜜一兩同入磁瓶內煎數沸分三服久瘧論曰久瘧者瘧疾經久不差發汗吐下過甚真氣虛耗邪氣深沉以內摶衛氣不應故積嵗月而難治雖有虛痞不可攻治當先其發時用湯液以發汗蓋浸漬薰蒸邪氣方出出則微汗令小便利者袁裏俱和則久瘧自差矣黃茋散治瘧四肢虛汗出不止黃茋牡蠣人參知母麻黃根各一兩共末未發前小麥湯空心下三錢未差又服車前草湯治久瘧憎寒壯熱不止渴欲飲水車前草常山升麻甘草五錢大䜴微炒白糯米炒半合水浸三錢露星月下一夜上橫小刀一口次早煎空心溫服相次又服良久得吐吐定即食稀粥枝子湯治久瘧經年不差枝子一兩常山三分車前子葉炙五錢粳米半合水煎五錢空心溫服以吐利為度常山湯治久瘧不止常山烏梅肉炒一兩生甘草三分薑水煎三錢空心溫服發時再服以差為度鬼瘧論曰鬼瘧者外邪之所乘也凡人真氣內虛神守不固則鬼邪投間而入故恍惚喜怒寒熱更作若有所持而屢發屢止治宜禳解兼以祛邪安神之劑即愈獨勝丸治鬼瘧經久不差桃仁大者一枚和皮尖劈二片一片書奉敕斬鬼四字一片書奉敕殺鬼四字合作一枚以彩線扎定五更新汲水吞下三聖丸治鬼瘧雄黃雌黃大黃生各一兩各研末用井華水浸蒸餅丸小豆大發日清晨取汲水向東方下二丸宜五日午時修合阿魏雄黃丸治鬼瘧經久不差阿魏雄黃五錢柳枝心桃枝心取向東者各十七寸為末丹砂一分外一分為衣共末以三家粽角小豆大丹砂丸為衣發日用淨器磨一丸塗中指尖上男左女右未退冷水下一丸瘧母論曰瘧母者因病瘧久不差結為癥瘕是也邪伏于陰故也治以破結削瘕之劑陰其病本則瘧自除鱉肉煎丸治瘧久不差結為癥瘕名曰瘧母生鱉肉半斤治如食法片芩葶藶子紙炒柴胡蜣螂去頭翅足炒五錢桃仁湯炮去皮尖另研大黃生牡丹皮紫苑瞿麥穗去梗半夏湯炮去皮薑汁炒人參黑乾薑大戟阿膠蛤粉炒海藻水洗去醎汁蟅蟲炒鼠婦炒去足紫朴一分桑螵蛸炒一兩石韋去毛淨用羊脂炒焦黃桂心射干取紫色者用米泔浸一日赤芍藥一分共末取竈下灰三升白酒二升用竹籮盛灰以酒淋取灰汁澄清用汁煮鱉肉令爛絞去肉將汁入藥末同煎成膏試可丸即止丸如桐子大未發前空心酒下二十丸雄黃丸治逺年瘧結成癥瘕雄黃醋煮研丹砂麝香五錢鱉甲醋浸炙白薇虎頭骨酥炙木香羚羊角知母鳥犀角麻黃去根節防風柴胡茯神草龍膽川歸酒洗牡蠣童便淬赤芍藥豬苓升麻檳榔龜甲醋炙玄參烏梅肉地骨皮洗淨山枝川連安息香阿魏醋研入麵作餅炙萎蕤桃仁去皮尖炒龍齒各三分共末入蜜杵丸如梧子大未發時空心飲下二十丸臨發再下瘧疾發熱身黃小便不利瘧痢瘴氣瘴瘧瘧疾發熱身黃小便不利論曰寒熱凌瘧于人名為瘧病瘧而發熱小便不利者身必發黃此蓋熱氣下迫入于小腸水道既澀故小便不利常山飲治手足苦煩發熱渴躁通身悉黃小便不利常山柴胡山枝甘草一兩石膏赤茯蜀漆炒鱉甲二兩水煎五錢入竹葉二七片豉百粒知母湯治發熱煩渴咽乾口燥身黃怠惰小水澀知母升麻人參麥冬柴胡犀角地骨皮一兩鱉甲石膏二兩甘草兩半赤茯三兩水煎四錢入豉五十粒柴胡湯治大渴煩躁引飲身黃小便不利柴胡二兩人參麥冬知母杏仁去皮尖炒一兩炙甘草五錢水煎四錢服以利為度赤茯湯治發熱煩躁身面黃小便不利赤茯片芩桂心一兩升麻甘草常山蜀漆炒五錢水煎五錢服以利為度赤茯苓湯同前赤茯苓白芍炒一兩白术土炒三分木通瞿麥穗一兩生薑蔥白水煎五錢溫服以利為度瘧痢論曰瘧痢者瘧久不差寒熱邪氣內搏腸胃間也其病寒熱往來利下膿血赤白相雜腸中切痛隨其隂陽而治之黃連犀角丸治傷寒病瘧兼痢疾無問下赤白水穀完出及下鮮血并皆主之川連犀角豉炒二兩龍骨火煆四兩牡蠣醋淬五錢共末蜜丸桐子大飲下三十丸日二前胡丸治傷寒瘧氣急黃并利前胡赤茯苓片苓白芍枳殼去白炒五錢大麻仁兩半研大黃生一兩共末蜜丸小豆大空心飲下十丸以溏利為度又利服十五丸瘴氣論曰傳言瘴氣乃山川毒厲之氣又云江山霧氣多瘴凡以其氣鬱蒸而然也閲諸方論治瘴氣之法不一或謂其症與傷寒相類有在表可汗者有在裏可下者有在膈可吐者或以治瘧法治之者蓋原廣南山川地形瘴氣所生之因及春夏之交又瘴氣所起之時與夫人染瘴氣拯治之法悉著于篇庶可考焉且陽生于子盛于己隂生于午盛于亥陽不極則隂不萌陰不極則陽不長而廣南位當己午則陰陽之氣藴積于此可知矣天不滿西北地不滿東南西北陰也土地髙厚東南陽也地土卑下而廣南屬東南則土地之卑下可知矣以土地卑下而陰陽二氣所藴積是以四圍之山崇髙相環百川之流悉皆歸赴及秋草木不凋瘁冬令蟄蟲不伏藏寒熱之毒藴積不散霧露之氣易以傷人此岐伯所謂南方地下水土弱蓋霧露之所聚也故瘴氣獨盛于廣南然瘴氣所起其名有二孟夏之時瘴名芳草而終于秋孟冬之時瘴名黃芒而終于春四時皆能傷人而七八月間山嵐煙霧蛇虺鬱毒之氣尤甚當是時疾瘴大作不論老少或因飢飽過傷或因榮衛虛弱或沖煙霧或涉溪澗但呼吸斯氣皆成瘴疾其狀頭疼體痛胸膈煩滿寒熱往來咳嗽多痰全不思食發渴引飲或身黃腫脹眉髮脫落此皆毒厲鬱蒸之氣所致夫生于凌者安于凌其土人宜無所慮矣然且日食檳榔蓋檳榔之性破堅毒除藴積故耳治法先以磁石下收其陰次以丹砂上正其陽陰陽氣正中滿自消然後以檳榔解其餘藴毒斯愈矣磁石丸治瘴氣下收其陰磁石三兩醋淬七次研極細醋煮糊丸小豆大汲水下三十丸日二丹砂散治瘴氣上正其陽丹砂明亮者三兩飛蜜水下五分旦一服秦芁湯治山嵐瘴氣如瘧狀秦芁柴胡半分常山一分糯米一撮鳥梅肉炒三枚共作一服水煎半分二服取吐利元氣十補丸治傷寒瘴氣人虛弱面黃不思食或困或省心腹脹滿痞氣耳鳴巴戟天肉蓯蓉白术石斛五加皮一兩鹿茸去毛酥炙五錢兔絲子酒煮人參柏子仁甘菊三分共末蜜丸桐子大空心酒下二十丸日二香椿散治瘴氣惡心四肢痛口吐酸水不思食憎寒壯熱發過引飲二廣閩中多山嵐煙霧蛇虺鬱毒之氣當秋七八月之間芒華發時此疾大作俗謂之黃芒瘴又謂之芳草瘴是也蓋人或因飢飽或因虛怯或沖煙霧或涉溪澗遂得此疾謂之黑腳瘴蝦蟆瘴啞瘴其名不一並皆治之香椿嫩葉酒浸三兩炙甘草南壁土取向日者臘茶一兩共末酒下二錢如患久者加入柴胡甘遂各五錢空心臨臥服菖蒲散治瘴氣久治不差石菖蒲川芎白术炒蒼术炒香荆芥穗炒山梔一兩吳茱茰甘草硝石側柏炒黃荷葉五錢共末用薄荷湯下二錢如患熱疾薑棗煎服煮黑豆丸治山嵐一切瘴氣白术蒼术甘草貫衆二兩共末蜜丸彈子大用黑豆一合入銚內令平將藥安豆中入水髙豆一指許慢火煮乾復暴乾以絹袋盛之用新汲水吞二十粒有患處空心一服如涉逺遇飢水下五十粒至百粒可充飢餒烏藥湯治嵐氣一切瘴氣烏藥炙一斤半夏半斤薑汁炒桂心甘草二兩馬鞭草半斤陳皮去白炒荆芥四兩薑水煎三錢服瘴瘧論曰人與天地流通萬物一氣故有感于山川毒癘之氣而為病者瘴瘧是也以其寒熱相似于瘧故名瘴瘧傳謂兩山夾水多瘧蓋陰氣多而陽氣少則易為寒熱之疾也白薇湯治瘴瘧經百日并一年者白薇知母升麻龍膽草炙甘草蜀漆葉炒片芩苦參五錢常山大黃微炒一兩淡竹葉三兩鱉甲醋炙豉一合獨蒜三枚石膏赤茯三分酒水合煎三錢先時及發時各一服仍以藥汁塗手心并面木香丸治一切瘴蠱毒等瘧木香一分升麻玄參豬苓三分甘草檳榔炙鱉甲犀角五錢豉一合炒共末蜜丸小豆大空心酒下三十丸日二砒霜丸治山嵐瘴氣寒瘧解邪毒白砒一分澱花二兩鐵砧上末四兩水淘淨共研入麝香少許金銀箔各十片糯糊丸芡實大酒下一丸吐瀉差常山散治瘴瘧寒熱往來二三日一發常山紫朴一兩草豆蔲二枚檳榔炙甘草五錢烏梅肉七枚水煎三錢候冷未發前先服如熱服即吐保安湯治瘴瘧久不差常山桃仁五錢知母青蒿一兩薑水煎二錢稍熱服中熱暍中熱悶絶中暍統論論曰盛夏炎熱人多冒涉路途熱毒易傷微者客於陽經令人嘔逆頭眩心神懊悶汗出惡寒身熱發渴即時不治乃至熱氣伏留經絡嵗久不除遇熱即發俗名暑氣甚者熱毒入內與五臟相併客邪熾盛鬱瘀不宣致陰氣卒絶陽氣暴亡經絡不通故奄然悶絶謂之中暍此乃外邪所擊真臟未壞若遇藥救氣通則蘇但治熱暍不可飲以冷物冷則熱不流通若外以冷觸則熱藴積於內反不得宣發故也中熱暍論曰熱暍之病由冒犯暑熱邪氣其脈弦細芤遲其狀汗出惡寒身熱而渴身重疼痛小便已則灑灑然毛聳四肢厥冷微勞動則熱口開齒燥經所謂脈虛身熱是為傷暑不可汗下若汗下則惡寒更甚宜以去熱邪藥治之則愈白虎湯治中熱暍頭痛汗出惡寒發熱而渴知母去毛六兩石膏研一斤甘草生二兩糯米六合水煎五錢空心溫服一方加人參小香薷飲治伏暑吐逆中暍香薷穗二兩人參一兩白扁豆炒五錢水煎三錢空心溫服竹茹湯治中暍煩渴不止竹茹一合甘草一分烏梅肉炒二枚水煎時時細呷愈消暑散治中暑煩躁多困乏力人參白麵一兩共末空心汲水下二錢甘露散治暑氣川連一兩吳茱茰五錢洗同炒茰黑色地上去火毒去茰用連為末食後茶清或汲冷水下五分甘露丸治中暑熱躁悶寒水石大煆放井中浸七日研四兩天竺黃馬牙硝二兩生甘草一兩氷片研五錢共末糯米粥丸茰實大薑蜜水下一丸救生散治中暑毒煩躁渴悶脂麻新者三兩慢炒黑色為末用新汲水下三錢以差為度凡暑熱外不可以冷物逼之得冷即死中暍悶絶論曰中暍之病令人悶絶者乃熱毒傷于臟也蓋心臟神而惡熱若冒觸暑毒藴蓄于五臟則隂陽不能升降經絡不能宣通故奄然悶絶然真臟未壞救療有方使呼吸之氣宣通即蘇亦不宜待其自蘇又不可使之犯冷若外犯冷則與熱氣相拒令氣反不通而速斃宜慎之熱暍欲死悶氣方生地汁一鍾令旋旋灌之即蘇中暑毒熱暍不省方上白麵用熱湯和三錢令人灌之即差中熱不省人事方大蒜去衣搗爛用新汲水調和灌之差又方以溼泥圍中暍人臍使二三人溺其中不可使流去此路上無湯可用乃令人溺取溫有湯不必溺也仲景不云泥及車缸蓋此物必冷暍人忌冷若得熱湯和泥及火燒平缸可用也又方生菖蒲搗取汁微溫一鍾令人灌之愈又方掘池作小坑子以蜜半鍾傾坑內入新汲水二三鍾攪勻取起放碗內澄清水漿一鍾灌之差中熱暍死方取路上熱塵土以壅其心冷復易之候患人氣通乃止陳皮湯陳皮去白炒黑乾薑炙甘草一兩水煎三錢稍冷咽勿頓與之中暍垂死備急救生霍亂吐利霍亂嘔吐不止霍亂四逆霍亂心腹痛霍亂統論論曰三焦者水榖之道路氣之所終始也因風冷或飲食傷內至中焦不和則正氣不守而邪得內干揮霍之間便至撩亂故名霍亂蓋清濁相干于腸胃之間便至撩亂腹痛即利甚者吐利俱發其不吐不利謂之乾霍亂亦以冷食暴爭於中而不得出也然脈必代者以氣不足也脈大能言者為可治若脈微氣劣而不欲言為難治霍亂吐利論曰霍亂吐利者以三焦氣不升降而清濁相干於腸胃五內悶亂先心痛則吐先腹痛則利心腹並痛則吐利俱作治此者當清中焦為本中焦既和則清濁自分而吐利止矣藿香湯治吐利不止藿香五錢白芷砂仁一兩丁香一分水煎三錢稍熱呷大豆飲治吐利不止大豆陳皮香茹竹茹前胡蘆根枇杷葉薑水煎五錢服以差為度理中湯治霍亂吐利虛冷人參白术三兩甘草乾薑二兩水煎五錢溫服若胸滿腹痛吐下者加川歸紫朴薑炒各二兩四順湯治吐下虛冷厥逆腹痛乾嘔乾薑人參甘草二兩附子一枚水煎五錢空心溫服一方下甚者加龍骨二兩腹痛不止加川歸二兩香茹丸治冷熱不調霍亂吐下香茹兩半扁豆木香一兩丁香皮二兩益智仁一分零陵香藿香五錢共末糊丸桐子大蘇湯下二十丸青金散治吐逆手足厥冷面青諸藥不效者硫黃一兩溶作汁水銀一兩與硫汁溶結成沙子研細用冷木瓜湯下二錢米飲下亦可和氣煮散治吐下冷熱不和胡椒菉豆一兩人參一分共末水煎三錢空心稍熱服日二霍亂嘔吐不止論曰霍亂嘔吐不止者胃氣逆故也胃氣逆則氣上而不下故嘔吐不止也若上下升降陰陽和平而吐自止矣藿香紫朴二兩人參白茯乾薑青皮枇杷葉半夏薑炒甘草一兩丁香五錢草豆蔲六枚薑水煎三錢熱服定嘔逆止心腹刺痛進飲食化痰益氣香茹湯治吐逆不止煩悶香茹陳者一斤扁豆紫朴薑汁炒半斤水酒合煎五錢汲水坐頓冷分二服未效再服紫朴湯治嘔吐不思食紫朴薑汁炒二兩人參白术半夏薑炒陳皮一兩薑棗水煎三錢空心溫服日二返魂湯治嘔逆手足厥冷食鹽一分生薑一兩用童便碗半煎一碗分三服人參湯治下焦熱氣逆上嘔吐不止名曰走哺人參山枝片芩知母萎蕤一兩白茯陳皮白术石膏兩半薑水煎三錢服日二四汁煎治吐嘔不止生藕汁生葛汁木瓜汁一合生薑汁半合同慢火煎如餳頻服一二匙含化徐徐津液咽下藿香散治吐逆開胃和氣藿香一兩人參丁香五錢訶勒皮十枚石蓮心二百枚糯米三百粒共末煨生薑大棗煎濃湯下二錢霍亂四逆論曰四肢為諸陽之本陽氣之所通也霍亂吐利陽氣暴厥故四肢逆冷而脈微欲絶也古法治四逆専于通脈蓋榮衛流行氣道升降則手足自和逆者順矣理中湯治傷寒霍亂嘔逆四肢厥冷煩悶汗出食不化心腹虛滿拘急短氣麥冬乾薑六兩人參白术五兩附子白茯三兩甘草四兩水煎三錢空心溫服少頃又服龍骨湯治吐利手足逆冷白龍骨黑附子一兩黑乾薑人參炙甘草兩半生薑水煎三錢空心溫服以差為度霍亂心腹痛論曰霍亂心腹痛者由脾胃虛弱客風冷之氣使隂陽不和致水榖相并清濁莫分變亂于腸胃之間令人心胸煩懊悶亂不安故名霍亂然邪氣上干於陽絡則心痛而嘔吐下搏於陰經則腹痛而瀉利故謂之霍亂心腹痛也桂心湯治心腹痛煩嘔不止桂心三兩紫朴薑汁炒四兩枳實麩炒五兩薑水煎三錢溫服日二抵聖散治霍亂宿食不消心腹疼痛紫朴薑汁炒四兩白术土炒二兩人參白茯髙良薑炒木香吳茱茰洗炒草豆蔲枳殼甘草陳皮去白炒一兩共末空心沸湯下二錢日二石菖蒲汁湯治霍亂心腹痛急如中惡石菖蒲生者四兩水洗搗取汁一鍾分四服熱湯和汁溫服厚朴湯治霍亂心腹痛煩不止或嘔紫朴薑汁炒桂心枳殼去白炒二兩白芍炒檳榔微煨一兩生薑水煎三錢空心溫服縮砂散治心腹冷痛嘔逆惡心滑泄不止砂仁陳麯白术赤石脂黑乾薑吳茱茰洗炒川芎龍骨一兩共末熱米飲下二錢乾霍亂中惡霍亂霍亂乾嘔霍亂轉筋乾霍亂論曰乾霍亂之狀中氣喘爭而不吐不利是也蓋腸胃挾實與正氣相搏正氣暴衰神志昏冒上下隔塞白汗自出治之稍緩則不可救鹽便湯治不吐不利冷汗自出氣悶將絶食鹽半匙熬童便一鍾和勻溫服少頃吐下即愈紫蘇丸治乾霍亂紫蘇陳皮人參桂心髙良薑一兩共末蜜丸梧子大氣滿惡心欲吐不吐乾嘔酒下二十丸日二人參湯同上人參白茯紫朴一兩桂心甘草髙良薑炒五錢薑水煎三錢溫服日二黍米飲治乾霍亂黍米二合水研澄清取白汁呷盡即差不得吐利方食鹽一合汲水一升同煎令鹽消服之吐出涎沫便愈如不吐又如上法飲之令吐佳活命飲治脾元虛損霍亂不吐利腹脹如鼓心胸痰壅食鹽一合生薑葛根五錢丁香七枚炙甘草一分作一服用童便煎溫分二服未差再服中惡霍亂論曰中惡霍亂者由客邪內干正氣暴亂使胃中食物不化氣道否澀不得宣通令人心腹卒痛吐利煩悶甚則精神冒昧靡所知識此得之鬼氣所作也麝醋方治中惡霍亂麝香細研一錢米醋半鍾共和勻分二服白术湯治中惡吐利手足淋痺轉筋白术土炒人參木瓜一兩炙甘草黑乾薑五錢生薑大棗水煎三錢溫服日二霍亂乾嘔論曰霍亂乾嘔者胃氣逆也本於吐利之後脾胃俱虛三焦不理氣時逆上但嘔逆而無所出故名乾嘔木瓜湯治乾嘔木瓜一枚去瓤人參乾薑一兩紫朴五錢水煎五錢溫服日二薤白湯治乾嘔不止薤白一把切水煎二服以止為度厚朴湯治胃弱嘔吐不止紫朴四兩白术五兩人參白茯三兩扁豆葉乾二兩水煎五錢服霍亂轉筋論曰霍亂轉筋者緣風冷傷于三焦傳于脾胃脾胃得冷則陽氣不得宣行致四肢筋絡不得舒緩此由中氣不足其候冒悶不安脛筋攣結腨肉緊痛反急于上蓋足陽明之經膀胱之脈寒也然足陽明之脈其支者起胃下口循腹裏下至氣衝中而合以下髀關抵伏兔下入膝臏中下循髀外亷足太陽之經其脈循髀外後亷下合膕中貫腨內是動則病髀不可曲轉膕如結腨如裂治宜調胃腑溫膀胱則小水得宣行寒冷自下胃腑溫和霍亂可愈轉筋之疾無由作也川椒湯治轉筋川椒炒出汗一分烏梅肉炒七枚水煎入蜜少許頓服老人亦可肉豆蔲湯治霍亂轉筋肉豆蔲麵煨熟人參二兩桂心吳茱茰洗炒一兩薑水煎三錢服雞屎白湯治轉筋悶絶欲死雞屎白一合炒胡椒二十粒木瓜六兩白术桂心髙良薑一兩生薑六兩水煎五錢溫服日二木爪湯治轉筋吐利不止木瓜一兩青菉銅錢四十九枚烏梅肉炒五枚水煎分二服蘹香子散治吐利轉筋煩悶木瓜一兩蘹香子炒人參陳皮五錢甘草石菖蒲一兩共末冷米飲下三錢頃再下生薑酒治轉筋入腹欲死生薑五兩切片酒一升煎八合頓服差雞屎白湯同雞屎白炒一兩研水煎二錢頓服勿令病人知附子湯治轉筋淋足附子一枚蔥白半斤生椒綿裹生薑切各一分水一斗煎數沸去渣以鹽漿水解之淋洗立差鹽拓法同食鹽三合水五升煎三升浸青棉布拓轉筋上苦酒絮裹足法同苦酒二升以絮內酒中煮酒裹患處差又方木瓜二枚切水煎湯以青棉布漫裹神聖香薷飲治胃氣虛霍亂吐利轉筋腹痛香薷穗兩半川連微炒紫朴薑汁炒二兩白扁豆炒一兩用生薑汁四兩慢炒連朴紫黑色入二味同搗粗末酒水合煎五錢用器乘入井中浸冷連進二服至死者亦可救治轉筋方糯米二兩人參生甘草乾薑二錢共為末用新汲井水下三錢以差為度聖濟總録纂要卷五
