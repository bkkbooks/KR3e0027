body:
  text: 聖濟總録纂要卷十二休寧程林纂心痛門心痛統論論曰心痛諸候皆由邪氣客于手心主之脈蓋少陰心之經五臟六腑君主之官也精神所舍諸陽所合其藏堅固邪氣未易以傷是以諸邪在心多在胞絡者心主之脈也其候不一有寒氣卒客于臟腑發卒痛者有陽虛陰厥痛引喉者有心背相引善瘈偃僂者有腹脹歸于心而心痛甚者有急痛如針錐所刺者有其色蒼蒼終日不得太息者有臥則從心間痛作愈甚者有發作腫聚往來上下痛有休止者或因于飲食或從于外風中藏即虛邪氣客之痞而不散宜通而塞故為痛也君主真心不痛若痛即實氣相摶手足厥冷非治藥之所及不可不辨也心痛論曰心為君主之君神明出焉正經不受邪其支别之絡脈為風寒邪氣所乘令人心痛蓋風邪之氣痞而不散內干經絡則發為心痛乍減年甚乃其症也木香湯治心痛如錐刀刺木香川歸桔梗鱉甲檳榔煨吳茱茰一分薑水煎三錢服薑黃散治心痛不可忍薑黃微炒川歸一兩木香烏藥炒五錢共末吳茱茰醋湯下二錢莎草根散同前香附根炒去毛入醋炒丁香炒一兩共末酒煎一錢熱下人參湯同前人參兩半吳茱茰一兩醋洗炒薑棗水煎三錢日二五靈脂散治心痛五靈脂研男人熱酒下一錢女人當歸湯下一錢莪术飲同前蓬莪茂生用水醋煎三錢熱服鉛丹丸治心痛及腹痛鉛丹白礬一兩同研入瓶中封蓋火煆赤研飯丸梧子大心痛薑湯下十丸腹痛醋湯下十丸參香散治心痛不下食脅下刺痛壅悶人參木香白芍半夏大腹蓽撥三分髙良薑丁香川芎青皮桂心五錢共末空心薑湯下二錢木香湯治心疼氣刺痛不下食木香五錢白术白芍枳殼陳皮桂心三分甘草一分薑水煎三錢服丁桂丸治心痛不可忍丁香乾薑五錢枳殼川歸紫朴桃仁檳榔桂心一兩川芎三分共末蜜丸梧子大空心酒下三十丸薑湯下亦可吳茰生薑湯治九種心痛吳茱茰湯泡七次炒生薑切片焙乾一兩人參三分大棗水煎三錢空心熱服頃再服卒心痛論曰卒心痛者本於臟腑虛弱寒氣卒然客之其狀心如寒痛不得息千金治寒客心痛而用大黃黃芩治心痛徹背而用烏頭附子之類治藥相反如此而在用之隨宜而已川芎丸治卒心痛不可忍川芎川歸良薑桂心五錢紫朴一分水煎三錢服日二半夏丸同前半夏細辛三分人參附子乾薑一分共末醋糊丸小豆大酒下五丸日二紫桂煮散治暴心痛桂心良薑川歸一兩紫朴三分薑汁炒吳茱茰五錢洗炒共末薑棗水煎一錢五分服三聖散治卒心痛不可忍附子莪茂一兩胡椒五錢共末熱酒下一錢女人醋湯下神應丸治暴心痛危篤者石灰風化乾薑一錢共末滴水丸豌豆大用蔥白一寸刺開入川椒七粒濕紙包煨烹湯細嚼醋下七丸髙良薑散治暴心痛髙良薑白芍藥一兩共末空心酒下二錢久心痛論曰心為諸臟之長神之所舍也其正經不可傷傷之則旦發夕死夕發旦死是為真心痛不可復治其久成痛者由風冷邪氣乘于心之支絡停滯不去發作有時故經久不差也薑黃散治久心痛不可忍薑黃炒川歸一兩木香鳥藥五錢共末吳茱茰醋湯下二錢木香散同前木香半生半炒白芍川歸細辛炙甘草吳茱茰一兩桂心檳榔乾薑五錢共末薑鹽湯下二錢丁香湯同前丁香胡椒炒一分陳皮桂心炙甘草蘹香子炒一兩水煎三錢服逺志湯同前逺志菖蒲一兩水煎三錢空心服桃仁煎方同前桃仁四十九枚去皮尖炒研成膏分三服湯下日二未差又服吳茱茰湯同前吳茱茰湯洗炒五錢水煎空心頓服肝心痛論曰肝心痛色蒼蒼如死灰狀不得太息是也蓋肝在色為蒼而足厥陰之脈貫膈布脅肋今肝脈虛受邪傳為心痛故其色蒼蒼而不澤拘攣不得太息也細辛湯治肝心痛胸膈氣滯四肢厥逆兩脅痛細辛桃仁人參附子川歸前胡柏子仁川芎陳皮木香白茯桂心三分吳茱茰湯洗炒五錢薑棗水煎三錢服紫苑丸治肝心痛連脅不得太息紫苑木香白术川歸桔梗五錢桂心郁李仁三分共末蜜丸小豆大檳榔湯下二十丸脾心痛論曰脾者屬中州為孤臟以灌四旁脾氣盛則四臟皆得所養今脾虛受病氣上乘心故為痛特甚古方謂如針錐所刺而痛迫急者是為脾心痛之候木香寬中散治脾心痛泄瀉不止木香肉蔻白茯苓人參甘草陳麯訶梨勒一兩附子草䓻白䓻麥蘖五錢共末薑湯下二錢訶梨勒湯治脾心冷痛不可忍霍亂吐瀉訶勒甘草白䓻陳皮紫朴良薑乾薑白茯神麯麥蘖一兩水煎三錢入鹽少許厚朴湯治脾心痛紫朴人參吳茱茰一兩薑棗水煎三錢溫服食茱茰湯治脾心痛兼吐水食茱茰洗炒白术乾薑一兩薑水煎三錢空心服胃心痛論曰胃為水榖之海沖和之氣屬焉固而保之則邪不能襲若經氣虛風冷傷則乘於心之絡脈痛歸于心而腹脹是為胃心痛也六氣湯治脾胃傷冷心腹痛霍亂吐瀉良薑陳皮白术甘草大茴桂心薑水煎三錢髙良薑散治胃氣極冷卒病心痛吐逆寒痰飲食不下髙良薑三兩酒浸濕紙包煨熟為末酒下二錢腎心痛論曰腎心痛者心痛與腎相引善瘈瘲如物從後觸其心身傴僂者是也蓋少陰之脈貫脊屬腎其直者上貫肝膈入肺中其支者從肺出絡心注胸中今腎虛逆氣乘心故其痛與腎相引善瘈瘲如物觸其心也烏頭丸治腎寒氣逆上奔心痛引背烏頭一兩川椒桂心三分乾薑赤石脂五錢共末蜜丸梧子大酒下二十丸日二桃花散治腎心痛如物從背觸心牽脊傴僂桃花取片焙半升苦參兩半共末酒煎三錢服巴戟天丸同前巴戟天人參附子青皮肉蓯蓉蘹香子炒一兩檳榔五錢共末用羯羊腎二對入鹽五錢濕紙包煨熟研入蜜丸梧子大鹽湯下二十丸髙良薑湯治腎寒氣逆上乘心痛髙良薑紫朴桂心三兩川歸二兩薑水煎三錢熱服日二厥心痛論曰手少陰心之經也心為陽中之陽諸陽之所會合若諸氣虛少陰之經氣逆則陽虛而陰厥致令心痛是為厥心痛當歸散治厥逆冷氣上攻心痛川歸陳皮枳殼桂心桔梗檳榔一兩赤芍人參木香五錢共末空心薑棗湯下二錢草豆䓻湯治厥逆冷氣上攻心痛不食草䓻兩半良薑桂心川歸一兩紫朴薑汁炒二兩薑棗水煎三錢稍熱服頃再服麝香湯治厥心痛氣痛麝香木香吳茱茰一兩桃仁三十五枚去皮尖炒檳榔三枚煨共末童便水煎三錢去渣入麝末三分服日二九種心痛論曰九種心痛者曰蟲曰注曰風曰悸曰食曰飲曰冷曰熱曰去來者是也治病必求其本今九種心痛其名雖異而治藥各有其法蓋正氣和調則邪不能入若或虛弱外邪乘之則種種皆能致疾善醫者惟明攻邪以扶正則九種之病其治一理也木香煮散治九種心痛木香柴胡陳皮去白炒吳茱茰一兩檳榔郁李仁炒白芍川歸五錢麝香研五分共末水煎五錢去滓入麝末少許空心溫服日二厚朴湯治九種心痛紫朴薑汁炒檳榔白芍柴胡食茱茰川歸酒炒一兩郁李仁三分水煎五錢空心溫服日二弭痛丸治九種心痛不止木香川歸五靈脂髙良薑蓬莪茂一兩共末入蜜丸梧子大空心木香湯下二三十丸不換金煮散治九種心痛滯氣玄胡索蓬莪茂威靈仙鬼箭羽薑黃苦棟根一兩共末空心酒水合煎三錢溫服日二無比丸同前髙良薑赤芍藥黑乾薑縮砂蔤桂心一兩共末米醋糊丸彈子大萊蔔子湯下一丸萬靈丸治九種心痛及滯氣石菖蒲九節者二兩為末醋麵糊丸梧子大丹砂為衣男用鹽湯空心下五七丸女人醋湯下日二停飲心痛論曰心屬火其氣炎上飲為水其性趨下若榮衛和平臟腑調適則水液下行不能逆害心火若水飲停滯於胸中火氣不能宣通則陽虛陰盛其病心中淡淡欲吐而痛者是為停飲心痛也半夏湯治痰飲在心久不散痛不可忍半夏乾薑三分髙良薑桂心旋復花五錢檳榔半生半炮木香丁香一分薑水煎三錢溫服旋復花湯治痰飲在心下不散痛不可忍旋復花微炒桔梗一兩半夏兩半柴胡檳榔二兩煨薑水煎服頃又服又方桂心紫朴三分吳茱茰洗炒五錢共末酒下二錢蟲心痛論曰諸蟲在人身中若臟腑平調則自安其所若臟氣虛弱或因食肥甘過度致動腸胃間諸蟲往來上攻于心終則令人心痛痛有休止腹中熱喜吐涎出是蛔心痛也速宜治之不治蟲貫心則能殺人烏梅丸治蛔厥嘔逆心痛不可忍烏梅三百枚水洗淨去核附子人參細辛六兩川椒去目炒四兩桂心六兩川連去蘆炒一斤川歸四兩乾薑十兩川柏蜜炙六兩共末以酒二升浸梅一宿取肉蒸爛搗如泥入蜜杵丸梧子大飲下三十丸木香湯治三蟲心痛面色黃不下食木香檳榔陳皮三分薏苡根一兩水煎三錢服頃又服檳榔散治蛔咬心痛不止檳榔川椒炒一兩共末空心米飲下二錢日二狗脊丸治蟲心痛兼氣痛狗脊去毛酒蒸一分陳皮去白炒三兩吳茱茰洗炒五錢檳榔兩半蕪荑仁三分共末蜜杵丸梧子大陳皮湯下二三十丸皂莢丸治心痛如蟲咬皂莢炙黃去皂子杏仁去皮尖炒研一兩先以皂為末入杏仁搗丸小豆大發時空心米飲下七丸乾漆湯治蟲心痛如咬乾漆炒一兩胡椒用白水煎一錢入蔥白一寸麝香末少許服冷氣心痛論曰風邪冷氣傷於心之絡脈皆能致痛若陽氣偏虛宿挾寒冷滯氣又因飲食傷動而致心痛則其病喜溫而惡寒其氣慘而不舒甚者四肢厥冷氣攻心而發痛也八味桂心丸治冷氣心痛不能飲食桂心兩半人參白术陳皮吳茰桔梗髙良薑川歸一兩共末入蜜丸梧子大酒下二十丸防風湯治虛冷氣胸滿短氣心痛嘔吐防風赤茯甘草一兩人參兩半桂心三兩半夏乾薑二兩薑棗水煎三錢空心溫服日二三味桂心湯治冷氣沖心痛桂心五錢川歸三分吳茱茰洗炒一兩共末入蜜丸梧子大早晚鹽湯下二十丸中惡心痛論曰心者君主之官神明出焉心神安靜則邪無得而干若心氣不足精神衰弱邪惡之氣因得干正連滯心絡令人氣不升降卒然心痛如刺悶亂欲絶者中惡心痛也赤芍藥湯治中惡心痛不可忍赤芍炒杏仁去皮尖炒二兩桔梗炒二兩半水煎三錢空心溫服日二丁香白芍湯治中惡心痛不可忍丁香白芍檳榔煨吳茱茰洗炒兩白术三分水煎三錢服犀角散治中惡心腹刺痛服之去惡氣犀角木香五錢麝香一分共末空心薑湯下二錢沉香散治中惡心痛不可忍沉香赤芍桔梗五錢檳榔芒硝一兩酸石榴皮炒五錢共末水煎五錢入蔥白五寸空心溫服日二惡注心痛論曰凡人將理失度陰陽俱虛氣血不足復因風寒水濕客忤邪惡之氣乘虛入于肌體流注經絡伏留臟腑毒擊心包絡時發疼痛積滯日久轉相注易故曰惡注心痛當歸湯治惡注脅連心痛川歸一兩木香三分麝香一錢檳榔五枚煨水煎五錢去滓入麝末一字溫服以利為度桃枝湯治惡注心痛不可忍氣逆奔走連胸脅如刀刺及蛔蟲咬心痛不止桃枝向東南引者去皮一把水煎空心稍熱服日二心掣論曰內經謂一陽發病少氣善咳善泄其傳為心掣夫心君火也三焦相火也蓋人氣血和平三焦升降則神明泰定三焦既病故上咳下泄少氣致心火胥應而不能其動若掣者乃其症也調中湯治心掣胸中少氣善咳善泄白术人參赤茯川歸乾薑一兩甘草五味子一兩桂心兩半水煎三錢溫服日二赤茯苓煮散治心掣胸中氣少水榖不化泄利氣逆赤茯紫朴人參川芎甘草麥蘖一兩乾薑五錢共末水煎三錢溫服日二當歸散治心掣少氣善咳善泄腹痛上攻川歸枳殼赤芍桂心陳皮桔梗一兩木香人參五錢共末薑棗湯下二錢心腹門心腹痛論曰臟腑氣虛風寒客之邪正相摶故上沖於心絡而為心痛下攻於腹膜而為腹痛上下攻擊則心腹疼痛其或陰氣凝結久而不散內攻腸胃則為寒中脹滿泄利之症獨活湯治心腹冷痛獨活人參白茯甘草陳皮乾薑吳茱茰白芍川芎防風桂心黃茋二兩川歸兩半用羊肉煮取汁入薑棗煎三錢空心服日二桔梗散治心腹痛食冷物即發及吐惡水桔梗麥冬白茯檳榔兩半人參白芍紫朴陳皮枳殼一兩桂心三分共末薑棗湯下二錢沉麝丸治一切心腹痛不可忍沉香麝香丹砂血結沒藥一兩木香五錢共末甘草煎膏丸梧子大薑鹽湯空心下三五丸調中丸治心腹一切冷氣刺痛人參白茯白术甘草五兩黑乾薑四兩共末入蜜丸梧子大空心酒下二三十丸日二小建中湯治腹中虛寒心腹切痛桂心三兩白芍酒炒兩半甘草炙五錢薑棗水煎去滓入飴糖稍熱服日二此藥能治腹中虛寒補血調氣尤止腹痛常人見其藥性溫平未必肯用然腹痛按之便痛重按却不甚痛者此正是虛痛若重按愈痛而堅者當有積也氣痛不可下下之愈痛此虛寒症也尤宜服此藥外臺治虛勞腹中痛夢遺失精四肢痠痛手足煩熱口燥及女人小腹痛亦用此藥張仲景金匱要略陽脈澀陰脈弦法當腹中急痛先與此藥不差者宜小柴胡湯主之此二湯皆主腹痛腹痛論曰臟腑內虛寒氣客之與正氣相擊故令痛也又有冷積不散乍減乍甚為久腹痛者若重遇于寒則致腸鳴下利蓋腹為至陰之所居又為陰邪客氣所摶故也人參湯治腹痛刺疼除寒冷濕痺人參附子甘草二兩川歸黑乾薑大黃炒一兩水煎三錢空心溫服日二人參丸治腹中冷痛人參茯神木香甘草牡蠣逺志黃茋炙桂心五錢共末大棗肉丸梧子大麥冬湯下二十丸赤石脂丸治心腹積冷腹痛短氣胸背痛脅下有冷氣不能飲食如刀錐刺及蟲食痛針灸不差狀如鬼神往來赤石脂附子人參遼細辛烏頭黑乾薑一兩真珠五錢豆腐水煮研桂心一兩共末入蜜杵丸梧子大飲下十丸吳茱茰湯治寒冷氣腹痛吳茱茰人參川歸半夏薑汁炒桂心一兩炙甘草五錢小麥一合薑棗水煎三錢空心溫服久腹脹論曰久腹脹者冷氣結于腹內與臟氣相摶積久而不散也蓋腹為至陰之所居脾胃為倉廩之官今寒氣在內與臟氣相摶停積不散故為久脹脾胃既虛則難以腐熟水榖故脹久不已則令人變飲濕之疾厚朴湯治腹脹煩悶食不消紫朴人參白术沉香桔梗檳榔桑白皮炙丁香皮一兩共末糊丸梧子大陳皮薑湯下五十丸日二木香丸治久腹脹無力不思飲食木香陳皮白术五錢檳榔一兩萊蔔子炒二兩共末入蜜杵丸梧子大空心薑湯下二三十丸腹脹腸鳴切痛論曰腹者至陰之所居若寒氣所傷則陽衰陰盛于是有腹脹腸鳴切痛之病此脾弱胃虛氣脹痞滿加之冷氣與正氣交爭故也不已則變為下利之症白术湯治腹脹腸鳴切痛發作有時白术赤茯人參川歸陳皮桔梗吳茱茰桂心一兩甘草細辛五錢紫朴二兩薑棗水煎三錢溫服髙良薑湯治脾虛腹脹腸鳴切痛食少無力髙良薑丁香五錢人參桂心三分草豆䓻訶勒皮一兩陳皮去白炒紫朴兩半甘草一分棗水煎三錢溫服日二丹參湯治腹脹腸鳴不下食丹參白茯細辛桔梗紫朴薑汁炒食茱茰一兩甘草五錢薑水煎三錢溫服日二附子粳米湯治腹寒氣雷鳴切痛胸脅逆滿附子半夏甘草一兩薑棗水煎三錢入粳米一撮空心溫服腹內結強論曰血氣溫則流通寒則凝結結強者風冷邪氣結于腹中也凝結而不散與正氣相擊上下流走盛按之有根狀如覆杯食寒則腹中硬痛妨害飲食留滯經久則變結強丁香皮煎方治寒氣結強日久不消丁皮白术川歸陳皮檳榔薑黃京三稜甘草一兩薑棗水煎三錢溫服白术散治冷氣不散腹內結強堅硬疼痛白术人參白茯紫朴陳麯麥蘖吳茱茰川芎二兩共末空心飲下二錢日二平胃丸治腹內結強不可俯仰飲食不化杏仁三十枚去皮尖炒玄參葶􅐗炒二兩川芎桂心一兩丹參三兩共末入蜜杵丸梧子大空心飲下十五丸日二䐜脹論曰內經謂濁氣在上則生䐜脹此陰陽反作病之逆從也夫清陽為天濁陰為地二者不可相干今濁氣在上為陰氣干擾清陽之氣鬱而不散所以䐜塞脹滿而常若飽也桔梗丸治虛冷氣滿䐜脹不飲食雖食不消化嘔逆惡心虛滿腹內雷鳴下氣桔梗白术人參白茯甘草陳皮吳茱茰枳殼紫朴乾薑一兩桂心三分共末蜜丸梧子大酒下三十丸人參湯治虛冷腹脹及嘔逆醋心畨胃不能食面黃人參白茯白术紫朴二兩桂心陳皮一兩半夏二兩甘草三分生薑水煎三錢溫服日二臌脹論曰內經謂有病心腹滿旦食則不能暮食名為臌脹夫水榖入口則胃實腸虛食下則腸實胃虛若乃飲食不節寒溫失宜胃滿氣逆聚而不散大腸無以傳導故心腹逆滿氣臌而脹也旦食不能暮食者脾以至陰居中五陽不布水榖化遲而然也雞屎醴方治旦食不能暮食雞屎炒香熟為末空心醇酒下二錢弱人一錢牡丹皮湯治臌脹牡丹皮鱉甲醋炙枳殼紫朴郁李仁兩半桃仁二十一枚炒桑白皮檳榔二兩大黃炒一兩薑水煎三錢溫服桔梗丸治臌脹不下食桔梗白茯白术人參炙甘草陳皮紫朴枳殼吳茱茰乾薑一兩桂心三分共末蜜丸梧子大酒下三十丸赤茯苓湯治臌脹不下食赤茯苓木通二兩吳茱茰紫苑郁李仁一兩白芍炒兩半檳榔三枚水煎二錢溫服日二脅肋痛論曰脅肋痛者足厥陰肝經虛寒氣乘之也足厥陰肝經其支脈起于足大指叢毛上循陰股入腹貫膈布脅肋寒邪之氣乘虛則傷于經絡邪氣與正氣相摶故令脅肋痛也大黃附子湯治脅下偏痛發熱脈弦寒也當以溫藥去寒大黃醋炒香兩半附子三枚細辛一兩水煎三錢稍熱服日二半夏湯治胸脅氣不利腹脹急痛半夏薑汁製七次兩半桂心檳榔一兩生薑水煎三錢溫服日二吳茱茰丸治胸脅冷氣妨悶切痛不下食吳茱茰湯泡洗醋炒乾川歸一兩麝香研五分共末入蜜麝杵丸梧子大空心酒下二十丸息積論曰內經謂病脅下滿氣逆二三嵗不已病名息積夫消息者陰陽之更事也今氣聚于脅下息而不消積而不散故滿逆而為病然氣不在胃故不妨于食特害于氣而已治法不可灸刺宜服藥導引藥不可獨治者蓋導引能行積氣藥力亦藉導引而行故也桔梗湯治息積脅下氣逆妨悶嵗久不已桔梗人參白术枳實川歸鱉甲九肋者醋炙乾薑一兩桂心甘草吳茱茰湯洗醋炒五錢大麥蘖炒香兩半共末入蜜丸梧子大空心酒下二三十丸日二赤茯苓湯治息積脅下氣逆滿悶赤茯苓桂心陳皮炒兩半髙良薑一兩甘草一分大腹皮五錢吳茱茰三分水煎三錢空心溫服日二白术丸治息積脅下滿悶喘息氣逆消散導引白术陳土炒枳實麥麩炒桂心兩半人參陳皮去白炒甘草蜜炙桔梗炒一兩共末入蜜杵丸梧子大空心酒下三十丸日二腰痛門腰痛統論論曰腰痛有五一者陽氣不足足少陰氣衰令人腰痛二風寒著腰風痺腰痛三腎虛勞役傷腎腰痛四墜墮傷腰名䐴腰痛五寢臥濕地腰痛凡此皆本于傷腎蓋腎主腰腳腎傷則腰痛也內經云腰者腎之府轉搖不能腎將憊矣腰痛論曰腰者一身之要屈伸俯仰無不由之或風寒所客或腎氣傷損使筋脈拘急動搖轉側不得故腰痛也人參湯五種腰痛人參杜仲川芎桑寄生桂心一兩白芍三兩當歸白术木通玄參熟地三分丹皮獨活五錢水煎三錢日三寄生湯五種腰痛不能轉側桑寄生附子川芎獨活杜仲狗脊桂一兩人參炙甘草五錢白术白芍石斛牛膝三分水煎三錢日二杜仲酒方腎虛腰痛杜仲丹參八兩川芎五兩酒一斗五升浸服卒腰痛論曰卒腰痛者謂氣脈凝滯經絡壅澀或舉動傷腰故卒痛也宜通行氣脈調順經絡平補腎臟則病可愈牡丹湯卒腰痛丹皮牛膝續斷萆薢桂心一兩酒水煎三錢杜仲湯勞動傷腰卒痛杜仲羌活川椒秦芁石斛續斷括樓根丹皮白芍五加皮當歸桂一兩酒水煎三錢風濕腰痛論曰夫腎氣虛弱風寒濕氣著于腰間則令腰痛蓋腰為腎府腎經留滯風濕不得發散注于腰腳故起坐立行皆痛甚則浮腫故名風濕腰痛羌活湯風濕腰痛羌活杜仲乾薑五加皮桂三分附子巴戟天一兩牛膝兩半共末蜜丸梧子大酒下三十丸羚羊角湯風濕著于腰腳骨節冷痛搖轉不能羚角羌活牛膝一兩白芍棗仁升麻兩半虎脛骨山枝防風二兩水煎五錢腰痛強直不得俯仰論曰腰為腎之腑足少陰腎之經也其脈貫脊屬腎抵腰勞傷之人腎氣既衰陽氣不足寒濕內攻經絡拘急所以腰髖強直而痛不能俯仰也郁李仁煮散腰痛強直不可俯仰郁仁檳榔朴硝一兩白芍當歸三分木香訶勒皮五錢共末水煎三錢日三五加皮湯同前五加皮白芍杜仲蘆根萆薢五錢水煎三錢巴戟天酒方治腰痛強實不得俯仰巴戟天牛膝石斛一兩羌活當歸生薑兩半川椒一分酒八升浸服牛膝酒方治風冷傷腰筋骨疼痛牛膝虎脛骨枳殼羚角一兩酒五升浸服石斛酒方腰痛強直不可俯仰石斛二十四兩白茯五味子丹參杜仲黃茋萆薢二兩人參枸把兩半天冬生薑三兩山藥牛膝山茰二兩苡仁防風細辛一兩酒五斗浸服羌活酒方同前羌活六兩獨活二兩五加皮三兩生地汁一升煎濾黑豆小者一升炒酒二斗浸服腰腳冷痺痛論曰痺之為病在骨則重在皮則寒在肉則不仁在筋則屈而不伸在脈則血凝而不流腰腳得之謂之冷痺痛亦由風寒濕氣雜合而成也蓋腎主腰腳其經為寒邪冷氣所客注于腰腳則膝脛髀腨腰脊冷痛肌肉不仁而腰腳俱痛也桂心丸腰腳冷痺𤸷痺不仁桂心三分附子杜仲牛膝丹參續斷一兩乾薑五錢蜜丸梧子大酒下三十丸杜仲酒方治腎虛冷或感寒濕腰腳冷痺疼痛杜仲川椒川芎天雄防風羌活萆薢炙甘草秦芁乾薑桂一兩細辛石斛地骨皮續斷五加皮三分桔梗兩半酒浸服巴戟天酒方治風冷寒濕傷著腰腳冷痺疼痛巴戟羌活牛膝石斛二兩川椒五錢生薑當歸三兩酒浸服牛膝丸治腰腳痺疼膝已下冷不得屈伸牛膝三兩附子川椒石斛狗脊乾薑桂兩半蜜丸梧子大酒下三十丸獨栗丸治腰膝沉重及勞傷腰痛腳氣等疾栗獨箇者蒸熟煉蜜丸梧子大酒下四五十丸日二服聖濟總録纂要卷十二
