body:
  text: 聖濟總録纂要卷二十四休寧程林纂産難門逆産論曰逆産者蓋因妊婦初覺腹痛産時未至驚動傷早兒回轉未至竟便用力産之即令逆也牛酥膏治逆産數日或生不以理橫逆艱難千方百計不安急宜服之膏至兒身上即産下真牛酥秋葵子一升大豆黃卷滑石二兩瞿麥一兩白蜜半升秋冬二葵子功用并同共末用酥煎沸入蜜再煎下末攪勻收貯酒下一二匙頻服半夏飲治橫産及倒生胎死腹中并衣不下母氣欲絶者半夏五枚薑汁炒白斂一兩共末溫酒下二錢難産一服橫産二服倒生三服胎斃衣不出四服此方加瞿麥尤佳竈心黃土塗治逆産竈底心黃土研五合以生薑汁和如糊塗産母臍中以帛繫換小麥飲治逆産小麥小豆炒一兩共末水煎二三錢溫服少頃又服鹽粉塗治逆産足下食鹽胡粉共研勻用米醋和塗兒足心即順下蔥蒜薰法治逆産大蒜七枚生薑五錢蔥白三十根共搗入盆中以沸湯五大碗投盆內速扶産婦坐盆上薰産户冷即易之三易胎正矣丹砂塗治逆産丹砂五分用蜜和塗兒足心又以丹書兒左足心千字書右足心里字又法以針刺先出足底足痛還即順若手先出即刺手又法取三家鹽熬令黃以津唾和塗兒足心次取三家飯放兒母手中佳艾葉湯治逆産及子死腹中生艾葉五兩用酒一升煎旋服則順下如不飲酒以水煎服蛇脫灰酒治逆産及子死腹中蛇脫燒灰研末用白酒和下面向東方服一錢未下再服兔絲子酒治逆産及子死腹中兔絲子炒為末酒下一二錢即生一方以車前子為末酒下二錢蒲黃塗治逆産蒲黃用水和塗兒手足心即順難産論曰臨産或難蓋為正氣擾亂心神不寧所致古人有預備方法臨月用滑胎散并日行二三十步貴使血氣下順産無留難無令喧雜驚忙必須産閣溫暖遇嚴寒之日四圍燒火及多備熱湯焚諸異香常令湯火氣及身暗使人看候産婦才覺腹痛速與飲食令飽無使困乏飢則雌雞煮粥渴則白蜜煎湯或空痛經日兒胎未動者宜安心熟忍以薦席鋪牀就上安産免為地氣所侵又就周行三五百匝或困于行暫且扶立須臾又行如血水俱下痛陳及腰此欲産之兆諸餘法度宜次序行之車前子散治難産經日不下車前子微炒滑石川歸五錢榆白皮瞿麥穗一兩共末用酒下二錢如血水未下用大黃二錢煎酒服胞胎即下如意膏治難産催生萆麻子二十一粒去殼研丹砂五分共研如膏用油紙攤貼臍下小腹間外用帛繫縳候産與胞衣下速去之稍緩即脫人氣血此藥覺腹痛便宜用牛酥膏治難産催生見前逆産苧麻根飲治難産及晚嫁難産乳母論云三十後適人者謂之晚嫁也蓋少嫁則筋骨軟弱故産門易開晚嫁則筋骨堅強所以難産産婦臨月宜常服之苧麻根人參陳皮炒懷生地炙甘草烏梅肉一兩生薑水煎四錢溫服少頃又服燒弓弦散治難産弓弦五寸燒灰研箭幹五寸燒灰共研勻作一服酒下牛酥飲治數日不産胎上沖心欲死牛酥五錢冬葵子炒一合滑石研三分共入袋盛用酒一升煮頻服一鍾白芍散治數日不産胎上沖心欲死白芍川芎甘草川歸茯神陳皮二兩苧麻根一把髮灰一分共末空心食前酒下二錢少頃又服桂心湯治難産數日不生子死腹中母氣欲絶者服之效桂心兩半木通牛膝瞿麥穗榆白皮二兩水煎五錢服石燕酒治難産催生一方兩手握石燕亦産石燕以童便磨取三四錢微溫吞赤小豆七粒立産子死腹中論曰胞衣未下急于胎之未生子死腹中危于胎之未下蓋胞衣未下子與母氣通其呼吸若子死腹中胞臟氣寒胎血凝沍氣不升降所以難下古方多以行血順氣藥及硝石水銀磠砂之類其胎已死軀形已冷血凝氣聚復以至寒之藥下之不惟無益而害母命者多矣古人用藥深于用意但後生不分子死理有二端用藥寒溫各從其宜有妊娠胎漏血盡子死者有墜墮攧撲內傷子死者有緣久病胎萎子死者若此之類遂令生人提掣妊婦使身體平正仍以禋蓐自腰抵定令仰臥開足向地如欲産勢連進附子湯三服方見後即以衣包溫瓦數片二三人不住手自臍腹腰脅左右周回尉之使胞臟溫暖凝血流動蓋附子湯能破寒氣墮胎服之少頃覺腹內痛陳漸作惡血漸動良久必産此用溫藥之意也有因傷寒熱病溫瘧之類胎受邪熱毒氣內外交攻因致胎死胎不即下留于胞臟古人慮胎受毒氣必致脹大所以用硝石水銀磠砂之藥蓋硝石水銀之性不惟使胎不脹大又能使胎化爛副以行血順氣之味死胎即下臨産更令生人以手體候胎有橫有逆有脹有爛以意治之庶免留難凡生産之理胎活則所生子日月已周臍繫不養所以自下由之果實既熟不俟剪折帶蒂自分若子死腹中則所生在母日月未足臍繫尚固由之果實未熟枝末雖枯不折不離所以在母行之有法用之有度斯無虞矣凡審死胎當熟辨有妊之婦病胎隱伏不動難認存亡令生人以暖手就臍下欵欵按至胎處覺腹中冷應手是胎已死稍溫即非更看妊婦外症面青舌冷舌下脈青黑口穢氣手指甲黑皆子死之候附子湯治子死腹中産後氣寒胎血凝沍子死難下破寒墮胎附子大者一枚生去皮臍切十片生薑五片水煎稍熱服經時不下服桂心湯桂心湯治子死腹中産後氣寒胎血凝沍子死難下寒墮胎桂心不見火烏頭大者一兩水煎稍熱連用三服地黃酒治子死腹中未下懷生地酒洗搗取自然汁用酒煎沸和地黃汁連三服胎不下服牛膝湯牛膝湯治子死腹中氣血凝結致子難下牛膝朴硝三兩川芎大黃炒桂心蒲黃五錢懷生地二兩水煎五錢去滓入朴硝一錢再沸服連進三服未下服後瞿麥湯瞿麥穗湯治子死腹中三日不出母氣欲絶瞿麥穗兩半牛膝榆根白皮一兩木通桂心三分水煎五錢去滓服連進三服胎未下服後牛膝湯牛膝湯治子死腹中滑氣血破胞胎或子死壞爛母氣悶絶者牛膝一兩川歸桂心三分川芎蒲黃五錢硝石瞿麥穗二兩懷生地汁一鍾水煎五錢入汁再沸連進三服惡血下子即出也或胎已損令生人仔細探之勿令腐肉瘀在腹內出畢再一二服逐惡免生他病薑汁酒治子死腹中氣血凝滯不下生薑汁六分雞子黃三枚白酒三分米醋二分共酒醋同煎入薑汁二分再沸傾碗中入雞黃一枚乘熱打轉稍熱服須臾依上法連進三服牛尿塗治子死腹中二三日不下牛尿用之塗兒母臍腹上并左右少頃立出水銀飲治子死腹中悶絶者水銀一兩飲下若母不知人事幹開口灌下口幹不開當于鼻中灌下令頭稍仰銀入母腹中立出又方竈中黃土研末用酒和服二三錢立下息胞即胞衣不出論曰凡産子母已分而胞衣未下名曰息胞蓋由欲産之時用力太過産罷又被風寒冷氣所侵血氣凝澀乏力運用以致持久不惟有妨兒臍兼亦致害母命急須提掣産母使形體平正氣息少待可以運動及以壯氣益血湯散助之俾氣血滑利其胞可下矣若初生産婦未經諳練見胞衣未下恐妨兒體輒便剪臍或誤牽斷或執握不固其胞直上掩心使不盡天年者多矣古人剪臍之法必用慣熟生人先備金銀銅鐵稱錘之類用軟熟衣帶一條結定以緊牽為度所貴胞不上掩心也壯氣益母湯治胞衣未下被風寒所侵血氣凝澀或氣少力乏不能運用胞衣停息懷生地人參川歸一兩代赭石醋淬五錢研木香一分生薑大棗水煎五錢稍熱服少頃又服以衣下為度牛膝湯治胞衣半出半不出或子死腹中著脊不下及二三日不産血氣上沖牛膝秋葵子榆白皮三兩懷生地取汁三分水煎五錢入汁服滑石湯治胞衣不出服之爛胞滑石川歸炙甘草一兩牛膝瞿麥穗兩半秋葵子二合水煎五錢稍熱服少頃再服以下為度惡血不下盛于衣中鹿角銼為細末用酒下一二錢以下為度􅒝麻子塗治胞衣不下萆麻子二十一枚去殼研如泥塗腳心衣下速去又方治胞衣不下水銀用棗肉研不見星丸皂子大酒服一丸立下冬葵子酒治衣不下令爛胞葵子阿膠牛膝川歸一兩共末酒下三錢産後血運論曰産後血下或多或少者皆致血運蓋血隨氣行血多者氣虛血少者氣逆故也其候頭目旋轉精神昏憒沉默不知人事治法虛弱者宜調氣而益血氣逆者宜調氣而下血則運思過半矣玄胡索湯治産後血運玄胡索川芎一兩人參川歸牛膝兩半懷生地二兩水煎五錢去滓入蜜少許稍熱服益母草飲治産後血運心煩悶亂恍惚如見鬼神益母草汁如無以土瓜根汁代之生地汁藕汁半鍾雞子白三枚童子便一鍾將四汁煎沸入雞子白攪勻分三服連進紅藍花湯治産後血少運悶嘔逆紅藍花蘇枋木一兩水煎四五錢稍熱服日二薑黃飲治産後惡血上掩心如見鬼神欲死生薑汁生地汁一鍾用白酒一鍾同二汁煎十數沸稍熱服醋雞子治産後血運迷悶不省人事唇口冷面青米醋一鍾雞子生一枚將醋煎沸以雞子打破攪勻頓服白芍湯治産後血運心中迷悶不知人錯亂少氣白芍藥懷生地炙甘草一兩丹參五錢生薑水煎五錢去滓入蜜少許連進三服産後語言妄亂論曰憂愁思慮則傷心心虛故邪從之新産之人內亡津液而血虛志弱使人精神昏亂語言差謬恍惚不寧甚者變狂顛之症治宜補血益心安心定志其病自愈白茯苓湯治産後血氣虛弱精神不安言語錯謬白茯苓人參桂心澤㵼蒲黃兩半懷熟地川歸麥門冬逺志一兩共末入蜜杵丸梧子大人參湯下三四十丸白茯苓湯治産後心氣不足血虛狂言白茯苓熟地二兩人參甘草防風白薇龍齒獨活逺志一兩水煎四五錢稍熱服茯神湯治産後血虛狂言妄語心志不寧茯神二兩人參白芍藥兩半桂心川歸炙甘草一兩生薑大棗水煎四五錢稍熱服日二逺志湯治産後血虛心氣弱為風邪所搏語言妄亂逺志人參赤芍白茯子芩獨活炙甘草防風一兩懷熟地二兩水煎四五錢熱服日二産後中風論曰産後血氣未完風邪乘之入于經絡則發為痓其候口噤不開筋脈攣急面目喎癖至于五臟六腑則隨所中而症候出焉甚者瘈瘲直視角弓反張神志昏塞便溺遺失瘖不能言為中風之證小續命湯治産後失血中風口眼喎斜冒昧不知痛處拘急不得轉側遺溺失音麻黃去根節二兩人參附子川芎白术防己白芍子芩一兩桂心甘草二兩防風兩半生薑水煎五錢服大豆酒治産後中風背強口噤或煩熱頭身皆重身癢及嘔逆直視皆風濕所致大豆三升炒令聲斷用酒五升沃熱豆中取豆汁服一鍾日飲五七次取微汗身才潤即愈一則去風二則消血麻黃湯治産後中風口眼喎斜身背拘攣麻黃去根節桂心一兩川芎白芍藥防風二分半竹瀝二合白术炒五錢生薑水煎五錢去滓入竹瀝半合二三服取汁地黃酒治産後中風口噤筋脈攣急角弓反張生地汁二升白酒三升生薑汁二合用二汁煎數沸入酒再煎十數沸任性細飲數杯若冷多加桂心末二兩若熱多加藕汁二合産後中風口喎論曰足陽明胃經入上齒中環出挾口環唇下交承漿手太陽經循頸上頰至目鋭眥此二經皆為風寒所中使筋脈縮急牽引于頰故為口喎癖不正語言蹇澀目不能平視也人參湯治産後中風口面喎斜人參白芍藥防己白术甘草防風麻黃去根節附子川芎子芩桂心一兩生薑大棗水煎三錢溫服天麻散治産後中風口眼喎斜筋脈不利明天麻懷生地白殭蠶糯米炒玄胡索獨活防風川歸荆芥穗桂心五錢共末用酒下二三錢日二服獨活湯治産後中風口面喎斜獨活防風川歸兩半川芎枳殼桂心一兩細辛五錢蔓荆子兩半竹瀝水煎三錢去滓入竹瀝半合再沸服日二竹瀝湯治産後中風口面喎斜手足不隨語言謇澀昏昧竹瀝防風麻黃去根節兩半升麻羌活羚羊角川芎桂心一兩杏仁八十枚去皮尖炒研水煎三錢去滓入竹瀝半合再沸二三沸少頃再服取微汗差地汁竹瀝飲治産後中風口眼喎斜筋脈攣急生地汁竹瀝各半升獨活兩半用水二鍾煎獨活三錢去滓入地汁竹瀝各半合再二三沸溫服日二産後中風角弓反張論曰背為陽腹為陰陰陽之脈交相維持産後血脈不足風邪中於陽經使陽脈拘急反引腰背如角弓反張故以為名麻黃湯治産後中風角弓反張筋脈急痛防風人參白术川芎甘草川歸麻黃去根節桂心一兩附子乾薑五錢杏仁去皮尖炒四十枚水煎三錢服日二白茯苓湯治産後角弓反張白茯苓山梔仁川芎川歸炙甘草五錢黑乾薑吳茱茰懷熟地桂心細辛一兩水煎三錢溫服日二黑豆酒治産後中風腰背反折筋急口噤黑豆小者二升白酒四升將豆炒香熟傾入酒中去豆用酒不拘時頻服一鍾服完再服後地黃酒地黃酒治産後中風腰背反折筋急口噤生地汁二升白酒三升生薑汁二合先煎二汁數沸入酒再沸十數沸任意飲二鍾若冷多加桂心末二兩熱多加藕汁二合産後蓐勞論曰産蓐之後食飲起居失于常度使氣血不得其養若血虛則發熱氣虛則發寒氣血俱虛則寒熱更作日漸羸瘦故為蓐勞又産後惡露未盡亦令致此則時寒時熱腰腹刺痛甚者不能食食亦不作肌膚懷熟地湯治産後蓐勞寒熱肢體痛力乏熟地黃人參白术白茯苓牛膝鱉甲淡竹葉桂心麥門冬川歸甘草一兩水煎三錢溫服日二赤芍湯治産後蓐勞疼痛寒熱頭目旋運多驚盜汗腹痛大便不利瘦劣赤芍川芎人參丹皮玄參五味子白薇白茯麥冬甘草川歸一兩熟地二兩水煎三錢服豬腎湯治産後蓐勞似瘧寒熱不能食豬腎一對粳米白芍藥知母三分川歸分半蔥白五寸水煮腎取汁入米煎三錢溫服日二黃茋煮散治産後蓐勞肌瘦面無顔色或寒或熱肢痛頭疼心煩黃茋鱉甲一兩人參白芍藥川歸白茯苓桑寄生麥門冬熟地桂心牛膝甘草五錢共末每用豬腎一對煮取汁入薑棗煎三錢溫服日二白薇丸治産後蓐勞寒熱體虛瘦弱不思食白薇附子熟地柏子仁鱉甲川歸肉蓯蓉黃茋人參白芍丹皮桂心石斛羌活三分川芎甘草五錢共末蜜丸梧子大飲下三四十丸産後大便不通論曰大腸者傳道之官變化出焉産後津液減耗胃中枯燥潤養不足糟粕壅滯故令大便難而或致不通蓋新産之人喜病此者由去血過多內亡津液故也訶梨勒丸治産後大便不通訶勒皮人參懷熟地大黃酒炒川歸大麻子一兩共末入蜜杵丸梧子大米飲下三四十丸日二人參丸治産後大便不通人參檳榔兩半紫朴薑炒三分川歸一兩郁李仁去皮尖研五錢共末入蜜杵丸梧子大酒下三四十丸日二大黃丸治産後大便祕澀不通大黃酒炒赤芍藥川歸紫朴薑炒一兩枳實炒懷生地大麻仁三分共末入蜜杵丸梧子大陳米飲下三四十丸升麻湯治産後大便祕澀升麻大黃一兩生地前胡三兩山梔川歸一兩水煎服大腹皮湯治産後下血過多熱毒氣結燥大便不通壅滯氣悶腰痛脅脹大腹皮五枚枳殼懷生地赤芍藥一兩甘草天門冬三分羌活郁李仁秦芁五錢水煎三錢溫服日二蜜煎導法同上白蜜半斤慢煎令稠如硬餳搓指大長二寸內下部中仰臥效烏梅導法同上烏梅肉爛搗如泥入蜜少許搓內下部中即仰臥效溫中丸治産後大便不通七八日以上者硫黃生用栁木椎細研以水浸炊餅糊丸梧子大用木香湯下一二十丸中和散治産後大便不通及老少皆可服附子去皮臍大黃一兩同上俱半生半炒共末臨臥飲下二錢日二産後乳汁不下論曰新産水血俱下暴傷津液氣脈未順所以乳汁不下若能調其衝任治手太陽少陰之經不足則乳脈自然流行若其經虛弱氣脈閉而不通雖治之亦無益也豬蹄湯治産後乳汁少或不下豬蹄四隻用水五升煮取汁三升木通漏蘆瞿麥穗一兩用汁煎三錢溫服日二以效為度木通湯治産後乳汁不通木通兩半子芩白芍藥桑皮漏蘆一兩甘草枳殼炒五錢竹葉一把水煎三錢溫服日二萵苣子散治産後乳汁不下萵苣子糯米粳米半合水煎甘草五錢取汁煎三味分三服括蔞酒同上括蔞取大者一枚搗爛入白酒煎溫服以效為度魚灰散治産後乳汁不下鯉魚骨燒灰為末酒下一二錢産後妬乳論曰氣血流行上為乳汁下為月水上下通達不失常度是謂平人若不通而塞則為痛熱氣復來乘之則為腫向之流行者今壅遏矣倘失調治則結硬成核身體壯熱盛則憎風遂為乳癰世傳治結乳閉乳亦即為妬乳者此也升麻湯治産後妬乳乳汁不泄結成癰腫熱痛升麻玄參白芍藥生地黃甘草連翹瞿麥穗一兩射干五錢水煎三錢溫服日二二灰散治乳汁不下結滯不消熱腫蔓荆子皂莢刺各燒灰存性一兩共研勻用酒下一二錢日二升麻傅治妬乳結成癰腫升麻木香檀香五錢各用成塊砂盆酒磨相等用翎傅乳上天麻草洗治妬乳成癰腫或已破膿血未散天麻草不拘多少用水煎濃汁頻洗患上日三四次差産後乳結核論曰産後乳結核者以血氣虛弱風邪搏之乳脈凝滯故結而為核日久不差藴積生熱熱勝則腫腫甚則成癰也枳殼湯治産後乳結核或成癰腫發熱疼痛枳殼木通人參白蒺藜炒去刺桂心烏雞骨醋炙白芍藥川歸黃茋大黃炒一兩水煎三錢溫服日二麥門冬湯治産後乳結核及欲作癰腫痛麥門冬去心子芩木通白芍藥人參赤茯苓甘草綿黃茋桑寄生防風一兩大棗水煎五錢去滓入沙糖二錢攪服川歸散治乳結核堅硬川歸人參白芍藥枳實麩炒三分木通白蒺藜炒烏雞骨醋炙黃茋一兩桂心五錢共末酒下一二錢日二産後乳結癰乳癰并結核詳見乳癰門論曰産後衝任不足氣血俱虛其熱潛行入于足陽明之脈其直行者從缺盆下乳內廉下挾臍入氣街中衝脈者起于氣衝並足陽明之經夾臍上行至胸中而散其經為邪熱攻衝則血為之擊摶氣為之留滯擊摶則痛作留滯則腫生內經所謂榮氣不從逆于肉理乃生癰腫産後多有此疾者以乳汁壅積與氣相擊摶故也黃茋湯治乳結核腫痛煩熱漸成癰黃茋生地黃升麻麥冬兩半人參赤茯苓一兩逺志川歸白芍藥甘草五錢水煎三錢溫服日二白芍湯治乳結癰腫毒敗壞不散發熱疼痛白芍藥人參赤茯苓生地黃川歸黃茋麥門冬甘草桂心一兩生薑大棗水煎三錢去滓入朴硝五分沸服日二甘草飲治乳癰熱痛未結膿者甘草五錢半生半炙括蔞一枚去皮用酒甘草取汁入蔞瓤再煎服括蔞散治乳癰膿潰未潰熱痛不已括蔞二兩防風人參細辛紫朴黑乾薑敗醬桔梗一兩共末用酒下二錢日二黃茋膏治乳癰欲結未結膿攻痛黃茋白芍藥川芎子芩防風川連白斂川歸一兩共末用雞子白和塗患上日二易聖濟總録纂要卷二十四
