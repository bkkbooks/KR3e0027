body:
  text: 聖濟總録纂要卷二十一休寧程林纂瘡腫門丁腫論曰丁腫者由風邪毒氣入于肌肉所生也凡有十種一者瘡頭烏而強凹二者瘡頭白而腫實三者瘡如堊垽色四者瘡似葩紅色五者瘡頭內有黑六者瘡頭赤紅而浮虛七者瘡頭葩而黃八者瘡頭如金箔色九者瘡頭如茱萸十者瘡頭如石榴子亦有初如風疹搔破青黃汁赤裏有赤黑脈而小腫亦有全不令人知忽衣觸手摸著則痛若故取便不知處亦有肉突起如魚眼之狀赤黑磣痛徹骨久結皆變至爛瘡瘡下深孔如火針穿之狀初作時突起如丁蓋故名丁瘡令人惡寒四肢強痛三日瘡變焦黑腫大光起根硬不可近犯之則痛徹骨其發于手足頭面骨節間為氣血所會尤宜速治不然毒氣入腹煩悶恍惚如醉人治無所施矣丁腫方河東栁宗元偶病丁瘡凡四十日他藥治之莫效長樂賈宣伯教用蜣螂心貼之一夕而穴百苦皆已次年春因食鵝羊肉丁又大作再用之亦如神效按蜣螂心在腹下度取之其肉稍白者是也以此貼瘡半日許可穴再易之血盡根出而愈矣巴豆塗治丁瘡乃日本國傳來者巴豆十粒半夏一枚附子半枚蜣螂一枚各為末以人糞相和看大小瘡作紙圈子圍瘡口以藥傳上用絹貼之一日三易地骨皮散同上地骨皮五錢小麥大麻子各十粒燒灰緋帛五寸燒灰亂髮卵大燒灰半夏七枚炒黃曲頭棘刺二十枚燒灰即針倒下多年者用骨皮半夏為末與各灰同研勻酒下二錢日二乾薑胡椒傅治一切丁腫惡毒乾薑胡椒炒龍骨皂莢去皮子炙斑貓去翅足一兩共末用酒和如膏貼上日二諸疥論曰字書以疥有介守之義言雖微小介然守形體而難治是以疥有五名皆因風熱邪氣客于皮膚之間久則化為蟲時作痛癢故作為瘡腫焮赤痛癢者謂之大疥皮內引起結根搔之不痛謂之馬疥瘙癢皮起謂之乾疥三者為重以風濕熱氣深在肌肉故也若水疥㾦㿔如瘭漿濕疥瘡小而汁出特風熱淫於皮膚之間故淺而輕俱風熱之客故皆有蟲或謂蟯蟲內出理或然也治宜疏風滌熱當以薰浴傅塗湯液並施則善苦參散治遍身瘡疥風毒瘙癢苦參白花蛇酒浸去皮骨炙川連川歸三兩人參玄參丹參白芍防風五錢白蒺藜炒去刺一兩共末酒下二錢快肌丸治遍身瘡疥瘙癢威靈仙三兩為末雄豬膽三枚用膽汁和末丸梧子大荆芥湯下二十丸防風丸治一切風疥瘡癬皮膚瘙癢癮疹防風蟬脫豬牙皂炙去皮二兩天麻三兩共末用精羊肉煮極爛以酒熬成膏丸梧子大用荆芥酒下三十丸日二苦參丸治一切疥瘡苦參玄參山梔獨活二兩甘菊防風大黃炒香熟片芩枳殼一兩川連兩半共末蜜丸梧子大酒下二十丸日二五參散治諸疥風虛惡瘡人參玄參丹參沙參苦參秦芁白蒺藜炒山藥子芩防風麻黃去根節獨活茯神細辛五錢山梔枳殼三分烏蛇肉酒炙一兩共末水下三錢日二雞子油塗治一切惡疥瘡雞子七枚煮熱用黃慢炒取油膩粉髮灰枯礬一分石硫黃五錢共研入油和勻塗上日三五次差諸癬論曰癬之字從鮮言始發于微鮮縱而弗治則浸淫滋蔓其病得之風濕客于腠理搏于肌肉否澀久則因風濕而變化生蟲故風多于濕則為乾癬但有周郭皮枯瘙癢搔之皮起白屑者是也濕多于風則為濕癬周郭中如蟲行浸淫赤濕搔癢汁出是也風摶于氣血則為風癬𤸷痺不痛癢是也如錢形則為圓癬如雀目則為雀目癬亦皆赤痛而瘙癢又或牛犬所飲之水刀創磨淬之漿取以盥濯毒氣傳人亦能生癬故得于牛毒者狀似牛皮于諸癬中最為痛厚乃邪毒之甚者俗呼為牛皮癬狗癬白點而連綴刀癬縱斜無定形凡此八者皆風濕毒氣搏于肌中故痛癢不已久而不差又謂之大癬苦參丸治一切風癬皮膚瘙癢苦參烏蛇肉炙四兩石菖蒲二兩共末入蜜丸梧子大酒下二三十丸丁香散傅丁香蝦蟆灰一兩麝香一分枯礬五倍子膩粉研五錢各末研勻傅上一抹散治乾癬天南星草烏頭各一枚生為末用羊蹄根搗取自然汁調塗三日差狼牙丹砂膏治一切乾濕諸癬狼牙丹砂枯礬雷丸雄黃藜蘆硫黃一兩共末入豬脂和成膏日塗三五次代指即天蛇頭論曰瘡發指端爪甲脫落名曰代指蓋爪者筋之餘筋骨熱盛注于指端故其指先腫赤熱焮痛結聚成膿甚則爪甲脫落世俗謂之遭指又名淪指又名代甲其實此病類于指疽然無藴毒故色不黯黑即病雖久亦不殺人也漏蘆湯治代指筋骨臟腑中熱焮赤腫痛漏蘆升麻子芩大黃炒一兩玄參三分水煎五錢入淡竹葉二七片煎減半去滓入芒硝一錢再二三沸溫服日二已利去芒硝地龍散治代指地龍去泥瓦上炙為末用豬脂和塗患上日二升麻湯浸治代指雖內無藴毒然筋骨中熱氣壅盛升麻生甘草一兩用水煎去滓入芒硝末一兩攪勻浸指數十次蛇頭疔瘡痛不可忍臭不可聞蜈蚣一條焙乾為末豬膽汁調又用黑豆生研末入繭內籠之醬蜜塗治代指不結靨醬汁白蜜二味和煎令沸稍熱塗上日三五次熱湯蘸治代指為五臟氣流注十二經毒熱沖于手指熱湯急蘸五七次冷水浸之又復如此三度便塗羊膽汁差未成膿者用此方甚效或以豬膽盛代指用線扎之亦妙諸丹毒論曰熱毒之氣暴發于皮膚間不得外泄則蓄熱為丹毒以其色如塗丹之赤又復陽氣伏于皮膚中故謂之丹因熱氣慓悍其發無常處大則如掌甚則周流四肢若不急治或壞爛出膿血若發于骨節之間則以藥斷截毒氣入腹則能殺人治法用鐮割明不可緩故也漏蘆湯治丹毒遊走漏蘆升麻白芍子芩白斂白薇麻黃去根節甘草大黃一兩水煎五錢溫服日二赤小豆塗治丹毒如掌大身赤腫痛癢赤小豆為細末以雞子白和如膏塗丹上日二吳藍湯拓治丹毒吳藍升麻石膏片芩白斂犀角一兩生地三分山梔大黃五錢水煎一兩入竹瀝浸拓羚羊角塗治赤黑丹毒羚羊角燒灰研細以雞子白和如膏塗患上日二次差鹿角散塗治赤黑丹鹿角燒灰存性研末入熟豬脂和塗日二痱瘡論曰內經謂汗出見濕乃生痤痱蓋熱盛汗出陽氣發泄而腠理疏反以寒水洗浴則熱氣內鬱於皮腠之間輕則為痱重則為痤也世俗通謂之痱子其狀皮肉如毫針所刺遍體細瘡如麩片愈而復發是也葛粉傅治痱子葛粉三兩生甘草一兩風化石灰微炒五錢共研撲之滑石豆粉傅治痱子滑石飛過菉豆粉棗木葉共研末傅之日三乾壁土傅治暑月肌膚瘡爛或因搔成瘡者陳乾壁土取向東方者研細傅之日三四次隨手即愈肉刺論曰肉刺者生于足指間形如鞕胝與肉相附隱痛成刺由靴履急穿相摩而成名為肉刺俗呼為雞眼睛是也膠脂膏貼治肉刺柏木上白膠明松脂一兩黃蠟五錢將膠脂熬化入蠟成膏貼之酥粉傅治肉刺蟬酥自取者膩粉一錢將酥浸濕入粉研勻用針撥破塗上蜜裹日二磠砂傅同上磠砂醋化熬成霜以少許和柏膠傅之其根即出金瘡門金瘡血不止論曰血行脈中周行灌溉而無窮已金創所傷深則其流湍激若海泄河㳏禦之至難要在杜其沖溢之勢外觀其形內訂其脈之何如若血出不斷其脈大而止者為易治若血出不止前赤後黑或黃或白肌肉腐殠寒冷􅜬急者為難治不可不察也麻黃散治金瘡止血悶疼痛麻黃兩半白芷附子白芍川歸續斷乾薑炙甘草子芩川芎桂心五錢共末酒下二錢日二天南星散治刀創所傷血出不止天南星三枚鉛丹炒紫一錢共末研勻乾貼患上日二刀箭方治血出不止石灰逺年者一兩鉛丹炒三分龍骨狗腦骨燒五錢共末傅上日二風化散治金瘡止血定痛風化石灰一升乾薑三分生栗子白藥五兩午日共末以備急用石榴花散同上石榴花乾者五錢石灰炒升半共末用少許傳上少刻斷血止痛蒲黃散治金瘡血出腹脹欲死蒲黃生地黃兩半川芎白芷川歸黃茋續斷一兩甘草三分共末空心酒下三錢令腹中死血化為水日三若口噤用物幹開灌之加大黃兩半金創傷中筋骨論曰金創所中至於筋骨其所傷深矣然接骨絶筋亦可接續要在乘血氣未寒急施治法若不乘熱則風冷易入瘡縱暫愈後必不仁亦致痛煩而終身不完至于小碎之骨即當出之不爾則膿血不絶肌肉亦不能收斂矣骨碎補丸治一切金創傷中筋骨風冷所入疼痛骨碎補三兩山藥附子虎骨炙桂心白檳榔自然銅醋淬七次熟地敗龜板醋炙白薇山茰肉澤蘭葉一兩五味子川歸乾薑五錢肉蔲二枚肉蓯蓉三分共末入蜜杵丸如梧子大酒下二三十丸日二金瘡中風水及痙論曰金瘡中風水者以封固不密所致也夫中風之候其倉卒無汁中水之候則出青黃汁而又疼痛發熱內腫硬時為痙狀可急治之凡痙狀口急背直搖頭馬鳴腰為反折須臾十發氣息如絶汗出如雨治不可緩緩則不能救療熟地丸治逺年傷折忽因風氣于舊處痛不可忍懷熟地四兩杏仁去皮尖炒牛膝兩半黃茋苦參兔絲子酒煮肉蓯蓉萆薢炒一兩升麻桂心三分青木香一分訶勒皮五錢共末入蜜丸梧子大酒下二三十丸日二雞屎白豆酒治金瘡中風反張者雞屎白一合大豆二合先以豆炒焦黑入屎白同炒熟又以瓶貯酒三升乘熱豆傾酒中蓋良久去滓服五合少頃又服取汗出飲酒後以薑粥助之羌活飲治金瘡并傷折骨諸瘡腫慎不可當風臥濕地取涼若風濕所傷則發痓口噤殺人若覺頸項強身拘急便服羌活一兩竹瀝三鍾用水煎羌活減半去滓入瀝再沸分三服川椒罨治金瘡中風川椒生用三兩看瘡大小用麵作餛飩灰火中炮熟乘熱開一孔當瘡上罨之劫引風出多做候換數次差川芎湯治金瘡中風痛不可忍川芎防風羌活川歸一兩炙甘草三分水煎六錢熱服取汗如汗不出加麻黃一兩桂心三分湯成入竹瀝沸服日二鹽韭傅治金瘡中風水腫韭白食鹽等分共搗爛放瘡上以火炙藥上熱徹愈又方鹿角燒灰存性研末用豬脂和塗日二差金瘡腸出論曰金創所傷有腸出者有腸出已斷者視其輕重以決死生腸有一頭見者不可續也若腹痛不可忍短氣不能食近則一日逺則三日治無及矣腸有兩頭見者速以桑白皮挼作線或以麻縷續之仍用雞白塗隙勿令氣泄推內之密縫瘡口用雄雞血塗之腸有出而不斷者以大麥汁洗而內之亦如前法須研米粥飲二十餘日強糜百日方可食飯又不可令飽恐其腸斷仍常以湯散助之磁石散治金瘡腸出宜入之磁石醋淬七次滑石飛過等分同研酒下一錢日三及以針砂塗腸上其腸自收入而無害小麥飲噴腸方治金瘡腸出不能入小麥三升用水九升煮汁五升以綿濾過候冷含噴瘡上漸入以冷水噴其背不令病人知亦不可使傍人語卒然急噴其腸自入不可食飽勿使病人驚恐恐驚則殺人難治毒箭所傷論曰箭瘡毒藥入皮膚肌肉間令人短氣悶絶口噤唇乾血雖止而腹滿不能言其人如醉者為難治若瘀血應時出其瘡溫而熱開口能言則可治巢氏論毒箭有三種曰嶺南夷俚人用焦銅作箭鏃其嶺北諸處以蛇毒螯物汁著管中漬箭鏃及有以苗藥為之者三種傷人皆不易治唯急飲糞汁可以禦其毒少緩則毒氣深入不可救也慎之慎之半夏飲治毒箭所傷箭鏃毒藥在內不出半夏三兩用生薑二斤取汁浸三日白斂三兩同炒為末酒下一錢日三瘡淺十日出瘡深二十日方出雄黃塗治毒箭所傷明雄黃研極細傅瘡上日四五汁出愈此方治毒蛇蜈蚣咬亦妙生薑飲治中毒箭生薑取自然汁飲五分未退再飲一方用甘草煎汁頻飲旋復根散治中毒箭旋復根為末酒下二錢日三仍傅瘡上無根用花箭鏃金創入肉論曰凡箭鏃金創入肉治宜速出內有碎骨亦須去盡然後傅藥不然其瘡必不合縱然少愈亦常作疼痛若神驚血亂氣奪則死無救丹皮散治金瘡箭頭在骨多年不出丹皮白斂一兩丁香麝香藿香桑白皮一分共末溫酒下二錢淺者十日深者二十日箭頭自出又方同上磁石生研極細明雄黃三分同研勻用菉豆煮汁下二錢十日後輕撥便出手足上用此末點之亦自出紅散子治中箭頭用之摩瘡口上蔓陀羅子草烏茄子花萞麻子麒麟竭五錢共末以好酒和調塗摩瘡上箭頭自出解骨丸治箭鏃不出能令自出明雄黃象牙末蜣螂一兩共末入蜜杵丸黍米大用一丸內瘡中以細膩羊腎脂貼之箭頭自出鼠肝傅治箭頭不出鼠肝五枚研如泥傅之兼以鼠腦髓塗之良亦治針折肉中塗之自出象屑塗治箭頭不出象牙屑研末用蜜和塗瘡上并折針竹木刺皆出狐尿刺論曰狐尿刺者乃狐狸尿草棘上人有悮犯則發腫痛焮熱多在于手足指節然亦有端居不出而被此毒者蓋毒氣有相類之症亦不因狐狸尿乃爾也白斂膏治犯狐尿久不差白斂羊屎括蔞根五錢共搗如膏裹瘡上一伏時其刺自出大豉傳治狐尿刺在手足指節間腫痛大豉一兩細嚼熟傳之少頃取下看䜴中有毛效如不見毛又嚼傅之以毛出為度桂心黃蠟丸治一切惡刺入肉者桂心研末用黃蠟化丸看瘡口大小置丸瘡內以濕紙三五重搭蓋以火熁候丸化入肉其刺自出如無刺其傷處亦平也獨栗塗治惡刺不出獨顆栗去衣嚼如泥塗瘡上帛裹半日有刺自出惡刺論曰惡刺初得以蛇虺毒氣經由草木水澤間有人染著忽似刺劄俄致腫痛其肉潰爛若手足上著注即指節墮落土人諳厯既多初覺中刺時以艾灸數十壯十愈八九灸弗愈者速以下藥塗傅蔥白蒲公草膏治中一切惡刺蔥白一把蒲公草五兩大豉一分共爛搗塗瘡上外用醋麵紙封自出木蟲塗治惡刺木中蟲五枚用米醋和研如泥封之差黑豆汁漬同上黑豆一升用水煮取濃汁頻頻漬之差竹木刺傷肌肉不出論曰竹木刺所傷為患甚淺然入人肌肉久不得出則損動榮衛而作瘡或中風水則腫痛若成膿淹留嵗月未易治也但刺傷之初宜速治之加以塗傅無致風水之患羊屎傅治竹木刺羊屎炙乾為末用豬脂和傅日三五上經宿自出象牙散傅治竹木刺并針折不出象牙屑為末以雄鼠腦髓和傅上立出糯米膏治金瘡水毒癰疽熱毒竹木等刺糯米三升於端午日前四十九日以冷水浸之日二換水輕淘至午日午時曝乾挂風處凡遇患用少許炒焦為末水和成膏塗瘡口帛縛候瘡愈解去若金瘡悮犯生水作膿腫甚者急用此膏塗之良久其腫處即消若癰疽毒瘡初發才覺焮腫痛并痄腮等症用此末貼項下及腫處若竹木簽刺入肉者臨臥時貼之明日揭看其刺自出在藥內若貼腫毒藥乾即換之須常令濕為妙唯金瘡及水毒切不可換恐傷動瘡口痔瘻門諸痔論曰痔有五名一曰牡痔二曰牝三曰脈痔四曰腸痔五曰血痔症雖小異大率皆飲食飽甚情欲過度之所致也夫飲食飽則腸胃傷情欲過則氣血耗毒氣乘虛流入下部所以澼積而為痔也如神丸治腸風五痔烏蛇肉酒炙防風大黃煨二兩枳殼炒黃茋刺蝟皮炙黑陳皮白蒺藜炒去刺秦芁兩半共末入蜜杵丸梧子大空心酒下三十丸臨臥再服當日血止定痛神妙湯薰洗五痔萆薢甘草五倍子括蔞根大䜴蔥白等分每日用一二兩煎水薰洗日二神白散治痔瘡下部發腫如梅李大痛硬不能行者即時取效半夏齊州者每用一枚研極細入氷片一小皂子大同研勻用津唾和攤軟紙上貼之即冷如氷良久清水水漸消未全愈再貼去根尤妙牡痔論曰內經謂飲食自倍腸胃乃傷因而飽食筋脈橫解故澼而為痔其狀肛邊生鼠乳或癢或痛膿血時下謂之牡痔蝟皮丸治牡痔肛邊生鼠乳疼痛寒熱蝟皮炙焦附子槐木耳枯白礬川歸桑白皮赤芍一兩楮根白皮炙共末入蜜杵丸梧子大飲下三十丸荆芥槐花散治鼠乳牡痔便血痛不可忍荆芥穗槐花炒枳殼炒黃茋蜜炙二兩共末空心飲下二錢牝痔論曰牝痔者由邪熱壅在肺經傅注大腸又大腸久虛風熱留滯故令肛邊生瘡而出血也名曰牝痔此皆酒食房勞過度令毒氣攻注所為故又謂之酒痔地榆湯治牝痔肛門生瘡下血不止地榆子芩赤芍枳殼檳榔川歸黃茋炙一兩水煎四錢空心溫服日二淋洗白礬湯治牝痔枯白礬研末每用五七分入沸湯內和勻浸洗日二差脈痔論曰脈痔者臟腑藴積風熱不得宣通也風熱之氣乘虛流入下部故肛邊生瘡癢痛血出也蓋實為痛虛為癢今實熱乘虛下攻肛腸故癢且痛又脈者血之腑得熱則妄行故血乃出也槐莢煎丸治脈痔生瘡下血癢痛槐莢一斤洗入水半斤研取汁白蜜二兩與莢汁同煎成膏防風黃茋炙五錢杏仁去皮尖炒皂莢子炒三分枳殼炒一兩共末與杏末拌勻入膏杵丸梧子大飲下二三十丸日二阿膠湯治脈痔有蟲時作癢痛血出不止阿膠炒艾葉川歸青葙子一兩水煎五錢溫服日二薰洗槐白皮湯治脈痔有蟲或下膿血槐白皮二斤用水一斗五升煎一斗傾盆中坐薰湯冷再暖蟲當隨便利自出仍用槐白皮為末綿包錢許內下部中日二差出蟲方治脈痔下部如蟲咬桃葉十斤搗研蒸熟乘熱入小口器中坐薰其蟲自出滌痔散同上白礬研一兩取小便三升溫熱入礬末五錢乘熱洗之差血痔論曰血痔者乃肺熱流毒也肺與大腸為表裏今肺臟藴熱毒氣流滲入于大腸血性得熱則流散故因便而肛腸腫痛清血隨出名曰血痔蝟皮散治血痔蝟皮燒灰存性白芷黃茋懷熟地側柏葉川續斷地榆川連一兩共末空心飲下二錢日二地榆湯治血痔地榆熟艾防風枳殼炒龍骨黃茋桑木耳一兩水煎五錢入生地一分溫服日二蒲黃湯治諸痔下血蒲黃川芎生地白芷川連川歸白石脂甘草一兩水煎五錢空心溫服日二黃茋散治血痔下血不止黃茋蜜炙枳殼炒三兩防風兩半共末空心飲下三錢日二枳實槐角子散治血痔下血久不差枳實麩炒槐角子木賊五錢共末用皂莢湯下二錢日二腸痔論曰腸痔者以腸胃有風挾熱二者乘虛入于腸間沖發下部故令肛邊生核腫痛不消病始作令人寒熱時有血出也枳殼湯治腸痔腫痛生核或發寒熱枳殼炒子芩白芍黃茋一兩川芎川歸檳榔煨丹參兩半水煎五錢空心溫服日二括蔞散治腸痔下血括蔞大者一枚烏梅肉十枚將蔞切蓋去空以梅肉實其中仍蓋封用黃泥包裹晒乾火煆存性研末溫酒下二錢日二地榆散治腸痔下部生核腫痛時發寒熱出血地榆槐花半生半炒甘草一兩共末用枳殼桑白皮湯下二錢日二又方治一切痔淋洗荆芥穗生甘草二兩同末水煎一兩淋洗日二白术紫朴丸治久積虛冷腸風痔瘻面色萎黃虛劣白术紫朴三兩人參甘草川歸一兩黃茋黑乾薑陳皮兩半共末入蜜杵丸梧子大飲下二三十丸二根散治腸痔有血枸把根白皮白薔薇根白皮二兩共末水下二錢日二氣痔論曰氣痔者因便下血或肛頭腫凸良久乃收是也此由毒氣藴積腸間及恚怒不節酒食過傷令下部氣澀壅結而成烏蛇黃茋丸治氣痔大便下血脫肛腫痛烏蛇肉五兩人參獨活枳殼地骨皮一兩郁李仁去皮炒羚羊角三兩黃茋檳榔兩半大黃炒大麻仁炒二兩訶勒皮一分共末入蜜杵丸梧子大酒下二十丸以利為度未利加丸數必效丸治氣痔脫肛不收或生鼠乳時出膿血久不差枳殼麩炒黃茋蜜炙共末陳米糊丸梧子大空心飲下三十丸日二痔瘻論曰五痔之疾或生鼠乳或發寒熱或生瘡癢痛或下膿血其症不一治之不早反勞傷過度則毒氣浸漬肌肉穿穴瘡口不合時有膿血故成痔瘻經曰痔久不差變為痔瘻是也又或蔓穿數處或形似螺蜆膿血與肌肉綿綿而下故謂之痔瘻昔人謂蟯蟲居胴腸間多生瘻痔方中用薰法及化蟲之藥不可不察乳香丸治一切痔瘻反花瘡乳香五錢麝香氷片丹砂沒藥二錢雄黃黃蠟生地一兩共末研勻化蠟丸梧子大用麥冬湯下十丸少留末塗瘡上蝟皮丸治五痔多年不差漸成痔瘻蝟皮炙焦龍骨煆二兩附子川歸枳殼炒黑乾薑兩半黃茋蜜炙艾葉三分共末入蜜杵丸梧子大用黃茋湯下三十丸腸風下血詳結隂下血論曰腸風下血者由腸胃有風氣虛挾熱血得熱即妄行因而滲入腸間故令下血故以為名昔人謂先血後便為近血先便後血為逺血逺近之别不可不察玉壺丸治腸風下血皂莢針青嫩者半斤用水五升浸七日砂碢煮取汁一升又熬減半入蜜一兩熬成膏胡桃仁十枚枳殼火燒酒淬一兩乳香沒藥炙二錢椿根白皮隂地者炙一兩共末入膏杵丸梧子大每服二十丸腸風下血煎木賊湯下五痔疾荆芥湯下時常㵼血米飲日下二玉屑丸治腸風下血及痔瘻藏毒久不差槐根白皮椿根白皮苦楝根白皮三兩三味採時春宜早夏宜遲天南星生生半夏五錢威靈仙一兩寒食麵二兩共末拌勻滴水丸梧子大每服三十丸先用水二鍾煎滚入丸令浮再服日二琥珀散治腸風及一切血痢脾臟下血不止琥珀屑研赤小豆白芷枳殼槐花鹿角霜一兩上五味同炒焦黑為末入珀末拌勻空心米飲下二錢日二槐角子散治腸風槐角子炒防風枳殼炒五錢黃茋炙一兩共末空心茶下一二錢防風散治腸風下血防風微炒黃茋炙二兩炙甘草人參五錢共末空心飲下二錢白术丸治腸風痔瘻脫肛下血面色萎黃久不差白术一斤用糯米三升同浸三日晒乾細切慢炒香為末懷生地半斤酒浸甑上蒸熟爛搗如泥二味和勻用大力者搗二三千捶如硬入好酒蜜少許丸梧子大陰乾空心米飲下二三十丸日二牡蠣散治腸風下血不止及脫肛牡蠣大者醋淬七次細研如麵空心飲下二三錢日二傷折門傷折統論論曰諸脈從肉諸筋從骨骨三百六十有五聫續纒固手所以能攝足所以能步凡厥運動罔不順從若乃倉卒之際墜墮倒仆傷折蹉跌患生不測詎可不圖􅓼治小則消腫而伸攣大則續筋而接骨各有方劑存焉當按症施治從髙墜下傷損腫痛論曰凡墜墮傷損腫痛輕者在外塗傅可已重者在內當導瘀血養肌肉宜察淺深以治之阿膠湯治墜墮傷折手足痛阿膠白芍兩半生地川芎川歸熟艾一兩黑乾薑甘草五錢水煎三錢溫服日二地黃糟裹方治墜墮撲損筋骨疼痛瘀血凝滯腫熱不消懷生地搗酒糟等分看輕重下藥拌勻蒸熟塗傳患上用帛裹縛日一易接骨膏治一切打撲傷墜疼痛續斷一兩白芨附子川歸獨活桂心雄黑狗脊骨燒灰白斂桑白皮五錢黃米炒三合共末用酒半鍾和藥末三錢白麵二錢生薑自然汁少許慢熬成膏攤貼三日一換冬月用杉木皮綿繩夾縳夏月以栁枝子五條夾縳雖緊不妨續骨丸黃蠟煉過半斤鉛丹飛炒過自然銅醋淬七次蜜陀僧煆四兩白礬十二兩麒麟竭丹砂飛過乳香炙去油勿焦沒藥炙去油一兩豬脂十兩先熬脂化蠟于冷處入僧丹銅末再熬攪滴水不散又出鼎離火下諸末不住手攪至凝丸彈子大且用笋皮襯之極冷收貯凡傷折用一丸入少油化塗傷痛處以油紙帛護之甚者以燈心裹木夾之又以一丸分作小丸熱酒下痛即止如藥力盡痛未除再一服骨上便安玄胡索湯治傷折疼痛筋骨未合肌肉未生玄胡索川歸白斂懷熟地鹿角膠綿黃茋桑寄生桂心一兩水煎五錢空心溫服日二蓋暖傷折惡血不散論曰脈者血之腑血行脈中貫于肉理環周一身因其肌體外固經脈內通乃能流注不失其常若因傷折內動經絡血行之道不得宣通瘀積不散則為腫為痛治宜除惡瘀使氣血流通則可復完黃茋湯治傷折惡血凝滯腫痛黃茋白芍附子生地桂心川歸續斷一兩大黃生川椒乾薑二兩白水煎三錢溫服日二糟米塗治傷折赤腫惡血不散疼痛酒糟二斤糯米半升用酒煮米熟入糟煮稀稠得所乘溫熱塗上用帛封裹暖一日一換以差為度蒲黃散治傷損惡血不散不欲聞人聲胸中氣塞便利出血蒲黃一合生地二兩桂心白芷川歸續斷一兩炙甘草五錢共末酒下一二錢日二蔥白塗治一切墜落打撲腫毒疼痛蔥白三十根用灰火煨透乘熱搗爛塗患上用棉紙包縛令暖筋骨傷折疼痛論曰人之一身血榮氣衛循環無窮或筋肉骨節悮致傷折則血氣瘀滯疼痛倉卒之間失於調理所傷不得完所折不得續輕者肌膚焮腫重者髀肉銼脫治宜先整其骨續其所折後施貼熁封裹之劑麒麟竭散治筋骨損傷疼痛麒麟竭白芷赤芍沒藥炙去油蒲黃自然銅醋淬七次生大黃川歸五錢桂心荷葉骨碎補去毛三分共末空心酒下二錢日二川芎散治傷折腫痛血不散川芎桂心附子川椒炒甘草蘭葉一兩大黃醋炒川歸五錢共末酒下二錢日二接骨桂藝膏治撲打筋骨傷折腫痛不可忍桂心藝苔子白芥子敗龜板大黃虎頭骨酥炙赤狗頭骨燒灰存性木别子一兩共末研勻用小黃米粥攤帛上摻末一匙裹損上以竹片夾定繩縛七日沒藥丸治傷折筋骨疼痛沒藥炙研丹砂牛膝一兩為末研勻用酒麵糊丸梧子大丹砂為衣用木瓜湯下二十丸日二八骨散治筋傷骨損疼痛虎骨醋炙龍骨煆研牛骨醋炙雞骨醋炙狗骨兔骨酥炙羊骨醋炙豬骨醋炙楓香脂自然銅醋淬七次共末每有傷折以黃米粥熱攤布上摻末貼患處用布包裹以繩縳之神授散治傷折內外痛不可忍川歸鉛粉五錢蓬砂二錢共研勻用蘇木煎湯下二錢仍用粟米粥攤布上摻末貼腫處如骨碎用木皮竹帛夾定繩縳五骨散治傷折筋骨痛不止鯪鯉甲項骨虎頭項骨猴猻項骨黃犬項骨野貓項骨一兩上五骨細銼以米醋好酒各半斤浸一宿炙黃為末入後藥用天雄五錢去皮臍炮裂肉蓯蓉五錢浸洗炙二味共末與上末拌勻每服酒下二錢日二又用粟米為末醋煮成糊入末拌稠攤塗帛上貼痛處用帛包棉裹暖痛立止傷折風腫論曰肌肉傷折皮肉破裂久而未合為外風所觸則令肌肉受寒既不得收斂又與氣血相搏不得消散故為風腫風腫不散即變膿血敗壞之疾荆芥湯治傷折風腫荆芥穗川歸川芎川續斷一兩共末酒下二錢日二地黃川歸散治傷折為風冷所侵肌肉不合腫痛懷熟地川歸羌活獨活一兩共末空心酒下二錢日二沒藥散治傷折風腫沒藥川芎附子白芷川椒川歸檳榔甘草桂心五錢共末酒下二錢日二川歸湯治傷折皮肉破裂風毒內攻腫痛不消川歸大黃炒白芷防風烏頭一兩水煎五錢溫服日二黃蠟膏治傷折風腫痛黃蠟五兩桂心吳茱茰一兩食鹽燒二錢共用為末以麻油化蠟入末熬攪勻成膏攤日一易聖濟總録纂要卷二十一
