body:
  text: 聖濟總録纂要卷十休寧程林纂水病門論曰内經謂腎者胃之關也關門不利故聚水以從類上下溢于皮膚而為胕腫胕腫者聚水而生病也其狀目窠上㣲腫若新卧起然頸脉㣲動時作咳𠻳股冷膚腫口苦舌乾不得正偃正偃則咳清水不得卧卧則驚而咳甚則小便黄澁以手按腫處隨手而起如裹水之狀是也以脉别之脉沉者水病也洪大者可治㣲細者難治水病有不可治者五唇黒傷肝一也缺盆平傷心二也臍出傷脾三也足下平滿傷腎四也背平傷肺五也葢脾腎氣虚三焦閉塞至隂之氣内蓄巨陽之氣不得宣通如是則水道不利飲濕攻脾散于肌肉而為水腫之病矣水腫論曰水腫之病以脾胃氣虚不能制水水溢妄行溢于皮膚其脛股冷膚腫時作咳嗽不得安卧小便黄澁以手按腫處隨手而起是也妙香散治一切水氣四肢腫滿烏藥生青皮良薑蘹香子一兩水煎三錢温服煖腎散仝前巴㦸天甘遂炒一分木香葶藶沉香一分陳皮芫花醋炙麥蘖五錢膩粉一錢澤㵼一分檳榔二枚一生一􅌻共末用猪腰切滲末二錢紙包煨先食粟米葱粥半碗吃腰又食粥臨卧服至五更大小便下赤黄惡物愈大黄湯治水腫腹滿大黄醋炒桑白皮二兩人參甘草桂心細辛一兩水煎五錢入棗二枚去滓入白餳一匙沸服日三利小便三五升差㯽榔丸治水腫㯽榔㣲煨附子防己紫朴吳茰乾薑葶藶炒紫杏仁甘草椒目赤茯括樓仁海藻麻黄去根節白术黄茋桂心兩半共末蜜丸梧子大飲下二十丸二便利為効十水論曰十水之病腫從脚起上氣而咳名為白水其根在肺腫從面目起名為清水其根在肝腫從腹肉起名為黄水其根在脾腫從脚跌起名為黒水其根在腎腫從心起名為赤水其根在心腫從腹起名為氣水乍實乍虚乍去乍來其根在大腸腫從頭面起至足名為垂水其根在膽腫從内起堅塊四肢小腫名為石水其根在膀胱腫從四肢起腹大名為風水其根在胃腫從腹内起名為裏水其根在小腹凡此十水生于臟腑各從其根究其所本則肺與腎而已故内經云其根在腎其本在肺皆積水也又曰津液充郭其魄獨居精孤于内氣耗于外形不可與衣相保葢腎氣虚弱水氣脹滿上攻于肺肺氣孤危腎為水害子不救母故隂精損于内陽氣减于外三焦不溢水道不通水滿皮膚身體痞腫治之之法備見内經故曰平治於權衡去菀陳莝㣲動四極温衣繆刺其處以復其形開鬼門潔浄腑精以時服五陽已布䟽滌五臟則精自生形自盛骨肉相保巨氣乃平賜名神助散舊名葶藶散治十種水病百方不愈面目四肢俱腫氣息喘急眠卧不安小便漸澁腹脹氣悶水不入口垂命欲絶者椒目㣲炒三兩猪苓澤㵼四兩牽牛炒香五兩苦葶藶炒六兩共末薑水煎三錢入葱白三莖酒半鍾稍熱下良久喫葱白粥一碗酒一鍾面東熱喫至子後二便通利喘定腫減間日再服百日盡消補藥木香丸取下水氣木香青皮一錢莪术二錢共末糊丸梧子大湯下十丸靈保丸治十水滑石二兩膩粉一兩共研木𤓰汁丸小豆大五更飲下七丸日止一服服七日覺臍腹撮痛小便多為効忌鹽百日覺効便服補脾胃藥再蘇丸治十種水氣大通三焦此方仙經所載天台山金壇石室中鐫記但令人忌口無不差者大㦸炒甘遂炒桂心乾薑舂大麥麫炒巴豆麫炒去油大黄炒共末蜜丸小豆大茶下十丸取利為度桑白皮飲治氣水面目浮腫胸滿短氣小便不利桑白皮赤芍郁李仁百合兩半木通二兩大腹皮五枚水煎五錢空心温服日二風水論曰内經云腎者北藏也腎主水故人勇而勞甚則腎汗出腎汗既出復感于風内不得入于臟腑外不得出于皮膚客于𤣥府行于皮裏傳為胕腫本之于腎名為風水其脉自浮其外症骨節疼痛而惡風且身腫如裹水之狀頸脉動時咳者是也金匱方云脉浮而洪浮則為風洪則為氣風氣相摶身體洪腫汗出乃愈惡風者為風水不惡風者小便通利上焦有寒其口多涎此為黄汗二者之症不可不察麻黄石膏湯治風水偏身洪腫骨節疼痛惡風汗出不仁麻黄去根節六兩石膏八兩白术三兩附子一枚甘草二兩薑棗水煎服大豆湯治風水一身腫滿短氣欲絶杏仁三兩防風白术二兩半赤茯防己麻黄去根節甘草二兩黄茋一兩水煎五錢入大豆酒一合日三利小便愈防己湯治風水脉浮浮為在表其人或頭面汗出而表無他病但腰已下胕腫防己白术二兩甘草一兩黄茋二兩半薑棗水煎三錢空心温服日二如喘加麻黄去根節身重胃中不和加桂心心下久寒加細辛毎服藥取汗愈石水論曰腫從内起堅塊四肢遊腫名為腎水其根在膀胱葢腎主水與膀胱膀胱者州都之官津液藏焉氣化則能出矣今腎水則膀胱氣弱膀胱氣弱則不能化氣而隠滯不能行水液停結于臍腹間故其症胸腹鼓滿按之如石脇下脹痛其脉沉遲身體發熱四肢頭面皆腫也桑白皮湯治膀胱石水四肢瘦桑皮三兩白术射干赤茯猪苓二兩澤漆炒澤㵼炒防己一兩水煮大豆半合取汁煎三錢温服日二楮白皮湯治石水四肢細瘦獨腹腫大狀如懷孕心中妨滿食即氣逆楮皮桑皮防己一兩白术射干赤茯一兩澤漆炒大豆炒五錢水酒合煎三錢温服杏仁丸仝杏仁去皮尖炒苦瓠去膜㣲炒一兩共末糊丸梧子大飲下二十丸水出為度大腹水腫論曰内經云水病下為胕腫大腹又曰上下溢于皮膚故為胕腫其症腹大四肢小隂下溼手足逆冷腰痛上氣咳嗽煩疼是也葢三焦閉塞水道不通流溢皮膚榮衛否澁内連腹膜則至隂内動脹急如鼓得病之本多因大病之後或積虚勞損或新熱食畢入水自漬及浴冷水水氣不散理宜然也牛黄丸治大腹水腫氣息不通症候危篤者牛黄五錢昆布牽牛海藻桂心一兩椒目葶藶炒紫三分共末蜜丸小豆大飲下十丸小便利為度蘇合香丸治水氣腹大腫蘇合香水銀水浸煮一伏時後入研白蘞末一兩共研蜜丸小豆大空心飲下十丸丹參酒治久患大腹病其狀四肢細瘦腹大有勞苦則脛腫滿食則氣急此病服下利藥不差宜用此酒以散除風溼利小水丹參鬼箭羽白术土炒兩半知母赤茯苓一兩秦芁七分猪苓海藻水洗真獨活桂心三分共為粗末以白酒五升浸五日每服一鍾日三水腫欬逆上氣論曰内經謂腎為水腫肺為喘呼氣逆不得卧葢腎主水肺主氣腎虚不能制水水氣脹滿上乗于肺肺得水而浮故虚而咳嗽古方有云腫從脚起上氣而欬名曰白水其病在肺褚澄防已煎散水腫上氣防已澤漆葉澤㵼五兩白术丹參赤茯桑白皮陳皮木通三兩郁仁五合水煎五錢入生薑日三小便利為度防已湯水氣欬逆上氣四肢浮腫坐卧不安防己甜葶藶炒五錢木通桑白皮赤茯一兩陳皮二兩澤漆五錢郁李仁㣲炒百合一合水煎五錢鯉魚湯水腫腹大喘欬胸脇滿不得卧鯉魚一尾二斤去鱗腸紫苑桂三兩防己黄芩硝石研人參二兩用水一斗煮魚取汁五升每二鍾煎末五錢日三雌雞湯胸中喘嗽逆水氣身腫利小便雌雞白者一隻白术半夏一兩澤漆二兩炙甘草兩半粗搗篩用東流水五升煮雞取汁入藥五錢薑棗赤小豆煎服日三夜一澤漆根湯水在肺令人咳喘上氣腹大脚腫目下如卧蠶㣲渴不得卧小便難少而數胸滿隱痛此水氣迫肺宜利小便澤漆根生四兩人參麥冬炙甘草赤茯一兩鯉魚一尾大一斤水三升煮魚汁煎三錢日三以二便利為度未利稍増寒加生薑水氣徧身腫滿論曰腎主水脾胃主土土尅水胃為水榖之海其氣虚不能傳化水氣使水氣浸漬水臟又脾得水溼之氣土衰不能制水氣溢歸于腎腎虚三焦不㵼經絡閉塞故水氣溢于皮膚傳流四肢所以通身腫也其候上氣體重小便黄澁腫處按之隨手而起是也木通湯徧身腫木通苦葫蘆兩半防己澤㵼三分猪苓一兩海蛤一兩酒水煎五錢入葱白温服當下小便數升腫消鯉魚湯水病通身洪腫鯉魚一斤澤漆㣲炒人參兩半杏仁炒五錢共末水三升煮魚以汁煎末三錢日三小便利乃止海蛤丸水腫腹滿四肢瘦喘促小便澁妨悶海蛤研二兩木香防己厚朴訶勒皮旋復花一兩桂五錢共末蜜丸梧子大大腹皮湯下二十丸枳實湯水氣枳實去白炒白术升麻炙甘草紫苑知母桑白皮赤茯黄茋秦芁麥冬黄芩等分葱白水煎三錢白术湯水氣渴腹脇脹滿白术人參赤茯炙甘草水煎五錢服平補鹿茸丸水氣平愈體瘦如舊鹿茸炙蓯蓉酒洗地黄兎絲子酒炒栢子仁一兩白茯黄茋防風逺志車前子五味子桂五錢蜜丸梧子大飲下三四十丸水蠱論曰水腫之狀腹膜腫脹皮膚粗黒搖動有聲此由脾胃氣虚溼氣淫溢久不治則害人如蠱之毒故謂之水蠱大黄湯水蠱二便不通急脹壅塞大黄醋炒兩半麥冬三分川連甘遂㣲炒茅根一兩貝母三分水煎二錢瞿麥湯水蠱腹脹滿急小便不通縱有少而黄赤瞿麥穗車前滑石茅根甘遂炒苦參等水煎二錢日三分水氣海蛤丸水蠱腹脹喘嗽海蛤煆五錢凝水石滑石一兩膩粉粉霜一錢白丁香五十枚共末麫和作餅子紙包煨􅌻為末糊丸菉豆大酒下二十丸鼠尾草丸水蠱鼠尾草馬鞭草各五斤水五斗煮二斗取汁再煎成膏為丸小豆大以輕粉為衣飲下三丸惡實丸水蠱身體洪腫惡實㣲炒為末糊丸梧子大飲下十丸勿嚼破瓠瓤煎同前瓠瓤一枚水二升煮一炊去滓煎堪丸即丸小豆大飲下十丸取小便利後勿飲水作小豆羮食之楮枝煎蠱病水腫楮枝半斤水五升煎半取汁入黒豆末半升煎成頻服一匙膜外氣論曰諸家方書論水病甚詳未嘗有言膜外氣者唐天寳間有徒都子者始著膜外氣方書本末完具自成一家今并編之然究其義本于肺受寒邪傳之腎腎氣虚弱脾土又衰不能制水使水溼氣散溢于皮膚之間氣攻于腹膜之外其病令人虚脹四肢腫滿按之沒指是也徒都子論病本膜外氣者或謂之水病起于他疾不可常定或因患瘧或因積勞或因腎臟中風或因肺腑傷冷或因膈上氣或因衝熱逺行或因酒肉中所得始于肺終于腎或因咳嗽或多涕唾或因蓄聚冷氣壅塞不散遂使肺臟邪氣攻心冷氣化為水流溢膀胱在大腸膜外所以切脉不能知針灸不能及葢人腎為命本不可虚也本固枝葉茂本虚即枯槁况四時衰旺皆乗腎臟之氣腎損則五臟皆衰是致胃閉而脾不磨氣結而小便澁輕重之候在大小便耳若小便不通則氣壅攻擊腹内衝出膜外化而為水使人手足頭面浮腫若二便㣲澁則㣲腫極澁則極腫二便俱不通三日即徧身洪腫則隂亦腫夫隂腫有二有腫而小便自出者有腫而小便澁者又有莖囊連小腹臍背腫者此並為死候宜速治之若患此腫病亦不常定或先手足面目浮腫或先腰肋㣲腫或先手足小腫其候或消或甚三五日稍愈又發亦以小便通澁為効積漸變化洪腫女人得之與此畧同凡患此疾令人腹脹煩悶胸間氣急此由肺脹甚至喘如牛吼坐卧行立不得或中夜逆氣攻心胸重者一二年方死有一二月死者若將息失度悮食毒物十日半月即甚也愚醫多以針灸出水為功又以鯉魚赤小豆為藥又令病人飲黄牛尿服商陸根反有所損少有差者大抵此病尤忌針灸華陀云患水病勿遇良醫第一不可針灸言氣在膜外已化為水水出即引出腹中氣水盡則死有此病疾者宜向陽行坐遇隂雨則愈覺壅滯房中常須存火服藥後夜卧覺胸間熱甚宜含紅雪與好茶之類慎勿飲酒及冷藥茶冷水若渴宜喫五靈湯録在卷後尤忌鹽生冷醋滑五靈湯膜外水氣木通訶勒皮防己赤茯陳皮一兩水煎五錢覺熱喫好茶紫蘇煮散膜外水氣紫蘇防風白术桑皮等共末水煎覺熱去白术加甘草功効如前方又有蛇蠱狀如水病相似四肢如故小便不甚澁但腹急腫而蠱脹不下食凡醫多悮作水氣治之宜只細詳審聖濟總録纂要卷十
