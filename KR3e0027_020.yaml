body:
  text: 聖濟總録纂要卷二十休寧程林纂癰疽門癰疽統論論曰周官瘍醫與疾醫分職而異治凡有瘍者受其藥焉蓋非專門之學不足以深究博識故也人之氣血與天地同流經絡常數與晝夜同度一或壅而不通沮而不利則血老不作汗肉陳不脫垢蒸氣不達癰疽內熱甚於焚溺治之不可緩是以喜怒憂樂之不時飲食居處之不節芳草藥石之發動內使陰陽不平而藴結外致榮衛凝澀而腐化輕者起于六腑浮達而為癰外潰膚肉經所謂榮衛稽留於經脈之中血澀不行衛氣壅遏不通熱甚則肉腐為膿然不陷肌膚骨髓不為焦枯五臟不為傷損其皮薄以澤是也重者發於五臟藴結而為疽內消骨髓經所謂熱毒熾盛下陷肌膚骨髓焦枯五臟涸竭當其病下良肉無餘其皮夭以堅上如牛領之皮是也夫瘡腫之患莫大於癰疽明乎二者則凡腫毒丹疹可以類推矣故證有淺深治有輕重若瘡發之初湯液疏其內針石疏其外內外之治不同也五臟內虛則平補內實則駃利補瀉之法不同也瘡發於虛處則難差發於實處則易愈則其生有虛實之辨富貴體逸危殆者多貧賤形苦困篤者少則其形有苦樂之辨淺瘡若在厚處攻之易平深瘡欲在薄處達之易及則肌肉皮膚有厚薄之辨脈見洪滑粗散其病難治脈見微澀遲緩其病易治則脈之與病有應否之辨凡癰之類其氣浮達宜灸􅡒而不宜針烙凡疽之類其氣深沉宜針烙而不宜灸􅡒此灸􅡒針烙之異也淋射熁貼以清腫毒膏潤溫養以生肌肉此先後終始之序也昔人論癰疽病者惑於人神所在不可妄行針針刺見血不知神之與形固為休戚體既不平神焉能定內經癰疽不得頃時回恐內爛筋骨第通臟腑豈有人神之忌耶癰疽所生忌穴背面九處不可患瘡第一入髮際為玊枕亦為舌本第二項頸節第三為崇骨第四大椎為五臟第五脊骨兩邊肺俞穴第六夾脊骨兩邊脾俞穴及肝俞穴第七脊骨兩邊腎俞二穴第八後必鳩尾穴第九鳩尾骨穴正面五處不可患瘡第一喉骨為重鴈第二當胸前為神舍第三為心鳩尾第四當乳穴第五臍下二寸為腸屈之間側面三處不可患瘡耳下近耳後牙車尖央陷中為喉脈一穴當膊下下穴為肩骨承山上三寸一穴為腨腸辨癰疽證候美惡法夫癰疽外發其理易明至於內癰內疽隱而不見目既不接治之至難然五臟六腑有俞募雖結困於中而自形於外外察其部內審其源定藥按方若拔芒刺然則癰疽之發有五善七惡之證不可不察也煩躁時嗽腹痛渴甚或瀉利無度或小便如淋一惡也膿血大泄腫焮尤盛膿色敗臰痛不可近二惡也喘粗短氣恍惚嗜睡三惡也目視不正黑睛緊小白睛青赤瞳子上視者四惡也肩項不便四肢沉重五惡也不能下食服藥而嘔食不知味六惡也聲嘶色脫脣鼻青赤面目四肢浮腫七惡也動息自寧食飲知味一善也便利調勻二善也膿潰腫消色鮮不臰三善也神彩精明語聲清亮四善也體氣和平五善也癰疽發背治有專門寒熱虛實善惡淺深陰陽臟腑不深諳者恐多錯誤東坦曰少有差謬變症甚於傷寒未可按方療治故一方不録其餘一切癰癤瘡毒則精選不遺也附骨癰論曰凡身體盛熱不可當風冷之氣入於肌肉則熱摶伏不得出故附著於骨而成癰也其狀無頭但腫而濶皮膚薄澤者以毒氣伏留于內故也法宜外散其寒內達藴結之熱治附骨癰方新鼠皮一張一味看瘡大小裁貼日二次若出膿用豬脊脂貼治附骨癰方萞麻子去殼不拘多少一味研令細取塗癰上日三兩度即差治附骨癰方生地黃取汁一盞一味用銀石器中煎如膏候冷塗傳腫上日三五度即差乳癰論曰足陽明之脈自缺盆下於乳又衝脈者起於氣衝並足陽明之經夾臍上行至胸中而散蓋婦人以衝任為本若失於將理衝任不和陽明經熱或為風邪所客則氣壅不散結聚乳間或硬或腫疼痛有核皮膚焮腫寒熱往來謂之乳癰然風多則腫硬色白熱多則腫焮色赤若不即治血不流通氣為留滯與乳內津液相摶腐化為膿然此疾産後多有者以衝任之經脈上為乳汁下為月水新産之人乳脈正行若不自乳兒乳汁蓄結血氣藴積即為乳癰又有因乳子汁出露風邪氣外客入於乳內氣留不行傳而為熱則乳脈壅滯氣不疏通蓄結成膿疼痛不可忍世謂吹乳速宜下其乳汁導其壅塞散其風熱則病可愈黃芩飲方治乳癰初覺赤腫有異於常黃芩甘草炙令黃桑上寄生炙麥門冬赤芍藥防風黃蓍炒各一兩木通一兩半右八味搗篩每服三錢入棗三枚同煎再入乳糖一分更煎令消溫服三日早晨日午夜卧各一服鯪鯉甲散方治乳癰疼痛結硬不可忍鯪鯉甲燒灰一兩栝樓一枚燒灰二味研和為散每服二錢空心用蔥調酒下牡蠣散方治乳癰初發腫痛結硬欲成膿令一服差牡蠣取腦頭厚處生用一味細研為散每服三錢研澱花冷酒調下如癰成潰者以藥末傅之仍更服藥一日三服樺皮散方治乳腫初發腫痛結硬欲成膿一服差以北來真樺皮燒灰酒服方寸匕就病乳處卧及覺已差甘草飲方治乳腫痛慮作癰毒甘草半炙令赤黃半生用栝樓一枚去皮取瓤二味先以酒二盞煎甘草至一盞入栝樓瓤同絞和勻濾去滓溫頓服未差更作服之丹參膏方治乳癰疼痛丹參白芷芍藥炒各二兩三味以苦酒浸經一宿又取豬脂半斤微火上同煎之令白芷黃其膏成去滓以膏塗癰腫處差乳香塗方治乳癰乳香一兩為末丹砂半兩研末蔥白三兩切三味先研蔥令細入二物末再研令勻塗傅乳上乾即易之治乳癰結硬疼痛方泥和芥菜半斤一味銼碎以水四升煮取二升傾於瓷瓶內熏乳腫處日三五度即差治乳癰結硬疼痛方和泥蔥半斤一味細銼以水四升煮十數沸于瓷瓶子內盛熏乳腫處冷即再暖以差為度連翹湯方治吹乳乳癰連翹瞿麥穗各一兩升麻生乾地黃芍藥各三分甘草炙一分射干半兩玄參三分右八味細銼如麻豆大每五錢水煎溫服食後腸癰論曰腸癰為病其身甲錯皮膚急按之濡如腫狀腹無積聚身無熱或惡寒自汗其脈遲緊者膿未成可下之當有血脈洪數者膿已成不可下也牡丹皮湯治腸癰牡丹皮一兩芍藥生乾地黃丹參各二兩桔梗炒麥門冬去心薏仁各一兩半赤茯苓甘草炙敗醬各一兩右十味搗篩為粗末每服用藥五錢入生薑五片同煎空心日晚溫服附子湯方治腸癰附子去皮臍敗醬各三分薏苡仁一兩半右三味㕮咀如麻豆大每服三錢水煎空心日晚溫服下膿血即差大黃牡丹湯方治腸癰大黃炒牡丹皮各二兩桃仁湯浸去皮尖雙仁半兩芒硝研冬瓜仁三合右五味搗篩粗末每服用五錢白水煎空心溫服以利下膿血為度薏苡仁湯方治腸癰薏苡仁一兩牡丹皮桃仁湯浸去皮尖雙仁各一兩瓜子仁半兩右四味搗節每服五錢水煎空心日晚溫服胃脘癰論曰內經謂人病胃脘癰者當候胃脈其脈沉細者氣逆氣逆者人迎甚盛甚盛則熱人迎者胃脈也逆而盛則聚於胃口而不行故胃脘為癰也夫陰陽升降則榮衛流通氣逆而隔則留結為癰胃脘癰者由寒氣隔陽熱聚胃口寒熱不調故血肉腐壞以氣逆於胃故胃脈沉細以陽氣不得下通故人迎甚盛令人寒熱如瘧身皮甲錯或咳或嘔或吐膿血觀伏梁之病亦有俠胃脘內癰者以其裹大膿血居腸胃之外故也射干湯方治榮衛不流熱聚胃口血肉腐壞胃脘成癰射干去毛梔子仁赤茯苓升麻各一兩赤芍藥白术各一兩半右六味㕮咀如麻豆大每五錢水煎入生地黃汁一合再煎三沸溫服不拘時候日二服麥門冬湯方治熱氣留聚胃脘內結成癰麥門冬犀角萎蕤薺苨赤芍藥石膏各一兩半甘草炙紫雪各一兩右八味搗篩每服五錢水煎入竹瀝一合再煎二三沸溫服芍藥湯方治胃脘蓄熱結聚成癰赤芍藥犀角木通石膏升麻各二兩甘草生朴硝玄參麥門冬各一兩去心右九味搗篩每服五錢水煎溫服不計時候附骨疽論曰附骨疽者由風入骨解與熱相摶復冷溼所折風熱伏結不得發散藴積成毒故附骨而為疽喜發於大節解間按之應骨皮肉微急隱在肌而不外見是也治之宜急稍緩則膿不得潰而肢體變青黯者不可治也漏蘆湯方治附骨疽漏蘆去蘆頭升麻連翹麻黃去根節各一兩防己三分大黃炒兩半木香白斂沉香各三分右九味搗篩每服五錢入竹葉七片同煎更入芒硝一錢攪勻空心溫服取利三兩行為度未利再服敗醬湯方治附骨疽敗醬二兩大黃炒一兩桃仁二兩三味搗篩每服五錢先取皂莢刺一兩銼碎以水二盞煎至一盞半漉出下藥及朴硝一錢同煎空心溫服內消小豆散方治附骨疽赤小豆一合糯米炒黑五合二味為散水調如糊塗攤故帛上貼乾即易之瘡腫門諸瘡論曰諸瘡皆緣風溼熱毒之氣種類甚多載之方書備矣然有俗名瘡本論未見採録考之皆不離于邪氣逆肉理害肌膚者今隨症以治法附之雖田野下俚取而用之判然可曉不必泥于誦襲也露蜂房散治頭面上無名瘡黃水不止露蜂房蛇蛻各燒灰等分入膩粉少許拌勻麻油和傅黃香餅治鬈毛瘡在頭上初生如葡萄痛不止川鬱金五錢川柏一兩乳香炙一分共末桃花水和作餅貼之龍骨散治髮際瘡初生如粟米大或癢或痛白龍骨胡粉烏賊魚骨去甲五錢鉛丹沙紫五錢共研用鹽湯洗過貼之日二三次海帶散治緣脣上瘡海帶焙乾為末臨臥貼上二三宿即差白龍散治眼睛漏瘡目大眥出膿汁有孔子龍腦馬牙硝五錢菉豆粉一錢研極細用燈心蘸藥點之日四五井中苔散治徹耳瘡井中苔土馬騣凶鬯匕等分焙乾共末麻油和傅患上日二馬齒莧塗治脣緊面腫馬齒莧去根洗淨搗取汁塗之冬月用末水和塗日二麝香散治鼻疳瘡侵蝕鼻柱麝香研草烏燒灰三錢共研勻乾摻日二三百合散治頤頦瘡一名獨骨瘡百合川柏白芨一兩萞麻子五十粒共研用朴硝水和作餅貼瘡上日三五次紅粉散治粉鈴瘡繞頸項赤爛多汁蜜陀僧煆白龍骨煆五錢胡粉二錢鉛丹炒紫一錢共研油和塗日三芙蓉傳治腮腫痛或破或瘡芙蓉葉取生者爛搗如泥傅之帛繫一日換敗蹄散治天柱瘡生脊大椎上如錢大赤色出黃汁不止驢蹄刀削二十片燒炒胡粉熬一分麝香少許共研末破用米醋麵糊和成膏塗上已破乾摻日二諸惡瘡論曰內經云諸瘡瘍皆屬心諸溼腫皆屬脾蓋心主血脾主肉也由體虛受風溼邪毒與氣血相摶故發瘡也甚者焮腫滿痛潰而多汁或形體為之壯熱稍緩不治則毒氣內攻難以療也麝香散治一切惡瘡久不差麝香當門子二枚丁香木香紫檀香一分乳香沒藥炙五錢共末用雞子清和勻入殼內飯上蒸熟晒乾研分六服茶飲下日二膩粉乳香散治一切惡瘡久不差者膩粉二錢乳香一錢蔥白一根煨熟共搗爛攤帛上貼之三日一易差二黃散治一切不測惡瘡年深不愈大黃川連山梔白芨青黛連翹五錢共末水和塗白香散治一切惡瘡久不差楓香脂膩粉防風一分共研末用甘草水洗過傅上痛立止蛇床子散治一切惡瘡久不差蛇床子􅕹粉硫黃一分共末用麻油和傅日二反花瘡論曰瘡生惡肉久則反出瘡外故名曰反花瘡其初如飯粟破之血出餘毒尚熾惡肉隨生根深而膿潰皆風熱毒氣所作甘草塗治反花瘡甘草半生半炒白枯礬人中白煆蜜陀僧煆五錢共研為細末用童便慢熬成膏煎蔥椒水洗過傅上日三五次差胭脂塗同上胭脂一兩胡粉兩半共研勻以鹽湯洗過乾塗日三次差藜蘆傅同上藜蘆研為細末雄豬脂一兩化豬脂入末和成膏塗患上日三五次柳槐煎同上栁枝葉槐枝葉細銼各二升用水五升煎減半去滓煎如稠餳塗患上日三五浸淫瘡論曰心惡熱若風熱藴于心經則神志躁鬱氣血鼓作發于肌膚而為浸淫瘡也其狀初生甚微癢痛汁出漸以周體若水之浸漬淫泆不止故名曰浸淫其瘡自內而出流散四肢者輕以毒氣外出故也從四肢反入于內則重以毒氣內入故也升麻湯治心有風熱淫瘡遍體升麻大黃片芩白芍枳實一兩甘草川歸五錢水煎五錢入燈心一把空心溫服日二鯽魚塗治瘡癬浸淫生鯽魚三四寸長者一尾香鼓一合搗極爛塗瘡上日二易雄雞冠血塗忽得浸淫瘡不早治繞身周匝則能殺人雄雞冠血性烈雄大者用針活取血塗傅瘡日三五次即差燕窠傅治浸淫瘡久不差胡燕窠取向東方者為細末用蔥椒水洗過傅瘡上日二三效苦棟根傅同上苦棟根及皮燒灰研細用豬脂和傅瘡上日二三下注瘡論曰足三陰之脈脾腎肝之經也并起于足大小指之內循足跗內踝前上膝脛中若風溼毒氣乘之則榮衛枯澀稽留不行氣脈下注于腳膝脛間故令皮膚腫軟結核成瘡膿水不絶綿厯年嵗愈而復發以毒氣自上而下如水之注故名曰下注瘡枳殼丸治毒氣下注腳膝膝脛皆瘡枳殼去白炒二兩懷生地五加皮防風二兩羌活一兩黃茋三兩共末入蜜杵丸如梧桐子大空心酒下二三十丸日二蚯蚓泥散治下注瘡久不差蚯蚓泥韭菜地上燒赤研一兩膩粉一分麝香五分共末用蔥湯洗過乾傅白黃散同上白枯礬一分川連五錢膩粉一錢共研勻以雞子白和塗患上日二鯽魚散同上鯽魚去鱗腸一尾三四寸大川連五錢鉛丹胡粉蜜陀僧煆赤研一錢共末入魚肚內纒扎用泥固濟燒赤出火毒研末入豬膽汁和傅日二此方亦治惡毒瘡蒜灰散治一切惡毒風溼瘡下注血氣冷新肉不生者蒜大者百頭去皮根苗切片暴乾入小鐵鍋內淨盆蓋之用鹽泥封固不令透氣以火鍊成灰出火毒研細乾傅瘡上日二此治冷惡瘡最妙若熱毒惡瘡不可傅傅之肉反爛開故也冷瘡論曰形不足者溫之以氣氣能養形故也周官瘍醫掌腫瘍潰瘍金瘍折瘍有五氣養之法蓋以氣不足則血不行血不行則經久不差所謂冷瘡是也蓋諸瘡既潰風冷之氣客于榮衛傷於肌肉故令瘡冷而不痛癢俗謂之冷瘻治宜溫肌養心􅀈瘀除膿則愈二黃散治冷瘡不愈雄黃雌黃定粉膩粉蜜陀僧一兩乳香炙一兩共研末入生蜜和傅日二蔥白湯蒸法治一切瘡風冷腫痛皆因瘡腫坐于水中及風所致若腫脹入腹則能殺人蔥白薤白半斤川椒香豆二合川芎一兩防風二兩共粗搗用長瓷瓶內藥入水三升以故帛紙數層封口緊縛重湯煎熟取孔通氣以瘡當氣口上射之令瘡出黃水盡即止日二次月蝕瘡論曰月蝕瘡小兒多有之蓋由嗜肥甘榮衛不清風溼毒熱之氣藴積腑臟其瘡多生於兩耳及鼻面間并下部諸孔竅側侵蝕之甚則潰爛黃赤汁流達于筋骨月初則瘡盛月晦則瘡衰以其隨月盈虛故名之月蝕瘡或謂小兒以手指月而生未必盡然水銀膏治月蝕瘡多在耳上及竅傍隨月盈虛者水銀一分胡粉與水銀研不見星松脂川連末五錢豬脂四兩熬脂化香去滓再熬入銀粉攪勻以鹽湯洗過傳瘡上日二三酥粉塗治月蝕瘡蟾酥五錢胡粉一兩共研塗瘡上日二三次又方治卒得月蝕瘡地龍屎豬脂和塗患上日三次差凍爛腫瘡論曰經絡氣血得熱則淖澤得寒則凝澀冬月嚴寒氣血凝聚不流則皮肉不溫瘃音竹凍焮赤痛腫而成瘡輕則潰爛重則損壞肢節也白斂散治大人小兒凍手皴裂成瘡白斂末三分白芨末五錢油麻二合生搗萊蔔子二合同爛研酒和塗日二豬懸蹄膏治手足凍瘡血出痛苦者豬後懸蹄夜半時燒灰存性研末以豬脂和膏成傳上日二雉腦膏治凍面耳并手足凍瘡年年發者先癢後痛腫破黃水及血出不止雉腦雄者一枚搗黃蠟同上麻油減半慢火熬去滓收成膏塗傅日二三羊肉湯洗治凍瘡腫癢羊肉蔥白半片用水煮取汁頻洗日二三差川椒湯治寒凍面目手足肉裂川椒炒白芷防風食鹽一分川芎三分水煎頻洗湯冷暖之尸腳方治人足在冬月常裂名曰尸腳雞屎炒一升用水三升煮五沸去滓漬洗足裂處冷即易之以差為度牛膠散治寒凍足跟破裂出血疼痛牛皮膠燒灰研末津唾和塗瘑瘡今之膿窠瘡論曰瘑瘡者疥瘡之類由風熱溼毒客搏于皮膚之間變化生蟲其狀生于皮肉之處手足尤甚赤根白頭相對並生狀如小豆或若茱茰子浸淫癢痛􅎲之汁出折裂成瘡此蓋脾肺壅滯風溼乘之與熱相搏結聚而成治宜疏滌於內傳藥于外并淋洗之類次第以治藜蘆膏治瘑瘡經久蟲出藜蘆枯礬松脂雄黃二兩苦參兩半豬脂半斤共研末用脂熬末攪勻塗瘡上日二胡粉膏治瘑瘡經久不差胡粉三兩水銀二兩皂莢十挺水浸揉取汁一斤慢火熬汁五合入銀粉攪勻塗瘡上日二雄黃膏同上明雄黃川連一兩片芩明松脂二兩亂髮灰一分雄豬脂六兩用脂熬令髮盡去渣入末攪勻塗患上蝦蟇灰塗治溼瘑瘡乾蝦蟇一隻燒灰研髮灰各等分豬脂和塗日二漆瘡論曰漆雖有毒性有所畏毒即中之亦有氣適然相近者凡中毒輕癢始于面而胸臂䏶腨應之頭面腫起赤延于目搔之隨手生㾦㿔已而細瘡如粟重則遍身作瘡小如麻豆大若桃李紅赤腫焮異常痛楚旋差旋發如火􅌊之狀是也鐵漿飲治漆瘡鐵漿用蜜絹濾過隨量飲之即差又方同上栁葉生者三斤用水一斗煮汁頻洗差芒硝湯淋洗同上芒硝五兩研用滚湯入硝浸洗日三次差又方同上豬脂熬化頻塗瘡上蟹黃塗治漆瘡焮腫痛楚生蟹黃用之頻塗瘡上乾即易之雞子黃塗同上雞子取黃頻塗乾易差四和膏治漆瘡遍身焮赤腫痛麻油松脂二兩桂心末黃蠟一兩用油化脂蠟入桂末和塗川椒湯治漆瘡川椒水煎湯頻洗之差湯火瘡論曰水火之氣當因其勢而利導之夫湯火所傷毒熱方熾通導而泄其氣可也苟救目前痛楚遽以冷物淋拓則熱毒寒氣內摶致有爛骨傷筋之患非熱氣本然湯火之傷本非氣血所生病故治不及於湯液特在乎塗傳膏汁專治其外而已清涼膏治湯火傷生山藥洗淨去皮爛研如膏傳瘡上痛立刻即止且無瘢痕雞黃塗同上雞子黃將雞子煮熟用黃慢炒取油入膩粉攪勻傳上無瘢痕戊巳散治湯火瘡大熱腫痛乾牛糞燒灰存性為末用生麻油和塗日二次差又方同上好米醋用醋傾淨土上取醋泥傳之日二次立刻止痛無瘢痕又方同上側柏葉將葉燒灰存性羅過用生蜜和塗日二三差聖濟總録纂要卷二十
