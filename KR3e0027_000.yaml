body:
  text: 聖濟總録纂要醫家類提要臣等謹案聖濟總録纂要二十六卷宋政和中奉敕編國朝程林刪定林字雲來休寧人初徽宗御製聖濟經十卷四十二章又詔集海內名醫出御府所藏禁方祕論纂輯成編凡二百卷其書久而佚脫林購求殘帙凡得三本互相補苴尚闕一百七十三卷至一百七十七卷不可復見以其繁重難行乃撮其指要重為纂輯門類悉依其舊所闕小兒方五卷則倩其友項睿補之仍冠以徽宗原序大德四年集賢學士焦惠校上序及校刋諸臣銜名考朝陳二氏書目但有徽宗聖濟經不載是書觀焦惠序稱始成於政和重刋於大定殆汴京破後隨內府圖籍北行南渡諸人未睹其本歟今未見其原書然宋代宗尚醫學搜羅至富就所採録古來専門授受之方尚可以見其大略其每類冠論一篇亦皆詞簡而理明均足以資考訂原本之末有神仙服餌三卷或言烹砂煉石或言嚼柏咀松或言吐納清和或言斬除三尸蓋是時道教方興故有是妄語林病其荒誕一概汰除惟約取其尋常頤養之藥三十餘方其别擇具有條理故所録諸方多可行用與膠執古法者異焉乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀宋徽宗御製聖濟總録纂要序生者天地之大德疾者有生之大患方術者治病之大法昔者神農氏黃帝氏獨觀太初旁燭妙有味百藥以辨物審百疾以全生其制名其取類其正君臣其立佐使其見於太素玉冊之書雷公岐伯之問蓋皆開神明之藴窮隂陽之變原性命之理而與天地同其覆載中古以還鏤之玉版藏之金匱功利及草木惠澤被牛馬所以遺天下後世甚厚歷年既久流弊滋甚糟粕具在而精意不傳內經有病名而莫之究有治法而莫之習極其妙至於通仙而莫之悟人之生也其位參於天地其靈貴於萬物形不盈仞而心侔造化崑崙尺宅修之可以長生寸田神牖間之可以反照天關神廬息之可以召和去土符書金格鍊丹却粒御氣凌虛不假於物而裕然自足嗟夫達士可以神解昧者且不能養其形而况於了其心乎內之五臟六腑外之九竅四關著之於色發之於聲寓之於三部九候一失其平則疾病隨神聖治於未兆工巧救其已然非天下之至精孰能探天下之至賾非天下之至粗孰能祐天下之至神朕憫大道之鬱滯流俗之積習斯民之沈痼庸醫之妄作學非精博識非悟解五行之數六氣之化莫索其隱莫擬其逺曰寒曰熱曰寒熱之相搏差之毫釐失以千里而有餘者益之不足者損之率意用法草石雜進夭枉者半可勝嘆哉萬幾之餘著書四十二章發明內經之妙曰聖濟經其意精微其㫖邁逺其所言在理所以探天下之至賾又詔天下以方術來上并御府所藏頒之為補遺一卷治法一卷卷凡二百方幾二萬以病分門門各有論而序統附焉首之以風疾之變動終之以神仙之服餌詳至於俞冗經絡祝由符禁無不悉備名之曰政和聖濟總録其所載在事所以祐天下之至神蓋聖人之駴世本在於上末在於下無見於上則治之道不立無見於下則治之具不行經之所言者道也醫得之而窮神總録之所載者具也醫用之而已疾漢張仲景作傷寒論而雜之以方唐孫思邈作千金方而繼之以翼以謂不如是則世莫能用其術然之二人者遊於方術之內者也彼超然獨見於方術之外下顧岐伯之流而與之議始可謂知道朕作總録於以急世用而救民疾亦斯道之筌蹄云耳天下後世宜致思於忘筌蹄而自得者俯仰之間嚬笑之度御五行之數運六氣之化以相天地以育萬物至于反營魂而起當生者豈細事哉蓋將有來者焉聖濟總録纂要序臣聞天地以溥生為大德所以曲成萬物而不遺聖人贊天地之化育故斂時五福以敷錫於庶民夫民之為物也智者寡愚者衆起居失常食飲無節外為寒暑燥濕風以賊其形內為喜怒思憂恐以亂其氣形氣乃傷疾所由作聖人有憂之謂祝由不可以盡已也遂制藥石針艾以攻八風六氣之邪為湯液醪醴以佐四時五行之正防其未然救其已病然後物各遂其生民不夭其命矣又謂非立憲言不可以福萬世也於是上法天道下因地宜究隂陽之本明生死之由考於古而驗之今取諸已而施之人定為成書著之玉版藏之金匱宣之於布政之堂祕之於靈蘭之室以俟來哲以施無窮其為仁民愛物之心斯可謂極矣然其言至簡其論至要其理至深後世學者雖有上智非研精核慮則亦未易窺其奧也故曠代之中能以斯術鳴世者時固有之若夫神聖工巧獨得先世不傳之祕如和緩越人亦不過十餘人而已况去聖已逺支分派别析而為衆科業而為専門所以人各拘其偏而莫肯究其全則益不逮於古矣積習成常流弊兹甚懼大道將遂於湮微故聖濟總録由是而作焉上下凡二百餘卷始終幾二百萬言逐病分門門各有方據經立論論皆有統蓋將使讀之者觀論以求病因方以命藥則世無不識之病病無妄投之藥唯法有逆從治有先後在乎智者擇其所當從其所宜而已究而言之實醫經之㑹要學者之指南生民之司命也惜其始成於政和重刋於大定既綿厯百年之久不能無三豕之訛今主上神極御天修節制度治具畢張以謂是書所載雖先聖之緒餘其所以康濟斯民亦致治之一助也乃詔江浙行省刋於有司布之天下其或􅓎戾隨加釐正復降德音俾下臣為之序引臣誠愚陋竊不自量仰惟聖德如天甄陶萬類爰自即位以來于今七年恩浹飛沈仁及草木然猶夙夜孜孜廣求民瘼或一物不得其所則必為之惻然臣謂此書復出則上可以輔相天地之宜下可以永底蒸民之生物無疵癘咸躋於仁夀之域矣大德四年二月一日集賢學士嘉議大夫典瑞少監臣焦養直謹序聖濟總録纂要校刋職名正議大夫杭州路總管兼管內勸農事臣梁曽中順大夫江南浙西道肅政廉訪副使臣商晦嘉議大夫江南浙西道肅政廉訪副使臣田滋中奉大夫前江南浙西道肅廉訪副使臣徐琰嘉議大夫簽江浙等處行中書省事臣奪兒只哥正奉大夫江浙等處行中書省參知政事臣安祚
