body:
  text: 聖濟總錄纂要卷七休寧程林纂咳𠻳門咳𠻳論曰肺主皮毛皮毛先受寒邪乃為咳𠻳五臟六腑又皆禀氣于肺故以其時感寒而受病亦能為咳形症不同治亦隨異學者審之桑白皮湯治咳𠻳胸滿氣急桑白皮半夏川貝母知母五味子欵冬花紫蘇一兩人參炙甘草紫朴五錢薑水煎三錢服日二百部煎治咳𠻳久不已百部汁生薑汁生地汁百合汁如無以藕汁代之白蜜各一種麥冬汁仝大棗肉四兩將諸汁入砂鍋内慢煎下蜜又將棗肉搗爛入汁内收成煎湯化日頻服貝母散治咳𠻳貝母一兩甘草阿膠五錢共末空心飲下二錢日二訶勒散治咳𠻳訶梨勒煨取皮為末每以二錢用雄猪胰一枚去脂切摻末入烏梅肉一枚令匀以芭蕉包紙裹煨􅌻慢嚼五味子湯治咳𠻳晝減夜増不得眠食即吐逆五味子白石脂桑白皮百合麻黄去根節白蒺藜杏仁去皮尖川貝母柴胡欵冬花旋復花枳殻炒紫苑桂心五錢薑水煎三錢入糯米一撮温服暴𠻳論曰肺感于寒微者即成咳𠻳葢肺主皮毛寒傷膚腠則肺先受之其狀咳𠻳語聲嘶破咽喉不利也杏仁湯治中冷暴𠻳上氣喘逆惡寒出清涕杏仁紫苑片芩甘草川歸陳皮麻黄桂心五錢木香一分大黄炒兩半水煎三錢温服日二貝母煎治暴𠻳胸膈不利痰逆喘急川貝母去心紫苑蜜浸焙杏仁去皮尖炒桑白皮炙一兩甘草蜜炙百部去心酒浸炒五味子炒白前甘草湯浸焙乾五錢用水一斗入諸味煎取汁二升濾去滓入生地汁五合麥冬汁五合白蜜三合牛酥二兩慢煎成餳頻頻含化一匙飲下餳糖煎治暴𠻳肺寒飴糖乾薑炒兩半豉炒二兩分二劑煎去渣入糖薑末服久𠻳論曰肺主皮毛易感風邪寒邪傷于肺則為咳𠻳五臟各以其時受之為五臟之欬久不已傳於六腑六腑不已三焦受之是為久𠻳其人咳而腹滿不欲飲食多唾而腫氣逆乃其症也人參煎治積年咳𠻳人參一兩酥油括樓搗蜜糖二兩飯上蒸九次晒乾為末空心湯下一匙日二蛤蚧丸治久咳𠻳喘急蛤蚧一對酥炙半夏杏仁去皮尖一兩炒括樓大者二枚去子取肉蒸研阿膠蛤粉炒人參五錢青皮去白炒一分乾薑煮二兩共末蜜丸如小豆空心飲二十丸阿膠散治久咳𠻳阿膠人參黄茋炙甘草杏仁去皮尖炒桑白皮炙紫苑桔梗一兩共末用猪胰一枚去油膜切拌末二錢葱白三寸鹽少許溼紙包煨􅌻細嚼酒下欵冬花散治肺寒久咳𠻳欵冬花不拘多少為末燒煙令病人吸之愈阿膠飲治久咳𠻳阿膠一兩人參二兩共末用豆汁入葱白煎三錢若𠻳頻呷蒺藜貝母湯治久咳𠻳白蒺藜川貝母百合赤石脂紫苑麻黄去根節天雄枳殻兩半五味川連地榆桑根白皮東引者炙桂心貫衆一兩片芩五錢旋復花炒三兩薑水煎三錢服冷𠻳論曰形寒飲冷内外合邪因而客之則為肺咳葢肺主氣外合皮毛其經環循胃口故内外得寒皆能傷之而為冷痰𠻳其候吸呼氣寒口如飲氷雪嘔吐冷沫胸中急痛晝静夜甚得温則止遇寒即發是也乾薑湯治冷痰嗽乾薑麻黄去根節二兩桂心炙甘草一兩紫苑五味子五錢杏仁去皮尖炒三十枚水煎三錢空心温服細辛散治肺寒咳𠻳喘滿細辛甘草五味子乾薑三兩赤茯苓四兩共末湯下二錢蜜丸亦可乾薑飴糖煎治冷嗽及一切嗽乾薑炒研末三兩膠飴糖一斤化飴糖拌末勻蒸􅌻頻含化一匙杏仁丸治冷嗽呼吸氣寒嘔吐冷沫胸中急痛杏仁去雙仁皮尖炒香一升生薑一斤切片炒乾陳皮去白炒五兩共末蜜丸如梧子大空心酒下二十丸熱𠻳論曰熱嗽之狀嗽而少涎由邪熱薫於上焦客于肺經使津液内燥搏于咽嗌喉嚨不利隨其吸呼而咳嗽也百部丸治肺氣熱嗽胸膈煩悶百部黄茋杏仁桂心一兩天冬括樓五兩馬兠鈴紫苑紫蘇四兩𤣥參二兩半共末蜜丸如梧子大烏梅甘草湯下二十丸阿膠丸治客熱嗽止嗽化痰阿膠人參硼砂二分丹砂甘草五錢氷片二錢共末蜜丸如芡實大含化一丸日二華葢湯治上喘咳𠻳兼治膈熱桑白皮陳麯炒香桔梗炒一兩人參百合三分杏仁去皮尖炒炙甘草五錢水煎三錢温服日二涼膈散治肺熱咳嗽甘草生二兩雄猪膽汁浸五日炙香為末蜜丸如梧桐子大薄荷湯下二十丸馬兠湯治肺熱嗽氣急喘悶馬兠鈴微炒桑白皮炙一兩苦葶藶桑紙炒炙甘草五錢半夏薑汁製三分薑水煎三錢空心温服呷嗽論曰呷嗽者而胸中多痰結于喉間與氣相擊隨其吸呼呀呷有聲故名呷嗽宜調順肺經仍加消痰破飲之劑射干丸治久呷嗽喉中常作聲發即偃卧不得射干一兩半夏陳皮百部欵冬細辛乾薑五味子貝母白茯皂莢去皮子炙郁李仁一兩共末蜜丸如梧子大空心飲下二十丸杏仁丸治呷嗽有聲杏仁去皮尖炒甘草炙一兩大黄蒸牙硝熬五錢共末蜜丸如梧子大空心薑湯下二十丸紫苑杏仁煎治肺臟氣積呷嗽不止因肺虚損致勞疾相侵或胃中冷膈上熱者紫苑酥二兩杏仁去皮尖半升貝母薑汁三兩大棗去皮核半斤五味子人參白茯甘草桔梗地骨皮洗一兩白蜜一斤生地汁五合共末與蜜汁同煎百沸器盛蒸三五次成飴煎仰卧含化一匙日二五臟諸咳嗽論曰内經謂肺咳之狀咳而喘息有音甚則吐血心咳之狀咳而心痛喉中介介如梗狀甚則咽腫喉痺肝咳之狀咳而兩脅下痛甚則不可以轉轉則兩胠下滿脾咳之狀咳而右脅下痛隂隂引肩背甚則不可以動動則咳劇腎咳之狀咳則腰背相引而痛甚則咳涎五臟之咳久而不已乃傳六腑六腑之咳内經論之詳矣前胡湯治五臟諸咳嗽前胡五味生地澤㵼半夏二兩貝母麻黄人參山藥白术白茯杏仁甘草葛根烏梅去核炒一兩薑水煎三錢空心温服五靈脂湯治肺咳嗽及諸嗽五靈脂馬兠鈴一兩人參五味甘草炙桑白皮蜜炙陳皮去白炒杏仁去皮炒五錢薑水煎三錢空心温服日二人參桔梗散治心咳嗽咽喉腫痛人參一兩桔梗炒四兩白茯牛旁子炒三兩甘草炙兩半共末薑湯空心下二錢日二木乳散治肝咳嗽兩脇下滿木乳即皂莢樹根皮木乳酥炙三兩杏仁去皮尖炒貝母去心二兩甘草炙一兩共末薑橘湯下二錢半夏陳皮湯治脾咳嗽半夏陳皮杏仁一兩赤茯柴胡麻黄一兩生薑甘草五錢水煎三錢空心温服四味散治腎咳嗽補骨脂炙牽牛子半生炒杏仁一兩郁李仁五錢共末茶下二錢黄茋散治大腸咳嗽黄茋人參白茯桑白皮二兩甘草三兩共末湯下二錢半夏桔梗湯治脾肺寒熱勞咳痰盛嘔逆半夏桔梗桑白皮膽南星二兩薑棗水煎三錢温服阿膠散治肺胃不調久咳不差阿膠甘草桔梗炒桑白皮五錢細辛一錢共末空心薑湯下二錢日二鹿角膠湯治大腸咳嗽鹿角膠杏仁去皮尖炒研甘草半夏薑汁製麻黄去根節二兩薑水煎三錢空心温服人參丸治脾胃虚弱痰壅咳𠻳人參木香訶梨勒煨取皮一分共末蜜丸梧子大空心飲下二十丸咳𠻳上氣論曰諸氣皆屬於肺肺氣和平則升䧏自若若為寒邪所傷則肺氣壅不得宣通故咳𠻳而上氣其症咳𠻳多涕唾甚者面目浮腫久而不已肺氣虚極風邪停滯令人胸背痛以至唾膿血也潤膈丸治積年咳𠻳上氣涎吐稠黏五心煩躁不思食肺經留熱阿膠熟地人參山藥五味白茯逺志防風一兩麥冬貝母杜仲丹參茯神栢子仁百部五錢共末蜜丸如彈子大水煎一丸服香豉豆湯治三十年咳𠻳上氣豉炒五錢細辛杏仁甘草呉茱茰洗炒一兩紫苑二兩共末蜜為丸如梧桐子大含化日二郁李仁煎治積年上氣咳𠻳不得卧郁李仁去皮二兩水二升研如杏酪去滓煮令無辛氣入酥二棗許和匀空心頻頻温服㯽榔湯治上氣腹脹胸脅痛咳𠻳不下食㯽榔十四枚白蜜二合生薑酥三兩乾薑一兩枇杷葉一把去毛蜜炙水三升煎一升去滓入酥蜜再沸分三服柴胡桑皮湯治咳𠻳上氣促急心躁寒熱四肢煩痛夜甚柴胡桑白皮天雄枳殻大腹皮麻黄去根節羗活兩半川黄連甘草桂心川歸一兩白梅去核四枚片芩旋復花五錢薑水煎三錢服紫苑湯治咳𠻳上氣紫苑欵冬枳殻桔梗一兩赤芍赤茯陳皮百合兩半大腹二枚水煎三錢服四神散治肺氣不和上氣咳𠻳百部白薇川貝母欵冬花二兩共末蜜丸如梧子大空心桑白皮湯下二十丸地黄煎治上氣咳𠻳肺氣壅熱不和懐生地升半麥冬汁天冬汁生薑汁五分𤣥參柴胡黄牛酥赤茯苓五兩五味子欵冬花紫苑黄茋川貝母桂心二兩杏仁去雙仁皮尖炒五兩人參二兩共末將酥汁蜜慢煎入末和勻熬成煎用磁瓶盛貯甑上蒸頻服一二匙湯下内有白蜜五兩咳嗽唾膿血論曰咳嗽唾膿血者由肺感寒氣咳嗽傷于陽也心主血肺主氣血隨氣上逆故咳而有血寒邪壅熱于肺間津液相搏凝滯藴結故化為膿因咳而咯吐膿血也百部丸治咳嗽上喘吐膿血胸膈不利咽喉腫痛百部天冬貝母桔梗紫苑欵冬花二兩共末蜜丸如梧桐子大甘草烏梅湯下三十丸桑白皮湯治咳嗽吐膿血痰涎桑白皮麥冬欵冬花一兩貝母甘草黄明膠五錢水煎三錢温服菜菔子湯治咳𠻳唾膿血痰涎菜菔子五錢研白蜜牛酥桃仁杏仁二味同去皮尖爛研成膏一兩飴糖二兩熬酥蜜入飴糖膏酥成煎湯化一匙蛤蚧湯治咳嗽咯血吐膿蛤蚧人參貝母杏仁甘草知母鹿角膠葛根桑皮枇杷葉炙一兩水煎三錢温服五味子湯治咳嗽吐膿血連胸膈痛五味子生地桔梗桑皮紫苑續斷赤小豆甘草五錢水煎三錢入竹茹一丸煎温服薤白湯治久咳嗽肺虚吐血將成勞病鼈甲阿膠甘草鹿角膠二兩水煎三錢入薤白三寸服括樓湯治咳嗽咯血喘滿肺痿括樓二枚去穰入蛤粉炒葛根防己杏仁貝母馬兠鈴甘草阿膠二兩水煎三錢入蜜少許温服杏仁湯治肺氣壅熱咳嗽上氣吐膿血杏仁桑皮柴胡三分甘草桔梗紫苑麻黄去根節欵冬川連茜根半夏五錢薑水煎三錢温服咳嗽失聲論曰咳嗽失聲者葢肺氣上通於喉嚨喉嚨者肺之系肺感寒㣲者成咳嗽咳嗽不已其氣奔迫窒塞喉中故因而失聲也杏仁煎治咳嗽失聲語不出杏仁一升去皮尖炒研五味子木通貝母紫苑一兩桑白皮五兩薑汁飴糖一升分三劑每水四鍾煎去滓入杏汁糖三之一成煎貯器中含化一匙補肺人參湯治氣虚咳嗽言語聲嘶飲食減少日漸消瘦人參黄茋􅌻地桂心一兩白术紫蘇三分乾薑杏仁紫苑五味五錢鹿角膠一兩棗水煎三錢温服漏聲散治咳嗽聲不出五味子欵冬人參木通細辛竹茹石菖蒲牛酥三兩杏仁白蜜薑汁一升棗肉二升桂心三兩水煎諸味去滓入酥汁蜜棗慢煎稠酒下一匙日三紫苑丸治肺感風冷咳嗽聲嘶紫苑貝母欵冬桂心兩半杏仁甘草二兩陳皮人參白茯百部一兩共末蜜丸如梧子大空心飲下三十丸風冷聲嘶論曰其風冷聲嘶者其聲嘶嗄不通暢也葢肺象金金主聲音人五臟有五聲皆禀肺氣而通之今風冷乗于肺經則氣道不調故聲音不出而嘶嗄也杏仁煎治風冷失聲語音不出杏仁去皮尖爛研成膏桂心二兩五味子貝母細辛紫苑一兩共末水煎去滓入蜜飴糖薑汁杏膏慢煎酒下一匙石菖蒲散治風冷摶肺氣塞不通聲嘶不出菖蒲五味子細辛陳皮紫苑乾薑五錢訶梨勒杏仁一兩共末酒下二錢通聲辛甘煎治肺氣虚為風寒所傷語聲嘶嗄氣息喘急不通痰逆上氣咳嗽真酥白蜜飴糖薑汁百部汁棗肉一斤杏仁一升研用㣲火慢煎成煎酒下一匙諸氣門諸氣綂論論曰内經云百病所生生於五臟肺之所生獨主於氣不足有餘葢由虚實故所病不同其症亦異怒則氣逆甚則嘔血及飱泄故氣逆也喜則氣和榮衛通利故氣緩也悲則心系急肺布葉舉使上焦不通榮衛不散熱氣在内故氣消也恐則精怯怯則上焦閉閉則氣還還則下焦脹故氣不行也寒則腠理閉氣不行故氣収也熱則腠理開榮衛通汗大洩故氣洩也驚則心無所倚神無所歸慮無所定故氣亂也勞則喘息汗出内外皆越故氣耗也思則心有所存神有所歸正氣留而不行故氣結也七氣丸治寒熱愁怒驚思恚氣大黄二兩半人參半夏細辛柴胡乾薑吳茱茰桔梗菖蒲五錢赤茯川芎甘草石膏桃仁去皮尖炒川椒三分炒共末蜜丸如梧子大飲下三十丸一方加桂心麝香丸治一切氣逆胸膈否悶中脘不快痰癖留滯嘔吐惡心肢體倦不思飲食麝香丹砂紫朴木香肉䓻五錢半夏㯽榔二兩丁香乳香一兩桂心三分共末用薑汁煮半夏末為膏丸小豆大陳皮湯下二十丸藿香湯治諸氣不調胸膈痞滯升降不勻藿香紫朴乾薑一兩甘草青皮三分桂心五錢枇杷葉一兩生薑大棗水煎五錢空心温服日二上氣論曰凡人一日一夜共一萬三千五百息呼隨陽出氣於是升吸隨隂入氣於是乎降一升一降隂陽交通氣乃和融所謂上氣者葢氣上而不下升而不降喘息有聲是也本于肺臟之虚復感風邪肺脹葉舉諸臟氣又上冲而壅遏此所以有上氣之候也地黄煎治上氣乏急生地汁升半生薑汁牛酥半升白蜜一升淡竹葉半升杏仁去皮尖二兩半炙甘草貝母去心蘇子二兩赤茯苓紫苑兩半水四升煮竹葉甘茯蘇苑去滓入汁蜜熬成煎重湯煮攪稀飴含化一匙欵冬花湯治上氣咽中不利欵冬五味子半夏二兩射干細辛紫苑一兩麻黄三兩薑棗水煎三錢空心温服酥蒜煎治上氣喘急酥半斤大蒜三枚以酥煮蒜煮去蒜入薑汁成煎頻服一匙雙仁丸治上氣喘急不安桃仁杏仁俱去皮尖炒爛研水和生麫為丸如梧桐子大薑蜜湯下二十丸上氣喉中如水雞聲論曰肺主氣上通於喉嚨肺經客寒則喉嚨不利痰唾凝結氣道奔迫喘息有聲聲如水雞半夏丸治上氣咳嗽喉中作聲坐卧不得半夏紫苑桑皮一兩百部欵冬射干陳皮五味貝母皂莢炙赤茯三分杏仁兩半細辛五錢共末蜜丸如梧子大薑棗湯下二十丸射干湯治咳而上氣喉中如水雞聲射干半夏五味欵冬紫苑二兩細辛麻黄生地四兩大棗水煎五錢温服短氣論曰短氣不足以呼吸者肺虚也倚息短氣不能卧其形如腫者飲也短氣上喘氣道促急者肺虚而寒邪實也如是者不可概而論之紫蘇湯治卒短氣紫蘇二兩陳皮五錢大棗酒水煎三錢温服枸把湯治短氣枸把薑棗水煎三錢温服陽厥論曰内經云有病怒狂者生于陽也陽氣者因暴折而難决故善怒也病名曰陽厥夫隂陽未可偏勝則氣逆陽厥者陽勝而氣逆不調也葢陽氣暴折則鬰而不散故多怒而狂怒則氣上故頸脉動而大疾者為陽厥之症也其治奪食即已葢食入於隂長氣于陽陽盛故厥逆怒狂奪食者所以平其氣也鐵落飲治陽厥善怒除煩下氣鐵落即染皂鐵漿是也每服重湯温一鍾飲之竹瀝石膏湯治陽厥多怒狂躁不安上攻頭頸竹瀝石膏兩半山枝生地𤣥參赤茯升麻知母三分薑水煎三錢入竹瀝服犀角丸治陽氣偏勝氣厥多怒如發狂狀心胸煩滿忿忿多怒頸脉疾動犀角防風甘草一兩枳殻石膏五錢升麻萎蕤三分共末蜜丸如梧子大飲下二十丸定神丸治陽厥怒狂白茯逺志人參防風栢子仁一兩甘草一兩龍骨兩半牡蠣棗肉一兩共末蜜丸如梧子大湯下二十丸羚羊角湯治陽厥氣逆善怒狂妄不常羚角五味子沙參棗仁茯神逺志萎蕤一兩龍骨煆五錢為粗末薑水煎三錢服日二積聚門積聚綂論論曰積者五臟所生氣之所積名曰積其始發有根本其痛不離其部由隂氣所生也聚者六腑所成氣之所聚名曰聚其始發無根本其痛亦無常處由陽氣所生也然又有癥瘕癖結者乃積聚之異名也症狀不一原其病本大約相類但從其所得或診其症狀以立名爾且癥者為隱現腹内按之形症可騐也瘕者為瘕聚推之留移不定也癖者癖側于脅肋結者沉服結强于内然有得之于食有得之于水有得之于憂思恚怒有得之于風寒種種不一凡使氣血沉滯留結而為病者治須漸磨漬削使氣血流通則病自愈矣積聚論曰經云病有積有聚何以别之夫積者隂氣也聚者陽氣也隂沉而伏陽浮而動故氣之所積名曰積氣之所聚名曰聚然積者五臟所生聚者六腑所成積之為病其始發有常處其痛不離其部上下有終始左右有所窮盡聚之為病其始發無根本其痛亦無常處上下無留止此積聚之分别也鼈甲丸治腹内積聚心肋氣滿時吐清水惡寒不下食鼈甲醋炙大黄炒㯽榔二兩人參附子前胡白术黒乾薑枳殻防葵川歸桔梗甘草一兩食茱茰紫朴三兩共末入蜜杵丸如梧子大空心酒下三十丸萬靈丸治積聚滯氣胸膈痞悶心腹刺痛雄黄陳皮去白炒大黄白丑一兩肉蓯蓉京三稜煨杏仁巴豆去皮心油乾漆炒烟青皮五錢訶勒皮三分天南星薑製木香藿香葉白术炒一分胡椒半分共末薄荷汁糊為丸如小豆大傷食薑湯下三五丸傷酒薑湯下十丸大五積丸治五積胸膈痞悶腹脅脹滿宿食不消積氣成塊心腹痛不能飲食磠砂芫花乾漆炒烟一兩木香仝後末巴豆去皮心油皂莢去皮子尖烏頭去皮臍三分仝上五味入醋三升熬膏大黄炒京三稜煨鼈甲醋炙川歸陳麯青皮去白炒一兩桂心三分共末用膏丸如小豆大茶酒任下五七丸欲疏利服十丸十味五積丸治五積氣嘔吐酸水心腹脹悶不思食沉香陳皮去白炒甘松京三稜五錢芫花醋炒焦牽牛搗取末木香甘遂連珠者大㦸薑黄一兩共末糊為丸如梧子大用陳皮湯空心下二三十丸木香丸治五種積聚成塊木香㯽榔人參郁李仁訶勒皮大黄㣲煨三兩蘇子白芍赤茯枳殻去白炒黑乾薑硝石二兩共末入蜜為丸如梧子大酒下二三十丸牛膝芍藥丸治積聚癥癖氣塊牛膝白芍藥大黄炒桔梗赤茯苓訶梨勒取皮柴胡紫朴薑炒三兩枳殻㯽榔陳皮去白炒一兩共末入蜜杵丸如梧子大空心大棗湯下二三十丸肥氣論曰凡人積氣在左脇下如覆杯有頭足者名曰肥氣乃肝之積也葢肝藏血故隂多而陽少發為積氣由肺病傳肝肝傳脾脾以季適王而不受傳是邪氣留于肝故積為積氣久不愈令人發欬逆痎瘧連歲不已此隂盛陽虚故也蓬纍根湯治久積結癖氣不散左脇下如覆杯吐酸水面色黄此名肥氣并女人血瘕蓬纍根懷生地二兩川歸赤芍藥一兩丹皮枳殻炒桂心三分生薑焙五錢水煎三錢空心温服日二青蒿汁湯治久積肥氣寒熱痎瘧青蒿汁一合生薑汁童便半合常山柴胡三分烏梅肉炒鼈甲醋炙炙甘草一分水煎五錢去滓入三汁少許沸服日二酸棗仁丸治肝積肥氣久不已變成寒熱痎瘧令人熱多寒少小便赤澀咳逆酸棗仁生蘇子木通薏苡仁黄茋枳殻麥麩炒木香坐拏草升麻大黄麥門冬赤茯苓一兩共末入蜜杵丸如梧子大麥冬湯下二三十丸日二石韋丸治肝積肥氣石韋去毛京三稜附子陳皮川椒去目炒吳茱茰炒一兩共末入蜜杵丸如梧子大荆芥湯下二三十丸伏梁論曰内經謂病有小腹盛上下左右皆有根名曰伏梁裹大膿血居腸胃之外不可治治之毎切按之至死又曰人有身體髀股胻皆腫環臍而痛病名伏梁此風根也夫氣之所聚名曰聚氣之所積名曰積聚陽氣也故無留止積隂氣也故有形狀伏梁心之積也起于臍上故小腹盛上下左右皆有根裹大膿血居腸胃之外故環臍而痛此為風水之病使身體髀胻皆腫名曰伏梁以其若梁之隱於伏也其症有淺深居臍上為逆以邪氣之逆上行也居臍下為從以邪氣之順下行也治法不可動動之為水溺濇之病故曰論在刺法中鼈甲湯治伏梁積氣鼈甲醋炙白芍京三稜大腹皮一兩懷生地柴胡川歸兩半桂心生薑三分水煎三錢入木香少許服日二桃奴散治伏梁積氣桃奴暴乾為末空心温酒下三錢未差再服訶梨勒丸治憂積伏梁氣訶勒皮二兩㯽榔大黄炒三兩半防葵柴胡枳殻去白炒羚羊角川連赤茯苓生薑兩半子芩木通一兩共末入蜜杵為丸如梧子大空心飲下三十丸日二痞氣論曰凡積氣在胃脘覆大如盤者脾積也痞結不通故名痞氣此本肝病傳脾脾當傳腎腎以冬適王而不受邪氣留于脾故結為積久不愈令人四肢不收發為黄疸使飲食不為肌膚所以然者脾藏肌肉之氣能與胃行其津液以榮養四肢若為積氣所留則不能榮養故有四肢不收飲食不為肌膚之症也平氣丸治脾積痞氣腹脅膨脹心胸悶痛不思食㯽榔㣲煨一枚京三稜砂仁胡椒五錢青皮炒一兩烏梅肉炒兩半巴豆二錢去皮心油共末糊為丸如小豆大薑湯下三丸白术湯治脾積痞氣脅肋滿悶白术紫朴薑汁炒桂心柴胡三兩炙甘草一兩㯽榔十枚㣲煨生薑水煎三錢空心温服日二勻氣湯治脾積痞氣胃脘不安肌瘦減食大腹皮二枚全用白术桂心牽牛半生半炒麥蘖紫朴薑汁炒郁李仁半生半炒甘草陳麯一兩高良薑五錢生薑大棗水煎五錢空心温服再晚服息賁論曰凡積氣在左脅下覆大如杯者肺積也氣上賁衝息有所妨名曰息賁此本心病傳肺肺當傳肝肝以春適王而不受邪氣復賁于肺故結為積若久不已令人灑淅寒熱喘咳發肺癰所以然者肺主氣外合於皮毛今肺氣留積故有咳喘寒熱肺癰之病枳實湯治肺積息賁上氣冲胸滿咳逆枳實麩炒黄木香㯽榔炙甘草葶藶紙炒吳茱茰炒五錢杏仁去皮尖炒二分薑棗水煎三錢空心温服日二桑白皮湯治肺積息賁上氣脹滿咳嗽涕吐膿血桑白皮麥門冬兩半桂心甘草五錢陳皮炒皂牙去皮尖一兩生薑水煎三錢温服日二賁豚論曰凡積氣發于小腹上至心下若豚狀或上或下來徃無時者腎積也葢腎水乗心其狀賁衝如豚名曰賁豚此本脾病傳腎腎當傳心心以夏令適王而不受邪氣復留于腎故結為積久不已令人喘逆骨痿少氣所以然者腎藏骨髓之氣若其氣留積不能榮養骨髓故變為喘逆骨痿之病也四味丸治久積賁豚氣時攻膀胱痛川椒炒出汗附子肉蓯蓉蘹香子一兩共末蜜丸如梧桐子大酒下桃仁丸治腎積氣賁豚桃仁去皮尖二兩研用酒二升煎成膏木香青皮去白炒蘹香子炒桂心五錢㯽榔三分黒乾薑一分共末膏丸梧子大酒下三十丸化氣沉香湯治腎積沉香木香人參附子黄茋烏藥甘草五味大茴牛膝石斛陳皮髙良薑巴㦸天桂心五錢生薑水煎三錢温服日二李根白皮湯治賁豚氣冲心汲汲短氣發作有時李根白皮炙八兩人參附子甘草二兩半夏七兩赤茯黒乾薑桂心三兩水煎三錢温服日二吳茱茰湯治賁豚氣上冲心胸逆渴吳茱茰一而人參甘草半夏四兩桂心薑棗水煎服木香散治一切風及腎臟賁豚氣上冲心胸滿悶木香一兩白芷沉香杉木節蓬莪茂蘹香子炒桂心青皮五錢木𤓰枳殻炒三分共末薑湯下二錢磁石散治賁豚冷氣上冲昏亂四肢軟弱不收磁石木香㯽榔肉豆䓻一兩共末葱白酒下二錢日二壓氣木香丸治賁豚氣上冲胷膈木香丁香肉豆䓻白豆䓻吳茱茰炒五錢沉香三分青皮一分麝香二錢共末用硇砂猪膽汁和丸梧子大酒下二十丸木香㯽榔散治腎積氣不散結伏賁豚發即上冲心胸令人喘逆骨痿少氣等疾木香㯽榔白芷沉香磁石大茴川芎訶勒皮牡蠣五錢桂心陳皮三分共末生薑鹽湯下二錢諸癥論曰積氣在人腹中久不差則牢固推之不移者癥也此由寒温失宜飲食不節致臟腑虚弱食飲不消按之其狀如杯盤牢結久不已令人體瘦而腹大至死不消診其脉弦而堅其狀不轉動者此其症也鼈甲丸治諸癥塊冲心氣滿不下食手足煩悶鼈甲訶勒皮二兩人參炙甘草防葵大黄㣲炒兩半白术郁李仁桂心杏仁去皮尖一兩研成膏共末入蜜杵丸梧子大酒下二三十丸夾食丸治癥癖食氣食勞五膈痰逆乳香木香川歸肉䓻乾薑京三稜煨附子丹砂青皮巴豆去油一兩紫苑鼈甲醋炙二兩丁香共末入蜜杵丸小豆大丹砂為衣酒下三五丸結瘕論曰結瘕者積聚之類也聚積久不散謂之結浮流腹内按抑有形謂之瘕結之症候形體瘦瘁飲食不作肌膚遇隂寒冷溼之氣則發而腹脅塊硬隱隱然痛者是也瘕之症候腹中氣痛動轉横連脅下有如癖氣遇脾胃有冷陽氣不足而發動者是也紫葛丸治結瘕腹脹堅硬如石肚上青筋浮起紫葛郁李仁一兩木香桔梗訶勒皮三分大黄炒兩半紫苑三分牽牛子五錢半生半炒共末入蜜杵丸梧子大木通大棗湯下二十丸痃氣論曰痃氣謂臍腹左右𦂳硬而痛横逆如臂取象如弓弦之急故謂之痃氣葢因寒温失宜房勞過度真陽虚􅉵隂冷内生所以水飲入於胃而不能銷鑠流於脅下經久不去遂成痼疾若遇隂寒或食冷物則作痛久之則不能飲食致肌膚消瘦訶梨勒丸治痃氣胸脅滿大腸常澀訶勒桂心白芍大黄炒甘草烏藥防葵一兩鼈甲二兩共末入蜜杵丸如梧子大薑湯下二三十丸附子草䓻丸治痃氣急痛嘔吐酸水附子草豆䓻二兩桂心吳茱茰一兩木香五錢桃仁三兩去皮尖炒丁香三分共末入糊丸梧子大薑橘湯下二三十丸大黄丸治痃氣急痛嘔吐酸水大便不通滿悶大黄二兩用酒二升熬成煎丁香㯽榔煨三分木香訶梨勒煨取皮桂心一兩共末同煎杵丸小豆大酒下二三十丸京三稜丸治五積痃癖氣塊京三稜木香青皮㯽榔石三稜鷄爪三稜五錢肉豆䓻二枚硇砂三分共末用薑汁糊丸梧子大薑湯下二三十丸緩中丸治痃氣急痛腹脹胃脘痛不下食嘔逆乾薑甘草一分人參附子白芍陳皮㯽榔桂心枳殻鼈甲半夏紫朴五錢薑水煎服酒癖論曰胃弱之人因飲酒過多酒性辛熱善渴而引飲遇氣道否塞酒與飲俱不化停在胸肋結聚其癖其狀按之有形或按之有聲脇下弦急脹滿或致痛悶肌瘦不能食因酒得之故謂之酒癖乾薑丸治酒痃癖水飲不消兩脅脹滿時嘔吐腹中水聲乾薑葛根枳殻一兩白术二兩陳皮三分甘草五錢炙共末入蜜杵丸梧子大飲下三四十丸栝蔞散治酒癖脅下脹滿不能下食栝蔞實一兩陳麯炒香五錢共末空心葱白下二錢日二聖濟總録纂要卷七
