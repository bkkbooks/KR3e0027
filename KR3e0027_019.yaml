body:
  text: 聖濟總録纂要卷十九休寧程林纂口齒門口齒總論論曰足太隂脾之經其氣通於口足陽明胃之經手陽明大腸之經其脈並夾於口故其腑臟風邪溼熱發於經則於是有口吻之疾牙齒者骨之所終髓之所養也又手陽明之支脈入於齒故骨髓之氣不足與夫陽明之脈虛不能有所滋養於是有牙齒之疾牙齒之疾其候甚多治􅓼之法固不得略也養生方云雞鳴時叩齒三十六下食畢令啄齒皆宜長行之令齒不蠧去蟲又早朝未起潄口中玊泉令滿口咽之啄齒二七遍去蟲牢齒千金又曰每旦以鹽一捻內口中以暖水揩潄及叩齒百遍為之不絶不過五日即牢密若此之類皆簡易可行行之有效不可忽也口瘡論曰口瘡者由心脾有熱氣衝上焦熏發口舌故作瘡也又有胄氣弱榖氣少虛陽上發而為口瘡者不可執一而論當求所受之本也當歸膏方治口爛生瘡水漿不下當歸一兩射干升麻附子各半兩白蜜四合猪脂五兩除蜜外并銼先煎脂化去滓入諸藥慢火煎候附子色黃又去滓入蜜更煎如膏以瓷器盛每服如杏核大含之日三五度咽津不妨黃連膏方治口瘡并咽喉塞黃連三兩猪脂一斤白蜜四兩羊髓研二兩以慢火煎猪脂取油去渣入黃連又煎令黑色下羊髓髓化以綿濾去滓入蜜更煎成膏瓷盒盛每含一棗大日三五度咽滓不妨燒肝散方治口瘡久不差茵陳蒿犀角屑石斛白术柴胡各半兩芍藥吳茱茰湯浸三遍紫參桔梗防風桂心人參白蕪荑各一分每服五錢以白羊肝五兩切去筋膜入葱白一莖細擘相和濕紙三五重裹慢火煨熟空腹頓服米湯下巴㦸散方治元臟虛冷上攻口瘡巴㦸天一兩白芷半兩髙良薑為末一錢為細散用猪腰子二隻去筋膜每一隻入藥散一錢用紙溼裹煨熟乘熱去紙以口吸熱氣有涎即吐候冷細嚼服之生薑煎方治口瘡疼痛生薑取汁一盞白沙蜜三兩用煎十沸用瓷器盛時時以熱水調一匙含咽之栁花散方治口瘡黃檗一兩澱花半兩為散臨卧乾摻誤咽亦不妨升麻含汁方治口瘡升麻不拘多少一味含一里咽津升麻飲方治口內生瘡齒齗肉爛升麻黃連羚羊角𤣥參麥門冬黃芩葛根甘菊花防風羌活大黃各半兩人參三分甘草炙知母各一分每服三錢水煎食後溫服𤣥參湯方治心肺壅熱口內生瘡胸膈痰逆𤣥參茅根羌活竹茹木通羚羊角升麻各半兩黃連苦竹葉人參半夏浸去滑各三分甘草炙一分每服三錢入生薑三片同煎溫服食後再服𤣥參丸方治口瘡𤣥參天門冬麥門冬各一兩為末錬蜜和丸如彈子大每用一錢丸綿裹含花咽津口糜論曰膀胱移熱於小腸隔腸不便上為口糜夫小腸之脈絡心循咽下膈抵胃陰陽和平水榖入胄小腸受之通調水道下輸膀胱今熱氣厥逆膀胱移熱於小腸胃之水榖不得傳輸於下則令腸膈塞而不便上則令口生瘡而糜爛也大抵心胃壅熱則必熏蒸於上不可槩以𫝊藥當求其本以治之大青丸方治口糜生瘡久不差及心脾中熱乍發乍退大青去根甘草炙枳殼麩炒苦參各三分生乾地黃焙升麻各一兩黃連半兩共為末鍊蜜丸如梧桐子大每服二十丸食後熟水下日二服升麻丸方治口糜生瘡升麻黃連黃檗炙杏仁各一兩去皮尖將上三味為末次研杏仁如膏鍊蜜三兩以藥末并杏仁和為丸如彈子大每服一丸含化咽津口吻瘡論曰口吻瘡者其瘡發於脣吻之間疼痛微腫溼爛有汁世名燕口又名肥瘡此由脾胃有熱隨氣熏蒸因上攻於口脣與津液相搏所致芎藭丸方治口吻瘡芎藭二兩白芷陳橘皮去白黃連各半兩為末鍊蜜和丸如梧桐子大每服二十丸甘草湯下不拘時候麝香散方治口吻生瘡久不差人中白研麝香研各一錢再研勻塗瘡上葵根散方治口吻瘡取秋葵根一握燒作灰研為散𫝊之口舌生瘡論曰口舌生瘡者心脾經藴熱所致也蓋口屬脾舌屬心心者火脾者土心火積熱𫝊之脾土二臟俱蓄熱毒不得發散攻衝上故令口舌之間生瘡腫痛烏犀湯方治口舌生瘡犀角屑三分羚羊角屑三分丹砂三分黃茋半兩大黃一分升麻半兩生乾地黃一兩射干一分天門冬生者去心一兩𤣥參三分甘草炙一兩每服三錢水煎食後溫服防風散方治口舌生瘡防風一兩龍膽一兩生地黃二兩沉香半兩升麻半兩每用二錢入鹽少許沸湯調勻揩齒含咽便睡茯神丸方治積年口舌瘡諸方不瘥茯神一兩白术一兩旋復花半兩縮砂蔤三分去皮大黃煨半兩芍藥半兩桂心三分郁李仁一兩大麻仁别研二兩人參半兩枳殼炒三分訶梨勒一兩厚朴薑汁炙一兩白檳榔三分白鮮皮半兩陳橘皮去白一兩地骨白皮半兩為末鍊蜜和丸如梧桐子大每服二十丸空心粥飲下加至三十丸口殠論曰口殠者脾之候心脾或熱藴積於胃變為腐臊之氣停聚不散隨氣上出熏發于口故令殠也升麻散方治口殠生肌長齗升麻二兩防風一兩當歸白芷各半兩川芎藁本各三分麝香一分甘草炙半兩木香細辛各一分每用一錢𫝊齒根下甚者綿裹含化咽津七香丸方治口及身殠白豆䓻仁丁香藿香零陵香青木香白芷桂心各一兩香附子二兩甘松香當歸各半兩檳榔二枚沉香一兩為末鍊蜜和丸常含一丸大豆大咽汁日三夜一亦可常含咽汁五日口香十日體香二七日夜被香三七日下風人聞香四七日洗手水落地香五七日把他人手亦香慎五辛下氣去殠芎藭散方治心虛寒口殠蟲蝕齒痛芎藭白芷各一兩甘草炙三分桂心去粗皮杜蘅各半兩當歸切三分為散食前暖酒調下一錢日二服三十日體皆香即差草豆䓻丸方治心脾藴熱隨氣上熏發為殠草豆蔻仁丁香各一兩麝香一分藿香葉零陵香桂心莎草根去毛木香白芷當歸檳榔各半兩為末鍊蜜和丸如雞頭大每含化一丸咽津液日三丸脣瘡論曰脣瘡者以脾胃有熱熱氣循經而外發於脣故生瘡也蓋足陽明之脈下循鼻外入上齒縫中還出挾口環脈內經謂脾之合肉也其榮脣也是故脾胄之經與脣相應熱氣乘經而衝發所以脣為之生瘡硫黃膏方治脣瘡及緊瘡久不差硫黃研白礬枯研丹砂研水銀麝香研黃檗各一分為末同研候水銀星盡用臘月豬脂和如泥先拭令淨後以膏塗之日三五上即差五倍子散方治口脣生瘡五倍子去心中蟲槐花擇等分為細散每用蜜𫝊脣上如瘡口乾以葱汁調上治瀋脣瘡方鯉魚血一味取血磨墨相和塗之差脣生核論曰脣生核之候大槩與脣瘡緊脣相類然其腫至於生核者蓋足陽明與太陰為表裏臟腑俱有風熱風熱之氣衝發二經與血氣相摶而為脣腫外復為風冷所乘血氣凝結聚而不散故生核也防風湯方治脾胃藴積熱氣復為風冷所摶脣邊生核結硬疼痛防風去乂半兩菊花一兩升麻半兩獨活半兩黃芩半兩知貝半兩𤣥參半兩生乾地黃半兩藁本半兩大黃炒半兩梔子半兩前胡半兩桔梗半兩甘草炙麥門冬各半兩每服用三錢水煎食後溫服日三黃連散方治脾胃積熱風冷乘之脣結核黃連去鬚升麻龍膽各一兩為散綿裹如彈子大臨卧新汲水浸過含化咽津治脣生核腫痛如彈方牛膝燒灰存性研先以針刺出惡血次用藥少許以新汲水調塗核上治脣黑腫生核痛癢不可忍方古銅錢青者四文放石上以臘月豬脂磨取汁塗之重舌論曰重舌者以心脾二經藴伏熱氣循緣經絡上衝舌木遂令舌下血脈脹起如小舌狀故謂之重舌蓋心開竅於舌足太陰之脈屬脾絡胃上膈挾咽連舌本散舌下故也紫雪服之甚效牛黃散方治重舌牛黃研人參各半兩白茯芩三分大黃炒半兩當歸一分甘草炙半兩丹砂研半兩為散每服半錢溫水調下甚者加至一錢食後服舌腫强論曰心氣通於舌脾脈挾咽連舌本散舌下心脾二經受風邪則舌本强不能卷舒久或熱氣加之則腫腫則脈筋脹急勢連咽喉礙於呼吸法宜刺之泄去惡血及餌以藥白茯苓湯方治舌腫强白茯芩牛黃研各三分犀角屑一分甘草炙人參羚羊角屑熟乾地黃白术桂各半兩每服三錢水煎溫服日三百草霜方治舌忽緊硬逡巡能塞煞人者百草霜好鹽各半兩同研勻表裏塗之立效䗪蟲散方治舌腫滿口言語不得䗪蟲五十枚鹽半兩細研為末每服以水煎熱含冷吐以差為度螵蛸散方治木舌腫强桑螵蛸十二月者炙黃每服半錢萊蔔汁調下蚯蚓塗方治舌腫滿塞喉欲死蚯蚓一條以少許鹽花化為水塗咽喉舌上良久漸消牙齒厯蠧論曰牙齒厯蠧者腎虛弱也骨髓不固氣血衰耗不能滎潤於牙齒故令人牙齒黯黑謂之厯蠧麝香散方治齒厯蠧麝香一匙定粉一錢黃蠟半兩細研前二味鎔蠟調之攤在紙上每臨卧時剪作片子貼所患齒上升麻散方治牙齒厯蠧齒根黯黑升麻槐枝灰各半兩白附子蜜陀僧煆露蜂房各一分為散入地黃汁一合和勻陰乾每用揩齒牙齒疼痛論曰牙齒疼痛有二手陽明脈虛風冷乘之而痛者謂之風痛蟲居齒根蝕侵不已傳受餘齒而痛者謂之蟲痛二者不同古方有塗𫝊潄泄之藥治去風蟲用之各有法也細辛散方治牙齒疼痛頭面浮腫喫冷熱物不得細辛芎藭藁本獨活各一兩地骨皮半兩蒺藜子三分為散綿裹如江豆大含化咽津每日三五度易之去膈間風熱若患頭風鼻塞先以油塗頂心以手摩一二百遍次用散一錢又摩頂心依前法地骨皮湯方治牙齒疼痛吃物不得地骨皮一兩細辛半兩生乾地黃一兩戎鹽一分每用五錢以水煎三五沸熱潄冷吐以差為度地黃湯方治牙齒痛生乾地黃三兩獨活一兩㕮咀每用五錢以酒一盞浸一宿煎十餘沸熱潄冷吐以差為度栁枝湯方治齒痛連牙額疼栁枝槐枝黑豆各一合蜀椒炒去目半兩青鹽細辛羌活各一分除椒鹽外銼先以水六盞煎取二盞入椒鹽再煎一盞通口潄之不拘時候以差為度齒䘌論曰齒䘌如疳䘌蟲之證齒根先露壞爛膿血俱出口內氣息蓋緣臟腑壅滯熏發上焦攻衝齒牙又有嗜肥甘過多或宿食在齒根不能潄去致腐殠之氣淹漬而成者雄黃膏方治齒䘌蟲蝕牙齒雄黃别研半兩牛酥五兩黃蠟白蜜各一兩􅢠本三分丹砂别研一分藜蘆一分升麻川芎白芷杏仁去皮尖雙仁各半兩除别研藥并蜜蠟外餘細銼先於鐺中以酥煎所銼藥候杏仁赤黑色去渣下蜜蠟煎二十沸候膏成續下别研藥攪勿住手候凝成膏於瓷器盛每以少許塗齒病處或蟲孔中㸃之大驗薔薇根膏方治齒䘌薔薇根二兩地骨皮一兩葱根一根胡粉一兩白蠟一分前三味俱銼以水二大盞煎至半盞以重抄紙半張浸之暴乾更濕浸汁盡為度乾了以粉蠟塗之於上剪作條子夜卧貼之神效細辛散方治齒䘌齒根腐爛細辛二兩川升麻二兩地骨皮二兩角蒿二兩牛膝二兩生地黃五兩都燒為灰細研每夜臨卧傳齒根或以蠟紙上貼之至旦即去黃礬散方治疳䘌齒根宣露黃礬燒灰一分麝香研一錢乾蛤殼燒灰研一分防風去義獨活各一兩除别研外為散以暖漿水潄口後用藥貼齒根上有涎即吐出日再貼即差藜蘆散方治齒疳風䘌疼痛不止藜蘆蜀椒去目炒附子各一分麝香研一錢先以三味為散次下麝香和勻每用一錢綿裹置所患處有涎吐之蟲蝕牙齒論曰字書謂凡動皆風蟲以風化蓋手陽明脈入於齒其經虛損骨髓不榮風邪乘之攻入於齒毒氣與溼相摶而生蟲故云蟲蝕牙齒也其狀齒根有竅或作疼痛甚則搖動宣露浮腫作殠世俗亦呼為蚛牙玊池散方治蟲蝕牙齒蛀蚛風癢搖動疼痛及牙宣出血氣息浮腫等疾地骨皮白芷升麻防風細辛芎藭槐花當歸藁本甘草共十味等分搗羅為末散常用揩牙良久以溫水潄次用藥散二錢生薑三片黑豆三十粒同煎含冷吐附子丸方治久患牙疼及齒蚛附子一兩去皮臍生用蜀椒蓽撥黃蠟各一分四味搗羅三味為末鎔蠟和丸如梧桐子大每用綿裹一丸以患牙咬之如蚛安在蚛竅內比金散方治牙疼不止去風蚛神仙功效雄黃不拘多少一味研細隨左右疼處以剜耳子送入耳中立止治牙齒風蚛疼痛方烏頭去皮臍芎藭甘草地骨皮細辛髙良薑白芷等分共七味搗羅為散以指㸃藥揩於痛處出涎以溫水潄三五度即差腎虛齒風痛論曰腎主骨髓齒者骨之餘而髓之所養也足少陰經虛氣血不能榮養骨髓故因呼吸風冷或潄寒水冷則令齒痛而不已地黃丸方治腎臟虛食冷熱齒皆痛生地黃一兩白茯苓防風獨活枸把子山藥各半兩右六味搗羅為末錬蜜丸如梧桐子大每空心煎棗湯下十丸至十五丸雞腸草散方治腎虛齒痛揩牙烏髭鬢駐顔雞腸草白礬訶梨勒皮蘹香子旱蓮子晚蠶沙青鹽茜根皂莢各一兩麻籸半兩共十味除礬并青鹽蘹香蠶沙外各銼半寸用瓷瓶一枚開口入諸藥在內紙筋鹽泥固濟以炭火半稱煆盡火放冷取出研如粉早晨食後夜卧揩三兩上頃之潄口齒風腫痛論曰齒風腫痛者齒根虛浮牙齒疼痛或過呼吸風冷其痛愈甚則齗䐬腫赤乃至動搖此蓋手陽明經虛風客其脈流注齒間故為齒風腫痛之患也芎藭湯方治風齒疼腫及口殠芎藭當歸獨活細辛白芷各兩共五味搗為末每用五錢水煎熱含冷吐如此三五次易取差為度蓽撥散方治諸陽氣虛風攻牙齒疼痛不任寒熱嚼物隱痛蓽撥苦參防風升麻各三兩藁本一分共五味搗羅為散每三錢水煎熱潄冷吐皂莢湯方治諸風齒疼痛皂莢一挺去皮子炙令黃色露蜂房一枚劈碎鹽一分三味劈銼分為三貼每貼以漿水煎熱漱冷吐齒齗腫論曰足陽明之脈起於鼻交頞中旁約太陽之脈下循鼻外入上齒中手陽明之脈其支者從缺盆直入上頸貫頰下入齒縫中若其經虛風熱所襲傳流齒牙攻注齗肉則致腫癢甚者與齗間津液相搏化為膿汁或血宣而不已黃芩湯方治齒齗腫痛及蟲蝕黃芩甘草當歸細辛各一兩蛇床子桂心各一兩右六味共搗篩為粗末每用五錢酸漿水一盞煎十沸熱含冷吐地骨皮散方治骨䐬風牙齒宣露腫癢浮動疼痛作時或齗爛生瘡兼治大人小兒口瘡地骨皮麥蘗各一兩豬牙皂莢半兩青鹽一分右四味同搗碎入鍋炒搗羅為散每用先以鹽漿水嗽口摻擦風疳論曰風疳之病其候䐬齗虛腫牙齒動搖侵蝕齒根腐殠脫落下攻齗頰損爛膿血俱出者是也蓋緣手足陽明之經氣虛風邪熱毒在胃藴積日久上熏胸間攻發口齒故成斯疾升麻細辛散方治風疳癢痛侵蟲齗爛升麻細辛藁本防風芎藭凝水石研各一兩甘草炙半兩右七味搗研為散取少許貼齒癢處又取一錢綿裹含化咽津常令藥味相接為佳治風疳出血及牙齒浮動牢牙散方皂莢五挺燒存性小者用十挺附子一枚生乳香研半兩麝香研少許四味搗研為末如常揩齒良久潄之頻用為妙齒間出血論曰邪僭熱在上流傳於手陽明之脈注於齒間則令齒齗虛腫甚者齒間出血蓋血性得溫則宣流故也龍腦散方治牙齒疼痛齗間血出去口氣辟風冷龍腦研一分蔓荆實細辛升麻各一兩共四味搗羅三味為散入龍腦拌勻每用半錢揩齒良久以溫湯潄口胡粉散方治牙宣血出不止胡粉半兩麝香研半錢二味同研為散臨臥淨揩牙漱口且兼能牢牙齒齲論曰齒齲之病由風熱邪氣客於手足陽明二經其狀齗腫或腫膿出而殠久則侵蝕齒齗宣露一名風齲蜀椒湯方治牙齒風齲疼痛蜀椒去目并合口者芎藭細辛升麻莽草防風黃芩各一分右九味搗篩每用五錢水煎熱潄冷吐白礬散方治齲齒齗腫出膿汁白礬一分燒灰蟾酥半分乾蝦蟇麝香半分雄黃半分熊膽一分右六味搗羅為散每用半錢𫝊牙根牛膝散方治牙齒風齲疼痛解骨䐬風毒氣牛膝一兩燒為灰為末以少許著齒間含之又方取郁李根一握切水一盞煎至六分熱含之吐出蟲長六分黑頭蟲牙齒動搖論曰手陽明支脈入於齒足太陽之脈又遍於齒為骨之所終髓之所養若經脈虛風邪乘之血氣損少不能榮潤故令動搖也治齒風動搖捍齒牢牙方丹砂别研一兩青礬别研半兩白礬别研半兩馬牙硝别研半兩防風半兩細辛半兩黃蠟一兩麻油三兩松節二兩當歸半兩松脂二兩黃茋一兩臘月豬脂半斤右十三味除脂蠟油外並細銼先於鐺中煎脂濾去滓次下油煎三兩沸續下銼藥煎十餘沸以綿濾去滓再下蠟並别研藥慢火養成膏於瓷器盒盛每用少許塗𫝊患處即差防風湯方治齒根出露動搖疼痛防風一兩蔓荆子一兩細辛半兩川升麻半兩地骨皮半兩赤茯苓半兩芎藭一兩共七味都銼碎和勻每用半兩以酒水同煎熱含就於患處良久冷即吐含盡為度日二此一劑永差矣地黃丸方治齒動搖生地黃五斤粗者取汁山藥四兩枸把根三兩大者人參一兩白茯苓四兩右五味先煎生地黃汁搗諸藥末用好酒一斗别煎至三升入煎下地黃汁同再煎入白蜜一斤酥少許煎候可丸即成丸如小豆大每服酒下二十丸日三服加至五服咽喉門咽喉統論論曰咽門者胃氣之道路喉嚨者肺氣之往來一身之中氣之升降出入莫急乎是詳考經絡流注即咽喉所繫非特肺胃為然故孫思邈曰應五臟六腑往還神氣陰陽通塞之道也又人之氣血與天地相為流通咽喉尤為出納之要故內經曰喉主天氣咽主地氣若臟熱則咽門閉而氣塞甚則咽門破而聲嘶以至腫痛喉痺生瘡懸癰之屬與夫哽塞如有物妨悶疼癢多涎唾其證不一不可槩以實熱為治大率熱則通之寒則補之不熱不寒依經調之湯劑蕩滌之外復有針刺等法要皆急治時不可緩非若腑臟積久之病磨化調養之可比也一切咽喉病紫雪為要藥升麻湯方治喉中痛閉塞不通升麻木通各一兩射干絡石芍藥羚羊角鎊三分淡竹葉杏仁去皮尖雙仁炒各半兩共八味除竹葉外搗篩每服三錢水煎入竹葉七片煎至六分溫服日三喉痺論曰喉痺謂喉裏腫塞痺痛水漿不得入也治稍緩殺人由脾肺不利藴積熱毒外犯寒邪二經壅熱結於喉間痺而不通其狀身熱惡寒治法有先針而後藥者可謂之急先務矣射干丸方治喉痺腫塞射干一兩香豉一合杏仁去皮尖雙仁炒芎藭犀角各二兩升麻一兩甘草炙半兩右七味搗羅為末鍊蜜丸如小彈丸大每服一丸含化咽津日可三五服治咽喉閉塞不通方大黃末一分蝸牛二七條白礬末馬勃一分四味於五月五日午時用白梅肉蝸牛同研和丸如棟實大如患者開口不得即以水磨用竹管子吹下喉中立差如輕者以綿裹含化一丸透關散方治男子婦人喉痺口噤牙關緊雄黃研豬牙皂莢蜜炙去皮藜蘆各一分三味研為散每用一匙分彈入兩鼻中關透處即差逡巡不救方治急喉痺皂莢去皮子生半兩一味搗為末每服少許筯頭㸃腫處更以醋調藥末厚塗項下須㬰便破血出即愈馬喉痺論曰馬喉痺之狀勢如奔馬喉間痺痛腫連頰骨壯熱煩悶數數吐氣者是也此蓋脾肺不利熱毒攻衝發於咽喉所致生犀丸方治熱衝喉間連頰腫數出氣煩滿犀角枳實射干海藻洗去鹹升麻各一兩杏仁去皮尖雙仁研白附子百合一兩半胡黃連蒺藜子各三分右十味搗羅為末鍊蜜丸如彈子大每服一丸綿裹咽津不計時天門冬丸方治馬喉痺咽喉腫痛唇焦舌乾腮頰連腫天門冬𤣥參惡實炒各一兩百藥煎半兩人參一分紫蘇半兩甘草炙一兩半蓬砂研一分龍腦一分右九味搗研為細末錬蜜和丸如皂子大每服一丸食後臨臥熟水下治馬喉痺腫連頰吐氣方馬銜鐵一具以水三升煎至一升細細含咽龍腦散方治馬喉痺頰咽痛白龍腦細研牛黃細研犀角屑羚羊角屑𤣥參馬牙硝細研沉香甘草炙銼硃砂以上各一分蓬砂研一錢升麻半兩右十一味除龍腦牙硝搗篩為散每服三錢水一盞竹葉七片同煎去滓溫入龍腦馬牙硝一錢攪令勻細細含咽咽喉生癰論曰肺氣上通於喉嚨胃經外連於咽嗌其氣和平則呼吸咽納無所妨礙若脾肺壅熱熏發上焦攻於咽喉結聚腫痛不得消散熱氣熾盛致結成癰妨害吐納古方論一寸為癤二寸至五寸為癰其候使人寒戰咳吐稠濁善用針者辨其可刺宜速破之仍施以㸃餌之劑天門冬煎方治喉癰咽嗌不利生天門冬汁二升人參一兩生麥門冬汁一升生薑汁一升桂一兩半夏湯浸七遍暴乾一兩赤茯苓二兩生地黃汁一升牛黃研半兩甘草三分右十味除四味汁外餘六味為末先以天門冬麥門冬汁煎減半次入生薑汁又煎減半次又入地黃汁并餘六味末同煎汁欲盡即入白蜜一斤酥四兩同煎成以瓷盒盛不拘時以溫水調下一匙以差為度射千湯方治喉癰咽嗌腫塞及心肺熱極吐納不利射干半兩升麻大黃生用惡實生用各一兩木通馬藺子炒半兩右六味搗篩每服三錢竹葉七片水煎去滓下馬牙硝半錢攪令勻不拘時候細細溫服尸咽喉論曰道家服藥務先去三蟲者以其為人害也尸咽之病亦本如此巢氏謂腹中尸蟲上蝕咽喉能令生瘡或或癢或痛如􅉶候者是也善攝生者儻未能除去亦當服藥治之勿使妄動則善矣黃檗湯方治尸咽喉閉塞出瘡及乾嘔頭痛食不下黃檗炙半兩升麻木通各一兩竹茹三分麥門冬一兩半𤣥參一兩前胡大青各三分共八味搗篩每服三錢水煎去滓入芒硝末一錢攪勻溫服如鼻中有瘡以生地黃汁少許滴入鼻中日三五服不計時候若通利加芒硝不欲利去之一捻金方治尸咽及走馬喉痺或腦內生癰雄黃研藜蘆猪牙皂角去皮子各一分三味搗研為散先含水一口用藥一米許搐鼻內即吐去水少時立效咽喉中如有物妨悶論曰喉者胃之系故咽主咽物天氣通於肺故主通氣咽喉如有物妨悶者乃肺胃壅滯風熱客摶結於咽喉使然故聖惠謂憂愁思慮氣逆痰結皆生是疾也射干湯方治咽喉中如有物噎塞不下射干升麻紫苑百合各半兩木通一兩赤茯苓桔梗各三分右七味每服三錢水煎食後溫服如要通利每服加朴硝末一錢同煎服半夏木通湯方治咽喉如有物噎塞飲食妨悶半夏湯洗七遍木通乾薑各半兩芍藥桑根白皮共五味每服三錢入鹽少許煎溫服又一方搗羅為末錬蜜丸如梧桐子大每服十五丸食後生薑湯下加至二十丸四物湯方治咽喉中如有物咽吐不利半夏薑汁浸一宿焙厚朴薑汁炙陳橘皮浸去白各一兩赤茯苓二兩共四味每服二錢入生薑三片同煎食後溫服厚朴湯方治咽喉中如有物厚朴薑汁炙炒赤茯苓各一兩半夏洗七遍切焙一兩半紫蘇葉一兩共四味每服三錢入生薑三片同煎食後溫服石蓮湯方治咽喉如有物噎塞飲食不下石蓮人參杵頭糠各一分共三味每服三錢水煎溫服日二杵糠丸方治咽喉中如有炙臠食即噎塞碓杵頭細糠二合一味為末鍊蜜和丸如彈子丸每空腹含化一丸微微咽津下杏仁煎方治肺胃壅滯咽喉中如有物妨悶杏仁湯浸去皮尖雙仁炒桑根白皮貝母各一兩半生薑汁二合地黃汁二合半酥半兩大棗六十枚去核紫苑二分甘草炙桔梗炒五味子赤茯苓去黑皮地骨皮各一兩人參三分共十四味研杏仁以水五升濾取汁將草藥細銼同煎至二升以綿濾去滓續下酥及地黃汁漫火煎成膏每食後含一匙細細咽津骨鯁論曰用藥之法有不取於氣味特以意為用者若魚網虎骨之治骨鯁是也然網能制魚乃魚之所畏虎能伏獸乃獸之所畏其所制伏既不同則用之不異矣治咽喉諸鯁軟骨散方赤茯苓陳橘皮浸去白各半兩甘草炙縮砂仁各一分共四味為散每用二錢先摻口中次用新水一盞咽下馬渤散方治骨鯁在喉中不出馬渤白礬灰惡實陳橘皮浸去白各半兩共四味研為末漿水和丸如櫻桃大含化咽津橘皮丸方治骨鯁在喉中不出陳橘皮去白半兩烏賊魚骨去甲沙糖各一分右三味搗羅為末鍊蜜和丸如皂子大綿裹含咽栗皮丸方治諸骨鯁在喉中不出栗子肉上皮半兩為末乳香鮎魚各一分三味同研為丸如梧桐子大看骨逺近綿裹一丸水潤外留綿線吞之即釣出飴糖丸方治諸魚骨鯁在喉中飴糖不拘多少一味為丸如雞子大吞之又漸作大丸子再吞即效魚網散方治諸魚骨鯁在喉中捕魚網一片一味燒灰研細每服一錢新水調下又以魚網覆鯁人頭上即下鸕鷀散方治諸魚骨鯁在喉中鸕鷀毛翅十片一味燒灰細研每服一錢濃汁橘皮湯調下或以綿裹含咽即下薤白嚼方治諸魚骨鯁在喉中薤白一味嚼令揉取粗線繫之持線一端吞薤到鯁處引之即出揉筋引方治諸魚骨鯁在喉中鹿筋不拘多少一味漬之令軟索如彈丸持一端吞之至軟處徐徐引出虎骨散方治諸獸骨鯁虎骨一味研細每服一錢水調下狸骨亦得血餘散方治食中髮鯁不下繞喉亂髮一團燒灰一味研為細散每服一錢粥飲調下豬膏吞方治諸鯁豬膏一味吞如杏核大未差再吞螻蛄散方治諸鯁并刺不出螻蛄頭一枚一味為散以綿裹咽津勿令鯁人知若刺不出者塗刺瘡上即出治諸鯁方右方用木炭皮為末研令極細如無炭皮但堅炭亦可粥飲調下二錢四五服以鯁下為度誤吞諸物論曰誤吞諸物若金銀錢鉤之類雖非病之自內然無術以出之久則害人若舊梳治髮磁石出針皆意為之治不特取其性味治藥之工可謂用心精微者矣治誤吞針及箭鏃等方肥豬脂肉不拘多少一味煮令熟軟恣意飽食即下治誤吞針方磁石一彈大一味口含之即出癭瘤門五癭論曰石癭泥癭勞癭憂癭氣癭是為五癭石與泥則因山水飲食而得之憂勞氣則本於七情之所感氣則隨之或上而不下或結而不散是也治癭瘤海藻散方海藻一兩昆布一兩半海蛤木通白茯芩三兩桂心羊靨十枚去脂炙黃右七味搗研為散非時溫酒下三錢夜再服茯芩丸方治氣結喉中蓄聚不散成癭白茯苓三兩半夏湯洗去滑生薑二兩昆布海藻各五兩桂心陳橘皮各一兩右七味為末鍊蜜丸如杏仁大常含化一粒細細咽津令藥氣不絶諸瘤論曰瘤之為義留滯而不去也氣血流行不失其常則形體和平無或餘贅及鬱結壅塞則乘虛投隙瘤所以生初為小核寢以長大若杯盂不癢不痛亦不結强方劑所治以治癭法同但癭有可針割而瘤慎不破爾消腫散方治骨瘤石瘤肉瘤膿瘤血瘤大如杯盂升斗者三三十年不差致有膿潰令人骨消肉盡或堅或軟或潰令人驚惕寤寐不安體中掣縮烏賊魚骨去甲硫黃各一分白石英紫石英鍾乳各半兩乾薑大黃炒附子去皮臍胡燕屎琥珀各一兩丹參三分共十一味為散貯以韋囊勿令氣泄若瘡濕即傳之若瘡乾無汁者以猪膏和傅日三四易之以乾為度若汁不盡者至五劑十劑止著藥令人不疼痛若不消加芒硝二兩神效散方治項氣瘤結附贅日漸增長豬羊靨各三十枚旋入猪膽內蘸過令乾陳橘皮去白一兩三味為散每服二錢空心米飲調下初結不過數服覺消不用久服瘰􅐇門瘰􅐇桔核論曰瘰􅐇桔核者由風熱毒氣藴積肝經攻注筋脈毒氣鬱而不散故項腋之間瘰􅐇結聚成核或如梅棗核狀纍纍相連其證令人乍寒乍熱頭項强痛心神煩躁蓋毒氣與氣相搏則榮衛不和使之然也沉香湯方治瘰􅐇毒腫沉香丁香木香麝香研各一分連翹黃芩各半兩犀角一兩半升麻一兩每服五錢水煎溫服空心日午夜卧各一服凝氷散方治風熱毒氣項下結核及欲作癰疽瘡癤發背等疾菉豆粉乳香研各一兩二味合研為散實人分作四服虛人分作八服食後米飲調下就有核處一邊卧盡劑必差大消腫痛內消方治瘰癧腫結蝸牛殼不拘多少一味搗為細散每服二錢空心米飲調下日再至四十九日自消消毒塗方治風熱結鞕腫赤疼痛及腮頷下忽結成核大黃二兩景天即慎火草二味同研爛塗於患處日再傅平肌散方黃狗骨頭燒灰鯪鯉甲燒灰各一錢亂髮一團紙燒灰三味研勻如瘡口已乾用白津唾調溼傅之日三四次瘡即平愈治瘰癧在項上結成顆塊及觸處但有結凝似作瘻癰急灸法獨頭蒜一斤一味截兩頭去心作艾炷火與蒜稱貼癧子灸之勿令破肉但取氣而已覺熱勿畏每七壯易蒜可至七易取消治五種瘰􅐇牡蠣散方牡蠣煆研連翹瓦上炒各一兩二味為細散每服一錢臨卧無灰酒調下差後更服一兩永不發瘰􅐇寒熱論曰甲乙經論瘰􅐇寒熱皆鼠瘻寒熱之毒氣留於脈而不去上攻於項腋之間風熱毒氣與血相搏則榮衛不和故瘰􅐇而發寒熱也連翹丸方治瘰􅐇寒熱結核在項腋之下堅痛連翹𤣥參木香升麻各一兩半大黃蒸半兩大麻子别研微炒昆布各二兩枳殼麩炒一兩半共八味搗羅為末鍊蜜丸如梧桐子大每服十五丸食前米飲下加至二十丸木香消毒湯方治瘰􅐇連連大小寒熱煩悶木香大黃生用各半兩竹葉乾者一分連翹一兩獨活半兩梔子仁一分共六味每服三錢水酒童子小便共一盞同煎溫服瘰􅐇久不差論曰風熱毒氣藴積腑臟攻於筋膜則結為瘰癧其毒氣所感深者則衝發肌肉令久不差此疾尤忌憂思恚怒氣血勞傷飲食寒冷漏蘆湯方治瘰􅐇久不差將欲破者漏蘆半兩洗焙海藻半兩連翹一兩沉香半兩山梔子仁一分𤣥參丹砂各三分右七味搗篩每服三錢水煎溫服烏雞丸方治瘰􅐇久不差鳥雞卵一枚錦貝子二味將錦貝子入在雞卵內用濕紙裹頭七重再用泥固濟火煆過後入地坑內出火毒一宿取出研細入大黃末半兩麝香一錢同研細鍊蜜丸如菉豆大空心蜜水下五十丸不過五服效連翹湯方治瘰􅐇不差敗肉生膿連翹犀角各一兩𤣥參木通黃蓍漏蘆杏仁去皮尖雙仁炒黃各一兩半共七味搗篩每服五錢水煎食後溫服日三聖濟總録纂要卷十九
