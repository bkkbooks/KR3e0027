body:
  text: 聖濟總録纂要卷十九休寧程林纂口齒門口齒總論論曰足太隂脾之經其氣通於口足陽明胃之經手陽明大腸之經其脈並夾於口故其腑臟風邪溼熱發於經則於是有口吻之疾牙齒者骨之所終髓之所養也又手陽明之支脈入於齒故骨髓之氣不足與夫陽明之脈虚不能有所滋養於是有牙齒之疾牙齒之疾其候甚多治􅓼之法固不得畧也養生方云雞鳴時叩齒三十六下食畢令啄齒皆宜長行之令齒不蠧去蟲又早朝未起潄口中玊泉令滿口嚥之啄齒二七遍去蟲牢齒千金又曰每旦以鹽一捻内口中以煖水揩潄及叩齒百徧為之不絶不過五日即牢密若此之類皆簡易可行行之有效不可忽也口瘡論曰口瘡者由心脾有熱氣衝上焦熏發口舌故作瘡也又有胄氣弱榖氣少虚陽上發而為口瘡者不可執一而論當求所受之本也當歸膏方治口爛生瘡水漿不下當歸一兩射干升麻附子各半兩白蜜四合猪脂五兩除蜜外并剉先煎脂化去滓入諸藥慢火煎候附子色黄又去滓入蜜更煎如膏以瓷器盛毎服如杏核大含之日三五度嚥津不妨黄連膏方治口瘡并咽喉塞黄連三兩猪脂一斤白蜜四兩羊髓研二兩以慢火煎猪脂取油去渣入黄連又煎令黑色下羊髓髓化以綿濾去滓入蜜更煎成膏瓷盒盛每含一棗大日三五度嚥滓不妨燒肝散方治口瘡久不差茵陳蒿犀角屑石斛白术柴胡各半兩芍藥吳茱茰湯浸三徧紫參桔梗防風桂心人參白蕪荑各一分每服五錢以白羊肝五兩切去筋膜入葱白一莖細擘相和濕紙三五重裹慢火煨熟空腹頓服米湯下巴㦸散方治元臟虚冷上攻口瘡巴㦸天一兩白芷半兩髙良薑為末一錢為細散用猪腰子二隻去筋膜毎一隻入藥散一錢用紙溼裹煨熟乘熱去紙以口吸熱氣有涎即吐候冷細嚼服之生薑煎方治口瘡疼痛生薑取汁一盞白沙蜜三兩用煎十沸用瓷器盛時時以熱水調一匙含嚥之栁花散方治口瘡黄檗一兩澱花半兩為散臨卧乾摻誤嚥亦不妨升麻含汁方治口瘡升麻不拘多少一味含一里嚥津升麻飲方治口内生瘡齒齗肉爛升麻黄連羚羊角𤣥參麥門冬黄芩葛根甘菊花防風羌活大黄各半兩人參三分甘草炙知母各一分毎服三錢水煎食後温服𤣥參湯方治心肺壅熱口内生瘡胸膈痰逆𤣥參茅根羌活竹茹木通羚羊角升麻各半兩黄連苦竹葉人參半夏浸去滑各三分甘草炙一分每服三錢入生薑三片同煎温服食後再服𤣥參丸方治口瘡𤣥參天門冬麥門冬各一兩為末錬蜜和丸如彈子大每用一錢丸綿裹含花嚥津口糜論曰膀胱移熱於小腸隔腸不便上為口糜夫小腸之脈絡心循咽下膈抵胃陰陽和平水榖入胄小腸受之通調水道下輸膀胱今熱氣厥逆膀胱移熱於小腸胃之水榖不得傳輸於下則令腸膈塞而不便上則令口生瘡而糜爛也大抵心胃壅熱則必熏蒸於上不可槩以𫝊藥當求其本以治之大青丸方治口糜生瘡久不差及心脾中熱乍發乍退大青去根甘草炙枳殻麩炒苦參各三分生乾地黄焙升麻各一兩黄連半兩共為末鍊蜜丸如梧桐子大每服二十丸食後熟水下日二服升麻丸方治口糜生瘡升麻黄連黄檗炙杏仁各一兩去皮尖將上三味為末次研杏仁如膏鍊蜜三兩以藥末并杏仁和為丸如彈子大每服一丸含化嚥津口吻瘡論曰口吻瘡者其瘡發於脣吻之間疼痛微腫溼爛有汁世名燕口又名肥瘡此由脾胃有熱隨氣熏蒸因上攻於口脣與津液相搏所致芎藭丸方治口吻瘡芎藭二兩白芷陳橘皮去白黄連各半兩為末鍊蜜和丸如梧桐子大每服二十丸甘草湯下不拘時候麝香散方治口吻生瘡乆不差人中白研麝香研各一錢再研匀塗瘡上葵根散方治口吻瘡取秋葵根一握燒作灰研為散𫝊之口舌生瘡論曰口舌生瘡者心脾經藴熱所致也葢口屬脾舌屬心心者火脾者土心火積熱𫝊之脾土二臟俱蓄熱毒不得發散攻衝上故令口舌之間生瘡腫痛烏犀湯方治口舌生瘡犀角屑三分羚羊角屑三分丹砂三分黄茋半兩大黄一分升麻半兩生乾地黄一兩射干一分天門冬生者去心一兩𤣥參三分甘草炙一兩每服三錢水煎食後温服防風散方治口舌生瘡防風一兩龍膽一兩生地黄二兩沉香半兩升麻半兩每用二錢入鹽少許沸湯調匀揩齒含嚥便睡茯神丸方治積年口舌瘡諸方不瘥茯神一兩白术一兩旋復花半兩縮砂蔤三分去皮大黄煨半兩芍藥半兩桂心三分郁李仁一兩大麻仁别研二兩人參半兩枳殻炒三分訶梨勒一兩厚朴薑汁炙一兩白檳榔三分白鮮皮半兩陳橘皮去白一兩地骨白皮半兩為末鍊蜜和丸如梧桐子大每服二十丸空心粥飲下加至三十丸口殠論曰口殠者脾之候心脾或熱藴積於胃變為腐臊之氣停聚不散隨氣上出熏發于口故令殠也升麻散方治口殠生肌長齗升麻二兩防風一兩當歸白芷各半兩川芎藁本各三分麝香一分甘草炙半兩木香細辛各一分每用一錢𫝊齒根下甚者綿裹含化嚥津七香丸方治口及身殠白豆䓻仁丁香藿香零陵香青木香白芷桂心各一兩香附子二兩甘松香當歸各半兩檳榔二枚沉香一兩為末鍊蜜和丸常含一丸大豆大咽汁日三夜一亦可常含咽汁五日口香十日體香二七日夜被香三七日下風人聞香四七日洗手水落地香五七日把他人手亦香慎五辛下氣去殠芎藭散方治心虚寒口殠蟲蝕齒痛芎藭白芷各一兩甘草炙三分桂心去麄皮杜蘅各半兩當歸切三分為散食前煖酒調下一錢日二服三十日體皆香即差草豆䓻丸方治心脾藴熱隨氣上熏發為殠草豆蔻仁丁香各一兩麝香一分藿香葉零陵香桂心莎草根去毛木香白芷當歸檳榔各半兩為末鍊蜜和丸如雞頭大每含化一丸嚥津液日三丸脣瘡論曰脣瘡者以脾胃有熱熱氣循經而外發於脣故生瘡也葢足陽明之脈下循鼻外入上齒縫中還出挾口環脈内經謂脾之合肉也其榮脣也是故脾胄之經與脣相應熱氣乘經而衝發所以脣為之生瘡硫黄膏方治脣瘡及𦂳瘡久不差硫黄研白礬枯研丹砂研水銀麝香研黄檗各一分為末同研候水銀星盡用臘月豬脂和如泥先拭令淨後以膏塗之日三五上即差五倍子散方治口脣生瘡五倍子去心中虫槐花擇等分為細散每用蜜𫝊脣上如瘡口乾以葱汁調上治瀋脣瘡方鯉魚血一味取血磨墨相和塗之差脣生核論曰脣生核之候大槩與脣瘡𦂳脣相類然其腫至於生核者葢足陽明與太陰為表裏臓腑俱有風熱風熱之氣衝發二經與血氣相摶而為脣腫外復為風冷所乘血氣凝結聚而不散故生核也防風湯方治脾胃藴積熱氣復為風冷所摶脣邊生核結硬疼痛防風去乂半兩菊花一兩升麻半兩獨活半兩黄芩半兩知貝半兩𤣥參半兩生乾地黄半兩藁本半兩大黄炒半兩梔子半兩前胡半兩桔梗半兩甘草炙麥門冬各半兩毎服用三錢水煎食後温服日三黄連散方治脾胃積熱風冷乘之脣結核黄連去鬚升麻龍膽各一兩為散綿裹如彈子大臨卧新汲水浸過含化嚥津治脣生核腫痛如彈方牛膝燒灰存性研先以鍼刺出惡血次用藥少許以新汲水調塗核上治脣黑腫生核痛痒不可忍方古銅錢青者四文放石上以臘月豬脂磨取汁塗之重舌論曰重舌者以心脾二經藴伏熱氣循緣經絡上衝舌木遂令舌下血脈脹起如小舌狀故謂之重舌葢心開竅於舌足太陰之脈屬脾絡胃上膈挾咽連舌本散舌下故也紫雪服之甚効牛黄散方治重舌牛黄研人參各半兩白茯芩三分大黄炒半兩當歸一分甘草炙半兩丹砂研半兩為散每服半錢温水調下甚者加至一錢食後服舌腫强論曰心氣通於舌脾脈挾咽連舌本散舌下心脾二經受風邪則舌本强不能卷舒久或熱氣加之則腫腫則脈筋脹急勢連咽喉礙於呼吸法宜刺之洩去惡血及餌以藥白茯苓湯方治舌腫强白茯芩牛黄研各三分犀角屑一分甘草炙人參羚羊角屑熟乾地黄白术桂各半兩每服三錢水煎温服日三百草霜方治舌忽𦂳硬逡巡能塞煞人者百草霜好鹽各半兩同研匀表裏塗之立效䗪蟲散方治舌腫滿口言語不得䗪蟲五十枚鹽半兩細研為末每服以水煎熱含冷吐以差為度螵蛸散方治木舌腫强桑螵蛸十二月者炙黄每服半錢萊菔汁調下蚯蚓塗方治舌腫滿塞喉欲死蚯蚓一條以少許鹽花化為水塗咽喉舌上良久漸消牙齒厯蠧論曰牙齒厯蠧者腎虚弱也骨髓不固氣血衰耗不能滎潤於牙齒故令人牙齒黯黑謂之厯蠧麝香散方治齒厯蠧麝香一匙定粉一錢黄蠟半兩細研前二味鎔蠟調之攤在紙上每臨卧時剪作片子貼所患齒上升麻散方治牙齒厯蠧齒根黯黑升麻槐枝灰各半兩白附子蜜陀僧煆露蜂房各一分為散入地黄汁一合和匀陰乾每用揩齒牙齒疼痛論曰牙齒疼痛有二手陽明脈虚風冷乘之而痛者謂之風痛蟲居齒根蝕侵不已傳受餘齒而痛者謂之蟲痛二者不同古方有塗𫝊潄渫之藥治去風蟲用之各有法也細辛散方治牙齒疼痛頭面浮腫喫冷熱物不得細辛芎藭藁本獨活各一兩地骨皮半兩蒺藜子三分為散綿裹如江豆大含化嚥津每日三五度易之去膈間風熱若患頭風鼻塞先以油塗頂心以手摩一二百遍次用散一錢又摩頂心依前法地骨皮湯方治牙齒疼痛吃物不得地骨皮一兩細辛半兩生乾地黄一兩戎鹽一分每用五錢以水煎三五沸熱潄冷吐以差為度地黄湯方治牙齒痛生乾地黄三兩獨活一兩㕮咀每用五錢以酒一盞浸一宿煎十餘沸熱潄冷吐以差為度栁枝湯方治齒痛連牙額疼栁枝槐枝黒豆各一合蜀椒炒去目半兩青鹽細辛羌活各一分除椒鹽外剉先以水六盞煎取二盞入椒鹽再煎一盞通口潄之不拘時候以差為度齒䘌論曰齒䘌如疳䘌蟲之證齒根先露壞爛膿血俱出口内氣息葢緣臓腑壅滯熏發上焦攻衝齒牙又有嗜肥甘過多或宿食在齒根不能潄去致腐殠之氣淹漬而成者雄黄膏方治齒䘌蟲蝕牙齒雄黄别研半兩牛酥五兩黄蠟白蜜各一兩􅢠本三分丹砂别研一分藜蘆一分升麻川芎白芷杏仁去皮尖雙仁各半兩除别研藥并蜜蠟外餘細剉先於鐺中以酥煎所剉藥候杏仁赤黑色去渣下蜜蠟煎二十沸候膏成續下别研藥攪勿住手候凝成膏於瓷器盛每以少許塗齒病處或蟲孔中㸃之大騐薔薇根膏方治齒䘌薔薇根二兩地骨皮一兩葱根一根胡粉一兩白蠟一分前三味俱剉以水二大盞煎至半盞以重抄紙半張浸之暴乾更濕浸汁盡為度乾了以粉蠟塗之於上剪作條子夜卧貼之神效細辛散方治齒䘌齒根腐爛細辛二兩川升麻二兩地骨皮二兩角蒿二兩牛膝二兩生地黄五兩都燒為灰細研每夜臨卧傳齒根或以蠟紙上貼之至旦即去黄礬散方治疳䘌齒根宣露黄礬燒灰一分麝香研一錢乾蛤殻燒灰研一分防風去义獨活各一兩除别研外為散以煖漿水潄口後用藥貼齒根上有涎即吐出日再貼即差藜蘆散方治齒疳風䘌疼痛不止藜蘆蜀椒去目炒附子各一分麝香研一錢先以三味為散次下麝香和匀每用一錢綿裹置所患處有涎吐之蟲蝕牙齒論曰字書謂凡動皆風蟲以風化葢手陽明脈入於齒其經虚損骨髓不榮風邪乘之攻入於齒毒氣與溼相摶而生蟲故云蟲蝕牙齒也其狀齒根有竅或作疼痛甚則搖動宣露浮腫作殠世俗亦呼為蚛牙玊池散方治蟲蝕牙齒蛀蚛風痒搖動疼痛及牙宣出血氣息浮腫等疾地骨皮白芷升麻防風細辛芎藭槐花當歸藁本甘草共十味等分搗羅為末散常用揩牙良久以温水潄次用藥散二錢生薑三片黑豆三十粒同煎含冷吐附子丸方治久患牙疼及齒蚛附子一兩去皮臍生用蜀椒蓽撥黄蠟各一分四味搗羅三味為末鎔蠟和丸如梧桐子大每用綿裹一丸以患牙咬之如蚛安在蚛竅内比金散方治牙疼不止去風蚛神仙功效雄黄不拘多少一味研細隨左右疼處以剜耳子送入耳中立止治牙齒風蚛疼痛方烏頭去皮臍芎藭甘草地骨皮細辛髙良薑白芷等分共七味搗羅為散以指㸃藥揩於痛處出涎以温水潄三五度即差腎虚齒風痛論曰腎主骨髓齒者骨之餘而髓之所養也足少陰經虚氣血不能榮養骨髓故因呼吸風冷或潄寒水冷則令齒痛而不已地黄丸方治腎臟虚食冷熱齒皆痛生地黄一兩白茯苓防風獨活枸把子山藥各半兩右六味搗羅為末錬蜜丸如梧桐子大每空心煎棗湯下十丸至十五丸鷄腸草散方治腎虚齒痛揩牙烏髭鬢駐顔鷄腸草白礬訶梨勒皮蘹香子旱蓮子晩蠶沙青鹽茜根皂莢各一兩麻籸半兩共十味除礬并青鹽蘹香蠶沙外各剉半寸用甆瓶一枚開口入諸藥在内紙筋鹽泥固濟以炭火半秤煆盡火放冷取出研如粉早晨食後夜卧揩三兩上頃之潄口齒風腫痛論曰齒風腫痛者齒根虚浮牙齒疼痛或過呼吸風冷其痛愈甚則齗䐬腫赤乃至動搖此葢手陽明經虚風客其脈流注齒間故為齒風腫痛之患也芎藭湯方治風齒疼腫及口殠芎藭當歸獨活細辛白芷各兩共五味搗為末毎用五錢水煎熱含冷吐如此三五次易取差為度蓽撥散方治諸陽氣虚風攻牙齒疼痛不任寒熱嚼物隱痛蓽撥苦參防風升麻各三兩藁本一分共五味搗羅為散毎三錢水煎熱潄冷吐皂莢湯方治諸風齒疼痛皂莢一挺去皮子炙令黄色露蜂房一枚劈碎鹽一分三味劈剉分為三貼每貼以漿水煎熱漱冷吐齒齗腫論曰足陽明之脈起於鼻交頞中旁約太陽之脈下循鼻外入上齒中手陽明之脈其支者從缺盆直入上頸貫頰下入齒縫中若其經虚風熱所襲傳流齒牙攻注齗肉則致腫痒甚者與齗間津液相搏化為膿汁或血宣而不已黄芩湯方治齒齗腫痛及蟲蝕黄芩甘草當歸細辛各一兩蛇床子桂心各一兩右六味共搗篩為粗末每用五錢酸漿水一盞煎十沸熱含冷吐地骨皮散方治骨䐬風牙齒宣露腫痒浮動疼痛作時或齗爛生瘡兼治大人小兒口瘡地骨皮麥蘗各一兩豬牙皂莢半兩青鹽一分右四味同搗碎入鍋炒搗羅為散每用先以鹽漿水𠻳口摻擦風疳論曰風疳之病其候䐬齗虚腫牙齒動摇侵蝕齒根腐殠脫落下攻齗頰損爛膿血俱出者是也葢緣手足陽明之經氣虚風邪熱毒在胃藴積日久上熏胸間攻發口齒故成斯疾升麻細辛散方治風疳痒痛侵蟲齗爛升麻細辛藁本防風芎藭凝水石研各一兩甘草炙半兩右七味搗研為散取少許貼齒痒處又取一錢綿裹含化嚥津常令藥味相接為佳治風疳出血及牙齒浮動牢牙散方皂莢五挺燒存性小者用十挺附子一枚生乳香研半兩麝香研少許四味搗研為末如常揩齒良乆潄之頻用為妙齒間出血論曰邪僭熱在上流傳於手陽明之脈注於齒間則令齒齗虚腫甚者齒間出血葢血性得温則宣流故也龍腦散方治牙齒疼痛齗間血出去口氣辟風冷龍腦研一分蔓荆實細辛升麻各一兩共四味搗羅三味為散入龍腦拌匀每用半錢揩齒良久以温湯潄口胡粉散方治牙宣血出不止胡粉半兩麝香研半錢二味同研為散臨臥淨揩牙漱口且兼能牢牙齒齲論曰齒齲之病由風熱邪氣客於手足陽明二經其狀齗腫或腫膿出而殠久則侵蝕齒齗宣露一名風齲蜀椒湯方治牙齒風齲疼痛蜀椒去目并合口者芎藭細辛升麻莽草防風黄芩各一分右九味搗篩每用五錢水煎熱潄冷吐白礬散方治齲齒齗腫出膿汁白礬一分燒灰蟾酥半分乾蝦蟇麝香半分雄黄半分熊膽一分右六味搗羅為散每用半錢𫝊牙根牛膝散方治牙齒風齲疼痛解骨䐬風毒氣牛膝一兩燒為灰為末以少許著齒間含之又方取郁李根一握切水一盞煎至六分熱含之吐出蟲長六分黑頭蟲牙齒動搖論曰手陽明支脈入於齒足太陽之脈又徧於齒為骨之所終髓之所養若經脈虚風邪乘之血氣損少不能榮潤故令動摇也治齒風動摇捍齒牢牙方丹砂别研一兩青礬别研半兩白礬别研半兩馬牙硝别研半兩防風半兩細辛半兩黄蠟一兩麻油三兩松節二兩當歸半兩松脂二兩黄茋一兩臘月豬脂半斤右十三味除脂蠟油外並細剉先於鐺中煎脂濾去滓次下油煎三兩沸續下剉藥煎十餘沸以綿濾去滓再下蠟並别研藥慢火養成膏於瓷器盒盛每用少許塗𫝊患處即差防風湯方治齒根出露動摇疼痛防風一兩蔓荆子一兩細辛半兩川升麻半兩地骨皮半兩赤茯苓半兩芎藭一兩共七味都剉碎和匀每用半兩以酒水同煎熱含就於患處良久冷即吐含盡為度日二此一劑永差矣地黄丸方治齒動摇生地黄五斤粗者取汁山藥四兩枸把根三兩大者人參一兩白茯苓四兩右五味先煎生地黄汁搗諸藥末用好酒一斗别煎至三升入煎下地黄汁同再煎入白蜜一斤酥少許煎候可丸即成丸如小豆大毎服酒下二十丸日三服加至五服咽喉門咽喉統論論曰咽門者胃氣之道路喉嚨者肺氣之往來一身之中氣之升降出入莫急乎是詳攷經絡流注即咽喉所繋非特肺胃為然故孫思邈曰應五臟六腑往還神氣陰陽通塞之道也又人之氣血與天地相為流通咽喉尤為出納之要故内經曰喉主天氣咽主地氣若臟熱則咽門閉而氣塞甚則咽門破而聲嘶以至腫痛喉痺生瘡懸癰之屬與夫哽塞如有物妨悶疼痒多涎唾其證不一不可槩以實熱為治大率熱則通之寒則補之不熱不寒依經調之湯劑蕩滌之外復有鍼刺等法要皆急治時不可緩非若腑臟積久之病磨化調養之可比也一切咽喉病紫雪為要藥升麻湯方治喉中痛閉塞不通升麻木通各一兩射干絡石芍藥羚羊角鎊三分淡竹葉杏仁去皮尖雙仁炒各半兩共八味除竹葉外搗篩每服三錢水煎入竹葉七片煎至六分温服日三喉痺論曰喉痺謂喉裏腫塞痺痛水漿不得入也治稍緩殺人由脾肺不利藴積熱毒外犯寒邪二經壅熱結於喉間痺而不通其狀身熱惡寒治法有先鍼而後藥者可謂之急先務矣射干丸方治喉痺腫塞射干一兩香豉一合杏仁去皮尖雙仁炒芎藭犀角各二兩升麻一兩甘草炙半兩右七味搗羅為末鍊蜜丸如小彈丸大每服一丸含化嚥津日可三五服治咽喉閉塞不通方大黄末一分蝸牛二七条白礬末馬勃一分四味於五月五日午時用白梅肉蝸牛同研和丸如棟實大如患者開口不得即以水磨用竹管子吹下喉中立差如輕者以綿裹含化一丸透闗散方治男子婦人喉痺口噤牙闗𦂳雄黄研豬牙皂莢蜜炙去皮藜蘆各一分三味研為散每用一匙分彈入兩鼻中闗透處即差逡巡不救方治急喉痺皂莢去皮子生半兩一味擣為末每服少許筯頭㸃腫處更以醋調藥末厚塗項下須㬰便破血出即愈馬喉痺論曰馬喉痺之狀勢如奔馬喉間痺痛腫連頰骨壯熱煩悶數數吐氣者是也此葢脾肺不利熱毒攻衝發於咽喉所致生犀丸方治熱衝喉間連頰腫數出氣煩滿犀角枳實射干海藻洗去鹹升麻各一兩杏仁去皮尖雙仁研白附子百合一兩半胡黄連蒺藜子各三分右十味搗羅為末鍊蜜丸如彈子大毎服一丸綿裹嚥津不計時天門冬丸方治馬喉痺咽喉腫痛唇焦舌乾顋頰連腫天門冬𤣥參惡實炒各一兩百藥煎半兩人參一分紫蘇半兩甘草炙一兩半蓬砂研一分龍腦一分右九味搗研為細末錬蜜和丸如皂子大每服一丸食後臨臥熟水下治馬喉痺腫連頰吐氣方馬㘅鐵一具以水三升煎至一升細細含嚥龍腦散方治馬喉痺頰咽痛白龍腦細研牛黄細研犀角屑羚羊角屑𤣥參馬牙硝細研沉香甘草炙剉硃砂以上各一分蓬砂研一錢升麻半兩右十一味除龍腦牙硝搗篩為散每服三錢水一盞竹葉七片同煎去滓温入龍腦馬牙硝一錢攪令匀細細含嚥咽喉生癰論曰肺氣上通於喉嚨胃經外連於咽嗌其氣和平則呼吸嚥納無所妨礙若脾肺壅熱熏發上焦攻於咽喉結聚腫痛不得消散熱氣熾盛致結成癰妨害吐納古方論一寸為癤二寸至五寸為癰其候使人寒戰欬吐稠濁善用鍼者辨其可刺宜速破之仍施以㸃餌之劑天門冬煎方治喉癰咽嗌不利生天門冬汁二升人參一兩生麥門冬汁一升生薑汁一升桂一兩半夏湯浸七遍暴乾一兩赤茯苓二兩生地黄汁一升牛黄研半兩甘草三分右十味除四味汁外餘六味為末先以天門冬麥門冬汁煎減半次入生薑汁又煎減半次又入地黄汁并餘六味末同煎汁欲盡即入白蜜一斤酥四兩同煎成以瓷盒盛不拘時以温水調下一匙以差為度射千湯方治喉癰咽嗌腫塞及心肺熱極吐納不利射干半兩升麻大黄生用惡實生用各一兩木通馬藺子炒半兩右六味搗篩毎服三錢竹葉七片水煎去滓下馬牙硝半錢攪令匀不拘時候細細温服尸咽喉論曰道家服藥務先去三蟲者以其為人害也尸咽之病亦本如此巢氏謂腹中尸蟲上蝕咽喉能令生瘡或或痒或痛如􅉶候者是也善攝生者儻未能除去亦當服藥治之勿使妄動則善矣黄檗湯方治尸咽喉閉塞出瘡及乾嘔頭痛食不下黄檗炙半兩升麻木通各一兩竹茹三分麥門冬一兩半𤣥參一兩前胡大青各三分共八味搗篩毎服三錢水煎去滓入芒硝末一錢攪匀温服如鼻中有瘡以生地黄汁少許滴入鼻中日三五服不計時候若通利加芒硝不欲利去之一捻金方治尸咽及走馬喉痺或腦内生癰雄黄研藜蘆猪牙皂角去皮子各一分三味搗研為散先含水一口用藥一米許搐鼻内即吐去水少時立效咽喉中如有物妨悶論曰喉者胃之系故咽主嚥物天氣通於肺故主通氣咽喉如有物妨悶者乃肺胃壅滯風熱客摶結於咽喉使然故聖惠謂憂愁思慮氣逆痰結皆生是疾也射干湯方治咽喉中如有物噎塞不下射干升麻紫苑百合各半兩木通一兩赤茯苓桔梗各三分右七味每服三錢水煎食後溫服如要通利毎服加朴硝末一錢同煎服半夏木通湯方治咽喉如有物噎塞飲食妨悶半夏湯洗七遍木通乾薑各半兩芍藥桑根白皮共五味毎服三錢入鹽少許煎温服又一方搗羅為末錬蜜丸如梧桐子大每服十五丸食後生薑湯下加至二十丸四物湯方治咽喉中如有物嚥吐不利半夏薑汁浸一宿焙厚朴薑汁炙陳橘皮浸去白各一兩赤茯苓二兩共四味毎服二錢入生薑三片同煎食後温服厚朴湯方治咽喉中如有物厚朴薑汁炙炒赤茯苓各一兩半夏洗七遍切焙一兩半紫蘇葉一兩共四味每服三錢入生薑三片同煎食後溫服石蓮湯方治咽喉如有物噎塞飲食不下石蓮人參杵頭糠各一分共三味每服三錢水煎温服日二杵糠丸方治咽喉中如有炙臠食即噎塞碓杵頭細糠二合一味為末鍊蜜和丸如彈子丸每空腹含化一丸微微嚥津下杏仁煎方治肺胃壅滯咽喉中如有物妨悶杏仁湯浸去皮尖雙仁炒桑根白皮貝母各一兩半生薑汁二合地黄汁二合半酥半兩大棗六十枚去核紫苑二分甘草炙桔梗炒五味子赤茯苓去黒皮地骨皮各一兩人參三分共十四味研杏仁以水五升濾取汁將草藥細剉同煎至二升以綿濾去滓續下酥及地黄汁漫火煎成膏毎食後含一匙細細嚥津骨鯁論曰用藥之法有不取於氣味特以意為用者若魚網虎骨之治骨鯁是也然網能制魚乃魚之所畏虎能伏獸乃獸之所畏其所制伏既不同則用之不異矣治咽喉諸鯁輭骨散方赤茯苓陳橘皮浸去白各半兩甘草炙縮砂仁各一分共四味為散毎用二錢先摻口中次用新水一盞嚥下馬渤散方治骨鯁在喉中不出馬渤白礬灰惡實陳橘皮浸去白各半兩共四味研為末漿水和丸如櫻桃大含化嚥津橘皮丸方治骨鯁在喉中不出陳橘皮去白半兩烏賊魚骨去甲沙糖各一分右三味搗羅為末鍊蜜和丸如皂子大綿裹含嚥栗皮丸方治諸骨鯁在喉中不出栗子肉上皮半兩為末乳香鮎魚各一分三味同研為丸如梧桐子大看骨逺近綿裹一丸水潤外留綿線吞之即釣出飴糖丸方治諸魚骨鯁在喉中飴糖不拘多少一味為丸如雞子大吞之又漸作大丸子再吞即效魚網散方治諸魚骨鯁在喉中捕魚網一片一味燒灰研細每服一錢新水調下又以魚網覆鯁人頭上即下鸕鷀散方治諸魚骨鯁在喉中鸕鷀毛翅十片一味燒灰細研每服一錢濃汁橘皮湯調下或以綿裹含嚥即下薤白嚼方治諸魚骨鯁在喉中薤白一味嚼令揉取麄線繫之持線一端吞薤到鯁處引之即出揉筋引方治諸魚骨鯁在喉中鹿筋不拘多少一味漬之令輭索如彈丸持一端吞之至輭處徐徐引出虎骨散方治諸獸骨鯁虎骨一味研細每服一錢水調下狸骨亦得血餘散方治食中髪鯁不下遶喉亂髪一團燒灰一味研為細散每服一錢粥飲調下豬膏吞方治諸鯁豬膏一味吞如杏核大未差再吞螻蛄散方治諸鯁并刺不出螻蛄頭一枚一味為散以綿裹嚥津勿令鯁人知若刺不出者塗刺瘡上即出治諸鯁方右方用木炭皮為末研令極細如無炭皮但堅炭亦可粥飲調下二錢四五服以鯁下為度誤吞諸物論曰誤吞諸物若金銀錢鉤之類雖非病之自内然無術以出之久則害人若舊梳治髪磁石出針皆意為之治不特取其性味治藥之工可謂用心精微者矣治誤吞針及箭鏃等方肥豬脂肉不拘多少一味煑令熟輭恣意飽食即下治誤吞針方磁石一彈大一味口含之即出癭瘤門五癭論曰石癭泥癭勞癭憂癭氣癭是為五癭石與泥則因山水飲食而得之憂勞氣則本於七情之所感氣則隨之或上而不下或結而不散是也治癭瘤海藻散方海藻一兩昆布一兩半海蛤木通白茯芩三兩桂心羊靨十枚去脂炙黄右七味搗研為散非時溫酒下三錢夜再服茯芩丸方治氣結喉中蓄聚不散成癭白茯苓三兩半夏湯洗去滑生薑二兩昆布海藻各五兩桂心陳橘皮各一兩右七味為末鍊蜜丸如杏仁大常含化一粒細細嚥津令藥氣不絶諸瘤論曰瘤之為義畱滯而不去也氣血流行不失其常則形體和平無或餘贅及鬱結壅塞則乘虚投隙瘤所以生初為小核寢以長大若杯盂不痒不痛亦不結强方劑所治以治癭法同但癭有可鍼割而瘤慎不破爾消腫散方治骨瘤石瘤肉瘤膿瘤血瘤大如盃盂升斗者三三十年不差致有膿潰令人骨消肉盡或堅或輭或潰令人驚惕寤寐不安體中掣縮烏賊魚骨去甲硫黄各一分白石英紫石英鍾乳各半兩乾薑大黄炒附子去皮臍胡燕屎琥珀各一兩丹參三分共十一味為散貯以韋囊勿令氣洩若瘡濕即傳之若瘡乾無汁者以猪膏和傅日三四易之以乾為度若汁不盡者至五劑十劑止著藥令人不疼痛若不消加芒硝二兩神效散方治項氣瘤結附贅日漸增長豬羊靨各三十枚旋入猪膽内蘸過令乾陳橘皮去白一兩三味為散毎服二錢空心米飲調下初結不過數服覺消不用久服瘰􅐇門瘰􅐇桔核論曰瘰􅐇桔核者由風熱毒氣藴積肝經攻注筋脈毒氣鬱而不散故項腋之間瘰􅐇結聚成核或如梅棗核狀累累相連其證令人乍寒乍熱頭項强痛心神煩躁蓋毒氣與氣相搏則榮衞不和使之然也沉香湯方治瘰􅐇毒腫沉香丁香木香麝香研各一分連翹黄芩各半兩犀角一兩半升麻一兩每服五錢水煎温服空心日午夜卧各一服凝氷散方治風熱毒氣項下結核及欲作癰疽瘡癤發背等疾菉豆粉乳香研各一兩二味合研為散實人分作四服虚人分作八服食後米飲調下就有核處一邊卧盡劑必差大消腫痛内消方治瘰癧腫結蝸牛殻不拘多少一味搗為細散每服二錢空心米飲調下日再至四十九日自消消毒塗方治風熱結鞕腫赤疼痛及腮頷下忽結成核大黄二兩景天即慎火草二味同研爛塗於患處日再傅平肌散方黄狗骨頭燒灰鯪鯉甲燒灰各一錢亂髪一團紙燒灰三味研匀如瘡口已乾用白津唾調溼傅之日三四次瘡即平愈治瘰癧在項上結成顆塊及觸處但有結凝似作瘻癰急灸法獨頭蒜一斤一味截兩頭去心作艾炷火與蒜稱貼癧子灸之勿令破肉但取氣而已覺熱勿畏每七壯易蒜可至七易取消治五種瘰􅐇牡蠣散方牡蠣煆研連翹瓦上炒各一兩二味為細散每服一錢臨卧無灰酒調下差後更服一兩永不發瘰􅐇寒熱論曰甲乙經論瘰􅐇寒熱皆鼠瘻寒熱之毒氣留於脈而不去上攻於項腋之間風熱毒氣與血相搏則榮衞不和故瘰􅐇而發寒熱也連翹丸方治瘰􅐇寒熱結核在項腋之下堅痛連翹𤣥參木香升麻各一兩半大黄蒸半兩大麻子别研微炒昆布各二兩枳殻麩炒一兩半共八味搗羅為末鍊蜜丸如梧桐子大每服十五丸食前米飲下加至二十丸木香消毒湯方治瘰􅐇連連大小寒熱煩悶木香大黄生用各半兩竹葉乾者一分連翹一兩獨活半兩梔子仁一分共六味毎服三錢水酒童子小便共一盞同煎温服瘰􅐇久不差論曰風熱毒氣藴積腑臟攻於筋膜則結為瘰癧其毒氣所感深者則衝發肌肉令久不差此疾尤忌憂思恚怒氣血勞傷飲食寒冷漏蘆湯方治瘰􅐇久不差將欲破者漏蘆半兩洗焙海藻半兩連翹一兩沉香半兩山梔子仁一分𤣥參丹砂各三分右七味搗篩每服三錢水煎温服烏雞丸方治瘰􅐇久不差鳥雞卵一枚錦貝子二味將錦貝子入在雞卵内用濕紙裹頭七重再用泥固濟火煆過後入地坑内出火毒一宿取出研細入大黄末半兩麝香一錢同研細鍊蜜丸如菉豆大空心蜜水下五十丸不過五服效連翹湯方治瘰􅐇不差敗肉生膿連翹犀角各一兩𤣥參木通黄蓍漏蘆杏仁去皮尖雙仁炒黄各一兩半共七味搗篩每服五錢水煎食後温服日三聖濟總録纂要卷十九
