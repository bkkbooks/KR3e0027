body:
  text: 聖濟總録纂要卷二十三休寧程林纂婦人門氣血統論論曰血為榮氣為衛行陰行陽晝夜共行五十度周於身內之五臟六腑外之百骸九竅莫不假此而致養矧婦人所稟純陰以血為本以氣為用在上為乳飲在下為月事養之得道則榮衛流行而不乖調之失宜則氣血愆期而不應衛生之經不可不察婦人月水不通論曰婦人月水不通者所致不一有氣不化血微不通有先期太過後期不通有大病後熱燥不通有凝寒結滯不通有積聚氣結不通有心氣抑滯不通凡此所受不同治之亦異蓋女人假血為本以氣為用血氣稽留則澀而不行其為病或寒或熱或臍腹堅痛或肌肉消瘦久而不治則為勞瘵之症地黃煎丸治月水不行心忪悸身體熱面頰紅赤食味不美臍下刺痛腰胯重生地汁青蒿汁生薑汁一鍾共熬膏麒麟竭沒藥去油𤣥胡索凌霄花紅藍花五錢共末用膏丸彈子大酒下一丸當歸湯治血澀不行心忪肌熱腰重腹痛不可忍川歸丹皮川芎白芍牛膝麥蘖𤣥胡索桂心五錢琥珀沒藥炙去油一分水煎三錢溫服日二婦人月水不斷論曰女人以衝任二經為經脉之海手太陽小腸之經與手少陰心之經者此二經相為表裏主下為月水若勞傷經脉則衝任氣虛衝任既虛則不能制其氣血故令月事來而不斷也白茯苓散治女人血海不調因虛冷成疾致月水不絶及赤白帶下面色萎黃白茯苓木香懷熟地石菖蒲秦芁柏子仁青皮兔絲子赤石脂烏賊魚骨訶勒皮川歸五加皮牛角鰓燒灰杜仲艾葉燒存性一兩共為末不拘茶飲酒任下二錢日二川歸丸治月水不斷或多或少四肢倦身瘦瘁川歸三兩地榆人參白术白茯鹿茸白龍骨阿膠白芍卷柏石斛蒲黃紫朴一兩桂心枳殼二兩懷熟地三兩共末蜜丸梧子大酒下三十丸日二地黃湯治衝任氣虛經血虛損月水不斷綿綿不止懷生地二兩子芩川歸側柏葉兩半熟艾五錢水煎三錢入蒲黃一錢食前溫服日二一方加地榆伏龍肝白芍藥湯治月水經久不斷白芍藥炒側柏葉炙各二用水酒同煎三錢溫服未差再服婦人月水來腹痛論曰月水乃經血之餘和調則所下應期無過舉不及之患若衝任氣虛為風冷所乘致氣脉不順所下不調或先或後或多或少風冷之氣與月事相擊故因所下而腰背拘強臍腹刺痛也川歸飲治月水不調及欲來臍下痛肌體熱川歸白茯人參白芍枳殼紫朴肉豆蔲甘草五錢水煎三錢溫服日二丹皮湯治月水來而不利攻臍腹痛不可忍丹皮人參川芎子芩甘草乾薑吳茱茰桂心兩半白芍白茯川歸一兩桃仁八十枚炒水煎三錢服白芍湯治月水來腹痛煩悶體熱白芍藥紫朴人參一兩甘草川歸枳殼三兩肉豆蔲五錢水煎三錢溫服日二川芎丸治月水來腰腹刺痛不可忍或多或少或來如清水豆汁虛乏黃瘦川芎白芷生地桃仁去皮尖炒一兩黑乾薑蒲黃甘草五錢人參白芍丹皮牛膝桂心川歸三分共末入蜜杵丸梧子大酒下二三十丸日二室女月水不通論曰女子二七而天癸至任脉通月事以時下若稟受不足或任脉為風寒所搏致令風氣凝結不能應時而下經久不治則致勞疾人參湯治室女思慮太過心氣不足氣結不得宣利月水不依時或久不通或血隔成勞漸有寒熱肌肉不生不思各味凡此病症不可復行破血急性之藥宜通心氣行榮衛滑經絡人參白芍麥冬丹皮檳榔草蔲大腹皮白术川芎生地桔梗防己枳殼丁香皮甘草茯神川歸一兩桂心大黃逺志生薑大棗水煎三錢入酒少許溫服日二赤芍藥散治室女月水不通赤芍牛膝人參木香甘草丹皮𤣥胡索川芎五錢桂心川歸三分桃仁去皮尖炒一兩共末酒下二錢沉香湯治室女榮衛凝澀月水不利目昏悶肢體拘急五心虛煩多困少力沉香檳榔甘草三兩人參木香桂心川歸生地白茯苓陳皮青皮柴胡鱉甲醋炙兩半生薑水煎三錢溫服日二羚羊角湯治室女元氣不足虛勞內燥月水不利四肢少力頰赤口乾五心煩熱羚羊角防風地骨皮川芎黃茋蜜炙赤茯苓桂心麥門冬防風炙甘草一兩懷生地三兩羌活酸棗仁炒川歸紅花子白芍藥兩半生薑三片薄荷七片水煎三錢入酒少許溫服日二二地散治室女月水不通臍腹下刺痛懷生地懷熟地四兩桂心川歸二兩共末酒下二錢日二帶下論曰帶下有三十六種名雖不同其所致則一蓋婦人衝任為經脉之海上為乳汁下為月事血氣和平則生育之道得矣苟乖于保養風寒乘虛襲于經絡衝任不能循流血氣藴積冷熱相搏故成帶下冷則色白熱則色赤冷與熱并則赤白雜下間有五色者各隨五臟虛損而應焉川芎湯治帶下漏血不止川芎吳茱茰白芍藥黃茋炙甘草黑乾薑川歸一兩懷熟地二兩水煎三錢溫服日二桑寄生湯治三十六種帶下桑寄生熟艾川芎鹿角膠一兩川歸二兩用酒水合煎三錢溫服日二若口乾渴者加白茅根懷生地麥門冬一兩龍骨散治三十六種帶下不止白龍骨黑乾薑一兩黃牛角䚡燒灰三兩禹餘糧醋淬七次續斷阿膠炒川歸五錢共末酒下一二錢日二以差為度側柏葉散治帶下腹痛側柏葉炙二兩白芍藥川芎牡丹皮白芷黑乾薑一兩川歸五錢共末酒下二錢日二禹餘糧散治帶下五色久不止禹餘糧淬醋七次研鹿茸赤石脂二兩烏賊魚骨去甲燒灰兩半阿膠炒川歸白芍藥蒲黃一兩牡蠣童便淬二兩共末酒下二錢日二川歸散治帶下白黃不止體瘦繞臍腹痛川歸附子白术白龍骨桂心鹿角膠粉炒一兩共末酒下一二錢日二飲下亦可漏下論曰漏下之病經血淋瀝不斷是也夫衝任之脉所至有時若非時而下猶器之津泄故名之漏下蓋由血虛氣衰不能約制又有瘀血在內因冷熱不調致使血敗其色或赤如豆汁黃如爛瓜黑如衃青如藍白如膿五色隨五臟虛損而漏應焉沉香丹皮丸治內挾瘀血月水淋瀝不止或多或少四肢煩倦沉香人參丹皮赤芍川歸木香巴㦸天川芎山藥白茯白芷陳皮黃茋吳茱茰桂心枳殼紫朴肉蔲牛膝龍骨黑乾薑一兩共末入蜜杵丸梧子大酒下二三十丸日二白馬蹄湯治赤白帶下淋瀝不止色敗如五色者白馬蹄銼炒焦二兩白龍骨禹餘糧兩半白殭蠶赤石脂附子懷熟地牡蠣醋淬炙甘草一兩川歸烏賊魚骨燒灰兩半水煎三錢入酒少許溫服日二鹿茸散治漏下久不止鹿茸去毛炙阿膠粉炒烏賊魚骨去甲燒灰兩半川歸蒲黃微炒一兩共末酒下二錢日二龜甲散治漏下赤白經久不止龜甲醋炙牡蠣童便淬二兩共末空心酒下一二錢日二以差為度白术散治赤白漏下不止白术土炒川柏炙兩半白薇炒五錢共末溫酒下二錢日二大黃散治漏下青色大黃炒三分牡蠣童便淬子芩桂心一分白薇五錢共末酒下二錢蒲黃散治血漏不止日久虛損蒲黃微炒二兩鹿茸去毛炙川歸酒炒一兩共末酒下二錢日二黃茋湯治漏下赤白淋瀝不斷黃茋炙兩半阿膠粉炒二兩炙甘草一分大棗肉五十枚水煎三錢服經血暴下即血崩論曰女人經血謂之月事者常以三旬而一見也若血氣和平則所下應期若衝氣虛則經血不能制約故令暴下不止乃至數升也生地散治血傷暴下不止腰腳疼重倦怠無力心煩渴燥面目虛浮懷生地黃牛角䚡燒灰酸石榴皮炙人參白芷炙甘草陳皮地榆炙川續斷共末飲下二錢日二劉寄奴湯治血下不止臍下虛痛劉寄奴赤芍藥二兩艾葉炒四兩白茯苓一兩川芎川歸兩半水煎三錢溫服日二如聖散治經水暴下不止棕櫚皮燒灰一兩烏梅肉黑乾薑三味並燒存性各一兩共末用烏梅湯下一錢日二久患不過三服續斷丸治經水漏下日久不止或五色相兼而下面萎黃肌體瘦腰重無力續斷赤石脂炙甘草阿膠粉炒川芎丹參地榆車前子側柏葉鹿茸川歸一兩龜甲醋炙懷生地黃牛角䚡共末入蜜杵丸梧子大酒下三十丸白芍藥散治經水不止兼五色雜下不定日夜不止白芍藥黃茋白茯白龍骨一兩烏賊魚骨醋炙桂心附子乾薑牡蠣醋淬五錢懷生地三分共末酒下二錢日二地黃湯治經血不止顔色不定懷生地五兩子芩熟艾葉川歸二兩側柏葉伏龍肝蒲黃微炒生薑三兩地榆四兩炙水煎三錢溫服日二二灰散治經水暴下不止蠶絲燒灰箬葉用茶簍內者燒灰各一兩同研勻酒下一二錢日二禹餘糧丸治經血不止氣弱黃瘦禹餘糧米醋淬七次附子去皮臍炮川芎川歸三分白芷黃茋蜜炙白龍骨桂心白石脂共末入蜜杵丸梧子大丹砂為衣酒下二三十丸日二經血暴下兼帶下論曰女人臟腑久冷故有赤白帶下復因衝任氣虛不能制約經血以致暴下則二病兼作故謂經血暴下兼帶下也黃牛角䚡丸治經水暴下兼帶下經久不止面黃困劣黃牛角䚡燒灰赤石脂兩半鹿茸去毛炙桑白皮炒阿膠粉炒一兩艾葉炙二分白龍骨煆三兩黑乾薑一分共末入蜜杵丸梧子大酒下白芍藥酒治經血暴下兼帶下經久不差白芍藥炒懷生地黃茋炙三兩艾葉炙一兩酒一斗浸七日服牛角䚡散治傷血並帶下黃牛角䚡酒炙焦側柏葉炙川續斷炒熟艾伏龍肝川歸赤石脂一兩地榆共末酒下二三錢日二人參散治血傷兼赤白帶下日久不止人參五味子艾葉燒灰白茯苓牡蠣醋淬地榆白龍骨懷熟地炙甘草川芎續斷一兩共末空心用酒下一二錢日二白茯苓丸治血傷兼帶下積久不止漸成虛勞面黃腰腳沉重白茯苓柏子仁訶勒皮兔絲子木香杜仲炒赤石脂五加皮懷熟地秦芁川歸石菖蒲青皮黃牛角䚡切燒灰烏賊魚骨去甲燒灰艾葉燒灰一兩共末酒下二錢日二醋糊丸亦可生地湯治血傷帶下懷生地炒川歸阿膠黃茋炙一兩艾葉炒三分生薑水煎三錢溫服日二烏賊魚骨丸治血海虛敗赤白帶久下不止肢體虛熱煩躁頭目旋運口舌乾澀烏賊魚骨去甲燒灰白芍藥川歸山茰肉川芎訶勒皮酸棗仁白茯苓覆盆子𤣥參蓽澄茄懷熟地地榆黃茋炙一兩共末蜜丸梧子大酒下三十丸黃芩湯治經水暴下帶兼赤白不止懷生地二兩子芩蒲黃微炒熟艾側柏葉川歸五錢水煎三錢溫服日二車前子湯治經血暴下兼赤白帶下經久不止車前子子芩懷生地淡竹葉阿膠炒一兩水煎三錢服白龍骨散治經血暴下兼赤白帶下不止白龍骨續斷鹿茸赤石脂肉蓯蓉白芍藥懷生地炒烏賊魚骨去甲燒灰二兩共末用米飲下二錢日二婦人血分論曰血分者經水通之際因寒濕傷其衝任為之中止氣壅不行播在皮膚邪氣相搏經血分而為水發為胕腫故曰血分脉經曰經水前斷後病水者名為血分久之不治積成水腫即難治也枳實散治血分身體浮腫心腹煩滿不能食枳實麩炒牛膝青皮去白炒猪苓去黑皮桑白皮川歸炒一兩木香牡丹皮防己大黃炒檳榔煨甘遂炒五錢人參一兩共末湯下二錢日二檳榔湯治血分上攻頭面身體浮腫心煩熱滿悶檳榔微炒赤芍藥郁李仁牽牛子炒人參牡丹皮百合木香五錢赤茯苓牛膝枳殼炒三分知母鹽酒炒一分水煎三錢溫服日二婦人水分論曰水分者以水氣上溢于皮膚分散于四肢發為胕腫蓋腎者胃之關關門不利故聚水而從其類也此病與血分相似而治􅓼有先後耳赤茯丸治水氣在皮膚浮腫經水不通赤茯苓赤芍藥澤漆微炒木通防己一兩猪苓去黑皮小海蛤澤㵼兩半炒桂心陳皮炒三分共末入蜜杵丸梧子大桑白皮湯下三四十丸日二防己飲治水病浮腫因經水斷絶名曰水分防己澤漆子芩𤣥參陳皮一兩赤茯葶藶紙炒杏仁白术猪苓大豆炒兩半桑白皮炙一兩水煎三錢服甘遂丸治水分四肢浮腫經水斷絶甘遂微煨一兩天冬去心川連兩半葶藶紙炒二兩苦胡蘆一枚取瓤共末蜜杵丸小豆大酒下十丸至十五丸水利止服木通散治水分先病水腫日久不消致經水斷絶木通赤茯苓石韋去毛桑白皮防己澤㵼三分大腹皮四枚水煎五錢溫服日二如水通利少服婦人無子論曰婦人所以無子者由衝任不足腎氣虛寒故也內經謂女子二七而天癸至任脉通太衝脉盛陰陽和故能有子若衝任不足腎氣虛寒不能繫胞故令無子亦有本于夫病婦疢者當原其所因而調之白薇丸治婦人久無子白薇川歸人參附子川芎藁本禹餘糧一兩石斛熟地柏子仁紫參薑黃川椒桑寄生牛膝五味子桂心吳茱茰防風甘草五錢共末入蜜杵丸梧子大酒下二三十丸日二澤蘭葉丸治久無子澤蘭葉川歸白龍骨陳皮去白炒逺志菴䕡子川芎桃仁去皮尖炒禹餘糧醋淬七次研紫石英藁本蒲黃微炒覆盆子白芷卷柏一兩人參麥門冬黑乾薑車前子懷熟地細辛白茯苓赤石脂川椒炒石膏白薇蛇牀子五錢共末蜜丸梧子大酒下妊娠門妊娠惡阻論曰婦人所食榖味化為血氣下為月水凡妊娠之初月水乍聚一月為腜二月為胚三月為胎胎成則男女分方食于母而口如鳥在腜胚之時血氣未用五味不化中氣壅實所以脾胃不思榖味聞見于物即惡心有所阻也其病心中憒悶頭重目眩四肢怠惰惡聞食氣是矣茯苓湯治妊娠惡阻嘔逆肢疼頭痛惡聞食氣心忪煩悶多損墜宜安胎調血脉白茯旋覆生地二兩人參白芍陳皮桔梗炒細辛芎藭甘草炙兩半水煎三錢橘皮湯治妊娠惡阻嘔吐不下食陳皮竹茹人參白术三兩厚朴二兩薑水煎三錢柴胡飲治惡阻頭疼瘦弱不思食嗜臥柴胡赤芍人參麥冬黃茋甘草炙五錢生地兩半取汁水煎三錢入地汁一分日二人參飲治惡阻煩悶嘔噦吐逆惡聞食氣頭眩肢節疼嗜臥出汗黃瘦人參麥冬白茯生薑三分陳皮甘草炙五錢大棗五枚共分二劑每劑水五鍾煎二鍾分三服頃再服茯苓飲治惡阻煩悶頭眩憎聞食氣聞便嘔逆四肢不能自持白茯人參白术防風枳殼炒生薑五錢甘草炙一分分為二劑每用水四鍾煎半分二服頃再服妊娠漏胎論曰妊娠將理失宜經血時下謂之漏胎由衝任虛弱不能固養胞胎故令經血時下如器之漏也久漏不已則胎氣無所稟養必致萎燥矣續斷飲治妊娠漏胎下血不止腹內痛續斷二兩艾葉熟地當歸一兩竹茹阿膠雞蘇五錢為粗末水煎三錢日二艾葉飲治漏胎淋瀝不止艾葉五錢乾薑當歸三分芎藭一兩薑水煎三錢日二膠艾湯治漏胎下血過多阿膠五錢艾葉一兩水煎三錢日二黃茋湯治五六月下血黃茋兩半熟地桑寄生地榆一兩艾葉龍骨三分薑棗水煎五錢日二竹茹桑寄生湯治漏胎心腹痛時下血竹茹桑寄生艾葉白芍阿膠白术各等分水煎三錢當歸阿膠散治胞漏下血不止當歸阿膠熟艾五錢龍骨二分半蒲黃炒地榆三分牛角䚡炙焦熟地一兩共末酒飲任下二錢日二妊娠胎動下血論曰妊娠之人將護為難若觸冒風寒飲食生冷及喜怒勞動之過致患胎動胎動則氣血失度故下血也古方云母有宿疾子藏為風冷所乘者亦令胎動下血皆失將護所致阿膠湯治胎動腹痛下血運悶阿膠一兩生薑炒側柏葉桑寄生當歸艾葉三分竹茹一大團芎藭續斷五錢棗水煎三錢鹿角膠湯治胎動漏血不止鹿角膠一兩人參白茯苓五錢水煎三錢阿膠散治損動胎氣腹內結痛血下不止運悶阿膠桑寄生二兩人參懷熟地白芷芎藭一兩續斷兩半共末竹茹糯米湯下三錢秦芁湯治胎動下血身體煩熱倦怠秦芁人參炙甘草芎藭地榆白芷鹿角膠五錢糯米一撮水煎五錢芍藥散治胎動下血不止臍腹痛迷悶昏塞白芍木賊一兩炒牡蠣熟地乾薑烏賊魚骨去甲五錢共末酒下三錢人參飲治胎動腰腹痛血下不止人參芎藭當歸阿膠杜仲二兩熟地炙甘草一兩艾葉一把棗水煎五錢妊娠胎萎燥論曰人由受氣于有生十二經脉迭相滋養尤生物也得寒溫之正土地之宜無物不長凡胎處胞中或有萎燥者蓋由孕婦所稟怯弱不足自周陰陽血氣偏係非冷即熱胞胎失于滋利所以萎燥而不長也日月雖過不能生育亦有後時致生惟宜資母血氣俾陰陽調通本末相應則胎從而有養矣艾葉湯治胞中冷致胎萎燥艾葉炒芎藭當歸炒白术乾薑一兩水煎三錢日三白术湯治萎燥瘦劣面黃黑腹藏虛冷白术炒二兩人參當歸白芍芎藭訶勒皮厚朴炙甘草五錢薑水煎三錢日三白术當歸湯治胎萎燥漏下腹痛不可忍白术當歸人參芎藭阿膠二兩艾葉一兩酒水煎五錢入大棗分三服桑寄生湯治胎萎燥不能轉動心中急痛桑寄生人參白茯苓萎蕤一兩白术二兩薑水煎三錢入粳米半合溫服日二地黃湯治胎萎燥過時未産滋氣血益胞臟熟地當歸熟艾炒芎藭一兩阿膠炙甘草五錢水煎三錢日二妊娠胎不長養論曰妊娠將理無方脾胃不足飲食减退不能行榮衛化精微養衝任故令胎臟內弱子氣不足生化稍虧巢元方謂母病􅓼母則胎安是也若使脾胃和而能飲食水榖化而運氣血則何慮胎氣不長也白术散治胎不長養白术一兩人參白芍芎藭阿膠一兩炙甘草五錢共末葱粥飲下三錢日三地黃湯治氣血不足胎瘦不長熟地阿膠芎藭當歸二兩人參赤芍炙甘草五錢水煎三錢入粳米日三妊娠嘔逆不下食論曰妊娠之人脾胃氣弱風冷乘之則中焦痞膈胃中虛滿其氣上溢氣不下降故雖食飲卒不得下甚則嘔逆茯神湯治妊娠嘔逆不下食和胃順氣茯神黃茋人參白术五錢藿香甘草炙二錢薑水煎二錢人參湯同人參山藥白茯粳米陳者一兩半夏五錢薑棗水煎三錢保生湯治妊娠嘔逆不下食陳皮二兩人參白术麥冬厚朴白茯一兩薑棗水煎四錢入竹葉厚朴湯同厚朴人參白茯苓白术陳皮竹茹半夏一兩薑水煎三錢妊娠咳嗽論曰妊娠咳嗽者以肺感寒氣也經曰形寒飲冷則傷肺久嗽不已則寒氣相移不惟妊育有傷而肺氣痿弱皮毛枯悴治宜發散寒邪資補胎氣則咳嗽自已麥冬飲治咳嗽不止麥冬一兩紫苑杏仁桔梗炒三分炙甘草一分桑白皮五錢水煎三錢入竹茹白蜜日三人參散治妊娠咳嗽人參陳皮炙甘草三兩生薑五兩切共末湯下二錢桑白皮丸治妊娠咳嗽痰盛嘔逆桑皮二兩半夏人參阿膠一兩丹砂一分炙甘草五錢共末粥丸芡實大臨臥含化一丸妊娠傷寒論曰妊娠感冒寒邪藏于皮膚灑然而寒熻熱而悶頭項痛腰脊強脉浮在表者當汗之在裏者下之汗下之理制方宜輕但非破血傷胎之劑和其陰陽正其表裏使經不傳邪無深入斯無危殆矣麻黃湯治妊娠傷寒發熱惡寒體痛麻黃蒼术三兩陳皮二兩白术炙甘草一兩水煎三錢入葱白鹽䜴異功湯治妊娠傷寒頭痛體疼安胎和氣麻黃去根節四兩白术蒼术二兩芎藭炙甘草兩半葱白水煎三錢日三柴胡湯治妊娠傷寒憎寒壯熱頭痛身疼柴胡白术一兩芎藭白芍藥當歸防風赤茯苓一分黃茋生地五錢薑棗水煎三錢白散子治妊娠傷寒護胎白藥子研末用雞子清調塗紙上約碗大貼在臍下乾以溫水潤之妊娠下痢論曰妊娠飲食過傷脾胃不和冷熱之氣入于腸間腸虛則泄故為痢也然冷多則白熱盛則赤冷熱相攻赤白相雜甚則膿血雜下速宜􅓼之恐傷胎也阿膠丸治妊娠下痢日夜頻㵼并安胎氣止腹痛阿膠酸石榴皮五錢川連一兩當歸肉豆䓻三錢共末蜜丸小豆大飲下十五丸黃連湯治妊娠下痢頻瀉并裏急後重川連炒黃柏三兩白术四兩薑水煎五錢日三健脾湯治妊娠下痢臍腹撮痛益胃氣思飲食厚朴蒼术四兩人參二兩大棗一升煮熟去皮核研棗汁五升與朴术同煮乾陳皮去白炒白茯二兩半炙甘草二兩薑水煎三錢進飲食調脾胃阿膠丸治妊娠下痢膿血不止腹痛阿膠三兩白术五兩川連肉豆蔲一兩共末蜜丸梧子大飲下三十丸黃柏散治妊娠赤白痢腹痛腰疼如欲産黃柏微炒當歸赤芍藥阿膠艾葉芎藭桑寄生一兩炙甘草乾薑三分共末水煎四錢阿膠散治妊娠赤白痢腹痛不止阿膠當歸一兩白术三分艾葉炒石榴皮炒五錢共末薑水煎四錢妊娠子淋論曰婦人懷子而淋者謂之子淋因腎虛膀胱經客邪熱令溲少而數水道澀痛痛引于臍者是其候也海蛤湯治妊娠子淋頻數澀痛海蛤木通猪苓五錢冬葵子微炒滑石一分水煎三錢入燈心三十根白芷散治妊娠子淋頻數澀痛白芷三分阿膠鬱金滑石一兩共末葱白湯下二錢當歸湯治妊娠子淋澀痛當歸白芍藥赤茯苓炙甘草山梔子等分水煎三錢妊娠浮腫論曰脾合土候肌肉土氣和平則能制水水自傳化無有停積若妊娠脾胃氣虛經血壅閉則水飲不化濕氣淫溢外攻形體內注胞胎懷妊之始腫滿必傷胎氣如臨月而腳微腫利其小便則病自愈防己湯治妊通身浮腫喘促小便澀防己大腹三分赤茯苓桑白皮一兩木香紫蘇一分薑水煎四錢木通湯治妊身體浮腫心腹脹滿小便不通木通香薷桑白皮一兩木香訶勒皮黃芩三分枳殼炒檳榔紫蘇五錢薑水煎四錢日二赤茯苓湯治妊娠身體浮腫心腹急滿小便赤赤茯苓一兩白术旋復花五錢木通杏仁黃芩三分薑水煎三錢赤茯飲治妊娠胎間水氣子滿體腫赤茯苓白术二兩杏仁旋復花一兩黃芩兩半水煎五錢日二桑寄生飲治妊娠遍身虛腫桑寄生紫蘇一兩木香五錢桑白皮炒大腹皮三分水煎三錢妊娠小便不通論曰妊娠小腸挾熱熱結胞內使氣道痞澀故小便不通令人腹脅脹滿臍下急痛是其證也榆白皮散治妊娠小便不通心神悶亂小腹急痛榆白皮王不留行滑石一兩共末燈心湯下二錢冬葵子湯治妊娠淋小便澀小腹急水道熱痛冬葵子三合赤茯苓白芍藥車前子一兩黃芩五錢水煎五錢滑石傅治妊娠子淋小便數熱痛手足煩疼滑石飛汲水調五錢塗臍下一寸小便即利未利再塗妊娠大小便不通論曰妊娠大小便不通者以臟腑盛實熱氣藴積不時宣導之所致也若熱結于大腸則大便不通結于小腸則小便不通今大小腸俱有熱則二便俱不通其候令人煩滿小腹脹急惟能均調腑臟使氣疏達則轉化無所留滯矣梔子湯治妊娠二便不通臍腹脹痛梔子黃芩柴胡萎蕤兩半石膏四兩澤瀉赤芍二兩車前草五錢水煎四錢入竹葉十片茅根湯治妊娠二便不通結悶氣急腹滿欲死茅根滑石車前子大黃炒各等分水煎四錢又方治妊娠二便不通猪脂二兩酒半升煎脂化分三服未通再服妊娠半産論曰妊娠日月未足胎氣未全而産者謂之半産蓋由妊婦衝任氣虛不能滋養于胎胎氣不固或顛撲閃墜致氣血損痛或因時病痢瘧之類皆致半産延胡索湯治半産後氣血不快惡露續斷延胡索當歸白芍藥炙甘草芎藭桂心一兩水煎三錢艾葉飲治半産後惡露不斷心悶氣短艾葉生地黃當歸人參地榆乾薑阿膠各等分水煎三錢妊娠數墮胎論曰胚胎之始賴血氣以滋育若妊娠血氣盛強陰陽之氣和相與流傳于一體唯能順時數謹人事勿動內傷則生育之道得矣衝任氣虛將攝失宜子藏風冷不能滋養于胎故每有妊則數致傷墮也地黃散治數墮胎子宫虛冷熟地黃茋人參白术芎藭當歸一兩吳茱茰炙甘草乾薑五錢共末酒下二錢阿膠湯治數墮胎小腹痛不可忍阿膠熟地艾葉炒芎藭白术當歸杜仲炒一兩棗水煎四錢服地黃湯治妊娠氣血衰微胞臟挾冷數墮胎熟地黃四兩艾葉當歸二兩杜仲芎藭阿膠五加皮三兩水煎五錢日二芎藭湯治數墮胎心腹痛芎藭白芍藥白术阿膠炙甘草一兩艾葉糯米薑水煎三錢聖濟總録纂要卷二十三
