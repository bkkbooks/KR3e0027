body:
  text: 聖濟總録纂要卷九休寧程林纂膈氣門膈氣統論論曰胸中者氣之府呼吸升降之道也隂陽升降順理則氣道通調胸中乃治喜怒寒熱不調則氣聚於胸而為膈氣夫膈氣有五憂膈恚膈氣膈寒膈熱膈是也憂膈之病胸中氣結煩悶津液不通飲食不下羸瘦無力恚膈之病心下若實嘔輒噫醋心食不消心下痞澀積結在于胸中大小便不利氣膈之病胸脅逆滿咽塞不通惡聞食臭寒膈之病心腹脹滿咳逆膈上苦冷臍腹常鳴食不生肌熱膈之病臟有熱氣五心中熱肉爛生瘡骨煩四肢重唇口乾躁身體頭面手足或熱腰背疼痛胸痺引背水榖不消不能多食羸瘦少氣此五膈為病之症也人之和氣一有憂思恚怒寒熱飲食悉皆傷之致隂陽不和臟腑生病氣痞于胸腑之間故曰膈氣諸方之論不一又有十膈症各不同其發之原不越于此也五種膈氣論曰人之胸膈升降出入無所凝滯命曰平人若寒溫失節憂恚不時飲食乖宜思慮不已則隂陽拒膈胸脘痞塞故名膈氣曰憂曰恚曰氣曰寒曰熱五種雖殊其為膈病則一建中丸治男女五種膈氣及一切氣不思食白豆䓻胡椒甘草陳皮髙良薑蘹香子炒一兩紅豆䓻人參川芎蒟醬黑乾薑藿香葉五錢共末入蜜杵丸芡實大酒下二丸薑湯下亦可備急沉香散治霍亂吐㵼氣逆結胸膈氣刺痛不思食沉香丁香京三稜黑乾薑蓬莪茂五錢肉豆䓻人參木香赤茯苓藿香葉桂心一兩髙良薑甘草胡椒一分共末用鹽點茶下二錢五膈丸治五種膈氣噎塞胸中滿悶不下食白术木香陳皮去白炒訶勒皮桃仁去皮尖炒裩布洗燒灰三分桂心大黃半夏薑汁炒枳實麩炒檳榔微煨琥珀研一兩共末入蜜杵丸如梧子大薑棗湯下三十丸人參白术湯治膈氣咽塞憂結不散人參白术甘草京三稜訶勒皮陳皮去白炒木香桂心檳榔草豆蔲赤茯苓枳殼炒五錢生薑水煎三錢溫服日二人參丸治膈氣咽喉噎塞不下食人參檳榔紫朴薑汁炒枇杷葉一兩半夏薑炒五錢共末糊丸如梧子大薑湯下二三十丸日二導氣散治膈氣咽塞不下虎頭骨人參紫朴羚羊角蓽撥一兩共末飲下二錢裩布丸治膈氣噎塞不下食裩布洗淨燒灰一兩樁杵頭細粳一合共研用老牛涎一合生柏葉汁一合慢煎入蜜攪成膏與末杵丸芡實大每用一丸含化咽下膈氣嘔逆不下食論曰膈氣嘔逆不下食者由胃氣不足風熱乘之或憂恚氣結不得宣通故令膈脘痞滿氣塞胸中縱能食而卒不下或入胃中多致不消與留飲相擊則變為嘔逆也丁香丸治膈氣嘔逆不下食壅悶惡心丁香二十一枚木瓜木香一兩檳榔微煨一枚肉豆䓻一枚青皮去白炒七枚半夏薑炒一分共末入蜜杵丸梧子大薑湯下二十丸人參赤茯丸治膈氣嘔逆不下食或憂恚氣不宣通人參赤茯苓細辛白芍藥枳殼去白炒黑乾薑桂心炙甘草一兩檳榔訶勒皮兩半共末入蜜杵丸如梧子大用酒下二十丸如覺有物在喉中即丸三五丸如彈子大津咽含化一丸五膈丸治胃氣素弱因于憂恚膈氣虛弱嘔逆不思飲食人參一兩附子川椒細辛逺志乾薑五錢炙甘草麥冬桂心三錢共末入蜜杵丸如彈子大食後含化一丸津液咽下覺胸中氣逆即服一丸日三膈氣痰結論曰膈氣痰結者謂結痰在胸膈之上喉間噎塞咳唾稠濁氣滿胸中妨害飲食蓋緣脾肺久虛氣道痞澀不能升降水飲停結聚而為痰久不差則變虛弱上喘之病木香丸治膈氣痰結嘔吐酸水廣木香青皮白术桂心益智仁肉豆䓻煨一兩吳茱萸細辛黑乾薑五錢共末用酒煮陳米糊丸如小豆大生薑湯下十五丸至二十丸日二妙紅散治膈氣痰結嘔逆吐食紅麯炒人參丁香白茯藿香五錢共末飲下二錢日二五膈丸治膈痰結胸中不利赤茯苓陳皮桑白皮紫蘇一兩檳榔煨八枚紫朴薑炒一兩生薑焙二兩旋復花兩半共末入蜜杵丸如梧桐子大飲下二三十丸嘔吐門嘔吐統論論曰人之隂陽升降三焦調順脾胃和勻乃能腐􅌻水榖變化糟粕傳㵼行導下走腸間若脾胃虛冷水榖不化則隂陽痞膈三焦不調濁隂之氣不能下行沖奔于上故發為嘔吐然吐逆之病有得之于膈實者有生于中滿者有發于下焦者種種不同悉本于胃氣逆則嘔吐蓋胃者水榖之海三焦者乃水榖之道路胃氣宣通則上焦如霧中焦如漚下焦如瀆命曰平人若胃氣虛弱水榖遲化停滯三焦格拒升降不勻其氣虛滿得食則嘔而又有朝食暮吐暮食朝吐者有食已即吐者有嘔吐榖不得前者有但嘔而無所出者有先嘔却渴者有先渴却嘔者有嘔家本渴而反不渴者治求其本各有不同假令內格拒逆食不得入是有火也病嘔而吐食久反出是無火也舉此二者乃知嘔吐之名則一而治藥之法各異雖治有冷熱有虛實之别要在安胃氣為本使隂陽升降呼吸平均嘔吐之病順而愈矣嘔吐論曰嘔吐者胃氣上而不下也譬之空瓶小口頓溉不入乃升氣所礙人病嘔吐其理如此蓋脾胃氣弱風冷干動使留飲停積飲食不化胃氣虛脹心下淡淡其氣上逆故令嘔吐也厚朴丸治脾胃虛寒痰盛嘔吐紫朴去皮一斤薑汁炒半夏半斤生薑三斤取汁又入水三碗搗絞汁將汁同朴半共入砂鍋內慢火煮乾為末棗肉丸如梧子大酒下二十丸藿香散治脾胃虛寒痰盛嘔吐不止飲食不化藿香紫朴一兩桂心炙甘草五錢青皮去白炒三分枇杷葉去毛炙一分乾薑兩半薑棗水煎三錢服七寶湯治脾胃虛冷嘔吐痰涎胸膈痞悶不思食人參白茯甘草一兩大腹皮全用半夏薑製二兩草豆䓻四枚煨訶勒皮五枚薑棗水煎三錢服濟急丸治脾胃虛寒痰飲留滯嘔吐不止附子大者一枚剜空丁香四十九枚入附子孔內封以薑自然汁浸附子於器中重湯煮乾為末每服一錢津液咽下和胃湯治食飲不下嘔逆清水面目虛腫人參二兩赤茯苓兩半半夏茅草根一兩木通青竹茹三分甘草五錢薑棗水煎三錢空心服人參半夏丸治嘔吐不下食頭痛人參半夏湯泡七次薑汁製二兩前胡一兩鉛丹水飛過五錢共末蒸大棗去皮核杵成丸如梧桐子大空心薑湯下二十丸晚再服乾嘔論曰嘔而欲吐吐而無所出故名乾嘔此由隂陽不和胃中虛弱氣逆上行不能下降故有乾嘔之症麝香平氣丸治胃氣虛弱乾嘔心胸痞悶痰逆惡心吞酸噫食腹脅疼痛和脾胃進飲食辟除邪氣麝香木香沉香肉豆䓻乳香生薑汁煮研成膏丁香丹砂桂心紫朴薑汁炒半夏薑汁製檳榔一兩共末入膏糊丸如梧子大空心飲下二十丸四倍散治胃氣不和乾嘔惡心訶梨勒煨取皮一兩人參二兩白茯飯上蒸四兩白术陳土炒八兩共末鹽湯下二錢或薑棗水煎服之大補虛損安中散治乾嘔小麥炒四兩甘草炙陳麯五錢乾薑炒一兩共末空心棗湯下二錢日二除邪熱和胃氣進飲食桂苓湯治乾嘔煩悶不下食桂心人參白术乾薑五錢砂仁紫朴一兩陳皮甘草二分薑棗粟米水煎三錢服和安湯治胃氣上逆乾嘔不止陳皮去白炒一兩甘草炙二兩乾薑炒五錢薑水煎三錢空心溫服參粟湯治乾嘔不下食人參一兩半夏湯泡七次四兩生薑五大片陳粟米二兩同入碢慢炒搗為粗末薑棗水煎三錢空心服胡椒湯治胃氣上逆乾嘔煩悶胡椒二十一粒木香二錢􅌻糯米一合同炒􅌻分三服水煎空心下痰飲門痰飲統論論曰人之有形藉水飲以滋養水之所化憑氣脈以宣流蓋三焦者水榖之道路氣之所終始也若三焦調適氣脈平均則能宣通水液行入于經化而為血灌溉周身設三焦氣澀脈道閉塞則水飲停滯不得宣行因之聚成痰飲為病多端古方論痰飲有四痰飲懸飲溢飲支飲是也若其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲水流脅下咳唾引痛謂之懸飲飲水流行歸于四肢當汗出而不汗體身疼重謂之溢飲其人咳逆短氣倚息不得卧其形如腫謂之支飲此飲疾之大概也然又有五飲及水在五臟病各立名不同與夫聚而不散曰留飲癖于脅肋下曰癖飲流移不定曰流飲沉伏于內曰伏飲因酒多而成名曰酒癖因寒多所致即曰冷痰因熱邪所傷即曰熱痰病雖多端悉由三焦不調氣道否澀而生病焉是以氣行即水行氣滯即水滯故知飲之為病在人最多善治者以宣通其氣脈為先則水飲無所凝滯所以治痰飲者當以溫藥和之蓋人之氣血得溫暖則宣流也及結而成堅癖則兼以消痰破飲之劑攻之堅癖自消痰飲自愈痰癖論曰痰癖之病由三焦氣不升降水飲停滯留于脅下寒氣乘之則令脅肋堅脹按之瀝瀝有聲有時而痛妨害飲食久不施治令人肢體羸瘦謂之痰癖枳殼丸治痰癖脅肋刺痛勻氣寬膈枳殼人參五味子柴胡五錢甘草石斛訶勒皮一兩共末蜜丸如梧子大飲下三十丸消飲白术丸治痰癖及飲酒停痰積聚不利嘔吐目昏耳聾腸中水聲白术半夏薑汁搗餅炙乾三兩枳殼去瓤炒四兩乾薑炒二兩共末蜜丸如梧子大空心飲下三十丸支飲論曰水飲停積胸膈不能消化支乘于心故名支飲其狀令人心下築悸咳逆喘息飲食不下身體虛浮形如水腫是也參茯丸治支飲不消胸膈滿悶人參赤茯膽南星三分半夏生薑晉礬一兩將生薑南星半夏搗成餅慢炙黃與藥共末糊丸如梧子大薑湯下二十丸甜葶藶丸治支飲氣喘不得息甜葶藶紙上炒木香半夏薑汁製共末薑汁糊丸如梧子大空心薑棗湯下二十丸檳榔丸治支飲胸膈痞滿悶檳榔肉豆䓻麵包煨五錢半夏薑汁製青皮去白炒乾薑炒黑一兩共末薑汁糊為丸如小豆大薑湯下五丸以差為度留飲論曰留飲之病得于三焦壅痞氣脈凝澀致飲水不消留聚胸膈之間令人痞滿短氣脅下脹滿喜渴數飲是其候也赤茯湯治膈間留飲嘔逆多眩短氣多渴赤茯柴胡白术枳殼檳榔一兩杏仁半夏三分人參旋復花五錢薑水煎三錢空心服半夏湯治留飲不除胸中痰冷半夏五兩人參附子桂心甘草赤茯二兩白术三兩薑水煎三錢空心服日二枳實湯治留飲不消心下痞堅時復作痛枳實麩炒二兩白术土炒三兩桂心一兩薑水煎三錢空心服日二沉香茯苓丸治留飲沉香一兩白茯苓半夏薑汁製人參去蘆丁香二兩甘草陳皮去白肉豆䓻煨檳榔五錢共末蜜丸如梧子大薑湯下二十丸溫脾胃利胸膈和氣血蓽撥煮散治留飲食癖蓽撥炙甘草大腹皮丁香訶梨勒乾薑炒五錢白术草豆䓻陳皮去白炒一兩桂心三分共末薑水煎三錢服痰飲門冷痰論曰氣為陽陽不足者不能消爍水飲遇脾氣虛弱氣道否膈則聚飲而成痰浸漬腸胃上為嘔逆吞酸下為洞泄寒中久不已則令人消瘦倚息短氣妨害飲食昔人治痰飲多以溫藥和之為此故也半夏湯治冷痰癖飲胸膈痞滿嘔逆不止半夏湯泡七次薑製三兩人參白术附子甘草赤茯桂心二兩薑水煎三錢服日二吳茱萸湯治胸中塞痰心下煩悶欲吐不下食吳茱茰洗炒人參半夏薑汁炒桂心二兩甘草一兩薑棗水煎三錢空心溫服日二半夏湯治胃中冷痰嘔逆消食溫胃止逆半夏杏仁陳皮二兩桂心甘草一兩木香乾薑五錢薑水煎三錢空心溫服吳茱茰湯治胃中冷痰吐酸水胸中不快吳茱茰湯洗炒附子半夏薑汁炒二兩用薑水煎三錢空心溫服丁香半夏丸治胃中冷痰利胸膈和脾胃進飲食丁香一兩半夏薑汁炒二兩人參木香藿香五錢肉豆䓻煨二枚陳皮五錢共末薑汁糊為丸薑湯下二十丸法製半夏治冷痰利胸膈一切諸痰並治半夏八兩湯泡酒浸一日白礬四兩丁香皮草豆䓻三兩同入酒浸春夏七日秋冬十五日取夏洗過焙乾每嚼五六粒茶酒任下熱痰論曰熱痰者由氣滯壅塞津液不通熱氣與痰水相摶聚而不散若咽喉乾躁或寒或壅頭目昏重咳唾稠濁面目赤熱是其症也鵝梨煎丸治熱痰涼心肺利胸膈解毒補元益氣鵝梨大者二十枚去皮渣取汁皂莢十條去皮水揉取汁懷生地黃八兩水搗取汁薄荷生搗取汁白蜜八兩同上汁煎成膏人參白茯苓木香肉蓯蓉白蒺藜炒去刺牛膝半夏一兩雲白术羌活三分檳榔煨三分山藥青皮去白炒防風炙甘草桔梗三分共末搗膏為丸如梧桐子大荆芥湯下二十丸千金散治熱痰壅盛胸膈不利半夏薑汁製蛤粉五錢甘草羌活凝水石三錢煆過共末水下三錢空心服以利為度丹砂丸治熱痰壅盛虛煩躁渴丹砂半為衣膽南星枯礬一兩炙甘草五錢半夏二兩薑汁製水作糊共末用薑汁糊為丸如梧桐子大丹砂為衣每服薑湯下二十丸麥冬湯治胸間熱痰不思食麥冬人參前胡葛根犀角一兩桔梗五錢蘆根二兩水煎五錢空心服日二膈痰結實論曰膈痰者氣不升降津液痞澀水飲之氣聚于膈上久而結實故令氣道奔迫痞滿短氣不能眠卧甚者頭目旋運常欲嘔吐是也金箔丸治膈痰結實咽喉不利咳嗽喘息金箔五十片牛黃麝香五分氷片珍珠無油而白者入豆腐中水煮研硼砂一錢丹砂一兩甘草二兩馬牙硝一錢共末蜜丸如芡實大金箔為衣人參湯或薄荷湯下一丸半夏丸治膈痰結實滿悶喘逆化痰半夏薑汁製五兩皂莢五挺去皮揉水煮半夏生薑五兩與半夏搗作餅炙乾為末蜜丸如梧子大薑湯下二十丸犀角湯治膈痰結實頭目昏運不思食咳嗽煩渴犀角人參片芩柴胡一分麥冬白茯升麻五錢甘草半分薑水煎三錢空心服八珍丸治膈痰結實滿悶喘逆不能眠卧者丹砂研半兩犀角鎊羚羊角鎊茯神牛黃研龍腦研各二錢半牛膝南星硼砂研各一兩右為細末研勻蜜丸如雞頭大每服一丸食後細嚼人參荆芥湯下神仙墜痰丸治膈痰結實滿悶或痰飲否塞等症皂角不蛀者去皮弦酥炙黃色去子淨一兩六錢白礬一兩生用黑牽牛一斤取頭末四兩右為末滴水丸如梧子大每日服三十丸漸加至百丸空心溫酒送下膈痰風厥頭痛論曰痰生於脾胃宜實脾燥濕又隨氣而升宜順氣為先分導次之風動於肝肝宜疏泄如治之未當則脾受木制而痰由自生久而鬱結胸膈隨火上升以致頭痛發暈甚而至於風厥風厥者即肝厥也凡治此者宜豁其痰而燥其脾踈其肝而和其胃則痰自不生厥自愈而痛自止矣玊壺丸治膈痰風厥頭痛目眩等症天南星生半夏生各一兩天麻半兩頭白麵三兩右為細末滴水為丸如梧桐子大每服三十丸用水一大盞先煎令沸下藥煮五七沸候藥浮即􅌻漉出放溫别生薑湯下不計時服玊真丸治膈痰厥逆不可忍硫黃二兩石膏煆通赤研半夏湯洗硝石研各一兩右為細末研勻生薑汁為丸如桐子大隂乾每服二十丸薑湯或米飲下更灸關元百壯虛寒甚者去石膏用鐘乳粉一兩芎辛導痰湯治痰厥頭痛川芎細辛南星陳皮去白茯苓以上各一錢半半夏二錢枳實麩炒甘草各一錢右作一服水二鍾薑七片煎至一鍾食後服渣再煎服甚者三四服必止川芎丸治膈痰頭痛眩暈川芎一斤天麻四兩用鄆州者佳右為末蜜丸每兩作十服每服一丸細嚼茶酒下取效最速消渴論曰消渴一症有標本之異當審其所起辨其所發而施治焉庶不舛錯誤人若六氣為病其本有之三隂三陽為病其標有之一曰消渴以渴而不利引飲過甚言之二曰消中以不渴而利熱氣內消言之三曰腎消以渴而復利腎燥不能制約言之此久不愈能為水腫癰疽之病宜慎此者服藥之外當以絶嗜欲淡滋味為本消渴論曰消渴者渴而引飲乃復溲少是也得之五石之氣內燥津液腎氣不化故渴甚而溲少也久之不治則經絡壅澀留于肌肉變為癰疽腫毒瘡癤之候桃紅散治三消渴病石膏鉛丹赤石脂白石脂括樓根一兩炙甘草五錢共末空心溫水下二錢日二沃焦散治三消渴病飲水無度小便短少泥鰌魚十條隂乾去頭尾燒灰研荷葉隂乾研共研勻用新汲水下三錢日二不思水即止葛根丸治消渴日飲水數斗不止葛根附子括樓根鉛丹炒一兩共末入蜜杵丸梧子大用茅根湯下二三十丸神應丸治消渴津液內耗飲水不休溺少桂府滑石飛過寒水石研五錢用雞子一枚取孔去黃將清和末如膏入殼封固外以鹽泥包裹曬乾煆赤以藥細研大人飲下二錢小兒五分止渴括樓飲治因好熱麵炙磚及熱藥并乳石三焦氣膈心肺乾熱口乾舌焦飲水無度小便數多心欲狂亂服此急救括樓一枚要黃􅌻者去皮用瓤并子冬瓜中樣大者一枚去蒂入括樓瓤子用黃土泥裹瓜半指厚隂乾以火燒通赤去泥就熱將瓜爛研絞汁約七八合入蜜二兩和勻稍冷分作三服臟腑熱竭即不思水小便自無如括樓未􅌻時獨燒冬瓜服之亦妙生津丸治消渴疾津液內耗飲水不止溲少青蛤粉白滑石飛過一兩共研勻用黃顙魚涎和丸小豆大陳粟米飲下二三十丸日二豬脊骨飲治消渴久不差雄豬脊骨五寸炙甘草黑乾薑半分大棗肉二十枚用水三升煎二升發時和􅌻水不拘時服以差為度竹龍散治消渴引飲不止溲少服之止渴利便五靈脂醋化濾去沙石黑豆五錢共末用冬瓜湯下二錢無瓜時用葉與子煎湯日二小可渴只用一服差差後不可服熱惟宜服八味丸仍用五味子代附子八味丸治消渴愈後復發時服之俱妙懷􅌻地四兩山藥山茰肉白茯苓牡丹皮二兩澤㵼五味子桂心一兩共末入蜜杵丸梧子大鹽湯下二三十丸甘露散治消渴飲水不止豬胞乾者十枚煎破洗淨以火燒煙止研末空心酒下一二錢日二生津液梅蘇丸治消渴膈熱煩躁白鳥梅紫蘇鳥梅肉五錢人參一分炙甘草兩半訶勒皮一兩百藥煎三兩麥冬三分共末用黃蠟汁和丸芡實大津化一丸咽下暑月行路止渴甚妙人參煎方治消渴人參一兩葛根二兩共末發時用燖豬湯一升入末三錢蜜二兩慢煎取汁三合自稠如餳收貯夜飯後含化一匙津下重者不過三服牛膝丸治消渴下元虛損經久不止牛膝五兩為末生地汁五升以汁浸末夜浸日曬汁盡為度入蜜杵丸梧子大酒下三十丸久服壯筋骨駐顔色黑鬚髮薑魚丸治消渴飲水不止生薑切片焙乾為末用鯽魚膽汁和丸梧子大米飲下七丸至十丸雞膍胵散治久渴不差旬日見效雞膍胵黃皮雞腸五具炙鹿角膠白龍骨煆白石脂一兩桑螵蛸二十一枚炙土瓜根三兩川黃連牡蠣童便汁苦參二兩半漏蘆炙一兩共末空心飲下二錢日二黃連牛乳丸治消渴川連一斤去鬚麥冬二兩牛乳生地汁生葛汁四兩二味共末用乳汁煎沸杵丸梧子大空心飲下二三十丸日二竹葉湯治消渴飲水不輟多至數斗甘竹葉切大麻仁炒赤秫米各一升鹿蹄四隻湯泡去皮毛骨細研肉白茯苓一兩薤白切二兩共分八服先以水三鍾煎麻仁竹葉取汁入藥煎一鍾微微飲之渴止為度消渴煩躁論曰消渴煩躁者陽氣不藏津液內燥故令煩渴而引飲且躁也內經謂諸躁狂越皆屬于火蓋以心腎氣衰水火不相濟故也蘆根湯治消渴心脾中熱煩躁不止下焦虛冷小便多羸瘦蘆根一斤括樓根牡蠣便淬黃茋二兩知母三兩生麥冬六兩水煎三錢空心溫服日二翠碧丸治煩渴不止咽乾躁熱昏悶青黛麥冬葛根懷生地二兩括樓根三分寒水石煆三兩膽星知母五錢共末用陳米糊丸梧子大金箔為衣煎人參竹葉湯下十五丸至二十丸日二天冬煎方治消渴煩躁引飲無度驚悸不安生天冬半斤去心白蜜五兩煉用水五鍾煎天冬至三鍾以汲水淘數次别以熱水一鍾入蜜攪勻浸天冬五日每食後食天冬一兩差白茅根飲治丹石并熱藥發動毒氣不宣心肺躁熱煩渴飲水不止旋作小便久之即為癰疽腫毒白茅根麥冬兩半白茯苓三兩桑白皮二兩露蜂房炙黑一兩共粗末如黍米大水煎四錢淡竹葉十二片大棗二枚溫服日二消渴小便白濁論曰消渴飲水過多久則滲漏脂膏脫耗精液下流胞中與水液渾濁隨其所之與小便利下凝膏故謂之消渴小便白濁也腎瀝湯治消渴小便白濁如脂白羊腎一對去脂膜切五味杜仲生薑黃茋兩半懷生地一兩人參五錢大棗五枚磁石三兩打碎洗去黃水綿裹煎藥分二劑先以水四升煎腎與磁石二升入藥再煎八合去滓分二服山茱茰丸治消渴飲水極多肌體瘦弱小便如米泔腰膝冷痛諸方不能治者山茰肉括樓根苦參土瓜根龍骨研兩半川連三兩共末用生括樓汁搗丸梧子大飲下三十丸日二肉蓯蓉丸治消渴下焦冷小便如脂泔肉蓯蓉丹皮川歸五味子巴戟天地骨皮白龍骨韭子甘草懷􅌻地澤㵼一兩磁石醋淬七次赤石脂人參兩半白术禹餘糧煆三分桑螵蛸炙四十枚共末入蜜杵丸梧子大牛膝湯下二三十丸日二久渴論曰消渴之病本於腎氣不足下焦虛熱若病久不愈者邪熱藴積榮衛滯澀精血衰微病多傳變宜知慎忌凡忌有三一飲酒二房室三鹹食及椒麵炙煿又消渴病經百日以上者當忌針刺若妄針灸則瘡上漏水變成癰疽矣腎瀝湯治久消渴飲水不絶逺志赤茯人參川歸龍骨澤瀉懷􅌻地川芎片芩桂心二兩五味三分麥冬二兩半羊腎一對用水三鍾煮羊腎取汁煎藥五錢入薑棗溫服日二升麻黃芩丸治久渴不止升麻片芩麥冬五兩人參生地三兩苦參八兩括樓根七兩川連川柏五兩共末用牛乳和丸梧子大飲下三四十丸消渴後成水論曰脾土也土氣弱則不能制水消渴飲水過多脾土受濕而不能有所制則泛溢妄行于皮膚肌肉之間聚為浮腫脹滿而成水也瞿麥穗湯治消渴欲成水氣面目膝脛浮腫小便不利瞿麥穗澤㵼滑石飛過五錢子芩大黃炒一分桑螵蛸炒四十枚防己三分水煎三錢溫服頃又服赤茯苓湯治消渴後頭面腳膝浮腫胃氣虛弱不能下食心胸不利或時吐逆赤茯人參白术前胡紫蘇一兩陳皮檳榔木香桂心三分甘草五錢薑棗水煎三錢服消渴後成癰疽論曰消渴則隨飲而出皆作小便由少服乳石所致久則榮衛損傷精血不足肌膚減耗石氣增熾隨附經絡津液內竭經絡凝澀榮衛不行熱氣留滯故變為癰疽此當精窮治法恐毒氣不出穿通臟腑也服熱毒助陽藥同一治法玄參散治渴利後經絡痞澀榮衛留滯壅熱結成癰疽玄參犀角木香沉香芒硝黃茋羚羊角一兩甘草三分共末空心溫水下二錢日二磁石散治消渴後經絡壅熱結成癰疽磁石引鐵者醋淬二十次一兩研生地黃蓍地骨皮三分檳榔五味子桂心枳殼五錢共末溫水下三錢日二石膏湯治消渴後成癰疽石膏知母兩半括樓根生去皮半斤搗取汁如無以乾者四兩代之犀角一兩升麻三分土瓜根生去皮半斤搗取汁如無以乾者四兩代之水煎藥三錢入小麥少許去滓入二汁各半合溫服日二桑白皮湯治消渴後心肺氣獨盛結成癰疽桑根白皮東引者蜜炙半斤用水煎三錢空心溫服日二以差為度消中論曰消中者不渴而多溲一名內消以邪熱薰鑠五臟然後外及肌肉形體也得之少年餌石房室太甚真氣耗憊石氣孤立結于腎則腎實腎實則消水漿故不渴而小便利多不得潤養五臟使所食之物皆消為小便治宜滋腎水養津液則差天冬丸治初得消中食已如飢手足煩熱背疼悶小便白濁天冬去心二兩半雞內金三具微炙知母土瓜根五味子微炒兩半桑螵蛸炙十枚鹿茸去毛酥炙澤㵼赤石脂兩半牡蠣童便淬二兩苦參一兩共末入蜜杵丸梧子大飲下二十丸薺苨湯治內消所食物皆化作小便兼治強中薺苨大豆人參白茯石膏葛根括樓根子芩甘草知母磁石醋淬二兩水煎五錢溫服日二牡蠣丸治消中食已即飢手足煩熱背膞疼悶小便稠濁牡蠣醋淬赤石脂括樓根肉蓯蓉一兩知母澤㵼去毛天門冬土瓜根桑螵蛸炙五味子鹿茸川連子芩三分懷􅌻地兩半共末入蜜杵丸梧子大飲下三十丸日二豬肚黃連丸凡消渴變為消中者飲食到胃腑即時消化小便多而色白飲食過人而不覺飽者是為消中雄豬肚一枚洗去脂膜川連去蘆五兩為末以大麻子仁二合研水四升調如杏酪汁煮肚候爛入連末密縫蒸極爛乘熱搗丸梧子大暴乾飲下三四十丸臨卧再服肉蓯蓉丸治消中真氣耗憊小便無度肉蓯蓉二兩人參五味子巴戟天炙甘草括樓根地骨皮丹皮澤㵼懷􅌻地韭菜子一兩桑螵蛸炙三十枚禹餘糧燒紅醋淬二七次龍骨赤石脂磁石醋淬二七次兩半共末入蜜杵丸梧子大牛乳汁下三十丸消腎論曰消腎者由少服石藥房室過多精血虛竭石勢孤立腎水燥涸渴引水漿下輸膀胱小便利多腿脛消瘦細小小便數或赤似血色骨節痠痛故名曰消腎地黃湯治消腎腿脛消瘦細小小便數似血色臟腑虛冷懷􅌻地麥冬二兩桂心炙甘草川續斷白蒺藜炒五錢黑乾薑一兩水煎三錢溫服日二山茱茰丸治消腎自腰以下瘦弱無力小便數不禁山茰肉牛膝桂心韭菜子炒一兩黃茋蜜炙肉蓯蓉酒洗杜仲鹽酒炒斷絲兩半共末入蜜杵丸梧子大黃茋湯下二十丸日二人參鹿茸丸治消腎肢體瘦弱無力小便數人參黃茋蜜炙三分鹿茸一兩括樓根桑螵蛸炙一兩兔絲子酒煮兩半杜仲鹽酒炒山茰肉三分雞膍胵黃皮炙四枚共末入蜜杵丸梧子大棗肉湯下三四十丸日二磁石湯治消腎小便白濁如凝脂形體消瘦磁石六兩搗如米粒分作二十貼煎用綿包入同煎黃茋炙杜仲鹽酒炒人參兩半懷熟地二兩水三鍾先煮羊腎一對切片煮取汁二鍾入磁石一分再煎鍾半用汁煎藥四錢服日二金銀箔丸治消腎口乾眼澀陰痿手足煩疼小便多金箔銀箔一百片葛根白茯苓懷生地三兩肉蓯蓉天冬麥冬二兩半川連四兩括樓根丹砂飛二兩黑乾薑五味巴戟天澤瀉兩半共末入蜜杵丸梧子大丹砂為衣空心飲下二十丸日二人參附子湯治消腎飲水無度腿膝瘦細小便白濁不差人參附子青黛五錢水煎楮葉二片取汁煎二錢溫服日二聖濟總録纂要卷九
