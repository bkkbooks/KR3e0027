body:
  text: 聖濟總録纂要卷二休寧程林纂諸風門蠱風論曰蠱風之狀在皮膚間一身盡痛若劃若刺淫淫躍躍如中蠱毒故名蠱風皆由體虚受風侵傷正氣也天麻丸方治蠱風如皮膚刺劃天麻躑躅花獨活附子白附子原蠶蛾炒防風蒼耳蒺䔧子烏頭去皮臍各一兩麻黃去根節鳥蛇肉麝香除研者外搗羅為末入麝香再研匀錬蜜和搗三二百下丸如梧桐子大每服二十丸温酒下不拘時候如有汗出即宜避風石南湯方治六十四種風注走皮膚中如蠱行痛如刺劃狀似蠱毒及卒風面目腫起手不及頭口噤不能言石南乾薑黄芩細辛人參各一兩桂麻黃去根節當歸芎藭各一兩乾地黄三分甘草炙二兩食茱莄一兩一分㕮咀如麻大每服六錢水酒同煎温服得汗為度何首烏散方治蠱風何首烏威靈仙各一兩苦參半兩麒麟竭一分並生搗為㪚入乳鉢内研三五百遍每服一錢用荆芥湯調下每日三服酒服尤妙薄荷丸方治蠱風皮膚苦盡痛若刀劃狀及頭目不利風痰等疾薄荷葉一觔天麻四兩威靈仙三兩羗活四兩山梔子仁二兩蔓荆實三兩白芷桔梗炒防風各一兩大黃溼紙丧煨令紙乾一兩人參赤茯苓各三兩龍腦研半兩搗研為末再和匀錬蜜丸如鷄頭實大每服一丸食後細嚼茶酒任下肌肉瞤動論曰肌肉瞤動命曰㣲風葢邪摶分肉衞氣不通陽氣内鼓故肌肉瞤動然風之入脉善行數變亦為口眼瞤動偏喎之病也虎骨丸方治風虚肌肉瞤動手足顫掉虎脛骨酥炙松節剉酒炒天麻牛膝酒浸赤箭海桐皮獨活石斛去根防風烏蛇酒浸去皮骨酸棗仁當歸仙靈脾甜𤓰子洗焙乳香研五加皮各一兩一十六味先以十五味搗羅為細末入研者乳香再和匀酒煮麫糊丸如梧桐子大每服十五丸至二十丸荆芥酒或茶酒任下不拘時候天麻丸方治循經絡肌肉瞤動頭目昏眩手足麻痺天麻芎藭各兩一荆芥穗雞蘓葉各三兩白附子甘草各半兩右六味為末錬蜜丸如櫻桃大每服一丸茶酒任下荆芥湯方治風氣肌肉瞤動頭目昏眩四肢煩疼荆芥穗旋復花各四兩前胡甘草炙麻黃去根節芍藥芎藭半夏洗七遍各一兩每服三錢葱白三寸雞蘓二葉同煎温服風癲論曰風癲之狀發無常時每發則仆地吐涎沬無所覺知盖由血氣皆虚精神離散魂魄失守風邪入于隂經故也又以胞胎之初其母卒大驚精氣併居能令子發癲其證與風癲大率相似丹砂煎方治風癲疾時發時省涉厯年月丹砂細研水飛濾過後焙研如粉三兩石膏五兩研細黄連去鬚擣篩一斛生地黃研取自然汗二升共四味以清水一斗先煮石膏黄連取五升淨去滓次下生地黃汁又煎之如稠餳始下火取丹砂粉投入勺攪百餘徧貯於不津器中更攪待冷即住手每日兩度以温水調服約如半彈丸大服藥後只吃淡飯蔓菁菜等雄黃丸方治五癲各有聲牛癲若牛鳴馬癲若馬鳴狗癲若狗鳴羊癲若羊鳴鷄癲若鷄鳴凡此五癲皆宜服之雄黃丹砂雌黃三味各二兩碎同用生絹袋貯之入十兩蜜内重湯煑待蜜赤色滴如珠引若線為度取藥嚢出河水洗滌淘漉出曝乾入乳鉢中研如粉為度其蜜即丸藥用黒鉛二兩大火化用錢匙掩掠去塵垢者用精者一兩將無油淨器中下水銀及鉛同銷鎔攪令匀瀉于熱鐵器内待冷先將前三味石藥乳鉢内研次入鉛同研取匀水銀一兩共五味各如前修製畢便將前煮丹砂雄黄雌黄餘蜜再重湯煮散少少㸃入藥中漸漸和匀為丸如大麻粒每用桃柳栢桑木嫩條各長七寸寸剉以水一升煎至六合去滓分温下丸藥空心午時臨臥下三丸至五丸小兒一丸至二丸羚羊角丸方治風癲癎羚羊角犀角遠志人參山藥茯苓各一兩半防風一兩三分生地黄三分金箔研銀箔研各一百片麥冬鐵粉研天冬各三兩龍齒研三兩水銀一分入金銀箔龍齒鐵粉五件同研水銀無星子為度共十五味先將十味搗羅為末入别研者用拌令匀錬蜜和丸如菉豆大用桃柳枝湯下二十丸日二夜一或人參茯苓湯亦可風癎論曰風癎病者由心氣不足胸中蓄熱而又風邪乘之病間作也其候多驚目童子大手足顫掉夢中呌呼身熱瘛摇頭口噤多吐涎洙無所覺知是也然病發於陽者易差發於隂者難治故經曰臓病難治腑病易治又曰大人曰癲小兒曰癎靈烏㪚方治風癎多驚手足顫掉口吐涎沫烏鵶一隻臘月取于瓷瓶内盛以鹽泥固濟令乾用炭火煨存性候冷取出去肚腸研丹砂研一分細辛二兩乾蠍全者十四枚炒共四味將二味研末與别研二味同羅每服半錢匕午前温酒調下安息香丸方治男婦暗風癎病安息香通明無砂石者鉛丹二味為細末入白羊心中血研匀丸如梧桐子大每服十丸空心温水下神聖丸方治風癎涎潮等疾雌黄鉛丹各一兩細研以醋一斛熬稠丸如桐子大與惡實末同收每服十丸臨臥煎惡實末湯下丹砂丸方治風邪諸癎狂言妄走精神恍惚思慮迷亂乍歌乍哭飲食失常疾發仆地口吐白沬口噤戴眼魂魄不守年嵗深遠者丹砂光明者研一兩酸棗仁微炒研乳香光瑩者研各半兩合研令匀先令病人盡量飲酒沉醉次取藥五錢匕酒一盞調下於静室中安睡勿令驚動候其自覺則愈鐡粉烏鴉㪚方治風癎烏鴉一隻去腸肚及嘴足鉛丹黑鉛鐵粉研各二兩丹砂一兩研先將鐵粉并鉛丹入鐵器内熟炒次入黒鉛一處結成砂子入在烏鴉腹内縫合以罐子盛用物盖定鹽泥固濟放乾用熟火一秤煆令同赤取出搗為末次入丹砂更研如粉入後七味天麻羗活獨活防風芎藭乾蠍天南星各二兩共研為細末入麝香少許再研令匀每服半錢匕臨臥冷酒調下五生丸方治癎疾乾薑不炮烏頭生去皮臍半夏生用附子生去皮臍各一兩大豆末生用共五味除大豆末外細剉為末以豆末煮糊為丸如桐子大每服三丸冷酒下半夏丸方治風癎痰盛瘛瘲口吐涎半夏湯浸去滑生為末五兩白礬生為末二兩丹砂研鉛丹研各一兩同研匀以粟飯為丸如梧桐子大每服食後生薑湯下二十丸五枝煎方治風癎多驚手足顫掉身熱瘛瘲桃枝柳枝桑枝夜合枝槐枝並剉如豆大各一斗大豆一升淘過共六味用水一石慢慢火煎候豆爛及嚼諸枝無味即濾汁於銀石器内煎令得所不可熬過以瓷器盛每服一匙頭許入盧會末少許温酒化破空心徐徐服治風癎瘛瘲不省方虎糞曝乾野猪骨并蹄炙各不拘多少共研為散每日空心以酒調下二錢忌一切有足之物水銀丸方治風癎水銀半兩雄黃研龍腦研牛黃研各一分丹砂研一錢再同研匀用糯米飲和丸如菉豆大每服五丸至七丸熟水下空心臨臥日再服風狂論曰風狂之狀始發則少卧不飢自髙自賢自辨自貴盖人之榮衞周身循環晝夜不窮一失其平則有血并於隂而氣并於陽者有血并於陽而氣并於隂者隂陽二氣虚實不調風邪乘虚而入并於陽則謂之重陽故其病妄笑好樂妄行不休甚則棄衣而走登髙而歌或至數日不食故曰狂也又肝藏魂魂則隨神往來悲哀動中有傷於魂則為狂妄是亦血氣俱虚風邪乘之隂陽相并也眞珠散方治風狂妄語心熱狂走不知人真珠研牛黃研丹砂研各半兩金箔研銀箔研各五十片麝香研一錢鐵粉研天竺黃人參龍腦研各三分黃芩一兩防風犀角鎊各半兩茯神三錢麥門冬一兩半遠志白鮮皮羚羊角鎊各半兩甘草炙胡黃連甘菊花白附子各三分除研外搗羅為末入研藥拌匀每服一錢加至二錢薄荷温水或梨汁調下茯神湯方治風狂失神少臥不飢笑樂無節棄衣登髙茯神去木杏仁湯去皮尖雙仁各三兩龍齒六兩凝水石一片升麻二兩石膏碎二十兩沙參白茯苓白鮮皮各二兩生麥門冬四兩剉如麻豆每服五錢水煎温服如病甚煎成入竹瀝半合再煎服腦風論曰内經謂風氣循風府而上則為腦寒夫風生髙遠始自陽經然督脉陽維之會自風府而上至腦戸腦户者督脉足太陽之㑹也又太陽之脉起於目内眥上額交巔上入絡腦今風邪客摶其經稽而不行則腦髓内弱故項背怯寒而腦户多風冷也石膏散方治腦風邪氣留連頭痛不已石膏火煆研天南星炮白殭蠶炒三味等分搗研為㪚每服二錢匕葱白二寸臘茶一錢同連鬚葱煎湯頓服良乆再服榖精草㪚方治腦風頭痛吹鼻榖精草末銅緑研各一錢硝石半錢研共研和匀每用一匙吹入鼻内或偏頭疼隨病左右吹鼻中通闗㪚方治腦風鼻息不通不聞香臭或鼻流清涕多啑肩項拘急頭目昏痛風府怯寒原蠶蛾瓦上炒令黄白附子炮苦參益智去皮蒺藜子炒去角乾薄荷各一兩共為㪚每服一錢匕温調下日三服㸃頭散方治腦風頭痛吹鼻細辛髙良薑𤓰蒂各一分硝石半兩共研為細散用新水滿含一口搐藥半匙入鼻中良乆即定遠志散方治腦風頭痛不可忍遠志去心不拘多少為細散每用半匙先含水滿口即搐藥入鼻中仍揉痛處羗活丸方治腦風氣鼓或膈痰氣逆上冲於頭令頭旋運羗活去蘆頭米泔浸一宿切焙乾二兩半白蒺藜炒去角芎藭乾鷄蘇各二兩白殭蠶去頭角炒一兩共為細末錬蜜為丸如彈子大荆芥茶嚼下一粒不拘時候入龍腦麝香尤妙何首烏丸方治腦風鼻息不通清涕流出及諸風疾何首烏去黑皮三兩芍藥一兩桂去粗皮烏頭芎藭甘草炙剉藁本甘松羗活天麻陳橘皮湯浸去白縮沙蜜去皮各二兩煆存性一分右一十三味共為末錬蜜和丸如櫻桃大每服一丸薄荷葱酒嚼下不計時候芎藭湯方治腦風鼻息不通或流清涕多啑芎藭二兩細辛去苗葉黄芩去黒心各一兩荆芥穗二兩甘草炙剉半兩毎服三錢水一盞入薄荷七葉同煎至七分去滓温服吹鼻㪚方治腦壅頭痛盧會研龍腦研𤓰蒂搗硝石研四味等分為末每用一豆許吹之勝金散方治腦風頭痛鼻塞不通或流清涕多啑不已荆芥穗薄荷葉各四兩木賊去節二兩蛇蛻二条炙四味搗羅為㪚每服二錢清茶調下食後日三服風頭眩論曰風頭眩之狀頭與目俱運是也五臓六腑之精華皆見於目上注於頭風邪鼓於上腦轉而目系急使真氣不能上達故虚則眩而心悶甚則眩而倒仆也枳實湯方治風頭運倒眼旋腦項急痛枳實去瓤麩炒防風麻黄去根節先煎掠去沫焙乾芎藭各一兩杏仁去皮尖雙仁炒一兩半夏為末生薑汁和作餅曝乾細辛各二兩麄搗篩每服五錢匕以水一盞半煎至一盞去滓入竹瀝半合更煎沸早晩食前温服人參湯方治頭風眩但覺地屋俱轉目閉不開人參防風白木當歸酒灑切焙麥門冬去心焙各一兩獨活去蘆頭黄茋桂去粗皮芍藥各一兩半麄擣篩每服五錢水一盞半煎至一盞去滓食前温服日再夜一獨活湯方治風頭眩仆地屋轉嘔吐痰涎惡聞人聲獨活去蘆頭茯神去木各半兩甘草炙當歸酒洗焙切牡蠣煆白术附子肉蓯蓉酒浸切焙各一兩黃茋兩半防風遠志去心三分人參二兩半剉如麻豆每服五錢匕水一盞半生薑三片棗一枚去核煎至一盞去滓温服不拘時菊花湯方治風頭眩悶起即欲倒頭痛眼疼視屋轉動甘菊花細辛去苗葉各半兩防風前胡茯神白术麻黃去根節各一兩芎藭杏仁湯浸去皮尖雙仁各三分每服五錢水一盞半煎至一盞去滓入竹瀝半合更煎沸食前温服山藥㪚方治風頭目眩眼痛耳聾山藥甘草五味子甘菊花擇各半兩細辛山茱茰升麻蔓荆實各三分防風一兩為細㪚每服三錢匕空心温酒下附子膏方治風頭眩摩頭附子去皮臍鹽花各半兩為細末以麻油和如稀餳洗頭摩之日三守中丸方治風頭眩腦轉目系急忽然倒仆白茯苓去黒皮十兩麥門冬去心三兩白术人參甘菊花擇去梗山藥枸把子各二兩生地黄二十斤取汁共入味將七味搗羅為末先用生地汁於銀器内入酥三兩白蜜三兩同煎逐旋掠取汁上金花令盡得五升許於銀器内拌炒前七味藥漸漸令盡候乾入白蜜同搗數千杵丸如梧桐子大每日空心或食後清酒下五十丸服百日後五臓充滿肌膚潤滑修合須擇四季旺相日或甲子日此藥亦名五芝地僊金髓丸風頭痛論曰風頭痛之病由風邪客於陽經循風府而上至於頭腦令人頭重疼痛心膈煩熱上焦壅滯頭面虚汗診其脉左手寸口浮𦂳者是也石膏㪚方治風壅頭痛眉骨疼石膏研芎藭旋復花各一兩白附子炮細辛去葉苗甘草炙各一兩共擣羅為㪚每服半錢匕臘茶調下不拘時候清氣香芎湯方治頭痛芎藭五兩細辛去苖葉二兩半人參一兩半半夏麴一分用生薑和半夏末作麴用甘草炙三分右五味㕮咀如麻豆每服三錢匕水一盞入生薑三片薄荷五葉同煎七分温服不拘時候芎藭㪚方治風頭痛芎藭莎草根炒去毛一兩藿香葉荆芥穗各一兩石膏碎一兩半共為散每服三錢匕荆芥湯調下食後服丹砂丸方治諸風頭痛不可忍者丹砂别研水飛石膏燒通赤地上出火毒白附子炮為末各一兩龍腦少許研共同研令匀粟米飯丸如菉豆大更以丹砂為衣每服五丸食後薄荷茶嚼下六神散方治頭痛眼睛痛鷄蘇芎藭馬牙硝研各二錢石膏研乳香研各一兩龍腦研一匙共研為細末每用一匙含水搐於鼻中吹鼻麝香㪚方治頭痛不可忍藜蘆和州者一莖一味暴乾研為散入麝香麻子許研匀吹鼻中通頂㪚方治鼻塞及頭痛馬牙硝研細半兩地黄汁一合二味相和於銅器内用慢火煎乾取出研細每挑少許入鼻搐上吐痰即差偏頭痛論曰偏頭痛之狀由風邪客於陽經其經偏虚者邪氣凑於一邉痛連額角故謂之偏頭痛也至靈散方治偏頭痛雄黃研細辛去苗葉為末等分二味再同研每用一匙左邉痛搐入右邉鼻右邉痛亦然乳香㪚方治偏頭痛不可忍乳香如皂子大髙良薑如指頭大二味於火上燒迎烟熏鼻隨痛左右用之天南星㪚方治偏頭痛天南星酸漿水煮透心硬切曝乾一兩菊花三分自然銅燒赤醋淬一兩防風半兩用水一挑同菊花自然銅防風三味煮水盡為度去防風自然銅不用只单用菊花芎藭一兩五味除二味不用外擣羅為細㪚每服半錢匕臘茶清少許調只作一口呷盡分作三嚥每嚥㸃頭一㸃蓽撥㪚方治偏頭痛蓽撥一味為細末每用一匙先令病人含滿口温水隨病左右搐入鼻中漏風論曰内經曰飲酒中風則為漏風漏風之狀或多汗不可单衣食則汗出甚則身寒喘息惡風衣裳濡口乾善渴不能勞事又曰身熱解惰汗出如浴惡風少氣亦名漏風夫酒以養陽酒入於胃與榖氣相薄熱盛於中其氣慓悍與陽氣俱泄使人腠理虚而中風故其證多汗惡風不可单衣其喘息而少氣者熱薫於肺風客於皮毛也其口乾善渴者汗出多而亾津液也其解惰而不能勞事者精氣耗不能營其四肢也謂之漏風以汗出不止若器之漏乆而不治轉為消渴澤瀉㪚方治漏風身熱解惰汗出如浴惡風少氣澤瀉白术各二兩半麋銜一兩為散每服二錢沸湯調食後服黃蓍湯方治風虚多汗夜臥尤甚牀席衣被並溼黃蓍人參各二兩麻黃根牡蠣煆赤各三兩地骨皮二兩半龍骨四兩每服三錢棗二枚同煎空心服日二防風散方治風虚多汗惡風防風一兩一分澤瀉牡蠣煆赤桂各三分為細散每服二錢温酒調下空心服日再杜仲散方治風虚多汗夜臥尤甚杜仲炙炒二兩黃茋牡蠣煆赤各二兩麻黃根五兩為細散每服二錢煎敗扇湯調下食後服日二勞風論曰内經曰勞風發在肺下其為病也使人強上冥視唾出若涕惡風振寒夫勞風之病腎勞則根勞於下經所謂根弱則莖葉枮矣故目視不明而背反強腎之脉入肺中故因皮毛感風而振慄也腎主唾故津液凝結唾如涎涕治之以救其俛仰者戒其勞動也麻黃湯方治勞風胸膈不利涕唾稠黏上焦壅滯喉中不快麻黃去根節荆芥穗杏仁去皮尖雙仁木香當歸黃芩去黒心羗活芍藥茈胡大黄炮熟各一分半夏湯洗七遍去滑一錢牽牛子半兩每服二錢生薑一片同煎食後温服芎枳圓方治勞風強上㝠視芎藭一兩枳殻去瓤麩炒為末錬蜜丸如梧桐子大每服十丸食後温水下萎蕤飲方治勞風項強急痛四肢煩熱萎蕤三兩人參羚羊角鎊各二兩每半兩入豆䜴三合葱白一握以水煎分温空腹二服風頭旋論曰風頭旋者以氣虚怯所禀不充陽氣不能上至於腦風邪易入與氣相鼔致頭運而旋也又有膈胸之上痰水結聚復犯大寒隂氣逆上風痰相結上衝於頭亦令頭旋松香㪚方治風頭旋松實去殻白芷當歸芎藭甘草炙各三兩甜𤓰子洗一升同擣羅為細散每服二錢食後以荆芥薄荷清茶調下荆芥丸方治風頭旋目痛眩肢體拘急手足少力荆芥穗四兩細辛芎藭白殭蠶炒各一兩天麻一兩半羌活防風蒺藜子炒去角各一兩同為末煉蜜丸如鷄頭大每服一丸食後細嚼荆芥湯下茶酒亦得人參丸方治風頭旋目眩痰逆惡心胸膈痞滯欬𠻳痰涎喘滿嘔逆不欲飲食人參甘草白术旋復花炒各一兩麥門冬前胡枳殻各二兩木香半兩同擣羅為細末以湯浸炊餅和丸如梧桐子大每服二十丸食後生薑湯下袪痰丸方治風頭旋痰逆惡心咽膈不利天南星生半夏生赤茯苓乾薑炮陳橘皮湯浸去白焙各等分稀麫糊丸如梧桐子大每服三十丸加至四十丸温米飲下羚羊角湯方治熱毒風上攻頭面目旋運耳内虚鳴身體癮疹麻痺羚羊角二兩菊花三兩防風去又羌活前胡藁本𤣥參黄芩杏仁去皮尖雙仁菖蒲甘草炙各一兩每服五錢水煎食後温服治頭旋腦悶鼻塞眼運貼膏頂方萞麻子去殻研杏仁去皮研食鹽芎藭搗末松脂研各等分先擣食鹽次下四味杵匀即塗於蠟紙上有病者先灸百㑹三壯訖將蠟紙藥於炙處貼之日一易得膿血出效風痰論曰風痰之病得於氣脉閉塞水飲積聚其狀雖有冷熱之異至於心胸痞隔飲食不化則一也盖風壅氣滯三焦不和則水飲易至停積風能生熱壅亦成痰是故有頭目不利神思昏濁之候其或嘔逆不納飲食者則因於胃冷而得之其治固不可一槩也半夏飲方治風痰心腹煩滿嘔逆不欲飲食半夏湯浸去骨大腹皮麥冬赤茯苓白术桔梗前胡各三分青橘皮去白厚朴薑汗炙各一兩防風枇杷葉拭去毛炙各半兩每服三錢入生薑一棗大同煎稍熱服澤瀉湯方治風痰壅滯胸膈不利頭目昏眩不思飲食澤瀉前胡白术赤茯苓甘草人參半夏湯洗七度切作片以生薑汁浸焙乾炒各一兩檳榔陳橘皮湯浸去白焙各三分枳殻去瓤麩炒半兩每服二錢半生薑半分同煎温服不拘時候鐵刷湯方治風痰胃中有寒嘔吐痰涎胸滿氣逆附子五枚炮令微折地上以盞子覆冷取去皮臍半夏湯洗七遍去滑麩炒一兩木香半兩剉如麻豆每服二錢入生薑一棗大大棗三枚同煎空心食前温服天南星丸方治風痰胸膈煩滿頭目昏眩天南星一觔每枚重一兩者用湯浸洗刮去浮皮并虚軟處令浮用法酒浸一宿以桑柴蒸不住添熱湯令釡滿甑内氣旺更不住灑酒常令藥潤七箇時滿取出用銅刀切開㨂大者㣲嚼看不麻人口即是熟未熟即便蒸候熟用銅刀子細切入石桕内木杵爛擣如泥入丹砂一兩水飛過者麝香一兩細研羅過丁香末一兩龍腦一兩同擣令勺丸如鷄頭大又用丹砂末一兩為衣每服一丸嚼破用薄荷荼或酒任下小兒驚風半丸合時忌鷄犬婦人見前胡丸方治風痰不㪚食逆嘔吐前胡白术枳殻去瓤麩炒半夏湯洗七遍去滑赤茯苓人參各三分白礬半兩枯丁香一分為末棗肉和丸如梧桐子大每服二十丸煎生薑竹茹湯下食後服遂痰丸方治風痰壅盛每日早時多喜嘔吐人參赤茯苓乾薑半夏湯洗七遍去滑各一兩為末以粟米飯和丸如梧桐子大每服二十丸空心生薑湯下日午再服胃風論曰胃風之狀頸多汗惡風飲食不下膈塞不通腹善滿失衣則䐜脹食寒則泄注形瘦而腹大盖胃者水榖之海五臓六腑之大源因而食寒失衣則風邪入易感故證頸多汗惡風者以人迎胃脉之所動也食飲不下膈塞不通腹善滿者其經循腹裏其病在中焦也失衣則䐜脹者重感於風邪傷肌肉也食寒則泄者風寒交傷於胃故泄注也形瘦者精不營也腹大者氣不通也豆蔲丸方治胃風頸項多汗惡風飲食不下膈塞不通腹善滿失衣則䐜脹食寒則泄形瘦而腹大肉豆蔲去殻半兩羌活防風桔梗炒各一分陳橘皮湯浸去白獨活去蘆頭薏以仁人參草豆蔲去皮芎藭各半兩甘草木香各等分為細末煉蜜丸如梧桐子大每服三十丸至四十丸米飲下日三夜一厚朴煮㪚方治胃風冷氣攻心腹脹滿疼痛飲食不消四肢羸瘦厚朴薑汁灸訶梨勒煨去核各一兩木香蒼术米泔浸一宿切焙枳殻當歸桔梗炒各一兩陳橘皮湯浸去白二兩為散每服三錢棗一枚同煎温服風秘論曰風秘之病以大腸秘澀不通大腸者肺之腑通行水榖傳導所出若三焦不和風熱所摶則腸胃乾燥津液虚少糟粕結聚傳導不行令人心煩腹滿便秘不通也前胡丸方治風氣潤利腸胃前胡二兩大黄黄芩木通麻子仁芍藥各一兩一分共為末錬蜜為丸如豌豆大每服十五丸温水食前下調中丸方治大腸風熱秘澀不通大黄鼈甲醋炙黄去裙襴朴硝桃仁湯浸去皮尖雙仁麩炒各四兩皂莢五挺去皮椎碎用水一升投取汁濾過莱菔一觔椎碎絞取汁共六味將前四味為末以陳醋一升半同菜菔皂莢煎五七沸後入藥末同熬得所丸如梧桐子大每服二十丸米飲下木香丸方治腸胃風熱津液燥少大便秘澀木香半兩㯽榔剉大黄煨麻子仁各二兩牽牛子末郁李仁湯浸去皮枳殻去瓤麩炒各一兩為末錬蜜丸如梧桐子大每服二十丸温米飲下食前威靈仙㪚方治老人風氣壅盛大腸秘澀五六日方大便一次頭旋目暗發作無時威靈仙一兩酒浸焙乾羌活去蘆頭芎藭各半兩為㪚每服二錢空心葱湯調下香枳㪚方治大腸秘袪風順氣枳殻去瓤麩炒防風各一兩甘草炙半兩三味搗羅為㪚每服二錢沸湯㸃服引飲導秘丸方治風熱大腸秘澀不通心煩腹滿體熱㯽榔木香芎藭羌活桂各二兩大黄濕紙裹煨郁李仁浸去皮尖各四兩為細末錬蜜丸如梧桐子大每服二十丸漿水下茶湯亦可􅊓瘍風論曰􅊓瘍風之病其狀斑駮㸃㸃相連而大圓概似自駮而稍㣲也皆由風邪熱氣摶於脾肺二經流散肌肉使然也烏蛇散方治􅊓瘍風頸面斑駮烏蛇酒浸去皮骨炙二兩秦芁芎藭各一兩半桂羌活人參山梔子枳殻丹參沙參𤣥參犀角鎊各一兩升麻防風木通白鮮皮黄芩蒺藜子炒去角一兩苦參二兩共為散每日温酒調下三錢食後臨臥服雄黄㪚塗方治􅊓瘍風面頷頸忽生斑駮其狀如癬雄黄硫黄白礬並研如粉各一分三味合研匀以鍊成猪脂調和塗上附子散塗方治􅊓瘍風身體斑駮附子一枚大者去皮生用硫黄研半兩蒼耳苗一握乾者三味搗羅為末以米醋調先以布巾揩瘍上即以藥塗之乾再塗巴豆塗方治􅊓瘍風面頰頸項忽生斑駮如癬巴豆去皮生用一分釅醋一合先以新布揩令赤如故沙盆内用醋磨巴豆如稀膏塗於患上白駮論曰白駮之病其狀駮斑如癬過如􅊓瘍但不成瘡爾皆由風熱摶於膚腠脾肺二經不和也治白駮傳方雌黄石硫黄各一兩研如粉蛇蛻皮一條大者燒灰同研細用醋調成膏先以巴豆一粒中截以平處磨令皮起然後𫝊藥三兩徧即瘥治頭項及面上白駮漸長如癬但不成瘡宜用此𫝊方桂去粗皮一兩研為末每用半錢或一錢以津唾和𫝊於白駮上日三治面項身體白駮𫝊方鮎魚一頭約重半斤去腸肚净洗後一依鮓法用鹽椒葱粳米飯匀拌即用青荷葉裹作三包各用蒲片撃更用荷葉裏裹令大臭爛先以布拭白駮令赤次炙鮓包熱熨令汗出以綿衣包無令風冷所傷蛇蛻皮方治周身白駮漸長似癬但不成瘡蛇蛻皮一條大者炒熱挼摩白駮時時噀唾數百徧弃之田野草中鰻鱺魚塗方治頸項及面上白駮浸淫漸長如癬狀但不成瘡鰻鱺魚一條肥者炙令脂出先將白駮用物揩拭之令小痛然後用魚脂塗大蛇皮塗方治面項身體白駮風蛇蛻皮大者燒作灰石硫黄研槲皮燒作灰二錢三味令研極細以清熟漆調和勿令稠鞭薄塗白駮處欲塗藥時先以巴豆中截用平處摩令皮㣲起然後𫝊藥白癜風論曰白癜風之狀皮膚皴起生白斑㸃是也由肺臓壅熱風邪乘之風熱相并𫝊流榮衛壅滯肌肉乆不消㪚故成此疾也烏蛇散方治白癜風身體􅍙麻烏蛇酒浸去皮骨炙三兩白殭蠶炒胡麻子獨活天麻各二兩烏頭去皮臍細辛防風去乂桂枳實蟬蛻白附子炮各半兩天南星一分為㪚每服温酒調二錢不計時候治白癜風方杏仁去雙仁不去皮尖生用每日早晨爛嚼二七粒於白㸃處揩夜臥再用治白癜風方鷄子二枚和殻以米醋三升浸七日取白石硫黄研半兩附子去皮臍生用一枚重半兩者粟米二錢共四味將後三味擣羅為末以前鷄子白調如稀糊臨用藥先以葛布揩患處令赤塗之苦參膏方治白癜風苦參鹽各一分研為末先以酒一升煎至四合入藥二味攪匀慢火再煎成膏每用先以生布揩患處令赤塗之紫癜風論曰紫癜風之狀皮膚生紫㸃搔之皮起而不痒痛是也此由風邪挾溼客在腠理榮衛壅滯不得宣流藴瘀皮膚致令色紫故名紫癜風烏蛇㪚方治􅍙麻紫癜風烏蛇酒浸去皮骨炙防風羌活人參𤣥參沙參苦參丹參白附子蒺藜子炒去角各一兩為㪚每服一錢温酒調下附子硫黄㪚方治紫癜風斑㸃附子生用去皮臍一枚石硫黄别研半兩共研為細㪚入胡粉一分膩粉少許同繁柳汁和匀臨臥揩三五徧早晨温漿水洗不三五夜瘥牡蠣㪚方治紫癜風牡蠣膽礬各半兩二味生用為㪚釅醋調摩患處胡桃塗方治紫癜風并白癜風初結青胡桃一顆取外皮用石硫黄一皂子研如粉二味先取胡桃皮切研如膏入硫黄末和匀塗之羊蹄根塗方治紫癜風羊蹄根絞自然汁半合生薑絞自然汁半合石硫黄四錢研如粉三味將二汁與硫黄末同研令粘塗患處一日不得洗不過兩上差惡風論曰惡風者皆五風厲氣所致也風有青白赤黒黄之異其毒中人五臓則生蟲亦有五種蟲生息滋蔓入於骨髓五臓内傷形貌外應故食肝則眉睫墮落食肺則鼻柱倒塌食脾則語聲變散食腎則耳鳴如雷鼔之聲心不受食食心則為不可治是故謂之惡風五參㪚方治惡風人參沙參丹參𤣥參苦參木通蒺黎子烏蛇浸去皮骨炙乾蝎天麻赤箭何首烏陳橘皮各一兩黄苓半兩原蠶蛾一分並生用為散每服三錢熱茶調下服及半料即减服二錢初服三日後先覺頭項脊膂身上疼痛乃藥力與病相擊也當安臥兩復時許即無事如或身上有瘡腫服藥一日後便覺漸减何首烏丸方治脾肺風并惡風等疾何首烏石菖蒲荆芥穗蒼耳胡麻炒各一兩𤣥參沙參苦參白花蛇酒浸去皮骨烏蛇酒浸去皮骨各半兩共搗研為末鍊蜜和丸如梧桐子大每服十丸茶酒任下如要作㪚每服二錢温酒調下不計時候威靈仙散方治惡風威靈仙二兩丹參六兩羗活一兩獨活一兩蒼耳四兩仙靈脾𤣥參人參沙參各二兩紫參一兩甘草一兩生用黄芩各二兩為㪚食後臨臥温水調下一錢若身體無瘡眼瞳人不斷鼻梁不塌服之一料可差蔓荆實方治肺臓風毒發作如癩變成惡風證蔓荆實去白皮生用四兩胡麻研為末炒熟半兩天麻二兩菊花未開者良生用四兩天南星枸把生用四兩苦參研取粉四兩為散每服温酒調下二錢日三夜一每服宜去食稍遠恐藥食相犯大風眉鬚墮落論曰大風眉鬚墮落者盖癩病也皆由惡風染著榮衛不清風溼毒氣浸漬肌肉致淫邪散溢痒瘙成瘡皮膚瘍潰鼻柱倒塌鬚眉墮落枳殻散方治大風癩病眉鬚墮落熱毒風入五臓身體頭面生瘡枳殻去瓤麩炒黄蓍蒼耳白术蒴藋白蒺藜炒防風生用升麻生用梔子仁研三分漏蘆黄連人參天門冬防已乾薑芎藭丹參麻黄去根節煮去沫白芷甘草炙葛根各半兩𤣥參堅者三兩烏蛇酒浸去皮骨炙一兩共為末㪚每服温酒調下二錢至三錢空心夜臥服梔子散風治大風癩疾眉鬚墮落徧身􅍙麻手攣縮山梔子二兩半芎藭一兩半藁本三分當歸蔓荆實各一兩桔梗一兩三分羗活白蒺藜白茯苓防風各一兩三分側子天麻各半兩每日空心温酒調下二錢加至三錢夜臥時再服服至一料眉鬚再生羚羊角飲方治大風癩身上生瘡并面部浮腫眉鬚墮落四肢􅍙痺羚羊角鎊甘草炙各三分獨活山梔子仁各一兩半防風一兩枳殻黄蓍蒺藜子丹參去苗少炒𤣥參木通各分兩一每服五錢水煎温服每日早食後及夜臥各一服大風出蟲論曰蟲動物也皆風之所化風入五臟化生五蟲則成五癩入肝其蟲青入心其蟲赤入脾其蟲黄入肺其蟲白入腎其蟲黒四蟲皆可治惟黒蟲為難􅓼或所傷未㴱専意治之亦差者熟艾方治大風癩熏出蟲艾葉别揉令熟砒霜研水銀與雄黄同研膩粉硫黄丹砂研阿魏酒化去沙石麫和作餅炙附子雄黄研細入水銀㸃醋再研令星子盡始入膩粉砒霜硫黄丹沙同研各一兩麝香研半兩豬牙皂角一斤去皮研為末共十一味除艾葉皂角别搗為末外並合細研用紙四張先布次艾糝皂莢末次糝諸藥末卷刀切如餅餤著椀内燒以小木甑子籠椀以衣襯四邉坐於上熏以衣被遮壅定不令透出氣熱悶即俯伏獨活散方治大風癩出五蟲獨活三分雄黄研半兩青黛研一分麻黄去根節煮去沫半兩水銀一分與丹砂雄黄㸃醋同研以水銀星子盡為度阿魏生研一兩雷丸丹砂滑石研各半兩石膽牛黄紫石英研各一分斑苗四十枚與糯米同炒去翅足米不用芫青四十枚與糯米同炒去趐足米不用共一十四味研為散每服一錢空心温酒調下不得飽食晩更服當有蟲從小便中出或當日或三四日至十日方出若瀉出赤蟲如爛櫻桃或如豆麥或瀉出黄蟲似黄涕青蟲似青涕菜汁白蟲似馬尾蟲遇藥氣即死或隨大便下唯黒蟲如豆豉汁此為難治大風癩病論曰癩者内經為癘癘者榮氣熱其氣不清故使鼻柱壊而色敗皮膚瘍潰其證不同其始則乍寒乍熱腠理壅塞血氣精髓耗竭乆而不治令人􅍙痺汗不流泄手足痠疼面目習習奕奕胸頸間狀如蟲行身體徧痒搔之成瘡或身體錐刺不痛青赤黄黒如腐木形或痛無常處流移非一或似繩縛拘急不可俛仰眼目浮腫小便黄赤餘瀝心神恍惚而善噫也曰月浸乆其風化生毒蟲蟲既變動外先食氣血膚革不澤其内則食五臓食肝則眉睫墮落食肺則鼻柱損壊食脾則語聲㪚亂食腎則耳聞雷鼓之音食心則死推癩病率皆風與蟲之為害也羚羊角散方治大風癩疾羚羊角鎊吴茱茰湯洗焙炒各一分羗活獨活各半兩麻黄去根節炙烏蛇酒浸去皮骨蔓荆實去白皮當歸黄蓍防風附子杏仁去皮尖蒺藜子炒去角各半兩犀角鎊分一為散每服一錢空心服食前温酒調下烏蛇丸方治大風癩疾若眼脉斷指節冷落脚下有瘡語聲嗄為不可治如未有此證宜服烏蛇一條酒浸去皮骨首尾三兩檀香丁香茜根紫葛防風苦參獨活沙參梔子仁酸棗仁生用槐子白芷附子藁本防已羚羊角蒼术醋炒犀角鎊萆薢秦芁桃膠生用無荑仁炒括樓根烏藥各三分桑根白皮剉三兩木通一兩半共擣羅為末錬蜜丸如赤小豆大每服空心温酒下十丸至十五丸日二如不飲酒薄荷槐白皮湯下如要速差宜用後湯藥下桑枝湯方治大風癩疾下藥桑枝柳枝槐枝枸把根黄荆根羚羊角鎊各一兩六味並生用剉如麻豆大每服用藥五錢以水一盞半煎七分下前丸藥服一月必覺四體皮膚痒痛不可忍但宜飲酒不得搔㧓仍頻飲食避外風如有汗必腥臭及有蟲從皮膚中出如麫塵或馬尾頭髪尖或如線絲尖或如麩皮片頭黒身白形色不定但痒之後仔細看之或從小便中出或從瀉泄中出者大效此疾稍退終身禁房室又忌動風物時以苦參湯洗浴須換新衣其舊衣并牀薦等並焚之艾蒿醖酒方治大風癩病身體面目俱有瘡痍惡汗自出白艾蒿十束每束如升許大净擇水洗細剉一味煮取濃汁拌麯米一如常醖法酒熟去糟取清稍温飲之令常醺醺然天門冬丸方治大風癩病天門冬去心生用五斗研絞取汁一味内瓷器中蜜盖口以臘封勿失藥氣於净室中經一年取開其色赤如沙塘即入苦沙參粉及乾地黄末為丸如梧桐子大每服十丸温水下食後服百花煎方治大風癩疾白蜜二十兩石榴七顆甜者并皮用生薑去皮細切八兩三味先研生薑石榴絞取自然汁更濾令净入蜜盛於瓷瓶以蠟紙封口勿令通氣垂擊於釡中勿到底以重湯煎一復時成煎空心酒調二錢加至三錢日二夜一旬日内有惡物隨便而出是病根㪚矣黄精丸煎方治大風癩疾面赤疹起手足攣急身發瘡痍指節落黄精生者十二斤白蜜五斤生地黄肥者五斤三味先將黄精生地黄洗浄細剉以木石杵桕搗熟復研爛入水三斗絞取汁置銀銅器中和蜜攪匀煎之成稠煎為度每用温酒調化二錢至三錢日三夜一乆服風癩痊平面如童子延年不老婁金丸方治大風癩病金箔五十片牛黄研麝香研龍腦研白附子炮天竺黄各半兩人參白芷細辛芎藭天南星生用各三分天麻白花蛇酒浸肉炙防風各一兩半黄茋藁本白殭蠶羌活麻黄白茯苓犀角鎊羚羊角芍藥甘草炙各一兩甘菊三兩共研為細末别用生地黄汁二升蜜半觔酒一觔酥三分慢火同煎成放冷和藥末匀丸如鷄頭大每服三丸細嚼茶酒任下黄茋丸方治大風癩疾黄茋防風丹參白术白茯苓芎藭山梔子赤芍藥枳殻細辛各一兩半大復皮一兩三分升麻秦芁各二兩蒺藜子獨活苦參各三兩共為末錬蜜和丸如梧桐子大空腹煎枳殻湯下二十丸日再服烏癩論曰烏癩初覺皮膚變異肌腠之間淫淫躍躍如蟲行動眼前有物如系懸布時發驚恐言語錯亂皮肉􅂒疹如桃李實或赤或黑手足􅍙痺不知痛所或脚下痛不可踐地身體生瘡兩肘如縳此名黒癩皆由惡風日漸傷損血氣不榮所致也馬先蒿散方治烏癩馬先蒿不計多少一名馬禾蒿名爛石草細切焙乾用搗羅為㪚每服一錢荆芥薄荷湯下治烏癩浸酒方苦參根白皮五斤細剉如麻豆生絹袋貯好酒三斗冬浸七日夏浸四日每温飲二合至三合日二夜一漸加五七合露蜂房酒方治烏癩露蜂房五兩苦參四斤二味剉細用水三斗煑取一斗五升去滓浸麯四觔半炊黍米二斗如常醖法酒熟每服三合至五合日二夜一稍増無妨雌黄散塗方治烏癩雌黄半兩以米醋和鷄子清如膏塗瘡上乾即便塗白癩論曰白癩之狀語聲嘶嗄目視不明四肢􅍙痺闗節熱痛如火燔灼脊膂拘急肉如刀劈手足緩弱身體􅂒疹鼻生息肉目生白珠肉色斑白故謂之白癩也烏蛇散方治白癩語聲嘶敗四肢􅍙痺瘙痒生瘡烏蛇酒浸去皮骨炙葛根各一兩一分苦參紫參沙參人參芎藭天麻黄苓木通地骨皮防風防己白术蒴藋黄連莽草葉木蘭皮附子炮去皮臍烏頭炮去皮臍牛膝萎蕤㯽榔煨熟乾地黄芍藥桂𤣥參龍骨研石膏研升麻菊花未開者妙蒺藜子炒去角秦芁細辛去苖葉天雄炮去皮臍各一兩當歸切焙甘草炙遠志巴㦸天蒼耳花炒乾各三分吳茱茰湯洗麝香研各半兩右四十二味擣研細羅為散每服二錢空心温酒調下加至三錢晡時服白花蛇散方治白癩語聲嘶嗄目視不明四肢􅍙痺闗節熱痛身體􅂒疹鼻生息肉白花蛇酒浸去皮骨天麻槐子羌活防風晩蠶沙炒蔓荆實白鮮皮威靈仙枳殻各一兩甘草炙半兩擣羅為㪚每服一錢温酒調下不拘時候諸痺綂論論曰飲天和食地德皆隂陽也然陽為氣隂為血氣為衛血為榮氣衛血榮通貫一身週而復㑹如環無端豈鬱閉而不流哉夫惟動静居處失其常邪氣乘間曽不知覺此風寒溼三氣所以雜至合而為痺淺則客於肌膚深則留於骨髓陽多者行流㪚徙而靡常隂多者凝泣滯礙而有著雖異狀殊態然即三氣以客之則所謂痺者可得而察矣且痺害於身其為疾也初若無足治至其蔓而難圖則偏廢弗舉四體不隨皆自詒伊戚者也可不愼哉痛痺論曰寒氣勝者為痛痺夫宜通而塞則為痛痺之有痛以寒氣入經而稽遲泣而不行也痛本於寒氣偏勝則陽氣少隂氣多與病相益治宜通引榮衛温潤經絡血氣得温則宣流自無壅閼矣茯苓湯方治風溼痺四肢痛痺拘攣浮腫赤茯苓桑根白皮各二兩防己桂芎藭芍藥麻黄去根節各一兩半甘草炙一兩每服五錢棗一枚去核水煎温服連三服後以薑粥投之汗出為度天雄丸方治風溼痺皮肉不仁骨隨疼病不可忍者天雄去皮臍附子去皮臍炙各二兩桂一兩半乾薑炮三兩防風三錢為細末錬蜜丸如梧桐子大每服二十丸温酒下曰三夜一當歸摩膏方治諸風寒濕骨肉痺痛當歸細辛一兩半桂一兩生地黄一斤切研絞取汁天雄十枚去皮臍生用芎藭半兩白芷三分丹砂研一兩乾薑三分烏頭生用一兩三分松脂四兩豬脂四兩别錬去滓共十二味先將八味剉如大豆粒以生地汁浸一宿與豬脂松脂同慢火煎候煎白芷黄色以厚綿濾去滓瓷盒盛入丹砂末不住攪至凝即止每用藥用火炙手摩病處千徧著痺論曰内經謂溼氣勝者為著痺地之溼氣感則害人皮肉筋脉盖溼土也土性重緩榮衛之與溼俱留并以溼勝則著而不移也其證多汗而濡者以隂氣勝也治宜除寒溼通行經絡即差天雄酒方治寒溼著痺皮肉不仁至骨髓疼痛天雄附子去皮臍防風獨活當歸白术五加皮芎藭桂乾薑二兩剉如麻豆以夾絹囊盛用無灰清酒一斗浸春夏五日秋冬七日温飲任性加减以醉為度茯苓湯方治風溼痺自著不去四肢􅍙麻拘攣浮腫赤茯苓桑根白皮各二兩防己桂芎藭各一兩半甘草三兩芍藥當歸麻黄去根節煮各一兩半每服六錢棗三枚劈破同水煎温服如欲出汗以生薑熱粥投之汗出愼外風治風溼著痺服藥雖多肌肉猶􅍙痺摩風膏摩之方防風羗活芎藭細辛蜀椒去目并閉口當歸白斂躑躅花各半兩白芨丹參黒參桂附子烏頭皂莢莽草各一分杏仁半兩苦參一兩細剉如麻豆以米二升拌匀浸三宿熬乾同臘月豬脂二觔以文武火煎一日綿濾去滓瓷缾貯每用少許㸃摩􅍙痺處兼治一切風毒其膏年嵗深乆者尤佳龍虎膏方治風溼著痺肌肉􅍙厚不知痛痒龍骨二兩虎骨三兩酥塗炙當歸桂各一兩皂莢半斤肥者去子共為末先别用好肥皂莢十挺以苦酒三升挼取汁去滓入鐺中煎減半即入前藥同煎如稀餳入瓷盒盛每用少許揩摩􅍙痺處行痺論曰内經謂風寒溼三氣雜至合而為痺其風氣勝者為行痺夫氣之在人本自流通所以痺者風寒溼三氣合而為病然三氣之中各有隂陽風為氣善行數變故風氣勝則為行痺其證上下左右無所留止隨其所至氣血不通是也治法雖通行血氣宜多以治風之劑防風湯方治行痺行走無定防風甘草各一兩黄芩三分當歸赤茯苓各一兩秦芁葛根三分桂去粗皮杏仁炒各一兩麻黄去根節煎去沫半兩每服五錢棗二枚生薑五片酒一鐘水一鐘同煎温服山茱茰丸方治風痺遊走無常處亦治血痺山茱茰炒一兩一分生乾地黄二兩山藥牛膝澤瀉萆薢各一分天雄蠐螬車前子乾漆狗脊去毛白术地膚子各三分茵芋半兩共為細末錬蜜丸如梧桐子大每服温酒下二十丸加至三十丸皮痺論曰風寒溼三氣雜至合而為痺以秋遇此者為皮痺盖肺主皮毛於五行為金於四時為秋當秋之時感於三氣遂為皮痺盖正言其時之所感者爾固有非秋時而得之者皮膚不營而為不仁則其證然也防風湯方治肺中風寒溼項強頭昏胸滿短氣嘘吸顫掉言語聲嘶四肢緩弱皮膚􅍙痺防風芎藭麻黄各一兩獨活桂前胡五味子附子杏仁人參茯神各三分甘菊花黄茋甘草各半兩每服四錢生薑五片水煎温服蔓荆實丸方治皮痺不仁蔓荆實去浮皮三錢防風羗活桔梗白附子枳殻蒺藜子炒去角各半兩皂莢半斤新水浸一宿絹濾去滓入麫少許同煎成膏七味為末入膏中和搗丸梧桐子大每服二十丸食後熱水下天麻丸方治皮膚􅍙痺天麻二兩𤣥參没藥研地榆烏頭各一兩麝香研一分四味為末與二味研者和匀錬蜜丸如梧桐子大每服二十丸空心食前温酒下肌痺論曰風寒溼三氣雜至合而為痺以至隂遇此者則為肌痺其狀皮膚弗營肌肉􅍙痺而不仁是也西州續命湯方治肌痺津液開泄時復不仁或四肢急痛麻黄去根節煎去沬焙乾當歸切焙石膏研各二兩芎藭桂甘草黄芩防風芍藥各二兩杏仁湯浸去皮尖炒四十枚每服四錢生薑一片棗二枚水煎温服不計時候細辛湯方治肌痺淫淫如蟲行或腠理開疎汗出皮膚肉色不澤脣鼻黄細辛防風白术附子桂各一兩石膏研黄茋麻黄去根節煎掠去沫焙乾各二兩枳實去白麩炒甘草各半兩當歸一兩每服四錢生薑五片水煎温服血痺論曰血痺之狀形體肌膚如被㣲風所吹者是也盖血為隂邪入於血而痺故謂之血痺宜先鍼引陽氣後以藥之芍藥湯方治風血痺身體不仁肉冷赤芍側子桂麻黄萆薢當歸丹參各一兩細辛甘草各半兩每服三錢生薑五片水煎温服黄茋湯方治風血痺隂陽俱㣲寸口闗上㣲或只中小𦂳其狀身體不仁如賊風所中黄茋芍藥各一兩桂三分每服五錢棗二枚生薑三片水煎早晨日午晩每各一服萆薢丸方治風邪遊走無定處名曰血痺萆薢山藥牛膝澤瀉各一兩白术三分地膚子半兩山茰炒一兩狗脊三分茵芋一分熟乾地黄三兩半共為末錬蜜和丸如梧桐子大每服十丸温酒下不拘時稍加至五十丸脉痺論曰血性得温則宣流得寒則凝澀凝澀不行則皮毛萎悴肌肉􅍙痺内經謂風寒溼三氣雜至合而為痺又曰夏遇此者為脉痺痺則血凝不流可知也人參丸方治脉痺通行血脉人參麥門冬茯神龍齒遠志黄茋菖蒲赤石脂各一兩熟乾地黄二兩為末錬蜜丸如梧桐子大每服食後良乆以清粥飲下三十丸防風湯方治脉痺防風當歸秦芁赤茯苓茵芋去莖甘草炙桂去粗皮杏仁去皮尖雙仁麩炒獨活各一兩每服五錢以酒水各半生薑半分同煎服筋痺論曰經曰風寒溼三氣雜至合而為痺又曰以春遇此者為筋痺其狀拘急屈而不伸是也筋痺不已復感於邪内舍於肝是為肝痺其狀夜臥則驚飲多數小便上為引如懐盖淫氣乏竭痺聚在肝治法以筋痺為先筋痺既平則邪弗入於肝矣天麻丸方治筋風四肢攣痺天麻細辛菖蒲赤箭地榆人參各二兩附子芎藭木香各一兩桂一兩半苦參三兩牛膝酒浸二兩陳橘皮湯浸去白焙乾一兩當歸切焙赤芍酸棗仁威靈仙去土藁本防風獨活各二兩共為細末錬蜜和杵為丸如梧桐子大每服温酒下二十丸至三十丸牛膝湯方治筋痺以筋虚為風所傷故筋攣縮腰背不伸強直時痛牛膝酒浸防風丹參前胡各二兩石斛二兩半桂塗酥炙秦芁去苗上續斷各一兩半陳橘皮去白一兩大麻仁一合除大麻仁外擣篩每服五錢煎熟别下麻仁末一錢再煎空心服日二防風湯方治肝痺頭目昏塞四肢不利胸腹虚煩防風一兩芎藭黄茋五味子人參茯神獨活羚羊角鎊屑前胡各三分細辛酸棗仁甘草各半兩每服三錢大棗三枚水煎温服骨痺論曰經謂人有身寒湯火不能熱厚衣不能温然不凍慄是人者素腎氣勝以水為事太陽氣衰腎脂枯不長一水不能勝兩火腎者水也而生於骨腎不榮則髓不能滿故寒甚至骨也所以不能凍慄肝一陽也心二陽也腎孤藏也一水不能勝二火故不能凍慄病名曰骨痺是人當攣節也夫骨者腎之餘髓者精之所充也腎水流行則髓滿而骨強迨夫天癸虧凝澀則腎脂不長腎脂不長則髓涸而氣不行骨乃痺而其證内寒也雖寒不為凍慄則以肝心二氣為陽火一水不能勝之特為骨寒而已外證當攣節則以髓少而筋燥故攣縮而急也石斛丸方治腎虚骨痺肌體羸瘦腰脚痠疼飲食無味小便滑數石斛去根牛膝酒浸續斷各三分兎絲子酒浸别研石龍芮炒桂各一兩肉蓯蓉酒浸三分鹿茸去毛酥炙一兩杜仲白茯苓熟乾地黄各三分附子一兩巴㦸天半兩防風三分桑螵蛸炙芎藭各半兩山茱茰三分覆盆子半兩補骨脂蓽澄茄各三分五味子半兩澤瀉一兩沉香蘹香子各三分炒薏以仁一兩共為末錬蜜和杵數百下丸如梧桐子大每服空心以温酒下三十丸日二服􅍄乾地黄丸方治腎虚骨痺面色萎黒足冷耳鳴四肢羸瘦脚膝緩弱小便滑數補腎熟乾地黄肉蓯蓉酒浸磁石煆醋淬二兩山茱茰三分桂去粗皮附子各半兩山藥三分牛膝酒浸切焙一兩石南白茯苓澤瀉黄茋各三分鹿茸去毛酥炙二兩五味子三分石斛一兩覆盆子三分遠志三分補骨脂炒一兩蓽薢巴㦸天各三分杜仲一兩兎絲子二兩酒浸别研白龍骨一兩共為末錬蜜和杵數百下丸如梧桐子大每服空心以温酒下三十丸日三服腸痺論曰内經曰腸痺者數飲而出不得中氣喘爭時發飱泄夫大腸者𫝊導之官其所以𫝊導者皆冲和之氣今風寒溼三氣乘虚客於腸間則邪留而和氣閉矣故其證數飲而出不得中氣喘爭時發飱泄大小腸氣痺水道不通故雖多飲而不得溲便并氣於大腸使糟粕不故中氣喘爭時發飱泄也草豆蔲散方治腸虚寒溼内攻腹痛飱泄草豆蔲陳橘皮湯浸去白各一兩桂木香白术當歸切焙白豆蔲仁丁香肉豆蔲仁良薑各半兩為㪚每服一錢生薑棗湯調下食前服訶梨勒丸方治腸痺飱泄復脇脹滿訶梨勒煨用皮一兩乾薑三分當歸炒一兩黄連去鬚一兩白术一兩木香三分厚朴生薑汁炙一兩為末錬蜜和杵二三百下丸如梧桐子大每服三十丸粥飲下不拘時候周痺論曰黄帝鍼經謂周痺者在於血脉之中隨脉以上隨脉以下不能左右各當其所夫風溼寒之為痺本痺而不通今乃能周身上下者以其邪中於血脉之間與脉流通隨氣上下升䧏無礙也黄芩湯方治周痺身體不仁黄芩甘草防風各半兩秦芁葛根杏仁麩炒各一分桂當歸赤茯苓各半兩為散每服六錢水酒各半棗二枚生薑一片同煎温服日二夜一續命湯方治八風十二痺羗活三分茯神薏以仁炒各一兩每服六錢别入竹瀝一匙更煎數沸温服日二夜一醍醐方治寒溼周痺醍醐一兩每日空心以温酒五合和一匙服之大豆蘖方治周痺除五臓留滯胸中結聚益氣止毒皮毛補腎大豆蘖一升炒令香熟為末每空心温酒調下一匙再加野駞脂方治周痺野駞脂錬了濾過一斤别入好酥四兩同錬攪匀每服半匙以熱酒半盞和化服之加至一匙空心食前各一服痺氣論曰内經謂人身非衣寒也中非有寒氣也寒從中生者何是人多痺氣也陽氣少隂氣多故寒如從水中出夫陽虚生外寒隂盛生内寒人身隂陽偏勝則自然生寒熱不必外傷於邪氣也痺氣内寒者以氣痺而血不能運陽虚而隂自勝也血凝泣而脉不通故其證身寒如從水中出也温補鹿茸丸方治陽氣虚隂氣盛痺氣内寒如從水中出鹿茸酥炙四兩人參天雄五加皮五味子牛膝酒浸防風遠志石斛山藥狗脊各一兩肉蓯蓉酒浸切焙熟乾地黄各三兩蓽薢石南蛇牀子白术各三分巴㦸天天門冬杜仲各一兩半乾薑吴茱茰炒桂附子去皮臍細辛蜀椒去目并合者各三分白茯苓兎絲子酒浸别搗各一兩一分覆盆子石龍芮各二兩除兎絲子别擣外擣羅為末再拌匀錬蜜丸如梧桐子大每服温酒下二十丸加至三十丸空心食前日三補益黄茋丸方治隂盛陽虚痺氣身寒如水中出黄茋鹿茸酥炙白茯苓烏頭去皮臍乾薑各三分桂芎藭當歸熟乾地黄各一兩白术兎絲子酒浸一宿别搗五味子栢子仁枸把根各一兩半大棗去核廿枚共十五味除兎絲子别搗外同搗羅再拌匀鍊蜜丸如梧桐子大每服空心温酒下十五丸日三熱痺論曰内經於痺論有云其熱者陽氣多隂氣少陽遭隂故為熱痺盖腑臓壅熱復遇風寒溼之雜至客摶經絡留而不行遭其隂故􅍙痺熻熱而悶也升麻湯治熱痺升麻射干甘草芎藭人參各二兩赤小豆炒三合麥門冬生薑萎㽔各三兩每服四錢生地黄汁半合青竹葉十五片水同煎温服不拘時候犀角升麻湯治熱痺升麻二兩茯苓人參防風犀角鎊羚羊角羗活去蘆頭各二兩桂半兩每服四錢生薑一塊竹瀝少許水同煎温服聖濟總録纂要卷二
