皮各一兩三味細剉分作三服每服水一盞半煎取一盞去滓五更初調㯽榔末二錢至欲明不瀉至晩又一服如蟲母未下再服或瀉不止喫冷粥止之食榧實散方治寸白蟲生榧實四十九枚去皮右一味於每清旦空腹食七枚七日後食盡其蟲即化成水矣乾脯湯方治寸白蟲乾脯一片如手大石榴根東引者一握右二味並細剉以水四升浸一宿明日平旦煎至一升去滓分三服空腹先嚼乾脯一片即服藥如人行十里又一服每服藥後以手按患人腹上藥力易行其蟲自下凡服藥取月一日至五日已前蟲頭向上服良黒鉛散方治寸白蟲累取不盡久令人面黄心中如飢黒鉛沙子畫家銀塗是也一味研極細每服二三錢五更初肉汁調頓服至平明取下蟲立差玊粉散方治寸白蟲定粉一兩右一味研極細每服二錢用生麻油調於五更初頓服至晩蟲下蟯蟲論曰蟯蟲甚微細若不足慮者然其生化衆多攻心刺痛時吐清水在胃中侵蝕不已日加羸瘦甚則成痔瘻疥癬癰疽諸癩害人若此絶其本根勿使能殖則毒而治之所不可忽桃皮湯方治蟯蟲蚘蟲及痔􅉶蝕下部生瘡桃木皮乾者去粗皮槐子微炒各一兩半艾葉半兩三味𢷬篩每服三錢入棗一枚同煎空心食前夜卧各一服艾汁方治蟯蟲攻心如刺吐清水生艾葉取嫩心切二升一味𢷬絞取汁兩盞許宿不食平旦先嚼乾脯少許後頓飲汁不能盡即兩日服槐皮丸方治蟯蟲在胃人漸加羸弱槐皮乾者桃仁去皮尖雙仁生用棟實去核生用各半兩三味𢷬羅為末錬豬膏丸如人指大以綿裹導下部中治蟯蟲咬人下部痒方水銀一兩一味用蒸棗膏和丸如人指大綿裹臨卧内下部中一宿内藥時常留綿帶子在外熬漆丸方治蟯蟲在胃令人漸羸好漆醇酒白蜜各半斤三味於銅器中和勻微火熬令可丸丸如鷄頭大每服一丸宿勿食空腹温酒下蟲未下再服五臓蟲論曰五臟蟲者緣臟真衰弱熱薫蒸而成之傳所謂肉腐出蟲魚枯生蠧理固如此其名狀之異見於九蟲叙可辨而察也雷丸丸方治心臟勞熱傷心有長蟲名曰蠱長一尺貫心為病雷丸灰火炮過陳橘皮湯浸去白桃仁去雙仁皮尖麸炒各一兩一分貫衆大者去鬚半兩狼牙連苗淨𢷬一兩半白蕪荑青葙子炒乾漆炒令烟出各一兩亂髪如鷄子大一兩燒灰共九味除亂髪燒灰外八味𢷬羅為末然後與亂髮灰同研令勻錬蜜和更於鐵臼内塗酥杵令勻熟丸如梧桐子大每服空心温酒下十五丸至晩再服米飲亦得麥門冬丸方治肺勞熱生蟲其形如蠶令人欬氣喘或謂憂膈氣膈恚膈寒膈熱膈皆從勞氣所生名曰膏肓病鍼灸不至麥門冬去心十兩蜀椒去目及閉口者炒出汗一兩人参一兩一分逺志去心附子去皮臍細辛各一兩半甘草炙一兩半乾薑炮一兩桂心百部焙白术黄蓍剉細各一兩一分杏仁去皮尖雙仁焙乾炒令黄半兩右十三味𢷬羅為末錬蜜和更於鐵臼内塗酥杵令勻熟丸如酸棗子大含化稍稍嚥津桑根白皮酒方治肺勞熱生蟲在肺為病桑根白皮東引者取一升狼牙其連苗處淨刷去土三兩吳茱茰根皮束引者淨刷去土五升右三味細剉用酒七升煮至二升去滓分作三服每日空腹一服茱茰根丸方治肝勞生長蟲為病恐畏不安眼中赤東引行吳茱茰根去土三兩蠟三兩鷄子五枚去殻取黄用粳米一盞右四味除蠟并雞子外各𢷬羅為末先以銅鍋内煎蠟鎔即下茱茰末米粉雞子黄煎令煎可丸即丸如小豆大早晨煎粟米飲下五十丸小兒服二十丸蟲出即差前胡湯方治脾勞有白蟲長一寸在脾為病令人好嘔胸中欬欬即嘔而不出前胡白术赤茯苓枳殻去瓤麩炒旋復花去葉炒細辛常山松蘿各一兩半杏仁去皮尖雙仁炒龍膽去苗各一兩右十味𢷬篩每服五錢竹葉十片净洗細切同煎去滓空心温服吐之即差若腹中熱滿入芒硝半錢梔子仁一兩黄芩一兩半苦参一兩茱茰根浸酒方治脾勞勞熱有白蟲在脾中為病令人好嘔吳茱茰根東引者一尺麻子入升淨㨂陳橘皮去白炒二兩右三味先𢷬碎橘皮麻子如泥然後拌茱茰根用酒一斗浸一宿慢火上微煎絞去滓分作五服每服空心温服蟲即下欲合藥時忌言合殺蟲藥貫衆散方治腎勞熱四肢腫急有蟯蟲如菜中蟲生於腎中貫衆大者三枚去鬚乾漆炒令烟出二兩吳茱茰水洗七徧焙乾一兩半白蕪荑炒槐白皮一兩乾者杏仁去皮尖雙仁炒黄半兩胡粉炒令黄色一兩右七味除别研粉外𢷬羅為散更與胡粉同研令細每服二錢空腹用井華水調服日晚再服三蟲論曰三蟲亦九蟲之數曰蚘曰赤曰蟯是也其發動諸病較之他種為甚蚘蟲又曰長蟲長一尺動則吐清水心痛貫心則死赤蟲狀長似生肉動則腸鳴蟯蟲至細微形如莱蟲居腸間多則為痔極則為癩或生諸癰疽癬瘻瘑疥而其變甚多三蟲為患如此古人必析而治之意亦深矣鼈甲丸方治三蟲發痛面目黄不下食鼈甲去裙襕醋炙黄二兩白术一兩半陳橘皮去白一兩木香狗脊去毛各一兩半㯽榔四兩吳茱茰水浸二宿每日三次換水洗去誕乾炒一兩右七味𢷬羅為細末錬蜜和為劑置臼内入酥杵令勻熟丸如梧桐子大每日空腹煎青橘皮湯下三十丸晩食前再服天門冬煎方治三蟲􅍖定肺氣去寒熱養肌膚益氣力利水便及諸暴中偏風溼痺强骨髓天門冬去心生用十斤白蜜七兩二味先取天冬細切爛𢷬如泥用酒一斗和絞取汁并蜜攪令勻銅器中重湯上煎仍用竹箆攪候如餳每服如彈丸大空腹温湯服之或用生地黄汁一盞同煎更妙亂髪灰散方治三蟲亂髪淨洗如雞子大燒灰丹砂研如麫飛過一兩二味同研極細每服一錢醋調空腹服之雚蘆散方治三蟲神效雚蘆微炙二兩一味𢷬羅為細散每服二錢隔宿勿食於清旦用羊肉濃汁調服之蟲自下㯽榔湯方治三蟲㯽榔三枚灰火煨過一味𢷬篩用水三盞煎至一盞半去滓分三服空腹日午近夜各一服其蟲盡下或葱白鹽豉同煮飲之亦佳諸尸門諸尸遁尸飛尸尸注諸注門諸注風注走注鬼注氣注卒魘不寤中惡卒死尸厥鬼魅鬼擊諸尸統論論曰人身中有三尸諸蟲與人俱生常忌血而惡能善與鬼神通每接引外邪與人為害謂之尸病其狀沈沈黙黙不的知所苦而無處不惡或心腹痛脹或磥塊踊起或攣引腰脊或精神錯雜變狀不一有飛尸者有伏尸者復有遁尸沈尸風尸之異久不已停注留滯及死又注易傍人則為尸注之病矣諸尸諸尸病因不一其最重者惟五尸若得之疾速如飛走狀者名飛尸停遁不消者為遁尸沉痼在人臟腑者為沉尸衝風則發者為風尸隱伏積年不除者為伏尸唯此五尸之氣變態多端各各不同大率皆令人沉沉黙黙痛無常處五尸之外復有尸氣雖各有證然其為病大同小異而已亦可通一法治之雄黄丸方治五尸瘕積及中惡心痛蠱注鬼氣雄黄丹砂礬石牡丹皮巴豆去皮心麸炒研去油附子藜蘆炙去蘆頭各一兩共七味為末錬蜜丸如小豆大每服二丸米飲下食前服雄黄丸方又方治辛中飛尸遁尸沉尸風尸腹痛脹急不得氣息上衝心胸及攻兩肩或磥塊踊起或攣引脊腰雄黄研大蒜各一兩二味爛搗丸如彈子大每服一丸熱酒化下須㬰末差更服尸疹者常宜預収此藥惡氣散方治五尸鬼注百毒桂心乾薑二味𢷬羅為散每服三錢炒鹽一錢温水同調下蒺藜子丸方治中五尸腹急痛不喘息上衝心胸及攻兩脅或磥塊踊起攣縮引腰脊蒺藜炒去角二兩一味為末錬蜜丸如小豆大每服二十丸食後水下遁尸論曰遁尸謂尸伏埋染注連滯在於胸腹肓膜之間尋常如無病若因喜怒不節飲食傷動其隱之疾發則心腹脹痛連及胠脅氣喘促急不得安卧者是其証也木香湯方治初得遁尸鬼注心腹中刺痛不可忍木香三分鬼箭羽一兩桔梗一兩丁香三分陳橘皮去白炒一兩紫蘓莖葉微炒一兩當歸一兩白㯽榔火煨十四枚桃仁湯浸去皮尖雙仁炒黄色十四枚右九味𢷬篩每服五錢水煎温服日二服不計時候蒸熨方治遁尸飛尸及風毒腫流入頭面四肢芥子蒸熟焙一斤一味為末以鉛丹二兩拌之分作兩處用陳布袋盛之更換蒸熟以熨痛處飛尸論曰飛尸者其狀令人心腹刺痛氣息喘急脹滿上衝心胸是也此病忽然而至疾如飛走故謂之飛尸走馬散方治飛尸入腹脹滿刺痛氣息喘急巴豆二枚去皮心杏仁二枚去皮尖二味以綿纒椎令極細投熱湯二合指取白汁分三服飲之食頃當下老小量加之雄黄散方治一切飛尸鬼注身痛如刺雄黄甘草炙黄苓各半兩梔子芍藥各一兩共五味為散每服以温酒調下二錢再服不拘時尸注論曰尸注者尸病注易於人也多因哭泣感染尸氣流注身體令人寒熱淋瀝沉沉黙黙不的知所苦而無處不惡或腹痛脹滿喘急不得息上衝心胸傍攻兩脅或磥塊踊起或攣引腰脊或舉身沉重精神不爽每更節令愈加煩滯不治者死死則注易傍人故名尸注虎掌丸方治尸注寒熱往來不思飲食心腹刺痛虎掌丹砂炒各半兩白茯苓龍齒各一兩蓬莪茂煨剉當歸各三分右六味為末用酒煮阿魏麫糊丸如梧桐子大每服二十丸薑烏梅湯下神效蜜陀僧散方治臨尸哭泣尸氣入腹沉滯臟腑有時發動取勞積蜜陀僧半斤煆醋汁淘研控乾取六兩訶梨勒不去核生用一兩京三稜煨搗末二兩三味合研令勻每服二錢用煮麫濃湯下當晚不食卧一服餘時切餅湯服三夜次夜當下惡物不下第三夜加生牽牛子末一錢同調下杏仁丸方治尸注杏仁去皮尖雙仁炒亂髪灰各一分二味研勻和丸如小豆大每服五丸豬膏酒調下諸注統論論曰諸注者邪氣所注也皆因精神衰弱經絡空虚傷於風寒暑溼飲食勞倦或感生死之氣或挾鬼物之精初為中惡客忤卒死諸尸之類雖或暫差必有邪氣伏於經脉流傳腑臟深入骨髓經久不已皆成注病變狀多端時發時差令人昏悶無不病處若因風寒暑濕之邪所注者則為風寒注凉注冷注温注之病若因飲食勞倦之邪所注者則為食注飲注酒注水注之病若因生死之氣而為其邪所注者則為䘮注哭注轉注之病若因挾鬼物之精而為邪所注者則為鬼注邪注尸注殃注之病犯土禁為注者為土注産後得注者為産注虚勞所成注為勞注邪氣外浸為泄注凡此諸注以受病之因為名也邪注于肺則為氣注邪注於勞則為血注久注不已傷損骨髓則為骨注凡此諸注以病之所在為名也又有石注者言其牢强如石走注者言其遊走無常凡此諸注以病之形變為名也名類雖多各有形證合而言之皆注病也治注病者欲辨是非但覆紙於痛處燒髪令焦投於紙上若變粘紙者注氣引之也不粘者非注也審知其因隨證治之無專門者診脉浮大者可治細而數者難治諸注論曰諸注者邪氣停而為病也蓋由經絡空虚傷於風寒暑濕或因飲食勞倦或因大病後氣虚邪氣流注或感死氣或犯鬼邪皆至是疾其狀變易不同各隨其本而治之也赤芍藥丸方治五尸注赤芍藥一兩吳茱茰湯浸焙乾炒丹砂研烏頭去皮臍蜀椒去目并閉口者炒出汗各半兩乾薑三分桂心一兩共七味𢷬羅為末錬蜜丸如小豆大每服十丸空心温酒下日三風注論曰風注者由體虚風邪之氣客於榮衞邪氣行遊連滯停汪故名風注其狀皮肉掣振痛無常處一年之後則有頭髪墮落頸項掣痛骨拉解鳴目疼鼻酸牙蚛之證又十二風所注不同温風所注頭痛欲解髪汗風所注頭痛體熱骨節兩强柔風所注遊腫在腹或在手脚水風所注噉食服卧汗出九風所注腦轉肉裂目系痛惡聞人聲絶風所注暴倒仆口有白沬顛風所注披髪狂走遇物撃破狂風所注呌呼罵詈獨語談笑竒風所注口噤面喎四肢不隨糾風所注體生瘡睂毛墮落蚝風所注􅍙痺如蚝螫瘡或痒或痛罩風所注舉身戰動或鼻塞其狀雖異其為邪氣停注則一也安息香丸方治一切風注痛安息香研乳香研各一兩白膠香研地龍去土炒研為末各半兩胡桃仁研二枚没藥研一分桃仁去皮尖雙仁研七枚共七味同研勻為細末酒煎為丸如彈子大每服一丸温酒化下羗活湯方治風注心腹刺痛上攻胸背羗活三分大豆炒一合桑根白皮一兩半陳橘皮去白三分芎藭一兩大腹并子焙三分右六味𢷬篩每服三錢水煎温服良久再服走注論曰走注者風邪客於衛氣也風善行而數變衛氣之行慓疾滑利邪正相搏則淫溢皮膚去來擊痛逰走無常枳殻丸方治走注疼痛如錐刺皮膚風氣心腹四肢疼痛枳殻去瓤麸炒厚朴薑汁炙各一兩犀角半兩桑根白皮一兩㯽榔二兩煨柴胡一兩半半夏湯浸焙乾為末薑汁和作餅暴乾大黄醋拌炒各一兩共八味為末錬蜜丸如小豆大空心酒下二十丸鬼注論曰鬼注者忽因鬼邪之氣排擊當時即病心腹刺痛悶絶倒仆如中惡狀餘熱不歇停積彌久有時發動連滯不已乃至於死死則注易傍人故謂之鬼注玉壺丸方治鬼注風冷飲食不消心腹脹滿攻刺心痛大便不通治萬病詳千金方外臺秘要雄黄研丹砂研礜石煆附子去皮臍藜蘆巴豆去皮心炒研去油各一兩右六味為末錬蜜和丸如小豆大每服二丸米飲下取快利為度小兒以意减之八毒丸方治鬼注中惡心痛積癖蠱注鬼氣雄黄研珍珠研礬石煆牡丹皮巴豆去皮心炒去油各一兩附子去皮臍三兩藜蘆二兩蜈蚣去頭足炙一枚共八味研為末錬蜜丸如小豆大每服米飲下二丸得吐為效太極鰻鱺魚煎方治鬼注傳尸五勞七傷鰻鱺魚寸切洗淨三斤附子一兩去皮臍柴胡三分芎藭貝母去心鼈甲去裙襕醋炙當歸切焙知母荆芥穗各一兩蕪荑仁一分木香三分秦芁青蒿子小便浸一宿黄蓍木通各一兩共十五味除鰻魚外𢷬羅為末分作三貼每貼以鰻魚一觔清酒三斤於銀器内煮爛去滓入藥末一貼重煎如稀餳以淨器盛空心温酒下一錢服了夜用被蓋出汗加至一匙氣注論曰氣注者邪氣傳注藴伏於肺也肺主氣而通行表裏若為注氣所傳則其病隨氣遊衝撃掣痛上喘奔急飲食不下是為氣注之候厚朴丸方治一切氣注大腸結澀背膊刺痛氣注四肢及食物不消奔豚氣逆厚朴薑汁炙一兩桂心大黄醋炒各二兩桃仁浸去皮尖雙仁炒三兩四味為末研勻錬蜜為丸如小豆大每服三十丸米飲下食後臨卧服微利即效一方加附子一兩去皮臍桃仁飲方治注氣肩膊刺痛不移桃仁去皮尖雙仁炒酸棗仁炒人参赤茯芥桂心丁香甘草炙共七味等分𢷬篩每服五錢水煎臨卧頓服木香散方治卒注氣木香當歸白术桂心白茯苓各一兩共五味𢷬羅為散每服二錢沸湯㸃服不拘時日二卒魘不寤論曰其寤者魂交其覺也形開老弱數驚恐心氣妄亂精神慴鬱志有揺動則有鬼邪之氣乘虚而來入於寢寤使人魂魄飛蕩去離形體故魘不得寤也久不寤以致死必須得人助喚并以方術治之乃蘇若在燈光前魘者是魂魄本由明出喚之無忌若夜暗䖏魘者忌火照火照則神魂不復入乃至於死又人魘須逺呼不得近而急喚恐神魂或致飛蕩也小定心湯方治形體虚羸心氣怯弱多魘善亡茯神一兩甘草炙芍藥乾薑逺志人参桂心各二兩右七味剉如麻豆大每服五錢棗二枚同煎温服日三又方右方以蘆管吹兩耳并其人頭髪二七莖作繩内鼻孔中割雄雞冠取血以管吹喉咽中大良治卒魘方右方以鹽灌之多少在意又方右方以雄黄如棗核繋在腋下令人終身不魘治卒魘不寤方右方用伏龍肝末或末雄黄或末桂心以蘆管吹入兩鼻孔中治卒魘死方右方以井底泥塗死人目令人垂頭就井呼姓名即活此法靈異莫測又方右方勿以火照俱痛齒其足後跟及足大指爪甲即活齧其踵不覺者宜用礬石散方見卒死門中惡論曰志弱心虚精神失守忤犯邪惡令人心腹暴痛悶亂如死無所覺知故曰中惡又曰卒忤蓋隂陽否隔氣道厥逆上下不通陽氣散亂故令人不知也氣還則生不還則死久不已則變注麝香散方治卒中惡心腹刺痛去惡氣麝香一分犀角屑木香各半兩三味研為末散攪匀每服二錢空心熟水調下日再未止更服又方韭根一握切烏梅十四枚吴茱茰湯浸焙乾炒二兩半三味以净水五升煮以病人櫛内其中三沸櫛浮者生沉者死煮取三升時飲之治中惡氣欲絶不省方右方以皂角生為細末内鼻孔中一方用細辛等分取屑如胡豆大吹兩鼻治中惡氣欲絶方右方取新牛糞絞汁若無新者即以乾者汁服卒死論曰卒死者縁人有三虚一謂乘年之衰二謂逢月之空三謂失時之和賊風鬼邪之氣乘虚而入故令隂氣偏竭於内陽氣阻隔於外二氣壅閉不得升䧏厥氣上行而暴絶也氣還則復生不還則死内經曰出入廢則神機化㓕升䧏息則氣立孤危蓋謂是也扁散治卒死方溼牛馬糞絞取汁灌入口中令入喉若口噤者幹開灌之不可灌者扣折一齒下之若無新馬糞以水或人屎和乾者絞取用之又方半夏末如大豆許吹鼻中治卒死而壯熱者方白礬半斤煮令消漬脚令没踝治卒死而目閉者方騎牛臨其面搗薤汁灌耳中又末皂莢吹鼻尸厥論曰内經謂邪客於手足少隂太隂足陽明之絡五絡俱竭令人身脉皆動而形無知其狀若尸故曰尸厥蓋五絡皆㑹於耳中苟為邪所客則其氣逆厥上下暴隔五絡閉結而不通故俱竭而令人狀若尸仆焉治法宜當先刺其足中指爪甲上各一痏後刺大指内側端如韮葉後刺手心至少隂鋭骨之端各一痏立已不已以竹管吹兩耳使氣脉疎通内助五絡然後以藥石治之治尸厥脉動而無氣氣閉不通故忽然如死方右方以菖蒲末吹入兩鼻中又以桂末著舌下治尸厥方鬄左角髪方寸燒灰以醇酒一杯飲之不能飲者灌之立已鬼魅論曰心者精之合神之舍也心氣不足精神衰弱邪氣乘虚而感則為鬼魅其狀令善怒不常情思如醉或狂言驚怖向壁悲啼夢寐多魘與鬼交通病乍寒乍熱腹滿短氣不能食診其脉人迎氣口乍大乍小乃鬼魅所持之侯也治妖魅病人不言鬼方鹿角鎊屑一味𢷬羅為細散每服一錢且言則差治鬼迷不寤方雄黄研如粉一味吹入病人兩鼻中差辟諸邪祟附著及小兒驚哭恐悸方安息香一味取一皂子大焚令烟起邪自去鬼撃論曰精足則神王精耗則神衰精神耗衰血氣虚弱則邪氣易襲故爾邂逅鬼邪相遇則為鬼撃之病其得之無漸卒著人如矛㦸所傷令人胸脇腹滿急痛不可按抑或即吐血或下血輕者獲免重者或至不救治宜符禁之法兼辟邪安正之劑升麻散方升麻獨活桂心各半兩三味為散每服一錢温酒調下治鬼排撃方熟艾鷄子大三枚一味以水五盞煎取二盞去滓頓服之又方以濃酒吹灌鼻中又方以鹽一兩水三盞和攪飲之并以冷水潠之須㬰得吐即差治卒中鬼撃方鷄冠血一味􅅹口中令下咽仍破鷄以搨心下冷即棄於道傍得烏鷄尤佳聖濟總録纂要卷十五
