body:
  text: 聖濟總録纂要卷十五休寧程林纂大小便門大小便闗格不通小便不通小便不禁大小便統論論曰脾胃大小腸膀胱者倉廩之本營之居也名曰器能化糟粕轉味而入出者也蓋營受水穀之真精榮衛之根源大小腸膀胱得以變化皆營為之本是以小腸為受盛之官水榖之未分也及其化物歸於膀胱而為溺轉於大腸而為糟粕必由氣化則能出矣或隂陽之氣不平寒熱相勝或氣實塞而不通或氣虚損而遺泄或燥而結或熱而秘皆隂陽不和之病也治此者勿概以寒熱為法寒劑滌蕩熱劑枯燥反傷和氣耗其精血津液若闗格不通三焦約病責以榮衛之否塞若産後便難與夫老者秘澁之病又以津液不足止可滑以利之潤以滋之苟蕩以快劑則糟粕不通真氣受弊不可不知也大小便闗格不通論曰大小便不通者隂陽闗格三焦約之病也隂陽和平三焦升降則水榖糟粕以時傳導今隂陽偏盛氣否于中則榮衛因之以不行故氣結於腹内脹滿不通而大小腸俱閉塞也芒硝湯方治闗格不通脬腸妨悶大小便不通芒硝二兩半冬葵子炒三合滑石三兩三味除芒硝外㕮咀每服五錢水煎再入芒硝末半錢更煎空心温服茱茰湯方治腹脅脹滿闗格大小便不通吴茱茰湯浸炒大黄當歸桂心赤芍藥甘草炙芎藭各二兩人參細心各四兩桃白皮一握乾薑一兩雄黄三分珍珠末半兩與雄黄同細研右十三味將十一味搗篩每服三錢水煎再入雄黄珍珠末一字酒半盞更煎三沸空心服之車前子湯方治大小便俱不通車前子五兩生用木通四兩黄芩郁李仁湯浸去皮尖雙仁研如膏各三兩右四味将前三味搗篩與郁李仁拌勻每服五錢入芒硝半錢同煎服猪脂酒方治大小便不通猪脂半鷄子大切一味以酒一升微煮沸投猪脂更煎二沸分為二度食前溫服未通再服髪灰散方治大小便不通亂髪一兩淨燒灰一味細研每服三錢温水調食前服日三以通利為度茯苓丸方治大小便不通赤茯苓芍藥當歸枳殻白术人參各五兩大麻仁大黄各三兩共八味為末錬蜜丸如梧桐子大每服十五丸至二十丸空心煎茅根湯下治大小便不通腰脅堅脹蒸下部方蓮葉三兩葱三七莖并鬚用皂莢一挺炙剉生薑一兩切共四味以漿一斗二升煮十餘沸并滓分兩度用旋盛入小臼瓷缸中坐缸口上薫蒸冷則易之如未通再傾藥於桶斛中添熱水坐蘸下部即通小便不通論曰腎臟不足氣不傳化膀胱有熱水道不宣故小便不通也令人小腹脹滿其氣上衝心腹膨痞甚則喘急不能升䧏内經曰膀胱不利為癃者如此也滑石散方治小便淋澀疼痛不通滑石海金沙木通等分三味為散每服二錢煎燈心湯調下松煙散方治小便不通墨上好者小濃研汁半盞酒半盞葱白三莖膩粉研半錢四味同煎至七分放温去葱白頓服即通獨蒜塗臍方治小便不通獨顆大蒜一枚梔子仁三七枚鹽花少許三味爛𢷬攤紙上貼臍良乆即通未通塗隂囊上立通治小便不通久即成淋方以琥珀𢷬研成粉每服二錢濃煎萱草根汁調下空心或食前服葱湯調下亦佳杏仁散方治卒不得小便杏仁去皮尖雙仁二錢一味炒黄研細末米飲調下立差牛膝湯方治小便不通莖中痛及女子血結腹堅痛生牛膝根莖葉一握黄芩半兩當歸一兩三味細剉每服五錢水煎温服桑螵蛸湯方治小便不通桑螵蛸炙三十枚黄芩二兩二味細剉用水三盞煎分温二服相次頓服治小便不通臍下急痛脹悶欲絶鹽熨方鹽二觔一味鍋中炒令極熱布帛裹熨臍小腹以小便通快為度石韋湯方治小便不利石韋去毛瞿麥穗冬葵子各二兩滑石五兩共四味𢷬羅為散每服二錢温水調食前服治小便不通方蓬莪茂蘹香子茶葉各半兩三味𢷬羅為散水煎入鹽二錢葱白二寸同煎空心服小便不禁論曰内經言膀胱不約為遺溺亦腎虚不能約制水液故便利多甚則下焦傷竭真氣不固而小便不禁也蓯蓉丸方治腎臟虚冷腰膝無力小便不利不禁或溺白色肉蓯蓉淨刷去皺皮酒浸二宿薄切焙乾二兩半杜仲去粗皮二兩半炙紫色横剉黄蓍三兩韭子水淘去浮者焙三兩焙乾桂心二兩牛膝酒浸二兩山茱茰二兩右七味𢷬羅為細末錬蜜丸和更入臼内塗酥杵令勻丸如梧桐子大每日空心煎黄蓍湯下三十丸至晩再服鹿茸散方治腎臟虚腰臍疼冷夜遺小便鹿茸去毛酥灸令黄烏賊魚骨去甲炙各三兩當歸白芍藥龍骨研人參桑寄生各一兩桑螺蛸一兩甲劈破慢火炙令黄右八味𢷬前七味為末更與龍骨同研令勻細每服一錢酒温調服日三兎絲子散方治小便不禁兎絲子酒浸一宿焙乾微炒别研細如粉一兩蒲黄炒黄連各一兩半肉蓯蓉酒浸一兩五味子鷄膍胵黄皮炙黄色兩半共六味先𢷬四味為細散再入兎絲子粉與蒲黄同研勻細每服兩錢酒調食前服日三黄蓍散方治小便不禁黄蓍狗脊去毛牡蠣煆肉蓯蓉洒浸切焙各一兩萆薢牛膝酒浸赤石脂研山茱茰各二兩半土𤓰根三兩右九味先𢷬羅八味為散更與赤石脂同研勻每服一錢酒調食前服至午間夜卧各一服加至二錢雞腸散方治小便不禁日夜無數黄雄雞腸四具切破淨洗炙黄肉蓯蓉酒浸苦參赤石脂研白石脂研黄連各五兩共六味𢷬四味為散更與赤白二石脂同研勻細每服二錢酒調食前服日二夜一鵲巢散方治小便不禁重鵲巢中草一斤燒作灰細研如粉薔薇根皮去皮五兩二味先𢷬薔薇根為散每服三錢水煎去滓再入鵲巢灰二三錢空心服小便利多小便出血小便利多論曰腎者主水膀胱為腑今腎氣不足膀胱有寒不能約制水液令津滑氣虚故小便利多久不差則腎氣傷􅉵真元耗損腰脊痠痛身體寒顫羸乏之病生焉覆盆子丸方治元臟虚弱臍腹疼痛膝脛少力百節痠疼昏倦多睡小便頻濁頭旋痰唾背脊拘急飲食無味温順臟氣補益下經覆盆子黄蓍肉蓯蓉烏藥五味子石斛補骨脂澤瀉蓽澄茄沉香巴㦸天一兩芎藭當歸赤芍藥山茱茰各三分兎絲子酒浸三日二兩熟乾地黄兩半共羅為末錬蜜和丸如梧桐子大每服二十丸加至三十丸食前温酒下米飲鹽湯亦可補骨脂巴㦸天去心桑螺蛸炒兎絲子酒浸三日别研牛膝酒浸切焙乾薑半兩熟乾地黄一兩枳殻麩炒去瓤三分共𢷬羅為末酒煮麫糊和丸如梧桐子大每服二十丸空心食前温酒下粟米飲亦可雌黄丸方治小便滑數雌黄研如粉一兩半乾薑半兩剉入鹽四錢同炒黄色共𢷬研為末用乾蒸餅為末入水内拌和𢷬熟丸如菉豆大每服十丸加至二十丸空心鹽湯下牡蠣丸方治膀胱虚寒小便數牡蠣獨活狗脊去毛三分肉蓯蓉一兩龍骨半兩共為末錬蜜和丸如梧桐子大每服三十丸鹽湯下空心食前治小便頻數及引飲不止糯米餈方取純糯米餈一手大臨卧炙令輭熟啖之以温酒送下不飲酒人湯下多啖彌佳行坐良久待心空便卧一夜十餘行者服之即止或言假火氣温水道不然也大抵糯稻止縮水凡人夜飲酒者夜輒不溺此糯米之力也昔有人病渴殆死有人用糯稻稈及根斬去穗取中心淨器中燒作灰每用一合許湯一碗沃浸良久澄去其滓嘗味如薄灰汁乗渴令頓飲之是夜減飲水七八升此亦糯稻縮水之一騐也小便出血論曰内經謂悲哀太甚則胞絡絶絶則陽氣動中數溲血又曰胞移熱於膀胱則癃溺血二者皆虚熱妄溢故溲血不止也治宜去邪熱調心氣金黄湯方治小便出血水道中澀痛鬱金瞿麥穗生乾地黄車前葉芒硝滑石每服五錢匕水一盞半煎至七分去滓温服不拘時候車前葉湯方治小便出血車前葉茜根黄芩阿膠地骨皮紅藍花一兩每服五錢匕水一盞煎至七分温服不拘時候人參湯方治小便出血人參生乾地黄白芍桔梗當歸甘草桂心芎藭一兩淡竹茹二兩每服四錢匕水二盞煎至一盞温服不拘時候阿膠湯方治腎客熱連心小便出血疼痛阿膠黄芩各三分甘草灸半兩生地黄絞取汁車前葉絞取汁藕節絞取汁各四合生蜜一鍾將前藥𢷬篩同後四味攪勻每一大匙水一盞煎至七分温服栢葉湯方治小便出血不止栢葉甘草阿膠黄芩竹茹生乾地黄各一兩共𢷬篩每服四錢匕水一箋半同煎至八分去滓温服不計時候地黄湯方治小便出血生乾地黄兎絲子酒浸一宿晒乾别研白芷冬葵子炒當歸芎藭敗醬赤茯苓蔓荆實蒲黄一兩共為末煉蜜和丸如梧桐子大每服二十丸煎粟米飲下日三服車前子散方治小便赤色或小便鮮血車前子木通澤瀉當歸桑螵蛸桂心滑石各等分共為散每服二錢匕煎冬葵根湯下治小腸尿血方指甲半錢頭髮一分二味燒灰研勻空心温酒調一錢匕頓服大便秘澀大便不通結隂便血大便秘澀論曰大便秘澀其證皆榮衛不調隂陽之氣相持也若風氣壅滯腸胃乾澀是謂風秘胃藴客熱口糜體黄是謂熱秘下焦虚冷窘廹後重是謂冷秘或因病後重亡津液或老弱血氣不足是謂虚秘或腎虚小便過多大腸枯竭渴而多秘者亡津液也或胃實燥結時時作寒熱者中有宿食也治法須宜和順隂陽然疎風散滯去熱除冷導引補之法不可偏廢當審其證以治之麻仁丸方治大便秘難大麻仁研膏别搗大黄炒各三兩厚朴生薑汁炙二兩枳殻去瓤麩炒二兩共𢷬三味為末與麻仁同研錬蜜和杵令勻丸如梧桐子大每服二十丸空心温水下以利為度麻仁丸方又方治三焦不和臟腑虚結胸膈痞悶大便秘澀大麻仁研膏四兩大黄半生半熟四兩白㯽榔山茱茰兎絲子酒浸一宿另研車前子桂心羗活山藥枳殻防風各一兩半木香一兩郁李仁去皮研膏四兩共研為末錬蜜和丸如梧桐子大每服十五丸至二十丸温水下威靈仙丸方治大腸冷秘威靈仙不拘多少𢷬為末錬蜜和丸如梧桐子大每服十五丸生薑米飲下附子散方治大便冷秘附子炮製去皮臍削去外面留中心如棗大碾為細散蜜水調下一錢匕葱膠湯方治年老虚弱大便秘滯阿膠十片葱一握用水二盞同煎膠烊取一盞温服之立效大黄丸方治脾胃不和内有蟲滯大便秘難大黄赤芍藥三兩厚朴薑汁炙二兩枳殻兩半大麻仁别研如膏五合共𢷬四味為末與麻仁同研勻錬蜜和杵丸如梧桐子大每服十丸至十五丸食前温水下以通利為度滑石散方治大便不通腹脹氣急妨悶滑石細研二兩分二貼手足指甲剪患人自身者燒為灰研分二貼取滑石末一貼以水一盞半煎至八分去滓調爪甲灰一貼空心服至辰再服葵酥湯方治大腸閉澀大便不通冬葵子二合牛酥二兩如無猪脂代將葵子𢷬篩分四貼每貼以水一盞煎至五分去滓下酥半兩再煎二沸食前冷服摩臍方治大便不通腹脹杏仁湯浸去皮尖葱白三莖去鬚葉細切鹽一分三味同研如膏每取如酸棗大計心摩臍上三百轉須㬰即利如利不止以冷水洗手即定治病後津液燥少大便不通腸結方糯米二合炒灰存性研豬膽一枚取汁沙糖少許和研如膏内少許入下部立通治卒大便不通或熱結或風秘及婦人産後大便不通等方皂莢切去皮灸令黄熟為末白梅肉五枚蜜少許將梅肉并蜜拌和皂莢如棗大以綿紙褁引内下部中須㬰即通郁李仁粥方治大便不通郁李仁一兩去皮細研分二服用煮薄粥一碗臨熟時下郁李仁煮三兩沸傾出空心吃便通再服一分以通利為度治下部窒塞大便不通方烏梅五枚内湯中漬輭取肉熟𢷬之丸如彈子内下部中即利結隂便血詳痔門腸風下血論曰經謂結隂者便血一升再結二升三結三升夫邪在五臟則隂脉不和隂脉不和則血留之結隂之病以隂氣内結不得外行血無所稟渗入腸間故便血也地黄煎丸方治結隂便血生地黄汁小薊汁各一升沙糖一兩同上二味熬成膏地榆阿膠炙令燥側栢各二兩除以上三味外𢷬為末入膏中和丸如彈子大每服一丸水一盞煎至六分和滓温服神僊必效丸方治便血無度阿膠二兩當歸焙烏賊魚骨去甲白芍藥劉寄奴各一兩共為末錬蜜和丸如梧桐子大空心米飲下三十丸加至五十丸龍骨餅子方治臟毒血不止龍骨烏賊魚骨去甲各等分為末每服一錢匕入雞清一枚用白麺同和揑作餅子三枚煻火内煨熟細嚼温米飲送下空心食前服石榴散方治結隂瀉血不止酸石榴皮陳橘皮湯浸去白甘草乾薑炮四味等分焙乾𢷬羅為散每服二錢匕陳米飲調下日三服地榆散方治結隂瀉血地榆桑耳甘草赤芍藥各三兩艾葉三兩黄茋六兩熟地黄伏龍肝各四兩為細散每服二錢匕米飲調下食後臨卧服金屑丸方治便血一切血妄行葉子雌黄不計多少入在棗内綿繋定蒲煎湯用黒鉛一兩半鎔成汁傾入湯内同煮自早至晚不住添沸湯取出研細以盞盛飯上蒸過以煮藥棗取肉和丸如梧桐子大每服三丸煎黒鉛湯下便血甚者三服差矣金虎丸方治結隂失血黄檗一兩去粗皮用雞子清塗炙為末滴水丸菉豆温水下七丸諸淋門卒淋泠淋熟淋氣淋血淋膏淋石淋勞淋諸淋統論論曰膀胱者州都之官津液藏焉氣化則能出矣位處下焦與腎表裏分别清濁主出而不納若腑臟氣虚寒熱不調使氣不化而水道不宣故為淋閟之病矣諸淋之證大體緣腎臟氣虚膀胱有熱唯冷淋為異善治此者當熟察之卒淋論曰卒淋者縁下焦有熱傳入膀胱其候卒然小腹急痛小便淋澀痛故謂之卒淋葢下焦在臍下當膀胱上口主分别清濁主出而不納以傳道也今熱在下焦故其病如此瞿麥湯方治卒淋通利小腸瞿麥半兩木通赤茯苓陳橘皮各一兩去白滑石碎一兩半冬葵子妙一合甘草炙桑根白皮各半兩共八味𢷬篩每服三錢入葱白二寸同煎温服茅根飲方治卒淋結澀不通利茅根木通各三兩石葦拭去毛黄芩冬葵子當歸芍藥滑石碎各二兩亂髮雞子大二握燒灰共九味𢷬篩每服三錢水煎温服不拘時黄蓍飲方治膀胱虚熱小便卒暴淋澀黄蓍人參白茯苓旱蓮草滑石研各一兩桑白皮黄芩枳殻麸炒芒硝共九味𢷬篩每服三錢水煎温服黒金散方治卒淋不通好細墨燒一兩一味為散每服一錢温酒調下不拘時候茯芩湯方治小便卒淋澀赤茯苓三兩滑石石韋去毛瞿麥穗蒲黄各二兩榆白皮二兩冬葵子二合共七味𢷬篩每服五錢水煎温服食前冷淋論曰腎與膀胱為表裏下通於胞宣行水道腎藏虚弱冷氣客於下焦邪正交爭滿於胞内水道不宣故其狀先寒顫然後便溺成淋謂之冷淋也菝葜飲方治冷淋寒顫澀痛菝葜土𤓰根黄蓍地骨皮五味子各二兩人參牡蠣煆各一兩半石膏四兩共八味𢷬篩每服五錢水煎温服黄蓍丸方治腎虚膀胱冷淋不利黄蓍剉黄連土𤓰根各二兩半𤣥參三兩菝葜鹿茸去毛酥炙各二兩牡蠣一兩桑螵蛸人參五味子各一兩半右十一味𢷬羅為末錬蜜丸如梧桐子大每服二十丸鹽湯下不拘時兎絲石脂散治冷淋兎絲子酒浸别研白石脂牡蠣煆研各二兩桂心土𤓰根各一兩右五味研為散每服二錢煮麥粥飲調下空心食前服兎絲子散方治冷淋小便多或不禁兎絲子酒浸一宿别搗一兩蒲黄黄連一兩硝石半兩肉蓯蓉酒浸一兩雞膍胵黄皮炙一兩半五味子一兩半共七味𢷬羅為散每空腹温酒調下三錢服日二熱淋論曰三焦者水穀之道路也三焦壅盛移熱於膀胱流傳胞内熱氣併結故水道不通利而成淋也其狀溲便赤澀或如血汁故謂之熱淋滑石散方治熱淋小便赤澀疼痛滑石研三兩括蔞根三兩石韋炙去毛半兩三味𢷬羅為散每服一錢煎小麥湯調下不拘時車前子散方治熱淋結澀不通車前子炒牛膝各一兩桑根白皮三兩蒲黄一兩共四味𢷬羅為散每服二錢煎葱湯調下不拘時四汁飲方治熱淋小便赤澀疼痛蒲萄自然汁蜜生藕自然汁生地黄自然汁各五合四味和勻每服七分一盞銀石器内慢火煎沸温服不拘時候瞿麥湯方治心經壅熱小便淋澀赤痛瞿麥穗三分茅根冬𤓰子各半兩葵子木通一分黄苓六錢竹葉一把滑石研一分為末分作三貼共八味除滑石外𢷬篩分作三劑每貼用水三盞煎去滓入滑石末一貼攪勻分温二服食前氣淋論曰腎虚則不能制小便膀胱挾熱則水道澀腎虚膀胱熱則胞内氣脹小腹堅滿因至淋澀之疾也其候出少喜數尿有餘瀝亦曰氣癃診其脉少隂脉數者則為氣淋木通湯方治氣淋結澀不通木通一分木香半兩生用細辛一分草豆䓻三枚人參半兩赤茯苓三分桃仁去皮央雙仁半兩肉豆䓻二枚去殻共八味𢷬篩每服三錢水煎温服不拘時桑白皮湯方治氣淋結澀溲便不利桑白皮一兩半茅根二兩半木通乾百合各二兩四味𢷬篩每服三錢水煎温服不拘時候海金沙散方治氣淋結澀不快海金沙别研二兩滑石研甘草山梔子仁各一兩四味將甘草梔子仁為散入餘藥再研勻每服一錢茶清調下不拘時通神散方治氣淋結澀不通粟米一合故筆頭二枚燒灰馬蘭花七朶燒灰三味為散温酒調下二錢如不可忍者連服三服貝齒湯方治因氣成淋小便痛或溲血或如豆汁貝齒研一枚冬葵花研半合石膏一兩半滑石一兩右四味㕮咀如麻豆大每服五錢水煎再入猪肪脂少許再同煎數沸空腹温服血淋論曰心主血氣通小腸與膀胱俱行水道下焦受熱則氣不宣通故溲便癃閉而成淋也熱甚則搏于血脉血得熱則流行入于胞中與溲便俱下故為血淋也白茅根湯方治血淋小便出血疼痛白茅根芍藥木通車前子各三兩滑石碎黄苓各一兩半亂髪燒灰半兩冬葵子微炒半兩共八味嚋篩每服三錢水煎温服日三雞蘓湯方治血淋雞蘓一兩半石膏碎淡竹葉切木通甘草生滑石小薊根各一兩生地黄半斤共八味