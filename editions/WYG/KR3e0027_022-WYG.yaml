body:
  text: 聖濟總録纂要卷二十二休寧程林纂傷折門打撲損傷論曰打損撲傷或焮腫疼痛或血出不止外須以貼熁塗傅内須服去瘀血養肌肉和血氣之劑次則生肌斂口傅之以俟平復此治損傷之大法也骨碎補散治打撲損傷筋骨皮肉發熱疼痛骨碎補白芷乳香去油生地當歸一兩澤蘭葉川芎桂心桃仁五錢甘草附子一分共為細末温酒調下三錢頃又服地黄湯治墜墮傷折手足痛生地川歸一兩阿膠白芍兩半川芎熟艾一兩骨碎補一兩桂心甘草五錢水煎五錢温服日二二竒湯治打撲損傷威靈仙骨碎補各五錢作一服酒煎盡量飲盖暖出汗即愈囘生散治打撲損傷疼痛大茴官桂烏藥紫荆皮甘草各一錢右為末每服五分好生酒送下盡量飲取汗避風瘦人三分大便出血即愈被傷絶筋論曰被傷絶筋者須觀其輕重治之接續之法要在氣血未冷之際外用續筋止痛藥傅裹内兼服藥調治庶幾可救緩則風冷入于裏則難治矣聖功散治筋骨傷折疼痛不止接骨續筋硃砂明雄乳香沒藥俱去油各一錢麝香一字土蟞十枚燒酒浸死焙乾右為細末磁缾封貯勿令洩氣用時強盛人服一字瘦弱人服半字燒酒調下未愈再服没藥散治跌打損傷骨折筋絶乳香去油没藥去油琥珀二錢土蟞三箇燒酒浸焙明礬一錢硼砂一錢麝香三分半兩錢一箇醋淬七次蟹爪肉熟三錢活牛角刮取炒黄色二錢右為細末每服五分白酒送下在下部食前服在上部食後服諸骨蹉跌論曰諸骨蹉跌者墜墮倒撲傷折致諸骨蹉跌治之須扶骨對正用止痛生肌接骨之劑封裹内服藥調治倘骨碎者便當出之否則膿血不絶肌肉亦不能収斂則難愈也接骨紫金丹乳香炙去油紫荆皮骨碎補大黄血蝎歸尾硼砂土蟞燒酒浸死瓦焙乾自然銅煆淬七兩次各一右為細末每服七分半熱酒調服其骨自接此方治打撲骨折瘀血攻心發熱昏暈其瘀血自下吐血等症皆可服之如骨接而諸症未去者去土蟞自然銅更服五分即愈傷損止痛生肌論曰傷折之候皆因刑杖跌撲損傷或焮腫痛或血出不止大抵最忌服冷物恐血凝入心之故内服之劑要在温補和血止痛為主至於斂口生肌之外用豈可偏廢哉虎骨散治打撲損傷疼痛不止并治筋骨疼痛血風走注疼痛皆治虎骨炙自然銅醋淬七次地龍水浸晒乾牛膝漏蘆延胡索威靈仙龜板炙桂心當歸各一兩共為細末每服一錢煖酒調下生肌散治打撲墜墮損傷諸骨蹉跌筋絶血出疼痛不止傅之即愈并治一切癰疽腫毒膿水將盡時用之去腐生肌金瘡刀斧傷血出疼痛不止者傅之神妙白蠟合歡皮乳香去油赤石脂煆沒藥去油血蝎海螵蛸去殻雄黄龍骨煆兒茶獐腦各二錢土蟞焙乾三枚蟹爪肉熟白芷枯礬各一錢硃砂一錢麝香一字金箔少許右為細末磁罐収貯每用少許傅傷處立能止痛止血合時須五月五日或天醫日合為妙傷折貼熁并膏藥論曰傷折之症輕則肌膚腫痛重則肉脱血出既整其骨内服去瘀生肌之劑外必以貼熁膏藥并用可也接骨方治打撲墜墮損傷手足骨折用雄雞一隻約一斤重者生去毛生去爪嘴開腹底乗生氣即搗爛用五加皮研末和入搗之以勻為度勿太爛勿過乾用時先以五加皮煮無灰老酒飲至極醉將骨折處用手按平將雞藥傅上棉帛縛之如今日此時縛至明日此時解開其骨即生滿矣如過一時其骨即長一寸如骨接後而尚痛者以黒豆炒焦色用老酒沃之搗爛傅上半日一換糟米塗治跌打損傷疼痛糯米一升酒麯三丸將糯米煮熟如飯入酒麯和匀乗熱塗上用帛封裹三日一換酒香即愈龜板膏治打撲損傷疼痛敗龜板一枚燒灰虎骨燒灰白芥子生大黄川歸五錢滴乳香炙沒藥炙一分右為末研匀用小黄米粥攤帛上摻末一匙裹損上以竹片夾定繩縛七日雜􅓼門中藥毒論曰炎帝嘗百草而著本經分上中下三品聖功極矣漢唐以來漸増致千百種之繁盖無毒之中而有有毒者後代庸民去聖已逺不審良惡偶誤餌之經云有病病當無病胃傷不急救之漸致危斃古方用甘草菉豆能解諸毒亦用諸藥而各相制伏者冬青汁飲解砒霜毒先用白蠟為末和新汲水服之䕶其腸胃仍以冬青葉搗汁灌之以大便去毒為度如冬月無葉以根搗汁和水代之解中砒霜方羊血雞血各一鍾和勻服之又方稻稈燒灰新汲冷水淋汁濾清冷服一碗毒即下黄連湯解中巴豆毒黄連黄栢各五錢水二升煎一升候極冷服之忌服熱物仍以冷水浸兩手又方寒水石一味為末煮汁飲之解烏頭附子天䧺毒逺志一兩防風五錢水煎汁飲之服諸石藥中毒解方白鴨屎汁水和服之解中大㦸毒方石菖蒲一味煎汁服二升差或生搗汁更妙解芫花毒方防風甘草防己等分三味水四升煎二升服之解射㒺毒方藍汁大豆菉豆二合藕汁一鍾二豆煎汁和勻服之解甘遂毒方大豆五合水三升煎升半服之食毒論曰飲食雖以養生亦有時而傷生何也凡食物諸品莫不有陰陽五行具焉漫不察其寒温燥濕之性順逆宜忌之因人性南北異稟食物南北異種一或犯之棘喉潰腹可不慎與倘誤中其毒宜服藥解之解一切飲食毒方大豆五合大粉草五兩微炒二味搗細用水四升煎二升温服須㬰或吐或㵼毒即隨去雖甚渇不可飲水又方治誤飲饌中毒者未審中何毒卒急無藥可解薺苨甘草一兩水二升煎一升服之入口便活食諸菜蕈菌中毒論曰諸菜雖地産陰物而能養生然氣有寒濕性有善惡偶不審辨之其不為禍也幾希如諸蕈菌夜有光者煮不熟者煮訖其湯照人無影及欲爛無蟲者皆不可食倘誤中其毒以地漿諸藥解之解食諸菜毒方治食諸菜中毒發狂煩悶吐下欲死葛根生搗汁一升服之良或無生者即搗乾葛末水和服之煮服之亦可治食諸菜毒方苦參二兩甘草一兩苦酒二升同煎數沸去滓服吐出即愈治諸菌毒方地漿水掘地作坎以水沃其中攪之令濁俄頃取之飲三四鍾即解又兼治楓樹菌誤食之令人笑不止飲之即解又方橄欖七枚去核搗為泥服之又方防風二兩甘草一兩用水四升煎至二升須冷飲即解解食諸蕈毒方木香青皮等分為末煎湯飲之飲酒中毒及大醉不解論曰本草謂酒通血脉厚腸胃禦霧露瘴氣敵風雪寒威惟糯米麵麯為良隨處出者名多不一或用諸燥藥為麯皆大熱有毒惟菉豆能解之若恣飲過多助火亂性腐腸損身倘中其毒及大醉不解者急宜服藥解之黄連解毒湯治縱飲熱酒中酒毒煩亂躁渇引飲面赤眼紅小便澁少黄連黄栢黄芩山梔仁等分水煎五錢温服解酲丸方葛花一兩桂花菊花五味子烏梅肉五錢共末蜜丸彈子大每用一二丸預先化下能解酒毒若已醉者服之能解飲燒酒醉死急救方先用冷豆腐厚傅胸膈以䕶其心仍急用清水煮滚用鍋數箇取氣汗水三鍾徐徐灌下即解治酒醉不醒方甘草五錢菉豆去殻一合水二升煎一升温服又方甘菊花九月九日採取陰乾為末清飲調下三錢酒醉不醒方葛根生搗汁飲一二升即差又方菘菜子二合細研井華水一鍾調為二服食牛馬猪犬魚蟹中毒論曰天産屬陽地産屬陰禽獸皆陰陽生物氣味各有冷熱之殊性有好惡之異大抵諸肉補陽能助起濕中之火素問云膏梁之變足生大丁故諸肉如熱血不斷落水不沉及病牛壊馬魚目有睫目能開合腦有連珠鰕煮不灣蟹腹有毛及諸肉形色異常皆有毒不可食孔子色惡不食臭惡不食者此也倘中其毒宜服藥解之解一切牛馬肉毒方大粉草細切㣲炒搗細量病人喫得多少酒取無灰酒一處研去滓温服須㬰大吐㵼毒亦隨去雖十分渇不可飲水飲水難救解中雞子毒方醇醋飲三四口即解治食狗肉不消心下堅硬或䐜脹口乾忽發熱妄語方韭根杏仁一兩蘆根三兩水四升煮取二升飲之治食魚肉毒方苦參三兩以苦酒一升煎三五沸去滓服吐出即愈解諸魚毒方陳橘皮二兩水三升煮取升半去滓服即愈又方蘆根三兩剉碎水三升煮一升飲之即解治河肫毒解方扁豆五兩水四升煮汁二升服之即解又方橄欖十枚水二升煎汁一升服治解鼈毒方黄茋呉藍等分水煎一兩服之即解治蟹毒方冬𤓰生取汁飲一二升即解又方紫蘇一握搗汁一升飲之差如無生者乾者煎汁飲之又方乾蒜七枚煮汁飲之即愈解金銀銅鐵石毒治誤食金銀銅鐵方蠶豆炒研為細末砂糖調服即從大便出解金毒方斑鳩肉治如食法煮食之解或鷓鴣肉食之又方治吞金欲死鴨一隻殺取血飲之即解解金銀銅鐵毒雞屎水淋取汁服之或鴨屎汁亦可解鐵毒方磁石為末水服三錢蠱毒論曰蠱毒者嶺南人多作之凡病人中蠱其狀令人心腹切痛如有物咬或吐下血不即治之蝕人五臟盡即死欲知是此當令病人吐水沉者是浮者非亦有以蟲蛇合作蠱藥著飲食中使人病瘕此一種一年死治之之法當服藥使呼蠱姓名即去亦有服諸藥而制伏者蠱毒方治卒中蠱毒下血如鵞肝晝夜不絶臟腑壊敗待死敗鼓皮燒灰酒服三錢須㬰自當呼主姓名即差試中蠱毒方雞子一枚煮熟去殻以小銀簪一枝挿在蛋内含口中一頓飯時視簪蛋俱黒即是中蠱倘若人與飲食以犀角攪之有白沫泛起即有毒也用後方石榴皮飲治中蠱毒石榴根皮東引者剉一兩煎濃汁飲之即吐出活物又方治中蠱毒吐下血如爛肝苦瓤一枚水二升煮取一升服立吐即愈又方煮苦瓠令消服神騐治蠱毒神騐方胡荽根搗爛絞汁半升和酒服之立下治蠱毒神騐方玳瑁以水磨濃汁飲服一盞即解治中蠱毒或吐下血如爛肝方蚯蚓十四枚以苦酒二升漬之蚓死但服其汁已死者皆可活治蝦蟆及蝌蚪蠱得之心腹脹滿口乾思水不能食悶亂大喘而氣絶方車轄脂半升和温酒一升漸漸服之其蠱自出又方刺蝟皮燒過為末水服三錢當吐出毒治蠱毒方牡丹根搗羅為末每服一錢日三良治中蠱毒方胡荽子五合酒二升煮汁一升服之狗咬治狗咬方甘草杏仁一兩紫蘇五錢水四升煎去滓温服更以三味末傅咬處又方生鐵不拘多少煮令有味洗之又方乾薑為末内瘡中立差猘犬齧論曰猘犬齧者犬發狂疾跑躁齧人若中之令人疼痛不止發狂如犬聲不急治之亦能殺人男子過三日不治婦人過五日不治治猘犬齧方地榆一兩水二升煮汁一升飲之兼為末傅瘡上每服末三錢白湯下日三服忌酒若瘡已差者搗生韭汁飲三升又方治猘犬齧瘡礬石為細末摻内瘡中裹之立止痛其瘡即愈又方生地黄搗汁飲四五合并塗瘡口治猘犬齧方小兒胎髪炒新香附野菊花研細末酒調服盡醉又方䑕屎二升燒存性為末傅瘡上蛇螫論曰諸蛇螫人如青竹赤練虺蛇地匾之類皆有大毒倘中人不急治之則能殺人也雄黄散治諸蛇毒螫人欲死佩之兼辟蛇毒雄黄乾薑各等分共為細末傅螫處如辟蛇毒用小絹袋盛繫臂上男左女右蛇聞藥氣逺避香白芷散治諸蛇螫辟蛇毒香白芷雄黄蓼根各等分麝香少許共為末醋調傅螫處立愈欲辟蛇焚之即逺遁去一方用菊花根汁調傅尤妙治一切蛇螫方金線重樓水磨少許傅螫處又為細末酒調飲之治毒蛇螫人方地榆根搗爛絞汁飲之兼漬之治蛇入口并入七孔中方母猪尾尖割斷瀝血滴口中即出治蛇螫方鳯僊花搗爛傅之即愈辟蛇方若蛇到燒羖羊角令有烟出蛇即去矣治蛇齧方人糞先以火酒洗過次以糞傅齧處差治蠍螫人方活蜘蛛一枚爛研取汁傅之即差治九里蜂螫方處士劉湯隱居王屋山曽見一大蜂誤落蛛網為蜂所螫墜地俄頃蛛腹脹欲裂徐徐行入草中咬開芋梗以傷就咬處磨之良久腹漸消輕走如故自後有被蜂螫者將芋梗𫝊之即愈治蜂螫人方羊酥傅之即愈蜘蛛蟲等咬傷方綉鐵即鐵上鏥衣取和獨蒜磨傅咬處治蜈蚣咬傷方取活蜘蛛一枚放咬處則能吸其毒如蜘蛛死痛未未知更著生者以愈為度又方蝸牛挎取汁滴入咬處又方苦參末百齒霜即頭垢膩二味酒調傅之治蜈蚣咬方桑白皮生者取汁和白鹽傅之溺水死論曰凡溺水死心氣尚温而脉未絶者宜換去濕衣以厚衣裹之灌以熱湯可活切忌火烘恐寒熱相搏之故若或犯之則不能救也治水溺死灸法艾炷如黄豆灸臍五七壯如不應移上一二分再灸數壯可活溺水死方皂角為末綿裹内穀道中須㬰出水即活自縊欲死治縊死灸法凡自縊死用麵塊塞糞門勿急剪繩用二人扶定將繩解鬆用艾火灸臍七壯如不應移上一二分再灸只在上下臍孔間不住灸至數十壯猶有活者不可因臍傷釋手至囑至囑令數人搓手心脚心熱更好五絶散治自縊死併溺死半夏一兩搗篩為末丸如豆大内鼻中即愈心温者一日可治治自縊死方梁上塵如大豆各内一筒中四人各一筒同時極力吹兩耳鼻中即活治自縊死定安心神徐緩解之慎勿割繩斷抱定心下猶温者雞冠血刺取之滴口中即活男雌女雄又方雞屎白如棗大酒半盞和灌之及鼻中佳聖濟總録纂要卷二十二
