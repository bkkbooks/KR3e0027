body:
  text: 聖濟總録纂要卷二十五休寧程林纂小兒門小兒初受氣法小兒受氣在娠一月胚二月胎三月血脉生四月形體成五月動六月筋骨立七月毛髪生八月臟腑具九月榖氣入胃十月百神備而生生後六十日目瞳子成能頦笑識人百日任脉生能反覆百八十日尻骨成能獨坐二百十日掌骨成能匍匐三百日髓骨成能倚立三百六十日為一期膝骨成乃能行立此是定法若有不依期者必少夀也小兒相法兒生枕骨未成者能言而死膝骨不能成者能踞而死掌骨不成者匍匐而死踵骨不成能行而死胸骨不成者能立而死又初生頭四破者不成啼聲散者不成汗不流小便凝如脂者不成此其大略也浴兒法初生浴兒用猪膽汁一枚投湯中令終身無瘡疥湯中勿加生水浴訖斷臍生三日浴法桃李梅根二兩水煎浴之去不祥令無瘡疥或入麝香少許虎頭骨湯浴法鎮心安神永無驚風顛癎瘡疥癰癤之患虎頭骨五兩赤金十兩白芷二兩苦參四兩水煮入猪膽汁浴兒口噤論曰凡兒初生便口噤不能飲乳者此由在胎時母臟腑有熱薫蒸胞胎熱氣入兒心脾致初生後熱結于口㸃生口中如黍米大令兒不能吮乳名曰口噤竹瀝飲治口噤體熱竹􅅹一合水頓令温分三服徐徐灌下差又方治小兒口噤病在咽中如麻豆許令兒吐沫不能哺乳雄䑕屎一枚研塗舌上與兒飲差撮口論曰小兒初生未滿七日面赤喘促啼聲不出乳哺艱難名曰撮口盖因胎中受風挾熱始生之時氣血未定洗浴當風掤抱失宜致成斯疾最為急切宜速治之麝香散治初生胎熱撮口麝香丹砂一分蛇脱一尺許炙赤研共研津液和塗兒唇口上五七次牛黄竹􅅹散治胎風熱撮口發噤牛黄一分竹􅅹半合用􅅹和黄一字服之三四嵗兒服二字良鵝口論曰小兒初生口中有白屑如粟米狀鼻外有瘡至舌上又生瘡謂之鵝口此由胎中稟受榖氣偏多既生之後心脾氣熱上熏于口致成斯疾盖心主舌脾之絡脉散于舌下故也爪斷法治小兒初生連舌下有膜如石榴子者中膈連舌下致令兒語不發舌不轉也以爪甲摘斷令㣲有血出無害若血不止可燒亂髪灰塗傅即差鵝口栗房用井華水濃煎汁以綿纒筯頭拈拭之如無栗房以木代用白礬散治鵝口不能吮乳白枯礬丹砂一分同研細𫝊舌上日二夜一又方白鵝屎用水絞取汁􅅹塗口中舌上下良重腭論曰小兒初生上腭有物脹起若懸癰或如蘆蘀盛之狀者名曰重腭此乃脾胃挾熱血氣不能収斂令口中舌下或在腭頰如吹脬速宜以綿纒長針㣲露鋒芒刺腫上決去惡血則其病可消若再生再刺不爾則脹滿口中妨害乳食呼吸不可少緩也二乳飲治小兒重腭驢乳猪乳二合以二乳和煎頻服一二匙良又方治小兒重腭蛇脱露蜂房各燒灰研勻塗口中差日二臍風論曰初生斷臍後臍瘡未愈不可令犯風邪及浴水入瘡濕冷掤抱皆致臍風其候臍腫多啼甚則風行百脉口噤不乳身體反強乃致不救錦白散治初生七日臍風發腫欲落者錦帛燒存性一錢研雄鼠屎七枚炒研麝香少許大棗肉三分共末臍欲落不落用末𫝊之忌見外風川栢散治臍風汁出不止川栢兩半亂髪灰一分釡黒煤三分共研末傅上良解顱論曰腎為一身之骨髓腦為髓海若腎氣和平則骨髓充足骨髓充足則顱􅇟圓滿若腎氣不足則骨髓不充年雖長大其頭縫尚開故名曰解顱又名􅇟解細辛散治解顱細辛桂心乾薑炒五錢共末用乳汁和傅􅇟上日二三封􅇟散治􅇟門開解栢子仁細辛白芨防風一兩草烏五錢共末乳和傅開處蟹足散治􅇟門開解蟹足炙白斂五錢共研末用乳汁和傅開處日二甘菊湯治小兒鼻中多涕是腦門為風所吹甘菊花炙甘草一兩防風五錢山茰肉四錢水煎二錢服日二合􅇟散治􅇟門不合防風白芨栢子仁一兩共末用乳汁和塗以合為度日二三雞血塗治腦長􅇟不合丹雄雞就兒􅇟上刺冠令血滴􅇟上以赤芍藥末粉之日二蛇脱膏塗治腦長髪大􅇟開不合臂脛不能勝頭蛇脱燒灰研末以猪頰骨髓少許和塗上日二次差􅇟陷論曰人之冲氣内團于胃上通于頂􅇟小兒胃氣冲和則腦髓充足􅇟頂自合若胃熱薫蒸腑臟竭渇而引飲或致泄痢則腑藏血氣虚弱不能充髓腦所以􅇟陷也生地散治小兒臟腑壅熱氣血不榮致􅇟陷者懐生地二兩酒洗烏雞骨酥炙一兩共為末用米飲下一錢日二兒小者服三五分以差為度狗頭骨塗治小兒胃虚氣血不充􅇟陷雄狗頭骨酥炙黄研末以雞子白和塗􅇟上日二三以差為度地黄丸治小兒胃虚血氣弱不充足􅇟陷懐熟地白术白芍藥川歸五錢桂心一兩共末入蜜丸如黍米大飲下一二十丸日二急驚風論曰小兒急驚之狀身體壯熱痰涎壅滯四肢拘急筋脉牽掣項背強直目睛上視牙闗𦂳急謂其發動掣急故名急驚此因心絡受邪所致盖心藏神而主血小兒血氣不和宿有實熱若為風邪所乗則熱盛血亂血氣相并則神舍不安故卒然而驚古人所謂陽癎是也龍齒散治小兒急驚風四時傷寒壯熱口焦乾目翻露搐搦昏迷龍齒二錢丹砂麝香五錢鉛霜三錢共末研勻用水煎金銀葱白湯下三五分汗出立愈黒神丸治小兒急慢驚風牛黄麝香氷片青黛五分膩粉二錢蘆薈京墨使君子白麵一錢共研陳米糊丸芡實大薄荷湯下一丸蝎稍散治小兒急慢驚風蝎稍烏頭尖七枚丹砂五分附子生一分半夏一枚共末栁枝湯下慢驚風論曰小兒慢驚者癎病發于陰也由在胎時稟受不足心氣虚弱外中風邪入于臟腑其發則手足瘈瘲頭目摇動牙闗𦂳噤神情如醉休作有時潮搐不定謂之陰癎治則外以灸法内以藥餌臨機應變可謂上工若症見息髙魚口泄瀉遺尿者皆所不治羌活丸治小兒慢驚風兼内外俱虚羌活防風人參獨活桂心一分硫黄水銀二錢白附子五錢全蠍白殭蠶一分共末棗肉丸小豆大防風湯下一二丸全蠍散治小兒慢驚風兼内外俱虚全蠍五枚乳香細辛一分青黛白附子五錢共末冬𤓰子湯下珍珠丸治小兒慢驚風珍珠牛黄丹砂雄黄膩粉一分共末研勻用陳米糊丸小豆大用薄荷湯下五七丸日二睡脾散治小兒慢驚風人參半夏膽星山藥全蠍薄荷一分桑螵蛸四枚共末入麝香少許拌勻用粟米飲下五分釣藤煎治虚風慢驚釣藤防風川芎天麻麻黄一分蠍稍荆芥穗蟬脱五錢氷片麝香一字白殭蠶薄荷心各二十一枚共末入蜜杵丸皂子大用荆芥薄荷湯下一丸天竺黄散治小兒慢驚風經久不差天竺黄人參使君子炙甘草蠍稍胡黄連一分氷片麝香五分半夏薑炒二枚藿香五分共末蜜湯下三五分天瘹論曰小兒卒然驚悸眼目飜騰壯熱不止四肢抽掣上仰如釣縛之狀名曰天瘹乍作乍止此風熱痰涎之所發也良由乳母恣噉五辛熱酒之類毒熱氣流入乳中因即乳兒兒飲熱乳腑臟風熱脾胃生涎痰涎既生必壅滯不得宣通致令心神不寧為天瘹之病赤靈丸方治小兒天瘹癎病急慢諸風丹砂研水飛過人參各一兩為末酸棗仁研二兩乳香研半兩白麵二錢生蜜和膏入新竹筒内以油紙封扎定坐飯甑上炊俟飲熟為度分作三十丸每一丸分四服薄荷湯化下更量兒大小服之白殭蠶散方治小兒天瘹白殭蠶炒馬牙硝鬱金乾蠍去土炒各半兩為散每服一字匕乳汁調服甚者半錢不拘時候天南星散方治小兒天瘹天南星大者一枚掘地作坑安磚子一片先用火燒赤後放南星于熱磚上用酒半升傾天南星上即用盞子盖之候冷為散每服一字温酒調下二嵗以下用乳汁調備急塗頂膏方治小兒天瘹烏頭末芸薹子末各二錢每用一錢新水調𫝊兒頂上諸疳以下原缺今補時方論曰疳之為病多矣錢氏謂二十以下為疳二十以上為勞二症同出而異名也總之不外毛髪焦稀口嚵唇白眼昏脊聳肚脹腸鳴或食炭米泥土等物又有五疳之分心疳即驚疳其症壯熱臉赤唇紅口瘡盜汗煩渇便赤虚驚是也肝疳即風疳其症摇頭側目白膜遮睛筋青燥渇汗多下痢是也腎疳即急疳其症腦熱肌削手足如氷寒熱時來滑泄肚痛口乾爪黒是也肺疳即氣疳其症咳𠻳喘逆皮膚粟立口鼻作癢生瘡流涕咽喉不利是也脾疳即食疳其症身黄困倦肚大脚細水榖不消瀉下酸臭是也此五臟成疳之謂也其外又有脊疳腦疳蟲疳蛔疳之不同疳渇疳瀉疳腫疳勞之各異然詳其始幼者不出哺乳失常大者不過甘肥無度所致總在隨症斟酌治之不可執一端以誤事也盖疳者乾也因脾胃津液枯涸治宜調補胃氣為主福建剪紅丸治小兒疳積初起各種疳症皆宜服之檳榔一觔大黄一觔牽牛末一觔雷丸五錢三稜六兩醋炒􅅾术六兩醋炒貫衆五錢炒商陸五錢炒沉香五錢藿香五錢木香一兩五錢丁香三錢青木香三兩􅄩香五錢香附米二兩生漆渣四兩棟樹根八兩牙皂八兩煎汁茵陳八兩煎汁金毛狗脊二兩煎汁不煎汁者各為細末再用使君子肉二兩同大黄好酒浸一日夜先放栢葉於鍋底次放大黄使君子肉在上酒煮三炷香取出二味晒乾為末各色先以一圈者檳榔牽牛末跌起次用二圏者次用三圈者次用四圈者將前汁跌為丸以百草霜為衣看兒大小虚實自一錢至三錢止空心温茶送下蘆薈肥兒丸治諸疳並鼻下生瘡愛喫泥炭米土諸物神效五榖蟲二兩煆蘆薈一兩胡黄連炒一兩川黄連薑汁炒一兩銀柴胡炒一兩二錢扁豆炒二兩山藥㣲炒二兩山查肉飯鍋内蒸透二兩五錢蝦蟇肥大者四隻煆肉䓻麵裹煨去油七錢檳榔六錢史君子肉炒一兩五錢神麯炒二兩麥芽炒一兩六錢鶴虱炒八錢蕪荑炒去皮膜一兩硃砂二錢麝香五分共為細末醋糊為丸如黍米大每服大者二錢小者一錢米飲湯下蒸雞丸治腎疳成勞骨蒸潮熱盜汗瘦弱腹急面黄食不生肌日哭夜啼黄連柴胡蕪荑鶴虱秦芁知母丹參史君子肉等分右為末用黄雄雞一隻重一斤者籠之用大麻子飼之五七日去毛令淨于背上開一孔去腸肚拭乾入前末藥於雞腹内以線縫之先以黒豆鋪三寸於甑底再安雞於甑中仍以黒豆盖滿自朝蒸至晚候温冷取雞肉研爛同前末藥入酒麵糊丸如赤豆大二嵗者米湯吞服二十丸十五嵗温酒吞五十丸忌猪雞肉無辜疳論曰小兒病面黄髪直時時壯熱飲食不生肌膚頭項生核狀如瘤贅以無辜而得故名無辜疳由小兒嗜肥甘過多蟲因甘動内緩脾氣飲食不調所致也治之當如治諸疳之法凡小兒頭項有核如彈丸按之虚輭法當去之為此核初生輭而不痛中有蟲如米得熱氣則能蔓生蝕小兒腑臟故外證肌瘦倅毛髪聳直下痢膿血體常瘡痍膿漏不已也無辜疳者言天有鳥名曰無辜晝伏夜游洗浣衣被露之經宿或遇此鳥飛從上過將衣被與小兒穿臥便令兒有此疾古人立言必有所據丹砂丸方治小兒一切無辜黄瘦腹痛疳痢或有蟲冷熱悉宜治之丹砂雄黄乾蝦蟆一枚去頭足塗酥炙焦為末研石菖蒲漏蘆各一兩麝香一分研以菖蒲漏蘆為末與餘四味入乳缽同研勻再羅粟米飯為丸如麻子大每服二丸米飲下空心後午各一服隨兒大小加減蘆薈散方治小兒無辜疳氣寒熱積滯不化心腹脹痛蘆薈研人中白研蝦蟆炙黄各半兩麝香研一分為散再合研令細每服一字至五分熟水調下不拘時日二服後當下惡物量大小加減鼈甲丸方治小兒無辜疳鼈甲醋炙黄去裙黄連桔梗炒夜明砂各一兩訶梨勒皮一兩半生一半熟麝香一分乾蝦蟆雄者一枚塗酥炙黄為末以糯米飲為丸如菉豆大粥飲下七丸疳痢亦宜服日三量大小加減哺露丁奚論曰小兒乳哺不調傷於脾胃脾胃衰弱不能飲食血氣減損不榮肌肉而柴辟羸露其臟腑不宣暢則吸吸苦熱謂之哺露也丁奚者黄瘦腹大頸小與無辜哺露二候大體相似以輕重立名也十全丹治丁奚哺露陳皮川芎青皮莪术煨五靈脂白豆䓻檳榔蘆薈各五錢木香史君子蝦蟆各二錢右為末猪膽汁浸糕糊丸麻子大每服二十丸米飲下有熱薄荷湯下赤芍藥丸治小兒丁奚雖食不生肌肉腹大食不消化赤芍大黄㣲炒鼈甲醋塗炙令黄去裙欄各三分桂心柴胡赤茯苓各等分右件藥搗為末鍊蜜和丸如麻子大每服五丸日三服人參丸治小兒羸瘦腹大青筋及丁奚等病人參麥冬去心半夏湯洗黄茋大黄㣲炒茯苓柴胡黄芩各三分甘草炙芎藭半兩訶梨勒煨用皮鼈甲醋炙黄去裙邊各一兩右件藥搗羅為末煉蜜丸如麻子大一二嵗以粥飲下三丸四五嵗五丸日三服量意加減用嘔吐有物有聲名曰嘔有聲無物則曰乾嘔有物無聲曰吐皆因胃氣不和陽明之氣下行則順今逆上行則嘔吐有因胃寒胃熱痰水宿食氣攻之症有乳吐熱吐寒吐冷吐傷食吐傷寒吐各受症不一治法不同但兒啼未定氣息未調遽以乳飲之其氣尚逆乳不得下停滯胃中則令嘔吐又乳母貪涼冷氣入乳兒若飲之亦生嘔吐或因宿食未消或解脱衣服因受風冷之氣入于腠理則腹脹痛嘔吐熱吐者先去風痰冷吐者宜固胃氣痰吐宜下其痰次與固正氣之藥食吐者當與塌氣諸症豈可一概治之吐瀉不止脾虚生風眼開風驚眼合慢驚慢脾當要固養正氣若仍以驚藥治之則死不旋踵若不叅詳治療豈不誤哉加味二陳湯治胃有熱膈上有痰以成嘔吐半夏製橘紅茯苓甘草炙黄連薑汁炒山梔子炒黒生薑各等分水一鍾煎至六分緩緩熱服加味理中湯治寒痛嘔吐人參白术乾薑甘草丁香右藥各等分用水一盞半煎六分熱服藿香正氣散治小兒風寒嘔吐藿香紫蘇陳皮桔梗大腹皮甘草茯苓厚朴白芷半夏麯右剉為末每服二錢加薑一片棗一枚水一盞煎至六分去滓温服竹茹湯治小兒積熱嘔吐葛根三錢半夏製竹茹各二錢甘草一錢共為末用水一盞半煎八分去滓臨服加生薑汁一茶匙朱沉丹治小兒嘔吐不止硃砂二錢半沉香三錢藿香三錢滑石半兩丁香十四粒右為細末每服半錢用新汲水一盞芝蔴油摘成花子抄藥在上須㬰墜濾去水却用别水空心送下紫金核治小兒一切嘔吐半夏湯洗薑製人參白术木香丁香各二錢半藿香三錢右為細末稀麵糊為丸如李核大後用沉香一錢為末硃砂一錢水飛二味同研勻為衣陰乾每服一丸用小棗一枚去核納藥在内濕紙裹燒熟嚼與小兒服後以米飲壓之聖惠散治心神煩熱嘔吐麥冬半兩淡竹茹半兩甘草人參茅根陳皮去白各五分右為末每服二錢水一盞薑三片煎至五分温服日二三服緑豆飲治嘔吐誤服熱藥緑豆粉一兩黄連乾葛甘草各五錢右除豆粉外餘藥三味共為細末入乳鉢同菉豆粉杵勻每服半錢至一錢温豉湯調服噦吐哯論曰小兒初見乳自流出謂之哯哯之不已謂之吐吐之不已則作嘔吐嘔吐不已則傳􅬏􅬏之不已即作噦自嘔􅬏噦皆有出聲動氣嘔者口開而作􅬏者心胸上下氣逆鬱結噦者無物可出即膈虚胃寒引氣噦噦作聲皆由哺乳冷冷乳入胃與胃氣相逆冷傷胃氣不得宣通故作噦也此候若不調和胃氣養正祛邪須㬰症變而慢驚慢脾風者立至也又曰小兒哯嘔吐噦四症皆胃有傷而發哯則如簷水射出嘔則開口而作吐者吐出有物噦者無物可出失於調治則慢驚由此而成四者之候雖同而毎症之寒熱虚實有異必須察其脉症以治之六君子湯治小兒胃寒作噦人參白术土炒茯苓甘草炙陳皮半夏製各等分右剉咀加薑三片水二鍾煎八分温服泄瀉論曰小兒肌膚脾胃脆弱若解脱不時風邪易侵客于肌肉摶于胃經則為胃風其狀腹善滿食寒則泄診形瘦腹大盖足陽明胃之經其支者起胃下口循腹裏下至氣衝故風冷入中則腹善脹大又胃為水榖之海得寒則食物不化氣血􅃜損故泄瀉而形瘦也胃風湯方治小兒胃風泄痢腹脹腸鳴人參白茯苓川芎桂心白芍藥當歸白术每服一錢入粟米半匙同煎温服空心食前日二以意加減訶梨勒湯方治小兒胃風腹脹得冷則泄痢訶梨勒煨用皮當歸炒黄連炒各一兩甘草炙木香乾薑各等分每服一錢水煎放温不計時候服厚朴散方治小兒腸胃風冷泄痢水榖腹脇脹滿不欲食厚朴薑汁炙香黄連各半兩丁香肉豆䓻當歸木香龍骨白术各一分為散每服半錢以粥飲下食前服日三量意加減洞泄注下論曰小兒下痢不止食已即泄名為洞泄注下此由風邪客于腸胃方春之時為風冷所傷藏在肌肉至長夏陰氣方盛或因飲食居處不慎復被風冷入於腸胃其病下痢冷盛則重故為洞泄注下俗謂之水榖痢是也病本於風若甚則變胃風證草豆蔲湯方治小兒洞泄不止草豆蔲二枚去皮高良薑人參甘草各一分乾木𤓰一分白茯苓桔梗炒各半兩每服一錢生薑七片水煎分三服乳食前各一量加減梁米湯方治小兒洞泄注下水榖不分粱米稻米黍米各三分蠟如半彈大以東流水二升煮􅆝米三沸去滓留汁煮稻米三沸去滓復以汁煮黍米三沸去滓置蠟於汁中和之候蠟消放温每以半合分為二服空心午後各一更量兒大小加減厚朴湯方治小兒泄瀉不止厚朴薑汁炙黄連去鬚各一兩一二嵗兒毎用一錢薑二片水煎分温二服空心日午各一量大小加減黄連丸方治小兒腸胃虚寒洞泄下痢腹痛黄連炒半兩乾薑呉茱茰炒各三錢肉豆蔲三枚草豆蔲一枚為末燒粟米飯和丸如菉豆大每服七丸乳食前米飲下量兒大小加減燕口瘡論曰小兒燕口瘡者口吻兩際瘡生如燕口世亦謂之肥瘡此由脾胃客熱上衝口唇熏發為瘡或者以燕泥和麝少許𫝊之甚良盖治之以其意也胡粉散方治小兒燕口瘡胡粉炒研一分黄連末半兩二味同研勻以少許𫝊瘡上治小兒燕口及口内生瘡方羖羊髭燒灰一味研細以臘月豬脂和日三四上塗之又方雞膍胵黄皮不拘多少燒灰一味研為末以乳汁調半錢日三黄檗皮散方治小兒燕口瘡用黄檗皮為末甑汁調塗𫝊瘡上差語遲論曰心為言肝為語其經屬于手少陰足厥陰其氣上通於舌舌者聲之機若稟受之初母懐驚怖則子之心火不足而肝木弱令機闗不利氣不宣揚而語遲期者有經數嵗月而不能言者雞頭丸方治小兒諸病後六七嵗不能語雄雞頭燒炙一枚鳴蟬去翅足炒三枚甘草炙半兩麥門冬一兩半大黄炒一兩半當歸三分黄蓍三分川芎三分逺志去心半兩木通半兩人參一兩為末鍊蜜丸如菉豆大每服以粥飲送下五七丸量兒大小加減不計時候菖蒲丸方治小兒五六嵗不語菖蒲人參黄連各半兩丹參赤石脂各三分天冬去心麥門冬去心各一兩右為末鍊蜜丸如菉豆大每服五七丸温水下不拘時候日三量兒大小以意加減齒不生論曰牙齒是骨之所終髓之所養手陽明足陽明之脉並入於齒若血氣充實則骨髓強盛雖其齒損落猶能更生也若虚弱者血氣衰耗風冷乗之致令齒久不生假令生者或齲或蟲落不能復生也治小兒牙齒不生方雄鼠糞二七枚一味每日用糞一枚齒根上拭至二十一日其齒即生又方道傍遺稻粒一味於齒根落處㸃三七下其齒自生治小兒齒不生無問逺近皆得便生神效方雄雞糞二七枚頭尖者雌雞糞二七枚頭圓者右二味用火燒灰存性先用鍼挑開齒齗上後以雞糞灰㸃之涎液不収論曰小兒因氣不升䧏膈脘痞滯致令乳飲不化流入胃中隨氣上溢故令多涎其候胸滿短氣飲食遲化内經謂脾為涎當調脾胃升䧏其氣則病可愈半夏丸方治小兒脾胃氣不升䧏氣溢於上涎液不収半夏炒一兩白礬生研半兩先以半夏為末再入白礬和勻麵糊和丸如粟米大每服五七丸量輕重加減食後臨臥薑湯下桑白汁方治小兒脾熱乳食不下胸膈痞悶涎溢不収新桑根白皮不計多少細剉自然汁塗於兒口内立效如無新桑根白皮取乾者一兩細剉用水一盞煎一半放温塗兒口亦可是書三副凑合仍缺小兒方五卷一百七十三卷至一百七十七卷止余於秘閣内府江浙齊梁諸鑒古家遍訪無有藏本欲補全而未能同學項視菴搜求小兒今古方論補全五卷議論簡要方法詳明可稱全璧矣諸疳以下即其所補也聖濟總録纂要卷二十五
