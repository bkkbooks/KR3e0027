body:
  text: 聖濟總録纂要卷十六休寧程林纂臟腑虛實門肝脹肝氣逆面青多怒肝脹論曰肝脹之狀千金謂脅下滿而痛引少腹蓋厥隂之經起于大指抵少腹挟胃貫膈布脇肋脉經曰肝病者必兩脇下痛引少腹是也夫肝受邪則令氣血不通故脇下脹滿引少腹而痛也桂苓湯肝受邪氣兩脇下痛牽引少腹胸脇脹滿桂心赤茯栢仁防風細辛犀角三分鼈甲一兩白术枳殻獨活桔梗五錢甘草一分棗水煎三錢空心温服以知為度三補散治肝受邪氣客于肝經攻脹兩脇滿悶引少腹痛四肢厥逆拘急赤茯苓七兩桂心蜀漆石菖蒲二兩柴胡紫石英山茱茰丹砂一兩赤芍三分共末酒下二錢山茱茰湯治肝受邪氣兩脇脹滿筋脉拘急痛引少腹山茰川芎山藥木𤓰川歸五味黄茋白术生地一分獨活棗仁二錢大棗水煎五錢空心温服肝氣逆面青多怒論曰肝在色為青在志為怒故其氣逆則面青多怒蓋本臟氣逆于内干之則多怒而面青也防風湯治肝氣壅逆肢體沉重面色青時欲嗔怒甚則恍惚狂言心神不守防風半夏秦芁麻黄獨活二兩川歸逺志人參白芍防己甘草片苓升麻一兩石膏五錢薑棗水煎五錢去渣入麝末少許熱服秦芃散治肝氣逆面青多怒身難屈伸頭目眩運秦芃人参附子白术川椒桔梗乾薑天冬川歸一兩山茰防風白芷前胡麻黄去根節五味甘草五錢烏頭細辛三分共末酒下一錢日二膽腑門膽虚膽實膽虚不得眠膽熱多睡膽癉口苦膽虚論曰足少陽膽經不足者膽虚也虚則生寒寒則其病恐畏不能獨卧口苦善太息嘔膽汁心下淡淡如人將捕之狀嗌中介介數唾頭眩痿躄足指不能揺坐不能起僵仆目視􅉩則膽氣虚虚則精神不守其氣上溢循其所在而生病也中正湯治膽氣虛寒不足常多恐懼頭眩痿厥心下淡淡四肢不利僵仆目黄茯神羗活黄茋懐熟地酸棗仁一兩栢子仁炒研防風甘菊三分人参白芍藥川歸酒洗炙甘草五錢水煎三錢空心温服以差為度人参湯治膽氣虛寒不足精神不守眼目昏眩奔氣在胸眠卧多恐不安人参桂心一兩白茯棗仁知母石膏兩半甘草八錢薑水煎五錢空心温服日二膽實論曰膽實則為有餘有餘則生熱故其症苦腹中氣滿飲食不下咽乾心脇痛不能轉側足外反熱是為陽厥及頭疼目鋭眥痛缺盆中腫痛脇下腫馬刀俠癭皆謂膽氣實足少陽壅滯故也半夏東流水湯治膽臟氣實生熱腹中氣滿飲食不下口燥咽乾頭重惡寒脇肋脹痛半夏薑汗炙兩半棗仁生地二兩片苓赤茯逺志一兩用東流水二鍾煎五錢入秫米生薑温服瀉熱湯治膽實熱精神不安龍骨棗仁片芩竹茹升麻茯神伏龍肝甘草水煎三錢温服日二膽虚不得眠論曰膽虚不得眠者膽為中正之官足少陽其經也其經不足復受風邪則膽寒故虚煩而眠卧不安也千里流水湯治膽寒虚煩不得眠半夏麥冬三兩白茯四兩人参片芩逺志萆薢桂心甘草酸棗仁炒二兩集騐外臺有生薑無逺志以千里水五大鍾入秫米半合煎候沸揚千遍澄清鍾半入藥五錢薑半分再沸空心温服五味子湯治膽氣虚冷頭痛心中驚悸眠卧不安常如人捕之狀精神不守五味子白茯人参逺志川芎熟地棗仁微炒麥冬一分桑寄生五錢大棗水煎三錢服棗仁丸治膽氣虚熱不眠棗仁地榆一兩丹砂人参白茯石菖蒲五錢共末蜜丸小豆大空心米飲下二三十丸山藥丸治膽氣虚冷精神不守眠卧不寧頭痛目眩常懐恐畏不能獨處懐山藥酸棗仁茯神栢子仁山茱茰三分共末蜜丸小豆大空心酒下三十丸米飲亦可人参散治膽虚眠卧不安多驚悸人参白茯一兩丹砂飛過茯神五錢共末米飲下一錢或用蜜丸梧子大飲下亦可乳香散治膽風不得眠精神恍惚乳香炙去油研馬頭腦骨燒灰研一兩酸棗仁微炒二兩共末空心酒下二錢以差為度膽熱多睡論曰膽熱多睡者蓋膽腑清淨决斷乃所自出今肝膽但實榮衛壅塞則清浄者濁而擾矣故精神不守而多睡也神既昏憒是以常寢卧半夏湯治膽熱精神不守昏困多睡半夏薑汁炒三兩懐生地五兩赤茯逺志二兩棗仁生用兩半黄苓一兩長流水三鍾煎秫米半合取汁入藥五錢温服黄連湯治膽熱口苦神昏多睡川連片芩赤茯麥冬升麻一分水煎三錢温服棗仁湯治膽風毒氣虚實不和昏困多眠棗仁生用研一兩臘茶薑汁塗炙微焦二兩水煎二錢温服膽癉論曰經謂有病口苦名曰膽癉夫膽為中正之官清淨之腑十一臟之所取决咽為之使若數謀慮不决則膽虚氣上溢而口為之苦膽主藏不瀉今數謀不斷則清淨者濁而擾矣故氣上溢而其症為口苦也經所謂是動則病口苦以氣為是動也麥冬湯治膽氣虚逆口中常苦煩躁引飲麥冬片芩大黄炒地骨皮炙甘草羚羊角鎊升麻茯神一兩水煎三錢入竹茹半分温服黄連丸治膽氣熱口苦胡黄連一兩青羊角蛇黄炙研如粉五錢熊膽青黛真者研一分共末用黄牛膽汁和丸或羯羊膽亦可丸如菉豆大食後淡竹葉煎湯放温下七丸至十丸心臟門心中寒心健忘善笑心中寒論曰心中寒者心痛徹背背痛徹心如蠱注之狀蓋心為陽藏中寒則寒必甚其心背徹痛則寒邪乃藏深矣赤石脂丸治心中寒心痛徹背背痛徹心赤石脂兩半人参細辛一兩桂心烏頭三分黒乾薑二兩川椒炒五錢共末入蜜丸梧子大飲下十丸日二未効漸加丸數吳茱茰丸治心中寒心背徹痛吳茱茰湯洗醋炒一升桂心川歸二兩共末入蜜杵丸梧子大酒下三四十丸臨卧再下心健忘論曰健忘之病本于心虚若血氣衰少精神昏憒故心志動亂而多忘蓋心者君主之官神明出焉苟為怵􅅥思慮所傷或憂愁過損驚懼失志皆致是疾故曰憂愁思慮則傷心心傷則善忘安神定志人参湯治心善忘小便赤澀多夢亡人或夢水澤中驚恐惕惕目視􅉩􅉩不欲聞人聲音食不知味人参甘草二兩半夏龍骨三兩麥冬石膏懐熟地四兩逺志用甘草水浸過四兩水煎五錢入大棗小麥去渣入阿膠末一錢􅄳糖少許再沸温服日二延齡煑散治心臟氣虚健忘服之安神養氣聰明不忘茯神人参益智仁懐熟地藿香葉桑寄生沉香防風炙甘草一兩共末空心米飲下二錢日二白石英湯治心氣虚健忘精神不足失志善忘隂痿􅂴語多驚稍思慮即小便白濁白石英人参川芎白术藿香葉紫石英石斛石菖蒲續斷一兩炙甘草細辛五錢水煎三錢服檀香丸治心虚常忪悸恐懼多忘白檀香桂心白茯苓甘草三兩石菖蒲蘇合油酒化天竺黄犀角懐生地一兩人参麥門冬逺志兩半共末用蘇合油入蜜杵丸芡實大食後含化一丸飲下烏犀角丸治心虚憂愁過度驚悸善忘精神恍惚言語無度心中煩悶服之安魂定魄烏犀角麥冬逺志羚羊角郁李仁鐵粉飛過丹砂飛一分人参茯神龍齒五錢氷片一錢另研共末入蜜拌丸芡實大金箔為衣酒嚼一丸飲下小兒半丸善笑論曰内經謂神有餘則笑不休蓋心藏神在聲音為笑在志為喜今心氣實則神有餘神有餘則陽氣發越此所以有善笑之症草龍膽丸治心經實熱驚悸喜笑草龍膽白薇茯神山枝仁大黄微炒二兩麥門冬三兩羚羊角𤣥参二兩半人参炙甘草兩半共末入蜜杵丸梧子大空心大棗湯下二三十丸日二丹砂丸治心氣有餘精神恍惚自語自笑舉止不常丹砂飛過乳香炙去油酸棗仁生用一兩共末酒糊丸如梧桐子大水下十丸龍齒丸治心神狂越多喜善笑如邪祟龍齒逺志人参生地山藥防風地骨皮五味白茯麥冬天冬車前子一兩炒共末入蜜杵丸梧子大用竹葉湯下二三十丸日二丹砂酒治心神不定登髙臨險言語不避親疏時時自笑髙聲呌呼舉止無常大便秘小便赤解衣露體不能安䖏丹砂飛過五錢麝香研二錢同研匀入白酒二升重湯慢煨隨患人平日酒量令醉候患人睡着急厚衣被蓋之令汗出病愈若病人不能多飲藥只用其半時時飲之良小腸腑門小腸虚小腸實小腸虚論曰小腸者受盛之官心之腑也乃手太陽之經其氣虚則為不足故左手寸口人迎以前脉陽虚者小腸虚也虚則生寒是故有顱際頭角徧痛耳聾不聰驚跳小便頻數之症治宜補之牡蠣丸治小腸虚寒小便數小便下久面有膜如乳膏狀牡蠣童便淬石斛川芎益智仁萆薢石硫黄另研龍骨五味子牛膝狗脊山茰肉巴㦸天續斷一兩共末入蜜杵丸梧子大鹽湯下四十丸便止即已益智仁丸治小腸虚寒小便後有餘􅅹隂痿益智仁川芎木𤓰巴㦸天川萆薢川續斷牛膝狗脊五錢附子一枚共末蜜丸梧子大鹽湯下四十丸日二斷弓弦散治小腸氣虚寒撮痛并女人血刺心痛五靈脂蒲黄新者一兩先用好米醋一合入藥二錢熬成膏以水一鍾煎七分熱呷又名失笑散蘹香子丸治小腸虚冷少腹氣痛蘹香子桂心一兩木香附子蓽沉茄赤石脂三分川歸酒洗川椒炒五錢共末入蜜丸梧子大酒下二十丸小腸實論曰小腸者受盛之官心之腑也手太陽之經其脉盛則為有餘故左手寸口人迎以前脉陽實者小腸實也夫實則生熱是故有身熱來去口瘡心煩身重汗不出并小便不利之症治宜瀉之麥冬湯治小腸實熱脉氣盛實小便赤澀下血麥冬知母片芩木通升麻蒲黄一分大黄炒三分水煎三錢温服日二以差為度瞿麥穗湯治小腸實熱小便黄赤結澀不通瞿麥穗猪苓川連防己烏犀角車前子炒一兩炙甘草五錢木通一兩水煎三錢温服日二脾臟門脾癉穀勞脾癉論曰有病口甘者此五氣之溢也名曰脾癉夫食入于隂長氣于陽肥甘太過令内熱而中滿則陽氣盛矣故單陽名為癉其症口甘久而弗治轉為消渴以熱氣上溢故也蘭草湯治脾癉口甘中滿蘭草切一兩水三鍾煎令減半分三服早中晩用以差為度麥冬湯治脾癉發口甘煩渴麥門冬石膏三兩白芍藥片苓兩半烏犀角一兩枝子五枚碎水煎五錢去滓入朴硝五分再二三沸温服日二石膏湯治心脾實熱口甘煩渴引飲無度石膏四兩人参知母白芍紫苑茯神赤石脂白术山枝兩半竹􅅹生地汁水煎五錢去渣入竹􅅹少許生地汁一合再二三沸温服若宣利加芒硝一兩去白芍藥麥冬生地汁煎治脾癉内熱口甘煩渴引飲生麥冬汁懐生地汁生白蜜半斤括樓根二兩犀角生者淡竹葉知母鹽酒炒地骨皮萎㽔綿黄茋升麻一兩炙甘草五錢凝水石淬研石膏研二兩除二汁蜜用井華水七升煑十一味取三升濾去滓入汁蜜同慢煎如稀餳入瓷瓶内重湯頓稠成煎收貯每用一二匙含化温湯送下日二夜一穀勞論曰胃受水穀其氣虚弱不能傳化則令人怠惰嗜卧肢體煩重腹滿善飢而不能食食已則發穀氣不行使然也故謂之穀勞沉香湯治穀勞體重食已便卧使氣消食化沉香白术土炒紫朴薑炒一兩人参白茯苓半夏薑汁炒木香草豆蔲甘草三分陳皮去白炒三分黒乾薑一分生薑大棗水煎三錢温服日二木香湯治穀勞身重少力多困木香陳皮人参甘草陳麯三分紫朴蓬莪茂大麥糵炒一兩棗肉五十枚水煎三錢温服日二白豆蔲丸治穀勞身重食已困倦少力食已即眠白豆蔲兩半枳殻去白炒半斤桂心陳皮去白炒訶黎勒􅔇煨取皮川歸一兩酒浸共末蒸大棗肉和末杵丸梧子大用淡薑湯空心下二三十丸臨卧再服酒下亦可胃腑門食亦胃反噦噫醋胃寒腸熱胃熱腸寒食亦論曰内經云大腸移熱于胃善食而瘦亦謂之食亦胃移熱于膽亦曰食亦夫胃為水穀之海所以化氣味而為榮衞者也胃氣和則食有節氣血盛而膚革充盈若乃胃受邪熱消爍穀氣不能變精血故善食而瘦也病名食亦言雖能食亦若飢也胃移熱于膽亦曰食亦以膽為陽木熱氣乘之則爍土而消穀也参苓丸治胃中結熱消穀善食不生肌肉人参赤茯菖蒲逺志牛膝地骨皮二兩共末蜜丸梧子大飲下二十丸日二甘露飲治胃熱善食不生肌生地熟地天冬麥冬片芩石斛枇杷葉甘草枳殻茵陳蒿一兩水煎三錢服胃反論曰脾與胃合主腐熟水穀今脾胃氣虚水穀不化與停飲相撃胃中虚脹其氣逆上食久反出故名胃反其候朝食暮吐暮食朝吐寒熱時作心下痞結狀如覆杯人参湯治胃反食下便吐人参澤瀉甘草大黄炒桂心二兩赤茯四兩竹茹三兩陳皮乾薑一兩水煎五錢服日二鉛丹丸治胃反嘔吐噦逆黒鉛四兩化汁入紙灰以栁木椎研成粉羅過二兩米醋二升熬成膏入蒸餅少許熟丸如赤小豆大薑湯下十丸飲亦可木香湯胃反不納飲食開胃和氣木香一分糯米一撮胡椒二十一粒同炒米熟研末分五服水煎服田季散久患翻胃及小兒驚吐諸吐硫黄五錢水銀一錢五分同研黒煤色生薑四兩取汁酒一鍾和藥每服三錢空心服之以衣被蓋覆自足指汗出迤邐徧身汗徹即差常有人病反胃經三年不差消瘦殆盡用藥一服汗出如膠腥穢不可近當日更不復吐遂差又小兒諸吐量大小與藥一字至三四字冷水下吐立定此散極浮難調須先滴少水以指緩緩研殺稍増湯調和若傾入湯酒盡浮泛不可服又烏頭煑散吳茱茰散皆治反胃惟田季散有隂陽理勝于二方今載于後但性差熱更量臟腑寒温用之吳茱茰散胃氣虚冷不能飲食食即吐酸水吳茱茰湯洗七次炒乾薑炮製二兩共末空心熱酒下三錢吳茱茰丸治年深膈氣翻胃早食晩吐生存不化膈上常有痰涎時時嘔血胸中多酸水吐清水無時夜吐至曉日漸消瘦羸弱腹中痛楚痰逆時復冷滑又即秘結等疾吳茱茰湯洗炒三分半夏一兩生薑四兩取汁入水煑爛細研成膏當歸酒洗人参胡椒甘草五錢半生用半紙裹六七重醋浸煨乾又浸又煨七次白礬燒枯五錢共末膏丸梧子大桑桞枝煎湯下七丸日三服忌食諸毒發物惟可食油煎猪胰脾軟飯茯苓飲治胃反吐逆發渴飲水赤茯二兩白术甘草桂心五錢澤瀉乾薑炒一兩水煎五錢空心服日二通膈湯治胃反不下食裩布取對隂户者洗去醎水焙乾燒灰白术一兩大黄炒五錢㯽榔丁香訶梨勒木香半夏三分薑水煎三錢服噦論曰人食于口而聚于胃脾胃散精氣以養四旁臟腑氣和乃能埤助于中若脾胃氣虚不能傳化水穀之精與新穀相干脾胃氣逆痞滿復遇冷折之故令噦逆也人参湯治噦逆不止白茯人参白术藿香五錢甘草一分水煎三錢温服水銀膏治諸般噦逆水銀不結沙子硫黄細研太隂𤣥精石各一兩研共和匀研極細用米醋五升文武火熬成膏磁盒收貯旋丸梧子大艾湯下七丸枇杷葉湯治噦逆不止飲食不下枇杷葉去毛炙四兩陳皮去白炒五兩甘草炙三兩薑棗水煎三錢稍熱服三聖散治噦逆不止丁香四十九枚胡椒十四粒半夏大者七枚薑汁洗共末大人薑湯下一字小兒筯頭蘸薑汁㸃藥口中立愈至甚不過二服神効方治胃口冷噦逆不止大棗一枚去核入胡椒七粒溼紙包煨熟出火毒空心細嚼温酒送下以粥投之取効為度噫醋吞酸論曰上焦有留飲脾胃挟宿寒致飲食􅆡于膈脘不能傳化令人腹滿氣逆所以噫醋也半夏丸治上焦冷氣噫醋吞酸吐沬嘔逆不思飲食半夏薑汁製二兩丁香五錢乾薑炒一分共末薑汁糊丸梧子大空心木𤓰鹽湯下十五丸藿香半夏丸治胸膈有痰脾胃積冷噫醋吞酸不思食藿香一分半夏五兩薑汁浸丁香五錢共末糊丸梧子大薑湯下十五丸丁香煑散治噫醋吞酸不欲飲食丁香乾薑五錢人参白术白芷赤茯桔梗炒半夏甘草桂心一兩㯽榔髙良姜肉豆蔲一分共末薑棗水煎三錢服丁香丸治食飲不化噫氣吞酸丁香人参五味半夏五錢甘草琥珀乾薑一分桂心枳殻裩布訶勒皮三分共末蜜丸梧子大空心薑橘湯下二十丸胃寒腸熱論曰病有腹脹而泄者為胃寒腸熱胃受寒則氣収不行而為脹滿腸客熱則水穀不聚而為泄注病本濁寒之氣在上清熱之氣在下故為腹脹而且泄也訶梨勒湯治胃寒腸熱腹脹滿悶泄瀉不止訶勒皮兩半青皮大黄炒陳皮紫朴薑汁炒髙良姜炮枳殻炒五錢防風甘草一分乾薑一兩薑棗水煎三錢服當歸黄連湯治胃寒腸熱腹脹泄利當歸川連二兩木香紫朴薑汁炒訶梨勒吳茱茰洗炒赤茯一兩共末蜜丸梧子大飲下三十丸日二紫朴丸治胃寒腸熱腹脹洩利紫朴薑汁炒兩半附子龍骨川連白石脂訶梨勒吳茱茰洗炒乾薑一兩共末醋浸炊餅丸梧子大空心吳茱茰湯下三十丸米飲亦可妙應丸治胃寒腸熱腹脹泄利烏頭炮去皮臍五錢枝子乾薑一分共末薑取自然汁和丸梧子大空心酒下七丸日二胃熱腸寒論曰腸胃相通疾病相連人因飲食不節寒温失宜致腸胃受邪有冷有熱病症俱見者則善飢小腹痛脹為胃熱腸寒之病胃熱則消穀故善飢腸寒則血凝脉急故小腹痛又寒則氣聚故痛而且脹地黄湯治胃熱腸寒食已小腹痛脹熟地人参白茯苓地骨皮甘草枇杷葉去毛炙麥冬石斛黄茋炙二兩水煎三錢空心服調中湯同人参白茯十兩甘草炙紫河車炙二兩水煎三錢空心服麥冬湯同麥冬炙甘草二兩白术羗活白茯苓旋復花人参升麻桑白皮白芍藥𤣥参當歸酒洗浸柴胡一兩胡黄連一分木香五錢熟地兩半共搗粗末薑棗水煎三錢入甘草一寸空心服日二肺臟門肺消膈消肺痿肺痿咽燥肺痿小便數肺廱肺廱喘急胠滿肺消論曰内經謂心移寒于肺故為肺消肺消者飲一溲二病不治夫病必有傳而傳則有順有逆傳其所生者順順則易治傳其所勝者逆逆則難治縁心經受邪傳之于肺是為逆症葢以寒邪隨心火内爍金精肺臟既已銷鑠氣無所持故症飲少而溲多也當其始病之時治宜去其寒邪使不乘心火而移害于肺至于肺已既消則又當補其肺氣平其心火邪無所容而病自愈黄茋湯治肺消飲少溲多黄茋三兩蜜炙人参五味子麥冬貝母去心桑白皮東引者炙枸杞子酒浸懐熟地兩半水煎五錢空心温服日二兎絲子散治肺消飲少溲多兎絲子酒洗浄用白酒浸一宿煑搗爛焙乾研一兩雞膍胵黄皮不見水炙兩半蒲黄紙隔微炒五味子炒川連去鬚蘆水洗兩半肉蓯蓉酒洗去甲焙乾一兩硝石五錢共末酒下三錢日二黄茋湯同黄茋蜜微炙土𤓰根二兩半菝葜地骨皮五味子人参石膏研牡蠣童便淬一兩水煎五錢服日二膈消論曰心移熱于肺傳為膈消夫心肺二臟皆居膈上心火既熾移熾于金二臟俱熱薫蒸膈間而血氣消鑠也心主血肺主氣俱受邪熱宜不息而消故久則引飲為消渴之疾麥冬飲治膈消胸中煩滿津液燥少短氣多渴麥冬二兩人参生地五味甘草葛根括樓知母茯神一兩水煎五錢入淡竹葉十片温服日二除熱地黄煎治膈消煩渴生地汁生括樓汁二升牛乳三升白蜜半斤川連一斤為末合煎减半入末収成膏熱湯化下二大匙日三知母湯治膈消心胸煩渴咽燥知母子芩白茯生薑焙澤瀉二兩小麥八合大棗肉十五枚甘草二兩水煎五錢入淡竹葉十五片温服日二肺痿論曰内經謂熱在上焦因欬為肺痿其病之所得或因汁出或因嘔吐或因消渴或小便利數或因便難數被快藥下利重亡津液故得之診其寸口脉數而虚其人胸煩多唾唇燥小便難或數欬不得欬欬則出乾沫胸中隱隱痛者是也地黄湯治虚寒肺痿喘急懐熟地川芎五兩人参桂心三兩桑白皮炒二升大麻仁一升炒研如脂水煎五錢去滓入麻仁脂少許再數沸温服日二旋復花湯治肺痿咳嗽吐稠黏虚瘦喘急盗汗旋復花甘草牡蠣醋淬一兩生地汁生薑汁二合紫苑桔梗炒萎㽔五錢水煎五錢去滓入二汁少許沸服日二紫苑湯治肺痿咳嗽涕吐稠黏小便不利紫苑天冬桔梗五錢白茯知母一兩百合二兩生地汁水煎五錢去滓入生地汁半合沸服要利加朴硝末少許此疾利多為肺與大腸合故秘澀者少鹿髓煎治傷中氣脉絶筋急肺痿咳嗽鹿髓半斤白蜜真酥二兩杏仁去皮尖三兩桃仁去皮尖三兩炒研用酒一升濾汁生地汁五合先將二仁汁地汁煎减半下鹿髓酥蜜攪匀慢煎如􅄳不拘早晩頻服一匙如無鹿髓以牛髓代之肺痿咽燥論曰熱在上焦因咳為肺痿其脉則寸口數其症則咳而口中有濁唾涎沫甚者咽中乾燥蓋以邪熱薫肺使然或因快藥下利重亡津液所致天冬丸治肺痿咽乾煩燥痰壅咳嗽小便澀赤眠卧不安咳吐涎沫咽喉腫痛天冬人参二兩杏仁甘草一兩貝母阿膠桑白皮五味子五錢共末蜜丸梧子大臨卧人参湯下十丸含化亦可生薑甘草湯治肺痿咳吐涎沫不止咽燥而渴生薑五兩甘草四兩人参三兩大棗十五枚水煎六錢温服日二天冬煎治肺痿咳嗽吐涎沫咽燥渴生天冬汁醇白酒飴糖一斤紫苑四兩為末將酒汁重湯煎沸下苑末攪匀入飴糖可丸即丸如杏仁大津液含化一丸日三生地煎治肺痿喘嗽涕吐稠黏咽膈不利懐生地杏仁去皮尖炒研三兩生薑二兩與生地同研取汁𤣥参生一斤天冬去心半斤麥冬去心一斤二味用生者牛旁子生用四兩與𤣥参二冬蘇子同用水搗取汁蘇子炒二兩同和匀慢火煎令稠入煉過蜜五兩真酥二兩攪匀入磁礶内放飯甑蒸少時収貯頻化一匙肺痿小便數論曰内經云臟真髙于肺又曰真氣奪則虚今肺中冷則肺中真氣不足而其人上虚矣虚則無以制下故上為肺痿下為小便數以致吐涎沫而欲咳不能咳者皆其症也治宜以温藥和之白茯苓湯治肺痿小便數甚者吐涎沫欲咳不能白茯苓附子桂心白芍三兩炒川椒炒四十粒肉蓯蓉兩半補骨脂黄茋一兩水煎三錢空心温服日二甘草乾薑湯治肺痿小便數咳吐涎沫炙甘草四兩黒乾薑二兩用水煎三錢空心温服日二以差為度五味子湯治肺痿小便數五味子欵冬花人参桂心二兩麥門冬桑白皮炙三兩生薑大棗水煎六錢空心温服日二龍骨湯治肺痿小便數漸覺氣弱白龍骨肉蓯蓉黄茋蜜炙一兩附子白薇牡蠣醋淬三分炙甘草五錢生薑大棗水煎三錢温服日二肺癰論曰肺癰之病脉數而實蓋以風中于衞呼氣不入熱過于榮吸而不出風熱凝􅆡蓄結為癰其症惡寒口乾胸中隱隱痛咳而胸滿時出腥唾者是也宜速治之久則吐膿如米粥始萌可救膿成難治葦葉湯治肺癰葦葉細切二升桃仁去皮尖炒五十枚研𤓰蔞仁薏苡仁半升用水一斗將葦葉取汁五升入藥煑二升去滓分三服當吐如膿差甜葶􅐗丸治肺癰甜葶􅐗紙炒研杏仁去皮尖一兩炒研膏貝母炒五錢研皂莢肥大不蛀者二兩先將皂莢椎碎入無灰酒半升内熟按濾去滓慢煎成膏將三味共末入膏和丸梧子大温水下二十丸如肺氣喘急濃煎桑白皮湯下防己丸治肺癰咳𠻳久不差防己杏仁去皮尖炒研川貝母炙甘草二兩甜葶􅐗紙炒研四兩共末糊丸梧子大水下三十丸日二地黄湯治肺癰生地汁一斤人参附子白石英醋淬三次川歸甘草炙一兩白豆小者二十粒白絲毛雞一隻男人用雌者女人用雄者治如食法用水一斗五升先煑雞取汁七升去雞入地汁再沸下諸藥慢火煎三升濾去滓每服一鍾日三夜二桔梗湯治肺癰吐膿如粳米粥桔梗炒三兩炙甘草一兩水煎六錢空心温服須㬰吐膿數合再服薏苡仁湯治肺癰咳𠻳薏苡仁一升苦酒三升用酒煑薏仁至一升温頓服吐出膿血騐桔梗白术湯治肺癰吐膿經時不差桔梗炒三升白术懐生地薏苡仁炙甘草敗醬二兩桑白皮一升川歸一兩大豆四升用水一斗五升煑豆取汁七升内清大酒三升合諸藥煮之去滓取三升每服一鍾日三夜一肺癰喘急胠滿論曰内經謂肺之癰喘而兩胠滿蓋肺主氣而合于息其脉别支者從肺系横出腋下故邪氣藴積于肺則上為喘急下連兩胠滿治宜瀉其肺臟之邪毒病斯愈矣葶􅐗大棗瀉肺湯治肺癰喘急不得安卧葶􅐗甜者五兩紙炒研取末五錢大棗去核十枚用水三大鍾煮棗取汁入葶末五錢一二沸温服日止一服平肝湯治肺癰氣急喘逆咳𠻳胠滿黄茋陳皮杏仁一兩沉香五錢人参紫苑紫蘇二兩水煎五錢温服日二夜合湯治肺癰咳喘體有微熱煩滿胸前皮甲錯者夜合白皮一兩炙即合歡皮肺癰之妙藥水三鍾半分二服日服之以差為度大腸腑門腸垢虙瘕腸垢論曰内經謂大腸有熱便腸垢巢元方云腸垢者腸間津汁垢膩也蓋傳化之腑熱氣積而為痢痢久不已腸間虚滑津垢乃出是邪熱氣實真臟氣虚故有此症附子丸治腸垢因久痢腸滑下垢不止羸困附子去皮臍炮桂心赤石脂黒乾薑二兩共末入蜜杵丸梧子大空心米飲下二三十丸臨卧再下虙瘕論曰内經謂小腸移熱于大腸為虙瘕夫小腸者乃受盛之官化物出焉大腸者乃傳導之官變化出焉二者皆以傳化為事今也小腸受熱移于大腸則隂氣虚而津液耗不能滑利故糟粕内結沉伏而為瘕聚腸間菀結大便秘澀是也㯽榔丸治大小腸胃受熱氣不宣通瘕聚沉伏腸間菀結腹脇脹滿大便秘澀㯽榔大黄枳殻炒二兩桃仁去皮尖炒大麻仁炒青皮炒木香一兩共末温水下一錢日二以知為度秦芁湯治大腸虙瘕秘澀躁悶秦艽兩半防風枳殻㯽榔桂心獨活牽牛生搗一兩朴硝研水煎三錢去滓入硝末五分再沸服日二腎臟門腎虚腎實腎脹解㑊瘖俳腎虚陽痿腎虚多唾骨虚實髓虚實腎虚論曰腎主水受五臟六腑之精而藏之若腎氣虚弱則足少隂之經不利故其症腰背痠疼小便滑利臍腹痛耳鳴四肢逆冷骨枯髓寒足脛力劣不能久立故曰診左手尺中神門以後隂脉虚者為少隂經病令心悶下重足腫不可按蓋足少隂腎之經也兔絲子丸治腎經虚憊目眩耳鳴四肢無力兎絲子製五兩石蓮肉二兩白茯二兩山藥炒二兩分一半作糊用山藥糊丸桐子大毎服五十丸空心温酒鹽湯任下磁石丸治腎經虚憊四肢無力體面少色惡風寒手足冷骨節痛耳内蟬鳴磁石醋淬七次研附子桂心補骨脂肉蓯蓉一兩巴㦸天去心續斷人参白茯苓柴胡黄茋山藥紫朴薑汁炒木香牛膝酒浸逺志甘草水浸川椒炒一兩羊腎一對去筋膜鹽水煮桃仁去皮尖炒共末入蜜杵丸梧子大空心酒下二三十丸日二鹿茸丸治男子腎臟虚損腰脚弱氣不足體煩倦面色黒小便數鹿茸一對酒浸去毛炙附子牛膝人参木香巴㦸天天雄肉蓯蓉酒浸去甲五味子川椒羗活桑螵蛸兎絲子葫蘆巴紅豆蔲山藥沉香肉豆蔲楮實子懐熟地白蒺藜桂心白茯没藥各一兩共末入蜜杵丸梧子大酒下二十丸日二羊腎丸治腎虚攻注四肢煩熱多汗肢節痛耳鳴羊腎一對去筋膜杏仁去皮尖妙川椒川歸麻黄去根節黄茋一兩共末用羊腎酒煮爛研酒煮糊丸梧子大酒下二十丸日二羊骨補腎丸治腎虚寒耳鳴好睡日漸痿弱羊脛骨酥炙五兩白术磁石醋淬二七次二兩桂心三兩黄茋蜜炙白茯苓乳浸乾薑一兩水煎五錢温服日二葫蘆巴丸治腎氣虚損陽氣痿弱補虛損興陽氣葫蘆巴微炒附子肉蓯蓉巴㦸紫者炒蘹香子炒兩半川牛膝蛇牀子桂心楝實去皮醋浸補骨脂一兩蓬莪茂醋浸煨三兩共末入蜜杵丸梧子大薑鹽湯下二十丸日二桑螵蛸丸治腎元虚耳聾脹滿腰脊强直小便赤黄桑螵蛸炒山藥沉香山茰肉肉蓯蓉磁石醋淬研五味子川歸五錢附子三枚石菖蒲續斷三分蘹香子炒一分共末蜜丸梧子大酒下二十丸日二沉香飲治腎氣虚小腹急滿骨肉乾枯隂囊溼痒沉香木香羗活熟地黄茋澤瀉桑螵蛸五錢白芍川歸天雄續斷磁石醋淬七次研一分蓽薢牛膝大腹皮三分生薑水煎五錢温服日二慶雲散治陽氣不足腎元虚精乏不能施化􅇠絲子五兩天冬九兩五味子六兩覆盆子十兩紫石英二兩桑寄生天雄一兩白术石斛三兩共末酒下二錢氣寒者去桑寄生用細辛二兩腎實腎何能實以腎火實也論曰足少隂腎經其氣實為有餘有餘則舌燥咽腫上氣嗌乾咳喘汗出腰背强急體重内熱小便黄赤腰脊引痛足脛腫滿此由足少隂經氣實或為邪濕所加故有是症治宜瀉之瀉腎大黄湯治腎元實熱小腹䐜脹腰重不利足下熱痛耳聾腰解夢伏水中大黄蜜水浸懐生地磁石醋淬七次二兩𤣥参片芩澤瀉五加皮羚羊角石菖蒲炙甘草赤茯苓一兩水煎三錢入竹葉二七片温服日二羚羊角湯治腎元實熱多怒好忘肢體煩滿腰腹急重羚角升麻㯽榔白芍杏仁甘草澤瀉子芩木通赤茯一兩水煎三錢入竹葉十四片温服日二大澤瀉湯治腎元實熱多怒善忘舌燥咽腫喘急耳聽不聰四肢滿急腰背强直澤瀉子苓升麻杏仁去皮尖芒硝研三兩磁石醋淬七次四兩茯神大青竹葉二兩懐生地五兩羚羊角一兩柴胡三兩水煎五錢空心温服日二腎脹論曰腎脹之病腹滿引背央央然腰髀痛者是也蓋腎主腰脚其經屬足少隂與足太陽為表裏故腎經所過抵少腹通膀胱挾脊内過髀樞循髀外是動則病髀不可以曲今寒氣積于腎經不得宣故氣留滯而為脹名曰腎脹温經湯治腎虛脹寒氣不宣利上攻腹内及背腰脊髀痛附子杜仲鹽酒炒牛膝一兩補骨脂川續斷黒乾薑桂心三分生薑水煎三錢入鹽一捻服日二蘹香子散治腎虚脹氣攻腰腹髀痛蘹香子桂心石斛懐熟地桃仁去皮尖炒黒乾薑杜仲酒炒甘草一兩共末空心酒下二錢日二八味丸治腎氣虚冷氣攻腰腹痛附子去皮臍炮桂心澤瀉二兩懐熟地八兩山藥山茰肉四兩牡丹皮不見火白茯三兩共末入蜜杵丸梧子大空心酒下二三十丸鹽湯下亦可久服温腎經消脹滿解㑊論曰内經云冬脉太過則令人解㑊其症脊脉痛而少氣不欲言語夫腎為作强之官精為養身之本所以運動形體者也一或受邪則腎實而精不運故有脊脉痛少氣不欲言之証其名解㑊者解有解緩之義㑊則疑其寒亦疑其熱疑于壯又疑于弱有不可必之之詞診其尺脉緩而濇者為解㑊也利腎湯治解㑊脊脉痛而少氣不欲言此為腎氣有餘懐生地赤茯苓澤瀉兩半柴胡枳殻去白炒麥門冬川牛膝㯽榔子芩一兩水煎三錢空心温服日二通腎湯治解㑊少氣不欲言脊脉急痛腰背强直足下熱疼小便癃閉心煩咽乾懐生地羚羊角赤芍石菖蒲二兩猪苓炙甘草五加皮澤瀉一兩水煎三錢温服日二瘖俳論曰内經謂内奪而厥則為瘖俳此腎虚也瘖俳之狀舌瘖不能言語足廢不能為運用葢腎脉挾舌本腎氣内奪氣厥不至舌本故不能言語而為瘖腎脉循隂股循䯒骨内踝入足下腎氣不足故足廢而為俳名曰瘖俳熟地黄湯治腎氣虚厥語聲不出足廢不為運用懐熟地附子石斛五味巴㦸天肉蓯蓉山茰肉桂心逺志麥冬去心白茯苓石菖蒲五錢生薑大棗水煎三錢温服日二腎虚陽痿論曰腎臟虚損陽氣痿弱者蓋由嗜慾不節勞傷腎氣精血耗竭臟腑空虚血氣不能充養故也治宜補虚損興陽道益精氣五味子丸治腎虚損精神精神衰竭陽道痿弱腰脚無力五味子兎絲子鹿茸去毛炙巴㦸天杜仲肉蓯蓉一兩共末入蜜杵丸梧子大酒下二三十丸日二磁石丸治腎氣虚損骨髓枯竭小便頻數腰背拘急耳鳴面色黒黯陽道痿弱磁石醋淬二七次二兩附子一兩人参白术白茯地骨皮桂心五味熟地黄茋牡蠣澤瀉三分共粗搗每用羊腎一對煮汁入藥三錢薑棗煎服日二助陽丸治腎虚損陽氣痿弱無力志意不快小便數附子人参鹿茸去毛炙兎絲子肉蓯蓉鍾乳粉黄茋原蠶蛾一兩共末入蜜杵丸梧子大酒下二十丸日二腎虚多唾論曰水飲非升降不能傳導非陽氣不能消鑠腎虚多唾者蓋緣腎臟不足陽氣虚微而又隂寒凝結停滯于胸膈之間不能消鑠水飲上溢于齒牙故喜唾也地黄湯治腎虚使人痰唾不休懐熟地鹿茸巴㦸天丹参五加皮枸杞子二兩車前子桂心防風一兩水煎四錢温服日二半夏丸治腎虚寒唾液不休心胸痞悶半夏湯泡七次為末用薑汁和作餅牺乾炙人参附子前胡一兩五味子枳殻㯽榔赤茯陳皮桔梗訶勒皮五錢共末酒煮糊丸梧子大薑湯下二三十丸日二骨虚實論曰腎生骨髓骨髓者腎氣之餘腎氣虚則骨髓痠疼倦而無力其氣實則骨熱苦煩津液内燥當隨症施治補骨脂湯治骨虚痠疼多倦不能久立補骨脂人参附子五味子肉蓯蓉一兩水煎三錢去滓入酒二分温服日二白芍虎骨散同白芍藥咀一斤懐熟地咀五斤虎骨四兩剉用白酒一斗浸三宿晒乾又浸又晒以酒盡為度共末不拘茶酒下二錢日二四物湯治骨髓實苦疼煩熱葛根汁生地汁麥冬汁白蜜各鍾半共和匀分三服每服入水半鍾同煎温服髓虚實論曰骨髓之病應肝膽若其腑臟有病皆從髓生蓋熱則應臟寒則應腑故髓虚者腦病不安身常清慄髓實者身體煩躁勇悍驚熱此髓虚實之候當隨症施治補虚羗活丸治髓虚寒腦痛不安身常清慄羗活川歸人参川芎二兩桂心一兩大棗去皮核三十枚羊髓牛髓真酥大麻仁各一合研共末入髓酥和匀入器内重湯煆稠丸梧子大空心酒下三四十丸日二温髓湯治髓虚骨寒附子人参桂心黄茋蜜炙細辛一兩水煎三錢温服髓實者於腎實并骨實中求之膀胱腑門胞痺胞轉胞痺論曰内經謂胞庳者小腹膀胱按之内痛若沃以湯澀于小便上為清涕夫膀胱為州都之官津液藏焉氣化則能出矣今風寒邪濕氣客于胞中則氣閉不能化出故胞滿而水道不通其症小腹膀胱按之内痛若沃以湯澀于小便以足太陽經氣閼故熱而痛也上為清涕者以足太陽經直行者從巔頂入絡腦腦氣下灌出于鼻竅則為清涕矣温腎湯治胞閉小便不利腰脊疼痛腹背拘急絞痛澤瀉白术赤茯芩黒乾薑二兩水煎四錢温服日二人参湯治胞痺小便不利人参白芍川芎生地川歸赤茯逺志子芩五味甘草麥冬乾薑一兩桂心二兩水煎羊腎取汁入大棗煎五錢温服日二腎􅅹湯治胞痺小腹急痛小便赤澀麥門冬犀角五加皮杜仲鹽酒炒桑螵蛸十枚切破炙黄赤芍藥木通桔梗炒一兩水煮羊腎一對取汁煎五錢去滓入竹􅅹半合薑汁少許再沸温服日二胞轉論曰胞受水液氣未轉行則小腸滿脹或飽食用力或因合隂陽令胞屈辟小便不下遂致胞轉其候水道不通小腹急痛煩悶汗出氣逆奔迫甚至于死名曰胞轉宜速治之虎珀湯治胞轉臍下急滿或因霍亂而得者虎珀研一兩阿膠炒五錢車前草三兩葱白二七莖用水五鍾煎葱白車前取汁三鍾下膠末次下珀末微煎分三服石菖蒲散治胞轉不得小便少腹急痛石菖蒲滑石飛過一兩共末用雞子白和二錢下頃再下秦艽湯治胞轉不得小便小腸滿脹秦芃水煎五錢空心温服少頃又服以差為度琥珀湯治胞轉小便不通小腹痛煩悶琥珀研細生大黄滑石飛過車前子車前葉一兩水煎五錢入葱白三寸空心温服日二車前草飲治胞轉臍下急滿小便不利車前草去根一握用水三鍾煎温服日二以差為度聖濟總録纂要卷十六
