body:
  text: 聖濟總録纂要卷六休寧程林纂泄痢門泄痢統論論曰脾與胃合其象土外榮肌肉内熟水榖風寒水濕襲於外則留連肌腠𫝊于脾胃若飲食不節害於内腸胃乃傷不化糟粕皆能為病所得之源不一故立名多端且乆風入中則為飱泄濕勝則為濡瀉寒中則為洞泄暑勝則為毒痢而又或冷或熱或赤或白或色雜或腸垢或滯下或休息或疳或蠱之類種種不同悉由養攝失宜飲食不慎致腸胃不調邪氣交攻施治之法則有宜調補宜攻化宜收斂宜渗泄各隨所宜以治水瀉論曰内經謂諸厥洞泄皆屬于寒暴注下廹皆屬于熱葢為冷熱不調氣不相濟也脾胃怯弱水榖不分濕飲留滯水走腸間禁固不能故令人腹脹下痢有如注水之狀謂之注泄名為水瀉紫朴散治一切水瀉冷痢紫朴白术乾薑一兩甘草五錢陳皮三分共末飲下三錢日二霍亂吐瀉新汲水下肉豆蔲㪚治水瀉無度腸鳴腹痛肉蔲一兩薑汁二合白麫二兩將蔲為末用汁和麫裹末煨熟飲下二飲黄蠟丸治水瀉不止傷冷虚極硫黄黄蠟一兩研硫化蠟和勻丸梧子大汲水下五丸紫朴㪚又方治暴水瀉不止紫朴一兩白术川連甘草赤茯乾薑白豆蔲三分訶勒一兩共末飲下二錢訶梨勒丸治水瀉腸滑不禁訶勒龍骨乾薑赤石脂一兩共末糊為丸如梧子大飲下二十丸正氣㪚治水瀉腹痛日夜不止砂仁附子白术人参龍骨石榴皮甘草肉蔲吳茰地榆乾薑赤石脂一兩共末飲下三錢又方治水瀉水榖不化日夜不止熟艾半斤慢炒合熱包裹坐之冷再炒濡瀉論曰内經云濕勝則濡瀉甲乙經曰寒客下焦傳為濡瀉夫脾為五臟之至陰其性惡寒濕今寒濕之氣内客于脾則不能俾助胃氣腐熟水榖致清濁不分水入腸間虚莫能制故洞泄如水隨氣而下謂之濡瀉肉豆􅅳散治腸胃受濕濡瀉不止肉蔲川連訶勒三分白术甘草赤茯乾薑五錢紫朴一兩共末飲下二錢又方治腸胃受濕濡瀉不止紫朴甘草一兩肉豆蔲五枚共末飲下二錢日二附桂丸治濡瀉水痢不止桂心附子一兩乾薑赤石脂二兩共末蜜丸梧桐子大飲下二十丸白术丸治脾胃受濕濡瀉不止白术人参乾薑炒黑三分紫朴用生薑仝炒一兩共末蜜丸梧子大飲下二十丸生薑黄連㪚治水瀉乆泄瀉生薑四兩川連一兩咀片將薑切片與連仝入鍋慢炒薑赤色去薑用連為末臘茶下二錢二服止飱泄論曰内經云清氣在下則生飱泄又曰乆風為飱泄夫脾胃土也其氣冲和以化為事今清濁交錯風邪之氣得以干胃故冲氣不能化而食物完出夕食謂之飱以食難化者尤在于夕故食不化而泄出則謂之飱泄此俗所謂水榖痢也白术湯治風冷入中飱泄不止脉虚而細日夜數行口乾腹痛白术紫朴熟艾龍骨川歸一兩姜水煎三錢温服洞泄寒中論曰内經云謂長夏苦病洞泄寒中洞泄者謂食已即泄乃飱泄之甚者此因春傷于風邪氣留連至夏發為飱泄至長夏發為洞泄葢當春之時陽氣在表為風邪所中入客于經未至臟腑夫風者陽氣也東方木也木能勝土脾胃受之仲夏則陽盛之時以陽邪之氣逢陽盛之時重陽必陰病在脾胃故為飱泄陰生于午至未為甚是長夏之時脾土當旺脾為陰中之至陰故陰氣盛陰氣既盛則生内寒故令人臟腑内洞而泄是為洞泄寒中之病附子丸治洞泄寒中注下水榖或痢赤白食已即出食物不消附子烏梅肉一兩炒川連二兩炒乾薑炒兩半共末蜜丸梧子大飲下二十丸温中丸治脾胃虚寒洞泄不止附子乾薑龍骨硫黄肉豆蔲二兩共末糊丸梧子大食前艾湯下二十丸火輪散治脾胃氣寒大腸虚滑日夜不止附子一枚肉蔲五錢乾薑一分共末空心飲下二錢騖溏論曰脾氣衰則鶩溏葢陰中之至陰脾也為倉廩之官若脾胃氣虚弱為風冷所乗則陰氣盛陰氣盛則臟寒致糟粕不化故大便色黒狀如鶩溏也又大腸有寒亦令鶩溏吳茱茰丸治脾氣不足鶩溏青黑吳茰乾薑陳麯川歸赤石脂三分紫朴一兩共末蜜丸梧子大飲下二十丸龍骨黄連湯治脾氣不足鶩溏青黑龍骨五色者一兩煆川連三分薑汁炒川歸乾薑甘草炙五錢薑水煎三錢空心温服日二白滯痢冷痢熱痢赤痢白滯痢論曰白滯痢者冷痢之類葢腸虚受冷留而不去與津液相摶結滯如膿或如凝脂而下故曰滯痢人参湯治白滯痢及小便色白人参龍骨白茯川歸甘草乾薑五錢紫朴一兩水煎五錢溫服日二赤石脂㪚治白滯痢赤石脂一兩乾薑三分共末飲下一錢未差再服薑附子丸治臟寒下痢白膿心腹痛乾薑附子龍骨訶勒皮一兩共末飲下二錢冷痢論曰下痢其色或青或白或黑者皆冷痢也此因腸胃虚弱寒氣乗之故令人大便痢下青黒若其痢色白而食不消者寒中也當診其脉沉則生浮則死其人素有積寒即乆冷痢有膿也牡蠣湯治冷痢腹痛牡蠣燒紅醋淬白术川歸乾薑龍骨煆三兩赤石脂一兩附子炮去皮臍人参白芍甘草五錢水煎三錢温服若下膿加紫朴嘔逆加陳皮肉豆蔲丸治冷痢青白色黒者肉豆􅅳炙甘草二兩水煎三錢温服日二訶勒湯治脾胃虚冷下痢滑泄不思食及一切冷氣訶勒紫朴白术甘草陳皮草豆蔲一兩生薑大棗水煎三錢温服日二呉茱茰丸治冷痢下膿血臍腹痛脹滿食不化吳茱茰乾薑兩半紫朴川歸四兩陳麯赤石脂一兩共末蜜丸梧子大飲下二十丸赤石脂丸治多年冷痢飲食不化或青或黄四肢沉重起即目眩手足逆冷赤石脂熟艾一兩乾薑川椒炒出汗兩半鳥梅肉炒五兩共末蜜丸梧子大飲下二十丸四白散治一切冷痢白龍骨白石脂胡粉炒枯礬五錢共研極細飲下二錢熱痢論曰凡痢色黄赤並熱也甚則下血汁此由腸胃虚弱邪熱氣乗虚入客于腸間故其症下痢兼黄赤或血雜下腹中熱小便赤澀身熱煩渴故名曰熱痢生地黄湯治熱痢不止生地五錢甘草一分地榆三分水煎三錢空心温服日二甘草湯治夏月暴下熱痢甘草五錢生薑一分白蜜一合漿水五合煎分二服日二蒲根湯治熱痢蒲根二兩粟米二合水煎三錢温服日二黄連湯治熱痢腹痛日夜百行氣欲絶者川連一斤附子一兩白术龍骨赤石脂乾薑阿膠川歸一兩水煎五錢空心温服日二赤痢論曰熱痢之盛者為赤痢本由腸虚為風邪所傷又挾邪熱血得熱而妄行乗虚必凑渗入腸中與痢相雜其色純赤名為赤痢若腸虚不復則又為乆赤痢變成嘔噦疳慝之候矣黄柏丸治痢下黄赤水或黄赤膿四肢煩皮膚冷川柏片芩一兩川連二兩熟艾五錢共末蜜三兩蠟一兩化丸梧子大飲下二三十丸六神湯治赤痢腹痛或下純血川連車前子二兩陳皮去白炒一兩山枝甘草炙地榆五錢水煎五錢空心温服日二血痢膿血痢赤白痢血痢論曰邪氣客於血脉之中腸胃虚弱血隨熱行流渗腸間因便血下故名血痢其脉見虚小者生身熱疾數者難治茜根湯治痢下鮮血茜根川連地榆一兩山枝二十一枚犀角剉末一分水煎三錢入薤白三寸香豉一撮温服艾葉飲治血痢不能止小腹刺痛艾葉川連川歸龍骨訶勒皮二兩水煎三錢温服三物散治一切血痢胡黄連烏梅肉竈下土一兩共末茶下二錢葛粉飲治血痢日夜無度葛粉白蜜一兩汲水四合和勻服地榆湯治血痢日夜無度地榆二兩甘草炙五錢水煎五錢温服日二人参散治一切血痢腹痛人参肉豆蔲烏魚骨二兩共末飲下二錢通聖散治血痢腹痛日夜無度大棗去核烏梅肉七枚甘草一尺乾薑三錢共末薑棗水煎三錢服膿血痢論曰春傷于風邪氣留連夏為洞泄若遇熱氣乗之則血隨熱行渗入大腸與腸中津液相摶致積熱結血化為膿膿血相雜故成膿血痢秋冬診脾脉微澁者是也其脉滑大或微小沉細虚遲者皆生若懸絶或實疾或數大身熱者皆死黄連丸治下痢膿血羸瘦川連龍骨苦参紫樸一兩熟艾枯礬赤石脂甘草陳麯乾薑五錢共末蜜丸如梧子大飲下二十丸柏葉丸治膿血乆痢腹痛側柏葉川黄連阿膠地榆川歸五錢共末蜜丸梧子大飲下二十丸乾薑丸治膿血痢日乆不止乾薑川連川柏一兩附子甘草熟艾烏梅肉三分共末蜜丸如梧桐子太飲下二十丸二宜散治新乆痢下膿血川連吳茱茰二兩各製為末赤膿多茰末一錢連末倍之白膿多連末倍于茰末俱飲下赤白痢論曰赤白痢者由腸胃虚弱冷熱相乗客于腸間變而為痢葢熱乗于血流渗腸内即赤冷氣入搏津液凝滯則白其候裏急後重數至圊而不能便膿血相雜故名赤白痢重者狀如膿涕而血雜之輕者血膿上有赤脉薄血狀如魚脂腦世謂之魚腦痢黄連散治赤白痢腹中痛口乾或作寒熱川黄連炒三分白术片芩甘草乾薑川歸烏梅肉五錢阿膠一兩共末水煎三錢温服白术丸治赤白痢及水榖冷熱氣痢白术川歸龍骨犀角赤白脂烏梅三分紫朴川連一兩乾薑甘草五錢共末蜜丸梧子大飲下二十丸烏梅散治赤白痢乆不止腹痛下血脱肛烏梅肉川歸地榆赤石脂川連樗根白皮五錢乾薑三分甘草一分共末飲下二錢加減薑黄丸治冷熱赤白痢乾薑川連炒一兩各末糊丸各收白痢冷瀉薑丸三十丸連丸減半空心飲下赤痢下血薑丸十五連丸倍之赤白相雜薑連各半龍骨散治赤白痢腸胃虚滑龍骨五錢川連牡蠣一兩烏梅肉三分共末飲下二錢阿膠丸治赤白痢阿膠枳殻五錢川連白芍木香半生炒訶勒皮乾薑甘草一兩川歸地榆兩半共末酒糊丸梧子大飲下二十丸黄連散治赤白膿血痢川連龍骨二兩人参三分地榆紫朴乾薑一兩片芩一兩赤石脂兩半共末飲下二錢艾葉丸治赤白痢多痛不可忍艾葉木香半生半炒川連肉豆􅅳三分地榆一兩阿膠蛤粉炒川歸五錢共末蜜丸梧子大飲下二十丸阿膠丸治赤白痢腹痛不止阿膠三兩川連二兩胡粉川歸一兩共末糊丸飲下二十丸黄連丸治赤白痢不問逺近川連川柏赤茯當歸一兩共末蜜丸如梧桐子大飲下二十丸四神散治赤白痢後重腸痛川連乾薑川柏川歸一兩共末烏梅湯下二錢赤痢加黄柏白痢加乾薑後重腸痛加黄連腹痛加當歸大凡泄痢宜食酸苦葢酸收苦堅故也木香散治一切赤白痢木香檳榔肉蔲一兩乾薑五錢共末飲下二錢和中散治冷熱痢腹痛裏急附子川連一兩乳香一分各為末冷痢熱痢連附末共一錢乳末一字飲下未止用青皮湯再下一服赤痢附末五分連末倍之乳末一字白痢附末一錢連末減半乳末仝前黑豆湯治赤白痢服藥不止黑豆半升炒去皮為末四合甘草一兩用綿裹入湖水三升煎一升分二服白礬丸治赤白痢白明礬鉛丹二兩仝入瓶中封固火煆為末糊為丸如梧桐子大飲下一二十丸氣痢休息痢蠱痢乆痢氣痢論曰氣痢者由冷氣停于腸胃間致冷熱不調脾胃不和腹脅虚滿腸鳴腹痛便痢赤白名為氣痢治宜厚腸胃調冷熱補脾氣痢當自愈縮砂丸治氣痢胃與腸虚不能制伏日夜無度黄瘦食不生肌困重無力眼目昏澁多年不愈砂仁陳皮川歸赤石脂一兩川連二兩肉豆蔲五錢共末蜜丸梧子大飲下二三十丸黄連丸治乆氣痢不止或差或劇川連川歸烏梅肉訶勒皮一兩共末蜜丸梧子大厚朴湯下二三十丸日二猪肝丸治冷勞氣痢乆不差雄猪肝一具去筋膜切陳皮烏梅肉乾薑訶梨勒煨取皮桂心川歸一兩川連紫朴薑炒二兩大蒜煨熟二枚共末用肝蒜研糊丸梧子大飲下二十丸木香丸治氣瀉不止木香丁香砂仁肉豆寇一兩赤豆脂訶梨勒五錢煨藿香五錢共末糊丸梧子大飲下三十丸木香丸治一切氣痢不止木香肉豆􅅳砂仁赤石脂五錢共末用棗肉為丸如梧子大飲下三十丸香艾丸治氣痢腹痛臥眠不安熟艾陳皮一兩共末酒糊丸梧子大鹽湯下二十丸烏梅丸治氣痢不止瘦劣痢成冷勞烏梅草蔲紫朴一兩甘草川歸訶勒皮肉蔲乾薑蓽撥三錢桂心五錢猪肝一大葉醋煮研糊共末肝糊丸如梧子大飲下三十丸木香砂仁散治氣痢腹脹虚鳴木香二兩五錢砂仁兩半枳殻訶勒皮三兩共末飲下二錢肉豆蔲散治氣痢腹脹不下食肉蔲訶勒木香一兩仝上俱半生半炒甘草白术三分蓽撥乾薑五錢共末飲下二錢蓽撥煎治氣痢乆不差及諸痢困弱者蓽撥三錢研末牛乳半升慢煎其半頓服神効休息痢論曰腸中宿挾固滯每遇飲食不節停飲不消即乍差乍發故取名為休息痢治藥當加之以治飲消削陳寒痼滯之劑即愈阿膠湯治休息痢阿膠川連龍骨一分艾葉五錢倉米二合炒水煎三錢温服黄丹散治休息痢諸藥無効黄丹三兩炒棗肉三十枚仝丹搗紙包煨研末川連枳殻五錢共末飲下砂仁丸治休息痢砂仁一兩肉豆蔲五錢羊肝半斤切共末拌匀麫包紙裹煨熟研米糊丸梧子大飲下三十丸黄連湯治休息痢川連龍骨五錢熟艾阿膠五錢水煎三味去滓入阿膠再沸分二服每服後濃煎艾湯飲之玉液丹治休息痢枯礬二兩硫黄硝石五錢仝研化研末糊丸小豆大飲下一二十丸兼治腸風下血砂仁丸治冷氣腹痛不止休息氣痢勞損消化水榖温脾胃冷滑下痢不禁砂仁附子乾薑紫朴陳皮肉豆蔲五錢共末蜜丸梧子大飲下二三十丸四神丸治多年休息痢者川歸龍骨五錢川連一兩烏梅肉二枚共為末用薤白取汁杵丸小豆大温水下二十丸當歸丸治多年休息痢川歸川連烏梅肉一兩共末薑汁丸梧子大厚朴湯下二十丸金石散治多年休息痢石灰風化者鉊丹炒一分糯米炒黑一合將灰丹仝入鍋慢炒一炊乆入米仝研末空心飲下二錢蠱痢論曰凡下痢膿血間雜瘀黑有片如鷄鴨肝與血皆下者蠱痢也此由嵗時寒暑不調濕毒之氣襲人經脉漸至臟腑毒氣挾熱與血相摶客于腸間如病蠱注之狀故名蠱痢茜根飲治蠱痢下血如雞鴨肝腹痛難忍茜根升麻片芩犀角川栢桔梗三分白蘘葉地榆一兩水煎三錢温服升麻湯治毒痢下血片臍下刺痛升麻地榆片芩茜根兩半犀角一兩山枝二十一枚水煎五錢入生地薤白香豉温服日二乆痢論曰乆痢不差則元氣日耗腸胃損傷濕氣散入肌肉浮腫以胃土乆虚故也蟲因虚動上食于膈則嘔逆煩悶下蝕腸中則肛門瘡爛乆而不差變成疳慝或下赤汁水血相半腥不可近者是謂五臟俱損其病難治紫朴湯治久痢經年不差紫朴川連熟艾乾薑阿膠炒石榴皮炒一兩水煎三錢温服茯苓丸治久痢脾胃虚弱食不消腸鳴痛白茯龍骨川歸乾薑川栢赤石脂三分陳麯川連一兩附子人参甘草共末蜜丸如梧子大飲下二十丸黒神散治腸滑久痢神効無比酸石橊一枚劈四塊火燒􅈣盡不令作灰碗葢存性出火毒研末水煎石橊一辦取汁下二錢乆瀉亦治乆痢不止生薑切砂糖一兩拌匀紙煨五更初作一服以臘茶嚼下泄痢門下痢裏急後重論曰下痢裏急後重者有瘕聚也經所謂大瘕泄者裏急後重數至圊而不能便莖中痛是矣法當和氣而袪藴滯則脾胃平和飲食腐化膿血自消大腸自固也當歸黄連湯治後重下赤白滯下腹内結痛川歸犀角赤茯三分川連兩半甘草五錢紫朴地榆一兩薑棗水煎三錢温服聖功散治冷熱不和下痢赤白臍腹痛裏急後重乾薑五倍子一兩甘草訶勒皮五錢共末飲下二錢白頭翁湯治熱痢下重白頭翁川連川栢秦皮三兩水煎三錢温服當歸湯治冷痢裏急後重川歸酒炒胡椒乾薑阿膠一兩川連紫朴二兩共末醋熬膠末為膏丸梧子大陳皮湯下二十丸通神丸治膿血雜痢後重疼痛乆不差没藥乳香五靈脂一錢巴霜五分共研水丸小豆大木𤓰湯下五七丸小兒减半痢後脱肛論曰下痢脱肛者因大腸虚弱冷氣偃滯致不能便極力于下肛門脱出故名脱肛温其藏則愈古方有坐湯温熨之藥皆良法也黑聖散治痢乆脱肛痛大蜘蛛一枚入泥合燒黑色勿太過研末入黄丹少許先用白礬葱椒湯洗拭乾渗藥在軟帛上挼托肛頭即不下猪肝散治洞瀉脱肛猪肝一片炙川連阿膠川芎一兩烏梅肉二兩艾葉醋炒五錢共末酒下二錢壁土散治脱肛故室東壁上土五合皂莢三枚共末𫝊肛上取皂莢灰煖更互熨入枳實熨方治積冷下痢脱肛枳實一枚石上磨令滑澤鑚安柄子蜜塗炙令煖熨之冷易肛入即止一方以猪脂和蒲黄𫝊肛上手按令入日二三愈疳􅉶論曰疳有五種乆變為蠱蠱􅉶一曰白疳令人皮膚乾燥而無潤澤之氣二曰赤疳令人毛髪枯焦三曰燒疳令人腰􅆃强重四曰疳慝令人下部攣急背强不能俯仰五曰黑疳患者必死令人五臟俱損或下瘀血此葢腸胃俱虚嗜肥甘過度致脾胃緩弱榖氣衰微衛氣虚損腸間諸蟲因虚而動蟲蝕于上則手足煩疼心中懊憹嘿嘿不欲飲食腰􅆃無力食不知味精神恍愡夜夢倒顚咽喉生瘡齒齗黒㸃損爛膿血俱出胃氣逆則變嘔噦下蝕腸胃便痢膿血或下瘀黑乆不已則肛門爛開漸至危殆治積年疳痢面黄瘦硫黄川連熟艾一兩白蜜一合水一升煮連艾取汁入黄末數沸綿濾過入蜜數沸分三服疳痢乆不差羸瘦欲死羊屎一升水一斗浸一宿明旦絞汁頓服至日午惟食水煮飯極重不過三服差二白湯治乆痢變疳下部生惡瘡惡寒壯熱桃白皮槐白皮一升若参五合大棗十枚熟艾五合要五月五日取者方炒用水五升煮半入熊胆一棗大攪勻以一升灌下部餘分三服治乆痢成疳百方不差丁香麝香川連一分共末用竹筒吹入下部溼􅉶論曰凡下痢不止或發之餘為水溼所乗客于腸胃令九蟲皆動侵蝕臟腑故為溼􅉶之病所謂􅉶者蟲動于匿而難尋故也謂蟲因溼而動故名溼􅉶其症上蝕唇口下食肛門上唇生瘡是蟲蝕五臟令人心煩懊憹下唇生瘡是蟲蝕下部令人肛門傷爛若胃虚氣逆則變為嘔噦甚則臟腑被傷齒上下齗皆生瘡齒色暗黑是其候也下痢出瘀血者不可治黄連湯治疳溼􅉶蝕口齒及下部川連四兩熟艾二兩苦参槐白皮三分水煎五錢重者不過三服猪膽煎治疳􅉶下部上攻除熱殺蟲猪膽一枚米醋五合煎醋百沸入膽汁再熬滿口飲之蟲死差塗方治疳􅉶無問所在皆治死蝦蟆一隻燒灰研末麻油和塗患處丁香散治疳溼􅉶洗熨下部丁香一分麝香一錢甘草犀角三分共末以鹽椒各三合豆二合水三升煮乗熱用用綿蘸洗熨聖濟總録纂要卷六
