body:
  text: 聖濟總録纂要卷十一休寧程林纂黄疸門黄疸統論論曰疸病症有五種一曰黄疸二曰黄汗三曰穀疸四曰酒疸五曰女勞疸黄疸者徧身面目悉黄如橘黄汗者身體黄腫汗出如檗汁不渇状如風水榖疸者食畢頭眩心中怫鬱不安而發黄酒疸者心中懊痛足腫滿小便黄面發赤斑黄黒由大醉當風入水所致女勞疸者一身面目皆黄發熱惡寒小腹滿急小便難由大熱房室過度此五者症狀雖異大率因酒食過多水榖相並積於脾胃復為風濕所摶熱氣鬱蒸所以發黄為疸其症食已如飢曰胃疸額上黒足下熱曰黒疸其因傷寒時氣後變成黄者縁陽明病無汗小便不利熱瘀在裏心中懊憹身必發黄若被火額上㣲汗出但小便不利亦發黄其狀如橘色腹㣲滿此由寒濕不散瘀熱在于脾胃故也又有九疸三十六黄其症其名悉各不同治皆有法具載後章凡黄病當利其小便疸而渇者其病難治疸而不渇其病可治黄疸論曰内經謂目黄者曰黄疸又曰安臥脉盛謂之黄疸其外症身體面目及𤓰甲小便盡黄其内症食已如飢此由酒食過度脾胃有熱復為風濕所摶瘀結不散熱氣鬱蒸故發是疾若面色㣲黄身體或青赤黒色皆見者與純熱之症不同當于濕家求之諸黄疸發于陰部其人必嘔發于陽部其人必振寒而發熱也茵陳蒿湯治黄疸目黄小便如血心煩躁悶口苦頭痛茵陳蒿麥冬山枝仁三分木通柴胡括樓根一兩炙甘草五錢水煎五錢入竹葉二七片温服日二木通湯治黄疸脾胃積熱皮肉皆黄煩躁口苦小便赤澀木通瞿麥穗一兩懐生地兩半大青赤茯苓白茅根秦芁三分水煎五錢温服日二黄連湯治黄疸面目徧身皆黄小便盡黄川連大青人參地骨皮茵陳蒿山枝仁炒子芩柴胡芒硝一兩大黄炒二兩水煎五錢温服日二桃根湯治黄疸面目一身如金色及一切疸病桃根皮東引者一把如釵股者佳勿見風及避女人鷄犬水煎取汁空心頻服如眼中黄色未退時飲酒一杯白鮮皮散治一切黄疸而目皮肉如金色小便赤黒口乾煩渇白鮮皮二兩芒硝大黄三兩土𤓰根茵陳蒿括樓根白芍川連柴胡山枝兩半子芩一兩真珠三十枚燒赤研大青兩半共末用白茅根取汁下三錢取利至晩不利再服服了以葱豉粥投之取利為効柴胡湯治黄疸身面黄口渇柴胡五錢炙甘草一分白茅根一把水煎温服未差再服秦芁煮散治面身目𤓰甲小便俱黄秦芁一兩用牛乳二鍾半煎鍾半分二服未差再服茵陳蒿丸治一切黄疸并小便如金色及身皮皆黄者茵陳蒿四兩大黄片芩山枝仁三兩共末入蜜杵丸梧子大空心飲下二三十丸日二呉藍飲治黄疸身腫發熱汗出而渇汗著衣正黄呉藍白芍麥冬白鮮皮山枝仁桑白皮炙防己一兩水煎五錢温服日二急黄論曰諸發熱心顫定必發為急黄謂其卒然發黄心滿氣喘命在頃刻故名急黄也有初得病身體面目即發黄者有初不知是黄死後變黄者但先有其症當急治之此由脾胃有蓄熱及客氣鬱蒸又因熱毒所加故發為斯病也茵陳蒿湯治急黄小便赤黄如枝子汁色兼心中煩悶茵陳蒿子芩山枝仁川連大黄㣲炒白鮮皮一兩貝齒煆朴硝研五錢水煎五錢去滓入朴硝五分沸服日二茵陳川連湯治天行急黄身目如金色茵陳蒿川連子芩大黄炒一兩人參炙甘草五錢水煎五錢空心温服日二龍膽草湯治急黄面目身體如金躁欲飲水龍膽草一兩石膏二兩木通土𤓰根大黄㣲炒兩半白茅根朴硝研犀角一兩山枝五錢水煎三錢去滓入朴硝五分沸服黒豆煎治急黄煩熱口乾徧身悉黄黒豆一升用水五大鍾煎汁二鍾入生地汁藕汁麥冬汁白蜜各二合酥半合慢煎成膏含化一匙日三夜一陰黄論曰陰黄者面黄頭痛不發熱不欲聞人聲音此由陽伏于陰邪氣熱盛沉潛散于肌肉身黄如橘故謂之陰黄昔人有言下之後身目發黄者當於寒濕中求之此其類也秦芁湯治陰黄不欲聞人言語小便不利秦芁一兩赤茯苓炙甘草旋復花五錢用牛乳煎四錢温服茵陳蒿散治陰黄身面如橘色小便不利茵陳蒿二兩白术猪苓赤茯苓三分桂心五錢澤瀉去毛一兩共末空心水下二錢日三半夏湯治陰黄小便色不變欲自利腹滿而喘者必噦半夏湯泡薑汁炒一兩人參葛根二兩生薑水煎四錢温服日二赤小豆散治陰黄赤小豆丁香各二十一粒麝香研一錢𤓰蒂二枚青棉布灰二錢共末熟水下一錢日二以吐為度又取少許吹鼻中有黄水出効酒疸論曰胃虚榖少醉以入房冐犯風邪胃中熱毒隨虚入裏小便黄赤濕毒内聚心下懊憹疼痛薫發肌肉則身目發黄或發赤斑足脛浮腫或下之早則變為黒疸令人心如病飢大便黒瘀皮膚不仁治法槩宜先去濕毒後分小水陳茵蒿湯治酒疸心中懊痛小便黄赤茵陳蒿葛根赤茯苓五錢升麻秦芁一兩括樓根三分山枝仁半分水煎三錢温服日二以差為度艾葉湯治酒疸身目俱黄心中懊痛艾葉生一把如無用乾者麻黄去根節二兩大黄炒兩半用酒煎四錢入大豆半合空心温服日二凝水石散治酒疸小便不利或飲少溲多如白泔色凝水石煆白石脂括樓根一兩知母桂心兎絲子酒煮二兩共末空心飲下二錢日二小麥飲治酒疸生小麥用水煎二合取汁頓服未差再服追毒飲治酒疸徧身發黄狗脊去毛酒蒸一兩白芥子炙甘草一分用酒一升煎半升分二服以利下為度未利再服榖疸論曰夫飢飽甚則胃中滿塞榖氣未化虚熱薰蒸遂為榖疸其症心下懊悶䫦睡心忪怫鬱發煩小便不利身黄如橘是也苦參枝子丸治榖疸苦參子芩山枝仁龍膽草一兩共末用雄猪膽汁和丸如梧子大空心飲下二十丸日二胃疸論曰已食如飢者胃疸也夫胃熱則能消榖今已食如飢者以胃氣但熱而無陰也然胃為足陽明陽明之脉絡屬于心陽明得熱則心火上行陽炎過矣故單陽成癉心嘈雜而身面黄小便赤色也瀉熱湯治胃中有熱食已如飢不生肌肉面色萎黄生大黄麻黄去根節子芩四兩甘草陳皮去白杏仁去皮尖研赤茯苓芒硝研澤㵼一兩水煎三錢温服日二蘆根湯治胃熱壅盛食已如飢面黄口燥蘆根麥冬括樓根一兩甘草知母赤茯苓三分生薑水煎三錢入小麥一撮竹葉生地一分温服日二赤茯苓湯治胃積熱食已即飢面黄肌瘦胸滿脇脹赤茯苓陳皮澤㵼桑白皮三兩炙白芍藥白术四兩石膏研八兩人參桂心二兩半夏薑炒六兩生薑水煎四錢温服犀角湯治胃實熱嘔逆不下食犀角屑葛根三分麥冬枇杷葉去毛炙一兩生薑水煎三錢服黒疸論曰諸黄疸酒疸女勞疸久不已皆變為黒疸其狀小腹滿身體盡黄額上反黒足下熱大便黒是也黄本脾病脾者土也脾病不已𫝊其所勝腎斯受之腎為水藏其經足少陰其色黒病在腎故小腹滿色黒大便黒足下熱是皆足少陰經受病之症當歸湯治諸疸久不差變成黒疸小腹滿身黄額黒川歸三兩桂心六兩麥門冬大黄炒一兩黒乾薑黄茋炙茵陳蒿子芩赤茯苓炙甘草石膏研川連白芍藥人參二兩共十四味剉如麻豆大用生薑水煎三錢空心温服日三一方無黄茋土𤓰根飲治諸疸變成黒疸諸醫所不能治者土𤓰根水煎取汁每日空心服半鍾其病隨小便出即愈須強壯人可半鍾羸瘦人只一合無生者剉乾者一兩水煎服女勞疸論曰脾胃素有濕熱或縁大暑醉飽房勞過度引熱歸腎濕氣交攻小水不利小腹堅脹濕毒流散于肌肉之中則四肢身面發黄故謂之女勞疸然其症又有額上黒㣲汗出手足心熱薄暮即發膀胱急小便自利者各宜隨其症而治之硝石礬石散治女勞疸身目皆黄發熱惡寒小腹滿急小便難出大勞大熱房室傷損濕毒散于肌肉硝石礬石燒枯一兩共末空心飲下一錢覆衣取汗隨利小便色黄大便色黒差未差再下犀角湯治女勞疸及勞氣熱渇額上汗出手足熱小便赤澀犀角龍膽草一兩升麻炙甘草五錢麥冬去心三分生薑大棗水煎三錢去滓入生地汁一合再沸服日二髪灰散治女勞疸身目俱黄惡寒發熱小腹滿急小便難亂髪雞子大一丸猪脂半斤用油慢火煎髪令髪消盡温水下一匙不拘時頻服以小便利為度黄汗論曰黄汗者汗出沾衣色正黄如檗汁故名曰黄汗由脾胃有濕瘀熱伏留薫發肌肉散而為汗其症使人身體浮虚骨節疼痛發熱汗出而不渇是其候也黄茋苦酒湯治黄汗身腫發熱汗出而不渇狀如風水汗沾衣色黄如檗汁脉沉由夫汗出入水中浴水從汗孔入而得之黄茋蜜炙五兩白芍藥桂心三兩用苦酒二鍾煎五錢空心服之當心煩苦酒阻故也日二服呉藍湯治黄汗身重發熱汗出而不渇狀如風水汗出衣黄呉藍防己白鮮山枝仁桑白皮麥冬去心白芍兩半水煎三錢温服未効再服茵陳蒿湯治黄汗身熱不退大小便不利茵陳蒿木通黄茋赤芍藥赤茯苓炙甘草一兩大青炒二兩水煎五錢温服頃再服以二便通利為度山枝括樓丸治黄汗身熱大小便不利山枝仁括樓根苦參一兩共末用醋浸雞子二枚和丸梧子大水下三十丸日三四服蔓菁子散治黄汗如檗汁沾衣身虚浮蔓菁子為末用井華水空心下二錢日二以差為度三十六黄一心黄二肝黄三脾黄四肺黄五腎黄六鬼黄七姦黄八血黄九人黄十髓黄十一癊黄十二急黄十三氣黄十四癎黄十五白黄十六陰黄十七膽黄十八驚黄十九風黄二十走精黄二十一酒黄二十二雞黄二十三蜒蚰黄二十四火黄二十五走馬黄二十六房黄二十七黒黄二十八厭黄二十九水黄三十𤓰黄三十一腸黄三十二犢黄三十三氣黄三十四猪黄三十五土黄三十六蝦蟆黄右三十六黄有烙法有灸法有方法中多竒證大約是瘟疫中壊證必有之惡候也然三法俱難用故不刋載今存其名以備醫家博覽胸痺門胸痺統論論曰虚極之人為寒邪所客氣上奔廹痺而不通故為胸痺其症堅滿痞急或胸中愊愊如噎塞或胸背皆痛或胸滿短氣咳唾引痛煩悶白汗出或心痛徹背或肌痺皮痛是皆閉塞而不通也夫脉當取太過與不及陽㣲陰弦則胸痺而痛又云胸痺之病喘息咳唾背痛短氣寸口脉沉而遲闗上𦂳是皆胸痺之候也胸痺論曰胸痺之病其脉陽㣲而陰弦陽虛則知在上焦陰弦故令胸痺心痛古方用理中湯取緩其中氣則可也然背者胸之腑或築或悸或渇或腹痛或寒或腹滿其候不一治當隨症加減理中湯治胸痺人參白术炙甘草黒乾薑一兩水煎五錢温服頃又服若築者此腎氣動也去白术加桂心臍上築吐多者去白术加生薑下多者復用白术悸者加白茯苓渇者加白术二兩腹中痛加人參一兩寒者倍乾薑腹滿去白术加附子服後以稀粥投之取汗括樓實湯治胸痺括樓實一枚并瓤子用枳實五枚麩炒半夏四兩薑炒水煎五錢入薤白五寸生薑三片煎温服日二半夏湯治胸痺心下堅痞急痛徹背短氣煩悶白汗出半夏薑汁炒二兩半括樓實一枚薤白切二合生薑水煎五錢入薤白服日二胸痺噎塞論曰胸痺噎塞之病以胸中痞結不通故有噎塞之症盖寒氣客于五臟六腑因虚而發上冲胸間則氣痞而不通甚則為噎塞也裩布丸治心胸氣喉中噎塞裩布洗燒灰三分木香赤茯枳實麩炒㯽榔五錢半生半炒訶梨勒煨皮五錢甘草乾薑一分共末入蜜杵丸如梧子大空心温酒下三十丸日二赤茯苓湯治胸中氣壅噎塞赤茯苓三兩炙甘草一兩杏仁四十九枚去皮尖炒研水煎三錢温服日二胸痺心下堅痞急論曰體虚之人寒氣客之氣結胸鬱而不散故為胸痺其症心下堅滿痞急甚者疼痛搶心如刺手不得犯治之當辨至㣲殆不可忽也五物湯治胸痺心下堅陳皮去白炒白芍川歸五錢木香一分桔梗一兩生薑水煎五錢服桔梗湯治胸痺心下氣堅滿痞急刺痛不可俛仰氣促咳吐引痛不能飲食桔梗炒陳皮炒二兩甘草一兩括樓實炒一枚生薑大棗水煎五錢入薤白五寸空心温服日二五味丸治胸痺心下堅痞急附子黒乾薑三兩桂心㯽榔訶勒皮一兩共末入蜜杵丸如小豆大酒下二三十丸日二白豆蔲湯治胸痺心下堅痞急白豆䓻人參木香桂心五錢黒乾薑京三稜醋煮炙甘草陳麯一兩陳皮大麥蘖炒香三兩生薑水煎三錢入鹽少許温服日二胸痛論曰胸痛者胸痺痛之類也此由體虚挾風又遇寒氣加之則胸膺兩乳間刺痛甚則引背􅈩或徹背膂咳唾引痛是也桔梗黄茋湯治胸膺痛桔梗二兩人參川芎甘草蘇葉五錢川歸黄茋沉香一兩水煎三錢温服日二白术枳實散治胸痺白术土炒枳實麩炒陳麯炒一兩共末酒下二錢日二栢實散治胸痺栢子仁炒一兩桂心半分共末飲下二錢日二聖濟總録纂要卷十一
