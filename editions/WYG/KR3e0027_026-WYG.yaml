body:
  text: 聖濟總録纂要卷二十六休寧程林纂神仙服餌門神仙服草木藥石論曰神仙服草木必取其柯葉堅固形質不變若松栢茯苓之類其意盖以延年益夀為本至於其他非具五行之秀則必備四氣之和其意深矣千金謂服餌大法必先去三蟲三蟲既去次服草藥草藥得力次服木藥木藥得力次服石藥精麄相代由麄以至精其序不可紊也黄精丸方延年補益療萬病黄精十斤洗令淨蒸爛熟白蜜三斤天門冬三斤去心蒸令爛熟拌和令勻置於石臼内搗一萬杵再分為四劑每一劑再搗一萬杵取出丸如梧桐子大每服三十丸温酒下日三不拘時兎絲子丸方明目進飲食益精壯下元兎絲子一斤酒浸三日控乾搗末甘菊花去土搗末拌和令勻鍊白蜜為丸如梧桐子大每日清晨至晚後食前以温酒送下二十丸至三十丸進食倍常頻頻泄氣是藥之應若諸般眼疾黒花昏暗者並宜服之黄精酒方延年益夀返老還童除萬病黄精五斤天門冬去心三斤松葉枸杞根各五斤搗為麄末以水三石入前藥在内煮二石用糯米一石細麵麯半秤蒸米麯入在前藥水中封閉二七日熟任性飲之地髓散方長年保命生乾地黄四兩香附根茜根地骨皮洗焙菴䕡子茅草根各一分右六味擇日修合春用甲子夏用丙子秋用庚子冬用壬子搗羅為細散每日早晨温酒調下一錢匕午後再服五十日後諸疾不生身體輕強養血去風治吐血衂血失血諸疾靈仙散方輕身延年却老還童白茯苓一兩巨勝子酒浸半斤九蒸晒天門冬去心白术杏仁去皮尖乾黄精各一兩右六味搗羅為細散每於食前水飲下三方寸匕日二服或以蜜丸如赤小豆大每服三十丸温水下松實丸方延年復命松實栢實淨揀各三兩松脂鍊成十斤甘菊花五升為細末鍊蜜和搗五六百下丸如梧桐子大每日食後午前温米飲下二十丸漸加至三十丸至百日不飢顔色光潤胡麻散方益夀延年去客熱胡麻子白茯苓生乾地黄天門冬去心各八兩為細散每服方寸匕食後温水調下芡實散方河上公益夀延年乾雞頭實五兩忍冬莖葉揀無蟲汚新肥者乾藕各一斤三味於甑内炊熟暴乾搗羅為細散每日食後新汲水調下一錢益夀地仙丸方甘菊花三兩枸把二兩巴㦸天二兩肉蓯蓉酒浸一宿洗浄切片焙乾四兩為末鍊蜜和丸如梧桐子大每日空心鹽湯或酒下三十丸久服清頭目補益丹田駐顔潤髪春秋枸杞菊花加一倍冬夏蓯蓉巴㦸加一倍服餌勿令斷絶辟榖木耳丸方木耳搗末大豆炒熟搗末八兩大棗煮熟去皮核研一斤三味鍊蜜和丸如雞子大有食日服一丸無食日服二丸逄食即食無食亦不飢矣服松脂辟榖不老方松脂五斤桑灰汁一石二味以灰汁一斗於釡内煮松脂三五沸取接置冷水中候凝復煮之如此十度乃止逐度易灰汁并換冷水其脂白矣取鍊成白脂研羅為末毎服一匙頭以酒或米飲調下空腹日午近晩服若至十兩以上不飢一年以後夜視明目久服不老絶榖升仙不食方松實去皮菊花等分二味為末鍊過松脂和丸如梧桐子大或鍊蜜為丸毎服十丸酒下日三服可至二十丸亦可作散服二錢空心日午近晩各一服天門冬丸方辟榖延年天門冬白茯苓白蜜白蠟白羊脂去膜各一斤先搗羅天門冬茯苓二味為末次以清酒五升入大鐺中煎三沸内羊脂煎三五沸又内蜜并蠟煎五沸掠去沫次入天門冬茯苓末用栁木箆不住手攪令勻火勿令猛候煎成膏可丸乃丸如櫻桃大又取大杏仁一升浸去皮尖雙仁研如膏傾入淨通油瓷缾内坐慢灰火中内前藥丸子于杏仁膏中養令色白即取離火每服三丸空腹温酒下廣福延齡丹方去三尸潔臟腑鎮七魄明耳目丹砂研雄黄研如粉人參白茯苓各二兩白术乳香研四兩右六味各搗研為末和勻入銀器中用白蜜和如稀膏以油單封口又以水和白麵裹器物外厚兩指許每日於飯上炊候飯熟取下如此半月如藥乾更入蜜丸如梧桐子大空心温酒下二十丸忌羊血其功甚大神仙巨勝丸方輕身壯陽却老還童去三尸下九蟲除萬病即黒芝麻巨勝二斤酒浸一宿九蒸九晒牛膝酒浸切焙巴㦸天天門冬山藥栁桂熟乾地黄酸棗仁覆盆子兎絲子酒浸别搗暴乾逺志去心菊花人參白茯苓各一兩揀擇淨為末鍊蜜丸如梧桐子大毎日空心温酒下二十丸服一月身輕體健萬病不侵青元子返童散方輕身延年除百病去三尸天門冬人參白茯苓麥門冬白菊花各六兩為散每日温酒或飲調下三錢不拘時候服三年身輕補益門平補論曰一隂一陽之謂道偏陰偏陽之謂疾不明乎道未有能已人之疾者世之貪藥石惟務酷烈非徒無益反傷和氣故方論平補之法欲陰陽適乎其中也平補五臟延年治百病方兎絲子酒浸七日炒黄三兩覆盆子車前子巴㦸天逺志生地黄白术細辛去苗葉何首烏菖蒲地骨皮牛膝一兩續斷菊花去梗蕚各一兩半除菊花外以温水和酒少許洗過焙乾杵羅為末鍊蜜丸如梧桐子大每日空心常服三十丸男子鹽湯下婦女醋湯下午食前更一服至十服其人病有發時是藥動病本功應也枸杞丸方平補心腎延年駐顔枸杞子肉蓯蓉酒浸一宿菊花黄蓍塗酥炙桂心牛膝酒浸一宿生乾地黄酒浸一宿逺志山藥各一兩人參白茯苓栢子仁炒酒浸各一兩半右為末以浸藥酒煮麵糊丸如梧桐子大每服空心酒下三十丸鹽湯下亦可無比山藥丸方平補諸虚百損五勞七傷頭痛目眩手足厥冷或煩熱有時或冷痺骨疼腰髖不隨飲食雖多不生肌肉或少食而脹體無光澤陽氣衰絶陰氣不行此藥能補經脉起陰陽安魂魄開三焦破積聚厚腸胃強筋練骨輕身明目除風去冷無所不治乾山藥二兩五錢肉蓯蓉四兩去皺皮酒洗焙五味子二兩五錢兎絲子酒浸三兩研爛焙乾杜仲炒三兩牛膝酒浸二兩山茱茰二兩熟乾地黄二兩澤瀉一兩茯神去皮二兩巴㦸二兩赤石脂一兩一方有逺志二兩右為末鍊蜜和丸如梧桐子大每服二十丸至三十丸食前温酒下温米飲亦得服之七日後令人身輕健四體潤澤唇口赤手足暖面有光悦消磨飲食身體安和音聲清響是其騐也十日後長肌肉此藥通中入腦鼻必酸疼勿怪六神丸方平補諸虚大益氣血石菖蒲地骨皮牛膝酒浸兎絲子酒浸炒生乾地黄逺志各等分右為末鍊蜜丸如梧桐子大每服二十九空心食前温酒或鹽湯下加至三十丸山藥四倍丸方平補除風疾益年夀山藥半兩枸杞子一兩甘菊花二兩熟乾地黄四兩為末鍊蜜丸如梧桐子大空心食前鹽湯下三十丸温酒亦可補骨脂丸方平補諸虚益精壯陽補骨脂松脂白茯苓山藥各八兩杏仁去皮尖雙仁炒三升胡桃肉大棗各一斤桂心牛膝酒浸澤瀉菖蒲薏苡仁萆薢檳榔各一兩鹿角膠炙燥十兩獨活蛇牀子蒺藜子炒去角各一兩生地黄廿斤取汁右除地黄汁外為末以水煎至地黄汁成膏入藥㸃蜜和丸如梧桐子大每服空腹温酒下三十丸峻補論曰陰陽之氣本自和平過則生患峻補之藥施於倉卒縁陽氣暴衰真氣暴脱或傷寒陰證諸疾急於救􅓼者不可緩也盖人稟受有限嗜慾太過病疾横生固當取陽氣以扶衰弱則峻補諸方經所謂補下治下制以急急則氣味厚者此之謂也青硫丸方治久冷峻補元藏硫黄一斤酒甘草水浸研三日附子去皮臍山茱茰各四兩牛膝酒浸三兩白豆蔲去殻二兩木香二兩肉豆蔲去殻二兩艾葉一兩乾為末拌勻蒸木𤓰肉和搗為丸如梧桐子大每服十丸至十五丸空心鹽湯下如脚腰疼痛用木𤓰湯下益神丸方補元藏久冷硫黄酒并甘草水浸一日木香肉豆䓻檳榔桂心青橘皮去白各一兩附子去皮臍乾薑各一兩為末和勻用糯米粥丸如梧桐子大毎服十丸至十五丸空心酒下補虚益氣論曰形不足者温之以氣精不足者補之以味形精相感氣血生化則榮衛循流不失其度食飲不節起居靡常嗜慾過度神憊精摇則真氣將耗虚損之疾由是而生治法當補虚益氣兎絲子丸方補元藏益脾胃止腹臍疼痛思進飲食固真氣美顔色兎絲子水陶去浮者用酒浸七日别搗萆薢各二兩肉蓯蓉酒浸一宿四兩黒狗脊骨并髓炙焦一兩半黄者亦佳枳實炒一兩熟乾地黄二兩山藥一兩為末酒煮麵糊丸如梧桐子大每服三十丸米飲下空心食前各一服地黄沉香丸方治上熱下冷五勞七傷補益虚損沉香鹿茸酒浸酥炙肉蓯蓉酒浸牛膝酒浸附子去皮臍各三兩兎絲子酒浸一宿别搗末三兩黄蓍熟乾地黄四兩蒺藜子炒二兩巴㦸天川芎石斛山茱茰木香羗活補骨脂蛇牀子楝實取肉人參桂心蘹香子炒檳榔骨碎補安息香胡桃瓤二枚研各一兩右為末别取地黄自然汁七升棗膏四兩酒三升蜜半斤酥五兩於銀石器中熬如膏放冷入羯羊筒骨内髓半斤鍊油去滓和前末杵千百下丸如梧桐子大毎空心温酒或鹽湯下三十丸加至四十丸四補丸方益氣血補元藏悦顔色栢子仁生絹袋盛何首烏切片肉蓯蓉切片牛膝生絹袋盛各三兩用酒三升春夏浸七日秋冬浸二七日取牛膝栢子仁先搗如泥次將何首烏蓯蓉杵得所為丸如梧桐子大每服二十丸至三十丸空心温酒下補虚益精髓論曰内經謂腎者主水受五臟六腑之精而藏之又曰腎之合骨也骨者髓之府故嗜慾過傷精髓耗憊則必用補腎之劑以益之凡病虚則補之不必專用熱藥若腎虚之證尤當以益精髓為先聖濟經謂陽劑剛勝則曰天癸竭而榮涸盖謂此也覆盆子丸方治五勞七傷骨髓虚憊覆盆子鹿茸去毛酥炙巴㦸天五味子桂心山藥各半兩黄蓍牛膝酒浸熟乾地黄一兩逺志一分肉蓯蓉酒浸石斛各三分右為末鍊蜜丸如梧桐子大空心温酒下三十丸仙丸方補不足填精髓除風變白生地黄廿斤取汁生牛膝十斤取汁生薑三斤取汁兎絲子酒浸别取末桃仁去皮尖雙仁炒杏仁酒浸去皮尖雙仁巨勝子甑内炊熟暴乾九遍湯浸去皮炒研蒺藜子各一升白蜜先將地黄汁量三升入銀石器内浸到處刻記定次入餘地黄汁慢火煎至刻處次下牛膝汁又煎至刻處其火常令如魚眼沸次下杏仁桃仁末次下巨勝末次下蒺藜末次下兎絲末又下白蜜攪勿住手候可丸即搗三千杵丸如梧桐子大每服空心温酒下三十丸加至四十丸晩再服百日後白髪變黄二百日後從黄變黒諸風悉除尤補腰腎益氣明目金鎻丸方壯元氣益精髓補虚損龍骨一兩茅香湯浴三遍研如麵蓮花蕋七八月採二兩雞頭粉三分山茱茰酒浸取肉沉香肉蓯蓉酒浸去皮附子去皮臍桂心為末以金櫻煎膏丸如無即鍊蜜丸如梧桐子大空心温酒下二十丸至三十丸地黄煎方治精極填骨髓生地黄一斤取汁牛酥一斤白蜜一斤以慢火煎地黄汁減半内牛酥更煎良久次下蜜攪勻候稀稠得所瓷器盛每日空心食前温酒調下數錢靈芝丸方治脾腎氣虚補骨髓通利耳目蒼术一斤米泔浸時換水以竹刀刮去皮并土夏浸三日冬浸七日晒乾為末棗肉丸如梧桐子大空心棗湯下三十丸至五十丸蒼术一味甚妙人以至賤而忽之服之勝他藥多矣熬膏亦佳補虚固精論曰腎主水受五臟六腑之精而藏之所謂天一在藏本立始也若腎衰精氣不固或因溲而出或因聞見而溢或因虚勞漏泄精氣或因邪氣乗虚客於陰為夢遺皆腎虚也宜補益固之澁以去脱之劑九物金鍊丹方治虚損去風閉精固元陽龍齒敗龜板酥炙雄蠶蛾白蓮花各半兩山藥二兩巴㦸天半兩蓮子心肉蓯蓉各一兩雄雞肝一具為末麵糊丸如梧桐子大每服十丸空心温酒下補骨脂丸方治夢泄補骨脂炒四兩龍骨山茱茰巴㦸天各一兩為末鍊蜜和丸如梧桐子大空心鹽湯下三十丸神效散方治夢洩白茯苓一兩猪苓二錢先用水煮合宜去猪苓再將茯苓焙乾為散每服一錢温酒下空心夜臥各一半夏丸方治夢泄除痰利胸膈半夏二兩湯洗七遍入猪苓四兩炒令猪苓紫色去猪苓用半夏為末酒麵糊丸如梧桐子大每服十五丸空心粥飲下韭子丸方治腎臟虚冷腰膝痠疼冷痺夜多小便夢寐遺泄日漸羸瘦面無顔色兼治女人惡露赤白帯下韭子七升淨揀以醋湯煮千百沸取出焙乾旋炒令作油麻香為末鍊蜜丸如梧子大每日空心温酒下二十丸加至三十丸補虚壯元陽論曰陰陽氣血之在人初無餘欠及勞動妄作嗜恣過度戕其太甚則有陰陽傷憊之病氣血虚損之證法宜補之蓯蓉丸方補元藏益精氣利腰脚肉蓯蓉酒浸二兩天雄去皮臍一兩白馬莖酥炙二兩雀卵四十九枚兎絲子酒浸三宿一兩右將四味為末以雀卵并鍊蜜丸如梧桐子大毎服十丸空心温酒或米飲下兎絲子丸方補虚益氣壯元陽兎絲子淘去浮者以酒浸七日爛研焙乾三十兩蘹香子炒八兩青鹽三兩為末用浸藥酒煮麵糊丸如梧桐子大每服空心温酒下二十丸至三十丸補虚理腰膝論曰内經謂腰者腎之府轉摇不能腎將憊矣膝者筋之府屈伸不能行則僂仆筋將憊矣盖腎主腰肝主筋筋聚於膝若腎臟虚損肝元傷憊則筋骨受病故腰膝為之不利酸棗仁散方治骨極腎虚脚膝骨髓痠痛酸棗仁八兩㣲炒虎脛骨二兩塗酥炙黄熟乾地黄八兩杜仲二兩炒黄桂心三兩牛膝三兩右為散每服二錢胡桃酒下葱茶亦可空心日午夜臥各一服杜仲丸方補下元烏髭鬢壯腰膝進飲食悦顔色治腰疼杜仲炙為末補骨脂炒香熟為末胡桃仁湯浸去皮研各一兩研勻鍊蜜丸如梧桐子大每服三十丸空心温酒下地仙煎方治腰膝痠疼痛腹内一切冷病令人悦澤顔色骨髓堅固行及奔馬山藥末一斤杏仁去皮尖一升生牛乳一升先將杏仁研細入生牛乳絞取汁次取山藥末相拌入新瓷器蜜封安放釡中重湯煮一日煎成每服一錢空心温酒下兎絲子丸方治腰膝積冷痠疼或􅍙麻無力壯真元􅇠絲子牛膝各一兩於銀石器内好酒漬之令酒過藥一寸經五日控乾焙燥搗羅為末將元浸藥酒煮麵糊丸如梧桐子大每服三十丸空心食前酒下聖濟總録纂要卷二十六
