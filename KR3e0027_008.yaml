有力行動無妨宜常服香豆酒香豆酒方同前香豆一升酒三升浸隨量頻飲覺利多即止吳茱茰檳榔湯腳氣毒氣攻心欲死者吳茰炒四升檳榔七枚木瓜陳皮一兩厚朴二兩竹葉水煎三錢木瓜湯腳氣風溼毒氣攻心煩悶手足脈絶木瓜吳茰等分水煎三錢頃又服犀角湯腳氣若風熱輕但毒氣入胃唯心胸煩熱索水灑胸面乾嘔好呌氣欲斷絶者犀角木香人參羚角竹茹沉香射干麥冬赤茯二兩雞舌香麝香一兩另研石膏三兩水煎四錢去滓入麝末五分再沸服頃又服覺眼明心悟是效若嘔逆不下食加半夏二兩生薑一兩陳皮兩半木香湯腳氣攻心悶絶欲死木香檳榔一兩赤茯郁仁牛膝大黃炒吳茰桂三兩水煎桑皮木通汁入藥三錢服如重又服木香湯又方腳風毒攻心悶亂狂躁口乾氣欲絶或祕澀青木香生黑豆皮二兩大黃炒紅雪一兩即紫雪水煎五錢入紅雪三錢分二服頃再服當下燥糞烏豆湯風毒腳氣攻心心悶倒仆失音不語困甚者烏豆一升水四升煎汁二升甜竹葉一把桑皮三兩大腹七枚用豆汁浸藥一日次早煎分二服頃再服已死者幹開口灌之愈及灸腳心七壯男左女右麻仁湯腳氣沖心上氣二便澀小腹急痛大麻仁微炒赤小豆半升水七升煎二升半分三服過二日又一劑朴硝湯腳氣攻心悶絶朴硝白芍柴胡旋復紫蘇五錢大腹桑白皮炙三分檳榔二枚生薑一兩作三貼水煎去滓入朴硝二錢分二服礬石湯腳氣沖心白礬一兩漿水一斗五升煎浸腳良九味木香丸腳氣沖心胸膈煩滿喘急嘔吐木香訶勒枳殼桂二兩白芍柴胡兩半厚朴薑汁炒檳榔二兩半大黃炒三兩共末蜜丸梧子大酒下二三十丸腳氣語言蹇澀論曰風毒腳氣語言蹇澀者脾腎氣虛風涇中其經絡也腎之經循喉嚨挾舌本脾之經挾咽連舌本散舌下二經為風溼所中故令舌本強硬語言蹇澀也大八風湯腳氣上攻心脾語言蹇澀當歸大豆三兩白芍烏頭黃芩逺志獨活五味防風川芎麻黃人參秦芁乾薑甘草杏仁石斛白茯升麻紫苑黃茋桂二兩酒水煎三錢桂心湯風毒腳氣􅍙痺不仁語言蹇澀桂心三分麻黃當歸一兩防風升麻犀角檳榔二兩黃芩赤茯兩半棗水煎三錢乾溼腳氣論曰腳氣有乾溼之異者蓋隂陽所以分也在臟為隂在腑為陽然皆由風溼毒氣乘虛而入其症大同小異故乾腳氣之狀血脈痞澀皮膚􅍙痺脛細痠疼食減體瘦臟腑祕滯上沖煩悶溼腳氣之狀腳先腫滿或下注生瘡肌汗流下兩腳疼上攻心腹咳嗽喘急面浮膝腫見食嘔吐四根湯年深十九種乾溼腳氣桑麻根節心松木根節心柏木根節心杉木根節心並細銼炒黑各一兩肉蓯蓉酒浸二兩五靈脂石龍芮炒一兩天雄泡裂去皮臍二兩紫檀香地龍炒木香各一兩麝香五錢乳香沒藥一兩共末木瓜酒下二錢日三立應湯乾溼腳氣沖注四肢大腹煨木香防己紫蘇白芍羌活訶勒皮木瓜杉木節沉香一兩水煎五錢日二四斤丸乾溼腳氣差後常發令永不發牛膝木瓜蓯蓉天麻一斤酒五升浸一日晒乾為末用浸酒熬膏丸梧子大酒下三十丸杉木節湯乾腳氣頭痛腰腳痠痛心躁渴悶汗出氣喘杉木節一升橘葉一升大腹七枚連皮童便三升同煮取半分二服如一服快利便止唐桞宗元乾腳氣夜半痞絶左脅有塊如大石且死困天寒不知人三日家人皆號哭滎陽鄭洵美傳此方服之半食間氣通立愈防己湯乾腳氣腳膝腫滿防己豬苓郁仁檳榔三分木通枳殼紫蘇五錢赤茯炙甘草一兩薑水煎四錢海桐皮散溼腳氣及腎臟風下注滿腳瘡疼痛膿水出海桐皮草烏鹽炒地龍炒蒺藜炒一兩共末酒下二錢日二腳氣變成水腫論曰昔人論腳氣謂脾受陽毒即熱􅍙腎受隂溼即寒痺是知腳氣之病脾腎得之為多今變成水腫者亦緣脾腎俱虛乏蓋腎虛則不能行水脾虛則不能制水故水氣散溢滲于皮膚流于四肢所以通身腫也葶藶丸腳氣成水腫上氣氣急咳嗽二便苦澀所服利水藥反利大便小便反澀葶藶三兩防己炙甘草一兩杏仁貝母一兩半為末棗肉丸梧子大大棗桑皮粳米飲下三十丸小便未快加十丸檳榔散腳氣浮腫漸變成水心腹脹滿二便不通氣急喘息白檳榔五枚大腹皮七枚木香一兩大腹細銼二味為末用童便一鍾煎大腹一枚香末二錢去滓入檳榔末三錢再沸服日二豬苓湯腳氣兼水氣膈氣通身腫滿氣急小便不通坐卧不得豬苓防己赤茯三分木香郁仁澤㵼二兩桑皮五兩炙大腹七枚和皮水煎五錢服下小便立效日三腳氣大小便不通論曰腳氣二便不通者中風溼之氣摶于腳膝上攻胸腹脅肋填滿榮衛痞膈三焦之氣升而不降所以傳導變化皆不能出而二便不通蓋腎氣化則二便利腳膝者腎之候今腳氣上攻則腎氣不得化腎氣不化致二便不通也桑白皮湯男女風毒腳氣及遍身拘急刺痛二便赤澀不思食嘔逆或寒熱桑皮木通青皮紫蘇羌活一兩荆穗蘹香子根木瓜獨活枳殼二兩大腹大者三十枚薑蔥水煎三錢日二檳榔湯腳氣腫滿坐卧不得上沖心二便祕澀檳榔七枚木香郁仁二兩桑皮炙木通三兩水煎三錢去滓入牽牛末一錢二便利氣快為度江東嶺南瘴毒腳氣論曰內經謂南方者其地下水土弱霧露之所聚也江東嶺南大率如此春夏之交山水蒸欎風溼毒氣為甚足或感之遂成瘴毒腳氣其候腳先屈弱漸至痺疼膝脛微腫小腹不仁頭痛煩心痰壅吐逆時作寒熱便溲不通控心而勢迫治不可緩支法存所以留意經方編善斯術者豈非江左嶺表此疾得之為多歟犀角湯江東腳氣小欲動作漸覺心悶腳脛痠痛煩熱不止犀角木香前胡一兩竹茹三分麥冬兩半大腹皮三枚全用用水煎五錢羚羊角湯江東腳氣盛發上沖脾胃胸膈煩悶意氣不暢口乾目不知人羚角犀角兩半木香升麻旋復一兩麥冬大腹五枚枳殼前胡一兩水煎五錢快利為度旋復花飲乍處嶺南未伏水土食飲不宜兼卑溼腳氣發動時復心悶面目腳膝浮腫氣乏唇口青黑胸膈煩熱見食吐嘔心腹妨痛冷氣結聚如有此疾急服旋復前胡郁仁一兩半夏赤茯二兩大腹五枚全吳萸三分薑水煎五錢日二要疏利加檳榔末犀角湯腳氣之疾先起嶺南稍來江東皆由卑溼得之或微覺疼痺或二脛腫滿行起痺弱或上入腹不仁或時作冷熱皆其候也若先覺此症食嘔不下氣上逆者宜急服犀角旋復一兩赤茯陳皮兩半紫蘇半握薑棗水煎五錢豆一合獨活酒嶺南腳氣發動地氣鬱蒸熱毒風盛脾肺常有風溼獨活生地三兩海桐皮二兩惡實根生桂一兩黑豆皮生大麻仁炒一大升生白酒三斗浸頻服腳氣雜治膏藥淋泄等論曰腳氣症候不一隨症用藥備載于前然有一方兼治數症者有膏酒淋傳者皆昔經驗用之多效今復詳類於後木瓜丸腳氣諸疾木瓜四枚乳香二兩甘菊一兩青鹽一錢將瓜去瓤子入末封固蒸研丸梧子大酒下五十丸日三汗香為驗并膝腳等疾皆治桑葉煎腳氣會用諸方苦腳弱宜服白桑木用生桑椹者採軟枝切一石水一石煎五斗又加水五斗煎去滓慢煎成膏約二升即止收貯頻含化一匙服七日覺四肢通暢頻頻泄氣已後兩腳或腫勿怪乃是得藥力病差之候牛膝酒腳氣極冷著厚衣蓋覆不覺暖牛膝生地半斤紙包泥裹又用紙包泥固乾灰火養半日次以火燒一伏時取出漬酒服蒜酒初覺似有腳氣宜服蒜二升切炒桃仁一升去皮尖炒豆一升炒香酒一斗浸服石斛酒腳氣痺弱筋骨疼痛石斛四兩人參丹參川芎杜仲白术黃茋五味子防風陳皮甘草炙白茯乾薑山藥當歸桂二兩牛膝三兩酒五斗浸服菝葜酒腳氣屈弱積年腰脊攣痺及腹內堅結菝葜五斗水石半煮七斗麯十斤用上汁二斗浸二日白糯米一石淘蒸攤入汁麯拌勻內甕中常法取酒服腳氣發心膈悶宜此方取新磚二塊中心鑿孔如毬子大勿令透過將火燒紅用醋撥之便入川椒于孔內以物蓋看溫暖以腳踏磚上立愈麻黃裹足方久藴風熱足多冷麻隱痛難行夜常轉筋如風所吹皆腳氣之症麻黃二斤炒令極熱以帛包貯裹二足勿透氣良久腳上有汗候麻黃溫不用却著棉襪無令風吹如此數次永除病本芥子膏風溼腳氣腫痛無力白芥子萞麻木别藝苔子白膠香一兩胡桃五枚搗千杵成膏如彈子大塗患處黑豆煎腳氣黑豆五升桑皮五兩水三升同豆煮汁羌活蒺藜吳茰海桐皮五錢共末入汁煎膏酒下聖濟總録纂要卷八
