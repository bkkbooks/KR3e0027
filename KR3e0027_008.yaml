body:
  text: 聖濟總録纂要卷八休寧程林纂吐血門吐血統論論曰吐血病有三種一則緣心肺藴熱血得熱則妄行下流入胃胃受之則滿悶氣道賁衝故令吐血二則虛勞之人心肺內傷恚怒氣逆肝不得藏血乘虛而出因怒氣逆甚則嘔血三者緣酒食過飽胃間不安或強吐之氣脈賁亂損傷胃心血隨食出此名傷胃黃茋散治吐血綿黃茋白芨白斂黃明膠粉炒四兩共末空心飲下二錢緑雲散同前百合人參側柏葉阿膠粉炒二兩共末空心飲下二錢神效鹿角散治吐血咯血鹿角膠川柏炒五錢杏仁二十一枚去皮尖共研入白麵水下二錢阿膠散治咯血吐血阿膠白芨白芷白斂川柏蜜炙一兩共末飲下二錢藕汁茯苓散治吐血不止生藕汁白茯苓懷生地炒黑蒲黃等分以三味共末調藕汁下二錢補肺煮肺散治吐血咯血等杏仁一百二十枚去雙仁皮尖研極爛百合四兩蔥白三莖􅌻糯米三合共和勻用豬肺一具去筋管膜同煮􅌻蜜湯下異攻散治吐血不差人參一兩研極細五更時打雞子清和服二三錢黃藥子散治吐血黃藥子防己等分共末用小麥湯下一錢吐甚者一服減二服止艾灰散治吐血艾葉燒灰存性為末新汲水空心下二錢竹葉芍藥湯治吐血衄血大小便出血淡竹葉六合赤芍甘草炙一兩阿膠三兩川歸兩半水煎五錢溫服日二地黃藕汁飲治心肺熱極喘悶吐血生地汁生藕汁生薑汁小薊根汁生牛旁子汁生白蜜等分共和勻徐呷數口地黃飲治吐血不止懷生地一兩取汁鹿角膠一兩炙童便五合煎沸入汁末十數沸分三服吐血不止論曰藏真髙于肺而主氣藏真通于心而主血藏真散于肝而藏血是三者或因憂愁思慮與夫恚怒氣逆傷之則氣亂而血妄行下入於胃胃受之則脹滿其氣賁衝于上故吐血不止也白金散治吐血肺元受損上白麵石菖蒲一兩共末空心水下二錢暑毒氣薑汁蜜水下白斂湯治吐血咯血不止白斂二兩阿膠炒二兩用酒水合煎三錢去滓入生地汁半合沸服生犀桔梗散治吐血似鵝鴨肝晝夜不止生犀角生桔梗一兩共末空心溫酒下二錢晚下一錢補肺百花煎治吐血不止兼咳嗽生地汁生藕汁一升生薑汁半升乾青柿五枚研作糊黃牛乳升半胡桃肉十枚大棗二十枚研好白酒一升同上數味煎如餳入後藥黃明膠炙研五錢杏仁去皮尖研三兩秦艽五錢研末同上合煎減半入蜜四兩養成煎空心用糯米飲下一二匙日三服酒下亦可阿膠湯治吐血不止阿膠炒研熟艾三兩白芍地榆四兩小薊根五兩水煎五錢土馬騣湯治心肺藴熱恚怒氣逆便血妄行日夜不止土馬騣焙二兩人參白茯秦艽炙甘草枳實麩炒懷生地酒洗柴胡一兩水煎五錢空心溫服日二嘔血論曰憂愁思慮則傷心恚怒氣逆上而不下則傷肝蓋心主血肝藏血二臟俱受傷則血溢妄行流散不止氣逆則嘔吐而出血也三汁飲治吐血嘔血衄血等麥冬汁生地汁生藕汁􅌻冷水各一鍾白藥一兩和勻溫服一二鍾以差為度生地黃湯治憂愁恚怒嘔吐出血煩悶少氣胸中痛懷生地半斤阿膠粉炒研炙甘草兩半用大棗水煎五錢空心溫服日二荆芥穗飲治嘔血不止荆芥穗山枝仁片芩蒲黃一兩水煎五錢空心溫服晚再服以差為度唾血論曰邪熱薰于肺則損肺恚怒氣逆傷于肝則損肝肺肝傷動故令人唾血如唾中有若紅縷者屬肺臟如脅下先苦痛而後唾鮮血者屬肝經俱可析而治之紫苑散治肺氣內傷邪熱薰積咳唾有血紫苑川歸川芎附子欵冬五味子白术桂心生地甘草細辛側柏葉杏仁去皮尖炒研貝母一兩共末入蜜少許和滚湯空心下二錢晚再下蒲黃散治唾血不止蒲黃一兩生研羅細末用冷水和三錢空心下日二舌上出血論曰心主血在竅為舌若心臟藴熱血得熱而妄行或溢于心之竅故有舌上出血之症甚者出如涌泉升麻湯治心臟有熱舌上出血勢如涌泉升麻茜根小薊根兩半􅌻艾一把凝水石三兩水煎三錢去滓入生地汁半合再沸服日二阿膠散治舌上出血不止阿膠粉炒研末黃茋蜜炙蒲黃新者一兩共末用生地汁空心下二錢熟艾葉湯治心臟熱舌上出血及一切失血􅌻艾葉用糯米同炒松黃側柏葉炙一兩水煎三錢空心溫服日二汗血論曰內經云臟經通于心血脈之氣行焉又曰肝臟血故人卧血歸于肝然血雖藏于肝而妄則行之若肝心二臟俱傷于邪則血隨心液為汗而出是為汗血也人參湯治肝心二臟傷邪汗血人參赤芍白术甘草桂心一兩川歸淡竹茹川芎子芩二兩水煎三錢空心溫服日二神白散治血汗從膚腠中出人中白用瓦上炙乾研成末入麝香末少許和勻空心酒下二錢如聖散治汗血不止郁李仁去皮尖研爛用梨取汁下一錢日二竹茹湯治吐血汗血尿血竹茹人參白芍生地甘草川歸桔梗炒川芎桂心一兩水煎三錢空心溫服以差為度鼻衄論曰脾移熱于肝則為驚衄是木剋土也蓋脾土熱氣移于肝木則神魂驚恐而血行不由其道夫肺主氣開竅于鼻血隨氣上今血既妄行故于鼻出而為衄也生地藕節湯治邪熱上攻鼻衄懷生地生藕節一兩水煎五錢空心溫服以差為度蒲黃散治鼻衄蒲黃棕櫚燒灰存性川歸阿膠亂髮灰柏子仁燒研一錢共末用藕節汁空心下二錢如肺損傷吐血生地汁下腸風下血樗根皮湯下女人赤白帶艾葉湯下日二服貼背膏治上焦肺壅熱鼻衄京三稜大者一枚溼紙包煨􅌻乘熱爛搗用醋煮糊貼背上第三椎骨貼鼻方同前鹿角膠用沸湯浸軟一薄片貼鼻坳上差扎耳方治肺壅熱鼻衄玄胡索為末綿包扎耳內左衄扎右右衄扎左左右俱衄兩耳俱扎吹鼻方同前石榴花取百葉者隂乾為末用少許吹鼻中即差蔥白汁同前蔥白汁以汁入酒少許點二三匙滴入鼻中愈衄不止論曰榮衛之行常與胃氣相隨則氣與血未嘗一刻相離蓋肝藏血肺主氣榮衛和平則氣血調順若人臟腑有熱熱乘血氣血性得熱流溢妄行夫肺開竅于鼻故其發為鼻衄衄不止者臟虛血盛故也內經又云脾移熱于肝則為驚衄蓋脾土也肝木也今脾移熱于肝則木不能制土明矣肝藏血其神魂故為驚衄之病髮灰散治衄不止亂髮灰一錢人中白炙研五分麝香研一字共研用少許吹鼻中立愈車前子散治衄血不止欲死者車前子牛耳內垢等分用車前子為末與垢同研和成挺子塞耳中差柳枝散同前柳枝寒食日收者一兩人參一分共末空心溫水下二錢日二人參蓮心散治血衄不止人參一錢蓮子心一分共末空心溫水下二錢以差為度玊粉散治鼻衄日夜不止頭痛心煩石膏研牡蠣童便淬共研極細溫水下二錢日二二花散同前酸石榴花黃蜀葵花一兩共末水煎三錢溫服日二栗灰散治衄不止生栗取獨顆或中心者七枚連皮燒灰末入麝少許研勻酒下三錢日二法紙散治衄血不止衄血以紙接血將紙焙乾燒灰溫水和服但不可與病人知燈心散同前燈心一兩為末丹砂飛過一錢共末空心飲下二錢頃再服大蒜貼足治衄血不止諸藥無效者大蒜去皮苖研爛用帛攤錢大左竅出貼左足心右竅出貼右足心兩鼻並出二足並貼血止即洗去通神散治衄不止心神悶亂頭旋欲倒亂髮燒灰伏龍肝一兩共末用溫水空心下二錢頃再服茅花湯治血衄不止茆花用水煎濃汁二碗分二服如無花以根代之大衄論曰大衄者口耳皆出血是也蓋血為榮而藏於肝氣為衛而生於肺肺開竅於鼻三者相為流通若熱氣乘血熱盛則氣血妄行與衛氣錯溢於上竅故鼻衄不已而口耳皆出血也是名大衄南天竺飲治血妄行九竅皆出服藥不止者南天竺草生瞿麥者是一大把山枝三十枚生薑一兩燈心一把炙甘草五錢大棗肉五枚用水一大碗煎減半空心溫服苦參湯治大衄口耳皆出血不止苦參川連一兩山枝七枚大黃微炒兩半水煎五錢去滓入生地汁服阿膠湯治大衄不止阿膠粉炒研一兩蒲黃五錢水煎三錢去滓入生地汁服急用帛繫兩乳白龍骨散治大衄不止白龍骨煆為末用少許吹鼻中立止生地飲治大衄出血血上心胸氣急勞熱懷生地四兩子芩赤芍藥青竹茹三兩蒲黃三合地骨皮五兩水煎五錢空心溫服晚再服以差為度衄衊汗血論曰內經謂膽移熱於腦則酸頞鼻淵傳為衄衊瞑目夫血得熱則涌溢得寒則凝泣若膽受胃熱循脈而上乃移熱于腦蓋陽絡溢則血妄行在鼻為衄在汗空為衊衊者皆熱厥血溢之過也今之治衄衊者專于治血不知血之行留氣為之本猶海水朝夕兩潮乃隂陽之氣使然也明夫經絡順逆則血與氣俱流通而無妄行之患矣青竹茹湯治熱盛所致衄血汗血青竹茹子芩懷生地二兩白芍藥麥門冬蒲黃一兩水煎五錢空心溫服以差為度地黃散治血汗不止懷生地阿膠炒研三兩蒲黃二兩共末空心飲下二錢日二刺薊湯治熱氣上行衄血汗血刺薊紫蘇二兩川連犀角懷生地一兩水煎五錢溫服獨聖湯治血熱妄行或衄或衊子芩用酒浸微炒水煎七錢空心溫服立差腳氣門腳氣統論論曰風毒中人隨處悉能為病偏著于腳何耶蓋五臟經絡心肺起于手十指肝腎脾起于足十指地之蒸溼毒氣足先受之久而不差漸至四肢腹背頭項古人所謂微時不覺痼滯乃知所以謂之腳氣其症不一或見食嘔吐憎聞食臭或腹痛下利或二便祕塞不通或胸中忡悸不欲見明或精神昏憒或善忘語錯或壯熱頭疼或身體冷痛或時覺轉筋或小腹不仁或髀腿頑痺或縱緩不隨或腫或不腫或百節攣急凡是之症皆腳氣候也治法固多唯孫思邈云不得大補亦不得大㵼故須湯劑為治法之最學者宜加意焉風毒腳氣論曰內經謂暑勝則地熱風勝則地動溼勝則地泥寒勝則地裂寒暑風溼之氣皆本乎地人或履之所以毒亦易中于足也因病從腳起故謂之腳氣况五臟流注脾與腎肝之經絡皆起足指故有風毒腳氣之病其症或見食嘔吐或腹痛下利或便溲不通或胸中驚悸不欲見明或言語錯忘或頭痛壯熱或身體冷疼轉筋脛腫􅍙痺緩縱其狀不一治不可緩稍緩氣上入腹或腫或不腫胸中逆滿上氣肩息者死不旋踵寬者數日必死不可不急治也但看心下急氣喘不停或自汗數出或乍寒乍熱其脈促短而數嘔吐不止者死故不可緩也木瓜虎骨丸風毒腳氣疼痛少力筋脈拘急行步艱難木瓜虎脛骨沒藥當歸麒麟竭骨碎補木香自然銅醋淬七次敗龜板楓香安息重湯酒熬桂心甜瓜子一兩地龍二兩乳香五錢同沒藥麟竭研入木瓜內用黑豆一斗水洗安木瓜于中蒸爛研膏共末膏丸入酒少許丸梧子大木瓜湯下三十丸日二大續命湯腳氣脾攣不隨風毒攻四肢壯熱如火頭項攣急氣沖胸中當歸人參防風麻黃去根節石膏二兩芎藭杏仁炒微黃赤芍黃芩炙甘草桂一兩薑水煎四錢越婢湯風毒腳痺攣行步不遂麻黃石膏四兩白术二兩附子炙甘草一兩薑水煎四錢木香散腳氣緩弱大肉頑痺肢節疼痛木香三兩牛膝萆薢羚角陳皮杏仁獨活丹參杜仲秦芃桂一兩車前五錢薑水煎三錢日三犀角丸風毒腳氣上沖散入四肢虛腫無力犀角二兩白术檳榔人參川芎赤茯羌活木香防風石斛牛膝一兩蜜丸梧子大酒下二十丸日二五柔丸腎虛冷腎風或頭風兼風毒腳氣大黃一斤蒸三次前胡二兩半白芍半夏蓯蓉葶藶紙炒赤茯細辛當歸四兩蜜丸梧子大飲下五七丸日二以利為度蘆根湯風毒腳氣昏煩壯熱頭疼嘔吐口乾蘆根生兩半赤茯葛根知母淡竹葉麥冬三分炙甘草五錢水煎五錢日二淋泄方風毒腳氣腰膝􅍙痺腫行履不得皮膚如小蟲行羊桃蒴藋蒺藜蒼耳海桐皮柴胡白茯桞木蠧末水紅花一兩水五斗煎二斗去滓淋洗慎避風冷淋洗方風毒腳氣腰膝􅍙痺腫行步不得皮膚如蟲行水葒