有力行動無妨宜常服香豆酒香豆酒方同前香豆一升酒三升浸隨量頻飲覺利多即止吳茱茰㯽榔湯脚氣毒氣攻心欲死者吳茰炒四升㯽榔七枚木𤓰陳皮一兩厚朴二兩竹葉水煎三錢木𤓰湯脚氣風溼毒氣攻心煩悶手足脉絶木𤓰吳茰等分水煎三錢頃又服犀角湯脚氣若風熱輕但毒氣入胃唯心胸煩熱索水灑胸面乾嘔好呌氣欲斷絶者犀角木香人參羚角竹茹沉香射干麥冬赤茯二兩雞舌香麝香一兩另研石膏三兩水煎四錢去滓入麝末五分再沸服頃又服覺眼明心悟是效若嘔逆不下食加半夏二兩生薑一兩陳皮兩半木香湯脚氣攻心悶絶欲死木香㯽榔一兩赤茯郁仁牛膝大黄炒吳茰桂三兩水煎桑皮木通汁入藥三錢服如重又服木香湯又方脚風毒攻心悶亂狂躁口乾氣欲絶或秘澁青木香生黒豆皮二兩大黄炒紅雪一兩即紫雪水煎五錢入紅雪三錢分二服頃再服當下燥糞烏豆湯風毒脚氣攻心心悶倒仆失音不語困甚者烏豆一升水四升煎汁二升甜竹葉一把桑皮三兩大腹七枚用豆汁浸藥一日次早煎分二服頃再服已死者幹開口灌之愈及灸脚心七壯男左女右麻仁湯脚氣冲心上氣二便澁小腹急痛大麻仁㣲炒赤小豆半升水七升煎二升半分三服過二日又一劑朴硝湯脚氣攻心悶絶朴硝白芍柴胡旋復紫蘇五錢大腹桑白皮炙三分㯽榔二枚生薑一兩作三貼水煎去滓入朴硝二錢分二服礬石湯脚氣冲心白礬一兩漿水一斗五升煎浸脚良九味木香丸脚氣冲心胸膈煩滿喘急嘔吐木香訶勒枳殻桂二兩白芍柴胡兩半厚朴薑汁炒㯽榔二兩半大黄炒三兩共末蜜丸梧子大酒下二三十丸脚氣語言蹇澁論曰風毒脚氣語言蹇澁者脾腎氣虚風涇中其經絡也腎之經循喉嚨挾舌本脾之經挾咽連舌本散舌下二經為風溼所中故令舌本强硬語言蹇澁也大八風湯脚氣上攻心脾語言蹇澁當歸大豆三兩白芍烏頭黄芩逺志獨活五味防風川芎麻黄人參秦芁乾薑甘草杏仁石斛白茯升麻紫苑黄茋桂二兩酒水煎三錢桂心湯風毒脚氣􅍙痺不仁語言蹇澁桂心三分麻黄當歸一兩防風升麻犀角㯽榔二兩黄芩赤茯兩半棗水煎三錢乾溼脚氣論曰脚氣有乾溼之異者葢隂陽所以分也在臓為隂在腑為陽然皆由風溼毒氣乗虚而入其症大同小異故乾脚氣之狀血脉痞澁皮膚􅍙痺脛細痠疼食减體瘦臟腑秘滯上冲煩悶溼脚氣之狀脚先腫滿或下注生瘡肌汗流下兩脚疼上攻心腹咳嗽喘急面浮膝腫見食嘔吐四根湯年深十九種乾溼脚氣桑麻根節心松木根節心栢木根節心杉木根節心並細剉炒黒各一兩肉蓯蓉酒浸二兩五靈脂石龍芮炒一兩天雄泡裂去皮臍二兩紫檀香地龍炒木香各一兩麝香五錢乳香沒藥一兩共末木𤓰酒下二錢日三立應湯乾溼脚氣冲注四肢大腹煨木香防己紫蘇白芍羗活訶勒皮木𤓰杉木節沉香一兩水煎五錢日二四斤丸乾溼脚氣差後常發令永不發牛膝木𤓰蓯蓉天麻一斤酒五升浸一日晒乾為末用浸酒熬膏丸梧子大酒下三十丸杉木節湯乾脚氣頭痛腰脚痠痛心躁渴悶汗出氣喘杉木節一升橘葉一升大腹七枚連皮童便三升同煮取半分二服如一服快利便止唐桞宗元乾脚氣夜半痞絶左脅有塊如大石且死困天寒不知人三日家人皆號哭滎陽鄭洵美傳此方服之半食間氣通立愈防己湯乾脚氣脚膝腫滿防己猪苓郁仁㯽榔三分木通枳殻紫蘇五錢赤茯炙甘草一兩薑水煎四錢海桐皮散溼脚氣及腎臟風下注滿脚瘡疼痛膿水出海桐皮草烏鹽炒地龍炒蒺藜炒一兩共末酒下二錢日二脚氣變成水腫論曰昔人論脚氣謂脾受陽毒即熱􅍙腎受隂溼即寒痺是知脚氣之病脾腎得之為多今變成水腫者亦縁脾腎俱虚乏葢腎虚則不能行水脾虚則不能制水故水氣散溢滲于皮膚流于四肢所以通身腫也葶藶丸脚氣成水腫上氣氣急咳嗽二便苦澁所服利水藥反利大便小便反澁葶藶三兩防己炙甘草一兩杏仁貝母一兩半為末棗肉丸梧子大大棗桑皮粳米飲下三十丸小便未快加十丸㯽榔散脚氣浮腫漸變成水心腹脹滿二便不通氣急喘息白㯽榔五枚大腹皮七枚木香一兩大腹細剉二味為末用童便一鍾煎大腹一枚香末二錢去滓入㯽榔末三錢再沸服日二猪苓湯脚氣兼水氣膈氣通身腫滿氣急小便不通坐卧不得猪苓防己赤茯三分木香郁仁澤㵼二兩桑皮五兩炙大腹七枚和皮水煎五錢服下小便立効日三脚氣大小便不通論曰脚氣二便不通者中風溼之氣摶于脚膝上攻胸腹脅肋填滿榮衛痞膈三焦之氣升而不降所以傳導變化皆不能出而二便不通葢腎氣化則二便利脚膝者腎之候今脚氣上攻則腎氣不得化腎氣不化致二便不通也桑白皮湯男女風毒脚氣及徧身拘急刺痛二便赤澁不思食嘔逆或寒熱桑皮木通青皮紫蘇羗活一兩荆穗蘹香子根木𤓰獨活枳殻二兩大腹大者三十枚薑葱水煎三錢日二㯽榔湯脚氣腫滿坐卧不得上冲心二便秘澁㯽榔七枚木香郁仁二兩桑皮炙木通三兩水煎三錢去滓入牽牛末一錢二便利氣快為度江東嶺南瘴毒脚氣論曰内經謂南方者其地下水土弱霧露之所聚也江東嶺南大率如此春夏之交山水蒸欎風溼毒氣為甚足或感之遂成瘴毒脚氣其候脚先屈弱漸至痺疼膝脛㣲腫小腹不仁頭痛煩心痰壅吐逆時作寒熱便溲不通控心而勢迫治不可緩支法存所以留意經方編善斯術者豈非江左嶺表此疾得之為多歟犀角湯江東脚氣小欲動作漸覺心悶脚脛痠痛煩熱不止犀角木香前胡一兩竹茹三分麥冬兩半大腹皮三枚全用用水煎五錢羚羊角湯江東脚氣盛發上冲脾胃胸膈煩悶意氣不暢口乾目不知人羚角犀角兩半木香升麻旋復一兩麥冬大腹五枚枳殻前胡一兩水煎五錢快利為度旋復花飲乍處嶺南未伏水土食飲不宜兼卑溼脚氣發動時復心悶面目脚膝浮腫氣乏唇口青黒胸膈煩熱見食吐嘔心腹妨痛冷氣結聚如有此疾急服旋復前胡郁仁一兩半夏赤茯二兩大腹五枚全吳萸三分薑水煎五錢日二要疎利加㯽榔末犀角湯脚氣之疾先起嶺南稍來江東皆由卑溼得之或㣲覺疼痺或二脛腫滿行起痺弱或上入腹不仁或時作冷熱皆其候也若先覺此症食嘔不下氣上逆者宜急服犀角旋復一兩赤茯陳皮兩半紫蘇半握薑棗水煎五錢豆一合獨活酒嶺南脚氣發動地氣鬱蒸熱毒風盛脾肺常有風溼獨活生地三兩海桐皮二兩惡實根生桂一兩黒豆皮生大麻仁炒一大升生白酒三斗浸頻服脚氣雜治膏藥淋渫等論曰脚氣症候不一隨症用藥備載于前然有一方兼治數症者有膏酒淋傳者皆昔經騐用之多効今復詳類於後木𤓰丸脚氣諸疾木𤓰四枚乳香二兩甘菊一兩青鹽一錢將𤓰去瓤子入末封固蒸研丸梧子大酒下五十丸日三汗香為騐并膝脚等疾皆治桑葉煎脚氣會用諸方苦脚弱宜服白桑木用生桑椹者採軟枝切一石水一石煎五斗又加水五斗煎去滓慢煎成膏約二升即止收貯頻含化一匙服七日覺四肢通暢頻頻洩氣已後兩脚或腫勿怪乃是得藥力病差之候牛膝酒脚氣極冷着厚衣葢覆不覺煖牛膝生地半斤紙包泥裹又用紙包泥固乾灰火養半日次以火燒一伏時取出漬酒服蒜酒初覺似有脚氣宜服蒜二升切炒桃仁一升去皮尖炒豆一升炒香酒一斗浸服石斛酒脚氣痺弱筋骨疼痛石斛四兩人參丹參川芎杜仲白术黄茋五味子防風陳皮甘草炙白茯乾薑山藥當歸桂二兩牛膝三兩酒五斗浸服菝葜酒脚氣屈弱積年腰脊攣痺及腹内堅結菝葜五斗水石半煮七斗麯十斤用上汁二斗浸二日白糯米一石淘蒸攤入汁麯拌匀内甕中常法取酒服脚氣發心膈悶宜此方取新磚二塊中心鑿孔如毬子大勿令透過將火燒紅用醋撥之便入川椒于孔内以物葢看温煖以脚踏磚上立愈麻黄裹足方久藴風熱足多冷麻隱痛難行夜常轉筋如風所吹皆脚氣之症麻黄二斤炒令極熱以帛包貯裹二足勿透氣良久脚上有汗候麻黄温不用却着棉襪無令風吹如此數次永除病本芥子膏風溼脚氣腫痛無力白芥子萞麻木别芸苔子白膠香一兩胡桃五枚搗千杵成膏如彈子大塗患處黒豆煎脚氣黒豆五升桑皮五兩水三升同豆煮汁羗活蒺藜吳茰海桐皮五錢共末入汁煎膏酒下聖濟總録纂要卷八
