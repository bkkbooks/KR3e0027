body:
  text: 聖濟總録纂要卷十一休寧程林纂黃疸門黃疸統論論曰疸病症有五種一曰黃疸二曰黃汗三曰穀疸四曰酒疸五曰女勞疸黃疸者遍身面目悉黃如橘黃汗者身體黃腫汗出如檗汁不渴狀如風水榖疸者食畢頭眩心中怫鬱不安而發黃酒疸者心中懊痛足腫滿小便黃面發赤斑黃黑由大醉當風入水所致女勞疸者一身面目皆黃發熱惡寒小腹滿急小便難由大熱房室過度此五者症狀雖異大率因酒食過多水榖相並積於脾胃復為風濕所摶熱氣鬱蒸所以發黃為疸其症食已如飢曰胃疸額上黑足下熱曰黑疸其因傷寒時氣後變成黃者緣陽明病無汗小便不利熱瘀在裏心中懊憹身必發黃若被火額上微汗出但小便不利亦發黃其狀如橘色腹微滿此由寒濕不散瘀熱在于脾胃故也又有九疸三十六黃其症其名悉各不同治皆有法具載後章凡黃病當利其小便疸而渴者其病難治疸而不渴其病可治黃疸論曰內經謂目黃者曰黃疸又曰安臥脈盛謂之黃疸其外症身體面目及瓜甲小便盡黃其內症食已如飢此由酒食過度脾胃有熱復為風濕所摶瘀結不散熱氣鬱蒸故發是疾若面色微黃身體或青赤黑色皆見者與純熱之症不同當于濕家求之諸黃疸發于陰部其人必嘔發于陽部其人必振寒而發熱也茵陳蒿湯治黃疸目黃小便如血心煩躁悶口苦頭痛茵陳蒿麥冬山枝仁三分木通柴胡括樓根一兩炙甘草五錢水煎五錢入竹葉二七片溫服日二木通湯治黃疸脾胃積熱皮肉皆黃煩躁口苦小便赤澀木通瞿麥穗一兩懷生地兩半大青赤茯苓白茅根秦芁三分水煎五錢溫服日二黃連湯治黃疸面目遍身皆黃小便盡黃川連大青人參地骨皮茵陳蒿山枝仁炒子芩柴胡芒硝一兩大黃炒二兩水煎五錢溫服日二桃根湯治黃疸面目一身如金色及一切疸病桃根皮東引者一把如叉股者佳勿見風及避女人雞犬水煎取汁空心頻服如眼中黃色未退時飲酒一杯白鮮皮散治一切黃疸而目皮肉如金色小便赤黑口乾煩渴白鮮皮二兩芒硝大黃三兩土瓜根茵陳蒿括樓根白芍川連柴胡山枝兩半子芩一兩真珠三十枚燒赤研大青兩半共末用白茅根取汁下三錢取利至晚不利再服服了以蔥豉粥投之取利為效柴胡湯治黃疸身面黃口渴柴胡五錢炙甘草一分白茅根一把水煎溫服未差再服秦芁煮散治面身目瓜甲小便俱黃秦芁一兩用牛乳二鍾半煎鍾半分二服未差再服茵陳蒿丸治一切黃疸并小便如金色及身皮皆黃者茵陳蒿四兩大黃片芩山枝仁三兩共末入蜜杵丸梧子大空心飲下二三十丸日二吳藍飲治黃疸身腫發熱汗出而渴汗著衣正黃吳藍白芍麥冬白鮮皮山枝仁桑白皮炙防己一兩水煎五錢溫服日二急黃論曰諸發熱心顫定必發為急黃謂其卒然發黃心滿氣喘命在頃刻故名急黃也有初得病身體面目即發黃者有初不知是黃死後變黃者但先有其症當急治之此由脾胃有蓄熱及客氣鬱蒸又因熱毒所加故發為斯病也茵陳蒿湯治急黃小便赤黃如枝子汁色兼心中煩悶茵陳蒿子芩山枝仁川連大黃微炒白鮮皮一兩貝齒煆朴硝研五錢水煎五錢去滓入朴硝五分沸服日二茵陳川連湯治天行急黃身目如金色茵陳蒿川連子芩大黃炒一兩人參炙甘草五錢水煎五錢空心溫服日二龍膽草湯治急黃面目身體如金躁欲飲水龍膽草一兩石膏二兩木通土瓜根大黃微炒兩半白茅根朴硝研犀角一兩山枝五錢水煎三錢去滓入朴硝五分沸服黑豆煎治急黃煩熱口乾遍身悉黃黑豆一升用水五大鍾煎汁二鍾入生地汁藕汁麥冬汁白蜜各二合酥半合慢煎成膏含化一匙日三夜一陰黃論曰陰黃者面黃頭痛不發熱不欲聞人聲音此由陽伏于陰邪氣熱盛沉潛散于肌肉身黃如橘故謂之陰黃昔人有言下之後身目發黃者當於寒濕中求之此其類也秦芁湯治陰黃不欲聞人言語小便不利秦芁一兩赤茯苓炙甘草旋復花五錢用牛乳煎四錢溫服茵陳蒿散治陰黃身面如橘色小便不利茵陳蒿二兩白术豬苓赤茯苓三分桂心五錢澤瀉去毛一兩共末空心水下二錢日三半夏湯治陰黃小便色不變欲自利腹滿而喘者必噦半夏湯泡薑汁炒一兩人參葛根二兩生薑水煎四錢溫服日二赤小豆散治陰黃赤小豆丁香各二十一粒麝香研一錢瓜蒂二枚青棉布灰二錢共末熟水下一錢日二以吐為度又取少許吹鼻中有黃水出效酒疸論曰胃虛榖少醉以入房冒犯風邪胃中熱毒隨虛入裏小便黃赤濕毒內聚心下懊憹疼痛薰發肌肉則身目發黃或發赤斑足脛浮腫或下之早則變為黑疸令人心如病飢大便黑瘀皮膚不仁治法槩宜先去濕毒後分小水陳茵蒿湯治酒疸心中懊痛小便黃赤茵陳蒿葛根赤茯苓五錢升麻秦芁一兩括樓根三分山枝仁半分水煎三錢溫服日二以差為度艾葉湯治酒疸身目俱黃心中懊痛艾葉生一把如無用乾者麻黃去根節二兩大黃炒兩半用酒煎四錢入大豆半合空心溫服日二凝水石散治酒疸小便不利或飲少溲多如白泔色凝水石煆白石脂括樓根一兩知母桂心兔絲子酒煮二兩共末空心飲下二錢日二小麥飲治酒疸生小麥用水煎二合取汁頓服未差再服追毒飲治酒疸遍身發黃狗脊去毛酒蒸一兩白芥子炙甘草一分用酒一升煎半升分二服以利下為度未利再服榖疸論曰夫飢飽甚則胃中滿塞榖氣未化虛熱薰蒸遂為榖疸其症心下懊悶䫦睡心忪怫鬱發煩小便不利身黃如橘是也苦參枝子丸治榖疸苦參子芩山枝仁龍膽草一兩共末用雄豬膽汁和丸如梧子大空心飲下二十丸日二胃疸論曰已食如飢者胃疸也夫胃熱則能消榖今已食如飢者以胃氣但熱而無陰也然胃為足陽明陽明之脈絡屬于心陽明得熱則心火上行陽炎過矣故單陽成疸心嘈雜而身面黃小便赤色也瀉熱湯治胃中有熱食已如飢不生肌肉面色萎黃生大黃麻黃去根節子芩四兩甘草陳皮去白杏仁去皮尖研赤茯苓芒硝研澤㵼一兩水煎三錢溫服日二蘆根湯治胃熱壅盛食已如飢面黃口燥蘆根麥冬括樓根一兩甘草知母赤茯苓三分生薑水煎三錢入小麥一撮竹葉生地一分溫服日二赤茯苓湯治胃積熱食已即飢面黃肌瘦胸滿脅脹赤茯苓陳皮澤㵼桑白皮三兩炙白芍藥白术四兩石膏研八兩人參桂心二兩半夏薑炒六兩生薑水煎四錢溫服犀角湯治胃實熱嘔逆不下食犀角屑葛根三分麥冬枇杷葉去毛炙一兩生薑水煎三錢服黑疸論曰諸黃疸酒疸女勞疸久不已皆變為黑疸其狀小腹滿身體盡黃額上反黑足下熱大便黑是也黃本脾病脾者土也脾病不已傳其所勝腎斯受之腎為水藏其經足少陰其色黑病在腎故小腹滿色黑大便黑足下熱是皆足少陰經受病之症當歸湯治諸疸久不差變成黑疸小腹滿身黃額黑川歸三兩桂心六兩麥門冬大黃炒一兩黑乾薑黃茋炙茵陳蒿子芩赤茯苓炙甘草石膏研川連白芍藥人參二兩共十四味銼如麻豆大用生薑水煎三錢空心溫服日三一方無黃茋土瓜根飲治諸疸變成黑疸諸醫所不能治者土瓜根水煎取汁每日空心服半鍾其病隨小便出即愈須強壯人可半鍾羸瘦人只一合無生者銼乾者一兩水煎服女勞疸論曰脾胃素有濕熱或緣大暑醉飽房勞過度引熱歸腎濕氣交攻小水不利小腹堅脹濕毒流散于肌肉之中則四肢身面發黃故謂之女勞疸然其症又有額上黑微汗出手足心熱薄暮即發膀胱急小便自利者各宜隨其症而治之硝石礬石散治女勞疸身目皆黃發熱惡寒小腹滿急小便難出大勞大熱房室傷損濕毒散于肌肉硝石礬石燒枯一兩共末空心飲下一錢覆衣取汗隨利小便色黃大便色黑差未差再下犀角湯治女勞疸及勞氣熱渴額上汗出手足熱小便赤澀犀角龍膽草一兩升麻炙甘草五錢麥冬去心三分生薑大棗水煎三錢去滓入生地汁一合再沸服日二髮灰散治女勞疸身目俱黃惡寒發熱小腹滿急小便難亂髮雞子大一丸豬脂半斤用油慢火煎髮令髮消盡溫水下一匙不拘時頻服以小便利為度黃汗論曰黃汗者汗出沾衣色正黃如檗汁故名曰黃汗由脾胃有濕瘀熱伏留薰發肌肉散而為汗其症使人身體浮虛骨節疼痛發熱汗出而不渴是其候也黃茋苦酒湯治黃汗身腫發熱汗出而不渴狀如風水汗沾衣色黃如檗汁脈沉由夫汗出入水中浴水從汗孔入而得之黃茋蜜炙五兩白芍藥桂心三兩用苦酒二鍾煎五錢空心服之當心煩苦酒阻故也日二服吳藍湯治黃汗身重發熱汗出而不渴狀如風水汗出衣黃吳藍防己白鮮山枝仁桑白皮麥冬去心白芍兩半水煎三錢溫服未效再服茵陳蒿湯治黃汗身熱不退大小便不利茵陳蒿木通黃茋赤芍藥赤茯苓炙甘草一兩大青炒二兩水煎五錢溫服頃再服以二便通利為度山枝括樓丸治黃汗身熱大小便不利山枝仁括樓根苦參一兩共末用醋浸雞子二枚和丸梧子大水下三十丸日三四服蔓菁子散治黃汗如檗汁沾衣身虛浮蔓菁子為末用井華水空心下二錢日二以差為度三十六黃一心黃二肝黃三脾黃四肺黃五腎黃六鬼黃七姦黃八血黃九人黃十髓黃十一癊黃十二急黃十三氣黃十四癎黃十五白黃十六陰黃十七膽黃十八驚黃十九風黃二十走精黃二十一酒黃二十二雞黃二十三蜒蚰黃二十四火黃二十五走馬黃二十六房黃二十七黑黃二十八厭黃二十九水黃三十瓜黃三十一腸黃三十二犢黃三十三氣黃三十四豬黃三十五土黃三十六蝦蟆黃右三十六黃有烙法有灸法有方法中多竒證大約是瘟疫中壞證必有之惡候也然三法俱難用故不刋載今存其名以備醫家博覽胸痺門胸痺統論論曰虛極之人為寒邪所客氣上奔迫痺而不通故為胸痺其症堅滿痞急或胸中愊愊如噎塞或胸背皆痛或胸滿短氣咳唾引痛煩悶白汗出或心痛徹背或肌痺皮痛是皆閉塞而不通也夫脈當取太過與不及陽微陰弦則胸痺而痛又云胸痺之病喘息咳唾背痛短氣寸口脈沉而遲關上緊是皆胸痺之候也胸痺論曰胸痺之病其脈陽微而陰弦陽虛則知在上焦陰弦故令胸痺心痛古方用理中湯取緩其中氣則可也然背者胸之腑或築或悸或渴或腹痛或寒或腹滿其候不一治當隨症加減理中湯治胸痺人參白术炙甘草黑乾薑一兩水煎五錢溫服頃又服若築者此腎氣動也去白术加桂心臍上築吐多者去白术加生薑下多者復用白术悸者加白茯苓渴者加白术二兩腹中痛加人參一兩寒者倍乾薑腹滿去白术加附子服後以稀粥投之取汗括樓實湯治胸痺括樓實一枚并瓤子用枳實五枚麩炒半夏四兩薑炒水煎五錢入薤白五寸生薑三片煎溫服日二半夏湯治胸痺心下堅痞急痛徹背短氣煩悶白汗出半夏薑汁炒二兩半括樓實一枚薤白切二合生薑水煎五錢入薤白服日二胸痺噎塞論曰胸痺噎塞之病以胸中痞結不通故有噎塞之症蓋寒氣客于五臟六腑因虛而發上沖胸間則氣痞而不通甚則為噎塞也裩布丸治心胸氣喉中噎塞裩布洗燒灰三分木香赤茯枳實麩炒檳榔五錢半生半炒訶梨勒煨皮五錢甘草乾薑一分共末入蜜杵丸如梧子大空心溫酒下三十丸日二赤茯苓湯治胸中氣壅噎塞赤茯苓三兩炙甘草一兩杏仁四十九枚去皮尖炒研水煎三錢溫服日二胸痺心下堅痞急論曰體虛之人寒氣客之氣結胸鬱而不散故為胸痺其症心下堅滿痞急甚者疼痛搶心如刺手不得犯治之當辨至微殆不可忽也五物湯治胸痺心下堅陳皮去白炒白芍川歸五錢木香一分桔梗一兩生薑水煎五錢服桔梗湯治胸痺心下氣堅滿痞急刺痛不可俯仰氣促咳吐引痛不能飲食桔梗炒陳皮炒二兩甘草一兩括樓實炒一枚生薑大棗水煎五錢入薤白五寸空心溫服日二五味丸治胸痺心下堅痞急附子黑乾薑三兩桂心檳榔訶勒皮一兩共末入蜜杵丸如小豆大酒下二三十丸日二白豆蔲湯治胸痺心下堅痞急白豆䓻人參木香桂心五錢黑乾薑京三稜醋煮炙甘草陳麯一兩陳皮大麥蘖炒香三兩生薑水煎三錢入鹽少許溫服日二胸痛論曰胸痛者胸痺痛之類也此由體虛挾風又遇寒氣加之則胸膺兩乳間刺痛甚則引背膊或徹背膂咳唾引痛是也桔梗黃茋湯治胸膺痛桔梗二兩人參川芎甘草蘇葉五錢川歸黃茋沉香一兩水煎三錢溫服日二白术枳實散治胸痺白术土炒枳實麩炒陳麯炒一兩共末酒下二錢日二柏實散治胸痺柏子仁炒一兩桂心半分共末飲下二錢日二聖濟總録纂要卷十一
